body:
  text: 武編後集卷一明唐順之撰料敵漢髙帝時黥布反帝召薛公以問對曰使布出於上計東取吳西取楚并齊取魯𫝊檄燕趙固守其所山東非漢之有也出中計東取吳西取楚并韓取魏據敖倉之粟塞成臯之險勝敗之數未可知也出下計東取吳西取下蔡歸重於越身歸長沙陛下髙枕而卧漢無事矣上曰是計將安出對曰必出下計布故酈山之徒也自致萬乘之主此皆為身不顧後為百姓萬世慮者也故出下計果如薛公揣之東擊荆荆王劉賈敗死漢終破布趙劉曜舉軍攻洛陽石勒將親救之其長史程遐等以為不可諫勒勒大怒按劍叱遐等出召徐光而謂之曰劉曜掠敵乘髙侯之勢圍守洛陽庸人之情皆謂鋒不可當然曜帶甲百萬攻一城而百日不克師老卒怠以吾初鋭擊之可一戰而擒若洛陽不守曜必送死冀州自河以北席卷南向吾事去矣程遐等不欲吾親行卿以為何如光對曰劉曜乘髙侯之勢而不能進臨襄國更守金墉此其無能為也縣軍三時亡攻戰之利若鸞旗親駕必望風敗走天下之計在今一舉勒笑曰光之言是也使內外戒嚴有諫者斬命石堪等各統見衆會榮陽使石季龍進據石門以左衛石邃都督中軍事勒統步騎四萬赴金墉勒顧謂徐光曰曜盛兵成臯關上計也阻洛水其次也坐守洛陽者成擒也諸軍集於成臯勒見曜無守軍大恱乃卷甲銜枚出於鞏訾之間曜陳其軍十餘萬人於城之西勒自宣陽門升故太極前殿季龍步卒三萬自城之北而西攻其中軍石堪石聰等各以精騎八千自城西而北擊其前鋒大戰於西陽勒躬擐甲胄出自閶闔夾擊之曜軍大潰於陳擒曜以徇軍前梁侯景作亂遣宋子仙襲陷郢州景乘勝西上號二十萬聫旗千里江左以來水軍之盛未之有也元帝聞之謂御史中丞宗栗曰若賊分守巴陵鼓行西上荆郢殆危此上策也身頻長沙徇地零桂運糧以至洞庭非吾有此中策也擁衆江口連攻巴陵鋭氣盡於堅城士卒饑於半菽此下策也吾安枕而卧無所多憂及次巴陵王僧辨沈船卧鼓若將已遁景遂圍城元帝遣平北將軍胡僧祐與居士陸法和大破之西魏邊將于謹討梁元帝繹于江陵長孫儉問謹曰為繹之計欲如何謹曰耀兵漢沔席卷渡江直據丹陽是其上策移郭內居民退保子城峻其陴堞以待援至是其中策若難於移動據守羅郭是其下策儉曰揣繹定出何策謹曰必用其下儉曰彼棄上而用下何也對曰蕭氏保據江南綿厯數紀屬中原多故未遑外略又以我有齊氏之患必謂力不能分且繹懦而無謀多疑少斷愚人難與慮始皆戀城邑既惡遷移當保羅郭所以用下策也謹乃令中山公護及大將軍楊忠等率精騎先據江津斷其走路梁人立木柵於外城廣輪六十里尋而謹至衆悉圍之梁主屢遣兵於城南出戰輒為謹所破旬有六日外城遂陷梁主退保子城翌日率其太子以下面縛出降尋殺之宋景德中知宜州劉永規在郡嚴酷課澄海卒伐木葺州廨數不中程即杖之雖甚風雨不停其役衆咸怨焉故澄海軍校陳進率所部害永規擁判官盧成鈞為謀主嬰城拒命詔東上閣門使曹利用等發兵討之初奏至真宗謂王旦等曰司天屢言當有兵方憂逺地牧守不得其人今果有是當遣使翦除旦言利用精於方略悉心王事此賊不出三策保其家屬據城拒守一也掠城中資以趨山林二也用此二策不足為慮若選募驍果立謀主直趨廣州賊之上策然其智識必不及此猶慮為人誘教爾及聞賊分據栁州洛曹縣帝曰此不能離窟穴枉自棄耳不久遂平後漢末曹公征荆州劉琮降得其水軍及步兵遂遺書孫權云今將水軍八十萬當與將軍會獵於長洲之苑將士聞之恐權延見羣下問以計策咸曰曹操託名漢相挾天子以征四方動以朝廷為辭今日拒之事更不順且將軍大勢可以拒操者長江也劉表治水軍蒙衝鬭艦千數操悉浮以㳂江兼有步兵水陸俱下此為長江之險已與我共之矣而勢力衆寡又不可論愚謂大計不如迎之權將周瑜曰不然操雖托名漢相其實漢賊將軍以神武雄材兼仗父兄遺烈割據江東地方數千里兵精足用英雄樂業尚當橫行天下為漢家除殘去穢況操自送而可迎之耶請為將軍籌之今使北土已安操無內憂能曠日持久來爭疆場又能與我較勝負於舟楫可乎今北土既未安加以馬超韓遂在關西為操後患且捨鞍馬仗舟楫與吳越爭衡本非中國所長又今盛寒馬無藁草驅中國士衆逺涉江湖不習水土必生疾病此數事者用兵之患也而操皆冒行之瑜請得精兵三萬人進往夏口保為將軍破之權曰君言當擊甚與孤合權拔刀斫前奏案曰諸將吏敢復言當迎操者與此案同果有赤壁之捷焉後漢曹公征張繡於穰一朝引軍退繡自追之賈詡曰不可追追必敗繡不從大敗而還詡謂繡曰更追之必勝繡曰不用公言以至於此今已敗奈何復追詡曰兵勢有變亟往必利繡信之遂收散卒追戰果以勝還問詡曰繡以精兵追退軍而公曰必敗以敗卒擊勝兵而公曰必克悉如公言何其皆驗詡曰此易知耳將軍雖善用兵非曹公敵也軍雖新退曹公必自斷後追兵雖精將既不敵彼士亦鋭故知必敗曹公攻將軍無失策力未盡而退必國內有故已破將軍必輕軍速進縱留諸將斷後諸將雖勇亦非將軍敵故雖用敗兵而戰必勝也繡大服金人廢劉豫歸河南陜西地樓照使陜以便宜欲命三帥分陜而守以郭浩帥鄜延楊政帥熙河吳璘帥秦鳯欲盡移川口諸軍陕西璘曰金人反覆難信懼有他變今我移軍陜右蜀口空虛敵若自南山要我陜右軍直搗蜀口我不戰自屈矣當且依山為屯控其要害遲其情見力疲漸圖進據照從之命璘與楊政兩軍屯內地保蜀郭浩一軍屯延安以守陜既而胡世將以四川制置宣撫司事至河池璘見之曰今大兵屯河中府止隔大慶一橋爾騎兵疾馳不五日至川口吾軍逺在陜西緩急不可追集關隘不葺糧運斷絶此存亡之秋也璘家族固不足恤如國事何時朝廷恃和忘戰欲廢仙人關於是世將抗奏謂當外固歡和內修守禦今日分兵當使陜蜀相接近兵官賀仔諜知薩里罕密謀曰要入蜀不難棄陜西不顧三五嵗南兵必來主之道路吾已孰知一發取蜀必矣敵情如是萬一果然則我當為伐謀之備仙人關未宜遽廢魚關倉亦宜積糧於是璘僅以牙校三隊赴秦州留大軍守階成山寨戒諸將毋得撤備世將尋置司河池十年金人敗盟詔璘節制陜西諸路軍馬薩里罕渡河入長安趨鳳翔陜右諸軍隔在敵後逺近震恐撫士春秋時楚師伐宋圍蕭蕭潰楚大夫申公巫臣曰師人多寒楚子於是巡三軍撫而勉之三軍之士皆如挾纊秦繆公嘗出而亡其駿馬自往求之見人已殺其馬方共食其肉繆公謂曰是吾駿馬也諸人皆懼而起繆公曰吾聞食駿馬肉不飲酒者殺人即以次飲之酒殺馬者皆慙而去居三年晉攻秦繆公圍之往時食馬肉者相謂曰可以出死報食馬得酒之恩矣遂潰圍繆公卒得以解難勝晉獲惠公以歸此德出而福反也晉文侯問政於舅犯舅犯對曰分熟不如分腥分腥不如分地割以分民而益其爵祿是以上得地而民知富上失地而民知貧古之所謂致師而戰者其此之謂也魏吳起為將與士卒最下者同衣食卧不設席行不乘騎親裹糧與士卒分勞卒有病疽者吳起為吮之卒母聞而哭或謂其母曰子卒也而將自吮其疽何哭為母曰非然也往年吳公吮其父父戰不旋踵遂死於敵今又吮其子妾不知其死所矣是以哭之於是擊秦拔其五城後漢假熲為破羌將軍征西羌行軍仁愛士卒疾病者親自瞻省爭為裹創在邊十餘年未嘗一日蓐寢身與士卒同甘苦故皆樂為死戰後漢皇甫規為中郎將持節監討零吾等羌會軍中大疫死者十三四規親入菴廬巡視將士三軍感恱東羌遂乞降唐太宗親征髙麗駕至定州城北門親慰撫之有徒卒一人病不能起太宗自至牀前問其所苦仍勑州縣厚加供給凡在征人欣然縱有病者恱以忘疲師次白闕城將軍李思摩中弩矢太宗親為之吮血由是從行文武競思奮勵及軍回行次栁城招集戰亡人骸骨設太牢以祭之太宗慟哭盡哀軍人無不灑泣兵士觀者歸家以告其父母曰吾兒之死天子哭之死無所恨宋征河東太宗每躬擐甲胄蒙犯矢石指撝戎旅左右有諫者上曰將士爭效命於鋒鏑之下朕豈忍坐觀士卒聞者人百其勇皆冒白刃爭為先登凡控弦之士數十萬列陳於乘輿前蹲甲交射矢集於賊城上如蝟毛每給諸軍矢石數百萬必頃刻而盡捕得生口云繼元城中募市所射之箭以十錢易一隻凡得百餘萬隻聚而貯之太宗聞之笑曰此箭為我畜也及城降盡得之時又以牛革為洞屋猛士數百蒙以攻城上欲親至其中慰勞士卒彰德軍節度李漢瓊泣請曰晉陽孤壘危若纍卵諸軍用命戰士賈勇城堞之下矢石如雨陛下奈何以萬乘之尊欲親臨之若不聽臣言臣願先死上甚嘉之齊田穰苴為將閲士卒次舍井竈飲食問疾醫藥身自撫循之悉取將軍之資糧享士卒平分糧食比其羸弱者三日而後勒兵病者皆求行爭奮出為之赴戰晉師敗走漢李廣歷七郡太守前後四十餘年賞賜輒分其麾下飲食與士卒共之家無餘財終不言生産事將兵之絶處見水士卒不盡飲不近水士卒不盡餐不嘗食士卒以此愛樂為用也魏田豫為護胸奴中郎將豫清約儉素賞賜皆散之將士每胡狄私遺悉簿藏官不入家家常貧匱雖殊類咸髙豫節唐馬燧討田恱先戰燧誓軍中曰戰勝請以家財行賞既勝盡出其私財以頒將士德宗嘉之詔度支出錢五萬貫行賞還燧家財賞唐石雄為澧州刺史雄臨財甚廉每破賊立功朝廷時有賜與餘皆不入私室置於軍門首取一分餘並分給以此軍士感義皆思奮發唐程名振武德初遙授永年令率兵經略河北名振夜襲鄴俘其男女千餘人去鄴八十里閲婦女有乳汁者九十餘人悉放遣之鄴中感其仁唐朱泚之亂李晟於畿甸率聚征賦吏民樂輸守禦堅固由是軍不乏食神策軍家族多陷於泚晟家亦百口在賊中左右或有言及家者晟因泣下曰乘輿何在而敢恤家乎泚又使晟小吏王無忌之壻詣晟軍且曰公家無恙城中有書問晟曰爾敢與賊為問遽命斬之時供輸不至盛夏軍士或衣裘褐晟與同甘苦每以大義奮激士心士卒無離叛者晟既克京師勒兵屯於含元殿號令諸軍曰長安士庶多陷賊庭若小有震驚則非伐罪弔人之義也晟與公等各有家室離别數年今已成功相見非晚五日內不得輒通家信違命者斬乃遣京兆尹李齊運告諭百姓居人安堵秋毫無所犯尚可孤軍人有擅取賊馬者晟大將髙明曜虜賊女妓一人司馬胄取賊馬二匹晟皆立斬之莫敢仰視士庶無不感恱咸歔欷流涕逺方居人亦有經宿方知者齊桓公設庭燎為士之欲造見者朞年而士不至於是東野鄙人有以九九之術見者桓公曰九九何足以見乎鄙人對曰臣非以九九為足以見也臣聞主君設庭燎以待士朞年而士不至夫士之所以不至者君天下賢君也四方之士皆自以論而不及君故不至也夫九九薄能耳而君猶禮之況賢於九九乎夫泰山不辭壤石江海不逆小流所以成大也詩云先民有言詢于芻蕘言博謀也桓公曰善乃因禮之朞月四方之士相攜而並至宋吳玠素不為威儀除宣撫副使簡易如故常負手步出與軍士立語幕客請曰今大敵不逺安知無刺客萬一或有意外豈不上負朝廷下孤軍民之望哉玠謝曰誠如君言然玠意不在此國家不知玠之不肖使為宣撫玠欲不出恐軍民之寃抑而無告者為門吏所隔無由自達某所以屢出者為此也幕客乃服信晉文公圍原命三日之糧原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寶也人之所庇也得原失信何以庇之所亡滋多退一舍而原降魏明帝自征蜀至長安遣張郃領徑卒四十餘萬向劍閣諸葛亮有戰士萬二千更畨歸者八千時魏軍臨陳畨兵適交亮參佐咸以敵衆强多非力所制請留下兵以并聲勢亮曰吾聞用武行師以大信為本得原失信古人所惜去者束裝以待期妻子企踵而計日乃勑速遣於是去者感悅願留一戰住者憤躍咸思致命臨陳之日莫不拔刃爭先以一當十殺張郃却司馬懿一戰大克之由信也夫宋至道中交趾酋長黎桓不順海賊頻年剽劫朝廷加恩於桓以轉運使陳堯叟為國信使先是將命交趾者必贈遺數千緡桓所賦斂往往斷民手足堯叟召其子授以朝命却其私覿及交趾民卜文勇等先殺人亡命為奴者鎮將藏匿凡百餘人堯叟皆搜獲付之且戒之勿加酷法交趾感恩桓乃捕送海賊為謝且言已勒溪洞不得騷動春秋時晉將荀吳伐鮮虞圍鼓鼓人或請以城叛吳曰吾聞諸叔向好惡不愆人知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何若其弗賞是失信也何以庇其民力能則進不能則退量力而行吾不可以欲城而邇姦也所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而不取勤人而頓兵何以事君吳曰所以事君也獲一邑而教民怠將焉用邑邑以賈怠不如定舊賈怠無卒棄舊不祥鼓人能事其君我亦能事吾君率義不爽好惡不愆城可獲而民知義所有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而返不戮一人勇春秋時晉師伐逼陽荀偃士丐帥師攻逼陽親受矢石梁蕭衍舉兵指建康至新林楊公則自越城移屯領軍府壘北樓與南掖門相對嘗登樓望賊城中遙見麾蓋縱神鋒弩射之矢貫胡牀左右皆失色公則曰虜幾中吾足談笑如初東昏夜選勇士攻公則栅中軍驚擾公則堅卧不起徐命擊之東昏軍乃退公則所領皆湘州人素號怯懦城中輕之每出蕩輒先犯公則壘公則奬勵士卒克獲更多韋睿進討合淝堰淝水使軍主王懷靜築城於岸守之魏攻陷其城乘勝至睿隄下其勢甚盛監軍潘靈祐勸睿退還巢湖諸將又請走保三義睿怒曰寧有此耶將軍死綏有前無却因令取繖扇麾幢植之隄下示無動志睿素羸每戰未嘗騎馬以板輿自載督勵衆軍賊却城潰合淝既平髙祖詔班師去賊既近懼為所躡睿悉遣輜重在前身乘小輿殿後魏人服睿威名望之不敢逼全軍而還後魏中山王英征義陽傳永為統軍當長圍遏其南門齊將馬仙琕連營稍進欲解城圍永乃分兵士固守營壘自將馬步騎千餘南逆仙琕賊俯射永洞其左右股永出箭復入遂大破之仙琕燒營卷甲而遁英曰公傷矣且還營永曰晉漢祖捫足不欲人知雖國家一帥奈何使虜有傷帥之名遂與諸軍追之及夜而返唐崔義元為婺州刺史屬睦州女子陳碩真舉兵反遣其黨童文寶領徒四千人掩襲婺州義元將督兵拒戰時百姓訛言碩真當升天犯其兵馬者無不滅門衆皆恟懼司功參軍崔元藉言於義元曰起兵伏順猶且不成此乃妖誑豈能得久義元以為然因命元藉為先鋒義元率兵繼進至下淮戍擒其間諜二十餘人詰朝進擊身先士卒左右以揗蔽箭義元曰刺史尚欲避箭誰肯致死由是士卒戮力斬首數百級嚴漢文帝時胸奴入邊以周亞夫軍細栁營帝至軍吏被甲鋭金刃控弓弩持滿天子先驅至不得入曰軍中聞將軍令不聞天子詔帝使持節詔曰吾欲勞軍亞夫𫝊言開壁門士請車騎曰將軍約軍中不得驅馳天子按轡徐行至營中為動容式車曰真將軍也魏平冦將軍徐晃既破關羽諸軍皆集太祖按行諸營士卒咸離陳而觀獨晃營齊整將士駐陳不動太祖曰徐將軍可謂有周亞夫之風矣唐文德皇后之葬也假志𤣥與宇文士及分統士馬出肅章門太宗夜使宦官至二將軍所士及開營納使者至志𤣥閉門不納曰軍門不可夜開使者曰此有手勑志𤣥曰夜中不辨真僞竟停使者至曉太宗聞而嘆曰此真將軍也周亞夫無以加焉前漢郅都為鴈門太守胸奴素聞郅都守節舉邊為引軍去竟都死不近雁門胸奴至為偶人象都令騎騎馳射莫能中其見神如此唐李晟與李懷光同討朱泚懷光軍輒虜掠驅牛馬百姓苦之晟軍無所侵犯收復京城告諭於衆百姓安堵秋毫不犯唐長武城使髙崇文統神策軍討劉闢崇文在長武練卒五千人常若寇至及中使至卯時宣命辰時出師兵仗軍須無不備具賞漢髙帝已封大功臣三十餘人其餘爭功未得行封帝居南宫從復道望見諸將往往耦語以問張良良曰陛下起布衣以此屬共取天下今已為天子而所封皆蕭曹故人及所親愛所誅皆平生仇怨今軍吏計功以天下為不足用遍封而恐以過失及誅故相聚謀反耳帝曰為之奈何良曰取上素所不快計羣臣所共知最甚者一人先封以示羣臣則人人自堅矣於是上置酒封雍齒為什邡侯因趣丞相急定功行封羣臣皆喜曰雍齒且侯我屬無患矣漢王與韓信彭越期會擊楚至固陵不會楚擊漢軍大破之漢王謂張良曰諸侯不從奈何對曰楚兵且破未有分地其不至固宜君能與共天下可立致也今能取睢陽以北至榖城與彭越自陳以東𫝊海與齊王信信家在楚其意欲復得故邑能出捐此地以許兩人使各自為戰則楚易敗也於是發使韓信彭越皆引兵來圍羽垓下漢髙帝時陳豨反於代帝自往擊之至邯鄲喜曰豨不南據邯鄲北阻漳水吾知其無能為也上令周昌選趙壯士可令將者白見四人帝嫚罵曰豎子能為將乎四人慚皆伏地上封各千戶以將左右諫曰從入蜀漢伐楚賞未遍行今封此何功帝曰非汝所知陳豨反趙代地皆豨有吾以羽檄徴天下兵未有至者今計唯獨邯鄲中兵耳吾何愛四千戶不以慰趙子弟皆曰善及聞豨將皆故賈人乃多以金購之豨將多降春秋時鄭師伐宋將戰華元殺羊食士其御羊斟不與及戰斟曰疇昔之羊子為政今日之事我為政與入鄭師故敗宋張公詠平李順之明年復有劉旴相繼叛命公命討平之既而凱旋忽有持首級來者公曰當奔突接戰之際豈暇獲其首此必戰後斫來知復是誰殿直假倫曰如學士之言真神明當時隨倫為先鋒入賊用命者皆中傷被體何嘗獲首級公乃先録中傷之人而以持首級來者次之於是軍伍歡躍又皇祐中儂賊叛命狄青討之青臨行上言以謂古之師還以訊馘告割耳鼻則有之不聞以獲首者秦漢以來方有是事故獲一首賜爵一級因謂之首級然開爭啓幸莫此之甚故軍士爭首級以致相殺又其間多以首級為貨售於無功不戰之人非所以勸願一切寢罷如師有功則差次其勞全軍加賞無功則斟酌其罪全軍加罰庶合上下一心不専自為私計則決勝之道也從之遂大捷然則青之智識亦公之智識也後漢大將曹操每攻城破邑得靡麗之物則悉以賜有功者若勳勞宜賞則不吝萬金無功冀施分毫不與司馬懿征公孫淵既破城兵士寒凍乞𥜗或曰幸多故襦可賜之懿曰襦者官物人臣無私施不與木師征蜀諸將入辭太祖謂曰所破郡縣當傾帑藏為朕賞戰士國家所取惟土疆爾故人皆效命所至成功如席卷之易罰晉侯入曹令無入僖負羈之宫而免其族報施也魏犨顛頡怒曰勞之不圖報於何有爇僖負羈氏魏犨傷於胸公欲殺之而愛其材使問且視之病將殺之魏犨束胸見使者曰以君之靈不有寧也距躍三百曲踊三百乃舍之殺顛頡狥於師晉與楚戰於城濮晉中軍風於澤亡大斾之左旃祁瞞奸命司馬殺之以徇於諸侯使茅䒫代之師還濟河舟之僑先歸士會攝右振旅凱以入於晉獻俘授馘飲至大賞徴會討二殺舟之僑以徇於國民於是大服君子謂文公其能刑矣三罪而人服趙宣子言韓獻子於晉靈公以為司馬河曲之役趙孟使人以其乘車于行獻子執而戮之衆咸曰韓厥必不沒矣其主朝升之而暮戮其車其誰安之宣子召而禮之曰吾聞事君者比而不黨夫周以舉義比也舉以其私黨也夫軍事無犯犯而不隱義也吾言汝於君懼汝不能也舉而不能黨孰大焉事君以黨吾何以從政吾故以是觀汝汝勉之茍從是行也長臨晉國者非汝其誰皆告諸大夫曰二三子可以賀我矣吾舉厥也而中吾乃今知免於罪矣晉侯之弟楊干亂行於曲梁魏綘戮其僕晉侯怒謂羊舌赤曰合諸侯以為榮也楊干為戮何辱如之必殺魏綘無失也對曰綘無二志事君不避難有罪不逃刑其將來辭何辱命焉言終魏綘至授僕人書將伏劍士魴張老止之讀其書曰日君乏使使臣斯司馬臣聞師衆以順為武軍事有死無犯為敬君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及楊干無所逃罪不能致訓至於用鉞臣之罪重敢有不從以怒君心請歸死於司冦公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能教訓使干大命寡人之過也子無重寡人之過敢以為請晉侯以魏綘為能以刑佐民矣反役與之禮食使佐新軍司馬穰苴田完之苖裔齊景公以為將軍捍晉燕之師苴曰臣素卑賤君擢之加大夫之上權輕願得君之寵臣以監軍乃可景公乃使莊賈往苴既辭與賈約曰日中會於軍門穰苴先馳至軍立表下漏待賈賈晚至苴曰何後期賈曰親戚送之故留穰苴曰將受命之日則忘其家臨軍約束則亡其親援桴鼓之急則亡其身今鄉國深侵君不安席百姓之命皆縣於君何為相送召軍正問曰軍法期而後到者云何對曰當斬遂斬賈以徇三軍皆震讋於是遂擊燕燕師遁遂取所亡之地而歸前漢胡建守軍正丞時監軍御史為姦穿北軍壘垣以為賈區建斬之奏曰軍法立武以威衆誅惡以禁邪今有穿軍垣以求賈利私買賣以為市無以帥先士大夫法曰壁壘已定穿窬不繇路是謂姦人姦人者殺臣昧死以聞制曰司馬法國容不入軍軍容不入國三王戒誓於軍中欲民先成其慮也建又何疑建由是顯名後漢祭遵從光武征河北舍中兒犯法遵格殺之光武怒命收之主簿陳嗣諫曰明公常欲衆軍整齊今遵奉法不避是教令所行也帝乃以為刺姦將軍謂諸將曰當避遵吾舍中兒犯法尚殺之必不私諸卿也吳將吕蒙圍關羽定南郡盡得羽將士家屬皆撫慰之約令軍中不得干厯人家有所求取蒙麾下士汝南人取民家一笠以覆官鎧官鎧雖公物蒙猶以為犯軍令不可以鄉里故而廢法遂垂涕斬之唐髙崇文憲宗初為右神策行營節度統諸鎮兵討西川劉闢至興元軍中有折逆旅之匕箸者斬以狥初闢陷東川擒節度使李康及崇文克梓州乃歸康求雪已之罪崇文以康敗軍失守斬之隋楊素為將多權略乘機赴敵應變無方然大抵馭戎嚴整有犯軍令者立斬之無所寬貸每將臨冦求人過失而斬之多者百餘人少不下十數流血盈前言笑自若及其對陳先令一二百人赴敵陷陳而還者則已如不能陷陳而還者無問多少悉斬之又令二三百人復進還如向法將士股栗有必死之心由是戰無不勝時稱名將隋契丹入冦營州韋雲起詔護突厥兵往討之啓民可汗發騎二萬受其處分雲起分為二十營四道俱引營相去各一里不得交雜聞鼓聲而行聞角聲而止自非公使不得走馬三令五申之後擊鼓而發軍中有犯約者斬紇十一人持首以狥於是突厥將帥來入謁之皆膝行股戰莫敢仰視終立功焉唐元和中王師討吳元濟賊令姚海率徑兵二萬圍豐攻城甚急王智興復擊敗之於賊壁獲姜妾智興懼軍士爭之乃曰軍中有女子安得不敗此雖無罪違軍法也即斬之以狥唐髙仙芝每出征討令封常清知留後事常清有才學果決知留後時仙芝乳母子鄭德詮為郎將威望動三軍常清出回諸將皆引前德詮自後走馬突常而去常清至使院命左右密引至㕔凡經數重門德詮既過命隨後閉之常清離席謂曰常清起自細微中丞過聽以常清為留後郎將何無禮對中使相凌因叱之曰郎將須暫死以肅軍容因令勒回杖六十面仆地拽出仙芝妻及乳母於門外號哭救之不得因以其狀上仙芝覽之驚曰已死矣及見常清遂無一言常清亦不謝於是軍中股栗唐范希朝為振武節度界上有党項室常交居蕃落之俗有長帥至必效竒騎名馬雖廉者猶曰當從俗以致其歡希朝一無所受積十四年皆保塞不敢橫暴蕃雖狗竊鼠偷必殺無赦蕃落深憚之唐朔方總管張仁願築三受降城表留年滿鎮兵以助其功時咸陽兵二百餘人逃歸仁願盡擒之斬於城下軍中股栗役者無不盡力六旬而三城俱就宋雲州觀察使郭進在石嶺關幹敏有材善聽斷以鈎距得人情御下有方略軍政嚴肅然天性喜殺士卒少有違令必置於法每有討伐皆奮不顧死多致克捷在西山太祖每遣戍卒必諭之曰汝輩當謹奉法我猶赦汝郭進殺汝矣其為將嚴肅如此宋馬知節徙知定逺軍時部民入堡卒有盜婦人首飾者護軍止笞而遣之知節曰民避外虞而來反為內冦所掠此而可恕何以肅下即斬之又敵衆犯塞民相攜入城知節與之約有盜一錢者斬俄有竊童兒錢二百者即戮之自是無敢犯者隋杜伏威聚衆自稱總管有敢死之士五千人號為上募寵之甚厚與同甘苦有攻戰輒令上募擊之及戰罷閲視有瘡在背者便斬之以其退而被擊也所獲資財皆以賞軍士及戰死者以其妾徇葬故人自為戰所向無敵唐楊師立移檄行在百官及諸道將吏士庶數陳瑄十罪自言集本道將士八州壇丁共十五萬人長驅問罪詔削師立官爵以髙仁厚為東川留後將兵五千討之以西川押牙楊茂言為行軍副使賊黨鄭君雄張士安堅壁不出髙仁厚曰攻之則彼利我傷圍之則彼困我逸遂列十二寨圍之夜二鼓君雄等出徑兵掩擊城北副使寨楊茂言不能御帥衆棄寨走其旁數寨見副使走亦走東川人併兵南攻中軍仁厚聞之大開寨門設炬火照之自帥士卒為兩翼伏道左右賊至見門開不敢入還去仁厚發伏兵擊之東川兵大奔追至城下蹙之壕中斬獲甚衆而還仁厚念諸棄寨走者明旦所當誅殺甚多乃密召孔目官張韶諭之曰爾速遣步探子將數十人分道追走者自以爾意諭之曰僕射幸不出寨皆不知汝曹速歸來旦牙參如常勿憂也韶素名長者衆信之至四鼓皆還寨惟楊茂言走至張把乃追及之仁厚聞諸寨漏鼓如故喜曰悉歸矣詰旦諸將牙集以為仁厚誠不知也坐良久仁厚謂茂言曰昨夜聞副使身先士卒走至張把有諸對曰昨夜聞賊攻中軍左右言僕射已去遂策馬參隨既而審其詐復還寨中曰仁厚與副使俱受命於天子將兵討賊若仁厚先走副使當叱下馬行軍法代總軍事然後奏聞今副使既先走又為欺罔理當何如茂言拱手曰當死仁厚曰然命左右扶下斬之諸將股栗仁厚乃召昨夜所獲俘虜數十人釋縛縱歸君雄等聞之懼曰彼軍法嚴整如是自今兵不可復出矣中和四年仁厚圍梓州久不下乃為書射城中遺將士曰仁厚不忍城中玉石俱焚為諸君緩師十日使諸君自成其功若十日不送師立首當分見兵為五番番分晝夜以攻之於此甚逸於彼必困矣五日不下四面俱進克之必矣諸君圖之數日君雄大呼於衆曰天子所誅者元惡耳他人無預也衆呼萬嵗大譟突入府中師立自殺宋狄青征儂智髙有因貴近求從青行者青延見謂之曰君欲從青此青之所求也何必因人之言乎然智髙小冦至遣青行可以知事急矣從青之士能擊賊有功朝廷有厚賞青不敢不為之請也若往而不能擊賊軍中法重青不敢私也君其思之願行則即奏取君矣非獨君也君之親戚交遊之士幸皆以此言告之茍欲行者皆青之所求也於是聞者大駭無復敢言求從青行者其所辟取皆青之素所知以為可用者人望固已歸矣及行率衆日不過一驛所至州輒休士一日至潭州遂立行伍明約束軍行止皆成行列至於荷鍤贏糧持守禦之備皆有區處軍人有奪逆旅菜一把者斬之以狥於是一軍肅然無敢出聲氣萬餘人行未嘗聞聲青每止郵驛四面嚴兵每門皆諸司使二人無人得妄出入求見青者無不即時得通其野宿皆成營柵青所居四面陳兵彀弓弩皆數重所將精鋭列布左右守衛甚嚴宋嶽飛征羣盜過廬陵託宿㕓市質明為主人汛掃門宇洗滌盆盎而去郡守供帳餞别于郊師行將絶謁未得通問大將軍何在殿者云已雜偏禆去矣其嚴肅如此五危齊上將單率師將攻狄魯仲連子曰將軍攻狄必不能下矣單曰吾以破亡餘卒破萬乘之燕今攻狄而不能下何也上車不謝而去遂攻狄三月不克齊嬰兒謡曰大冠若箕修劒柱頥攻狄不能下壘枯丘單乃懼問魯連子對曰將軍在即墨之時坐則織箕立則杖鍤為士卒倡當此之時將軍有死之心而士卒無生之氣聞是言莫不掩泣奮臂而欲戰此所以破燕也當今將軍東有掖邑之封西有淄上之寶足以樂生而惡死此之所以不勝也田單明日結髮勵氣立於矢石之間引枹而鼓之狄人乃下廉潔可辱田文既死公叔為相尚魏公主而害吳起公叔之僕曰起易去也公叔曰奈何其僕曰吳起為人節廉而自喜名也君因先與武侯言曰夫吳起賢人也而侯之國小又與强秦壤界臣竊恐起之無留心也武侯即曰奈何君因謂武侯曰試延以公主起有留心則必受之無留心則必辭矣以此卜之君因召吳起而與歸即令公主怒而輕君吳起見公主之賤君也則必辭於是吳起見公主之賤魏相果辭魏武侯武侯疑之而弗信也吳起懼得罪遂去必死可殺晉襄公以狼瞫為右箕之役先軫黜之瞫怒其友曰盍死之瞫曰吾未獲死所其友曰吾與汝為難瞫曰周志有之勇則害上不登於明堂死而不義非勇也子姑待之及彭衙之役既陳以其屬馳秦師死焉晉師從之大敗秦師必生晉將劉毅泝江造桓𤣥戰於崢嶸洲時官軍止數千𤣥兵甚盛而𤣥懼有敗衄常漾輕舸於船側故其衆莫有鬭志官軍乘風縱火鋭進爭先𤣥衆大潰必死宋馬知節平劍州還及三泉詔與王繼恩討賊繼恩負勢自任惡知節不附已遣守彭州配以羸兵三百彭之舊卒悉召還成都知節纍乞師繼恩不之聽賊十萬衆攻城知節率兵力戰自寅至申衆寡不敵士多死者逮暮退守州廨慨然歎曰死賊手非壯夫也即橫槊潰圍而出休於郊外黎明救兵至遂鼓譟以入賊黨敗去廉潔項羽圍漢王於滎陽漢王患之請割滎陽以西以和項王不聽漢王謂陳平曰天下紛紛何時定乎平曰項王為人恭敬愛人士之亷節好禮者多歸之至於行賞功爵邑重之士亦以此不附今大王嫚人少禮士廉節者不來然大王能饒人以爵邑士之頑頓嗜利無恥者亦多歸漢誠各去兩短集兩長天下指麾則定矣愛民可擊春秋時宋襄公及楚人戰于泓宋人既成列楚人未既濟司馬子魚曰彼衆我寡及其未濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列子魚曰君未知戰勍敵之人隘而不列天贊我也阻而鼓之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耉獲則取之何有於二毛明恥教戰求殺敵也傷未及死如何弗重若愛重傷則如弗傷愛其二毛則如服焉三軍以利用也金鼓以聲氣也利而用之阻隘可也聲盛致志鼓儳可也二十二年夏五月宋襄公卒傷於泓故也曹操擊劉備於汝南備奔劉表表聞至自出郊迎以上賔禮待之益其兵屯新野備在荆州數年表卒操軍至新野表子琮遂舉州降以節迎操操遂進兵時劉備屯樊琮不敢告備備久之乃覺遣使問琮琮令人詣備宣㫖時曹操已在宛備乃大驚駭呼部曲共議或勸備攻琮荆州可得備曰劉荆州臨亡託我以孤遺背信自濟吾所不為死何面目以見劉荆州乎備將衆去襄陽駐馬呼琮琮懼不能起琮左右及荆州人多歸備備過祀表墓涕泣而去比到當陽衆十萬餘輜重數千兩日行十餘里别遣關羽乘船數百艘使會江陵或謂備曰宜速行保江陵今雖擁大衆披甲者少若曹公兵至何以拒之備曰夫濟大事必以人為本今人歸吾吾何忍去操以江陵有軍食恐劉備據之乃釋輜重輕車到襄陽聞備已過操將精騎五千急追之一日一夜行三百餘里及於當陽之長坂備棄妻子與諸葛亮張飛趙雲等數十騎走操大獲其人衆輜重忿速可侮漢王使盧綰劉賈渡白馬津入楚地佐彭越共擊破楚軍燒其積聚攻下梁地十餘城羽聞之謂大司馬曹咎曰謹守成臯即漢欲挑戰慎毋與戰勿令得東而已我十五日必定梁地復從將軍於是引兵東至睢陽聞之皆爭下漢果數挑楚軍戰楚軍不出使人辱之五六日大司馬怒渡兵汜水卒半渡漢擊大破之盡得楚國金玉貨賂大司馬咎等皆自剄汜水上司馬懿拒諸葛亮於渭南時朝廷以亮僑軍逺攻利在急戰每命懿持重以候其變亮數挑戰懿不出因遺懿巾幗婦人之飾懿怒表請決戰天子不許乃遣骨鯁臣衛尉辛毗杖節為軍師以制之後亮復來挑戰懿將出兵以應之毗杖節立軍門懿乃止初蜀將姜維聞毗來謂亮曰辛毗杖節而至賊不復出矣亮曰彼本無戰心所以固請者以示武於其衆耳將在軍君命有所不受茍能制吾豈千里而請戰耶貪南宋王𤣥謨為寧逺將軍北征將士多離恐元謨又營貨利一匹布責人八百利以此倍失人心及魏大武軍至乃奔退麾下散亡略盡前秦苻堅遣王猛伐前燕慕容暐師次潞川燕將慕容評率兵十萬禦之以持久制之猛乃遣其將郭度率騎五千夜從間道起火於髙山因燒評輜重火見鄴中評性貪鄙障固山川賣樵鬻水積錢絹如丘陵三軍莫有鬭志因而大敗闕張燕為巴西太守時泰州人鄧定等二千餘家饑餓流入漢中保於成固漸為抄盜州刺史遣燕討之定窘急僞乞降於燕并餽燕金銀燕喜為之緩師定密結李雄遣衆救之燕退定遂進逼漢中燕棄官而遁唐王佖為靈鹽節度使先是吐蕃欲成烏蘭橋每於河壖先貯材木朔方節度使每遣人潛載之委於急流終莫能成蕃人知佖貪而無謀先後遺之然後并役成橋仍築月城圍守之自是朔方禦冦不暇由佖黷貨邊上至今患焉驕春秋時晉侯將伐虢大夫士蒍曰不可虢公驕若驟得勝於我必棄其民無衆而後伐之欲禦我誰與夫禮樂慈愛戰所蓄也夫人讓事樂和愛親哀喪而後可用也虢勿蓄也亟戰將饑後為晉所滅秦末項梁起兵吳中北至定陶再破秦軍項羽等又斬秦三川守李由益輕秦有驕色宋義諫曰戰勝而將驕卒隋者敗今卒少惰矣秦兵日益臣為君畏之梁不聽乃使宋義於齊路逢髙陵君曰公將見項梁乎曰然義曰臣論武信君軍必敗公徐行即免死疾行則及禍秦果悉起兵益章邯擊梁大破之定陶梁敗而死隋末翟讓李密起兵於河南滎陽軍通守張須陀以兵攻讓讓數為須陀所敗聞其來大懼將逺避之密曰須陀勇而無謀兵又驟勝驕狠可一戰而擒之公但列陳以待保為公敗之讓不得已勒兵將戰密分兵千餘人於林木間詐與戰不利軍稍却密發伏自後掩之讓合擊須陀衆大敗遂斬須陀春秋時楚屈瑕伐羅鬭伯比送之還謂其御曰莫敖必敗舉趾髙心不固矣遂見楚子曰必濟師楚子辭焉入告夫人鄧曼鄧曼曰大夫其非衆之謂其謂君撫小民以信訓諸司以德而威莫敖以刑也莫敖狃於蒲騷之役將自用也必小羅君不鎮撫其不設備乎楚子使賴人追之不及莫敖使徇于師曰諫者有刑及鄢亂次以濟且不設備及羅羅與盧戎兩軍之大敗之莫敖縊於荒谷晉陶侃為荆州刺史鎮武昌時新破杜韜乘勝擊杜曽有輕曽之色侃司馬魯恬言於侃曰古人戰爭先料其將今使君諸將無及曽者未易可逼也侃不從進軍圍之軍石城時曽軍多騎而侃兵無馬曽密開門出侃陳後反擊其背侃師遂敗投水死者數百人西秦乞伏益州乾歸之弟也時天水姜乳襲據上邽遣益州討之邊芮王松夀言於乾歸曰益州以懿弟之親屢有戰功狃於纍勝常有驕色若其遇冦必將易之未宜専任乾歸曰益州驍勇善御衆諸將莫及之但恐其専擅耳若輔之以重臣當無慮也於是以韋䖍為長史至大寒嶺益州恃勝自矜不為部陳令將士解甲游畋縱飲令曰敢言軍事者斬䖍諫不聽乳率衆拒戰益州果敗乾歸曰孤違蹇叔以至於此將士何為孤之罪也皆赦之後周賀若惇為驃騎將軍陳將侯瑱等圍逼湘州遏絶糧援乃令惇率步兵六千渡江赴救瑱等以惇孤軍深入欲窺取之每設竒伏連戰破瑱乘勝徑進遂次湘州因此輕敵不以為虞俄而霖雨不已秋水泛溢陳人濟師江路遂斷而敗前秦苻堅議伐晉石越曰吳人國有長江之險朝無昏二之釁臣愚以為利用修德未宜動師堅曰以吾之衆旅投鞭於江足斷其流遂興師苻融攻陷夀春乃馳使白堅曰賊少易俘但懼其越逸宜速進衆軍犄角擒賊帥必矣堅大恱恐謝石等遁去乃捨大軍于項城以輕騎八千兼道赴之遂為謝𤣥所敗春秋時吳子諸樊伐楚門於巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆且少安從之吳子門焉牛臣隱於短墻以射之卒隋焬帝征吐谷渾至覆轅川時吐谷渾主與數騎而遁其名王詐為渾主保車師我真山帝令將張定和率師擊之定和既與賊遇輕其衆少呼之命降賊不肯下定和不披甲持挺登山賊伏兵於嵒石之下發矢中之而斃唐趙景慈領行軍總管與獨孤懷恩擊蒲州時堯君素兵鋒甚鋭前後遣將皆不能克景慈謂將士曰君素小盜何足經營但諸君不武耳因將兵至城下君素出甲拒之景慈躍馬突進從者十餘人直趨南門斷賊歸路遂入其壕內賊於地道中出兵掩之懷恩不能救諸軍皆走景慈被傷墮馬為賊所執唐郭孝恪為安西都護阿史那社爾既擒龜茲王孝恪守之龜茲相那利潛引西突厥之衆并其國兵萬餘人來襲孝恪時營於城外有龜茲人來謂孝恪曰那利我之國相人心素歸今亡在野必思為變城中之人頗有異志公其備之孝恪不以為意那利率兵奄至孝恪始覺乃領部下千餘人將入城而那利之徒已登城中城中降胡與那利表裏夾擊孝恪自為前鋒力戰而入既失部分則為胡賊之所蹂躪流矢及鉞斧亂下孝恪旋顧所部猶有數十人隨之孝恪復將出城既至西門為胡冦所殺唐程千里有勇力為上黨郡長史天寶中賊將蔡希德數以騎挑戰千里開城門獨將麾下百餘騎逐希德欲生得之渡橋橋壞墜坑中為賊所執唐李仁矩昭宗時為閬州節度董璋反率凶黨以攻其城仁矩召軍校謀守戰利􅊣皆曰璋久圖反計以賂誘士心凶氣方盛未可與戰宜堅壁以老之儻浹旬之間大軍東至賊必自退仁矩曰蜀兵懦安能當我精甲即驅之出戰兵未交為賊所敗既而城陷矩被擒將自表異春秋時狄人伐衛戰于熒澤衛師敗績衛侯不去其旗是以甚敗遂滅衛東晉末桓𤣥篡晉劉裕起義師討之𤣥敗泝流奔荆州劉其將何淡之守湓口劉裕將何無忌等次桑落洲淡之等率軍求戰淡之常所乘舫旌旗甚盛無忌謂諸將曰賊帥必不居此欲詐我耳宜亟攻之衆曰淡之不在其中縱得無益無忌曰今衆寡不敵戰無全勝淡之雖不居此舫取之則獲因縱兵攻之可一鼓而敗也遂進攻獲舫因𫝊呼曰得何淡之矣賊中驚擾無忌之衆亦謂然因乘勝繼進無忌鼓譟赴之淡之遂潰隋末楊𤣥感反攻東都刑部尚書衛𤣥與𤣥感戰兵始會𤣥感詐令人大呼曰官軍已得𤣥感矣官軍稍怠𤣥感以數千騎乘之𤣥兵於是大潰宋晉安王子勛舉兵潯陽宋將殷孝祖討之時賊據赭圻孝祖將進與賊合戰常以鼓蓋自隨軍中相謂曰殷統軍死矣今與賊交鋒而以羽儀自標異若善射者十人共射之欲不斃得乎是日於陳為矢所中而死東魏大將髙歡與西魏大將宇文泰戰邙山其時泰見歡旗鼓識之乃募敢勇三千人令賀拔勝總之以犯其軍適與歡相遇時募士皆用短兵接戰乘勝逐數十里刃垂及之會勝馬為流矢所中死比副騎至歡已逸去矣北齊髙敖曹攻後周將獨孤信於金墉城宇文泰率衆救之戰於邙山敖曹心輕敵建旗蓋以凌陳周人盡鋭擊之一軍皆沒敖曹輕騎走河陽城仰呼求繩不得拔刃剜門未徹而追至敖曹奮頭詬曰來吾與汝開國公追者斬之唐朱泚之亂李懷光自河北赴難李晟每將合戰必自表異錦衣繡帽前行親自指導懷光望見惡之乃謂晟曰將帥當持重豈宜自表飾以啖賊也晟曰晟久在涇原軍士頗相畏服故欲令先識以奪其心耳懷光益不恱後周河橋之戰王思政下馬用長矟左右橫擊一擊踣數人時陷陳既深從者死盡思政被重創悶絶會日暮敵亦收軍思政久經軍旅每戰惟著破衣敝甲敵人疑非將帥故得免有帳下督雷五安於戰處哭求思政會已蘇遂相持乃割衣裹創扶思政上馬夜久方得還軍軍政不一春秋時楚伐鄭晉師救鄭荀林父將中軍先縠佐之士會將上軍郤克佐之趙朔將下軍欒書佐之趙括趙嬰齊為中軍大夫鞏朔韓穿為上軍大夫荀首趙同為下軍大夫韓厥為司馬及河聞鄭既及楚平桓子欲還曰無及於鄭而勦民焉用之楚歸而動不後隨武子曰善先縠曰不可晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失霸不如死我弗為也以中軍佐濟韓獻子謂桓子曰彘子以偏師陷子罪已甚不如進也事之不捷惡有所分與其専罪六人同之不猶愈乎晉師濟河楚子欲還伍參言於楚子曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者専行不獲聽而無上衆誰適從此行也晉必敗楚少宰如晉師曰寡君少遭閔凶不能文聞二先君之出入此行也將鄭是訓定豈敢求罪於晉二三子無淹久隨季對曰昔平王東遷命我先君文侯曰與鄭夾輔周室毋廢王命今鄭不率寡君使羣臣問諸鄭豈敢辱候人敢拜君命之辱先縠以為諂使趙括從而更之曰行人失辭寡君使羣臣遷大國之迹於鄭曰無辟敵羣臣無所逃命晉魏錡求公族未得而怒欲敗晉師請致師不許請使許之遂往請戰而還趙旃求卿未得請挑戰弗許請召盟許之與魏錡皆命而往郤克曰二憾往矣不如備之楚之無惡除備而盟何損於好若以惡來有備不敗且雖諸侯相見軍衛不徹警也先縠不可隨會使鞏朔韓穿帥七覆于敖前故上軍不敗而中軍下軍皆敗績吳師伐楚州來楚救之吳人禦諸鍾離楚將子瑕卒楚師􅑒吳將公子光曰諸侯從於楚者衆而皆小國也畏楚而不獲已是以來吾聞之曰作事威克其愛雖小必濟胡沈之君幼而狂陳大夫囓壯而頑頓與許蔡疾楚政楚令尹死其師􅑒薳越為帥賤而多寵政令不一七國同役而不同心帥賤而不能整無大威命楚可敗也先分師以犯胡沈與陳必先奔諸侯之師乃搖心矣諸侯乖亂楚必大奔請先者去備薄威後者敦陳整旅吳子從之戰于雞父吳子以罪人三千先犯胡沈與陳三國爭之吳為三軍以繫于後中軍從王先帥右軍掩餘帥左軍吳之罪人或奔或止三國亂吳師擊之敗獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頗曰吾君死矣師譟而從之三國奔楚師大潰後漢曹操征馬超韓遂於關中始賊每一部到輒有喜色賊破之後諸將問其故答曰關中長逺若賊各依險阻征之不一二年不可定也今皆來集其衆雖多莫相歸服軍無適主一舉可滅為功差易吾是以喜也唐初劉黑闥引突厥冦河北淮陽王道𤣥授山東道行軍總管師次下博與賊軍遇道𤣥帥騎先登命副將史萬寶督軍繼進萬寶與之不協及道𤣥深入而擁兵不進謂所親曰吾奉手詔言淮陽小兒雖名為將而軍之進止皆委於吾今其輕鋭越泥濘交戰而軍若動必陷泥溺莫如結陳以待之雖不利於王而利於國道𤣥遂為賊所擒唐左衛大將軍程知節征賀魯蘇定方為前軍總管至鷹娑川突厥引二萬騎來拒總管蘇海政與戰互有前却既而突厥别部鼠尼施等又領三萬餘騎續至蘇定方正歇馬隔一小嶺去知節十許里望見塵起率五百騎馳往擊之賊衆大潰追奔二十里殺千五百餘人獲馬二千匹死馬及所棄甲仗綿亘山野不可勝計副大總管王文度害其功謂知節曰雖云破賊官軍亦有死傷蓋決成敗法耳何為此事自今正今可結為方陳輕重並納腹中四布隊人馬披甲賊來即戰自保萬全無為輕脫致有傷損又矯稱别奉聖㫖以知節恃勇輕敵使文度為其節制遂收軍不許深入終日跨馬披甲結陳由是馬多瘦死士卒疲勞無有鬭志定方謂知節曰本來討賊今乃坐守馬餓兵疲逢賊即敗怯懦如此公為大將閫外之事不許自専别遣軍副専其號令理必不然須囚繫文度飛表奏之知節不從至恆篤城有胡降附文度又曰比我兵回彼還作賊不如盡殺取其資財定方曰如此則自作賊耳何名伐叛文度不從師還竟無功文度坐處死練士唐李抱真領昭義軍留後密揣山東當有變上黨且當兵衝是時乘戰鬭之後土瘠賦重人民益貧困無以養軍乃籍戶丁男三選其一有材力者免其租徭給弓矢令之曰農之隙則分曹角射嵗終吾當會試及期案簿而試之以示賞罰復命之如初比三年皆善射抱真曰軍可用矣於是舉部內之鄉丁得成卒二萬不仰衣食於官府而倉庫益實乃繕甲兵為戰具遂雄視山東天下稱昭義步軍冠諸軍絶技梁大同初魏軍復圍南鄭杜嶷帥二百人與魏前鋒戰流矢中其目失馬敵人交矟將至嶷斬其一騎而上馳以歸嶷膂力絶人便馬善射一日中戰七八合所佩霜明朱弓四石每出殺傷數百人敵人憚之號為杜彪唐尉遲敬德善解避矟每戰單騎入賊陳賊矟攢刺終不能傷又能奪賊矟還以刺之出入重圍往返無礙齊王元吉亦善馬矟聞而輕之欲親自試命去矟刃以竿相刺敬德曰縱留刃終不能傷請勿除之敬德矟謹當却刃元吉竟不能中太宗問曰奪矟避矟何者難易對曰奪矟難乃令敬德奪元吉矟元吉執矟躍馬志在刺之敬德俄頃三奪其矟元吉素驍勇雖相歎異甚以為恥王世充領步騎數萬來戰世充驍將單雄信領騎直赴太宗敬德躍馬大呼橫刺雄信墜馬賊徒稍却敬德翼太宗以出賊圍哥舒翰有家奴曰左車年十五六有膂力翰善使槍每追賊及之以槍搭其背而喝之賊驚顧翰從而刺其㗋皆剔髙三五尺而墮無不死者左車輒下馬斬首率以為常唐史敬奉形甚短小若不能勝衣至於野外馳逐能擒奔馬自執鞍勒隨鞍躍上然後羈帶矛矢在手前無强敵僮使僅二百人每以自隨臨入敵輒分其隊為四五隨逐水草每數日各相遇已而皆有獲虜王敬蕘魁傑沈勇多力善戰所用槍矢皆以純鐵煆就槍重三十餘斤摧鋒破陳率以此勝宋太宗幸太原城西督諸將麾兵發機石攻城初帝選諸軍勇士數百人教以劍舞皆能擲劍空中躍其身左右承之妙絶無比見者無不恐懼會北戎遣使修貢賜宴便殿因出劍士示之袒裼鼓譟揮刃而入跳擲承接霜鋒雪刃飛舞滿空戎使見之懼形于色及是每巡城耀武必令劍舞前導各呈其技賊衆乘城望之破膽後周韓果性强記兼有權略善伺敵虛實揣知情狀有潛匿溪谷欲為間隙者果登髙望之所疑處往必有獲宇文泰由是以果為虞候都督每從征行常領候騎晝夜巡察略不眠寢從破稽胡於北山胡地險阻人迹罕至果進兵窮討散其種落稽胡憚果徑勇趫捷號為著趐人激唐安祿山反常山郡盡為賊傷死人蔽野大將李光弼帥本鎮兵來援親酹其尸而哭之為賊幽閉者出之誓平冦難以慰其心衆遂感動唐李訴授魏博節度時幽鎮復亂田𢎞正遇害訴聞之素服以令三軍曰魏人所以富庶而能通聖化者由田公也天子以其仁愛使治鎮州且田公出於魏撫師七年一日鎮州不道敢兹殘害以魏無人也若父兄子弟受田公恩者其何以報衆皆大哭願效用焉後燕慕容垂遣其子寶步騎七萬伐後魏戰於參合陂大敗寶以數千騎奔免士衆還者十一二寶恨參合之敗屢言魏有可乘之機垂由是自率大衆伐魏參合陂見往年戰處積骸如山設弔祭之禮死者父兄一時號哭軍中皆慟垂慚憤嘔血因而寢疾却還道卒唐聖厯中吐蕃大將麴莽布支率騎數萬冦凉州入自洪源谷將圍昌松縣唐休璟以數千人往擊之臨陳登髙望見賊衣甲鮮盛恐其衆懼因謂麾下曰自欽陵死贊婆降麴莽布支新將賊兵欲耀威武故其國中貴臣酋豪子弟皆從之人馬雖精不習戰事吾為諸軍取之乃披甲先登與賊六戰六克大破之斬其副將二人首二千五百級築京觀而還晉王存勗舉兵擊梁救趙進軍柏鄉五里遣周德威先以胡騎進薄梁營將韓勍等精兵三萬鎧甲皆被繒綺金銀炫耀晉人望之懼形於色德威謂李存璋曰賊志在不戰欲以甲兵耀威耳乃遣存璋諭諸軍曰爾見此賊軍否是汴州天武健兒皆屠沽傭販虛有其表徒被精甲十不當一擒獲足以為貨德威自率精騎擊其兩偏左馳右決出沒數四是日獲百餘人賊遂渡河而退後漢度尚為荆州刺史討桂陽賊渠帥卜陽潘鴻等從入山谷尚數追數百里遂入南海破其三屯多獲珍寶而陽鴻等黨衆猶盛尚欲攻之而士卒驕富莫有鬭心尚計緩之則不戰逼之必逃亡乃宣言卜陽潘鴻作賊十年習於攻守今兵寡少未易可進當須諸郡所發悉至乃并力攻之申令軍中恣聽射獵兵士喜恱大小皆相與從禽尚乃密使所親客潛焚其營珍積皆盡獵者來還莫不涕泣尚人人慰勞深自咎責因曰卜陽等財寶足富數代諸卿但不併力耳所亡小小何足介意衆聞咸憤躍尚乃令秣馬蓐食明晨徑赴賊屯陽鴻自以深固不復設備吏士乘鋭大破平之宋紹興六年韓世忠以武寧等軍節度使置司楚州世忠披草萊立軍府與士卒同力役夫人梁氏親織薄為幄將士有怯戰者世忠遺以巾幗設樂大宴俾婦人粧以恥之故人人奮勵撫集流散通商惠工楚州遂為重鎮秦將王翦率兵六十萬擊楚楚王悉國中兵以拒之王翦至堅壁而守之不肯戰楚兵數出挑戰終不出王翦日休士洗沐而善飲食拊循之親與士卒同食久之王翦使人問軍中戲乎對曰方投石超距於是王翦曰士卒可用矣楚又數挑戰而秦不出乃引而東翦因舉兵追之令壯士擊大破楚軍蘄南因而滅其國後漢將吳漢率兵圍蘇茂於廣樂劉永將周建來救漢將輕騎迎戰不利墮馬傷膝還營諸將謂漢曰大敵在前而公傷卧衆心懼矣漢乃勃然裹瘡而起椎牛饗士令軍中曰賊衆雖多皆劫掠羣盜勝不相讓敗不相救非有杖節死義者也今日封侯之秋諸君勉之於是軍士激怒人倍其氣明日建茂出兵圍漢漢選四部精兵三千餘人齊鼓而進建軍大潰反還奔城漢長驅追擊大破之前秦苻堅將王猛討前燕慕容暐暐遣將慕容評屯於潞川以拒之猛與評相持遣裨將郭慶之以鋭卒五千夜從間道出評營後傍山起火燒其輜重暐懼遣使讓催之速戰猛知評賣水鬻薪有可乘之隙評又求戰乃陳於潞原而誓衆曰今與諸軍深入賊地宜各自勉不可退也願戮力行間以報恩顧受爵明君之前慶觴父母之室不亦美乎衆皆勇奮破釡棄糧大呼競進猛覩評之衆惡之謂鄧羌曰今日之事非將軍莫可以捷將軍其勉之羌曰若以思𨽻見與者公無以為憂猛曰此非吾之所及必以本郡太守萬戶侯相處羌不恱而退俄而兵交猛若之羌寢而不應猛馳就許之羌於是大飲帳中與張蚝徐成等跨馬運矛馳入評軍出入數四旁若無人搴旗斬將殺傷甚衆戰及日中大敗評衆俘斬五萬戰國燕將騎劫攻齊即墨齊將田單拒守妄宣言曰吾惟懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中人見齊諸降者盡劓皆怒堅守惟恐見得田單又縱反間曰吾懼燕人掘吾城外冢墓戮先人可為寒心燕軍盡掘壠墓燒死人即墨人從城上遙見皆涕泣共欲出戰怒皆十倍大敗燕師後漢班超使西域至鄯善王廣奉超禮敬甚備後忽更疏懈超謂其官屬曰寧覺廣禮意薄乎此必有北虜使來狐疑未知所從故也明者睹未萌況已著邪乃召侍胡詐之曰胸奴使來數日今安在乎侍胡惶恐具服其狀超乃閉侍胡悉會其吏士三十六人與共飲酒酣因激怒曰今俱在絶域欲立大功以求富貴虜使到才數日而王廣禮貌即廢如收吾屬送胸奴骸骨長為豺狼食矣官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜營使彼不知我多少必大震怖可殄盡也滅此虜功成事立矣衆曰善初夜將吏士奔虜營會大風超令十人持鼓藏虜舍後約曰見火然皆鳴鼓大呼餘人悉持兵弩夾門而伏超順風縱火前後鼓譟虜衆驚亂超手格殺三人餘衆燒死蜀龎統勸劉備襲益州牧劉璋備曰此大事不可倉卒及璋使備擊張魯乃從璋求萬兵及資寶欲以東行璋但許兵四千其餘皆給半備因激怒其衆曰吾為益州征强敵師徒勞瘁不遑寧居今積帑藏之財而吝於賞功望士卒為出死力戰其可得乎由是相與破璋十六國前秦苻堅為姚萇所殺苻丕率兵伐姚萇皆刻鋒鎧為死休字示以戰死為志每戰以長矟勾刃為方圓大陳知其厚薄從中分配故人自為戰所向無前攻心漢王既破項羽於垓下羽兵尚衆漢兵圍之而皆為楚歌楚人久苦征戰因敗思鄉遂潰蜀丞相諸葛亮率衆定南夷擒夷帥孟獲七擒七縱獲曰公天威也南人不復反矣晉大將司空劉琨守太原羣胡攻圍久未下琨計窘吹笳聲悲寥亮胡久倦征伐夜聞之愁思遂潰散後漢初冦恂征隗囂囂將髙峻守第一遣軍師皇甫文出謁恂辭禮不屈恂怒斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也推誠東晉盧循冦建鄴劉道規為荆州刺史遣將軍檀道濟等赴援朝廷至潯陽為循黨荀林所破林乘勝伐江陵聲言徐道覆已克建業而桓謙自長安入蜀譙縱以謙為荆州刺史與其天將譙道福俱冦江陵荆楚既桓氏義舊並懷異心道規乃會將士戒之曰桓謙今在近畿聞諸君頗有去就之計吾東來文武足以濟事欲去者不禁因夜開城門衆咸憚服莫有去者時雍州刺史魯宗之自襄陽來赴或謂宗之未可測道規乃單車迎之衆咸感恱乃使宗之居守委以心腹率諸將破謙斬謙及荀林初謙至枝江江陵士庶皆與謙書言城內虛實道規一皆焚燒衆乃大安江漢士庶感其焚書之恩無二志魏王羆守華州時西魏師與東魏師戰於河橋不利東魏降卒趙青雀據長安城所在莫有固志羆聞之乃大開州門召軍人謂之曰如聞天子敗績不知凶吉諸人相驚咸有異志王罷受委於此以死報恩諸人若有異圖可來見殺必恐城陷沒者亦任出城如有忠誠能與王羆同心者可共固守軍人見其誠信皆無異志宋元徽中桂陽王休範舉兵於潯陽朝廷惶駭時蕭道成與禇淵等集中書省議莫有言者道成曰昔上流謀逆皆因淹緩以敗休範必逺懲前失輕兵急下乘我無備請頓新亭以當其鋒因索筆下議餘皆注同中書舍人孫千齡與休範有密契獨曰宜依舊遣軍據梁山道成正色曰賊今已近梁山豈可得至新亭既是兵衛所欲以死報國耳乃單車白服至新亭築城壘未畢賊前軍已至道成方解衣髙卧以安衆心乃索白虎幡登西垣使寧朔將軍髙道慶等浮舸與賊水戰大破之斬休範首餘賊進至杜姥宅車騎典籖茅恬開東府納賊宫內傳新亭亦陷太后執蒼梧玉手泣曰天下事敗矣道成遣軍主陳顯達等從石頭濟淮間道自承明門入衛宫闕時休範典籖許公與詐稱休範在新亭士庶惶惑詣壘期赴休範投名者千數及至乃是道成隨得輒燒之登城北謂曰劉休範父子皆已死戮尸在南岡下觀汝等名皆已焚除勿懼也臺中遣衆軍擊平賊黨道成振旅凱入百姓緣道聚觀曰全國家者此人也唐令狐楚為河陽節度使時烏重𦙍移鎮滄景以河陽鋭卒三千人為牙兵士卒不願出鄉至中路潰散不敢歸屯於境上時楚未至聞之即疾馳赴鎮潰卒亦已至城北將大冦掠楚單車出迎諭以逆順咸令兵士弛弓釋甲用之為先驅以歸仍斬其首惡衆遂定五代李茂貞為鳳翔節度性至寬有部將符昭者人或告其謀變茂貞親至其家去爪牙熟寢經宿而還上下遂服之後漢誅王郎收文書得吏人與郎交關謗毁者數千章光武不省會諸將畢燒之曰令反側子自安隋山獠作逆以衛𤣥為資州刺史以鎮撫之𤣥既到官時獠攻圍太平鎮𤣥單騎造其營謂羣獠曰我是刺史銜天子詔安養汝等毋驚諸賊莫敢動於是說以利害渠帥感悅解兵歸服者十萬餘衆唐將丘行恭大業末聚兵有衆二萬保故郡城百姓多附之原州奴賊數萬人圍扶風郡太守竇璡堅守經數月賊中食盡野無所掠衆多離散投行恭者千餘騎行恭遣其酋渠說諸奴賊共迎義軍行恭又率五百人皆負米麥持牛酒自詣賊營奴師長揖行恭呼斬之謂其衆曰汝等並是好人何因事奴為主使天下號為奴賊衆皆俯伏曰願改事公行恭率其衆共謁太宗於渭北唐張儉前在朔州屬李靖平突厥之後有思結部落貧窮離散儉招慰安集之其不來者或居磧北既親屬分住私相往還儉並不拘貴賤但存紀綱羈縻而已及儉移任州司謂其將叛遽以奏聞朝廷議發兵進討仍起儉為使就觀動靜儉單騎推誠入其部落召諸首領布以腹心咸啓顙而至便移就代州即令校檢代州都督儉遂觀其營田每年豐熟慮其私蓄富實易生驕侈表請和糴擬充貯備蕃人喜恱邊軍大收其利唐將郭元振在涼州時西突厥首領烏質勒部落彊盛款塞通和元振就其牙帳計會軍事時天大雪元振立於帳前與烏質勒言議須㬰雪深風凍元振未嘗移足烏質勒年老不勝寒苦會罷而死其子娑葛以元振故殺其父謀勒兵攻之副使解琬知其謀勸元振夜遁元振曰吾以誠信待人何所疑懼且深在冦廷遁將安適乃安卧帳中明日親入虜帳哭之甚哀行弔贈之禮娑葛乃感其義復與元振通好郭子儀屯於涇陽僕固懷恩率蕃虜為冦子儀一軍萬餘人而雜虜圍之數重子儀使李國臣拒其東魏楚玉當其南陳回光當其西朱元琮當其北子儀率甲騎二千出沒左右前後虜見而問曰此誰也報曰郭令公也回紇驚曰令公存乎僕固懷恩言天可汗已棄四海令公亦謝世中國無主故我從其來今令公存天可汗存乎對曰皇帝萬夀無疆回紇皆曰懷恩欺我子儀又使諭之曰公等頃嵗逺涉而來萬里剪除凶逆恢復二京是時子儀與公等周旋艱難何日忘之今一旦棄舊好助一叛臣何其愚也且懷恩背主棄親於公等何有回紇曰謂令公亡矣不然何以至此令公誠存安得而見之子儀將出諸將諫曰戎狄之心不可信也請無往子儀曰虜有數十倍之衆今力固不敵且至誠感神況虜輩乎諸將曰請選鐵騎五百衛從子儀曰適足以為害也乃傳呼曰令公來虜初疑持矢待之子儀以數十騎免胄徐出而勞之曰安乎公等久同忠義又何至於是回紇皆捨兵下馬齊拜曰果吾父也子儀召其首領各飲之酒與之佳錦歡好如初唐馬燧討李懷光于長春宫懷光將徐庭光以兵六千守宫城禦備甚嚴燧度長春不下則懷光自固攻之曠日持久所傷必多乃挺身至城下呼庭光庭光素憚燧威名拜於城下燧度庭光心已屈乃徐謂之曰我來自朝廷可西面受命庭光復拜燧乃諭之曰公等皆朔方將士祿山以來首建大勳四十餘年功伐最髙奈何棄祖父之勳力背君上為滅族之計耶從吾言非止免禍富貴可圖也賊徒俱不對燧又曰爾以吾言不誠今相去不逺數步爾當射我乃披襟示之庭光感泣俯伏軍士亦泣下先一日賊焦籬堡守將尉圭以兵二千因堡降燧庭光東道既絶乃率衆出降燧以數騎徑入城處之不疑莫不畏服唐嗣曹王李臯遷湖南觀察使前使辛京杲貪殘有將王國良鎮邵州武岡縣豪富京杲以死罪加之國良危懼遂散財聚衆據縣以叛諸道同討連嵗不能下臯受命乃曰驅疲氓誅反側非所以奉聖朝事遣使遺國良書曰觀將軍非敢大逆蓋遭讒嫉將軍遇我何不速降我與將軍同為辛京杲所搆我巳蒙聖朝昭雪使我我何必持刀殺將軍耶將軍以為不然我以陳術破將軍陳以攻法屠將軍城非將軍所度也國良且憂且喜遣使請降亦未決臯即日赴縣受降中道有候騎馳告曰國良軍中有變言降是詐也臯曰非爾輩所知遂留麾下兵單騎假稱使者徑入國良壘中國良召使者入臯遂大呌軍中曰有人識曹王否只我是國良何不速降一軍愕眙不敢動適有識者走至傳呼曰是國良匍匐叩頭請罪臯執手約為兄弟盡焚攻取之具散倉庫給兵士令復農桑焉用敵人春秋時楚聲子通使於晉還如楚令尹子木與之語問晉故焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如把梓皮革自楚往也雖楚有材晉實用之今楚多淫刑其大夫逃死於四方而為之謀主以害楚國不可救療所謂不能也子儀之亂析公奔晉晉人置諸戎車之殿以為謀主繞角之役晉將遁矣析公曰楚師輕佻易震蕩也若多鼓鈞聲以夜軍之楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師於桑隧獲申麗而還鄭於是不敢南面楚失華夏則析人之為也雍子之父兄譛雍子君與大夫不善是也雍子奔晉晉人與之鄐以為謀主彭城之役晉楚遇於靡角之谷晉將遁矣雍子發命於軍曰歸老幼返孤疾二人役歸一人簡兵搜乘秣馬蓐食師陳焚次明日將戰行歸者而逸楚囚楚師宵潰晉降彭城而歸諸宋以魚石歸楚失東夷子辛死之則雍子之為也子反與子靈爭夏姬而雍害其事子靈奔晉晉人與之邢以為謀主捍禦北狄通吳於晉教吳叛楚教之乘車射御驅侵使其子狐庸為吳行人焉吳於是伐巢取駕克棘入州來楚罷於奔命至今為患則子靈之為也若敖之亂伯賁之子賁皇奔晉晉人與之苗以為謀主鄢陵之役楚晨壓晉軍而陳晉將遁矣苗賁皇曰楚師之良在其中軍王族而已若塞井夷竈成陳以當之欒范易行以誘之中行二郤必克二穆吾乃四萃於其王族必大敗之晉人從之楚師大敗王夷師􅑒子又死之鄭叛吳興楚失諸侯則苖賁皇之為也子木曰是皆然夫聲子曰今又有甚於此椒舉娶於申公子牟子牟得戾而亡君大夫謂椒舉女實遣之懼而奔鄭引領南望曰庶幾赦余亦弗圖也今在晉矣晉人將與之縣以比叔向彼若謀害楚國豈不為患子木懼言諸王益其爵祿而復之聲子使椒鳴逆之唐李訴討吳元濟初賊將吳秀琳之降訴單騎至柵下與之語親釋其縛以為衙將秀琳感恩期于效報謂訴曰若欲破賊須得李祐某無能為也祐者賊之騎將有膽略守興橋柵嘗侮易官軍去來不可備訴召其將史用誠誡之曰今祐以衆獲麥于張柴爾可以三百騎伏傍林中又使搖旗於前示將焚麥者祐素易我軍必輕而來逐爾以輕騎搏獲之用誠等如其言果擒祐而還官軍常苦祐皆請殺之訴不聽解縛而客禮之乘間常召祐及李忠義屏人而語或至夜分忠義亦降將也訴致之左右軍中多諫訴訴益寵祐始募敢死者三千人以為突將訴自教習之訴乃拜祐為散兵馬使令佩刀巡警出入帳中略無猜間李光顔節制陳許賊悉以精卒抗光顔先是訴乘其無備夜以李祐率突將三千為先鋒李忠義副之訴自帥中軍三千田進誠以後軍三千殿而行初出文成柵衆請所向訴曰東六十里正至賊境曰張柴盡殺其戍勑士少休益治鞍鎧發刃彀弓會大雨雪天晦凜風卒苦寒抱戈僵仆者道路相望其川澤險夷張柴巳東師人未蹈其境皆謂必不生還既至張柴諸將請所止訴曰入蔡州取吳元濟也諸軍咸失色監軍使哭而言曰果落李祐計中訴不聽速令進軍訴道分五百人斷洄曲路橋又分五百人斷朗山路至懸瓠城夜半雪逾甚近城有鵝鴨池訴令驚擊之以亂軍聲賊恃吳房朗山之固晏然無一人知者李祐李忠義坎墉而先登敢鋭者從之盡殺守門卒而發其關留擊柝者黎明雪亦止訴入止元濟外宅蔡吏告元濟曰城已陷矣元濟猶望董仲質來救訴乃令訪仲質家資恤之使其家人持書召仲質仲質單騎而歸訴訴以客禮待之田進誠焚子城南門元濟城上請罪進誠繩梯而下之乃檻送京師嶽飛受命招捕楊么飛所部皆西北人不習水戰飛曰兵何常顧用之何如耳先遣使招諭之賊黨黃佐曰嶽節使號令如山若與之敵萬無生理不如往降節使誠信必善遇我遂降飛表授佐武義大夫單騎按其部拊佐背曰子知逆順者果能立功封侯豈足道欲復遣子至湖中視其可乘者擒之可勸者招之如何佐感泣誓以死報時張浚以都督軍事至潭參政席益與浚語疑飛玩冦欲以聞浚曰嶽侯忠孝人也嶽有深機胡可易言益慚而止黃佐襲周倫寨殺倫擒其統制陳貴等飛上其功遷武功大夫統制任士安不稟王􅊅令軍以此無功飛鞭士安使餌賊曰三日賊不平斬汝士安宣言嶽太尉兵三十萬至矣成見止士安軍併力攻之飛設伏士安戰急伏四起擊賊走會召浚還防秋飛䄂小圖示浚浚欲待來年議之飛曰已有定畫都督能少留不八日可破賊浚曰何言之易飛曰王四廂以王師攻水冦則難飛以水冦攻水冦則易水戰我短彼長以所短攻所長所以難若因敵將用敵兵奪其手足之助離其腹心之託使孤立而後以王師乘之八日之內當俘諸酋浚許之飛遂如鼎州黃佐招楊欽來降飛喜曰楊欽驍悍既降賊腹心潰矣表授欽武義大夫禮遇甚厚乃復遣歸湖中兩日欽說余端劉詵等降飛詭罵欽曰賊不盡降何來也杖之復令入湖是夜掩賊營降其衆數萬么負固不服方浮舟湖中以輪激水其行如飛旁置撞竿官舟迎之輒碎飛伐君山木為巨筏塞諸港汊又以腐木亂草浮上流而下擇水淺處遣善罵者挑之且行且罵賊怒來追則草木壅積舟輪礙不行飛亟遣兵擊之賊奔港中為筏所拒官軍乘筏張牛革以蔽矢石舉巨木撞其舟盡壞么投水牛臯擒斬之飛入賊壘餘酋驚曰何神也俱降飛親行諸寨慰撫之縱老弱歸田籍少壯為軍果八日而賊平浚歎曰嶽侯神算也初賊恃其險曰欲犯我者除是飛來至是人以其言為䜟獲賊舟千餘鄂渚水軍為沿江之冠詔兼蘄黃制置使金撻懶在承楚欲為久駐之基哆然有吞噬江左之意劉光世知其久去國戍逺方其衆思歸而有嗟怨之聲也謂可以離間其心即命鑄三色錢以金銀銅為之其文曰招納信寶背有使押字為號獲戎人之稍解事者貸而不殺說諭彼我利害向背曲折錢以酒殽俾持錢密示儕輩有欲歸附者執錢為信而納之自是歸者不絶未幾得女直契丹渤海漢兒萬人無室家者則為之取婦給良馬器仗使出戰前後立功為最創立竒兵赤心兩軍詭道後周時尉遲迥作亂以宇文欣韋孝寬擊之迥遣子惇盛兵武涉欣擊走之進臨相州迥遣甲兵三千伏野馬岡欣以五百騎襲之斬獲略盡進至草橋迥又拒守欣以竒兵破之直趨鄴下迥背城結陳大戰官軍不利時鄴城士庶觀戰者數萬人欣謂左右曰事急矣吾當以權道破之於是射觀者走之轉相騰藉聲如雷霆欣乃𫝊呼曰賊敗矣衆復振齊力急擊之迥軍大敗齊侯執陽虎將東之陽虎願東乃囚諸西鄙盡借邑人之車鍥其軸麻約而歸之載茐靈寢於其中而逃唐髙宗遣將軍裴行儉討突厥於黑山至朔州謂其下曰用兵之道撫士貴誠制敵尚詐前日蕭嗣業糧運為突厥所掠士卒凍餒故敗今突厥必復為此謀宜有以詐之乃為糧車三百乘每車伏壯士五人各持陌刀徑弩以羸兵數百為之援且伏精兵於隘要以待之虜果至羸兵棄車散走虜驅車就水草解鞍牧馬方擬取糧壯士自車中躍出擊之虜驚走復為伏兵所邀殺獲幾盡自是糧運無敢近者後周將賀若敦率騎六千渡江取陳相州陳將侯瑱討之江路遂斷糧援既絶人懷危懼敦於是分兵抄掠以充資費恐瑱等知其糧少乃於營內聚土覆之以米因召側近村人佯有所訪問令於營外遙見遂即遣之瑱等聞以為實乃據守要險欲曠日老之敦又增修營壘造廬舍示以持久敦軍數有叛人投瑱瑱遂納之敦又别取一馬牽以趨船令船中逆以鞭鞭之如是者再三馬便畏船不上後伏兵於江岸遣人乘畏船馬以招瑱軍詐稱投附瑱便遣兵迎接競來牽馬馬既畏船不上敦發伏掩之盡殪又湘羅之人乘輕船載米粟及籠雞鴨以餉瑱軍敦患之乃僞為土人裝船伏甲士於中瑱兵見之謂餉船之至逆來爭取敦甲士出而擒之此後實有饋餉及亡命奔瑱者猶謂之設詐逆遣扞擊并不敢受相持嵗餘瑱不能制東晉將劉裕北征廣固嶺南賊將徐道覆說其帥盧循曰今日之機萬不可失既克都邑劉裕雖還無能為也循從之初道覆密欲裝舟船乃使人伐船材於南康山云將下都貨之稱力少不能得致即賤賣之價減數倍居人貪賤賣衣物而市之贑石水急出船甚難皆儲之如是者數四故船板大積而百姓勿之疑及道覆舉兵案賣劵而取之無得匿者乃并裝之旬日而辦遂舉衆冦南康廬陵豫章諸郡守將皆委任奔走梁武帝為雍州刺史日招聚驍勇以萬數因命案行城西空地將起數十間屋為止舍多伐材竹沈於檀溪積茅若山阜皆未之用中兵參軍吕僧珍獨悟其㫖因私具櫓數百張及兵起悉取檀溪材竹為船艦葺之以茅并即辦衆軍皆發諸將須櫓甚多僧珍乃出先所具每船付二張爭者乃息武帝以僧珍為輔國將軍出入卧內隋開皇中文帝大議伐陳諸將皆云大江闊逺兵不習水以此為疑若一登南岸秦兵一可當百襄邑公賀若弼獻十策其一請多造船須船既多賊必防礙更甚今南地無馬請付傍江渚州二十嵗已上老馬令飼以平陳為名賊必懼而求馬以戰密敕刺史令私賣博大船江南下濕特不宜馬不逾周年并當死盡終不為彼用陳主叔寶果大造船市馬輸船既多方覺不便而止髙熲請所博得造運諸州米貯夀陽穿大池以采蓮遊遨為名造船倣水戰仍以賀若弼為夀州總管終以此平陳權竒唐王忠嗣在朔方每至互市時即髙估馬價以誘之諸蕃聞之競來求市輒買之故蕃馬益少而漢軍益壯及在河隴又奏請朔方河東戎馬九千匹以實之其軍又壯迄於天寶末戰馬蕃息賴其用焉唐北狄薛延陀發同羅僕骨回紇等衆合二十萬渡漠屯白道川據善陽嶺以擊突厥可汗李厮摩之部思摩引其種落走朔州留精騎以拒戰薛延陀乘之及塞太宗乃令張儉李績等率兵數道擊之太宗戒之曰延陀負其兵力踰漠而來經途數千里馬已疲瘦夫用兵之道先利速進不利速退吾先勑思摩燒剃秋草延陀糧肉日盡野無所獲頃有偵者來云其馬畜囓噉林木枝皮略盡卿等犄角思摩不須前戰俟其將退一時奮擊制勝之舉也先是延陀擊沙鉢羅及阿史那社爾等皆以步戰而勝及其將來冦也先講武於國中教習步戰每五人以一人經習戰陳者使執馬而四人前戰克勝即援馬以追奔失於應接罪至於死沒其家口以賞戰人至是遂行其法突厥兵先合輒退延陀乘勝而逐之績兵拒擊而延陀弓矢俱發傷我戰馬李績乃令去馬步戰率長矟數百為隊齊奮以衝之其衆潰散副總管薛萬徹率數千騎收其執馬者其衆失馬莫知所從因擊之乃大敗吳將周瑜使甘寧據夷陵魏將曹任圍寧吕蒙往救之乃命遣三百人柴斷險道賊走可得其馬軍到夷陵即交戰所殺過半賊夜遁去行過柴道騎皆捨馬步走蒙兵追蹙擊獲馬三百匹方船載還春秋時邾人城翼將還自離姑大夫公孫鉏曰魯將禦我欲自武城還循山而南大夫徐鉏曰道下遇雨將不出是不歸也遂自離姑武城人塞其前斷其後之木而弗殊邾師過之乃推而蹶之遂取邾師劉錡順昌之戰戒甲士人帶竹筒其中實以煮豆入陳則割棄竹筒狼藉其豆於下虜馬饑聞豆香低頭食之又多為竹筒所滚腳下不得地以故士馬俱斃曰此則不得而知宋嶽飛與烏珠戰初烏珠有徑軍皆重鎧貫以韋索三人為聮號拐子馬官軍不能當是役也以萬五千騎來飛戒兵卒以麻札刀入陳勿仰視第斫馬足拐子馬相連一馬仆二馬不能行官軍奮擊遂大敗之烏珠大慟曰自海上起兵皆以此勝今已矣魏曹操軍行失道三軍皆渴公令曰前面有大梅林饒子甘酸可以解渴士卒聞之口皆出水遂及前水梁庾城為華陽太守後魏軍攻圍南郡時糧儲寡少人懷恟懼州有空倉數十所域手自封題指示將士此中粟皆滿足支二年但努力堅守衆心遂安虜退宋將宗慤征林邑徑入象浦有渠南來注浦宋師逼渠置陳林邑王傾國來逆限渠不得渡以其裝被象諸將憚之請待前後軍進然後擊慤曰不然吾已屠其堅城破其鋭衆我氣方勵彼已破膽一戰可定何疑焉慤以為外國有獅子威伏百獸乃製其形與象相禦象果驚奔衆因此潰亂慤率兵直渡渠奮擊其衆奔散遂克林邑隋將劉方率兵討林邑國其王梵志率其徒乘巨象而戰方軍不利於是掘小坑以草覆其上因以兵挑之梵志悉衆而陳方詐為奔北梵志逐之至坑所其象多陷轉相驚駭軍遂亂方縱兵奮擊大破之魏司馬懿帥師拒諸葛亮于渭南相持百餘日亮卒於軍中及軍退追之關中多蒺藜懿使軍士二千人著軟材平底木履前行蒺藜悉著履然後馬步俱進吳將賀齊討黝歙賊帥陳僕祖山等二萬人屯林歷其歷山四面壁立髙數十丈徑路厄狹不容方楯賊臨髙下石不得仰攻軍住經月將吏患之齊身出周行觀視形便隂募輕捷士為作鐵戈密於隱險賊所不備處以戈拓山為緣道道成夜令人潜上乃多懸布以授下人得上百數十人四面流布俱鳴鼓角齊勒兵待之賊夜聞鼓聲四合為大軍悉已得上驚懼惑亂不知所為守路備險者皆走還依衆大軍因是得上其中有善禁術吳師刀劍不得拔弓弩射矢皆還自向輒致不利齊曰吾聞之雄黃勝五兵還丹能威敵夫金有刃蟲有毒者皆可禁之以無刃之兵不毒之蟲彼必無能為也遂伐木為棓列陳四面羅列俱鳴鼓角勒兵待曙賊惶遽無依禁術不效遂大破而降之夷尚鬼宋狄青征儂智髙時大兵始出桂林之南道旁有一大廟人謂其神甚靈青遽為駐節而禱之因祝曰勝負無以為據乃取百錢自持之且與神約果大捷則投此期盡錢面也左右諫止儻不如意恐不免沮師青不聽萬衆方聳視已揮手條一擲則百錢盡紅矣於是舉軍歡呼聲震野青大喜顧左右取百釘來即隨錢疏密布地而釘帖之加諸青紗籠復手自封焉曰俟凱旋當謝神取錢其後破崑崙關敗智髙平雍管及師還如言取錢與幕府士大夫共視之乃兩字錢也宋种世衡居西邊党項犯邊有明珠族首領驍悍最為邊患世衡欲以計擒之聞其好擊鼓乃造一馬持戰鼓以銀裹之極華煥密使諜者陽賣之入明珠族後乃擇驍卒數百人戒之曰凡有負銀鼓隨者併力擒之一日羌酋負鼓而出遂為所擒宋周虎者據蕪湖縣邵青以舟船至蕪湖縣乃遣人與戰一日七敗參議魏曦以小舟觀戰江中既而告青曰吾知所以敗亦知所以勝矣彼以紅巾軟纒與我之號一同故與戰則不能分彼我所以必敗宜易其號則勝矣青然之乃令其衆皆作鑽風角子俄附墨而行遇戰則去其紅巾惟見鑽風角子又用墨抹槍子眼下如伶人雜劇之戲者及口吹呌一戰勝周虎無餘青遂駐于蕪湖武編後集卷一
