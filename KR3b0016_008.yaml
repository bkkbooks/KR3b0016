body:
  text: 武編後集卷二明唐順之撰息亂令狐楚為河陽節度使時烏重𦙍移鎮滄景以河陽鋭卒三千人為牙兵士卒不願出鄉至中路潰散不敢歸屯於境上時楚未至聞之即疾馳赴鎮潰卒亦已至城北將大寇掠楚單車出迎諭以逆順咸令兵士弛弓釋甲用之為先驅以歸仍斬其首惡衆遂定五代李茂真為鳯翔節度性至寬有部將符昭者人或告其謀變茂真親至其家去爪牙熟寢經宿而還上下遂服之後漢誅王郎收文書得吏人與郎交關謗毁者數千章光武不省會諸將畢燒之曰令反側子自安東晉盧循寇建業劉道規為荆州刺史遣將軍檀道濟等赴援朝廷至潯陽為循黨荀林所破林乘勝伐江陵聲言徐道覆已克建業而桓謙自長安入蜀譙縱以謙為荆州刺史與其大將譙道福俱寇江陵荆楚既桓氏義舊並懷異心道規乃會將士戒之曰桓謙今在近畿聞諸君頗有去就之計吾東來文武足以濟事欲去者不禁因夜開城門衆咸憚服莫有去者時雍州刺史魯宗之自襄陽來赴或謂宗之未可測道規乃單車迎之衆咸感悅乃使宗之居守委以心腹率諸將破斬謙及荀林初謙至枝江江陵士庶皆與謙書言城內空實道規一皆焚燒衆乃大安江漢士庶感其焚書之恩無二志西魏王羆守華州時西魏師與東魏師戰於河橋不利東魏降卒趙青雀據長安城所在莫有固志羆聞之乃大開城門召軍人謂之曰如聞天子敗績不知凶吉諸人相驚咸有異志王羆受恩於此以死報恩諸人若有異圖可來見殺必恐陷沒者亦任出城如有忠誠能與王羆同心者可共固守軍人見其誠信皆無異志宋元徽中桂陽王休範舉兵於潯陽朝廷惶駭蕭道成與褚淵等集中書省議莫有言者蕭道成曰昔上流謀逆皆因淹緩以敗休範必逺懲前失䡖兵急下乘我無備請屯新亭以當其鋒因索筆下議餘皆注同中書舍人孫千齡與休範有密契獨曰宜依舊遣軍據梁山道成正色曰賊今已近梁山豈可得至新亭既是兵衛所欲以死報國耳乃單車白服至新亭築城壘未畢賊前軍已至道成方解衣高臥以安衆心乃索白虎幡登西垣使寧朔將軍高道慶等浮舸與賊水戰大破之斬休範首餘賊進至杜姥宅車騎典籖茅恬開東府納賊宫內傳新亭亦陷太后執蒼梧王手泣曰天下事敗矣道成遣軍主陳顯逹等從石頭濟淮間道自承明門入衛宫闕時休範典籖許公與詐稱休範在新亭士庶惶惑詣壘期赴休範投名者千數及至乃是道成隨得輒燒之登城北謂曰劉休範父子皆已死戮尸在南岡下觀汝等名皆已焚除勿懼也臺中遣衆軍擊平賊黨道成振旅凱入百姓緣道聚觀曰全國家者此人也定亂曹瑋知渭州有告戍卒十餘人叛入夏國者瑋方對客奕棋不應軍吏亟白之瑋怒叱之曰吾固遣之去汝再三顯言也夏人即斬叛者投其首境上趙世隆本磁州書佐宗澤在磁以為中軍將澤既去以州事付兵馬鈐轄李侃金人圍磁州急州有禁軍有民兵民兵甚衆禁軍恐其勢盛將校郭進乃作亂世隆與進謀遂殺侃以通判趙子節權州事至是世隆與其弟世興將三千人歸澤將士頗疑之澤曰世隆吾一校耳必無他有所欣也乙卯世隆入拜澤面詰之世隆辭服澤笑曰河北陷沒而吾宋法令上下之分亦陷沒邪命引出斬之時衆兵露刃於庭世興佩刀侍側左右皆懼澤徐語世興曰汝兄犯法當誅汝能奮志立功足以雪恥世興感泣會滑州報金兵留屯城下澤謂世興曰試為我取滑州世興欣然受命世興至滑州掩敵不備急攻之斬首數百得州以歸宗澤復厚賜之時有降寇趙海者屯板橋輒塹路以阻行者管軍閭掠芻者八人過其壘海怒而臠之覘事者以告澤召之海以甲士五百自衛而入澤方對客海具伏即械之繫之獄客曰彼甲士甚衆姑徐之澤笑謂其次將曰領衆還營明日誅海於市聞者股栗統制官楊進屯城南王善者有衆二千餘皆山東游手之人先進來降屯城北二人氣不相下一日各率所部千餘相拒於天津橋都人頗恐澤以片紙諭之曰為國之心固如是耶當戰陳立功時勝負自見二人相視慙沮而退初利州都統王夔素殘悍號王夜叉恃功驕恣桀驚不受節度所至劫掠每得富家穴箕加頸四面然箕謂之蟇蝕月以弓弦繫鼻下高懸於格謂之錯繫㗋縛人兩股以木交壓謂之乾榨油以至用醋灌鼻惡水灌耳口等毒虐非一以脅取金帛稍不遂意即死其手蜀人患苦之且悉斂部將倅馬以自入將戰乃高其估賣與之朝廷雖知其不法在逺不能詰也大帥處分少不嗛其意則百計撓之使不得有所為余玠至嘉定夔帥所部兵迎謁才羸弱二百人玠曰久聞都統兵精今疲敝若此殊不稱所望夔對曰夔兵非不精所以不敢即見者恐驚從人耳頃之班聲如雷江水為沸聲止圓陳即合旗幟精明器械森然沙上之人彌望若林立無一人敢輒亂行者舟中皆戰掉失色而玠自若也徐命吏班賞有差夔退謂人曰儒者中乃有此人玠久欲誅夔獨患其握重兵居外恐輕動危蜀謀於親將楊成成曰夔在蜀久所部精兵前時大帥夔皆勢出其右意不止此也視侍郎為文臣必不肯甘心從令今縱弗誅養成其勢後一舉足西蜀危矣玠曰我欲誅之久矣獨患其黨與衆未發耳成曰侍郎以夔在蜀久有威名孰與吳氏夔固弗若也夫吳氏當中興危難之時能百戰以保蜀傳之四世恩威益張根本益固蜀人知有吳氏而不知朝廷一旦曦為畔逆誅之如取孤豚况夔無吳氏之功而有曦之逆心恃豨突之勇敢慢法度縱兵殘民奴視同列非有吳氏得人之固也今誅之一夫力耳待其發而取之難矣玠意遂決夜召䕫計事潛以成代領其衆䕫才離營而新將已單騎入矣將士皆愕眙相顧不知所為楊成以帥指譬曉之遂相率拜賀䕫至斬之成因察其所與為惡者數人稍稍以法誅之缺文漢景帝時吳楚反周亞夫將兵擊之吳楚乏糧欲退數挑戰不出夜軍中驚內相攻擊擾亂至於帳下亞夫堅臥不起頃之復定魏將張遼以荆州未定屯長社臨發軍中有謀反者夜驚亂起火一軍盡擾遼謂左右勿動是不一營盡反必有造變者欲以動亂衆人耳乃令軍中其不反者安坐遼親將兵數十人中陳而立有頃即定得首謀者並殺之宋安守忠知雄州方與寮佐宴飲有軍校謀變裹甲及門閽吏狼狽入白守忠言笑自若徐顧坐客曰此輩酒狂耳即時擒獲人頗服其量唐大厯中城涇州假秀實為留後馬璘奉詔徙鎮涇州其士衆嘗自四鎮北庭赴難中原居僑驟移頗為勞怨刀斧將王童之因人心動搖導以為亂或告其事且曰候嚴警鼓為約矣秀實乃召鼓人佯怒失節且戒曰每更籌䇿盡必來報每更輒延數刻四更畢而曉既差互亂不能作告者復曰今夜將焚草場期救火者同作亂秀實嚴警備夜半火發令於軍中曰救火者斬之童之居外營請入救火不許明日斬之王翃為河中少尹有悍將凌正者橫暴擾軍政約至夜鼓譟斬關以逐翃有告者翃縮夜漏數刻以差其期賊驚逺遁遂誅正軍城安宋師平成都綿州都校全師雄謀叛賊約以三鼓攻城禆將曹翰諜知之戒掌漏者但擊二鼓賊衆不集至明而遁我師襲破之宋檀祗為廣陵相亡命司馬國璠兄弟自北徐州界聚衆四百潛過淮因天隂暗夜率百許人緣廣陵城得入呌唤直上㕔事祗驚起出門將處分賊射之傷却入祗密語左右曰賊乘暗得入掩我不備但打五更賊懼曉必逸賊聞鼓鳴將謂曉於是奔散追討盡獲之宋太祖朝劍外初平馮瓚知梓州視事才數日僞軍校上官進嘯聚士卒三千餘衆劫村民數萬人夜攻州城瓚曰賊乘夜奄至此烏合之衆以箠梃相逹擊必無固志正可持重以鎮之待旦自潰矣衆巡城密令促其更籌未夜分擊五鼓賊悉遁去因縱兵追之擒上官進斬於市招誘餘黨得千餘人並赦其罪令復業郡境以安軍校吕翰殺武懷節據嘉州叛曹翰及諸將奪其城諜賊約三鼓復來攻翰戒知更使緩向晨猶二鼓賊衆不集而潰因而破之唐曲環鎮許州劉昌裔為營田副使有兵馬使安國寧與留後上官說不善謀反以城降蔡賊事泄昌裔密計斬之即召其麾下千餘人人賞縑二匹伏兵要諸巷令持縑者悉斬之無一人得脫東魏西荆為梁將曹義宗所圍東魏召人赴救慕容儼應募赴之時魏北涓太守宋帶劍謀叛儼乃帥騎出其不意直指城下語云大軍已到太守何不出迎帶劍惶恐不知所為便出迎儼即執之一部遂定唐高祖為山西河東道撫慰大使率兵以禦羣盜行至太平關遇賊數千人時所將兵少左右皆懼高祖謂之曰此烏合之衆易與耳因率精騎十二人出擊之所向皆靡衆情始定併力奮擊遂大破之撫降後漢更始初光武為蕭王定河北諸賊銅馬餘衆降封其渠帥為列侯降者猶不自安光武知其意敕令各歸營勒兵乃自乘輕騎案行部陳降者皆相語曰蕭王推赤心置人腹中安得不投死乎由是皆服隋綘郡賊柴保昌等有衆八萬煬帝令户部尚書樊子蓋擊之子蓋深溝高壘不敢决戰有來歸首者不問多少必坑之由是莫敢降賊徒日盛連年不能克焬帝乃令唐髙祖代之賊有來降者皆引致左右推赤心以待之人人自安願效死力其黨相謂曰我輩本無逆心徒以政令嚴酷懼死為盜耳前後首者皆為子蓋所殺窮無所歸今唐公與人無隔恩意如此我輩知不死矣遂相率歸前後至者數萬人餘賊散走他郡唐淮西既平裴度為節度招撫使蔡人大悅舊令途無偶語夜不然燭人或以酒食相過從者以軍法論度乃約法惟盜鬭殺外餘盡除之其往來者不復以晝夜為限蔡之遺黎始知有生人之樂度以蔡卒為牙兵或以為反側之徒其心未安不可自去其備度笑而答曰吾受命為帥元惡就擒蔡人即吾人也父老無不感泣後漢初河南賊張步據齊地漢將耿弇討敗之步肉袒負斧鑕於軍門弇傳步詣行在所勒兵入據其城樹十二郡旗時步衆尚十餘萬輜重七十餘兩弇令降軍各以郡人詣旗下皆罷遣軍人令歸鄉里齊地悉平後魏末河北賊葛榮為魏將爾朱榮所擒餘衆悉降榮以賊徒既衆若即分割恐其疑懼或更結聚乃下令各從所樂親屬相隨任所居止於是羣情喜悅兵即四散數十萬衆一時散盡待出百里之外乃始分道押領隨便安置咸得其宜擢其渠帥量才授用親附咸安時人服其處分機速隋山獠作逆以衛𤣥為資州刺史以鎮撫之𤣥既到官時獠攻圍太平鎮𤣥單騎造其營謂羣獠曰我是刺史銜天子詔安養汝等毋驚諸賊莫敢動於是說以利害渠帥感悅解兵歸服者十萬餘唐將丘行恭大業末聚兵有衆二萬保固郡城百姓多附之原州奴賊數萬人圍扶風郡太守竇璡堅守經數月賊中食盡野無所掠衆多離散投行恭者千餘騎行恭遣其酋渠說諸奴賊兵迎義軍行恭又率五百人皆負米麥持牛酒自詣賊營奴帥長揖行恭呼斬之謂其衆曰汝等並是好人何因事奴為主使天下號為奴賊衆皆俯伏曰願改事公行恭率其衆共謁太宗於渭橋北張儉前在朔州屬李靖平突厥之後有思結部落貧窮離散儉招慰安集之其不來者或居磧北既親屬分住私相往還儉並不拘貴賤但存紀綱羈縻而已及儉移任州司謂其將叛遽以奏聞朝廷議發兵進討仍起儉為使就觀動靜儉單馬推誠入其部落召諸首領布以腹心咸啓顙而至便移就代州即令檢校代州都督儉遂觀其營田每年豐熟慮其私蓄富實易生驕侈表請和糴擬充貯備蕃人喜悅邊軍大收其利唐將郭元振在涼州時西突厥首領烏質勒部落强盛款塞通和元振就其牙帳計會軍事時天大雪元振立於帳前與烏質勒言議須臾雪深風凍元振未嘗移足烏質勒年老不勝寒苦會罷而死其子娑葛以元振故殺其父謀勒兵攻之副使解琬知其謀勸元振夜遁元振曰吾以誠信待人何所疑懼且深在寇庭遁將安適乃安卧帳中明日親入虜帳哭之甚哀行弔贈之禮娑葛乃感其義復與元振通好郭子儀屯於涇陽僕固懷恩率蕃虜來寇子儀一軍萬餘人而雜虜圍之數重子儀使李國臣拒其東魏楚玉當其南陳回光當其西朱元琮當其北子儀率甲騎二千出沒左右前後虜見而問曰此誰也報曰郭令公也回紇驚曰令公存乎僕固懷恩言天可汗已棄四海令公亦謝世中國無主故我從其來今令公存天可汗存乎對曰皇帝萬夀無疆回紇皆曰懷恩欺我子儀又使諭之曰公等頃歲逺涉萬里剪除凶逆恢復二京是時子儀與公等周旋艱難何日忘之今一旦棄舊好助一叛臣何其愚也且懷恩背主棄親於公等何有回紇曰謂令公亡矣不然何以至此令公誠存安得而見之子儀將出諸將諫曰戎狄之心不可信也請無往子儀曰虜有四十倍之衆今力固不敵且至誠感神况虜輩乎諸將曰請選鐡騎五百衛從子儀曰適足以為害也乃傳呼曰令公來虜初疑持矢待之子儀以數十騎免胄徐出而勞之曰安乎公等久同忠義又何至於是回紇皆捨兵下馬齊拜曰果吾父也子儀召其首領各飲之酒與之佳錦歡好如初馬燧討李懷光於長春宫懷光將徐庭光以兵六千守宫城禦備甚嚴燧度長春不下則懷光自固攻之曠日持久所傷必多乃挺身至城下呼庭光庭光素憚燧威名拜於城上燧度庭光心已屈乃徐謂之曰我來自朝廷可西面受命庭光復拜燧乃諭之曰公等皆朔方將士䘵山巳來首建大勳四十餘年功伐最高奈何棄祖父之勳力背君上為滅族之計耶從吾言非止免禍富貴可圖也賊徒皆不對燧又曰爾以吾言不誠今相去不逺數步爾當射我乃披襟示之庭光感泣俯伏軍士亦泣下先一日賊焦籬堡守將尉圭以兵二千因堡降燧庭光東道既絶乃率衆出降燧以數騎徑入城處之不疑莫不畏服唐嗣曹王李臯遷湖南觀察使前使辛京杲貪殘有將王國良鎮邵州武岡縣豪富京杲以死罪加之國良危懼遂散財聚衆據縣以叛諸道同討連歲不能下臯受命乃曰驅疲氓誅反側非所以奉聖朝事遣使遺國良書曰觀將軍非敢大逆蓋遭讒嫉將軍遇我何不速降我與將軍同為辛京杲所搆我已䝉聖朝昭雪使我我何必持刃殺將軍耶將軍以為不然我以陳術破將軍陳以攻法屠將軍城非將軍所度也國良且憂且喜遣使請降亦未決皋即日赴縣受降中道有候騎馳告曰國良軍中有變言降是詐也臯曰非爾輩所知遂留麾下兵單騎假稱使者徑入國良壘中國良召使者入臯遂大呌軍中曰有人識曹王否只我是國良何不速降一軍愕眙不敢動適有識者走至傳呼曰是國良匍匐叩頭請罪臯執手約為兄弟盡焚攻取之備散倉庫給兵士令復農桑焉招降昭公十三年魯叔弓帥師圍費弗克敗焉平子怒令見費人執之以為囚俘冶區夫曰非也若見費人寒者衣之饑者食之為之令主而供其乏困費來如歸南氏亡矣民將叛之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏將焉入矣平子從之費人叛南氏蜀時關羽圍魏樊城留兵將備公安及南鄭郡吳將吕䝉襲之兵到南郡羽下將糜芳降䝉入據城盡得羽及將士家屬皆撫慰約令軍中不得干厯人家有所求取䝉麾下士是汝南人取民家一笠以覆官鎧官鎧雖是公事䝉猶以為犯軍令不可以鄉里故而廢法遂埀涕斬之於是軍中震栗道不拾遺旦暮使親近存恤耆老問所不足疾痛者給醫藥饑寒者賜衣糧羽府藏財寶皆封閉以待孫權至羽還在道路數使人與䝉相聞䝉輒厚遇其使周城中家家致問或手書示信羽人還私相參訊咸知家門無恙見待過於平時故羽吏士無間心會權尋至羽自知孤窮乃走麥城西至漳鄉衆皆委羽而降權晉羊祜都督荆州諸軍率營兵出鎮南夏開設庠序綏懷逺近甚得江漢之心與吳人開布大信降者欲去皆聽之吳石城守去襄陽七百餘里每為邊害祜患之竟以詭計令吳罷守於是戍邏減半分以墾田八百餘頃大獲其利祜之始至也軍無百日之糧及至季年有十年之蓄祐以孟獻營武牢而鄭人懼晏弱城東陽而萊子服乃進據險要開建五城收膏腴之地奪吳人之資石城以西盡為晉有自是降者前後不絶乃增修德信以懷柔初附將帥有欲進譎詐之策者輒飲以醇酒使不得言有略吳二兒為俘者祜遣送還其家後吳將夏詳等來降二兒之父亦率其屬與俱吳將陳尚潘景來寇祜追斬之美其死節而高之厚加殯斂景尚子弟迎喪祜以禮遣還吳將鄧香掠夏口祜募生縛香既至宥之香感其恩率部曲而降祜出軍行吳境刈榖為糧皆計所侵送絹償之每會衆江沔遊獵常止晉地若禽獸先為吳人所傷而為晉兵所得者皆封還之於是吳人翕然悅服稱為羊公不之名也祜與陸抗相對使命交通抗稱祜之德雖樂毅諸葛孔明不能過也抗嘗病祜饋之藥抗服之無疑心人多諌抗抗曰羊祜豈鴆人者時談以為華元子反復見於今抗每復告其戍曰彼專為德我專為暴是不戰而自服也隋桂州人李光仕舉兵作亂隋將周法尚討之光仕帥勒徑兵保白石洞法尚捕得其弟光略光度大獲家口其黨有來降附者輒以妻子還之居旬日降其數千人法尚遣兵列陳以當光仕親率竒兵蔽林設伏兩陳始交法尚馳擊其柵柵中人皆走散光仕大潰追斬之嶽飛攻賊李成將馬進賊駭亂退走飛使人呼曰不從賊者坐吾不殺汝坐而降者八千餘人賊大敗後漢更始初光武為蕭王定河北諸賊銅馬餘衆降封其渠帥為列侯降者猶不自安光武知其意敕令各歸營勒兵乃自乘輕騎按行部陳降者皆相語曰蕭王推赤心置人腹中安得不投死乎由是皆服隋綘郡賊柴保昌等有衆八萬煬帝令户部尚書樊子蓋擊之子蓋深溝高壘不敢決戰有來歸首者不問多少必坑之由是莫敢降賊徒日盛連年不能克煬帝乃令唐髙祖代之賊有來降者皆引致左右推赤心以待之人人自安願效死力其黨相謂曰我輩本無逆心徒以政令嚴酷懼死為盜耳前後首者皆為子蓋所殺窮無所歸今唐公與人無隔恩意如此我輩知不死矣遂相率歸前後至者數萬人餘賊散走他郡唐淮西既平裴度為節度招撫使蔡人大悅舊令途無偶語夜不然燭人或以酒食相過從者以軍法論度乃約法惟盜鬭殺外餘盡除其往來者不復以晝夜為限蔡之遺黎始知有生人之樂度以蔡卒為牙兵或以為反側之徒其心未安不可自去其備度笑而答曰吾受命為帥元惡就擒蔡人即吾人也父老無不感泣漢楚相持之際項羽擊陳留外黃外黃不下數日降羽悉令男子十五以上詣城東欲坑之外黃令舍人兒年十三往說羽曰彭越强劫外黃外黃恐故且降待大王大王至又坑之百姓豈有所歸心哉從此以東梁地十餘城皆恐莫肯下矣羽然其言乃赦外黃當坑者而東至睢陽聞之皆爭下宋檀道濟為高祖北伐前鋒至洛陽凡拔城破壘俘四千餘人議者謂應戮以為京觀道濟曰伐罪弔民正在今日皆釋而遣之於是戎夷感悅相率歸之者衆唐懷安王孝恭討蕭銑銑降時諸將咸曰銑之將帥與官軍拒戰罪狀既重當籍沒其家以賞將士李靖曰王者之師義存弔伐百姓既受驅逼相戰豈其所願且犬吠非主豈容同叛逆之科此蒯通所以免大戮於漢祖也今新定荆郢宜𢎞寬大以慰逺近之心降而籍之恐非救焚拯溺之義但恐自此以南城鎮堅守不下非計之善遂止江漢城邑聞之莫不爭下唐元和中魏博義成軍送擒獲逆賊李師道下都知兵馬使夏侯澄等四十七人上並從釋放仍却赴遞送軍前驅使如緣父母猶在賊中或羸老疾病情切歸還者仍量事優給放去及澄等至行營賊覘知之潛相傳告由是叛徒皆感朝廷恩繼有降者後漢初河南賊張步據齊地漢將耿弇討敗之步肉袒負斧鑕於軍門弇傳步詣行在所勒兵入據其城樹十二郡旗時步衆尚十餘萬輜重七十餘兩弇令降軍各以郡人詣旗下皆罷遣軍人令歸鄉里齊地悉平後魏末河北賊葛榮為魏將爾朱榮所擒餘衆悉降榮以賊徒既衆若即分割恐其疑懼或更結聚乃下令各從所樂親屬相隨任所居止於是羣情喜悅兵即四散蜀諸葛亮南征所在戰捷聞孟獲者為夷漢所服募生致之既得之使觀營陳之間問曰此軍何如對曰向者不知虛實故敗今䝉賜觀營陳若秖如此即易勝耳亮笑縱使更戰七縱七擒而亮又遣獲獲不去曰公天威也南人不復反矣遂至滇池南中悉平陳禎明三年隋師濟江宜黃侯慧紀遣將吕肅據巫峽肅竭私財以充軍用隋將楊素奮兵擊之四十餘戰隋軍死者五千餘人陳人盡取其鼻以求功既而隋軍屢捷獲陳之士三縱之肅乃遁走唐太宗討薛仁杲率左右二千餘騎追奔直趣折墌以乘之仁杲列陳城下太宗據涇水以臨賊陳賊徒氣沮無敢進戰其驍將渾幹等數人臨陳來降請還取馬太宗遣之於是各乘良馬須臾並至唐高仁厚為西川押牙是時中官田令孜同父兄陳敬瑄為西川節度敬瑄多遣人厯縣鎮調事謂之尋事人所至多所求取有二人過資陽鎮獨無所求鎮將謝𢎞讓邀之不至自疑有罪夜亡入羣盜中明旦二人去𢎞讓實無罪也捕盜使楊遷因其自首而執以送使去討擊擒獲以求功敬瑄不之問杖𢎞讓脊二十釘西城二七日煎油潑之又以膠麻掣其瘡備極慘酷見者寃之又有卬州牙官阡能因公事違期避杖亡命為盜楊遷復誘之能方出首聞𢎞讓之寃大罵楊遷發憤為盜驅掠良民不從者舉家殺之踰月衆至萬人立部伍署職級橫卬雅二州間攻陷城邑所過塗地先是蜀中少盜賊自是紛紛競起州縣不能制敬瑄遣牙將楊行遷等三帥各將三千人以討之阡能黨愈熾浸淫入蜀州境陳敬瑄以楊行遷等久無功以仁厚為都招討指揮使將兵五百人往代之未發前一日有鬻麵者自旦至午出入營中數回邏者疑之執而訊之果阡能之諜也仁厚命釋縛溫言問之對曰某村民阡能囚其父母妻子於獄云汝詗事歸得實則免汝家不然盡死某非二爾也仁厚曰誠知汝如是我何忍殺之今縱汝歸救汝父母妻子但語阡能云高尚書來日發所將止五百人無多兵也然我救汝一家汝當為我潜語寨中人云僕射愍汝曹皆良人為盜賊所制情非得已尚書欲拯救湔洗汝曹尚書來汝曹各投兵迎降尚書當使人書汝背為歸順即遣汝復舊業所欲誅者阡能羅渾擎句胡僧羅夫子韓求五人耳必不使橫及百姓也諜曰此皆百姓心上事尚書盡知而赦之其誰不舞躍聽命一口傳百百傳千川騰海沸不可遏也比尚書之至百姓必盡奔走如嬰兒之見慈母阡能孤居立成擒矣遂遣之仁厚引兵發至雙流把截使白文現出迎仁厚周視塹柵怒曰阡能役夫其衆皆耕民耳竭一府之兵歲餘不能擒今觀塹柵重復牢密如此宜其可以安眠飽食養寇邀功也命引出斬之監軍力救久之乃得免命悉平柵塹才留五百兵守之餘兵悉以自隨又召諸寨兵相繼皆集阡能聞仁厚將至遣羅渾擎立五寨於雙流之西伏兵千人於野橋箐以邀官軍仁厚詗知引兵圍之下令勿殺遣人釋戎服入賊中告諭如昨日所以語諜者賊大喜呼譟爭棄甲投兵請降拜如摧山仁厚悉撫諭書其背使歸語寨中未降者寨中餘衆爭出降渾擊狼狽踰塹走其衆執以詣仁厚仁厚曰此愚夫不足與語械以送府悉命焚五寨及其甲兵惟留旗幟所降凡四千人明旦仁厚謂降者曰始欲即遣汝歸而前途諸寨百姓未知吾心或有憂疑藉汝曹為我前行過穿口新津寨下示以背字告諭之比至延貢可歸矣乃取渾擎旗倒繫之每五十人為隊授以一旗使前走揚旗疾呼曰羅渾擎已生擒送使府大軍行至汝輩居寨中者速如我出降立得為良民無事矣至穿口句胡僧置十一寨寨中人爭出降胡僧大驚拔劍遏之衆投瓦石擊之共擒以獻仁厚其衆五千餘人皆降又明旦焚寨使降者執旗先驅一如雙流至新津韓求置十三寨皆迎降求自投深塹其衆鉤出之已死斬首以獻將士欲焚寨仁厚止之曰降人皆未食先運出資糧然後焚之新降者競炊㸑與先降來告者共食之語笑歌吹終夜不絶明日仁厚縱雙流穿口降者先歸使新津降者執旗先驅且曰入卭州境亦可散歸矣羅夫子置九寨於延貢其衆前夕望新津火光已不眠矣及新津人至羅夫子脫身棄寨奔阡能其衆皆降明日羅夫子至阡能寨與之謀悉衆決戰計未定日向暮延貢降者至阡能羅夫子走馬巡寨欲出兵衆皆不應仁厚引兵連夜逼之明旦諸寨知大軍已近呼譟爭出執阡能阡能窘急赴井為衆所擒不死又執羅夫子羅夫子自剄衆縶羅夫子首縛阡能驅之前迎官軍詣仁厚擁馬首大呼泣拜曰百姓負寃日久無所控訴自諜者還百姓引領度頃刻如期年今遇尚書如出九泉睹白日已死而復生矣歡呼不可止賊寨在他所者分遣諸將往降之仁厚出軍凡六日五賊皆平每下縣鎮輒補鎮遏使使安集户口於是陳敬瑄梟韓求羅夫子首於市釘阡能羅渾擎句胡僧於城西七日而卨之阡能孔目官張榮本安仁進士屢舉不中第歸於阡能為之謀主為草書檄阡能敗以詩啓求哀於仁厚仁厚送府釘於馬市自餘不戮一人以仁厚為州防禦使殺降周世宗征淮南留鎧甲千數在正陽而得降卒八百部送歸京師時曹翰適從京師來詣過正陽十數里許遇之慮劫兵器為叛矯殺之及見世宗具言其事世宗不悅翰曰賊以困歸我非心服也所得器甲盡在正陽茍為所劫是復生一淮南矣因不之罪用間春秋時楚師伐宋九月不服將去宋楚大夫申叔時僕曰築室反耕者宋必聽命楚子從之宋人懼使華元夜入楚師登子反之牀而起之曰寡君使元以病告曰敝邑易子而食析骸而㸑雖然城下之盟有以國斃不能從也去三十里惟命是聽子反懼與之盟而告王退三十里宋及楚平華元若不因間諜無由得入楚軍魏公子無忌安釐王時為信陵君不以富貴驕人公子與魏王博而北境傳舉烽言趙寇至且入界王釋博欲召大臣謀公子曰趙王田獵耳非為寇也復博如故王恐心不在博居頃復從北方來言趙王獵耳非為冦也王大驚問公子何以知之公子曰臣之客有能探得趙王隂事者趙王所為輒以報臣臣以此知之反間趙奢為趙將秦伐韓軍於閼與趙王令趙奢將兵救之兵去邯鄲三十里而令軍中曰有以軍事諫者死秦軍軍武安西秦軍鼓譟勒兵武安屋瓦盡振軍中候有一人言急救武安趙奢立斬之堅壁留二十八日不行復益增壘秦間來奢善食而遣之間以報秦將秦將大喜曰夫去國三十里而軍不行乃增壘閼與非趙地也奢既已遣秦間乃卷甲而趨之大破秦軍秦軍解而走遂解閼與之圍而歸唐朱泚反將吏自賊中逃來者言泚衆攜離可滅之狀會賊將姚令言僞中丞崔宣使諜覘我軍為邏騎所得拘送於李晟晟解縛食而遣之誡之曰爾報姚令言崔宣善為賊守諸將勉力自固勿不忠於賊也李訴討淮西舊軍令有舍賊諜者屠其家訴除其令因使厚之諜反以情告訴訴益知賊中虛實燕使樂毅伐破齊齊湣王出奔已而保莒城燕師長驅平齊田單東走保即墨即墨大夫出戰敗死城中相與推田單為將軍以即墨拒燕頃之燕昭王卒惠王與樂毅有隙單聞之乃縱反間於燕宣言曰齊王已死城之不拔者二耳樂毅畏誅而不敢歸以伐齊為名實欲連兵南面而王齊齊人未附故且緩攻即墨以待其事齊人所懼惟恐他將之來即墨殘矣燕王以為然使騎劫代樂毅樂毅因歸趙單又宣言曰吾惟懼燕軍之劓所得齊卒置之前行與我戰燕人聞之如其言城中人見齊諸降者皆劓皆怒堅守惟恐見得又縱反間曰吾懼燕人掘吾城外冢墓僇辱先人燕軍盡掘葬墓燒死人即墨人從城望見皆涕泣單又收民金得千鎰令即墨富豪遺燕將曰即墨即降願無虜掠吾族家妻妾令安堵燕將大喜許之燕軍由此益懈單乃鑿城夜縱火牛壯士鼓譟出擊燕軍大駭敗走所亡七十餘城皆復范睢為秦昭王相使右庶長王齕攻韓取上黨上黨民走趙趙軍長平齕因攻趙趙使亷頗堅壁以待秦秦數挑戰趙兵不出趙王數以為讓而睢使人行千金於趙為反間曰秦之所惡獨畏馬服子趙括將耳亷頗易與且降矣趙王既怒亷頗軍多失亡軍數敗又反堅壁不敢戰而又聞秦反間之言因使趙括代亷頗將以擊秦秦聞馬服子將乃以武安君白起為將軍秦軍射殺趙括括軍敗卒四十萬人降武安君武安君乃挾詐而盡坑殺之唐劉世讓拜廣州總管將之任高祖問以備邊之策世讓答曰突厥南冦徒以馬邑為其中路耳如臣所計請於崞城置一智勇之將多儲金帛有來降者厚賞賜之數出竒兵略其城下芟踐禾稼敗其生業不出嵗餘彼當無食馬邑不足圖也高祖以無可任者乃使世讓馳驛往經略之突厥懼其威名乃縱反間言世讓與可汗通謀將為亂高祖不之察遂誅世讓使間前漢陳平初為漢王護軍中尉項羽圍漢王於滎陽城漢王患之請割滎陽以西和項王弗聽平曰顧楚有可亂者彼項王骨鯁之臣亞父鍾離昧龍且周殷之屬不過數人耳大王能出捐數萬斤金行反間間其君臣以疑其心項王為人意忌信讒必內相誅漢因舉兵而攻之破楚必矣漢王以為然乃出黃金四萬斤與平恣所為不問出入平既多以金縱反間於楚軍宣言諸將鍾離昧等為項王將功多矣然終不得裂地而王欲與漢為一以滅項氏分王其地項王果疑之使使至漢漢為太牢之具舉進見楚使來即陽驚曰吾以為亞父使乃項王使也復持去以惡草具進楚使使歸具以報項王果大疑亞父亞父欲急擊下滎陽項王不信不肯聽亞父亞父聞項王疑之乃大怒疽發背而死卒用計滅楚唐長孫晟為奉車都尉以突厥攝圖玷厥阿波突利等各倚强兵難以力征易可離間因上書陳突厥强弱形勢高祖皆納用乃遣太僕元暉出伊吾道使詣玷厥賜以狼頭纛謬為欽敬禮甚優玷厥使來引居攝圖使上反間既行果相猜二授晟車騎將軍出黃龍道賫幣賜奚霫契丹等遣為鄉導得至處羅侯所深布心腹誘令內附攝圖四千萬騎自蘭州入至於周盤破逹奚長孺軍更欲南入玷厥不從引兵而去鄉間李逹為都督義州𢎞農等二十一州諸軍事每厚撫境外之人使為間諜敵中動靜必先知至有事泄被誅戮者亦不以為悔其得人心如此後周韋孝寬為南兖州刺史東魏將段琛堯傑據宜陽遣其揚州刺史牛道常扇誘邊民孝寬深患之遣諜人訪獲道常手跡令善作書者僞作道常與孝寬書論歸款意又為落燼燒迹若火下書者還令諜人送於琛營琛得書果疑道常其所欲經略皆不見用孝寬知其離阻因出竒兵掩襲擒道常及琛等崤澠遂清後孝寬為驃騎大將軍鎮玉壁孝寬善於撫御能得人心所遣間諜入齊者皆為盡力亦有齊人得孝寬金貨遙通書疏故齊人動靜朝廷皆先知時有主帥許盆孝寬託以心膂令守一城盆乃以城東入孝寬怒遣諜取之俄而斬首而還其能致人情如此內間秦王翦為將攻趙趙使李牧司馬尚禦之李牧數破走秦軍殺將桓齮翦惡之乃多遺趙王寵臣郭開等金使為反間曰李牧司馬尚欲與秦反趙以多取封於秦趙王疑之使趙葱及顔聚代將斬李牧廢司馬尚後三月翦因急擊趙大破殺趙葱虜王遷及其將顔聚遂滅趙後周韋孝寬為將軍北齊將斛律光在汾北孝寬忌光英勇乃作謠言令間諜漏其文於鄴曰百升飛上天明月照長安光字明月又曰高山不推自崩檞木不扶自立齊臣祖珽穆提婆與光有隙因續之曰盲老翁背上受大斧饒舌老母不得語令小兒歌之於路提婆聞之以告後主乳母陸令萱以饒舌斥巳盲老翁謂祖珽也遂相與協謀以謠言啓後主謀誅光武帝聞之始有滅齊之意竟平其國吳孫權命吕䝉西取長沙零桂三郡䝉移書二郡望風歸服惟零陵太守郝普城守不降而劉備自蜀親至公安遣關羽爭三郡權時住陸口使魯肅萬人屯益陽拒羽而飛書召䝉急還助肅䝉既定長沙當之零陵南陽鄧𤣥之者郝普之舊也欲令誘普及被書當還䝉祕之夜召諸將授以方略晨當攻城顧謂𤣥之曰郝子泰聞世有忠義事亦欲為之而不知時也左將軍在漢中為夏侯淵所圍關公在南郡至尊身自臨之近者破樊本屯救􅌕逆為孫規所破彼方首尾倒垂救死不給豈有餘力復營此哉今吾士卒精鋭人思致命至尊遣兵相繼於道曾不移日而城必破城破之後身死何益於事而令百歲老母戴白受誅豈不痛哉䝉度此家不得外問謂援可恃故至於此耳君可見之為陳禍福𤣥之見普具宣䝉意普懼聽之𤣥之先出報䝉普尋後當至䝉豫勑四將各選百人普出便入守城門須臾普出䝉迎執其手與下船語畢出書示之因拊手大笑普見書知備在公安而羽在益陽慙恨入地死間戰國鄭武公欲伐胡先以其子妻胡因問羣臣曰吾欲用兵誰可伐者大夫關其思曰胡可伐武公怒而戮之曰胡兄弟之國子言伐之何也胡君聞之以鄭為親已不備鄭襲胡取之漢高祖時齊王田廣軍厯下以拒漢漢使酈食其往說之與連和廣然之乃罷厯下守備縱酒且遣使與漢平韓信渡平原襲破齊齊王烹酈生南齊東昏侯遣輔國將軍劉山陽為巴西太守配兵三千使過荆州就行事蕭潁胄兵襲蕭衍衍時為雍州刺史將起兵慮潁胄不同遣潁胄親人參軍王天虎遍與州府書詣江陵聲云山陽西上并襲荆雍書與潁胄勸同舉兵潁胄意猶未決及山陽西上梁武謂諸將曰荆州本畏襄陽又加以唇亡齒寒自有傷弦之急寧不暗同耶我若總荆州之兵掃定東夏韓白重出不能為計况以無算之昏主哉我能使山陽至荆州便即授首諸君試觀何如及山陽至巴陵梁武復命天虎齎書與潁胄兄弟去後梁武謂張𢎞策曰夫用兵之道攻心為上攻城次之心戰為上兵戰次之今日是也先遣天虎往州府人皆有書今次乘驛甚急止有兩封與行事兄弟云天虎口具及問天虎而口無所說行事不得相聞不容妄有所道天虎是行事心膂聞必謂行事與天虎共隱其事必人人生疑山陽惑於衆口迭相嫌二則行事進無以自明必恐漏吾謀內是馳兩空函定一州矣是時或云山陽謀殺潁胄以荆州同舉及至江安聞之果疑遲回十日餘不上潁胄大懼計無所出夜呼主軍席闡文桞沈閉閣定議闡文曰蕭雍州蓄養士馬非復一日江陵素畏襄陽人又衆寡不敵取之必不可制就能制之歲寒復不為朝廷所容今若殺山陽與雍州舉事立天子以令諸侯霸業成矣山陽遲疑不進是不信我今斬送天虎則彼疑可釋至而圖之罔不濟矣詰旦潁胄謂天虎曰天下之事縣在於卿今就借頭以詐山陽昔樊於期亦以頭借荆軻乃斬天虎以示山陽山陽大喜至江津單車白服率左右數十人詣潁胄潁胄使劉孝慶等伏兵城內山陽入門即於車中斬之貞觀初突厥頡利可汗退保鐡山遣使入朝謝罪請為藩臣太宗遣唐儉安修仁持節出寨以安撫之以李靖為定襄道總管往利頡利頡利不肯朝覲請待草青馬肥將踰砂磧靖與其副將張公謹謀曰制使到彼虜必自寬率精騎齎二十日糧乘間掩襲諸將皆曰詔許其降行人在彼奈何攻之靖曰此兵機也如唐儉等輩何足惜督軍疾進自白道襲之至隂山遇其斥候千餘帳皆俘以隨軍頡利見使者甚悅不虞官兵之至靖軍奄到縱擊之遂滅其國韓世忠值是歲金人與劉豫合兵分道入侵帝手札命世忠飭守備圖進取辭旨懇切世忠受詔感泣曰主憂如此臣子何以生為遂自鎮江濟師俾統制解元守高郵候金步卒親提騎兵駐大儀當敵騎伐木為柵自斷歸路會遣魏良臣使金世忠撤炊㸑紿良臣有詔移屯守江良臣疾馳去世忠度良臣已出境即上馬令軍中曰視吾鞭所嚮於是引軍次大儀勒五陳設伏二十餘所約聞鼓即起擊良臣至金軍中金人問王師動息具以所見對聶呼貝勒聞世忠退喜甚引兵至江口距大儀五里别將托卜嘉擁鐡騎過東世忠傳小麾鳴鼓伏兵四起旗色與金人旗雜出金軍亂我軍迭進背嵬軍各持長斧上揕人胸下斫馬足敵被甲陷泥淖世忠麾徑騎蹂􅏳人馬俱斃遂擒托卜嘉等二百餘人所遣董旻亦擊金人於天長縣之鴉口擒女真四十餘人解元至高郵遇敵設水軍夾河陳日合戰十三相拒未决世忠遣成閔將騎士往援復大戰俘生女真及千户等世忠復親追至淮金人驚潰相蹈藉溺死甚衆捷聞羣臣入賀帝曰世忠忠勇朕知其必能成功論者以此舉為中興武功第一時達喇屯泗州烏珠屯竹孰鎮為世忠所扼以書幣約戰世忠許之時方宴㑹使兩伶人以橘茗報聘會雨雪金饋道不通野無所掠殺馬而食蕃漢軍皆怨烏珠夜引軍還劉麟劉猊棄輜重遁五代梁朱溫以歧人堅璧不戰且慮師老思欲旋斾以歸河中因密召上將數人語其事時親指揮使高季昌獨前出抗言曰天下雄傑窺此舉者一歲矣今歧人已困願少俟之溫嘉其言因曰兵法以正合以竒勝竒者詐也乘機集事必由是乎乃命季昌密募人入歧以紿之尋有騎士馬景堅願應命且曰是行也必無生理願録其孥溫悽然立止其行景固請乃許之明日軍出諸寨屏匿如無人景因躍馬西走直叩歧闉詐以梁軍悉東遁為告且言列寨尚留萬餘人俟夕將遁矣宜速掩之荗真信其言遽啓二扉悉衆來冦時諸軍已介馬待之中軍一鼓百營俱進又分遣數百騎以據其闉歧人進不能駐其趾退不能入其壘殺戮蹂踐不知其數荗真由是喪膽但閉壘而已揚州牧羅尚遣隗伯攻蜀賊李雄於郫城互有勝負雄乃募武都人朴泰鞭之見血使譎羅尚欲為內應以火為期尚信之悉出精兵遣隗伯等率兵從泰擊雄雄將李讓於道設伏泰以長梯倚城而舉火伯軍見火起而爭緣梯泰又以繩汲上軍百餘人皆斬之雄因放兵內外擊之大破尚軍生間种世衡居西邉始元昊寇邉王師屢撓虜之氣熖益張常有并吞關中之意其將剛浪陵號野利王某號天都王元昊倚為心腹凡勝我軍皆二將之策也世衡方城青澗謀有以去之有王嵩者本青澗僧世衡察其堅朴誘令冠帶因出師以賊級豫之白於帥府表授三班借職充經略司指使且力為辦其家事凡居室騎從衣食之具悉出世衡嵩感激既深世衡反不禮以奴畜之或掠治械繫數日嵩雖不勝其苦卒無一辭望世衡世衡知可任兵事居半年召嵩謂之曰吾將以事使汝吾戒汝所不言其苦雖有甚於此者汝能為卒不言否嵩泣對曰䝉將軍恩教致身榮顯常誓以死報而未知其所况敢辭捶楚乎世衡乃草遺野利書書辭大抵如世間問起居之儀惟以數句隱辭如嘗有私約而勸其速行之意書於尺素且膏以蠟置衲衣間密縫之告嵩非濵死不得泄如泄之當以負恩不能成吾事為言并以畫龜一副棗一部為信俾遺野利嵩受教至野利所以將軍命出棗龜投之野利知見侮笑曰吾素竒种將軍今何女子見識度嵩别有書嵩佯目左右既而答以無有野利不敢匿乃封其信上元昊數日元昊召野利與嵩俱西北行數百里至一大城曰興州先詣一官寺曰樞密院次曰中書有數胡人雜坐野利與焉召嵩廷詰將軍書問所在堅執前對稍稍去巾櫛加執縳至於捶楚極苦嵩終不易其言又數日召入一官走㕔事廣楹皆垂班竹箔緑衣小豎立其左右嵩意元昊宫室也少頃箔中有人出又以前問責之曰若速言死矣嵩對如前乃命曵出斬之嵩大號且言曰始將軍遣嵩密遺野利王書戒不得妄泄今不幸空死不了將軍事吾負將軍吾負將軍箔中急使人追問之嵩具以對乃裭衲衣取書以進書入移刻始命嵩就館優待以禮元昊於是疑野利隂遣愛將假為野利使使於世衡世衡知元昊所遣未即見命屬官日館勞之問虜中山川地形在興州左右言則詳迫野利所部多不能悉適擒生虜數人因令隙中視之生虜能言姓名果元昊使世衡意决乃見之使者𫝊野利語世衡慢罵元昊而稱野利有心內附乃厚遣使者曰為我語若王速决無遲留也度使者至嵩即還而野利巳報死矣世衡知謀已行因欲并間天都又為置祭境上作文書於版以弔多述野利與天都相結有意本朝悼其垂成而失其文雜紙幣伺有虜至急爇之以歸版字不可遽滅虜人得之以獻元昊天都以此亦得罪元昊既失二將久之始悟為世衡所賣遂定講和之策焉一云元昊之臣野利常為謀主守天都山號天都大王與元昊乳母白姥有隙歲除日野利引兵巡邊深涉漢境數宿白姥乘間乃譛其欲叛元昊疑之世衡嘗獲蕃猶之子蘇吃曩厚遇之聞元昊嘗賜野利寶刀而吃曩之父得幸於野利世衡因使吃曩竊野利刀許之以緣邊職任錦袍真金帶吃曩得刀以還世衡乃唱言野利巳為白姥譛死設祭境上為祭文叙歲除日相見之歡入夜乃火燒紙錢川中盡明虜見火光引騎近邊窺覘乃佯委祭具而銀器凡千餘兩悉棄之虜人爭取器皿得元昊所賜刀及火爐中見祭文已燒盡但存數十字元昊得之又識其所賜刀遂賜野利死野利有大功死不以罪自此君臣猜二以至不能軍俘間春秋時楚子反命軍吏察夷傷補卒乘繕甲兵展車馬雞鳴而食惟命是聼晉人患之苗賁皇徇曰搜乘補卒秣馬利兵修陳固列蓐食申禱明日復戰乃逸楚囚王聞之召子反謀穀陽豎獻飲於子反醉而不能見王曰天敗楚也夫余不可以待乃宵遁後漢光武初遣耿弇征張步步聞之乃使大將費邑軍厯下分兵屯祝阿别於太山鍾城列營數十以待弇弇兵先擊祝阿自旦攻城未中而拔之故開一角令其衆得奔歸鍾城聞祝阿巳潰空壁亡去費邑遣弟守拒里弇進軍先脅巨里使揚言多伐林木以填塞扼塹數日有降者言邑聞弇欲攻巨里謀來救之弇嚴令軍中趣修攻具後三日當悉力攻巨里隂緩生口令亡歸歸者告邑邑將精兵三萬來救弇曰吾修攻具者欲誘致邑耳今適其所求也大敗之班超在西域發于闐諸國兵擊莎車而龜兹王遣兵五萬令溫宿王救之超召將校及于闐王議曰今兵少不敵其計莫若散去于闐從是而東超亦於此西歸可須夜鼓而發隂縱所得生口歸以超言告龜兹王王聞之大喜自以萬騎於西界遮超溫宿王將八千騎於東界邀於闐超知二虜已出密召諸部勒兵雞鳴馳赴莎車營胡大驚亂奔走追斬五千級自是威鎮西域河北賊葛榮别帥韓婁等有衆數萬人屯據薊魏將侯淵率騎七百討之去薊百餘里值賊帥陳周馬步萬餘衆遂潛伏以乘其背大破之虜其卒五千餘人尋還其馬仗縱令入賊城左右諫曰既獲何為更資遣之淵曰我兵既少不可力戰事須為計以離間之淵度其已至遂帥衆夜進昧朝即其城門韓婁果疑降卒為之內應遂遁走追擒之杜預為鎮南大將軍都督荆州至鎮繕兵甲耀威武乃簡精鋭襲吳西陵督張政大敗之政吳之名將也據要害之地恥以無備取敗不以所喪之實告於孫皓預欲間吳邊將乃表還其所獲之衆於皓皓果召政遣武昌監劉憲代之故大軍臨至使其將帥移易以成傾蕩之勢嶽飛知劉豫結尼雅滿而烏珠惡劉豫可以間而動會軍中得烏珠諜者飛陽責之曰汝非吾軍中人張斌耶吾向遣汝至齊約誘致四太子汝往不復來吾繼遣人問齊已許我今冬以會合寇江為名致四太子於清河汝所持書竟不至何背我耶諜冀緩死即詭服乃作蠟書言與劉豫同諜誅烏珠事因謂諜曰吾今貸汝復遣至齊問舉兵期刲股納書戒勿泄諜歸以書示烏珠烏珠大驚馳白其主遂廢豫嶽飛時李成亂湖南飛奏比年多命招安故盜力强則肆暴力屈則就招茍不略加勦除蜂起之衆未可遽殄許之飛入賀州境得成諜者縳之帳下飛出帳調兵食吏曰糧盡矣奈何飛陽曰姑反茶陵已而顧諜若失意狀頓足而入隂令逸之諜歸告成成大喜期翼日來追飛命士蓐食潛趨繞嶺未明已至太平場復破其寨成據險拒飛飛麾下兵掩擊賊大潰成走據北藏嶺上梧關遣將迎戰飛不陳而鼓士爭奮奪二險據之成又自桂嶺置寨至北藏嶺連控隘道親以衆十餘萬守蓬頭嶺飛部才八千一鼓登嶺破其衆成奔連州飛謂張憲等曰成黨散去追而殺之則脅從者可憫縱之則復聚為盜今遣若等誅其酋而撫其衆慎勿妄殺纍主上保民之仁於是憲自賀連徐慶自邵道王貴自郴桂招降二萬與飛會連州進兵追成成走宣撫司降嶽飛相有劇賊陶俊賈進和飛請百騎滅之遣卒僞為商入賊境賊掠以充部伍飛遣百人伏山下自領數十騎逼賊壘賊出戰飛陽北賊來追之伏兵起先所遣卒擒俊及進和以歸漏間吳陸遜為大將軍右都護鎮荆州時魏江夏大守逯式兼領兵馬頗作邊害而與北舊將文聘子休宿不協遜知其然即假作答式書云得報懇惻知與休久結嫌隙勢不兩存欲來歸附輒以密呈來書表聞選衆相迎宜潛速嚴更示定期以書置界上式兵得書以見式式惶恐遂自送妻子還路由是吏士不相親附遂以免罷李矩為河東太守劉聰遣從弟暢討矩矩選勇敢千人夜掩暢營暢僅以身免先是聰使其將趙固鎮洛陽長史周振與固不協密陳固罪矩之破暢也帳中得聰書勑暢平矩訖過洛陽收固斬之便以振代固矩送以示固固即斬振父子遂率騎一千來降矩還令守洛蜀將孟逹降魏魏朝遇之甚厚司馬宣王以逹言行傾巧乃以逹為新城太守逹於是連吳固蜀潛圖中國蜀諸葛亮惡其反覆又惡其為患逹與魏興太守申儀有隙亮欲促其事乃遣郭謨詐降過儀因漏泄其謀逹聞其謀漏泄乃欲舉兵不信間曹王臯鎮江西先是牙將伊慎討梁崇義摧鋒陷敵李希烈意欲縶之慎以計遁歸臯始至鍾陵大集將吏得慎而壯之拔為大將繕理舟師希烈懼慎為曹王所任乃遣慎七屬之甲詐為慎書行間焉德宗遣中使即軍中詰之臯乃抗疏論雪上章未報會賊兵泝江來寇臯乃召慎勉之令戰大破二千餘衆朝廷始信其不二諜間春秋時子罕為宋司城陽門之介夭死子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夭死而子罕哭之哀而民說殆不可伐也孔子聞之曰善哉覘國乎詩云凡民有喪扶服救之雖微晉而已天下孰能當之楚子元為楚令尹以車六百乘伐鄭入桔柣之門諸侯救鄭楚師夜遁鄭人將奔桐邱諜告曰楚幕有烏乃止晉師伐齊齊侯畏衆齊師夜遁師曠曰鳥烏之聲樂齊師其遁邢伯曰有班馬之聲齊師其遁叔向曰城上有烏齊師其遁察間秦伐晉取羈馬晉師禦之出戰交綏秦行人夜戒晉師曰兩軍之士皆未憗也明日請相見也晉大夫臾駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止秦師夜遁晉侯將伐鄭鄭人聞有晉師使告於楚姚句耳與往楚子救鄭司馬將中軍令尹將左右尹子辛將右姚句耳先歸子駟問焉對曰其行速過險而不整速則失志不整喪列志失列喪將何以戰楚果敗智伯從韓魏之兵以攻趙圍晉陽之城而溉之城不沒者三版絺疵謂智伯曰韓魏之君必反矣智伯曰何以知之絺疵曰夫勝趙而三分其地今城未沒者三版沈竈生蛙人馬相食城降有日矣而韓魏之君無喜志而有憂色是非反何也明日智伯謂韓魏之君曰疵言君之反也韓魏之君曰夫勝趙而三分其地今城將勝矣夫二家雖愚不棄美利而倍約為難不可成之事其勢可見矣是疵必為趙說君且使君疑二主之心而解於攻趙也今君聽讒臣之言而離二主之交為君惜之智伯欲殺絺疵絺疵逃韓魏之君果反魏張遼圍昌豨於東海數月糧盡議引軍還曰數月以來每行諸圍豨輒屬目視遼又射矢更稀此必豨計猶豫故不力戰遼欲挑與語儻可誘也乃使謂豨曰公有命使遼傳之豨果下與遼語遼曰太祖神武先附者受大賞豨乃降遼入豨家拜妻子豨歡喜隨詣太祖後凉吕光將吕延伐乞伏乾歸大破之乾歸乃縱反間稱衆潰東奔成紀延信而追之延司馬耿雅曰告者視高而色動必有奸計不可信也延不從相遇戰敗死之金將伊都遼人耶律烏舍之降金以為西軍之監軍久不遷常怏怏其軍哈勒津伊實其金牌大金疑其與林牙暗合遂質其妻子伊都有叛心約燕京統軍反統軍之兵皆契丹人伊都謀誅西軍之在雲中者盡約雲中河東河北燕京郡守之契丹漢兒令誅女真之在官在軍者天德知軍僞許之遣其妻來告時烏舍為西監軍自雲中來燕微聞其事而未信回行數百里因獵居庸之之東遙見二騎馳遞交相遇於道立馬久談久而不去烏舍疑之命數騎追二人至詰曰爾何人也曰伊都使者以軍事詣燕山考里統軍司考里亦契丹烏舍曰爾等適立馬話及何事曰問候烏舍曰非也問候之語無許久又曰話别烏舍曰亦非也話别之語無許久又曰叙家事烏舍曰家事故非立馬叙又曰叙往事烏舍曰往事亦非立馬叙馳者詞窮面顫又且戰栗不已烏舍察其言色兼素疑伊都考里皆契丹反覆之徒因以詐折之曰我知爾二人密議反者近有人密告伊都考里反期於今日各有使至我故來此伺果復得爾輩夫何隱焉其人謂烏舍果知不敢隱伊都之叛由是敗烏舍多計皆此類隱語春秋時楚師傅於蕭還無社與司馬卯言號申叔展叔展曰有麥麴乎曰無有山鞠窮乎曰無河魚腹疾奈何曰目於眢井而拯之若為茅絰哭井則已明日蕭潰申叔視其井則茅絰存焉號而出之吳申叔儀乞糧於公孫有山氏曰佩玉蕊兮余無所繫之旨酒一盛兮余與褐之父睨之對曰粱則無矣粗則有之若登首山以呼曰庚癸乎則諾唐許欽明嘗出案部突厥默啜率衆數萬奄至城下欽明拒戰久之力屈被執賊將欽明至靈州城下令說城中早降欽明大呼曰賊中都無飲食城內有美醬乞二升梁米乞一㪷墨乞一挺是時賊營處四面阻泥河惟一路得入欽明乞此物以喻城中冀其簡兵練將候夜掩襲城中無悟其旨者伐交魏牽招為烏桓中郎將上奏言諸葛亮數出而北虜軻比能控弦十餘萬騎狡猾能相交通表為防備議者以為縣逺未之信也會亮時在祁山果遣使連結北能至故北地石城與相首尾帝乃詔招使從便宜討之時比能已還漢南沈法興既克毗陵謂江淮之南指揮可定自稱梁王都毗陵時杜伏威據厯城陽陵據江都李子通據海陵俱有窺江表之心法興軍數敗會子通圍稜於江都稜送質求救於法興及伏威法興使其子綸將兵數萬與伏威共救之伏威軍清流綸軍揚子相去數十里子通納言毛文深獻策募江南人詐為綸兵夜襲伏威營伏威怒復遣兵襲綸由是二人相疑莫敢先進子通得盡鋭攻江都克之稜奔伏威子通入江都因縱擊綸大破之伏威亦引去唐蘇定方討賀魯薛仁貴上疏曰臣聞兵出無名事故不成明其為賊敵乃可服今泥熟杖素悍不服賀魯為賀魯所破虜其妻子漢兵有於賀魯諸部落得泥熟仗家口將充賤者宜括取送還仍加賜賚即是明其枉旋使百姓知賀是賊知陛下德澤廣及也高宗然其言使括泥熟家口悉送還之於是泥熟等請隨軍效死唐德宗時朱泚朱滔王武俊兵反泚既汙宫闕羣賊附李希烈希烈僭號欲臣制諸叛衆心稍離自奉天下罪已詔赦羣賊昭義帥李抱真先遣門客賈林以文義說武俊合從擊泚武俊雖許之然尚猶豫抱真乃以數騎徑入武俊營謂曰朱泚希烈僭竊大位足下不能自振於數賊之間乃捨九葉天子而臣反虜乎因言及播越抱武俊哭涕泗交下武俊亦哭感慟左右又於武俊帳中酣寢久之武俊感其不疑結為兄弟而别明日合戰大破朱滔曹瑋在西陲西羌將舉事必先定約束號為立文法角厮囉使其舅賞樣丹與厮敦立文法於離土族謀內寇瑋隂結厮敦解寶帶豫之厮敦感激求自效間謂瑋曰吾父何所欲使欲吾首猶可斷以獻瑋曰我知賞樣丹時至汝帳下汝能為我取賞樣丹首乎厮敦愕然應之後十餘日果斷其首來王韶詣闕上平戎策三篇其略以為西夏可取欲取西夏當先復河湟則夏人有腹背受敵之憂夏人比年攻青唐不能克萬一克之必併兵南向大掠秦渭之間牧馬於蘭會斷古渭境盡服南山生羌西築武勝遣兵時掠洮河則隴蜀諸郡當盡驚擾瞎征兄弟其能自保耶今唃氏子孫唯董氊粗能自立瞎征欺巴溫之徒文法所及各不過一二百里其藝豈能與西人抗哉武威之南至於洮河蘭鄯皆故漢郡縣所謂湟中浩亹大小榆抱罕土地肥美宜五種者在焉幸今諸羌瓜分莫相統一此正可并合而兼撫之時也諸種既服唃氏敢不歸唃氏歸則河西李氏在吾股掌中矣且唃氏子孫瞎征差盛為諸羌所畏若招諭之使居武勝或渭源城使紏合宗黨制其部族習用漢法異時族類雖盛不過一延州李士彬環州慕恩耳為國有肘腋之助且使夏人無所連結策之上也种師道知渭州督諸道兵城席葦土賦工敵至堅壁萌蘆河師道陳於河滸若將决戰者隂遣偏將曲充徑出橫嶺揚言援兵至敵方駭顧楊可世潛軍衝其後姚平仲以精甲襲擊之敵大潰斬首五千級獲槖駝馬牛萬計其酋僅以身免卒城而還合交宋童貫謀伐燕使种師道盡護諸將師道諫曰今日之舉譬如盜入鄰家不能救又乘之而分其室焉無乃不可乎貫不聽既次白溝遼人譟而前士卒多傷師道先令人持一巨梃自防賴以不大敗遼使來請曰女真之叛本朝亦南朝之所甚惡也今射一時之利棄百年之好結豺狼之鄰基他日之禍謂為得計可乎救災恤鄰古今通義惟大國圖之貫不能對師道復諫宜許之又不聽密劾其助賊王黼怒責為右衛將軍致仕宗澤上奏曰臣欲乘此暑月遣王彥等滑州渡河取懷衛濬相等州遣王再興等自鄭州直護西州陵寢遣馬度等自大名取洺相真定楊進王善丁進李貴等各以所領兵分路並進既渡河則山寨忠義之民相應者不啻百萬契丹兒亦必同心殱殄金人事方就緒乞朝廷遣使聲言立契丹天祚之後講吾舊好以㩗敵情遣知幾辨博之士西使夏東使高麗諭以禍福必出助兵同加掃蕩如此則二帝有回鑾之期西河可以安帖矣願陛下早下還京之詔臣當躬冒矢石為諸將先則我宋中興之業必可立致若陛下以臣言為不可用望賜骸骨放歸田里疏入黃潛善等忌澤成功從中沮之澤歎曰吾志不得伸矣因憂鬱成疾韓世忠移屯山陽遣間結山東豪傑約以緩急為應宿州馬秦及太行羣盜多願奉約束者金人廢劉豫中原震動世忠謂機不可失請全師北討招納歸附為恢復計嶽飛令梁興等布德意招結兩河豪傑山寨韋銓等斂兵固堡以待王師李通等舉衆來歸金人動息山川險要一時皆得其實盡磁相開德澤潞晉綘汾隰之境皆期日興兵與官軍會其所揭旗以嶽為號父老百姓爭挽車牽牛載糗糧以餽義軍頂盆焚香迎送候者充滿道路余靖言交趾乞會兵討賊而朝廷久未報智高交趾叛者宜聽出兵毋阻其善意朝廷從其請狄青奏假兵於外以除內寇非我利也以一智高橫蹂二廣力不能討乃假兵蠻夷貪得忘義因而起亂何以禦之願罷交趾兵勿用且檄靖無通交趾使朝廷卒用青計策人亦服青有逺略云攻齊武平中周師來寇以段韶斛律光拒之行建西境有柏谷城者敵之絶險古城千仞諸將莫肯攻圍韶曰汾北河東世為國之有若不去柏谷事同痼疾計彼援兵會於南道今斷其要路救不得來城勢雖高其中甚狹火弩射之一旦可盡遂攻之城潰仍城華谷置戍而還是月周又遣將攻邊斛律光先率軍禦之韶亦請行五月到服秦城西仍於姚襄城南更起城鎮韶抽壯士襲之使人潛渡河告姚襄城中內外相應進戰大破之諸將欲攻其新城韶曰此城一面阻河三面地險不可攻不如更作一城壅其要道破服秦併力圖之從之從圍定陽屠其外城時韶病在軍中謂蘭陵王長恭曰此城三面重澗並無走路惟慮東面一處耳賊若突圍必從此出長恭乃設伏其夜果如策伏兵擊之大潰唐侯君集伐高昌率兵至桞谷侯騎言其國王文泰尅日將葬國人咸集諸將請襲之君集曰不可天子以髙昌驕慢無禮使吾恭行天罰今襲人於壚墓之間非問罪之師也於是鼓行而前賊嬰城而守先是大軍之發也上召上東善為攻城器者悉遣從軍君集遂刋木填隍推撞車撞其睥睨拋車飛石擊其城中其所當者無不糜碎或張氊被用障拋石城上守陴者不復得立遂拔之虜其男女七十餘口仍進兵圍其都城代宗時土蕃與諸雜羌戎寇陷西山柘靜等州詔嚴武收復武遣崔旰統兵西山旰善撫士卒皆願致死命始次賊城周圍皆石礫攻具無所設惟東南隅環丈之地壤土可穴諜知之以告旰晝夜穿地道以攻之再宿而拔其城因拓地數百里下城寨數四蕃衆相語曰崔旰神兵也將更前進以糧盡還武大悅裝七寶輿迎旰入成都以誇士衆晉王存朂如魏州視河氷已堅引步騎稍度梁甲士三千戍陽劉城緣河數十里列柵相望晉王急攻皆陷之進攻楊劉城使步卒斬其鹿角葭葦塞塹四面進攻即日拔之孟珙翼日命諸將奪柴潭樓金人爭樓諸軍魚貫而上金人又飾美婦人以相蠱麾下張禧等殺之遂拔柴潭樓俘其將士五百三十有七人蔡人恃潭為固外即汝河潭高於河五六丈城上金字號樓伏巨弩相傳下有龍人不敢近將士疑畏珙召麾下飲再行曰柴潭非天造地設樓伏弩能及逺而不可射近彼所恃此水耳决而注之涸可立待皆曰隄堅未易鑿珙曰所謂堅者止築兩隄首耳鑿其兩翼可也潭果決實以薪葦遂濟師攻城擒其兩將斬之獲其殿前右副㸃檢溫端磔之城下進逼土門金人驅其老稚熬為油號人油炮人不堪其楚珙遣道士說止之端平元年正月辛丑黑氣壓城上日無光降者言城中絶糧已三月鞍鞾敗鼓皆糜煮且聽以老弱互食諸軍日以人畜骨和芹泥食之又往往斬敗軍全隊臠其肉以食故欲降者衆珙下令諸軍銜枚分運雲梯布城下己酉珙帥師向南門至金字樓列雲梯令諸將聞鼓則進萬衆競登大戰城上殺其元帥烏凌阿及偏裨二百人開西門招布展入江海執其參政張天綱以歸珙問守緒所在天綱曰城危時即取寶玉置小室環以草號泣自經曰死便火我烟焰未絶珙與布展分守緒骨得金寶玉帶金銀印牌有差察罕圖復汴梁以大軍涎虎牢先發遊騎南道出汴南略歸亳陳蔡北道出汴東戰船浮於河水陸並下略曹南據黃陵渡乃大發秦兵出函關過虎牢晉兵出太行踰黃河俱會汴城下首奪其外城察罕自將鐡騎屯杏花營諸將環城而壘賊屢出戰戰輒敗遂嬰城以守乃夜伏兵城南旦日遣苗軍跳梁者略城而東賊傾城出追伏兵鼓譟起邀擊敗之又令弱卒立柵外城以餌賊賊出爭之弱卒佯走薄城西因突鐡騎縱擊悉擒其衆賊自是益不敢出諜知城中計窮食且盡乃與諸將賀宗哲賽音巴哈關保等議各分門而攻至夜將士鼓勇登城斬關而入遂拔之劉福通奉其僞主韓林兒從數百騎出東門走屯安豐獲僞后及賊妻子數萬僞官五千符璽印章寶貨無算全居民二十萬軍不敢私市不易肆不旬日河南悉定守李繼隆在西陲會密詔廢夏州隳其城繼隆奏以為朔方古鎮賊所窺覦之地存之可依以破賊并請於銀夏兩州南界山中增置保戍以扼其衝且為內屬畨部之障蔽而斷賊之糧運皆不報种世衡為鄜州從事夏戎犯延安世衡建言延安東北二百里有故寬州請因其廢壘而興之以當寇衝左可致河東之粟右可固延安之勢北可圖延銀夏之舊有是三利朝廷從之以世衡董役事世衡膽勇過人雖逼戎落曾不畏憚與兵民暴露數月且戰且城然處險無泉議不可守鑿地百有五十尺始至於石工徒拱手曰是不可井矣世衡曰過石而下將無泉耶爾其屑而出之凡一畚償百金工復致其力過石數重泉果沛發萬人歡呼曰神乎雖虜兵重圍吾無困竭之患矣既而朝廷署故寬州為青澗城世衡初至青澗教吏民習射雖僧道婦人亦習之以銀為射的中者與之既而中者益多其銀重輕如故而其的漸逺且小矣或爭徭役優重亦使之射射中者得優處有過失亦使之射射中則釋之由是人人皆能射胡酋蘇慕恩部落最强世衡皆撫而用之嘗夜與慕恩飲出侍姬以佐酒既而世衡起入潛於壁隙窺之慕恩竊與侍姬戲世衡遽出掩之慕恩慚愧請罪世衡笑曰君欲之耶即以遺之由是得其死力諸部有二者使慕恩討之無不克青澗東北一舍而逺距無定河北有虜塞虜常濟河為患世衡數使屬羌擊之往必破走前後取首級數百牛羊萬計未嘗勞士卒也故功多而費寡建營田二千頃歲收其利募商賈使通其貨或先貸之本速其流轉歲時間其息十倍乃建白城中芻錢糧幣軍需城守之具皆不須外計一請自給在青澗為屬吏所訟不法事按驗皆有狀鄜延路經略使龎籍奏世衡披荆棘立青澗城若一一拘以文法則邊將無所措手足詔勿問及徙知環州將行别龎籍拜且泣曰世衡心腸鐡石也今日為公下淚矣王韶守熙河引兵城渭源堡及乞神平堡破䝉羅角抹耳水已等族初羌保險諸將謀置陳平地韶曰賊不舍險來鬭則我師必徒歸今入險地當使險為吾有乃徑趨抹邦山壓敵軍而陳令曰敢言退者斬賊乘高下鬭師小却韶躬擐甲胄麾帳下兵逆擊之羌大潰焚其廬帳而還洮西大振會瞎征度洮為之援餘黨復集韶戒别將由竹牛嶺路張軍聲而潛師越武勝遇瞎征首領瞎藥等與戰破之遂城武勝建為鎮洮軍嶽飛拒賊於江西固石洞賊彭友悉衆至雩都迎戰躍馬馳突飛麾兵即馬上擒之餘酋退保固石洞洞高峻環水止一徑可入飛列騎山下令皆持滿黎明遣死士疾馳登山賊衆亂棄山而下騎圍之賊呼丐命飛令勿殺受其降楊存中隆興二年金人再入關議割蜀之和尚原以畀之存中入對曰和尚原隴右之藩要也敵得之則可以睥睨漢川我得之則可以下兵秦雍曩議豫金人吳璘力爭不從今璘在逺不及知臣若不言非獨負陛下亦有愧於璘近者王師盡鋭而後得願毋棄金人攻蜀所選士卒千取百百取十戰被重鎧登山攻險每一人前輒二人推其後前者死後者被其甲以進又死則又代之其為必取計如此張浚合五路兵次富平都統制又會諸將議戰吳玠曰兵以利動今地勢不利未見其利宜擇高阜據之使不可勝諸將皆曰我衆彼寡又前阻葦澤敵有騎不得使何用他徙已而敵驟至輿柴囊土藉淖平行進薄玠營軍遂大潰董摶霄建議於朝曰淮南為南襟㗋江淮要衝之地其地一失兩淮皆未易復也則救援淮安誠為急務為今日計莫若於黃河上下并瀕淮海之地及南自沭陽北抵沂莒贛榆諸州縣布連珠營每三十里設一總寨三十里又設一小寨使斥堠烽燧相望而巡邏往來遇賊則并力野戰無事則屯種而食然後進有援退有據此善戰者所以自為不可勝以待敵之可勝也魏勝字彥威淮陽軍宿遷縣人多智勇善騎射應募為弓箭手紹興三十一年金人將南侵聚芻糧造器械籍諸路民為兵勝躍曰此其時也聚義士三百北渡淮取漣水軍宣布朝廷德意不殺一人漣水民翕然以聽遂取海州郡守渤海高文富聞勝起遣兵來捕勝迎擊走之追至城下衆驚傳水陸悉有兵城中大恐文富閉門守驅民上城禦之勝令城外多張旗幟舉烟火為疑兵又遣人向諸城門諭以金人棄信背盟無名興師本朝寬大愛民之意城上民聞之即開門勝遣勇鋭者登城樓餘自門入莫有禦者獨文富與其子安仁率牙兵拒守勝整軍與安仁父子戰譙門內殺安仁及州兵千餘擒文富民皆安堵勝權知州金人多伏兵勝兵遇伏皆赴寨金人襲之勝單騎而殿以大刀奮擊金人望見勝知其為將也以五百騎圍之數重勝馳突四擊金兵追之馬中矢踣步而入寨無敢當者金人又急攻絶其水寨中食乾糒殺牛馬飲血勝默禱而雨驟作金人攻益急周山為營勝度其必復攻海州因間出寨趨城中金人果解蒼山圍自新橋抵城下勝出戰皆捷金分兵四面攻勝募士登城以禦矢石如雨者七日金兵死傷多遁去勝嘗出戰矢中鼻貫齒不能食猶親禦戰勝起義久朝廷尚未知沿海制置使李寶遣其子公住由海道覘敵至州始遣忠義將朱震禇道詣行在白勝姓名於執政始知勝之功焉金人遣山東路都統總管以兵十萬攻海州時寶帥海州水陸並進抵城北砂巷勝率衆合寶軍大破之斬首不可計堰水為之不流餘悉奔潰勝獨率兵追北二十里至新橋又破之盡獲其鞍馬器甲寶亦駐海州為進取計金人復遣烏津太師發諸路兵二十萬來攻海州先遣一軍自州西南斷勝軍餉道勝擇勇悍士三千餘騎拒於石闥堰金軍不能進逮夜始還留千人備險隘金兵十萬來奪勝率衆鏖戰殺數千人餘皆遁去下令守險勿追報寶寶以防海道登舟不復發兵金兵盛集勝力拒之自旦至暮金兵不能奪勝令步卒整隊前行自為殿時百姓以寶既登舟懼金兵大至皆欲入城統制郭蔚閉城門不納人民牛馬蔽野呼號動地城中亦懼勝入城諭以賊勢退怯之狀固守可保無虞乃開門盡納之居無何金兵環城圍數重勝與郭蔚分兵備禦偃旗息鼓寂若無人金人驚疑數日不敢攻已乃植雲梯置炮石四面合圍負土填壕勝俟其近城鳴鼓張旗矢石俱發繼以火牛金液凡三晝夜金兵竟不能近於是罷攻修營壘絶河道謀為固守勝俟其不備掩擊或獨出擾之使不得休息乂間夜發兵劫其營或焚其攻具既而金人併力急攻勝告急於李寶寶以聞還報城中已命張子蓋率兵來解圍金人亦知子蓋軍且至已有退意頃之子蓋先帥騎兵至勝出與子蓋議戰事且促其步卒勝出軍城北砂巷與金軍大戰斬首不可計追數十里餘兵皆遁勝與子蓋議進討子蓋曰受詔解圍不知其他遂率軍還城中疑懼欲隨王師出勝親邀於道而議之至漣水軍與偕還時都督張浚在建康招勝詢以軍務轉閣門宣贊舍人差充山東路忠義軍都統制仍知海州隆興元年詔以鎮江御前同統制魏全來守海州督府亦遣賈和仲充山東河北路招撫使節制本路軍馬海州駐劄和仲忌勝隂誘忠義軍使不安勝與辨是非和仲又讒勝於都督都督惑之呼勝至鎮江計事罷其職改京東路馬步軍副總管都督府統制建康府駐之既而督府知和仲所誣罷之復勝舊職勝既還海州鎮撫一方民安其政海州城西南枕孤山賊至登山瞰城中虛實立見故西南受敵最劇勝築重城圍山在內冦至則先據之不能害吳玠守蜀烏珠及劉䕫率十萬騎入侵自鐡山鑿崖開道循嶺東下玠以萬人當其衝弟璘率輕兵由七方關倍道而至與金兵轉戰七晝夜始得與玠合敵首攻玠營玠擊走之又以雲梯攻壘壁玠使人以撞竿碎其梯以長矛刺之璘拔刀畫地謂諸將曰死則死此退者斬金分軍為二烏珠陳於東韓常陳於西璘率鋭卒介其間左縈右繞隨機而發戰久璘軍少憊急屯第二隘金生兵踵至人披重鎧鐡鈎相連魚貫而上璘以駐隊矢迭射矢下如雨死者層積敵踐而登薩里罕駐馬四視曰吾得之矣命攻西北樓姚仲登樓酣戰樓傾以帛為繩挽之復正金人用火攻樓以酒缶撲滅之玠急遣田晟率兵以長刀大斧左右擊明炬四山震鼓動地明日大出兵統領王喜王武率鋭士分紫白旗入金營金陳亂奮擊射韓常中左目金人始宵遁梁侯景反陷厯陽至新林帝使羊侃入副宣城王都督城內諸軍景卒既至百姓競入公私混亂無復次序侃乃區分防礙皆以宗室間之軍人爭入武庫自取器甲所司不能禁侃命斬數人爭方得止及賊逼城衆皆恟懼侃僞稱得外射書云邵陵西昌侯已至近路衆乃少安賊攻東掖門縱火甚盛侃以水沃滅火射殺數人賊乃退有詔送金五千兩銀五千兩絹萬匹賜戰士侃辭不受部曲千餘人並私加賞賚賊為尖頭木驢攻城矢石所不能制侃作雉尾炬施鐡鏇以油灌之擲䭾驢上焚之俄盡賊人又東西築二土山以臨城城中震駭侃命為地道潛引其土山不能立賊又作登城樓高十餘丈欲臨射城中侃曰車高塹虛彼來必倒可卧而觀之及車動果倒衆皆服焉賊既頻攻不捷乃築長圍朱异張綰議出擊之帝以問侃曰不可賊多日攻城不能下故立長圍欲引城中降者耳今擊之出人若少不足破賊若多則一旦失利門隘橋小必大致挫衄不從遂使千餘人出戰未及交鋒望風退走果以爭橋赴水死者大半西魏將韋孝寬守玉壁時東魏大將高歡傾山東之衆志圖西入以玊壁衝要先命攻之連營數十里乃於城南起土山欲乘之以入當其山處城上先有兩高樓孝寬更縛木接之令極高峻多積戰具以禦之歡使謂城中曰縱爾縛樓至天我會穿城取爾遂於城南鑿地道又於城北起土山且作且攻晝夜不息孝寬復掘長塹截其地道仍簡戰士屯城外塹上每穿至塹戰士即擒殺之又於塹外積柴貯火敵人有在地道內者便下柴火以皮鞴吹之火氣一衝咸即灼爛城外又造攻車車之所及莫不摧毁雖有排楯莫之能撓孝寬乃縫布為慢隨其所向則張設之布既懸於空中其車竟不能壞城外又縛松於竿灌油加火規以燒布并欲焚樓孝寬復作長鐡鈎利其鋒刃火竿既來以鈎遙割之松麻俱落城外又於城西面穿地作三十一道分為四路於其中各施梁柱作訖以油灌柱放火燒之柱折城並崩壞孝寬又隨崩處竪木柵以扞之敵不能入城外盡其攻擊之術孝寬咸拒破之歡無如之何乃遣倉曹參軍祖孝徴謂曰未聞救兵何不降也孝寬報云我城嚴固兵有食餘攻者自勞守者常逸豈有旬朔之間已須救援適憂爾衆有不測之危我關西男子必不為降將軍也孝徴乃射募格於城中云能斬城主降者拜太尉封郡公邑萬戶賞帛萬匹孝寬手提書背反射城外云若有斬高歡者一依此賞孝寬弟子遷先在山東又鎖至城下臨以白刃云若不早降便行大戮孝寬慷慨激揚略無顧意士卒莫不感勵歡苦戰六旬傷及病死者十四五智力俱困因而發疾夜遁去後因此遂卒魏王思政守潁川東魏太尉高嶽東攻築土山以臨城飛梯火車盡攻擊之法思政亦作火矟因迅風便投之土山又射以火箭燒其攻具仍募勇士縋而出戰據其兩土山置樓堞以助防守高澄更益嶽兵堰洧水以灌城時有怪獸每衝壞其堰然城被灌已久多亦崩壞嶽悉衆苦攻思政身當矢石與士卒同勞苦嶽乃更修堰作鐡龍雜獸用堰水神堰成水大至城中水泉湧溢懸釡而炊糧力俱絶慕容紹宗劉豐生及慕容永珍意以為間共乘樓船以望城內合善射人俯射城中俄而大風暴起船乃飄至城下城上人以長鈎牽船弓弩亂發紹宗窮迫赴水而死豐生浮向土山復中矢而斃擒永珍并獲船中器械思政謂永珍曰僕之破亡在於晷漏誠知殺卿無益然人臣之節守之以死乃流涕斬之思政初入潁川士卒八千人被圍既久城中無鹽腫死者十六七及城陷之日存者才三千人雖外無救援亦無叛者高澄乃率步騎十萬來攻自於堰下督勵士卒增功築堰時盛夏水壯城北面遂壞頃之水便益滿無措足之地遂被擒高澄義而禮之唐馬燧鎮太原燧以晉陽王業所起度都城東西平易受敵時天下騷動北邊數有警急乃引晉水架汾而注城之東瀦以為池寇至計省守陴者萬人又決汾水環城多為池沼植桞以固堤太原承前政鮑防敗軍之後兵甲寡弱燧乃悉召將吏牧馬厮役得數千人悉補騎卒教之數月為精騎造甲者今為長短三等稱其所衣以便進趨唐朱泚亂德宗幸奉天數日賊軍至造雲橋成闊數丈以巨輪為腳推之使前施濕氊生牛革多懸水囊以為障直指城東北隅兩旁搆木為廬冒以牛皮回環相屬負土運薪於其下以填壕塹矢石不能傷城中恟懼相顧失色帝召渾瑊勉諭之令齎空名誥身自御史大夫實封五百户已下者千餘軸募諸軍突將敢死之士以當之兼賜瑊御筆一管當戰勝量其功伐即著其名授之不足者筆書其身因命以位撫瑊背而遣之前一日瑊揣雲橋來路先鑿地道下深丈餘上積馬糞深五六尺次二日即令爇火次一日復下柴薪夜燒之平明火熖高於城壘是時北風正急賊乃隨風推橋以薄城下賊三千餘人相繼而登城上士卒皆大寒餒又少甲胄瑊但感激誡勵之以饑弱之衆當劇賊之鋒雖力戰應敵人憂不濟公卿以下仰首祝天賊徒至地道所橋腳陷不能進須臾風廽轉熖雲橋焚為燼灰賊焚死者數千城中歡譟振地時瑊中流矢遽自拔之血流霑足格鬭不已不言瘡痛以激士心既而李懷光大軍至賊解圍去吳少誠玫許州上官涗知節度留後欲棄城走判官劉昌裔追止之曰留後既受詔宜以死守城况城中士馬足以破賊但堅壁不戰不過五七日賊勢必衰我以全制之可也涗然之賊日夕攻急堞壞不得修昌裔令造戰棚木柵以代之募壯士破營得突將千人鑿城分出大破之因立戰棚木柵於城上以故不陷五代梁軍敗於上黨晉人乘勝進迫澤州河南留守張全義遣牛全節救之時晉人新勝其鋒甚盛存節引軍而前銜枚夜至澤州晉軍尋至乃分布守禦晉軍四面攻鬭開地道以入城存節亦以隧道應之逆戰於地中晉軍不能進又以徑弩射之中者人馬皆洞經十三日晉軍死傷甚衆焚營而退郡以獲全黃巢陷長安趙犨為陳州刺史謂諸將吏曰以吾計巢不為長安市人所誅必驅其衆東走吾州適當其衝矣乃治城池為守備遷民六十里內者皆入城中選其子弟配以兵甲以其弟昶珝為將巢敗果東走先遣孟楷據城昶擊破之執楷歸巢從後至聞楷被執大怒既而秦宗權以蔡州附巢巢勢甚盛乃悉衆圍犨置舂磨糜人之肉以為食陳人恐犨語其下曰君家三世陳將必能保此爾曹男子苐當於死中求生建功立業未必不因此時陳人皆踴躍巢柵城北三里為八仙營營間置百官聚餉糧欲以久敝之其兵號二十萬陳人舊有巨弩數百廢壞後生弩工皆不識其器珝創意理之弩矢激五百步人馬皆洞以故巢不敢近圍凡三百日犨食將盡乃乞兵於梁梁太祖與李克用皆自將會擊敗巢將黃鄴於西華西華有積粟巢恃以為餉鄴又敗巢乃解圍去淮南兵圍蘇州推洞屋攻城吳越將臨海孫琰置輪於竿首垂絙投錐以揭之攻者盡露炮至則張網以拒之淮南人不能克吳越王鏐遣牙內指揮使錢鏢行軍副使杜建徽等將兵救之蘇州有水通城中淮南張網綴鈴懸水中魚鱉過皆知之吳越遊奕都虞候司馬福欲潛行入城故以竿觸網敵聞鈴聲舉網福因得過凡居水中三日乃得入城由是城中號令與援兵相應敵以為神晉將李嗣昭守潞州汴將李思安將兵十萬攻之乃築夾城深溝高壘內外重復飛走路絶嗣昭撫循士衆登城拒守嘗饗士嗣昭張樂流矢中足密拔之坐客不之覺酣飲如故以安士心梁祖馳書說誘百端嗣昭焚其書斬其使者城中固守經年晉王率周德威等來攻梁軍梁兵大潰嗣昭方開門後周韋孝寬在汾州屬生胡抄掠居人阻斷河路孝寬深患之而地入於齊無方誅剪欲當要處置一大城乃於河西徴役徒十萬甲士百人遣開府姚嶽監築之嶽色懼以兵少為難孝寬曰計成此城十日即畢既去晉州四百餘里一日創手二日僞境始知設令晉州徴兵二日方集謀議之間自稽三日計其軍行三日不到我之城隍足得辦矣乃令築之齊人果至南首疑有大軍乃停留不進其夜又令汾州以南傍介山稷山諸村所在縱火齊人謂是軍營遂收兵自固版築克就卒如其言唐貞元中楊朝晟奏方渠合道水波皆吐蕃要路請城其地以備之詔問所須幾何朝晟奏曰臣部下兵自可集事不煩外助復問前築鹽州凡興師七萬今何其易也朝晟曰鹽州之役諸軍蕃戎盡知之今臣境邊虜若大興兵即戎蕃來寇寇則戰戰則無暇城矣今請密發軍士不十日至塞下未三旬而工畢蕃人始知巳無奈何上從之已事軍還吐蕃始來數日退張仁願為朔方軍總管先是朔方軍北至突厥以河為界河北岸有拂雲神祠突厥將入寇必先詣祠祭酬求福因收馬料兵而後渡河時突厥默啜盡衆西擊突厥施葛娑仁願請乘虛奪取漠南之地於河北築三受降城首尾相應以絶南寇之路太子少師唐休景以為西漢已來皆北守黃河今於寇境築城恐勞人費功終為賊虜所有建議以為不便仁願固請不已中宗竟從之六旬而三城俱就以拂雲祠為中城與東西兩城相去各四百餘里皆據津濟遙相應接北拓地三百餘里於牛頭朝那山北置烽􅕤一千八百所自是突厥不得度山牧馬朔方無復寇掠减鎮兵數萬人仁願初建三城不置壅門及格曲戰敵之具或問曰此邊城禦賊之所不為守備何也仁願曰兵貴在攻取不宜退守寇若至則當併力出戰回顧望城猶須斬之何用守備則生其退恧之心也其後常元楷為朔方軍總管始築壅門以備寇議者以此重仁願而輕元楷焉劉昌為涇原營田使躬率士衆力耕三年軍食豐羡受詔築城平凉以扼彈筝峽口昌命從事旬餘而畢又於平凉西别築胡谷堡名曰彰信平凉當四會之衝居北地之要分兵援戍遏其要衝築神威軍於青海中龍駒島名神龍城吐蕃屏跡不敢近青海范希朝為振武節度使有党項室韋交居川阜凌犯為盜日入慝作謂之刮城門居人懼駭鮮有寧日希朝於要害處置堡柵斥􅕤嚴密人遂獲安隋時突厥入寇隋將楊素擊之先是諸將與虜戰每慮胡騎奔突皆戎車步騎相參舁鹿角為方陳騎在其內素謂人曰此乃自固之道非取勝之方也於是悉除舊法令諸軍為騎陳突厥頭可汗聞之大喜率精騎十餘萬而至素奮擊大破之素多權略乘機赴敵應變無方然大抵馭戎嚴整有犯軍令者立斬之無所寬貸每將臨寇求人過失而斬之多者百餘人少不下十數流血盈前言笑自若及其對陳先令一二百赴敵陷陳而還者則已如不陷陳而還者無問少長悉斬之又令二三百人復進還如向法將士股栗有必死之心由是戰無不勝時稱名將宋五路討李繼遷以李重貴為麟府都部署得對殿因言賊居沙磧中逐水草牧畜無定居便於戰鬭利則進不利則走今五路齊入彼聞兵勢大或不來接戰且謀逺遁欲追則人馬乏食將守則地無堅壘賊輩未平臣何顔以見陛下太宗善之出御劍以賜又遣使撫勞至則諸將果無大功太平興國一年梅山洞蠻叛命田紹斌翟守素分路掩擊至邵州聞蠻酋包漢陽死去其居十里而陳大敗之擒蠻二萬令軍取利劍二百斬之留五千餘人遣歸使曉諭諸洞自是蠻人不擾三年梅山洞蠻恃險又叛詔遣翟守素率諸州屯兵往擊之值霖雨彌旬弓弩解弛不堪挽明日將接戰守素一夕令削木為弩及旦賊奄至交射之賊遂敗乘勝逐北盡平其巢穴先是數郡大吏富人多與賊帥包漢陽交通既而得其書訊數百封守素並焚之反側以定武編後集卷二
