body:
  text: 武編後集卷三明唐順之撰示弱春秋時楚武王侵隨使薳章求成焉軍於瑕以待之隨人使少師董成鬭伯比言於楚子曰吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難間也漢東之國隨為大隨張必棄小國小國離楚之利也少師侈請羸師以張之王毁軍而納少師少師歸請追楚師隨侯將許之季梁止之曰天方授楚楚之羸其誘我也君何急焉君姑修政而親兄弟之國庶免於難隨侯懼而修政楚不敢伐前漢韓王信反亡走胸奴與胸奴謀攻漢髙帝自往擊之至晉陽使人覘胸奴冒頓匿其壯士肥馬牛但見老弱及羸畜使者十輩來皆言胸奴可擊帝使劉敬復往使胸奴還報曰兩國相擊此宜誇矜見所長今臣往徒見羸胔老弱此必欲見短伏竒兵以爭利愚以為胸奴不可擊也是時漢兵已踰句注三十餘萬衆兵已行帝怒以為沮吾軍械繫敬廣武遂往至平城胸奴果出竒兵圍髙帝白登七日然後得解晉末妖賊孫恩作亂出海鹽劉裕築城於故海鹽賊日來攻城內兵少裕乃選敢死士擊走之時雖連勝裕深慮衆寡不敵乃一夜偃旗示以羸弱觀其懈乃奮擊大破之後周末楊堅作相尉遲逈拒命堅遣將于仲文率兵定關東次蓼堤逈將檀讓擁衆數萬人仲文以羸師出戰讓悉衆來拒仲文僞北讓軍頗驕於是遣精兵左右翼擊之大敗讓軍進攻梁郡逈守將劉子寬棄城遁走後唐伐蜀班師副招討使任圜至利州㑹康延孝叛據莫州掌書記張礪獻策於圜請伏精兵於後先以羸師誘之圜深以為然延孝驍將也任圜儒生也延孝覩其羸師殊不介意及戰酣圜發精兵擊之遂擒延孝五代周世宗伐江南大將張永德請行效命師至夀春劉仁贍堅壁不下永德出疲兵居前誘之伏精兵於便地每戰佯不利北退三十里伏兵悉起前後夾攻大敗之仁贍僅免宋至道中折御卿授府州節度使而兵不滿數千太宗戒之曰北人嘗以西戎為小蕃必輕敵而深入或引衆入境爾可先令近下蕃族以羸師誘之伏精兵以擊之必在吾掌中矣御卿果成充捷韓魏相攻齊相田忌率兵伐魏魏將龎涓聞之釋韓而歸齊孫子謂田忌曰彼三晉之兵素皆悍勇而輕齊齊號為怯善戰者因其勢而利導之兵法百里趨利者蹶上將五十里趨利者半至乃使齊軍入魏地為十萬竈明日為五萬竈又明日為三萬竈龎涓行三日大喜曰我固知齊卒怯入吾地三日士卒亡者過半矣乃棄其步兵與其輕鋭倍日併行逐之孫子度其行暮當至馬陵馬陵道狹而旁多阻隘可伏兵乃斫大樹白而書之曰龎涓死此樹下於是令萬弩夾道而伏期日暮見火舉而俱發龎涓夜至斫樹下見白書乃舉火燭之讀書未畢齊軍萬弩俱發軍大亂龎涓乃自刎戰國趙將李牧常居代郡鴈門備胸奴以便宜置吏市租皆輸入幕府為士卒費日擊數牛饗士習騎射謹烽火多設間諜厚遇戰士為約曰單于為盜急入堡有敢捕虜者斬胸奴每入烽火謹輒入堡不敢戰如是數嵗亦不亡失然胸奴謂牧為怯趙王讓牧牧如故王怒使人代將嵗餘胸奴每來出戰數不利失亡多復遣牧牧至如故約胸奴數嵗無所得終以為怯邊士日得賞賜皆願一戰於是乃且選兵車得千三百乘騎萬三千匹百金之士五萬人控弓弩者十萬人悉勒習戰大縱畜牧人衆滿野胸奴小入佯走不勝以數千人委之單于聞之大喜率衆而來牧多為竒陳張左右翼擊之破殺胸奴十餘萬騎單于奔走十餘歲不敢近邊後漢末孫策攻陳登於匡琦城策初到旌甲覆水羣下咸欲引軍避之登乃閉門自守示弱不戰將士銜枚寂若無人登城觀形勢知其可擊乃申命士衆宿整兵器昧爽開南門引軍指賊營步騎抄其後策周章方結陳不得還船登縱兵乘之遂大敗陳霸先討杜龕以侯安都居守齊軍乘虛入據石頭遊騎至關下安都閉門偃旗幟示之以弱且令城中曰有登陴看賊者斬及夕賊收軍還石頭安都夜令士卒密營禦敵之具明晨賊騎又至安都率甲士三百人開東西掖門與戰大敗之賊乃退不敢逼臺城楚師次于句澨使廬戢黎侵庸及庸方城庸人逐之囚子揚窗三宿而逸曰庸師衆羣蠻聚焉不如復大師且起王卒合而後進師叔曰不可姑又與之遇以驕之彼驕我怒而後可克先君蚡冒所以服陘隰也又與之遇七遇皆北惟禆倏魚人逐之庸人曰楚不足與戰矣遂不設備楚子乘驛㑹師于臨品分為二隊子越自石溪子貝自仞以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸狄青為將党項犯塞時新募萬勝軍未習戰陳遇冦多北青為將一日盡取萬勝旗付虎翼軍使之出戰虜望其旗易之全軍徑趨為虎翼所破殆無遺類纍功至招討副使青在涇原常以寡當衆度必以竒勝預戒軍中盡捨弓弩皆執短兵密令軍中聞鉦一聲則止再鉦聲則嚴陳而陽却鉦聲止則大呼而突之士卒皆如其教才遇敵未接戰遽聲鉦士卒皆止再聲皆却虜人大笑相謂曰孰謂天使勇時虜人謂青為天使鉦聲止忽前突之虜兵大亂相蹂踐死者不可勝紀董摶霄還軍守於潛而賊兵大至焚倚郭廬舍摶霄按軍不動左右請出兵摶霄曰未也遣人執白旗登山望賊約曰賊以我為怯必少懈伺其有間則麾所執旗又伏兵城外皆授以火炮復約曰見旗動炮即發已而旗動炮發兵乃盡出斬首數千級隋末賊帥孟讓衆十餘萬屯旴眙煬帝遣王世充拒之世充保都梁山久不與戰乃宣言士卒亡叛使賊中聞之讓果大笑曰王世充文法吏何能為將吾當生縳之於是進攻其柵世充與戰佯不勝讓益輕之乃分兵虜掠世充知其可擊令軍中夷竈撒幕設方陳四面出戰大破之虜男女十萬餘口讓僅以身免示强春秋楚將子元以車六百乘伐鄭師於桔柣之門入自純門及逵市縣門不發楚言而出子元曰鄭有人焉諸侯救鄭楚師夜遁鄭人將奔桐丘諜告曰楚幕有烏乃止楚大饑戎伐其西南庸人帥羣蠻以叛楚麇人率百濮將以伐楚於是申息之北門不啓楚人謀徙於阪高蒍賈曰不可我能往冦亦能往不如伐庸夫麇與百濮為我饑不能師故伐我也若我出師必懼百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以往振廪同食後漢虞詡為武都太守以討叛羌羌乃率衆數千遮詡於陳倉崤谷詡即停車不進而上書請兵羌聞之乃分鈔旁縣詡因其兵散日夜倍道兼行百餘里令吏士各作兩竈日增倍之羌不敢逼或問孫臏減竈而君增之兵法日行不過三十里以戒不虞而今日且二百里何也詡曰虜衆多吾兵少徐行則易為所及速進則彼所不測虜見吾竈日增必謂羣兵來迎衆多行速必憚追我孫子見弱吾今示强勢不同故也到郡兵不滿三千而羌衆萬餘攻圍赤亭數十日詡乃令軍中使强弩勿發而潛發小弩羌以為矢力弱不能至併兵急攻詡於是使二十强弩共射一人發無不中羌大震退詡因出城奮擊多所殺傷明日悉陳其衆令從東郭門出北郭門入變易衣服回轉數周羌不知其數便相恐動詡計賊當退乃潛遣五百餘人於淺水設伏候其走路虜果奔因掩擊大破之示逺秦伐韓趙令趙奢將救之去邯鄲三十里而令軍中曰有以軍事諫者死秦軍鼓譟勒兵武安屋瓦盡震軍中候有一人言急救武安奢立斬之堅壁留二十八日不行復益增壘秦間來奢善食遣之間以報秦將秦將大喜曰夫去國三十里而軍不行乃增壘閼與非趙地也趙奢既已遣秦間乃卷甲而趨之一日一夜至令善射者去閼與五十里而軍軍壘成秦人聞之悉甲而至奢縱兵擊破之遂解閼與之圍後魏万侯醜奴稱亂關右魏將賀拔嶽討之軍於汧渭之間宣言逺近曰今氣候漸熱非征討之時待至秋涼更圖進取醜奴聞之遂以為實分遣諸軍散營農於岐山之北百里細川使太尉侯元進領兵五千據險立柵其千人以下為柵者亦有數處且田且守嶽知其勢分乃密嚴備晡時潛遣輕騎先行斷諸路然後諸軍盡發昧朝攻圍元進栅拔之諸所俘執者放之自餘栅悉降嶽星夜徑趨涇州其刺史侯長貴亦以城降醜奴乃棄平停而走唐吐蕃都支及遮匐二部叛詔裴行儉為洮州道總管行儉建議曰吐蕃背叛干戈未息敬𤣥審禮失律喪元安可更為西方生事今波斯王身殁其子泥涅帥師充質在京望差使往波斯册立即路由二蕃部落便宜從事必可有功髙祖從之因命行儉冊送波斯王仍為安撫大食使行至西州人吏郊迎行儉召其豪傑子弟千餘人隨己而西乃揚言紿其下曰天時方熱未可涉逺須涼秋之後方可漸行都支覘知之遂不設備行儉仍召四鎮諸蕃酋長豪傑謂曰憶昔此遊未嘗厭倦雖還京輦無時暫忘今因是行欲尋舊賞誰能從吾獵也蕃酋子弟請從者僅萬人行儉陽為略遊獵教試部伍數日遂倍道而進去都支部落十餘里先遣都支所親問其安否外示閒暇似非討襲續使人趣召相見都支先與遮匐通謀秋中擬拒漢使卒聞軍到計無所出自率兒姪首領等五百餘騎就營來謁遂擒之是日傳其契箭諸部酋長悉來請命並執送碎葉城簡其精騎輕齎曉夜前進將到遮匐途中果獲都支還使與遮匐使同來行儉釋遮匐使者令先往曉諭其主兼述都支已擒遮匐尋復來降示近春秋楚囊瓦伐吳師於豫章吳人見舟於豫章而潛師於巢冬十月吳軍楚師戰於豫章敗之遂圍巢克之獲楚公子繁後漢耿弇攻張步於劇步遣弟藍將精兵二萬屯西安分諸將萬餘人守臨淄相去四十里弇進軍畫中居二城之間弇視西安城小而堅藍兵又精臨淄名雖大而實易攻乃勑諸校曰後五日攻西安藍聞之晨夜警守至期夜半弇勑諸將皆蓐食㑹明至臨淄城荀梁等爭之以為宜速攻西安弇曰西安聞吾欲攻之日夜為備臨淄出不意至必驚擾吾攻之一日必拔臨淄即下西安孤張藍與步隔絶必復亡去兵法所謂擊一而得二者也若攻西安卒不能拔百人屯兵堅城死傷必多縱能拔之張藍引軍還奔臨淄并兵合勢觀人虛實吾深入敵境後絶轉輸敵制吾敝遂攻臨淄半日而拔藍棄西安而遁岑彭將兵三萬餘人南擊秦豐拔黃郵豐拒彭等於鄧數月不得進彭夜勒兵馬申令軍中使明早西擊山都乃縱所獲虜令得逃亡歸以告豐即悉其軍西邀彭彭乃潛兵渡沔水擊其軍於河頭山大破之縱山谷間伐木開道直襲黎丘擊破諸屯兵豐聞大驚馳歸救之彭依東山為營豐夜攻彭彭先為之備出兵逆擊之豐敗走後漢將吳漢岑彭討公孫述述使其將延岑等悉兵拒廣漢及資中又遣將侯丹率二萬餘人拒黃石彭乃多張疑兵使護軍楊翕與臧宫拒延岑自分兵浮江下還江州泝都江而上襲擊侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽使精騎馳廣都去成都數十里勢若風雨所至皆奔散初述聞漢軍在平曲故遣大兵逆之及彭至武陽繞出延岑軍後蜀地震駭曹公與袁紹相持官渡紹遣將郭圖淳于瓊顔良等攻東郡太守劉延於白馬紹引兵至黎陽將渡河公北救延荀攸說曰今兵少不敵分其勢乃可公到延津若將渡兵向其後紹必西應之然後輕兵襲白馬掩其不備顔良可擒也公從之紹聞兵渡即分兵西應公乃引軍兼行趨白馬未至十餘里良大驚來逆戰使張遼關羽前登擊破顔良遂解白馬之圍魏初馬超屯潼關曹公大破之諸將或問公曰初賊守潼關渭北道缺不從河東擊馮翊而反守潼關引日而後北渡何也公曰賊守潼關若吾入河東賊必引守諸津則西河未可渡也吾故盛兵向潼關賊衆悉南守西河之備虛故徐晃等得間取西河然後引軍北渡賊不能與吾爭西河者以有二將之軍也連車竪栅為甬道而南既為不可勝且以示弱渡渭為堅壘虜至不出所以驕之也故賊不為營壘而求割地吾順言許之所以縱逸其意使自安而不為備蓄士卒之力一朝擊之所謂疾雷不及掩耳兵之變化固非一道也魏將司馬懿征公孫淵師次于遼水東淵遣卑衍等步騎數萬阻遼水以拒之圍塹二十餘里懿令其軍穿圍盛兵多張旗幟出其東南賊盡鋭赴之乃泛舟潛濟急赴東北斜趨襄平衍等恐襄平無備夜遁走蜀諸葛亮領兵出斜谷魏將司馬懿屯北原後數日亮盛兵西行諸將皆謂欲攻西原郭淮獨以為此見形於西欲使官軍重應之必攻陽遂耳其後果攻陽遂有備不得上西魏末岷州羌據州城反魏將獨孤信討之信乃勒兵向萬年頓三交谷口賊并力拒守信因詭道趨稠松嶺賊不虞信兵之至覩風奔潰乘勝逐北徑至城下賊並出降唐嗣曹王臯討李希烈之叛成立堡柵於蔡山臯度峻險不可攻乃聲言西取蘄州理戰艦步兵傍南涯與舟師泝江而上賊以老弱守栅引軍循江隨戰艦南北與臯兵相去直蔡山三百餘里臯令步兵登舟順流東下不日拔蔡山賊還救間一日方至大破之因進拔蘄州降其將聲此擊彼前漢景帝時七國反周亞夫為將吳楚兵乏糧饑欲退數挑戰終不出夜軍中驚內相攻擊擾亂至于帳下亞夫堅卧不起頃之復定吳奔壁東南陬亞夫使備西北已而精兵果奔西北不得入乃大敗之後漢末黃巾賊起漢將朱俊率兵討之賊帥韓忠據宛拒雋雋兵少不敵乃長圍結壘起土山以臨城內鳴鼓攻其西南賊悉衆赴之雋自將精兵五千掩其東北乘城而入忠乃退保小城惶恐乞降西魏末涼州刺史宇文仲和據州不受代魏將獨孤信率兵討之仲和嬰城固守信夜令諸將以衝梯攻東北信親帥壯士襲其西南遲明克之魏田豫到馬城鮮卑攻圍之十重豫密使司馬建旌旗鳴鼓吹將步兵從南門出胡人皆屬目往赴之豫將精鋭自北門出鼓譟而起兩頭俱發出虜不意虜衆散亂皆無弓馬步走追三十餘里僵尸積地宋劉道濟為益州刺史州政失中羣盜蜂起攻圍州城道濟將裴方明出東門破賊三營斬首數萬級賊雖敗已復還合方明復僞出北門回擊城東大營殺千餘人時天大霧方明等復揚聲出東門而潛自北門出攻城北城西諸營賊衆大潰於是奔散越伐吳吳子禦之笠澤夾水而陳越子為左右句卒使夜或左或右鼓譟而進吳師分以禦之越以三軍潛涉當吳中軍而鼓之吳師大亂遂敗之漢王遣將韓信擊魏魏盛兵蒲坂塞臨晉信乃益為疑兵陳船欲渡臨晉而伏兵從夏陽以木罌缶渡軍襲安邑虜魏王豹郭淮討叛羌其羌遮塞等屯河關白土故城據河拒官軍淮見兵上流密於下流渡兵據白土故城擊大破之前燕將慕容垂討丁零翟釗于滑臺次于黎陽津釗於南岸拒守垂徙營就西津為牛皮船百餘艘載疑兵列艘泝流而上釗先以大衆備黎陽見垂向西津乃棄營西拒垂潛遣兵向黎陽津夜濟壁于河南釗聞而奔還士衆疲竭走歸滑臺釗攜妻子率數百騎走垂遣追擊之盡擒其衆狄青征儂智高時智高還守雍州青懼崑崙關險厄為所據乃按兵不動下令賓州具五日糧休士卒值上元節令張大燈燭首夜宴將佐次夜宴從軍官三夜宴軍校首夜樂飲徹曉次夜二鼓時青忽稱病暫入於內久之使人諭孫沔令暫主席行酒少服藥乃出數使勸勞座客至曉客未敢退忽有馳報者云是夜三鼓青已奪崑崙矣賊諜知不為備是夜大風雨青率兵半夜時度崑崙關既度喜曰賊不知守此無能為也彼為夜半風雨吾不敢來吾來所以出其不意也已近雍州賊方覺逆戰於歸仁鋪青登髙望之賊據坡上我軍薄之青使步卒居前匿騎兵於後巒使驍勇者執長槍居前羸弱悉在其後其前鋒孫節戰不利而死將卒畏青令嚴力戰莫敢退者青登髙丘執五色旗麾騎兵為左右翼出槍之後斷蠻軍為三旋而擊之人人皆殊死戰先是青已縱蕃部馬二千出賊後交擊左者右右者左已而右者復左左者復右賊不知所為賊之標牌軍為馬軍所衝突皆不能駐槍立加束軍士又縱馬上鐵連枷擊之遂皆披靡相枕藉死賊遂大敗智髙果焚城遁去智髙自起至平幾一年吏民不勝其毒先是謡言農家種糴家收而髙為青所破皆如其謡隋漢王諒作亂遣其將余公理自太行下河內隋將史祥討之軍於河陰久不得濟謂軍吏曰余公理輕而無謀才用素不足稱又新得志謂其衆可恃恃衆必驕且河北人先不習兵所謂擁市人而戰不足圖也乃令軍中修攻具攻河陽公理使諜知之果屯兵於河陽內城以拒祥祥於是艤船河南公理聚甲以當之祥乃簡精鋭於下流潛渡公理率衆拒之祥至濆水兩軍相對公理未成列祥縱擊大破之利春秋時楚伐絞軍其南門莫敖屈瑕曰絞小而輕輕則寡謀請無扞採樵者以誘之從之絞人獲三十人明日絞人爭出驅楚役徒於山中楚人坐其北門而覆諸山下大敗之為城下之盟而還陳豨反趙代皆豨有髙祖聞豨將皆故賈人上曰吾知與之矣乃多以金賂豨將豨將多降後漢光武初馮異與鄧禹率車騎將軍鄧𢎞等議攻赤眉異曰賊餘衆尚多可稍以恩信傾難卒以用兵破之也上令使諸將屯澠池邀其東而異擊其西一舉取之此萬成計也禹𢎞不從遂大戰赤眉佯敗棄輜重走車皆載土以豆覆其上兵士饑爭取之赤眉引還擊𢎞𢎞軍潰亂大為所敗魏曹公西征馬超與超夾潼關而軍公急持之而潛遣徐晃等夜渡蒲坂津據河西為營公自潼關北渡未濟超赴船急戰公放牛馬以餌賊賊亂取牛馬公乃得渡循河為甬道而南賊退距渭口公乃多設疑兵潛以舟載兵入渭為浮橋夜分兵結營於渭南賊夜攻營伏兵擊破之曹操與袁紹相持官渡既乃循河而西紹於是渡河追公軍至延津南公勒兵駐營南坂下使登壘視之曰可五六騎有頃復白騎稍多步兵不可勝數公曰勿復白乃令騎解鞍放馬是時輜重就道諸將以為敵騎衆不如還保營公曰此所以餌敵也如何去之紹騎將文醜與劉備將兵五千騎前後至諸將復白可上馬公曰未也有頃騎至稍多或分趨輜重公曰可矣乃皆上馬時騎不滿六百遂縱兵擊大破之晉將劉牢之討妖賊孫恩恩敗走虜男女二十餘萬一時入海懼官軍躡其後乃緣道多棄寶物子女時東土殷實莫不粲麗盈目牢之等遽於收斂故恩得逃去晉李矩守滎陽後趙石勒親率兵襲矩矩遣老弱入山令所在放牛馬因設伏以待之賊爭取牛馬伏發齊呼聲動山谷遂大破之斬獲甚衆勒乃退南涼秃髮傉檀守姑臧秦姚興遣將姚弼等至於城下傉檀驅牛羊於野弼衆抄掠傉檀因分擊大破之後魏末大將廣陽王元深伐北狄使于謹單騎入賊中示以恩信於是西部鐵勒酋長也列河等五萬餘户並欵附相率南遷廣陽欲與謹至折敦嶺迎接之謹曰陸汗拔陵兵衆不少聞也列河等歸附必來要擊彼若先據險要則難與爭鋒今以列河等餌之當競來抄掠然後設伏而待必指掌破之廣陽然其計拔陵果來擊破也列河於嶺上部衆皆沒謹伏兵發賊遂大敗悉收也列河之衆隋煬帝征髙麗于仲文率軍從樂浪道軍次烏骨城仲文簡羸馬驢數千置於軍後既而率衆東過高麗出兵掩襲輜重仲文回擊大破之唐薛萬均為幽州羅藝將㑹竇建德率衆十萬來冦范陽萬均曰衆寡不敵今若出門百戰百敗當以計取之可令羸兵弱馬背城為陳以誘之觀賊之勢必渡水交兵萬均請精騎伏於城側待其半渡擊之從其言建德果引兵渡水因邀擊大破之漢𫝊介子以駿馬監求使大宛因詔令責樓蘭龜兹國介子至樓蘭責其王教胸奴遮殺漢使大兵方至王茍不教胸奴胸奴使過至諸國何為不言王謝服言胸奴使屬過當至烏孫道過龜兹介子復責其王王亦服罪介子從大宛還到龜兹龜兹言胸奴使從烏孫還在此介子因率其吏士共誅斬胸奴使者還奏事詔拜介子為中郎遷于樂監介子謂大將軍霍光曰樓蘭龜兹數反覆而不誅無所懲艾介子過龜兹時其王近就人易得也願往刺之以示威諸國大將軍曰龜兹道逺且驗之於樓蘭於是白遣之介子與士卒俱齎金幣揚言以賜外國為名至樓蘭樓蘭王意不親介子介子陽引去至其西界使譯謂曰漢使者持黃金錦繡行賜諸國王不來受我去之西國矣即出金幣以示譯譯還謂王王貪漢物來見漢使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王王起隨介子入帳中屏語壯士二人從後刺之刃交胸立死其貴人左右皆散走介子告諭以王負漢罪天子遣我來誅王當更立太子質在漢者漢兵方至無動動滅國矣遂持王首還詣闕裴矩為黃門侍郎闕以始畢可汗强盛漸生怨隙言於帝曰突厥本淳易可離間但由其內多有羣胡盡皆桀黠教導之耳臣聞史蜀胡悉兀多奸計幸於始畢請誘殺之帝曰善矩因遣人告胡悉曰天子出珍物今在馬邑欲共蕃酋多作交關若前來者即得好物胡悉貪而信之不告始畢率其部盡驅六畜星馳爭進冀先互市矩伏兵馬邑下誘而斬之詔報始畢曰史蜀胡悉忽領部落走來至此云背可汗請我容納突厥既是我臣彼有背叛我當共殺今已斬之故令往報南涼秃髮傉檀伐沮渠䝉遜於姑臧至蕃禾莒藋掠五千餘戶其將屈古進曰陛下轉戰千里前無完陳徙戶資財盈溢衢路宜倍道旋師早渡峻險䝉遜善於用兵士衆習戰若輕軍卒至出吾慮表大敵外逼徙戶內攻危道也衛尉伊方延曰我軍勢方盛將士勇氣自倍彼徒我騎勢不相及若倍道旋師必捐棄資財示人以弱非計也俄而昏霧風雨䝉遜軍大至傉檀大敗而還唐武德中李靖隨河間王孝恭討蕭銑於江陵銑悉見兵出拒戰孝恭將擊之李靖止之曰彼救敗之師策非素立勢不能久不若且泊南岸緩之一日彼必分其兵或留拒我或歸自守兵分勢弱我乘其懈而擊之蔑不勝矣今若急之彼則併力死戰楚兵剽鋭未易當也孝恭不從留靖守營自率鋭師出戰果敗走趨南岸銑衆委舟收掠軍資人皆負重靖見其衆亂縱兵奮擊大破之乘勝直抵江陵入其外郭又攻水城拔之大獲舟艦李靖使孝恭盡散之江中諸將皆曰破敵所獲當藉其用奈何棄以資敵靖曰蕭銑之地南出嶺表東距洞庭吾懸軍深入若攻城未拔援兵四集吾表裏受敵進退不獲雖有舟楫將安用之今棄舟艦使塞江而下援兵見之必謂江陵已破未敢輕進往來覘伺動淹旬月吾取之必矣銑援兵見舟艦果疑不進銑降毒晉師伐秦秦人毒涇上流師人多死飲毒水故後魏時庫莫奚亂詔濟陽王率衆討之乃為毒酒賊既逼棄營而走賊至競飲毒作王以輕騎縱擊俘獲殆盡亂吳伐越越子勾踐禦之陳於檇李勾踐患吳之整也使死士再擒焉不動使罪人三行屬劍於頸而辭曰二君有治臣奸旗鼓不敏於君之行前不敢逃刑敢歸死遂自刎師屬之目越子因而伐之大敗之春秋時吳伐楚吳公子光喪其乘舟餘皇光請於其衆曰喪先王之乘舟豈惟光之罪衆有焉請藉取之以救死衆許之使長鬛者三人潛伏于舟側曰我呼餘皇則對師夜從之三呼皆對楚人從而殺之楚師亂吳人大敗之取餘皇以歸五代梁太祖屯軍於岐下晉軍潛襲絳州前軍不利晉軍恃勢而攻臨汾氏叔宗嚴備禦乃於軍中選壯士二人深目虬鬚貌如沙陀者令就襄陽縣牧馬於道側蕃冦見之不疑二人因雜其行間俄而伺隙各擒一虜而來晉軍大驚且疑有伏兵遂退據滿城後漢初馮異將數萬人與賊約期㑹戰使壯士變服與赤眉同伏于道側明日赤眉使萬人攻異前部異才出兵以救之才少出兵所以示弱賊見勢弱遂悉衆攻異異乃縱兵大戰日昃賊氣衰伏兵猝起衣服相亂赤眉不復識别衆遂大潰追擊大破於崤底嶽飛遇烏珠趨建康飛設伏牛頭山待之夜令百人黑衣混金營中擾之金兵驚自相攻擊烏珠次龍灣飛以騎三百步兵二千馳至新城大破之烏珠奔淮西遂復建康飛奏建康為要害之地宜選兵固守仍益兵守淮拱護腹心帝嘉納之詭異春秋時齊師宋師次于郎魯侯禦之公子偃曰宋師不整可敗也宋敗齊必還請擊之公弗許自雩門竊出䝉臯比而先犯之公從之大敗宋師於乘丘齊師乃還晉楚相持城濮之戰晉師陳于莘北胥臣以下軍之佐當陳蔡楚子玊以若敖之六卒將中軍曰今日必無晉矣子西將左子上將右胥臣䝉馬以虎皮先犯陳蔡陳蔡奔楚右師潰狐毛設二斾而退之欒枝使輿曳柴而僞遁楚師馳之原軫郤溱以中軍公族橫擊之狐毛狐偃以上軍夾攻子西楚師敗績朱滔帥幽州成德軍李寶臣死其子惟嶽謀襲父位滔與張孝忠征之大破維嶽於束鹿進圍深州維嶽統萬餘衆及田恱援兵至束鹿惟嶽將王武俊以騎三千方陳橫進滔繪帛為狻猊象使猛士百人䝉之鼓譟奮馳賊馬驚亂隨擊大破之惟嶽焚營而遁春秋時楚師伐吳針尹固與王同舟使王執燧象以奔吳師戰國燕師伐齊已下七十餘城圍即墨未下齊將田單乃收城中得千餘牛為絳繒衣畫以五彩龍文束兵刃於其角而灌脂束葦於尾燒其端鑿城數十穴夜縱火牛壯士五千人隨其後牛尾熱怒而奔燕軍大驚牛尾炬火光明炫耀燕軍視之皆龍文所觸盡死傷五千人因銜枚擊之而城中鼓譟從之老弱皆擊銅器聲動天地燕軍大駭敗走而收齊七十餘城殷浩北伐請江逌為咨議參軍姚襄結營以逼浩浩令逌擊之逌進軍至襄營謂將校曰今兵非不精而衆少於羌且壁柵固難與較力吾當以計破之乃取雞數百以長繩連之繫火於足羣雞駭散飛集襄營火發因其亂隨而擊之襄遂敗避春秋時楚伐隨軍於淮漢之間隨將季梁曰楚人尚左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃攜矣少師曰不當王非敵也弗聽戰于速把隨師敗績後漢末袁尚據鄴率兵圍擊兄談於南皮留蘇由審配守鄴曹操圍鄴尚還救諸將皆以為此歸師人自為戰不如避之操曰尚從大道來當避之若循西山來者此成擒耳尚果循西山來臨滏水為營夜遣兵犯圍操逆擊破走之城中崩潰晉劉裕征慕容超盧循乘虛入冦建業裕急還救時議者欲分兵屯守諸津裕曰賊衆我寡分其兵則人測虛實一處失利則阻三軍之心若聚衆石頭則衆力不分裕移鎮石城賊大至裕曰賊若新亭直上且將避之若回泊蔡洲成禽耳徐道覆欲自新亭焚舟而戰盧循多疑少決每求萬全乃泊蔡洲以待晉軍潰裕登石頭以望循軍初見引向新亭宋武顧左右失色既而回泊蔡洲道覆猶日日欲上循禁之使羸老悉乘舟艦向白石裕慮其從白石西上乃率劉毅等北出拒之賊遂率衆數萬屯丹陽郡裕率諸軍馳歸衆慮賊過江咸謂當徑還拒戰裕乃先引軍還石頭衆莫之曉是日大熱三軍疲頓既上城解甲息士洗浴飲食久之乃出列陳於南塘參軍褚叔度朱齡石率徑勇千餘人過淮賊數千皆長刀矛鋌刃甲耀日奮躍爭進齡石所領多鮮卑善步矟並結陳以待之賊短兵弗能抗死傷者數百人乃退走大軍次大雷賊方江而下裕躬提􅜖鼓命衆軍齊力擊之軍中多萬鈞神弩所至莫不摧陷裕自於中流蹙之因風水之勢賊艦悉薄西岸岸上軍先備火具焚之大敗循還潯陽遂走豫章怒楚漢相持彭越數絶楚糧道項羽欲討越謂其將曹咎曰謹守成臯漢欲挑戰謹勿與戰無令得東我十五日必誅彭越定梁地漢果數挑戰楚軍不出使人辱之五六日曹咎怒渡兵泛水漢擊之大破楚軍盡得楚貨賄曹咎自剄汜水上前秦苻氏遣將苻黃眉鄧羌等率步騎討姚襄襄深溝髙壘固守不戰鄧羌說黃眉曰傷弓之鳥落於虛發襄頻為晉將桓溫所敗鋭氣衰矣今固壘不戰是窮冦也襄性剛狠易以剛動若長驅鼓行直壓其壘襄必忿而出師可以一戰而擒也黃眉從之遣羌率騎三千軍於襄壘以挑之襄果怒盡鋭出戰羌僞不勝引騎而退襄追之至於三原羌回騎拒襄俄而黃眉至大戰斬之盡俘其衆隋杜伏威聚徒數萬煬帝遣將軍陳稜以兵八千討之稜不敢戰伏威遺稜婦人之服以激怒之并致書號為陳姥稜大怒悉衆而來伏威逆拒自出陳前挑戰稜部將射中其額伏威怒指之曰不殺汝我終不拔箭遂馳之稜俯伏走奔其陳伏威因入稜陳大呼衝之所向披靡復獲所射者使其拔箭然後斬之攜其首復入稜軍大敗僅以身免卑漢胸奴單于冒頓初立東胡方强遣使謂冒頓欲得千里馬冒頓以問羣臣皆曰千里馬國之寶勿與冒頓曰奈何與人鄰國愛一馬乎遂與之東胡又遣使來曰願得單于一閼氏冒頓問羣臣皆怒曰東胡無道乃求閼氏冒頓曰與人鄰國愛一女子乎與之居頃之東胡復曰胸奴有棄地千餘里吾欲有之冒頓問羣臣或曰與之冒頓大怒曰地者國之本也奈何與之諸言與之者皆斬之冒頓上馬令國中有後至者斬遂往襲之東胡輕冒頓不為之備冒頓滅之蜀將關羽北伐擒魏將于禁圍曹仁于樊吳將吕䝉在陸口稱疾詣建業陸遜往見之謂曰關羽接境如何逺下後不堪憂也䝉曰誠如來言然我病篤遜曰羽矜其驕氣凌轢於人禁等為水所沒非戰守之所失羽始有大功意驕志逸又相聞疾必益無備今出其不意自可擒制若見至尊宜好為計䝉曰羽素勇猛既難為敵且已據荆州恩信大布兼始有功膽氣益壯未易圖也䝉至都權問卿病誰可代者䝉對曰陸遜慮思深長才堪負重觀其規慮終可大任而未有逺名非羽所忌無復是過若用之當令外自韜隱內察形便然後可克權乃召遜拜偏將軍右都督代蒙遜至陸口書與羽曰前承觀釁而動以律行師小舉大克一何巍巍敵國敗績利在同盟聞慶撫節相遂席卷共奬王綱某不敏受任來西延慕光塵思稟良規又曰于禁等見獲遐邇欣嘆以為將軍之勳足以長世雖昔晉文城濮之師淮隂拔趙之略蔑以尚之聞徐晃等步騎駐旌窺望麾葆操猾虜也忿不思難潛增衆以逞其心雖云師老猶有驍悍且戰捷之後常苦輕敵古稱軍勝彌警願將軍廣為方計以全獨克僕書生疏遲沗所不堪嘉鄰威德樂自傾盡雖未合策猶可懷也羽覽書有謙下自托之意遂大安無復所嫌遜具啓狀陳其可擒之要權乃潛軍而上使遜吕䝉為前部至即克公安南郡東晉初石勒僞推奉晉幽州刺史王浚浚不疑勒於是輕騎襲幽州以火宵行至易水浚督護馳遣白浚引軍拒勒浚將佐咸請出擊勒浚怒曰石公來正欲奉戴我也敢言擊者斬乃命設饗以待之勒晨至薊叱門者開門疑有伏兵先驅牛羊千頭聲言上禮實欲填諸街巷使兵不得發浚乃懼或坐或起勒入城升其㕔事命甲士執浚立之於前數其罪惡而誅之遂取幽州勞春秋楚申公巫臣為令尹子重子反所逐出奔晉巫臣自晉遺二子書曰爾讒慝事君而多殺不辜余必使爾疲於奔命以死巫臣請使于吳景公許之吳王夀夢說之乃通吳于晉以兩之一卒適吳舍偏兩之一焉與其射御教吳乘車教之戰陳教之叛楚置其子狐庸為行人於吳吳始伐楚伐巢伐徐遂入州來子重子反於是乎一歲七奔命蠻夷屬於楚者吳盡取之吳子闔廬問於伍員曰伐楚如何對曰楚執政衆而乖莫適任患若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔廬從之楚於是乎始病吳遂入郢隋髙熲獻取陳之策曰江北地寒田收差晚江南土熱水田早熟量彼收穫之際熲集士馬聲言掩襲必屯兵禦守足得廢其農時彼既聚兵我便解甲再三若此賊以為常後雖集兵彼必不信猶豫之頃我乃濟師登陸而戰兵氣益倍文帝行其策陳人益懼後周遣將討髙齊師圍洛陽齊將段韶禦之韶登邙坂聊欲觀周軍形勢至大和谷便值周軍即遣馳告諸營與將結陳以待之周軍仍以步人在前上山逆戰韶以彼徒我騎且却且引待其力敝乃遣下馬擊之短兵始交周人大潰洛城之圍並即奔遁後周遣將率突厥之衆逼齊晉陽齊將段韶禦之時大雪之後周人以步卒為前鋒從西山下去城二里諸將咸欲逆擊之韶曰步人氣力有限今積雪凝厚逆戰非便不如陳以待之彼勞我逸破之必矣既而交戰大敗之敵前鋒盡殪無復孑遺自餘通宵奔遁唐太宗戰竇建德於汜水東建德列陳彌亘數里太宗將數騎登髙而觀之謂諸將曰賊渡險而囂是軍無政令逼城而陳有輕我心陳久卒饑必將自退退而擊之何往不克建德列陳自卯至午兵士饑倦皆列坐又爭飲水太宗曰可擊之矣遂戰大破之生擒建德朱熹曰古之戰也兩軍相對甚有禮有饋惠焉有飲酌焉不似後世便只是濫殺將去劉錡順昌之捷亦只是投之死地而後生當時敵騎大擁而至凡十餘萬諸將㑹議以為固知力不能當然急渡江則朝廷兵守己自戒嚴必不可渡兼攜持老幼敵騎已迫必為所追其勢終歸於死若兩下皆死不若固守庶幾可生遂開城門而守敵人大至劉錡先遣人約他某日戰敵人謂其敢與我約戰大怒至日敵騎壓於城外時正暑月劉錡分部下兵五千為五隊先備暑藥飯食酒肉待用先以一副兜鍪與甲置之日下曬時令人以手摸看熱得幾何如此數次其兜鍪與甲尚可容手則未發直待熱如火不可容手乃唤一隊軍至令吃酒飯少定與暑藥遂各授兵出西門戰少頃又喚一隊至授之出南門如此數隊分諸門迭出迭入敵遂大敗緣敵人衆多其立無縫僅能操戈更轉動不得而我兵執斧入人叢掀其馬甲以斷其足一騎才倒即壓數騎殺死甚衆况當敵衆正熱甲盾如火流汗喘息煩悶而吾軍迭出飽鋭清涼而傷困者即扶歸就藥調護遂以至寡敵至衆敵人大敗方有怯中國之意遂從和議前此皆未肯真箇要和此是庚申年六月可惜此機不遂離漢先零罕开二種羌解仇合黨為寇漢將趙充國討之上書曰先零羌虜欲為背叛故與罕开解仇然私心恐漢兵至而罕开背之常欲赴罕开之急以堅其約若先擊罕羌先零必助之今虜馬肥糧食方饒擊之恐不能傷害適使先零得施德於罕羌堅其約合其黨虜交堅黨合誅之用力數倍臣恐國家憂纍繇十數年不二三嵗而已先誅先零則罕开之屬不煩兵服矣宣帝從之果如其策後漢末曹操征關中進軍渡渭馬超及韓遂數請戰不許因請割地求送任子賈詡以為可僞許之操復問計詡曰離之而已操曰解韓遂請與操相見操與遂交馬語移時不及軍事但說京師故舊拊手歡笑既罷超等問遂公何言遂曰無所言也超等疑之他日操又與遂書多所㸃抹如遂改定者超等愈疑遂自是超遂搆隙公乃克日㑹戰先以輕兵挑之戰良久乃縱驍騎夾擊大破之遂超等走涼州蔣濟為曹操丞相主簿初蜀將關羽圍樊城既降于禁斬龎德威震華夏曹操議徙許都以避其鋭司馬懿及濟以為關羽得志孫權必不願也可遣人勸權躡其後許割江南以封權則樊圍自解太祖如其言權聞之即引兵據江陵羽遂見擒東晉平州刺史崔毖隂結髙句麗及宇文段國等同滅慕容廆以分其地廆聞之曰彼信崔毖虛說邀一時之利烏合而來耳既無統一莫相歸服吾今破之必矣然彼軍初合其鋒甚鋭幸我速戰若逆擊之落其計矣不若靜以待之必懷疑二迭相猜防一則疑吾與毖譎而覆之二則自疑三國之中與吾有韓魏之謀者待其人情沮惑然後取之於是三國攻廆廆閉門不戰遣使送牛酒以犒宇文大言於衆曰崔毖昨有使至於是二國果疑宇文同於廆也引兵而歸宇文悉獨官曰二國雖歸吾當獨兼其國盡衆逼城連營三十里廆簡精鋭士配子皓摧鋒于前子翰領精騎為竒兵從旁出直衝其營廆方陳而進悉獨官自恃其衆不設備見廆軍之至方率兵拒之前鋒始交翰已入其營縱火焚之衆大敗不備後漢末廬江大守劉勳理皖城恃兵强士勇橫於江淮之間無出其右者孫策惡之時已有江左自領㑹稽太守使人卑辭厚幣而說之曰海昏上繚宗人數欺下國患之有年矣擊之路由不便幸因將軍神武而臨之且上繚國富廩實吳娃越姬充於後庭明珠火齊被於帑藏取之可以資軍雖蜀郡成都金碧之府未能過策願舉敝邑躬率士卒以為外援勳允之劉煜諫曰上繚雖小而城堅池深守之則易攻之則難不可旬日而拔也且兵見疲於外而國虛於內孫策多謀而善用兵乘虛襲我將何禦之而將軍進屈於敵退無所歸羝羊觸藩其在兹乎勳不從遂大興師伐上繚策果襲廬江破之勳窮蹙遂奔曹公蜀將關羽遣糜芳守南郡羽領兵圍樊城吳主遣將吕䝉屯陸口厚與關羽結好羽多留兵備南郡恐䝉來襲䝉上疏曰羽討樊而多留兵必恐䝉圖其後故也䝉常有病乞分衆還建業以理病為名羽聞之必撤備徐以大軍泝江馳上襲其空虛則南郡可下而羽易擒矣吳主然之䝉遂稱病而還建業羽稍撤備而悉衆赴樊城䝉遂發兵逆流而上伏甲於舟使更衣為商人以理征棹達旦兼行過羽所置屯戍輒縳之羽遂失驚師次於南郡襲奪其城羽吏士攻樊城未下聞城已陷而家屬無恙見待甚于平時無復鬭心稍稍分散羽竟為吳師所擒荆州遂平朱序鎮襄陽苻堅遣苻丕石越攻之次沔北序以秦無舟楫不以為虞石越遂遊馬以渡序大懼守中城越攻陷外郭獲船百餘艘以濟軍後屢戰秦兵引退序不設備督護李伯護密送欵於秦為內應遂襲襄陽執序送長安後燕慕容盛據遼東遼西太守李殷隂引後魏軍上表請發兵以拒寇盛曰此必詐也召其使而詰之果驗盡滅其族遣將李旱率騎討之師次建安召旱旋師殷聞其家被誅也擁二千餘户以自固及聞旱中路而還謂有內變不復為備留其子養守令支迎魏師於北平旱候知之襲克令支遣裨將追殷及干無終斬之盛謂羣臣曰前以追旱還者殷新為叛逆必忌官威一則鳩合同類劫害良善二則亡竄山澤未可卒平故非意而還以盈怠其志卒然掩之必克之理也羣臣皆曰非所及也後魏陵州木籠獠恃險每行抄劫大將陸騰討之獠因山為城攻之不可拔騰於城下多設聲樂及雜伎示無戰心諸獠果棄其兵仗攜妻子臨城觀樂騰知其無備密令衆軍俱上諸賊惶懼不知所為遂縱兵討擊盡破之隋將賀若弼鎮淮南請沿江防人每交代之際必集歷陽於是大列旗幟營幕被野陳人以為大兵至悉發國中士馬既知防人交代其衆復散後以為常不復設備其後弼以大軍濟江陳人弗之覺遂滅陳春秋楚子重自陳伐莒圍渠丘渠丘城惡衆潰奔莒楚入渠丘莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡庚申莒潰楚遂入鄆莒無備故也君子曰恃陋而不備罪之大者也備禦不虞善之大者也莒恃其陋而不修城郭浹辰之間而楚克其三都無備也夫漢末曹操征烏桓諸將士多懼郭嘉曰胡恃其逺必不設備因其無備卒然擊之可破滅也操行至易水嘉又曰兵貴神速今千里襲人輜重多難以趨利不如輕兵以出掩其不意乃密出盧龍塞外道絶不通乃塹山堙谷五百餘里涉鮮卑庭東指栁城未至二百里虜乃知之將數萬騎逆軍登白狼山卒與虜遇衆甚盛操登髙觀虜陳不整縱兵擊之使張遼為先鋒虜大敗也曹操擊袁談袁尚於黎陽使李典與程昱等以船運糧㑹尚遣髙藩將兵屯河上絶水道典與諸將議曰藩軍少甲而恃水有懈怠之心擊之必克昱亦以為然遂北渡河攻藩破之水道得通唐李靖陳圖蕭銑十策有詔拜行軍總管軍政一委焉靖閲兵夔州銑以時屬秋潦江水泛漲三峽路危必謂靖不能進遂休兵不設備靖率師而進曰兵貴神速機不可失今兵始集銑尚未知乘水漲之勢倐忽至城下所謂疾雷不及掩耳縱使知我倉卒無以應敵此必成禽也進兵至夷陵銑始懼召兵江南果不能至勒兵圍城銑遂降不意春秋楚大夫子囊師于棠以伐吳吳不出而還子囊殿以吳為不能而弗警吳人自臯舟之隘要而擊之楚人不能救吳人敗之隋末李密攻宇文化及還其徑兵良馬多死隋將王世充守東都欲乘敝擊之簡鍊精鋭得二萬餘人馬二千餘匹至偃師營於通濟渠南是時密新得志於化及有輕世充之心不設壁壘世充夜遣二百餘騎潛入北山伏溪谷中命軍士秣馬蓐食既而宵濟人奔馬馳遲明而薄密密出兵應之陳未成列而兩軍合戰其伏兵蔽山而上潛登北原乘髙而下馳壓之密營遂亂無能拒之者即入縱火軍大驚潰晉王渾領豫州刺史與吳接境宣布威信前後降附甚多吳將薛瑩魯淑衆號十萬淑向弋陽瑩向新息時州兵並放休息渾統一旅浮淮潛濟出其不意瑩等不虞晉師之至渾擊破之唐光啓中秦宗權數為朱全忠所敗恥之悉力以攻汴州其將張晊屯於北郊秦賢屯於板橋各有衆數萬列三十六寨連延二十餘里全忠謂諸將曰賊蓄鋭休兵方來擊我謂吾兵少畏懼止於堅守而已今出其不意先擊之乃親引兵攻秦賢寨將士踴躍爭先賊果不備連拔四寨斬首萬餘級賊衆以為神助梁兵攻潞州築夾寨㑹晉王李克用死太祖以為援兵不能復來不復設備晉王存朂與諸將謀曰朱溫所憚者先王耳聞吾新立以為童子未間軍旅必有驕怠之心若簡精兵倍道趨之出其不意破之必矣取威定霸在此一舉不可失也乃大閲士卒發潯陽軍於黃碾伏兵三垂岡詰旦大霧進兵直抵夾寨梁軍無斥堠不意晉兵之至將士尚未起軍中驚擾晉兵燒寨鼓譟而入梁兵大潰失亡將校士卒以萬計魏五光末賊元伯生西自崤潼東至鞏洛屠陷塢壁所在為患孝武遣京畿都督婁昭討之昭請以五千人行段永曰此賊無城栅惟以冦鈔為資取之在速不在衆也若星馳電發出其不虞精騎三百足矣帝然其計於是命永代昭以五百騎倍道兼進遂平之東魏北豫州刺史髙仲密叛降魏宇文泰以仲密所據遼逺難為應接諸將皆憚此行李逺獨曰北豫逺在賊境髙歡又屯兵河上以常理而論實難救援但不入獸穴不得獸子若竒兵出其不意事或可濟脫有利鈍固是兵家之常如其固堅行便無克定之日泰大喜曰李逺所言差强人意乃授行堂尚書前驅東出泰率大軍繼進逺乃潛師而往拔仲密以歸唐契必何力從征吐谷渾時吐谷渾主在突倫川何力復欲襲之薛萬均懲其前敗固言不可何力曰賊非有城郭逐水草以為生若不襲其不虞便恐鳥驚魚散一失機㑹安可傾其巢穴耶乃自選驍兵千餘騎直入突倫川襲破吐谷渾牙帳斬首數千級獲駝馬牛羊二十餘萬頭吐谷渾主脫身而免魏末遣將鍾㑹鄧艾伐蜀蜀將姜維守劒閣鍾㑹攻維未能克艾上言請從隂平由斜徑出劒閣西入成都竒兵衝其腹心劍閣之軍必還赴涪則㑹方軌而進劒閣之軍不還則應涪之兵寡矣軍志云攻其不備出其不意今掩其空虛破之必矣冬十月艾自陰平行無人之地七百餘里鑿山通道遣作橋閣山髙谷深至為艱險糧運將匱瀕於危殆艾以氊自裹推轉而下將士皆攀木緣崖魚貫而進先登至江油蜀守將馬邈降諸葛瞻自涪還綿竹列陳相拒大敗之斬瞻及尚書張遵等軍進至成都蜀主劉禪面縳舁櫬詣軍請降晉譙縱據蜀劉裕與朱齡石密謀取蜀曰劉敬宣往年出黃虎無功而退賊謂我今應從外水往而料我當出其不意猶從內水來也必重兵守涪城以備內道若向黃虎正墮其計今以大衆自外水取成都疑兵出內水此制敵之竒也而慮此聲先馳賊審虛實别有函封付齡石題曰至白帝乃開諸軍雖進未知處分至白帝發書曰衆軍悉從外水取成都臧燾朱林從中水取廣漢使羸弱乘髙艦十餘由內水向黃虎譙縱果備內水使其大將譙道福戍涪城遣其將侯暉譙詵等屯彭模夾水為城以拒晉軍諸將以賊水北城險衆多咸欲先攻其南城齡石曰不然雖冦在北今屠南城不足以破北若盡鋭以攻北壘南城不麾而自散也遂攻北城詰朝戰至日暮焚其樓櫓四面並登斬侯暉譙詵仍引軍回趨南城即時潰散朱林至廣漢復破譙道福别軍後唐李嗣源襲鄆髙行周為前軍㑹夜分大雨人無進志行周曰此天贊我彼必無備直出其不意是夜涉河入東城比明平之唐蘇定方驍悍多力為折衝隨李靖襲突厥頡利於磧口定方率二百騎為前鋒乘霧而行去賊一里忽然霧歇見牙帳遂掩襲之頡利狼狽散走貞觀中蘇定方率兵討突厥賀魯大雪平地二尺軍中咸請停兵候晴定方曰虜恃雪深謂我不能前進必當憩息追可及若緩以縱之則漸逺難追省日兼功在此舉也於是勒兵凌雪晝夜兼進所經收其人衆遂至雙河去賀魯所居二百餘里布陳長驅徑至金牙山賀魯牙帳所時賀魯集衆欲獵定方縱兵擊之破其牙帳生擒數萬人賀魯脫走拔石國定方於是悉命諸部歸其所居復其産業賀魯所虜掠者悉檢責還之於是西域諸國安堵如故令副將蕭嗣業往石國以追賀魯遂擒歸于京師周末荆人伐陳吳救之軍行三十里夜不見星左史倚相謂大將子期曰雨十日夜甲輯兵聚吳人必至不如備之乃為陳吳人至見荆有備而返左史曰其返覆六十里其君子休小人為食我行三十里擊之必克從之遂破吳軍東魏初髙歡破爾朱兆兆奔秀容分兵守險出入抄掠歡每揚聲云欲討兆將出復止如此者數四歡揣兆嵗首必應㑹飲使將竇泰率精騎先驅一朝一夜行三百里兆軍人因宴休惰忽見泰軍莫不奪氣因而克之李訴攻蔡州吳房軍吏曰今日往亡請避之訴曰賊以往亡謂吾不來正可擊也又戰遂捷而歸宋武帝謀討劉毅王鎮惡曰公若事西楚請給百舸為前驅及西討轉鎮惡參軍事使率龍驤將軍蒯恩領百舸前發鎮惡受命便晝夜兼行揚聲劉兖州上先是毅稱病表請從弟兖州刺史藩為副毅謂為信不知見襲鎮惡去江陵城二十里舍船步上蒯恩軍在前鎮惡次之舸留一甲士看守對舸岸上立旗安鼓語所留人曰計我將至城便長嚴令後有大軍狀又分隊在後令燒江津艦船鎮惡徑前襲城津戍百姓皆言劉藩實上晏然不疑將至城逢毅要將朱顯之馳前問藩所在軍人答云在後及至軍後不見藩又望江津船艦被燒旌旗甚盛知非藩上便躍馬告毅令閉城門鎮惡亦馳進得入城便因風放火燒大城南門及東門而襲破之隋韋雲起討契丹以其與突厥相通素無猜忌雲起既入其界使突厥詐云向栁城郡欲共髙麗交易勿言營中有隋使敢漏泄者斬契丹不備去賊營百里詐引南渡夜復退還去營五十里結陳而宿契丹弗之知也既明俱發馳騎襲之盡獲其男女四萬口女子及畜産以半賜突厥餘將入朝男子皆殺之煬帝大喜集百官曰雲起用突厥而平契丹唐李元平大言好論兵宰相關播竒重之薦於上以為將相之器時李希烈反朝廷以汝州與賊接境刺史韋光裔懦弱以元平代之既至部募工徒猶理郛郭希烈乃使勇士應募執役版築凡入數百人元平不之覺希烈遣將以數百騎突至其城先應募執役者應於內縳元平馳去既見希烈遺下汙地希烈見之曰盲宰相使汝當我何待我太薄耶梁末侯景反陷建業髙州刺史李遷仕據大臯圖逆召髙凉太守馮寶寶欲往其妻冼氏止之曰刺史無故不合召太守此詐君欲為反耳頃者京師危迫羽檄召兵遍於郡縣刺史稱疾不赴繕甲訓兵今已備矣而更召者往必見留願且勿行遣使譎之曰身疾篤謹遣妻傳意并送土物以省之彼聞喜必無所防為君取之如反掌耳寶從之於是冼氏自將千人皆藏短兵步擔雜物唱言琛貨先書報遷仕曰太守馮寶疾篤謹令妻冼氏傳啓并奉土貢以資軍費遷仕大恱迎冼氏因釋擔出刃大破之遷仕脫身而遁冼氏入據其城盡收其衆唐馮行襲武當人僖宗在蜀有賊首孫喜者聚徒數千人欲入武當刺史吕曄惶駭無營行襲伏勇士於江南乘小舟迎喜謂喜曰郡人今得良牧衆心歸矣但緣兵多民懼虜掠若駐軍江北領肘腋以赴之使某前導以慰安士民可立定也喜然之既渡江軍吏迎謁伏甲奮起行襲擊喜仆地拔劒斬之其黨盡殪賊衆在江北者悉奔潰王全斌伐蜀自利州趨劍門次益光全斌㑹諸將議曰劒門天險古稱一夫荷戈萬夫莫前諸君宜各陳進取之策侍衛軍頭向韜曰降卒牟進言益光江東越大山數重有狹徑名來蘇蜀人於江西置寨對岸有渡自此出劒關南二十里至清强店與大路合可於此進兵即劍門不足恃也全斌等即欲卷甲赴之康延澤曰來蘇細徑不須主帥親往且蜀人屢敗併兵退守劍門莫若諸將協力進攻命一偏將趨來蘇若達清强北擊劒關與大軍夾攻破之必矣全斌聽其策命史延德分兵趨來蘇造浮梁於江上蜀人見梁成棄寨而遁蜀帥王昭逺聞延德兵趨來蘇至清强即引兵退陳於漢源坡留其偏將守劒門全斌等擊破之昭逺遁去遣輕騎追獲傳送闕下遂克劒州殺蜀軍萬餘人未成列齊髙歡伐西魏至許原西宇文泰拒之至渭南召其兵皆未至諸將以衆寡不敵請待歡更西以觀之泰曰髙歡越山度河逺來至此天亡之時也若至咸陽人情轉騷擾今及其新至便可擊之即造浮橋於渭令軍人齎三日糧輕騎渡渭輜重自渭南夾渭而軍李弼謂泰曰彼衆我寡不可平地置陳此東十里有渭曲可先據以待之遂進至渭背水為陳李弼為左拒趙貴為右拒命將士皆偃戈於葭蘆中日晡齊師至望見軍少競萃於左軍亂不成列泰乃鳴鼓士皆奮起合戰李弼率鐵騎橫擊之絶其軍為二遂大敗之春秋時晉中行穆子敗無終及羣狄於太原崇卒也將戰魏舒曰彼徒我車所遇又隘以什共車必克困諸厄又克請皆卒自我始乃毁車以為行五乘為三伍荀吳之嬖人不肯即卒斬以徇為五陳以相離兩於前伍於後專為右角參為左角偏為前拒以誘之翟人笑之未陳而薄之大敗之後魏侯莫陳崇從賀拔嶽力戰破万侯醜奴與輕騎逐北至州長坑及之賊未成列崇單騎入賊中於馬上生擒醜奴遂大破之新集後漢末曹操征張魯定漢中劉曄進說曰明公以步卒五千誅董卓北破袁紹南征劉表九州百郡十并其八威振天下勢傾內外今舉漢中蜀人覩風破膽失守推此而前蜀可傳檄定也劉備人傑也有智度而遲新得蜀人猶未附今破漢中蜀人震恐其勢自傾以公之神明因其傾而壓之無不克也若小緩之諸葛亮明于理國而為相關羽張飛勇冠三軍而為將蜀人既定據險守要則不可犯也今不取必為後憂曹操不從居數日蜀降者說蜀中一日數十驚備斬之而不能禁也操悔之又問曄曰今尚可擊否曄曰今已小定未可擊也隋漢王諒作亂遣其將綦母良自滏口徇黎陽塞白馬津余公理自大行下河內朝廷以史祥為行軍總管討之於河陰久不得濟祥謂軍吏曰余公理輕而無謀又新得志謂其衆足恃恃衆必驕且河北人先不習兵所謂擁市人而戰不足圖也乃令軍中修攻具公理使諜知之果屯兵於河陽內城以備祥於是艤船南岸公理聚甲當之祥乃簡精鋭於下流潛渡公理拒之未成列縱擊大破之唐垂拱初突厥犯邊命黑齒常之率兵拒之躡至兩井忽逢賊三千餘衆常之見賊徒輩下馬著甲遂領二百餘騎身當先鋒直衝之賊遂棄甲而散俄頃賊衆大至及日將暮常之令伐木營中然火如烽燧時東南忽有大風起賊疑有救兵相應狼狽夜遁宋太宗征太原時節度使何繼筠把石嶺關北虜來援繼筠率數千騎禦之虜至乘其未成列遽麾兵擊之虜衆大潰追奔數十里未集太祖親征澤潞車駕次滎陽西京留守向拱朝于行在上召拱與語拱曰李筠逆節久露兵勢漸成陛下宜速濟大河歷大行乘其未集而擊之平之必矣或稽浹旬恐賊鋒益鋭難為力矣筠在澤州王師薄其城下拔之逺來吳孫權拒曹操于赤壁諸葛亮說權云曹操之衆逺來聞追劉豫州一日一夜行三百里此所謂强弩之末不能穿魯縞也兵法忌之曰必蹶上將從之遂敗操晉劉琨守太原遣將姬淡率衆十餘萬討石勒勒將拒之或諫曰淡兵馬精盛其鋒不可當宜深溝髙壘以挫其鋭攻守之勢必獲萬全勒曰淡大衆逺來體疲力竭犬羊烏合號令不齊可一戰擒之何彊之有冦已垂至胡可捨去大軍一動豈易中還若淡乘我之退顧走乃無暇焉得深溝髙壘乎此為不戰而自滅之道也立斬諫者以孔萇為前鋒都督令三軍後出者斬設疑兵於山上分為二伏勒輕騎與淡戰僞收衆而北淡縱兵追之勒前後伏發夾擊淡軍大敗梁將陳慶之伐後魏之渦陽魏遣將元昭等率兵來援前軍至駝澗去渦陽四十里慶之欲逆戰諸將以賊之前鋒必是輕鋭與我戰若捷不足為功如其不利沮我軍陳勢兵法所謂以逸待勞不如勿擊慶之曰魏人逺來皆已疲倦去我既逺必不見疑及其未集須挫其氣出其不意必無敗理且聞虜所據營林木甚盛必不夜出諸將若皆疑惑慶之請獨取之於是與麾下五百騎奔擊破其前軍魏人震恐後周末隋文帝作相遣將崔仲文先以兵定關東破尉遲迥將檀讓初仲文在蓼隄諸將皆曰軍士逺來士馬瘦敝不可決勝仲文令三軍趣食列陳大戰既而破城諸將皆請曰前兵疲不可交戰竟而克勝其計安在仲文笑曰吾所部將皆山東人果於進不宜持久乘勢擊之所以制勝諸將皆以為非所及也魏孝武帝將圖髙歡歡勒兵南出以髙敖曹為前鋒稍逼京師魏帝親總六軍屯河橋宇文泰謂左右曰髙歡數日行八九百里曉兵者所忌正須乘便擊之而主上以萬乘之重不能渡河決戰方緣津據守且長河萬里扞禦為難若一處得渡大事去矣果如其言帝西奔長安十六國北涼沮渠䝉遜率兵伐南涼秃髮傉檀至顯美徙數千戶而還傉檀追及䝉遜將擊之諸將皆曰賊已安營不可犯也䝉遜曰傉檀謂吾逺來疲敝必輕而無備及其壁壘未成可一鼓而滅進擊敗之乘勝至于姑臧夷夏降者萬數千户傉檀懼請和而歸梁將陳慶之伐後魏之渦陽魏遣將元昭等率兵來援前軍至駝澗去渦陽四十里慶之謂諸將曰魏人逺來皆已疲倦去我既逺必不見疑及其未集須挫其氣出其不意必無敗理且聞虜所據營林木甚盛必不夜出諸君若皆疑惑慶之請獨取之於是與麾下五百騎奔擊破其前軍魏人震恐東魏大將髙欽伐西魏軍至許原西宇文泰至渭南詔諸州兵皆來㑹乃召諸將謂之曰髙歡越山渡河逺來至此天亡之時也及其新至便可擊之即造浮橋於渭令軍人齎三日糧輕騎渡渭南夾而軍至沙苑距歡軍六十餘里歡聞泰至引軍來㑹見泰軍沙競馳而進不為行列泰鳴鼓士皆奮起其將李弼等率鐵騎橫擊之絶其軍為二遂大敗之斬六千餘級降者二萬餘人歡夜遁棄鎧仗十有八唐鐵勒薛延陀等合衆二十萬度漠屯白道川太宗遣李績等率兵數道擊之戒之曰延陀負其兵力踰漠而來經途數千里馬已疲瘦夫用兵之道先利速進不利速退吾已勑李思摩燒剃荻草延陀糧肉日盡野無所獲因時奮擊其衆潰散唐貞觀中大軍討髙麗令江夏王道宗與李靖為前鋒濟遼水克蓋牟城逄賊兵大至軍中僉欲深溝保險待太宗至徐進道宗曰不可賊赴急逺來大兵實疲頓恃衆輕我一戰必摧昔者耿弇不以賊遺君父我既職在前軍當須清道以俟車駕李靖然之乃與壯士數千騎直衝賊陳左右出入靖合擊大破之安祿山反郭子儀李光弼率師下井陘拔常山賊將史思明以數萬人踵其後我行亦行我止亦止子儀選驍騎五百挑之三日至行唐賊疲乃退我軍乘之又敗於沙河祿山聞思明敗益以精兵我軍至恆陽賊亦隨至子儀堅壁自固賊來則守賊去則追獲晝陽其兵夜襲其幕賊人不及息數日光弼曰賊怠矣可以戰戰于嘉山斬馘四百級饑渴蜀諸葛亮出祁山魏將張郃督諸軍拒亮將馬謖於街亭謖阻依南山不下據城郃絶其汲道大破之隋初突厥寇蘭州大將賀樓子幹率衆拒之至河洛山與賊相遇賊衆甚盛子幹阻川為營賊軍不得水數日人馬饑敝縱擊大破之唐太宗圍王世充於東都竇建德率衆來救太宗頓兵武牢登髙丘觀之謂諸將曰賊未見大敵今渡險而囂是軍無政逼城而陳有輕我心我按兵不出待彼氣衰陳久卒饑必將自退追而擊之何往不克建德列陳自辰至午兵士饑倦太宗曰可擊矣乃帥輕騎先進大軍繼之所向披靡生擒建德後梁遣王景仁將兵七萬人擊趙至柏鄉趙告急于晉晉王存朂遣周德威先屯趙州而自將㑹之梁兵馬鎧胄光彩炫熠晉人望之奪氣晉王欲速戰德威請待其衰乃進軍鄗邑久之德威將精騎三十壓梁壘門詬之景仁怒悉軍以出橫亘六七里汴宋之軍居西魏滑之軍居東晉王謂德威曰我為公先公可繼進德威曰觀梁兵之勢可以勞逸制之未易以力較也彼輕出而逺來與吾轉戰雖挾糗糧亦不暇食日昳之後饑渴內迫矢刃交外士卒勞倦必有退志當是時我以精騎乘之必大捷於今未可也王乃止至日晡梁軍未食士無鬭志景仁等引兵稍却德威鼓譟而進麾其西偏曰魏滑軍走矣又麾其東偏曰梁軍走矣晉兵爭進梁兵自相驚怖遂大敗自鄗追至柏鄉橫尸數十里糧盡漢王與項籍約中分天下漢欲西歸張良陳平說曰漢有天下大半而諸侯皆附楚兵疲食盡此天亡之時也宜因其饑而遂取之今釋不取所謂養虎自遺患也從之㑹諸侯兵於垓下終滅羽後漢初河南賊董憲劉紆悉其兵數萬人屯昌慮招誘五校餘賊與之拒守建陽光武親征之去憲百里諸將請進帝不聽曰五校乏食當退敇各堅壁以待其敝頃之五校果引去帝乃親臨四面攻三日大破之漢末青州黃巾衆百萬入兖州界刺史劉岱欲擊之鮑信諫曰今賊衆百萬百姓皆震恐士卒無鬭志不可擊也觀賊衆羣輩相隨軍無輜重惟以抄掠為資今不若蓄士衆之力先為固守使彼欲戰不得攻又不能其勢必離散然後選精鋭據要害擊之可破也岱不從遂與戰果為所殺唐武德初劉武周據太原其將宋金剛屯於河東太宗往征之謂諸將曰金剛持軍千里深入吾地精兵驍將皆在於此武周自據太原專倚金剛為扞蔽金剛雖衆內實空虛虜掠為資意在速戰我堅壁畜鋭以挫其鋒分兵汾濕衝其心腹彼糧盡計窮自當遁去必待此機未宜速戰於是遣劉𢎞等絶其糧道其衆遂餒金剛乃遁竇建德以兵十萬來援王世充于酸棗太宗將拒之諸將進諫曰腹背受敵恐非萬全請班師且據穀州以觀勝負太宗不許曰世充糧盡內外忿嫉當不勞攻擊坐收其敝耳建德新破孟海公將驕卒惰今我進據武牢扼其襟要若賊恃勝冒險爭鋒吾當破之必矣賊若不戰旬月之間世充自潰終如其言穆宗用裴度伐王廷湊時諸道兵十五萬既深入輦運艱阻芻薪不繼諸軍分番樵採度支轉運車六百乘盡為廷湊邀而虜之兵食益困遂休兵春秋時齊師宋師次于郎公子偃曰宋師不整可敗也宋敗齊師必還請擊之公弗許自雩門竊出䝉臯比而先犯之公從之大敗宋師于乘丘齊師乃還不整晉伐楚晉大夫郤至曰楚有六間其二卿相惡王卒以舊鄭陳而不整蠻軍而不陳陳不違晦在陳而囂合而加囂各顧其後莫有鬭心舊不必良以犯天忌必克之敗于鄢陵春秋時魯莊公與齊師戰于長勺公將鼓之曹劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故曰大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之不戒春秋時衛人以燕師伐鄭祭足原繁泄駕以三軍軍其前使曼伯與子元潛軍軍其後燕人畏鄭三軍而不虞制人六月鄭二公子以制人敗燕師于北制君子曰不備不虞不可以師吳侵楚養由基奔命子庚以師繼之養叔曰吳乘我喪謂我不能師也必易我而不戒子為三覆以待我我請誘之子庚從之戰于庸浦大敗吳師不整後漢末曹操征烏桓登白狼山卒與虜遇左右皆懼操登高望虜陳不整乃以張遼為先鋒縱兵擊之虜衆大潰十六國北涼沮渠蒙遜率兵伐南涼秃髮傉檀至顯美徙數千户而還傉檀追及䝉遜於窮泉䝉遜將擊之諸將皆曰賊已安營不可犯也䝉遜曰傉檀謂吾逺來疲敝必輕而無備及其壘壁未成可一鼓而滅進擊之果敗乘勝至于姑臧夷夏降者萬數傉檀俱請和而歸離部唐太宗征髙麗築土山逼其城山頂數丈下臨城中使果毅傅伏愛領隊兵於山頂以防敵㑹伏愛私離所部髙麗出城而戰據有土山攻之不能克遂班師移陳魏諸葛誕據夀春反魏將王基討之吳遣朱異來救誕軍于安城詔王基引諸將據北山基謂諸將曰今圍壘轉固兵馬向集但當精修守備以待越逸而更移兵守險使得放縱雖有智者不能善後矣遂守便宜上疏曰今與賊交利對敵當不動如山若遷移依險人心搖蕩於勢大損諸軍並據深溝髙壘衆心皆定不可傾動此御兵之要也書奏報聽夀春竟拔心怖晉侯圍曹門焉多死曹人尸諸城上晉侯惡之聽輿人之誦曰稱舍於墓師遷焉曹人凶懼為其所得者棺而出之因其凶也攻之遂入曹朱齡石伐蜀賊譙縱縱將譙道福重兵守涪侯暉等屯彭模齡石師次彭模夾岸連城立栅齡石謂裨將劉鍾曰天方暑熱賊今固險攻之難拔祗困吾師吾欲蓄鋭息兵伺隙而進卿以為何如鍾曰不然前揚聲言大衆由內江故譙道福不敢捨涪今重軍逼之出其不意侯暉之徒已破膽矣只可因其恐懼而攻之勢當必克克彭模之後自可鼓行而前成都必不能守若緩兵相持彼知虛實涪軍復來難為敵也進不能戰退無所資二萬餘人適為蜀子虜耳從之翌日進攻皆克斬侯暉等縱之城守相次瓦解曹操與袁紹相持於官渡紹將淳于瓊等護輜重在烏巢操欲自往襲留曹洪守營乃選精鋭步騎皆用袁軍旗幟銜枚縳馬口夜從間道出人抱束薪所歷道有問者語之曰袁公恐曹操鈔掠後軍遣兵以益備聞者信以為然皆自若既至圍屯大放火營中驚亂大破之盡燔其糧榖寶貨殺士卒千餘人皆取鼻牛馬割脣舌以示紹軍將士皆惶懼紹初聞操之擊瓊謂長子談曰就破攻瓊等吾攻拔其營彼固無所歸矣乃使張郃髙覽攻曹洪郃等聞瓊破遂來降紹衆大潰唐貞觀中突厥雖叛將圖進取以李靖為代州道總管靖率驍騎三千自馬邑出其不意直趨惡陽嶺逼之突利可汗不虞于靖見官軍奄至太懼相謂曰唐兵若不傾國而來靖豈敢孤軍而至一日數驚靖知之令間諜離其腹心進擊破之部落並走磧地半濟春秋時宋公及楚人戰于泓宋人既成列楚人未既濟司馬曰彼衆我寡及其未濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉吳伐楚楚師敗及清發將擊之夫槩王曰困獸猶鬭况人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬭矣半濟而後可擊也從之又敗楚人為食吳人及之奔食而從之敗諸雍澨五戰及郢項羽引兵東擊彭越令大司馬曹咎謹守成臯即漢王欲挑戰慎勿與戰漢果數挑戰楚軍不出乃使人辱之咎怒渡兵汜水半渡漢擊之大破楚軍魏鍾繇都督關中胸奴單于作亂平陽繇率諸軍圍之未拔而袁尚所置河東太守郭援到河東兵衆甚盛諸將議欲釋之去繇曰袁氏方强援之來關中隂與之通所以未悉叛者顧吾威名故耳若棄而去示之以弱所在之民誰非冦讐縱吾欲歸其得至乎此為未戰先自敗也援剛愎好勝必易吾軍若渡汾為營及其未濟擊之可大克也援果輕渡汾衆止之不從濟水未半繇迎擊大破之隋煬帝征髙麗平壤將軍宇文述與九軍過鴨緑水又東濟薩水去髙麗平壤城三十里因山為營髙麗國相莫支文德僞降請述還師奉其王髙元朝行在所述見士卒疲敝不可復戰又平壤險固卒難致力遂因其詐而還半濟賊擊後軍於是大潰不可禁止將士奔還一日一夜至鴨緑水行四百五十里初渡遼九軍三十萬五千人還至遼東城惟二千七百人矣唐武德初羅藝為幽州總管竇建德率衆十萬來冦藝將逆戰薛萬均曰衆寡不敵今若出戰百戰百敗當以計取之可令羸師弱馬阻水背城為陳而誘之賊若渡水交兵請公率精騎百人伏於城側待其半渡而擊之必敗矣從之建德引兵渡水萬均邀擊大破之渡董摶霄時朱臯固始賊復猖獗軍少不足以分討有大山民寨及芍陂屯田軍摶霄皆奬勞而約束之遂得障蔽朱臯我軍屯朱家寺賊至追殺之乃遣進士程明仲往諭賊中招往者千二百家因悉知其虛實夜縳浮橋於淝水既渡賊始覺賊衆數萬據澗南我軍渡者輒為其所敗摶霄乃麾騎士别渡淺灘襲賊後賊回東南向與騎士迎敵摶霄忽躍馬渡澗揚言於衆曰賊已敗諸軍皆渡一鼓而擊之大敗亟追殺之相藉以死者二十五里遂復安豐地利秦伐韓趙王令趙奢救之秦人聞之悉甲而至軍士許歷請以軍事諫曰秦人不意趙師至此其來氣盛將軍必厚集其陳以待之不然必敗奢曰請受令歷又曰今先據北山上者勝後至者敗奢許諾即發萬人趨之秦兵後至爭山不得上奢縱兵擊之大敗秦軍漢韓信擊趙趙王聚兵井陘口稱二十萬李左車說王曰韓信乘勝去國逺鬭其鋒不可當臣聞千里餽糧士有饑色樵蘇後爨師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在後願假臣竒兵三萬人從間路絶其輜重足下深溝髙壘勿與戰彼前不得鬭退不得還吾竒兵絶其後野無所掠鹵不至十日兩將之頭可致戲下趙王不從信使間人伺知之大喜乃敢引兵遂下未至井陘三十里止舍夜半傳發選輕騎二千人各持一赤幟從間道萆山而望趙軍戒曰趙見我走必空壁逐我汝疾入壁拔趙幟立漢幟信又謂諸軍吏曰趙已先據便地壁且彼未見大將旗鼓未肯擊前行恐吾阻險而還先使萬人先行出背水陳趙兵望見大笑平旦信建大將旗鼓鼓行出井陘口趙開壁擊之大戰良久信棄旗鼓走水上軍趙空壁逐信信已入水上軍軍皆殊死戰信所出竒兵二千見趙空壁逐利即馳入趙壁立漢赤幟趙軍已不能得信欲還歸壁壁皆漢幟遂亂遁走虜趙王晉王存朂與梁軍戰于胡栁陂中有土山梁軍先據之王曰今日之戰得土山者勝賊已據山吾與汝等率軍先登遂奪其山諸軍繼集梁軍大敗時元城令吳瓊等率各部役徒萬人於中山曳柴揚塵鼓譟助其勢梁軍不之測自相騰藉棄甲如山積天時唐武德中突厥入原州太宗率兵拒之值雨連月太宗召諸將謂之曰虜控弦鳴鏑弓馬是憑今雨連時弧矢俱敝突厥人衆如鳥殺羽我屋宿火食槍槊犀利料我之逸揣敵之勞此而不乘夫復何待今先以徑兵亂其陳突騎躡其後虜進不相遜退不相救縱不盡擒必獲十八九此曉兵者所解因潛師夜出冒雨而進醜徒驚駭請和而去張公謹副李靖經略突厥因言突厥可取之狀曰頡利縱欲肆情窮凶極暴塞地霜早餱糧乏絶若師出塞垣自然有應者太宗深納之果破定襄敗頡利五代梁將劉鄩趨黃澤關路歸後唐莊宗遣兵追之時霖雨積旬鄩倍道兼行皆腹疾足腫顛墜巖坂陷于泥濘死者十二三後唐契丹冦望都莊宗追擊之氊裘毳幕不可勝紀時大雪平地五尺虜乏芻糧人馬斃踣於道纍纍不絶乘勝追襲大破之武編後集卷三
