body:
  text: 武編前集卷二明唐順之撰戰武經曰所謂能而示之不能者匈奴羸師以誘漢祖圍於白登是也所謂用而示之不用者李牧按兵雲中大敗林胡是也所謂逺而示之近者韓信陳船臨晋而渡夏陽是也所謂近而示之逺者晋侯伐虢假道於虞是也所謂利而誘之者赤睂委輜重而餌鄧洪是也所謂亂而取之者李靖乗輕舟而破蕭銑是也所謂實而備之者關羽討樊多留兵備公安南郡是也所謂强而避之者隋季良無與楚君遇是也所謂怒而撓之者漢兵擊曹無咎於汜水是也所謂卑而驕之者石勒奉戴王浚是也所謂佚而勞之者吳子亟肄以疲楚軍是也所謂親而離之者漢王慢楚使而疑范増是也所謂飽而饑之者晋文困諸葛誕而拔壽春是也所謂安而動之者齊軍走大梁而退魏師是也所謂攻其無備者制人以不虞而敗南燕是也所謂出其不意者鄧艾由隂平而趨劒閣是也此十有六者皆前世已然之效也許洞曰兵者詭道也詭可使為實遠示之近近示之遠故遠近之用其術有六夫將取敵者志於要而攻不急攻其不備聲之以必取潛緩所得生口俾敵知之此急彼守必緩隂以兵卒黙乘之其術一也所臨之境界於洪淵大壑不可卒濟即駐兵築壘鑿林刳木廣為舟航示以必濟如未可卒辦之則僉伎備此行我則不然也夜隂令精兵銜枚於他處舉筏而渡擊沿流之守俟彼衆亂大兵筏而隨之其術二也加兵之地抵斷絶之路大軍倒回以詭敵敵聞焉姑以為然所備必緩即隂令輕捷者傍間道以懸梯竹索續接以亟渡出其不意我即回大軍以應之其術三也兩陣有向敵人鼓譟挑戰勿即應久之則徐徐引退敵來薄陣且動即亟岀突騎衝其心後軍張翼而從之其術四也交戰既酣隂以奇兵分左右翼自陣後而四岀擊之使外潰而内駭焉其術五也敵戰時於大陣後以精兵伏之不施旗鼓弓箭惟以强弩劒楯戈鋋而已俟前陣大戰士伍困則麾開前陣令後伏兵先出强弩射之復麾前陣兩向兵徐逼敵陣攻之稍動則撲之其術六也此六者皆示以近而取勝在逺也如是者奇正之謀也孫子曰兵以正合以奇勝此之謂也舉兵用武率以古法為用執之與膠柱鼓瑟無異爾未見決中者也兵家之利利在變通之機觀順逆爾夫興師之際當先探敵將才不才設若敵將不能以兵法使衆惟以勇敢為己任我則順用古法以待之也或敵將善用古法我則逆用古法待之也夫用兵之奇莫奇於設伏設伏之奇莫奇於新智新智者非不師古也因古而反之爾古人料敵以其始來戰陣未合先以賤而勇者挑之觀其號令旗鼓之整與亂士馬之强弱營陣之偏正行伍之齊肅散亂言語之諠譁緘嘿以定勝負焉是以古法曰若其衆諠譁亂其卒自行自止其兵或縱或横其追兵恐不及見利恐不得如此者將必無謀雖衆可獲矣許洞曰如古人以此助功茍敵人料我當順其所料伏兵待之以詐示之俟彼出師則發伏收之古法杖而立者饑也汲而飲者渇也見利不進者勞也軍擾者將不重也旗動者亂也吏怨者倦也懸缶不反其舎者窮冦也諄諄翕翕徐與人言者失其衆也數顧者失其羣也來委謝者欲休息也許洞曰如古人以此料敵今則不然固當擇精鋭吏士外而伏於要衝使其老倦傷殘者如饑渇失羣之狀或數搖動其旗或數驚擾其衆使吏士諠譁應敵人茍出師襲我則潛發所伏出其不意擊之古法曰敵始來到行陣未定可擊也涉長道後行未息可擊也行坂涉險半隠半出可擊也涉水半渡可擊也險道狹路可擊也旌旗亂動可擊也陣數動移可擊也許洞曰在我則不然如以行陣未定四面可設伏也長道後行未息中可設伏也山坡半隠半出長林大谷可設伏也涉水半渡則崖岸坡坂可設伏也狹路險道前後可設伏也旌旗亂動陣數動移後可設伏也如或敵人敗走我師未敢逐之者古法曰鳥起者伏也衆樹動者來也如此未必伏與來也慮為疑兵也兵已奔遁多令老弱者動其衆樹及驚鳥之類也又曰無約請和者謀也半進半退者誘也此亦大兵已潛遁恐後人逐者設此疑也許洞曰料敵以事者多慮為反古之事也是以兵法如車載其物則車也及有車之用則東西南北者由人也故兵法不可執而用之也明矣兵有三勢一曰氣勢二曰地勢三曰因勢若將勇輕敵士卒樂戰三軍之衆志厲青雲氣等飄風聲如雷霆此所謂氣勢也若闗山狹隘大阜深澗龍蛇盤隂羊腸狗門一夫守險千人不過此所謂地勢也若因敵怠慢勞役饑渇風波驚擾將吏縱横前營未舎後軍半濟此所謂因勢也若遇此勢當潛我形出其不意用奇設伏乃取之矣是以良將用兵審其機勢而用其氣仍須鼔而怒之感而勇之賞而勸之激而揚之若鷙鳥之攫猛獸之搏必修其牙距度力而下逺則氣衰不及近則形見而不得故良將之戰必整其三軍礪其鋒甲設其奇伏量其形勢逺則力病而不及近則敵知而不能應若不通此機乃智不及於鳥獸亦何能取勝於勍冦乎乃須怒士勵衆使之奮勇故能無强陣於前無堂陣於外以弱勝强必因勢也許洞曰兵之勝敗非人之勇怯也勇者不可必勝怯者不可必敗率有勢焉耳勢之勝者有五一曰乘勢二曰氣勢三曰假勢四曰隨勢五曰地勢勢之敗者有三焉一曰挫勢二曰支勢三曰輕勢凡新破大敵將士樂戰威名隆震聞者駭懼迴其勢而擊人者此之謂乘勢者也將有威徳部伍嚴整士有餘勇名譽所加慴如雷霆此之謂氣勢者也士卒寡少盛其鼓旗張為疑兵使敵人震懼此之謂假勢者也因敵疲倦懈怠襲擊之此之謂隨勢者也合戰之地便其干戈利其步騎左右前後無有陷隠此之謂地勢者也用兵者乘此五勢未有不能追亡逐北以建大功者也又若累戰累北吏士畏於敵戰此之謂挫勢者也將無威徳謀慮賞罰不當吏士之心率多離散此之謂支勢者也吏士諠譁不循禁令部伍不肅此之謂輕勢者也凡用兵有此三者未有不敗軍殺將者焉是故其勝勢在我可以指揮賊矣勝勢在敵我當有道反能擊之若夫敵有乘勢而到者未可與戰堅壁清野待之曠日持久敵心必慢於始到矣候其攻無所拔掠無所得敵之衆心益以慢矣當於中夜潛聴呼更號之聲小有失則隂出精兵兩道擊之地勢便則兩道出不便則一道出壁中鼓譟應之如此則可以破其乘勢者矣敵有恃氣勢而到者可以後潛精兵偽示以老弱敵進攻則發伏兵擊之必勝矣何謂也許洞曰以氣勢加人者止用勇敢疾速為務鮮能精謀深慮彼見老弱必輕進凌轢之堅陣以俟一鼔不勝鋒必挫反為我乘矣敵有以假勢而到者旗鼓之盛壒埃之多旗鼓或虚衆埃壒或曳薪豫料敵國兵如敵有十萬之衆侵伐之地不及五萬之師矣降之不溢三萬矣國有百萬之衆侵伐之地不及五十萬之師矣降之不溢三十萬矣謂其各有分屯防援之地及散亡之所減故兵不能盡到侵伐之地以此料之百萬之國其衆來者有百萬六十七十八十九十萬之旗鼓與號令者必不溢四十萬矣餘皆疑兵十萬之國其衆來者有四萬五萬之旗鼓與號令者此為不溢三萬矣餘皆疑兵也敵國大小敵衆多寡皆以此類數知之也是以知旗鼓多者其兵少矣不可怖但以精兵出其不意必敗矣或敵探我動靜者為我所知即佯示以疲倦懈怠使知之敵必隨勢而來豫於諸道及通衢隂伏鋭兵以俟之先令細人宻探敵人舉兵之所然後伏設以待亦可過半則邀擊之敵先得地勢以薄我未可與戰堅壁觀之持久則衆心怠矣得便地者心多恃之持久必緩故可以俟而擊之也是皆反用五勢之法也敵有挫勢者可以自外擊之敵有支勢者可以自内擊之内攻為用間怠其敵心然後擊之敵有輕勢者可以突之掩不備也此隨敵三敗勢攻之也以此言之是故多勝者非强也多敗者非弱也率由勢爾夫水之柔弱方圓任性而能蹶隄漂石者勢之至也火之剛炎亘天而起者火之勢也薪木既灰而滅影者勢之去也故用兵之道能知水火之王敗則盡於勢之用矣李筌曰夫兵有神有形旗幟金革依於形智計計事依於神戰勝攻取形之事而用在神虚實變化神之功而用在形形粗而神細形無物而不鑒神無物而不察形往而惑事其外神密而圓事其内觀其形不見其神見其神不見其事以是參之曳柴揚塵形其衆也減竈滅火形其寡也勇而無剛嘗敵而速去之形其退也斥山澤之險無所不至形其進也油幕冠樹形其强也偃旗卧鼔寂若無人形其弱也故曰兵象陶人之􅀈土鳬氏之冶金為方為圓或鼎或鐘金土無常性因功以為名戰陣無常勢因敵以為形故兵之極至於無形無形則間諜不能窺智略不能謀因形而措勝於衆衆不能知形不因神不能為變化神不因敵不能為智謀水因地而制形兵因敵而制勝也許洞曰太公曰智與衆同非人師也伎與衆同非國工也動莫神於不意勝莫大於不識孫子曰善戰者其勢險其節短率謂異諸也是以善用兵者其異有五一曰險二曰輕三曰危四曰愚五曰畏窮途邃谷死絶之地敗壘夷塹馳突之所衆以險也去焉我當内固軍陣外若不整以誘敵内嚴部伍外若不嚴以驕敵彼既不識隠之以變衡之以卒此用險之道也彼衆我寡力殫糧絶勝勢在彼敗勢在我當飲血誓士嚴令厚賞進以必死提寡少之兵突强禦之衆以我為輕也當有輕之用由窮地而闢生門反輕而決焉此用輕之道也敵强攻急師人大震衆以為急我不以急遽自亂當有危之用嚴號密備以天命慰撫吏士外閑其貎内潛速其機以奇出兵此用危之道也敵人以間來間我佯不知而受之敵人以探來探我佯無備而設伏待之敵謂我愚當有愚之用反而智焉此用愚之道也望敵之兵來退縮守壁見敵之使來卑辭下氣如欲和解衆以我為畏也當有畏之用退縮則設伏而攻之出奇衝之欲和解則以利動之以單騎挑之此用畏之道也是五者反衆之為也衆以我為險者我用其利也衆以我為輕者我閉其決也衆以我為危者我用其安也衆以我為愚者我用其智也衆以我為畏者我用其勇也故太公曰不能推移不可語奇此之謂也用兵之術戰勝不可以專勝勝必有反敗之理勢敗不可以專敗敗必有反勝之道戰勝而敗者有五急難定謀狐疑不決一敗也機巧萬端失於遲後二敗也機事不密三敗也似勇非勇似怯非怯四敗也主將不一五敗也此五者皆戰勝而必反敗也戰勝而欲必勝者定謀貴決機巧貴速機事貴密進退貴必兵權貴一也勢敗而反勝者有四吏士饑割所愛啗之割所愛者謂在急難之中所乘駿馬及愛妾以啗吏士也衆有憤之用矣吏士恐奮身先之衆有勇之用矣期應不到殺其所暱所暱者謂所嬖幸或子弟諸姻同在軍合有定守者犯令則先殺之衆有懼之用矣人心疑惑隂為鬼詐鬼詐者詐為狐鳴謂叢祠中之類也或假託卜筮者百端不一有天之用矣天謂天所授也如是者以敗為勝也勝敗之術非勇神決智安能行之耶蘇氏曰知有所甚愛有所不足愛可以用兵矣故夫善將者以其所不足愛者養其所甚愛者士之不能皆鋭馬之不能皆良器械之不能皆利固也處之而已矣兵之有上中下也是兵之有三權也孫臏有言曰以君下駟與彼上駟取君上駟與彼中駟取君中駟與彼下駟此兵説也非馬説也下之不足以與其上也吾既知之矣吾既棄之矣中之不足以與吾上下之不足以與吾中吾不既再勝矣乎得之多於棄也吾斯從之矣彼其上之不得其中下之援也乃能獨完耶故曰兵之有上中下也是兵之有三權也權也者以一致三者也管仲曰攻堅則瑕者堅攻瑕則堅者瑕嗚呼不從其瑕而攻之天下皆强敵也漢髙之憂在項籍耳然親以其兵而與之角者蓋無幾也隋何取九江韓信取魏取代取趙取齊然後髙帝起而取項籍夫不汲汲於其憂之所在而徬徨乎其不足卹之地彼蓋所以孤項氏也秦之憂在六國蜀最僻最小最先取楚最强最後取非其憂在蜀也諸葛孔明一出其兵乃與魏氏角其亡宜也取天下取一國取一陣皆如是也范蠡曰凡陣之道益左以為牡右以為牝春秋時楚伐隋季梁曰楚人上左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃攜蓋一陣之間必有牡牝左右要當以吾强攻其弱耳唐太宗曰吾自興兵習觀行陣每戰視敵强其左吾亦强其左弱其右吾亦弱其右使弱常遇强强常遇弱敵犯吾弱追奔不過數十百步吾擊敵弱常突出自背反攻之以是必勝後之戎將既不能處其强弱以敗而又曰吾兵有老弱雜其間非舉軍精鋭以故不能勝不知老弱之兵兵家固亦不可無無之是無以耗敵之强兵而全吾之鋭鋒敗可俟矣故智者輕棄吾弱而使敵輕用其强忘其小喪而志於大得夫固要其終而已矣李靖曰兵用上神戰貴其速練士卒申明號令曉其目以麾幟習其耳以鼓金嚴刑罰以誠之重芻豢以養之浚溝塹以防之指山川以導之召才能以任之述奇正以敎之如此則雖敵人有雷電之疾而我亦有所恃若兵無先備則不應卒卒不應則失於機失於機則後於事則不制勝而軍覆故呂氏春秋凡兵者欲爭以一決取勝不可久而用之矣或曰兵之情雖主速乘人之不及然敵將多謀戎卒輯睦令行禁止兵利甲堅氣鋭而嚴力全而勁其可速而犯之耶答曰若此則當卷迹藏聲蓄盈待靖避其鋒勢與其持久安可犯之哉廉頗之拒白起守而不戰宣王之稽武侯抑而不進是也將戰必審知其將之賢愚與賢將戰則持之與愚將戰則乘之持之則容有所伺而為之謀乘之則一舉而奪其氣雖然非愚將勿乘之乘之不動其禍在我分兵迭進所以持之也并力而一戰所以乘之也兵有長短敵我一也敢問吾之所長吾出而用之彼將不與吾校吾之所短吾蔽而置之彼將强與吾角奈何曰吾之所短吾抗而暴之使之疑而却吾之所長吾隂而養之使之狎而墮其中此用長短之術也善用兵者使之無所顧有所恃無所顧則知死之不足惜有所恃則知不至於必敗李綱曰昔之用兵者有以少擊衆若昆陽之破尋邑淝水之敗苻堅是也有以多勝敵若王翦之伐荆韓信之定燕趙是也有以速為䇿若岑彭之攻公孫述李靖之擒蕭銑是也有以遲為䇿若亞夫之破七國趙充國之討先零是也夫以少擊衆者必將因便乘勢而躪蹙之其機在少譬猶蹙巨石于千仞之山而不假於多力故昆陽之戰尋邑擁百萬之衆驅虎豹犀象以助其威獨傲然有輕漢之志而光武得以投其間與敢死之士三千人衝其中堅城中亦鼓譟而出聲震天地莽兵遂以大潰淝水之戰苻堅將百萬之師以臨江漢慨然吞東晉之心而謝𤣥帥偏師八千以禦之乘其軍却衆亂追奔逐北而堅之師遂以敗散聞風聲鶴唳皆以為王師將至然則以少擊衆而能成功者豈非其機在少因便乘勢而躪蹙之不假於多力乎以多勝敵者必將以殄滅為期而不再舉其機在多譬猶拔大木之本根而役不再籍非衆其力則不可故秦欲伐荆而王翦亦為非六十萬不可卒如其數以與之遂破荆軍而平其地以為郡縣韓信既將兵虜魏王豹而定魏地請益兵三萬人願以北舉燕趙東擊齊南絶楚之糧道漢王與之而皆如其言然則以多勝敵而成功者豈非其機在多以殄滅為期而不再舉非衆其力則不可乎兵之以速為䇿者其機在速譬猶獵者之逐獸兔起鶻落少縱則失之岑彭之攻公孫述也襲破侯丹因晨夜倍道兼行二千餘里徑拔武陽使精騎馳廣都去成都數十里勢若風雨所至奔敗述大驚以杖擊地曰是何神也而述遂亡李靖之攻蕭銑也大閲兵雲安秋潦濤瀨漲惡諸將請江平乃進靖曰兵機事以速為神今士始集銑不及知若乘水傳壘是震霆不及塞耳安能倉卒召兵以禦我此必擒也諸將從之而銑果擒然則以速為䇿者豈非其機在速而少縱則失之乎兵之以遲為䇿者其機在遲譬猶獵者之檻虎候其困而搏之則不為其所傷周亞夫之擊七國也以謂楚人剽輕利於速戰難與爭鋒故以梁委之而堅壁不與之爭而絶其饟道待其饑而一舉破之趙充國之討先零也以謂强結之則合緩之則散大兵久留其費不貲故上屯田之䇿班師罷兵以萬人留田待弊而一舉滅之然則以遲為策者豈非其機在遲候其困而搏之則不為其所傷也乎夫兵之多少遲速皆機也善用其機皆足成功而不善用之則以少而殱若陳黶之嘗秦軍以多為累若趙括之敗長平以速而趨利如龎涓之死馬陵以遲而養冦如劉繇之失江東者多矣可不察哉總要曰兩敵未交以數相持敵若執數我先動則以陽就隂以虛應實必為之擒譬如虎豹不動不入檻穽麋鹿不動不罹網羅凡物未有不以先動而受制於人也雖然若後動者不能觀敵而利計則禍愈於先動曰先則弊後則懾也又曰先人有奪其心後人有待其衰也夫軍中聲望莫重捉生雖殺千兵不如生擒一將非奇計安能致之須揀馬疾走者揀人身手相副者專敎習刀鎗弓射撩鈎搭索皆令便熟臨時任成兵事若賊出小陣其將例多驍勇小為利誘必貪其功令捉生馬三百疋分為三隊以一隊逐便埋伏以一隊直衝以一隊駐隊直衝隊緩則攪刺急則走駐隊候直衝隊走過便向前路支敵亦引走賊見兩隊全走又無傍救必速追犇引過埋伏隊起背後殺之即兩隊囘旗應接自成擒矣若夫列大陣之時即以馬軍三百騎全以直衝陣疎處須突過取背捉賊將軍縱使不獲亦須奔走撓賊撩亂豈能堅鬭凡陣無大小須擒振時之威勢也總要曰凡隊伍被賊攻迫衆寡不敵鄰近隊伍并須齊進救援之凡以十人敵一則圍之五人敵一則三人攻之二人為奇伏凡兵方戰其跳盪奇兵馬軍等隊即須量抽人馬當之仍於隊内抽捉人馬凡彼我相敵以地利阻之不得地利以隂伏阻之又不得則併力偏攻凡料敵戰地若便利則守不利則去若未得戰地雖見利不可就之凡背山戰宜藏軍少誘之伏攻之凡背水戰步軍當衝馬軍為翼步軍後排營有利則前戰無利淺進凡軍前有水陷我則據髙以無激其怒賊既衆又且日久伺其懈怠或方食時可急擊也凡兵士當戰不得離隊獻功恐為所乘賊中事體左右作變以危其將多施巧説以怠其師用得其權攻取之謀必矣又我軍蓄藏精鋭示以虚羸使彼莫有鬭心不為固守偏師游突逢鬭詐逃料彼軍情必然懈怠候其不備襲之可潰又揀能行二百里三百人馬軍三百騎各分為三隊或即為馬步分為三道晝則抄掠人畜夜則擾賊營或斷絶津防或燒刼村野或左出右入或前衝後攻或殺採樵或擒遊奕彼則不勝其忿必出衆追奔我則疾走歸營不令接鬭不三五度人亦懈怠審其可引設伏取之若彼衆我寡力未可加賊欲待將来再計必退讓無令怒賊既停兵日久資用費多必分人諸處採取候乘風雨或因火之便凡與敵戰若我衆强可為示怯弱以誘之敵必輕來與我戰吾以鋭卒擊之其軍必敗法曰能而視之不能凡戰若敵衆我寡敵强我弱須多設旌旗倍増火竈示强於敵使彼莫能測我衆寡强弱之勢則敵必不輕與我戰我可速去則全軍遠害法曰强弱形也凡出師征討行則備其邀截止則禦其掩襲營則防其偷盜風則恐其火攻若此設備有勝而無敗法曰有備不敗凡戰所謂奇者攻其無備出其不意也交戰之際驚前掩後衝東擊西使敵莫知所備如此法曰敵虚則我必為奇凡敵人强勝未肯用命須置之死地告令三軍示不獲已殺牛燔車以享戰士燒棄糧食填夷井竈焚舟破釜絶去其生慮則必勝法曰必死則生凡興師深入敵境若彼堅壁不與戰欲老我師當攻其軍主搗其巢穴截其歸路斷其糧草彼必不得已而須戰我以鋭卒擊之可敗法曰我欲戰敵雖髙壘不得不與我戰者攻其所必救也凡與敵戰必先遣使約和敵雖許諾言語不一因其懈怠選鋭卒擊之其軍可敗法曰無約而請和者謀也凡戰若敵衆我寡暴來圍我須相察衆寡虚實之形不可輕易遁去恐為尾擊當圓陣外而受敵之圍雖有缺處我自塞之以堅士卒心四面奮擊必獲其利法曰敵若衆則相衆而敵受裹凡與敵戰若我軍曽經錯衂須審察士卒之氣盛則激勵再戰氣衰則且養鋭待可用而使之法曰謹養勿勞併氣積力攻守李筌曰地所以養人城所以守地戰所以守城守不足攻有餘力不足者守力有餘者攻攻人之法先絶其援使無外救料城中之粟計人日之費糧多人少攻而勿圍糧少人多圍而勿攻力未屈粟未盡城尚固而拔者攻之至也力屈粟殫城壊而不拔者守之至也夫守城之法以城中壯男為一軍壯女為一軍老弱為一軍三軍無使相遇壯男遇壯女則費力而奸生一云志散而力不專强壯遇老弱則老使壯者悲弱使强者憐悲憐在心則使勇人更慮壯夫不戰故善攻者敵不知所守善守者敵不知所攻古之善攻者不盡兵以攻堅城善守者不盡兵以守敵衝盡兵以攻堅城則鈍兵費糧而緩於成功盡兵以守敵衝則兵不分而彼間行襲我無備故攻敵所不守守敵所不攻攻者有三道焉守者有三道焉三道一曰正二曰奇三曰伏坦坦之路車轂擊人肩摩出亦此入亦此我所必攻彼所必守者曰正道大兵攻其南鋭兵攻其北大兵攻其東鋭兵出其西者曰奇道大山浚谷中盤絶徑潛師其間不鳴金不撾鼓突出乎平川以衝敵人腹心者曰伏道故兵出於正道勝敗未可知也出於奇道十出而五勝矣出於伏道十出而十勝矣何則正道之城堅城也正道之兵精兵也奇道之城不必堅也奇道之兵不必精也伏道則無城也無兵也攻正道而不知奇道伏道焉者其將木偶人也守正道而不知奇道與伏道焉者其將亦木偶人是也今夫盜之於人抉門斬闗而入者有焉他戸之不扃鍵而入者有焉乘壊垣坎牆趾而入者有焉抉門斬闗而主人不知察幾希矣他戸之不扃鍵而主人不知察大半矣乘壊垣坎牆趾而主人不知察皆是矣為主人者宜無曰門之固而他户牆隙之不卹焉夫正道之兵抉門之道也奇道之兵他户之道也伏道之兵乘垣之道也所謂正道者若秦之函谷呉之長江蜀之劒閣是也昔者六國嘗攻函谷矣而秦將敗之曹操嘗攻長江矣而周瑜敗之鍾㑹嘗攻劒閣矣而姜維拒之何則其為之守備者素也劉濞反攻大梁田祿伯請以五萬人别循江淮收淮南長沙以與濞㑹武閣岑彭攻公孫述自江州泝都江破侯丹兵徑拔武陽遶出延岑軍後疾以精騎赴廣都拒成都不數十里李愬攻蔡蔡悉精兵以抗李光顏而不備愬愬自文城破張柴疾馳二百里夜半到蔡黎明擒元濟此用奇道也漢武攻南越唐䝉請發夜郎兵浮船牂牁道番禺城下以出越人不意鄧艾攻蜀自隂平由景谷攀木緣磴魚貫而進至油江而降馬邈至緜竹而斬諸葛瞻遂降劉禪田令孜守潼闗闗之左有谷曰禁而不之備林言尚讓入之夾攻闗而闗兵潰此用伏道也吾觀古之善用兵者一陣之間尚猶有正兵奇兵伏兵三者以取勝况守一國攻一國而社稷之安危繫焉者其可以不知此三道而欲使之將耶攻兵法云用兵之法全國為上破國次之全卒為上破卒次之皆謂用謀以降敵必不得已始修車櫓具器械三月而後成踊土距閸又三月而後已恐傷人之盛也故曰攻城為下然攻亦有道必在乎審彼之强弱量我之衆寡或攻而不圍或圍而不攻知此之道則能勝矣攻之者大要攻其所必守與其所必救故城有宜急而取之者有宜緩而克之者若彼我勢均外有强援慮腹背之患者須急攻之以速其利如我强彼弱外無救援力足以制者當羈縻守之以待其弊是謂不以兵攻以計困之令其自拔令其自毁若城堅兵衆欲留我師外援且至則表裏受敵拔之未足為利不拔足以挫威若是而將有不勝其忿而蟻附之士卒被傷城終不拔者乃攻之災此所謂不審彼之强弱者也法曰十則圍之五則攻之兵少則不可久圍環而鬭之離而合之此所謂量我之衆寡者也又城有所必攻者有所不攻者故兵向城必先使諜者求知城中之糧數計人為費糧多而人少則攻而勿圍糧少而人多則圍而勿攻也此所謂或攻或圍者凡欲攻城備攻具然後行之得主地然後臨之趨其所邑謂其攻軍主之所在絶其所恃謂斷其糧道而守其歸路使外交不得相救也圍兵必去城三百步外則弓矢不及姦偽不通賊出突圍勢力已困欲攻其一面則四面撓之使敵不知所備此兵謀也不發掘墳墓不殺老幼婦女不焚廬舎不汚井竈不毁神祠佛像恐怒敵也破城鼓聲未絶不許散掠俘虜俘虜須限以時及時擊鼓三通軍人便須歸營若捉獲有婦女者三日外不許留置在營此軍禮也得賊城堡非有要害可恃者不分兵鎮守得賊城近境者則固守以積糧儲薪芻中備之物所以免轉輸之勞也頭車攻城器也身長闊七尺前髙七尺後髙八尺以兩巨木為地栿前後梯桄各一前桄尤要壯大上植四柱柱頭設涎衣梁上鋪散子木為蓋中留方竅度二尺容人上下蓋上鋪皮笆一重皮笆以竹片編成以生牛皮縵笆上鋪穰藁厚尺餘穰藁上又施皮笆所以禦礟石也車三面皆設約竿如今坐檻上欄干頭牌木毎牌長九尺闊五寸厚六寸牌首有小竅以皮繩繫著車蓋垂在約竿外木無定數但取遮密三面牌外又垂皮笆亦以禦砲方竅下置梯以升蓋上前施屏風笆一笆中開箭窓倚以木馬令人於笆内射外凡攻城鑿池道以車蔽人先於百步内以矢石擊當面守城人使不能立乃自壕外進車用大木二條各長一丈八尺謂之掲竿首插前桄下稍壓後桄出以土囊壓竿稍令掲車首昂起車毎進便設緒棚續車後遇壕則運土雜芻藁填之運者皆自車中及緒篷下往來矢石不能及又以千金大麻繩繫車前桄引向後出以絞車自後急絞以助竿力令車首常去地尺餘兩面約竿牌木下分用三十人推挽梯桄下又以木撅鐡挺斡跳使進抵城下頭車舊木無輪今添入兩旁十輪攻城戰具作四輪車上以繩為脊生牛皮䝉之下可藏十人填隍推之直抵城下可以攻掘金火木石所不能敗謂之轒輼車以大木為牀下安四輪上建雙䏶䏶間横檢中立獨竿首如桔槔狀其竿髙下長短大小以城為凖首以窠盛石大小多少隨竿力所制人挽其端而投之其車推轉逐便而用之若理脚著地其旋風四脚亦可逐便而用謂之礟車作軸轉車車上安十二石弩弓以鐡鈎繩連車行軸轉引弩弓持滿弦牙上弩為七衢中衢大箭一鏃刃長七寸廣五寸箭簳長三尺圍五寸以鐡葉為羽左右各三箭次小於中箭其牙一發諸箭齊起及七百步所中城壘無不摧隕樓櫓亦顛墜謂之車弩以八輪車上樹髙竿竿上安轆轤以繩挽板屋上竿首以窺城中板屋方四尺髙五尺有十二孔四面别布車可進退圜城而行於營中逺視亦謂之巢車如鳥之巢即今之板屋也守宋陳規沂州人以明法補官靖康初知徳安府之安陸縣金人陷都規率兵數萬勤王半道兵潰而反㑹郡守及僚屬棄城出奔惟規獨留不去衆遂推規攝府事規乃聚兵積糧修城以守賊相繼來冦皆敗而去范宗尹為相分鎮以為徳安府漢陽軍鎮撫使兼知徳安府召赴行在在州八年累破賊衆中原郡縣皆失守惟徳安一城獨存識者偉其能然嚴刑重斂頗失民心規有朝野僉言後序曰規守順昌日得靖康朝野僉言具載金人攻城始末反覆熟讀痛心疾首不覺涕落嗟我國家不幸有如此悲夫世之治亂國之强弱雖曰在天有數未有不因人事得失之所致也揚雄所謂天非人不因人非天不成靖康京城之難若非人事之失則天亦不得而為災若非天欲降災則人事亦無此失規不揆至愚竊觀金人攻陷京城朝廷大臣守禦大帥施設應敵扞禦攻城之失與夫管見却敵之䇿論列而序言之朝廷再援太原大臣以謂中國勢弱敵勢方强用兵無益宜割三鎮以賂之殊不知勢之强弱在人為我之計勝彼則强不勝彼則弱强弱之勢自古無定惟在用兵之何如耳河東安撫使綂兵十七萬以援太原又招河東義勇禁兵五萬共兵二十二萬尋皆敗績致太原陷於敵非兵不多蓋用兵之失也其所以失者兵二十二萬直前而行先鋒禦敵者有幾一不勝而却自後者大敗皆走宜乎不能援也有識者觀之不待已敗而後知其不能援也豈不知攻城者分攻城兵備戰兵運糧兵扼援兵若兵不多必不久而速退又不待其援也假使當時往援者將良得計雖無兵二十萬只十萬亦可必援又無十萬只五萬亦可必為之援也且以五萬兵為率若止分為五十將留十將䕶衛大軍兼備䇿應内分三兩隊作諸鎮援兵前廣張兵勢牽制扼援之兵以二十將分地深入敵境綿亘可布三五十里不知敵兵多少便能盡害以二十將周圍行偏僻小路尋鄉𨗳多遣遠探向前設伏伺望敵人打糧出兵多則退之少則擒之但絶其糧道不必深入直抵城下其師自退又且兵既分遣則人力並用假令數將失利則大兵必不致於一齊敗衂潰散為盜京城之難其原在於援太原之失利也尼雅滿攻太原之壽陽城小而百姓死守凡三攻殘敵之衆萬人而竟不拔此必城中有善為守禦之䇿者僉言以為城小而百姓死守者非也攻城者有生有死而善守者有生無死壽陽之人可謂善守而不得謂之死守又云城小而堅者亦非也若謂城小矢石交通善守者亦難以設險施䇿規以為城愈大而守愈易分段數作限隔則易守若已守先䇿定險設伏使敵欲登城縱令登城已登即死賊欲入城引之入城入城即死今夫百里之城有數賊登之守城之人便自甘心乞命於賊者非攻之善乃守之不善也九月按礮於封丘門外大礮數百座皆在門外敵至不收遂為金人所得咸為攻城之具規以為城破亦不在此有善守者假使更資礮數百座亦必無害在於禦礮之術善不善也綂制官辛康宗以敵去城逺止兵不得放箭此善言也百姓鼓衆擊死已見其因亂制治之術失也敵先採濕木編洞屋以生牛皮蓋其上載之令人運土木填壕以進攻械守城人若得計則城内先施礮碎之亦可用單稍礮放遠至二百七十步下等二百五十步不知京城當時倉卒之際用與不用此格若人不究心則下等二百五十步亦莫能及若能究心則二百七十步過之甚易又有小礮禦近衆其小礮毎十人已上不過十五人可致一座亦可以到數十步外不謂小礮不能害物人中四肢則四肢必傷中腰已上則人必死中馬亦然又况大礮每放一礟小礮可放數礮兼小礮不必用石以重三四斤泥丸為之泥丸之利亦博不獨放時易得無窮放去中人人必傷死若要摧毁攻械則須用大礮及石金人攻守用大礮蓋欲摧毁城樓守城欲摧毁敵人攻械大礮與小礮遠礮齊用縱敵在城外伐木為對樓雲梯火車等攻械可以破盡金人廣列􅓓石礮座㝷碑石磨蓋石羊虎為礮欲攻之所列礮座百餘飛石如雨擊守城之卒死傷日亦不下一二十人此非攻城之能蓋守禦官一時之失計耳茍守禦官得計止令卒迎女頭牆坐城外礮來髙則於女頭牆上過低則打中女頭礮擊在外無緣中人一卒不至於死傷又豈有死傷日不下一二十人者惟女頭牆稍加髙厚則全安堵矣又須用造髙木長一丈闊一丈一丈上下外直裏斜外密裏希洞子外密處以大麻繩横編如竹笆相似以備礮石衆多攻壊女頭即於兩邊連進洞子向前以代女頭若此則礮石縱大至多亦無損壊間有損者即逐旋抽換假令止如此捍禦則礮石亦何能害人己可必得無虞也敵以雲梯對樓攻東水門其間捍禦有設重樓獲勝者固甚善也又恐人在髙樓之上愈招矢石矣又聞宋門守禦官亦以禦對樓雲梯至毎以木衝倒仆死者無數此亦奇䇿然持撞木人與對樓上人相對不免互相殺亦非全勝金人填壕成五對樓過壕攻城下列礮二百餘所七稍礮可施五十斤石散星礮每座可施䖏闕以理度之自是敵必不容矢石必倍守禦官若能令人依前説造洞子於闕樓子處兩頭連珠並進不終日決可築合代女頭以隔矢石矢石雖愈倍於前亦必無害次於燒了城樓子兩頭措置深埋排扠木以防敵急急登城上分兵兩向次於城裏從下斜築向上至城面外垠向下陡峻次於城裏脚下取土為深壕三五丈築月城圍之使敵乘對樓到城如不下對樓上城却囘則已若上城必自立不得到内壕内無不死者如此一到必當罷攻退兵不期守禦之人於此一失以致城陷重念國家之難豈不痛哉攻守之械害物是重其勢可畏者莫甚於礮然亦全在人用若攻城人能用而守城人不能禦之則攻城人可以施其能若守城人能用則攻城人能者亦難施設竊聞金人用礮攻京城守禦人亦嘗用礮城闕内必然難安大礮亦難容數多雖有礮臺而臺地步亦不甚廣又礮才欲施放敵人在外先見必須以衆礮來擊又城上礮亦在髙處自然招城外敵人用礮可以直指而擊之以此觀之守禦之人可謂不能用礮也明矣假令當時於城裏脚下立礮仍毎座礮前埋立木為衣敵人在外不見立礮所在雖有善用礮者何能施設或人以謂礮在城裏礮手不能得見城外事無由取的毎座礮别用一人於城上專管裏礮稍與外物相對即令設施少偏却令礮手少那脚上大偏則就令拽礮人擡轉礮座照料得一礮打中得礮少有不中又城裏立礮可置數多守禦人用礮若止能如此雖敵用礮何能為也築城之計城面上必作女頭中間立狗脚木一條毎女頭中掛搭箆籬惟可以隔遮弓箭弩於礮石則難以遮隔若改作平頭牆不用箆籬只於近下留品字方眼與女頭相似亦甚濟用或問何以備禦城外脚下自有馬面牆兩邊皆見城外脚下于牆上頭墜下害敵之物敵人初到城下觀其攻械勢恐難遏宜便於城裏脚下取土深闊裡壕壕外去壕數丈再築重城一重對舊城門更不作門却於新築城下緣裡壕又二三里地新城上開門使人入得大城直行不得須於裡壕垠上新城脚下繞繚三二里地方始入門若此則假使賊善填壕止不過填外壕必不能填得裏壕賊若由門入城須行新城脚下裡壕垠上新城上人直下臨敵何物不可施用正是敵死地必不敢入既由正門入城尚不敢豈肯用命打城且只如此為備敵兵至多攻城百種試可談笑以待之又况京都舊城亦自可守若遂措置便可使勢如金湯有不可犯之理兼京城内之軍百姓金銀粟帛計以億兆之數亦莫能盡若能竭力修作不特添此一城一壕可不日而成假使添築城壕數重人亦不勞而辦重城既備然後招敵使入城議事彼若見之必不攻而自退俗諺云求人不求己古人云上䇿莫如自治又事貴制人不貴制於人皆此之謂也京城周圍地約一百二十里聞當時敵在城外諸門多閉有以土塞者止開兩三門通人出入如此乃是自塞生路而為敵生路也及為守之計不獨大起諸門仍於兩門之間更開三兩門使周圍門有數十座齊於城内運土木出外填壕作路使戰兵出入無至自礙城上觀望敵人嘹哨乘便處即遣兵擊殺或夜出兵使敵在外所備處多晝夜備戰無有休息彼自不能久攻兼既城内剙開城門自運土填壕欲為入計不攻自敗所以敢自剙開城門出填壕者非謂其敵兵可欺蓋恃其自於城内設除已備敵入城而死耳晉王浚遣都䕶王昌及鮮卑段就六春末杯等部五萬之衆以討石勒諸將皆勸勒固守以疲冦獨張賓孔萇以謂可速鑿北壘為突門二十餘道勒即以萇為攻戰都督造突門於北城鮮卑入城北壘勒俟其未陣躬率將士鼓譟於城上㑹孔萇督諸門伏兵俱出擊之生擒末柸等衆皆奔散萇乘勝追擊滿尸三十餘里獲鎧甲五十疋此乃守中有攻可謂善守城法也後之守城者何憚而不法歟州郡城池之制人皆以為盡善城有敵樓而敵人用火礮擊樓城外有壕而敵人用洞子壘填城髙數丈敵人用天橋鵞車對樓慢道雲梯等攻具登城據其城池之制可以自謂堅固前所未有奈何敵人攻械雄傑亦前古所未有故事貴乎仍舊而人憚於改作皆不可必者古人所謂利不百者不變法功不十者不易器以今城池之制觀之雖然利不至於百而功不至於十其間有須臾改者不可不更改也自古聖人之法未嘗有一定之制可則因否則革也為今之計如敵樓者不可仍舊制也宜於馬面上築髙厚牆下留品字方徑及尺空眼以備覘望及施設槍路牆裏近下以細木蓋一兩架瓦棚可令守禦避寒暑風雨屋牆裏牆皆低下則礮雖在外數多悉不能及又壕上作橋橋中作弔橋時暫隔敵則可若出兵則不能無礙宜為實橋兵出入俱利城門宜迂回曲折移向裏百餘步置不獨敵矢石不及其舊作門樓處行入一步向裏便是敵陷穽蓋百步内兩壁城上下臨敵人應殺敵之具皆可設施舊門前横築䕶門牆髙丈餘兩頭遮過門三二丈城門啓閉人馬出入壕外人皆不見孰敢窺伺城外脚下去城二丈臨壕垠上宜築髙厚羊馬牆髙及一丈厚及六尺牆内脚下亦築雀臺髙二三尺闊四尺雀臺上於羊馬牆上亦留品字空眼以備覘望及通槍路一如大城上女牆頭牆牆重疊雀臺上埋排扠木以備敵填平壕塹及破羊馬牆至城脚下則敵於羊馬牆内兩邊受敵雀臺上與大牆向下所施矢石即是敵當一面而守城人三面禦之羊馬牆内兵賴羊馬牆遮隔壕外矢石是羊馬牆與大城係是兩城相乘濟用使敵人雖破羊馬牆無敢入者故羊馬牆比大牆雖甚低薄其捍禦堅守之効不在大城之下又羊馬牆内所置之兵正是依城下塞以留伏兵不知敵人以何術可解若此既有羊馬牆其鹿角可以不用仍於大城上多設暗門以備遣兵於羊馬牆内出入又羊馬牆去大城脚止二丈不可令太逺者慮大城上抛擲磚石難過牆内反害牆内人又不令太近者慮其太窄難以囘轉長槍又於大城脚下作深闊裏壕壕向上裏度地五七丈可作來往路外築裡城排扠木但多備下敵冦城應敵處用此設備雖使敵人善攻不足畏也墨子宋大夫善守禦公輸般為雲梯之械將攻宋墨子見之乃解帶圍城以械為牒九設攻械之機墨子九拒之公輸般攻械盡墨子守有餘公輸屈曰吾知所以拒我者以見此攻城者宜乎古人以為䇿之下也夫守城者毎見敵人設為一攻機而無䇿以應之者未有思也規嘗謂孫子曰兵者國之大事死生之地存亡之道不可不察也又以謂兵者詭也用意中形詭詐為道是以善守者藏於九地之下使敵不知其所攻今夫備禦之䇿宜乎藏之於身待敵而用不可以先𫝊之然而有𫝊之於衆而達之于遠有利而無害有得而無失不可不先𫝊也嗟乎靖康丙午金人以兒戲之具攻打京城守禦者不以時設計遂致城拔迄今一紀有餘而金人不思當時幸勝尚以驕氣相矜在規未知敵人攻京城械器施設之前則毎聞人云金人攻城大礮對樓勢不可當貴顯言之則快然而不敢辨衆人言之則亦不敢痛折今既知其詳則豈可不盡剖其所見而言之規竊嘗聞國之利器不可以示人又機事不密則害成然而用兵之道以正合以奇勝善出奇者無窮如天地不竭如江海千變萬化孰能窮之今止據其金人拔京城當時攻械施設略舉其捍禦之䇿大槩言之至於盡精微致敵之方有不可得而𫝊之者矣惟在乎守城之人於敵未至前精加思索應變之術預為之備耳區區管見不能自揆輒序於僉言之後王稟守太原尼雅滿攻城之具曰礮石洞子鵞車偏橋雲梯火梯凡有數千毎攻城先列克列礮三十座凡舉一礮聴鼓聲齊發礮石入城者大之於斗樓櫓中礮無不壊者賴總管王稟先設虚柵下又置糠布袋在樓櫓上雖為所壊即時復成尼雅滿填壕之法先用洞子下置車轉輪上安居木狀如屋形以生牛皮縵上又以鐡葉裹之人在其内推而行之節次相續凡五十餘兩人運土木柴薪於中尼雅滿填壕先用大板薪次以薦覆然後置土在上増覆如初王稟毎見填即先穿壁為竅致火鞲在内俟其薪多即便放燈于水中其燈下水尋木能燃濕薪火既漸盛令人鼓鞲其焰亘天至能不令填壕其鵞車一如鵞形下亦用車輪冠之以皮鐡使數十百人推行欲上城樓王稟於城中亦設跳樓亦如鵞形使人在内迎敵亦先以索結巨石置彼鵞車上又令人在下以搭鈎及繩拽之其車前倒又不能進其雲梯火梯悉用車輪其髙一如城樓悉如王稟隨機應變終不能攻又嘗内起重城慮外壁之壊我師為敵所圍可以力守者三外有援兵一可守也人士勁勇芻粟豐備二可守也池城完固民人富實三可守也可以決戰者三外無援兵一可戰也人勁馬壯兵甲堅利儲蓄不備二可戰也城池不完士民窮匱三可戰也守可以必守戰可以即戰何謂必守許洞曰盡我力焉援兵不到即俟敵懈出奇以戰如光武昆陽水上鼓譟而出如田單即墨火牛之類是也何謂即戰許洞曰既圍即戰謀未備也圍久則固焉被圍之師不可出者三敵無故開圍一角者有伏也退圍數里者謀也示以弱者誘也可以急備者二敵攻其西謹備其東敵示以閒暇者此必緩我而欲乘懈隂將衝突也夫被圍者當先安其内而後及其外可也兵法曰守城之道無恃其不來恃吾有以待之無恃其不攻恃吾有所不可攻故善守者敵不知所攻非獨為城髙池深卒彊糧足而已必在乎慮智周密計謀百變或彼不來攻而我守或彼不挑戰而我擊或多方以謀彼師或屢出以疲彼師或彼求鬭而我不出或彼欲去而懼我襲若此者皆古人所以坐而役敵國之道也此雖得禦攻之計然又要先審可守之利害凡守城之道有五敗一曰壯夫寡小弱衆二曰城大而人少三曰糧寡而人衆四曰蓄貨積於外五曰豪强不用命加之外水髙而城内低土脈疎而池隍淺守具未足薪水不供雖有髙城宜棄勿守亦守有五全一曰城隍修二曰器械具三曰人少粟多四曰上下相親五曰刑嚴賞重加之得大山之下廣川之上髙不近旱而水用足下不近水而溝防省因天財就地利土堅水流險阻可恃兼此形勢守則有餘故兵法曰城有不可攻又曰善守者藏于九地之下皆謂此也凡守之道敵來逼城靜黙而待無輒出拒候其矢石可及則以術破之若遇主將自度其便利以彊弩叢射飛石併擊斃之則軍聲阻喪其勢必遁若得敵人稱降及和切勿弛備當益加守禦防其詐我若敵攻已久不拔而去此為疲師可躡而襲之必破此又寄之明哲見利而行不可羈以常格也古法曰三里之城萬家守之足矣今若遇敵逼近人力不暇者即且約容一軍人馬如築於閒時須稍寛闊守城之法凡冦賊將至於城外五百步内悉伐木斷橋焚棄宿草撤屋堙井有水泉皆投毒藥木石磚瓦茭芻餱糧畜牧與居民什器盡徙入城内徙不逮者焚之主將閲視守禦器械各令牢具又預穿井無數惟井無近城又備糧􅖲布帛芻草蘆葦茅荻石灰沙土鐡炭松樺蒿艾膏油麻皮氊荆棘箆籬釜鑊甕盆桶缶水石磚竹鍬钁鑱斧錐鑿梯索之類凡委積及樓棚門扇門棧但火攻可及之處悉皆氊覆泥塗棚樓下隨處積檑木檑石鎗斧及他短兵外立弩彈礮架棚樓女牆上加箆籬竹笆城中立望樓籍民中壯男為一軍以充防人壯女為一軍以𨽻雜役老弱為一軍以供飲飼放牧樵採三軍無得相過主將延問軍中奇謀勇力機㨗跅弛精伎辯口之士如雞鳴狗盜之類無不加禮以備防用城上毎將各立一典掌呼索百用先作小旗數十枚有呼索即大書物名貼旗上上舉以示城下仍預檢校備用之物各為部分使吏主當謹伺見降旗則應送城上城下百步給雜役三五十人掌負挈所須索物仍各授一官督領衢巷通夜張燈燭察姦人出入與軍士之私相過從者量城上一步置一甲士十步増五人防非時抽易五步有五長十步有十長百步有將别令虞候領戰隊作雌雄契持以巡城所至與守隊勘同乃過若賊勢外振士心内貳則或轉左隊以為右易前軍以置後或一日數易或數日不移又間使人持偽契巡行以驗試將士毎將各設四表賊來近則舉一表賊至城則舉二表賊登城則舉三表賊攀女牆則舉四表夜則加燭於表上虞候戰隊視舉表處急援如賊已向城乘城將士皆援立牌以自障城及弩臺上並度視逺近施放矢石火毬火鷂鞭箭賊在城下則抛飛鈎賊若填壕則為火藥鞭箭以射焚其芻藁橋械賊傅城欲上則隨其處下擂木擂石以擊之投飛炬以燒其攻器下火牀及以行罏鎔鐡洒灼敵人颺石灰糠麩眯害其目樓棚踏空版内雜短兵下刺登城者若登者漸多則禦以狼牙鐡拍手漸攀城則以連枷捧擊之剉手斧斷之賊以衝車等進則穿以鐡鐶木環放猛火油賊雲梯倚城則引文竿推撞車賊木驢穴城則用絞車鐡撞燕尾炬壊之賊飛礮石則張布幔繩過其賊為地道來攻則為地聴候其來方穿井邀之霹靂火毬烟毬等害之賊附髙穴城則縋遊火箱灼之賊築土堙傍城欲上則穿地道至堙下引取其土賊堙自壊或城内薄城起堙相對盛兵抵禦賊以火攻城則城上應救火之具有托义火鈎火鐮栁灑子栁罐鐡手貓唧筒尋常之所預備者若攻具猛至則為水袋水囊以投沃之應棚樓器械雖已塗覆亦頻舉麻搭潤䕶若賊為火車燒城門則下濕沙滅之切勿以水水加則油焰愈熾賊若縱烟向城則列甕缶以醋漿水各實五分人覆面於上其烟不能犯鼻目賊夜圍城則毎五十步以二人繫城下置食其前城上聞犬吠則縋火下照舉表加備又於城半腹毎十步繫一燈籠又束蘆葦為插以松明樺皮可用照賊或攻摧女牆則以木女牆代之或攻壊城門則以刀車塞之凡賊諸攻不利必引水灌城我則壅塞諸門察視城中陷穴之處悉加傅築城内促圍望外水髙下别築闊牆牆外取土可深一丈兵隊備城如故周視地勢有可洩水處十數步開一井井内各相通以洩疏之若水已入城則於新築牆外作船二十隻選勇士毎船三十人質其父母妻子各授弓弩短兵鍬钁遣暝夜從門銜枚並出決賊堤堰破賊營砦所選之士須預習水戰度力不足則加船以進或賊已覺則城上鼔譟為助凡賊有勇悍之卒必使來突我城門我當偽為不知開門以待於道路設陷馬坑機橋於重牆曲巷内出奇伏兵掩擊逼陷之或約其過一二百人即下重門插板使其前敗後絶凡城内器械已備守禦已得當出奇用詐以戰代守以擊解圍先為暗門或因賊初至營陣未整或暮夜乘賊不覺或賊攻城初息或賊圍久已怠潛出精騎銜枚擊之擊敗亦不逺襲或我兵已出賊突門而入則自城上向裏連下巨石擊壓以斷其入凡城中日給百用至於水漿皆有限量令民竈為天井髙突防火仍預下令凡失火者斬杜姦人也或城内有火發只令本坊官吏領丁徒赴救仍急赴主將主將遣左右親信人促往凡城中失火及非常警動者主將命擊鼓五通城上吏卒聞鼓不得輒離職掌民不得奔走街巷凡賊至城外禁城中不得妄舉髙物如竿表之類及吹擊樂器恐賊内應凡城中有使至門者徑導詣主將裨校民吏不得輒見如得城中飛書不得輒讀持送本營將衆封送主將凡有曉星氣數術人悉收𨽻官府不得與他人竊語及禁論説怪異以惑衆心凡號令一出主將并副將以下不得專異指揮餘依行軍約束條件羅拱辰一守議各城雖有濠河之險必須附城壕邊就以挑起淤土離城脚丈餘不等臨隄圍築五尺髙牆使賊雖或渡濠亦難輒抵城下况不時出奇兵數十人於城下得此牆遮蔽可以藏伏窺視如賊近對壕我兵即於牆内潛發長器不露形體使彼不知我兵多寡有兵在城下時賊以為有無兵在城下時賊亦不知其無也所謂有有無無虚虚實實者此也且四鄉逃難男婦又得此牆暫容其身若賊來不必就先扯去弔橋恐奔來逃難男婦未能盡過不免立以待斃是可哀也既有此牆若果賊將來只須謹閉城門俟其到城方去弔橋亦不為遲况賊畏城上銃礮決不敢近我城下其城無敵臺則不能眺逺顧下何以言守必要貼城築出敵臺毎座相去或五六百步或七八百步或二三百步各隨城勢之曲直囘折以為逺近其守之之法最要靜治嚴禁諠譁庶臨敵不亂兵疲倦必要更番休養又恐乘怠而入須於垜外蓋出浮棚毎扇約闊三四尺或長六七八尺不拘環城接連駕設之法或用小木或竹毎根比棚闊三四尺以一半伸出垜外一半放入垜内其外閤浮棚棚上壓以磚石天晴加置石灰數包於上其内用繩縛墜石虚懸若賊加梯棚上則棚軟不乘其梯其磚石墜擊城下而内懸木石墜落牆内守垜者且自警覺若賊置梯棚下而上登其棚觸首一移動而亂石又墜矣若再加嚴固沿城周圍垜牆之上豎架奈何木其製堅立架木二根機闗横挑木各一根上閤一木謂之奈何木木上錯綜釘以竹簽其木之輕重與挑木相稱賊來攀援則其勢自然下擊而傷人既不能扳駕又不能取脱故名奈何木也敵至城下我兵輕動其木墜下又可擊之况此棚木易於成造且所費不多今各縣城低難守相應速製至於夜間守城用燈燭所費甚多且皆髙懸於垜上是使賊得以視我我不便視賊其利在彼矣甚非所宜為今之計應造鐡火毬中燃柴木則柴木之價比桕燭相去倍蓰况火光散闊及逺比燈火相去千萬毎垜口二十箇三十個止該用火毬一枚挑出垜外墜於城半則火光在下我視在上不悖其光我得以見賊而賊不能見我其利在我矣倘或城中一時火發恐是奸細在城中為裡應或居民失謹慎其守城兵夫未免驚疑且往救家宅必至棄其所守請先出示禁諭庶不疎虞守城鄙見一壹城居民各於平居之時就方隅與城相近有司預派垜夫必須一垜一夫庶事有責成不許二夫三垜恐成躭閣各令備鋒利器械一件或鎗或刀或扒或弓矢各須精緻皆適實用平居出示曉諭聞礮即登城預將垜頭粉白一處上書垜夫某人係保長某人甲長某人下始不敢推託誤事一賊泊城下晝夜攻圍交戰之時垜夫一名不許下城賊退之後垜夫輪班喫飯夜衛約定申時上城夘時始下各令分定信地該管官員逐名㸃查夜間長號擊柝凝神各於分垜向下向壕專視或見賊渡河或至城下安梯或聞水響或在壕外結衆聚望或射箭打礮急喊臨垜之夫及兵官知之用磚石星飛抛擊一垜夫夜間切不可睡蓋一垜之夫睡熟則一垜無人照顧一垜夫止於守禦若黠冦聚衆晝夜攻擊又非此輩可當須以兵力勝之兵技第一大佛郎機其次鳥嘴銃又其次弓矢如事急人人能舉用之不竭無如磚石也須多多積備陸續接濟可也一毎垜頭必用斗許大石一塊大約一人之力能舉者預布垜頭賊有頂門下梯者就將此石向頭推打一石不中又借鄰垜一石擊之不中又借一石擊之必擊之冦退而後已排難解紛無如此技也一四圍之城大勢四門各四官四隅又分四官綂領一臺至一臺又分一頭目管領各强弱搭配兵若干名分定信地庶事有責成毎分地須用一條鞭銃數管大佛郎機一架蓋鞭銃止能擊無遮牌之賊而有被有牌之冦非郎機不能制也一城除定兵之外毎於一面又當備遊兵一枝擇將士最强者為之毎遇事急即遣此兵輔之始保無虞一專委一員官將銀包三錢五錢一兩二兩至十兩者及花紅之類咸備一遇官兵垜夫或能擊賊或能退賊或能報賊渡水或能報賊取梯即時量功大小對衆賞之庶人心感戴爭相防守矣一毎敵臺用竈燒滚湯數鍋備長柄澆杓數把賊有登梯上城及登城者即以澆杓當頂澆之蓋秃頭畏滚湯也一近來賊鉛銃甚多須要付傍牌遮蔽一垜一牌更妙力不能及數垜一牌亦可人家鍋蓋垜夫執之亦能却矢毒也一藥線鉛子火藥皆當預多備一晝夜皆當周巡分地一官往來一官之地一面分官往來巡一面之地四面總委周巡四面之地各官皆須盔甲以防流矢鉛彈一賊船泊城下借鄰近大佛郎機并力攻之必使離城而後已一城中專委一官執牌往來巡視恐有他盜乘機竊發一各門用石嚴砌以防他虞一水門及木橋多用水甕以防不虞一毎垜一燈三垜懸一燈落地始能照見城下之賊然懸索宜細止勝一燈庶賊不能攀躋也一城頭牌巡不許訛言不許驚恐及引頸出垜外望最誤事也一各敵臺各備起火流星一二十枚某臺事急不能堵當急燃起火則本面遊兵應之一預令有司多備油燭以防久困至若竹纜草把各鋪皆當積備令人掌之以防夜戰也一賊攻圍須掣去橋梁若城外男女居民有欲進城者須窺賊稍逺先放入甕城待盤詰的當而後放入内城一城上用快馬𫝊報消息一分付各兵不許先存恐懼蓋我在城上彼在城下用上擊下易為力也地許洞曰古法曰散地無戰散地者境内地也士卒顧家其意未專不可戰也輕地無止者入敵地尚淺士卒意未堅不可以遽戰當自堅其心也争地則無攻山谷隘險之口以弱勝强以少擊衆之地也交地則無絶俱可進退之地不可以兵絶之也衢地則合交有路往來我可以結交於諸侯也重地則掠深入敵境士卒意已堅固可以掠取財物也圍地則謀士卒困於險隘鬭則兵弱持久則糧食絶乏則當用謀以免難死地則戰前有髙山後有大水糧食乏絶進退守備皆無所利當即日死戰也許洞曰此八者古人用地之法也若地協於用則用之不協於用則反之反之謂何曰古人用地之法若敵衆深入吾境壁壘不完芻糧寡少守且不利詎可以散地而不戰乎在我當以必戰為約怯退示以必死擒獲示以必賞令立告諸吏士將戰之際後顧者斬之相視而目動者斬之遺弓刀器械者斬之金鼓不應節者斬之獲一首級者亦厚賞之如是則有散地之法也入敵地尚淺險則據而挑夷則守慮士卒心不固當擇左右前後負背險絶斷其生路肅部伍嚴節制使人人自戰勢我當屯師為大營廣陣務攻具露其機狀如不密俾敵見之欲敵人備在前隂出精鋭敢死者循間道或扼其糧運或擣絶其後凡間道必多險阻或有巖岸峭壁之地則為懸梯竹索以陟降之或有深澗闊壑則為木桶瓦缶之類渡之覺敵内撓則自營陣中出精兵為應内外夾攻有爭地之用矣道路相錯我可以往彼可以來利設伏進戰戰佯北俟逐兵過半則舉號發伏衝擊之反佯北之師以應有交地之用矣頓泊之地徑達四面當選腹心勁勇者各將步騎以扼四衝人數多少隨用之雖無交應有衢地之用矣致兵敵境凡屬守備者順則安之否則夷之資食所獲必副吏士内以悦師人外絶敵所恃豈直深入然後用掠乎如是則用掠非止重地之用矣大兵將動先料其强弱觀其雲氣察地勢順逆審人心向背而後舉焉兵法曰䇿之而知得失之計候之而知動靜之理故得失之道利先知謀勝於未勝決失於未失者善也有死地之圍始謀於軍者必有後機之困矣設能及後機而達先知必無圍敵之患矣髙山大澤險峭沮洳溪徑斷絶無以生遁此乃志士用謀之利也當宜用奇兵出其不意以衝冦敵而後擊之也出奇奔衝或利用燧馬燧牛如田單陽班之類是也或候夜昏詐為號直奔衝敵師混服飾軍伍使不辨認之類是也如止以死戰為期茍敵兵益壯我援不到則李陵有弓折矢盡之困矣戰極力斃當自隕陷能竭智用謀萬變不極則無死地之憂矣然則地利者不可一槩用也但臨時觀其用何如耳兵貴設變不能以變用兵雖得地利無益也軍志云失地之利士卒迷惑三軍困敗饑飽勞逸地利為寶不其然矣是以彼此俱利之地則讓而設伏趨其所愛而傍襲之彼此不利之地則引而佯去待其出而邀擊之平易之所則率騎而與陣險隘之處則勵步以及徒往易歸難左險右阻沮洳幽穢垣埳溝瀆此車之敗地也候視相及限壑分川斯可以縱弓弩聲塵既接深林盛薄斯可以奮矛鋋蘆葦深草則必用風火蔣蒲翳薈則必索其伏平坦則方布汚敘則圓形左右俱髙則張翼後髙前下則設衝凡戰之道以形地為主虚實為佐變化為輔不可專守險以求勝也仍須節之以金鼔變之以權宜用逸待勞掩遲為疾不明地利其敗不旋踵矣或有進師行軍不因鄉導陷于危敗為敵所制左谷右山束馬懸車之徑前窮後絶雁行魚貫之巖兵陣未整而强敵忽臨進無所憑退無所固求戰不得自守莫安住則日月稽留動則首尾受敵野無水草軍乏資糧馬困人疲智窮力極一夫守隘萬夫莫向如彼要害敵先據之如此之利我已失守縱有驍兵利器亦何以施其用事至於此可不慎之哉若此地疾戰則存不戰則亡當須上下同心併氣一力抽腸濺血一死上前因敗為功而轉禍為福矣晁錯論兵法曰丈五之溝漸車之水山林積石經川丘阜山木所在此步兵之地也車騎二不當一土山丘陵漫衍相屬平原廣野此車騎之地也步兵十不當一平陵相逺川谷居間仰高臨下此弓弩之地也短兵百不當一兩陣相近平地淺山可前可後此長㦸之地也劒楯三不當一􅍉葦竹蕭草木蒙蘢枝葉茂接此矛鋋之地也長㦸二不當一曲道相伏險阸相薄此劒楯之地也弩弓三不當一武經曰詳諸兵書安營之法相視地形各有所宜今大河之北至於右北平千餘里三闗南北幽燕恩冀之間地平如掌頓軍置營方圓自取其便惟深溝髙壘大車為固今西北銀夏麟府鄜延環慶涇原秦鳯地接隴蜀南北數千里地無百里之平置營多在廣原大隴髙坂之地或尖斜或屈曲或披大山或臨深澗就其地形坡坂遞互相掩人馬咫尺不相見可以登髙視之逺見人馬易為設備今二廣之地自荆湖之南桂嶺至邕廣之地山水重複雖有平原盡為水田少有平陸江山雖固安營亦多占髙原平曠之地可以固守近者儂智髙亦使丁壯沿山穿道中夜斫亂營寨潰散人馬又西南巴蜀之界地接蠻夷昔樊綽蠻書云髙山峭壁萬仞連天深澗有底莫測其原昔武侯屯兵舊迹亦隨巖穴磵道屈曲坡坂之中凡置營陣之法但求其地形穏便臨時相度人馬多寡有無出入通糧之路四面無髙岡大隴視下之勢者可置營寨亦不離九地之法也意欲揚威示人則虚列廣張旗幟勢弱減竈卧旗伏戈詳在主將目視心生隨四方山川水陸形勢應時之變也士卒恃近懐戀妻子急則散走是為散地一曰地無闗鍵士卒易散走居此地者不可數戰又曰地逺四平更無要害士卒不堅意而易離散故曰散地也兵法曰諸侯自戰其地為散地是故散地無戰又曰散地吾將一其志吳子問孫武曰散地士卒顧家不可與戰則必固守不出敵攻我城壘掠我野田禁吾樵採塞吾要道待吾空虚而急攻則如之何武曰敵人深入吾都多背城邑士卒以軍為家專志輕敵吾兵在國安土懐生以陣則不堅以鬭則不勝當集人衆聚穀蓄帛保城避險遣輕兵絶其糧道彼戰挑不得轉輸不至野無所掠三軍困餒因而誘之可以有功若欲野戰則必因勢依險設伏地無險則隠於天氣隂暗昏霧出其不意襲其懈怠可以有功入敵境未深往返輕易不可止息將不得數動勞人兵法曰入人之地而不深為輕地則無止又曰輕地吾將使之屬吳子問孫武曰吾至輕地始入敵境士卒思還難進易退未間險阻三軍恐懼大將欲進士卒欲退上下異心敵守其城壘整其車騎或當吾前或擊吾後如之何武曰軍至輕地士卒未專以入為務無以戰為故無近其名城無由其通路設疑佯惑示若將去迺選驍騎御以先入掠其牛馬六畜三軍見得進乃不懼分吾良卒密有所伏敵人若來擊之勿疑若其不至捨之而去又曰軍人入敵境敵人固壘不戰士卒思歸欲退且難謂之輕地當選驍兵伏要路我退敵追來則擊之便利之地先居者勝是為爭地兵法曰我得亦利彼得亦利為爭地又曰爭地則無攻吾將趨其後呉子問孫武曰敵若先至據要保利簡兵練卒或出或守或偏或奇則如之何武曰爭地之法先據為利敵得其處慎勿攻之引而佯走建旗鳴鼓趨其所愛曳柴揚塵惑其耳目分吾良卒密有所伏敵必出救人欲我與人棄我取此爭先之道若我先至而敵用此術則選吾鋭卒固守其所輕兵外伏於險阻敵人還圍伏兵傍起此全勝之道也謂之交地平廣卒通兵法曰我可以往彼可以來為交地又曰交地則無絶吾將謹其守吳子問孫武曰交地吾將絶敵令不得來必全吾邊城修其守備絶深道路固其隘塞若不先圖之敵人已備彼可得而來吾不得而往衆寡又均則如之何武曰既我可以往彼可以來吾分卒匿之守而勿怠示其不能敵人必至設伏隠廬出其不意可以有功地居要衝控帶數道為衝地先據此地衆必從之故得之則安失之則危也兵法曰諸侯之地三屬先至而得天下之衆者為衢地衢地則合交又曰吾將固其結吳子問孫武曰衢地必先若吾道逺發後雖馳車驟馬至不能先則如之何武曰諸侯參屬其道四通我與敵相當而傍有他國所謂先者必先重幣帛使約和旁國交親結恩兵雖後至衆已屬矣我有衆助彼失其黨與諸國掎角震鼓齊攻敵人驚恐莫知所當入敵已深國糧難應資給將亡不挾何取為重地兵法曰入人之地深而難返背城邑多者為重地重地則掠吾將繼其食又曰凡為客之道入深則專主人不剋掠於饒野三軍足食謹養而勿勞併氣積力運兵計謀為不可測吳子問孫武曰吾引兵深入重地多所踰越糧道絶塞設欲歸還勢不可過欲食于敵持兵不失則如之何武曰凡居重地士卒輕勇轉輸不通則掠以繼食下得粟帛皆貢於上多者有賞士卒無歸意若欲還出即為戒備深溝髙壘示敵且久敵疑通途私除要害之道乃令輕車銜枚而行以牛馬為餌敵人若出鳴鼓隨之隂伏吾士與之中期内外相應其敗可知少固之地為圮地不可為域壘溝隍宜速去之兵法曰行山林阻險沮澤難行之道者為圮地圮地吾將進其塗吳子問孫子曰吾入圮地山川險阻難從之道行久卒勞敵在吾前而復吾後營吾左而守吾右良車驍騎要吾隘道則如之何武曰先進輕車去軍十里與敵相候接期險阻或分而左或分而右大將四觀擇空而取皆㑹同道倦而乃止也入則隘險歸則迂迴為圍地進退無從雖衆何用能為奇變此地可由兵法曰所由入者隘所從歸者迂彼寡可以擊吾衆者為圍地又曰背固前隘者圍地也圍地則謀吾將塞其闕呉子問孫武曰吾入圍地前有强敵後有險阻隘路敵絶我糧道利我走勢鼓譟不進以觀吾能則如之何武曰圍地之宜必塞其闕示無所往則以軍為家萬人同心三軍齊力并炊數日無見火煙故為毁亂寡弱之形敵人見我備之必輕則告勵士卒令其奮怒陳伏良卒左右險阻擊鼓而出敵人若疾擊我則前鬭後拓左右掎角也又曰敵在吾圍伏而深謀示我以利索我以旗分塞要亂不知所之奈何武曰千人操旗紛紜若道輕兵進挑陣而勿搏交而勿去此敗謀之法力戰或生守隅則死為死地兵法曰疾戰則存不戰則亡為死地死地吾將示之以不活又曰死地則戰投之亡地然後存陷于死地然後生衆陷于害然後能為勝敗吳子問孫武曰吾師出境軍於敵人之地敵人大至圍我數重衆欲突以出四塞不通欲勵士激衆使人投命潰圍則如之何武曰深溝髙壘示為守備安靜勿動以隠吾能告令三軍示不得已殺牛燔車以饗吾士燒盡糧食填夷井竈割髮捐冠絶士生慮將無餘謀士有死志於是砥甲勵刃并氣一力或攻兩旁震鼓疾譟敵人亦懼莫知所當鋭卒分行疾攻其後此是失道而求生故曰困而不謀者敗窮而不戰者亡呉子曰若吾圍敵則如之何武曰山髙谷險難以踰越謂之窮冦擊之之法伏卒隠廬開其去道示其走路求生透出必無鬭意困而擊之雖衆必敗兵法又曰若敵人在死地士卒勇氣欲擊之法順而勿抗隂守其隙則必開去道以精騎分塞要路輕兵進而誘之陣而勿戰敗謀之法也通形可以先先之以待敵兵法曰我可以往彼可以來曰通居通地先居髙陽利糧道以戰則勝兵法寧致人無致於人通者四戰之地須先據髙陽之處勿使敵先得而我後至也利糧道者或毎於控扼之要衝築壘城或作甬道以䕶之又曰通地雖有髙陽而無要害故兩通往來處髙陽候望向陽示生糧道便人轉運所以利於戰也挂形出不勝返亦難也兵法我可以往難可以退曰挂形敵無備出而勝之敵若有備出而不勝難以返不利也挂者險阻之地與敵地犬牙相錯動有挂礙也往攻敵敵若無備攻之必勝則雖與敵險阻相錯敵人已敗不能邀我歸路矣若我能往而敵人有備則不能勝必為敵人守險邀我歸路難以返矣一或不得已陷此地須為持久之計掠取敵人之糧以伺利便擊之也支形者隔隘可以相要截支持故不利先出也兵法曰我出而不利彼出而不利曰支敵雖邀我我無出引而去之令敵半出而擊之利支者如我與敵人各守髙險中有平地狹而且長出軍則不能成陣攻敵則自下禦上如此之類皆彼我不利宜堂堂引去伏卒待之敵若躡我候之半出險中發伏擊之則無不利敵先去以誘我我不可出也隘形者敵先守隘我去之若無守我從之兵法曰隘形者我先居之必盈之以待敵若敵先居之盈而勿從不盈而從之盈滿也言遇兩山之間中有通谷則須當山口為營與兩山口齊如水之器與口齊也如此則平易險阻皆制在我而得以出奇也若敵人在處隘之半不知齊口盈滿之術我則入隘以從之若敵人在隘我亦在隘俱得地形勝敗在兵不在地形夫齊口盈滿之術非惟隘形獨能有口譬如平陵迫澤車馬不通舟楫不勝中有逕亦須據其路口使敵不得進也諸可知之險形者居險阻之地不可後於人也兵法曰險形我先居之必居髙陽待敵若敵先居之引而去之勿從也凡地隘險者尤不可致於人也險者山險谷深非人力所能作為必居髙陽以待敵敵若先據之必不可與爭則當引去陽者向南地恐與敵人持久居隂而生疾也今若於崤澠相遇須先據北山此乃面陽而背隂也髙與陽二者寧捨陽而就髙不可捨髙而就陽經乃統而言之也逺形者力敵而戰勝敗未可知也兵法曰夫逺形勢均難以挑戰則不利譬如我與敵對壘相去三十里若我來就敵壘而挑戰者我困敵逸故戰不利敵若來就我壘是我逸敵困亦不利故言勢均然則如之何曰必欲戰者則移壘而相近也大凡兵之體用好髙而惡下貴陽而賤隂養生而處實生為陽養于陽則氣勝實為髙處於髙則逺絶卑濕有疾不起人安於用此兵之利而地之助也兵法曰絶澗天井天牢天羅天陷天郤六者謂之六害遇之者速去不可近也所謂絶澗者山水深大之地也天井者地形窪下大水可及之地也天羅者山澗迫狹可羅絶人之地也天牢者林木隠蔽葭葦深廣之地也天陷者道路泥淖人馬不通之地也天郤者土多溝坑坎陷水石之地也常令吾逺之敵近之吾迎之敵背之軍行有險阻潢池并生葭葦山林翳薈者必謹覆索之此伏奸之所也故兵行途有所不攻地有所不爭者諸此類也夫出師有主客用兵有步騎所有既殊則地亦不能兼利故晁錯曰丈五之溝漸車之水草木所在此步兵之地也車騎二不當一土山丘陵曼衍相屬平原廣野此車騎之地也步兵十不當一平陵相逺川谷居間仰髙臨下此弓弩之地也短兵百不當一兩軍相近平地淺草可前可後此長㦸之地也劒楯三不當一薍葦竹蕭草木朦籠枝葉茂接此矛鋋之地也長㦸二不當一曲道相伏險阨相薄此劒楯之地也弓弩三不當一兵法曰候望所及阻壑分川可以縱弓矢深葦奥草可以施風火左右俱髙則張翼而進後髙前下則鋭衝而進厯漸澤則整隊而亟過居平陸則前死而後生丘陵則必處於陽而右背之隄防則必據其隂而左向之若此皆須大將察理而喻於心先計而施於用一不中式則勝負隨至故陳豨不守漳水而髙祖平之龎涓失計於馬陵而孫臏破之成安君不保井陘終擒於韓信慕容超不固大觀卒敗於劉裕趙奢之登北山秦兵雖强而莫上李弼之據委曲齊師雖衆而勿利得失之鑒較然如斯可不務哉一賊若據險我以利餌之或退師以致之從其計則遣精兵潛出其背以奪之不從其計則引而去之一賊入境内初來氣鋭不可當頭截殺俟其四散搶掠其衆必分我當潛兵於鄉村擊之或待其將歸預為分兵伏於歸路從三分之二以邀攻之則勝一我軍入賊境未深士卒思家難進易退兵法所謂輕地經曰輕地勿止當以速進深入為務敵人必將固守以老我師我欲戰則攻其所必救以致之我欲退必選鋭設伏然後退待賊來追後則伏兵奮起前則返旗回攻勝之道也一戰地先居者勝兵法所謂爭地也敵先至慎勿與爭引兵而退或攻其所必救或以利而誘之敵若從之我則潛發精兵出其背而奪之敵若不從則引而去之我先至而敵若用此術則選吾鋭卒固守其所仍以輕兵外伏於險阻敵人來鬭伏兵傍起全勝之道也一戰地平原四達我可以往彼可以來兵家謂之交地我當為車營或拒馬營嚴加固守先為不可勝敵必輕我則其志必怠伺其來攻我當機應而變乘其不意不備之處奮擊之勝一軍行山峽之間卒然與賊相遇道路窄狹雖衆難用當令冒刃勇力之士先鳴鼓大譟而乘之以短兵接戰再遣健步精兵潛登岩崖險阻夾攻古人以此為谷戰譬如兩虎鬭於穴中猛者必勝一與敵遇於深林之内當視林木疎密疎處則布騎兵雜於鎗牌密處則布短兵各以奇正更戰更息此謂林戰之法也蜀諸葛亮兵法曰山陵之戰不仰其髙水上之戰不逆其流草上之戰不涉其深平地之戰不逆其虚此兵之利也故戰鬭之利唯氣與形也奇法曰凡與敵戰於江湖之間必有舟楫須居上風上流上風者順風火以焚之上流者隨勢使戰艦以衝之則戰無不勝法曰欲戰者無迎水流凡遇敵戰或岸邊為陣或水上泊舟皆謂之水戰若近水為戰須去水稍逺一則誘敵使渡一則示敵無疑我欲必戰勿近水迎敵恐其不得渡我欲不戰則拒水阻之使敵不能濟若敵率兵渡水來戰可于邊水伺其半濟而擊之則利法曰涉水半渡可擊凡出軍行師或遇沮澤圮毁之地宜倍道兼行速過不可稽留也若不得已與不能出其地道逺日暮宿師於中必就地形之環龜者中髙四下為圓營四面受敵一則防水潦之厄一則備四圍之冦法曰厯沛圮堅舎環龜一軍行前有深草我即緩行以待之候賊入草焚之賊若守而不進我則迂路攻之一軍行前有水陷我即据髙以待之候賊至陷中擊之賊若不來我則設伏退軍以誘之一軍行前有深林謹須搜索賊若固守順風草上焚之一軍行前有險阻賊兵固守即利而誘之候敵出潛令奪之北攻録曰爭山不得上則利在趙而不在秦爭水不得渡則利在漢而不在楚兩軍相遇不據利地以抗之詎能扼敵人於倉卒之際哉此據利之法不可不講也然其法有三一曰據山謂三軍遇敵既無城邑又無溝壘即於近便有山不拘髙低據以為險靜以待敵登髙望逺可見虚實而施吾破賊之謀發石斷木可避鋒鋭而扼其逼我之勢二曰據水謂三軍遇敵進無可依退無可保即於近便有水不拘淺深急據為險靜以待敵敵渡則俟其半涉而擊其濟薄之師敵逼則誓衆以死而激其背水之戰三曰據林謂三軍遇敵既無山阜可依復無川澤可據即於近便有林木掩映急據以為待敵之所敵將而愚則依林設伏而敵不及備敵將而智則緣林發矢而敵不可入林燥則畏焚而敵兵不可搜林密則畏絆而敵騎不敢逼然後張翼偽遁而反擊之是謂急據勢不兩立術不兩全處已於順則在彼皆逆處已於逆則在彼皆順故爭山不得魏兵以敗拒水上流蜀軍以勝順風揚塵賊軍以潰皆古人就順之驗也兵家未嘗明言之近者諸將失紫金山而花靨受敵失故鎮河而苻離受閉夏風多南冬風多北不諳風勢而淮北之師敗於暴風霰雹之所震鼓者屢矣此順就之法不可不講也一曰順山必使吾軍先居髙險則賊自陷於低下故矢石擊發我逺彼近人馬馳逐我逸彼勞我則前峻後險而無向不濟彼則内卑外髙而數面受敵二曰順水必使吾軍先占上游則賊自墮於下流故順水行舟順流濟兵而利害之勢已分拒水為營背水為陣而難易之形已判自上而下在我有摧枯折朽之易自下而上在彼有登髙陟險之難三曰順風毎遇戰鬭風起必使吾軍先背上風則賊自不能免於風故曳柴揚塵而敵軍莫知吾之虚實吹沙走石而敵軍莫當吾之衝突順風揚藥而敵之口鼻可以受毒因風縱火而敵之營壁可以延燒是謂就順筆談曰唐六典述五行有禄命驛馬湴河之目人多不曉湴河之義予在鄜延見安南行營諸將閲兵馬籍有稱過范河損失問其何謂范河乃越人謂淖沙為范河北人謂之活沙予嘗過無定河渡活沙人馬履之百步之外皆動澒澒然如人行幕上其下足處雖甚堅若遇其一陷則人馬馳車應時皆没至有數百人平陷無孑遺者或謂此即流沙也又謂沙隨風流謂之沙流湴字書亦作埿按古文埿深泥也術書有湴河者蓋謂陷運如今之空亡也水許洞曰兵法曰以水佐攻者强用水者其道有四焉一曰因二曰逆三曰賊四曰絶因水之用其道有二或敵絶中流而柵我得上游因風之利可以鼓棹縱火順流衝之柵絶而過風轉則止又若敵在下流士馬賴是水我得上游可以毒之此二者所謂因者也逆水之用則為崇隄以障其下注溢於内然後引之以灌所謂逆者也賊水之用敵所賴者水也當潛以水工審地理隂為畎澮導之他處竭其所賴所謂賊者也絶水之用或以薪衣土以石實舟沈之于上别為長梁泄之或沙囊於上流以壅其水欲水行則決囊所謂絶者也用水之道有其地非所用而必用反為所害順則善矣武經夫水攻者乃所以絶敵之道沈敵之城漂敵之廬舎壊敵之積聚百萬之衆可使為魚害之輕者猶使緣木而居縣釜而炊故曰汾水可以灌平陽濟水可以灌安邑河水灌大梁洧水灌潁川韓信夾濰水決沙囊而斬龍沮曹公引沂泗注下邳而克呂布皆控帶山阜得地形之利也若平陸引水勞力費工利害相半智伯以水攻而亡此又水攻者之宜戒也今存其法焉故兵法曰以水佐攻者彊凡水因地而成勢謂源髙於城本髙於末則可以遏而止可以決而流或引而絶路或堰以灌城或注毒於上流或決壅於半濟其道非一須先設水平測度髙下始可用之也水平及水戰全付木檀長二尺四寸兩頭中間鑿為三池池横闊一寸分縱闊一寸深二寸一寸三分池間相去一尺五分間有通水渠闊二分深一寸二分三池各置浮木木闊狹微小於池筐厚三分上建立齒髙八分闊一寸七分厚一分槽下為轉脚下髙與眼等以水注之三池浮木齊起眇目視之三齒齊平則為天下準或十步或一里乃到數十里目力所及置照板度竿以勾繩計其尺寸則髙下丈尺分寸可照板形如方扇長四尺下二尺上二尺面闊三尺柄長一尺大可握度竿長二丈尅作二百寸二千分毎寸内小尅隨所向逺近髙下置竿以照板應之眇目視之三浮木齒及照板以度竿上尺寸為髙下遞而往來尺寸相乘則山淵水源髙下淺深可以分寸度矣我城若居卑下之地敵人擁水灌城速築牆壁壅諸門及陷處更於城内促圍周匝視水髙下而闊築牆外取上髙一丈以上城立於牆内取上而薄築之精兵備伏守不得離也如有洩水之處則十步為一井井内潛通外洩漏城中速造船一二十隻募解舟檝者載以弓弩鍬鑊毎舟三十人自開暗穴銜枚而出斫營敵覺即急於城上鼔譟決其隄堰以精鋭急出助之開寶初車駕親征偽漢引汾水灌太原城時盛夏藝祖露臂跣足亦不裹頭手持刀坐黄蓋下督兵吏運土築堤以堰汾河城上望見矢石雨坌不避也水浸城者餘數版而已又命水軍乘舟焚其譙門幾陷㑹班師獲免其後敵有使於偽漢者見水退而城始大圮乃笑曰南朝知壅水灌城之利且不知灌而決之則無太原矣問遇敵劄立髙阜我軍卑下如何結營各項火器如何安置擊打答曰兵家好髙而惡下貴陽而賤隂大凡行軍必須逺為哨探如遇天井天牢天陷天隙必亟去之無疑也萬一卒然遇虜劄立髙阜我軍亦必相其髙處趨而赴之不得處於卑下奇兵弓箭手各帶小神鎗與二連珠礮手相兼擺列當先衝陣䕶營軍依法布立牌架軍隨即裝釘牌架樁撅就於脚下按圖結營以防衝突賊勢稍緩移營五六百步以防流矢且將奇兵收回營内隨將釘板品字安置堅其營壘以待大段地利未得宜守而不宜攻若賊持久不退其手把銃小神鎗專守營架礮裝勿放但盞口將軍大連珠相兼安置盞口將軍就地大連珠後掏一渠前枕木枕昂頭髙四五寸各裝枕在地齊向敵營攻打如法裝換敵必遁去仍須差人哨探的確方可回營以防佯北之詐如敵就衝來照依前法攻打問我軍占劄髙處賊立低淺又該如何結營各項火器如何安置擊打答曰兵法云視生處髙戰隆無登此處山之軍也我軍占劄髙處賊立低淺地利得矣敵人必不敢近其下相去亦必四五百步既爾據險然且不必結營但隨其山勢方圓按圖劄立即分遣奇兵於要衝以防掩襲其手把銃小神鎗亦裝勿放先將盞口將軍及大連珠各相兼安置於牌架手把銃之前盞口將軍就地大連珠前面亦就地但後掏一渠昻頭平放各向賊營擊打賊或遣客騎來攻誘我飛礮鉛子須號令官軍慎勿妄發如果逼近我兵其盞口將軍大連珠勢髙必逺不可輕放却令牌架手把銃間道而出於前再出奇兵手把銃列於前兩班輪番裝放及出弓箭小神鎗齊力擊打賊必潰亂乘勝出奇追斬滴水匡之戰是也問賊與我軍彼此俱在山坡平漫地相敵四圍撲衝如何戰守火器攻放如賊旋轉左右來攻火器如何放打答曰夫山坡者髙下之間也賊與我軍一遇於此雖地形兩得亦必隨其髙下按圖劄立隨分遣奇兵占立山頂勢緩方可結營攻戰如賊占山頂上下夾攻倉卒不能結營但火器利上弓矢利下須急令奇兵手把銃以攻上坡弓箭手各帶小神鎗以攻下坡及出牌架手把銃輪番放打庶能取勝小蒜澗之地形是也或遇平漫地上雖勢均力敵須令奇兵衝陣當先䕶營軍如法布立牌架軍按圖結營如賊勢重大急收奇兵回營舉放盞口將軍大連珠依法裝換隨將釘板安置以固營陣如四圍撲衝則出牌架手把銃於䕶營軍稍前如賊旋轉或左右來攻則出奇兵手把銃於牌架手把銃又前輪番裝放及出弓箭手小神鎗齊力射打賊必遁去大段輪班裝放宜進而不宜退雖曰稍退數步難免紊亂倉荒若賊乘隙衝撲不無僨事二姑原之戰是已必須更番漸進俟賊稍退方可緩回原立地方問如賊離營百步内外或二三百步盞口連珠手把等礮銃用藥若干安子若干礮銃昻頭髙下鉛子平擊多寡或逺或近有力無力俱期増減停當百發百中彼此不差答曰賊離營百步盞口將軍用藥七兩力大髙逺若平置則後縮難放其大連珠礮毎出用快藥一兩七錢安鉛子三箇毎箇亦重一兩七錢裝置在地昻頭髙一寸許鉛子第一箇可及三百步第二箇可二百步第三箇可一百步手把銃毎出用快藥八錢安鉛子二箇毎箇重一兩三錢脚立在地打放鉛子第一箇可及二百步第二箇可一百步如大連珠昻頭髙三寸鉛子第一箇可五百步第二箇可三百五十步第三箇可二百步手把銃執把在手昻頭平擊第一箇可三百步第二箇可二百步如大連珠向髙阜去處打放止裝鉛子二箇昻頭髙四五寸第一箇可五百步第二箇可三百步手把銃止裝鉛子一箇昻頭執把稍髙亦可及五百步然用藥雖同鉛子則異但先出者其力大後出者其力小其盞口將軍聲勢勝大昻頭少差釐毫逺近卒難度量凡火器手合用方婦人月水解毒箭并女勞復又方治聚血兼箭鏃在胸喉燒婦人月經衣酒服浣褌汁解毒箭并女勞復亦善扶南國舊有奇術能令刃斫不入惟以月水塗刀便死此是汚穢壊神氣也人合藥所以忌觸之治金瘡出血不止以精塗之營李靖兵法曰諸逢平原廣澤無險可恃即作方營兵既有二萬人已分為七軍中軍四千人左右四軍各二千六百人虞候兩軍各二千八百人左右軍及左右虞候軍别三營六軍都當十八營中軍作一大營如其無賊田土寛平毎營中間使容一營如地狹不得使容一營中軍在中央六軍總營在四畔象六出花軍出日右虞候引前其營在中營前右廂向南左虞候押後在中營後左廂近北結角兩虞候相當狀同丑未若左虞候在前即右虞候在後諸軍並却轉其左右兩廂營在四面各令依近本軍卓幕得相綂攝緩急須有救援若欲得放馬其營幕即狹長卓務取營裹寛廣不使街巷窄狹如其招隊兵少量抽不戰隊相助如兵有多少准數臨時加減其隊去幕二十步布列使均或地帶半險須作月營其營單列面平背險兩翅向險如月初生其營相去中間亦令容一營如逼賊庭不得使容一營若有警急畜牧并於營後安置其隊依前於營外去幕二十步均列布之行道狹不可并行者即第一戰鋒隊為首其次右戰隊次之其次左戰隊次之其次右駐隊次之其次左駐隊次之若道平川闊可得并行者宜作綂行法其綂法毎綂戰鋒隊居前兩戰隊并行次之又兩駐隊并行次之餘綂准此若更堪齊頭行者毎綂五隊横列齊行後綂次之加毎綂三百人簡取二百五十人分為五隊第一隊為戰鋒隊第二隊三隊為戰隊第四第五隊為駐隊毎隊隊頭一人副隊頭一人其下等五十人為輜重隊别著隊頭一人副隊頭一人擬戰日押輜重遙為聲援若兵數更多皆此類諸軍當軍折衝果毅必須排定隊伍毎行引發營須依次第戰右有罪須罰有功須賞依名排次甚為省易不然􅀈逐稍難爭競不定諸軍討伐列其數營發引逢賊首尾難救行引之時須先為方陣應行之兵分為四分輜重為兩道引戰鋒等隊亦為兩道引其第一分初發輜重及戰鋒分為四道行兩行輜重在中心雙引兩行戰鋒隊并各在輜重外左右夾雙引其次一分戰鋒隊與前班左右行戰鋒隊相當輜重隊與前行輜重相當又其次一分准上最後一分亦准上初發第一分引戰鋒輜重相當如其逢賊前後分四行兩行輜重抽縮兩行戰鋒横引作前面甚易其次兩分先作四行長引其戰鋒即在外便充兩面甚易其次兩分後分亦先作四行其輜重進前戰鋒隊横列相接便充後面亦易其方陣立即可成如此發引縱使狹路急緩亦得成陣毎軍戰鋒等隊須過本軍輜重稠行戰鋒等隊稠引常令輜重併近前頭戰鋒隊相去十步下一隊輜重隊相去兩步下一隊如此行即須裹得若逢川陸平坦彌加穏便其戰鋒輜重等隊分布使均諸軍馬行動須知次第出先右虞候馬軍為首次右虞候步軍次右軍馬軍次右軍步軍次前軍馬軍次前軍步軍次中軍馬軍次中軍步軍次後軍馬軍次後軍步軍次左軍馬軍次左軍步軍其次左虞候馬軍次左虞候步軍其馬軍去步軍兵一二里外行毎有髙處即令三五騎于馬上立四顧以候不虞以後餘軍維前立馬四顧右虞候既先發安營踏行道路修理泥濘橋津檢行水草左虞候排窄路橋津捍後收拾􅂒遺排比隊伏整齊軍次使不交雜若軍迴入先左虞候馬軍次左虞候步軍次左馬軍次左步軍其次第准前却轉其虞候軍職掌准初發交換諸軍營各量置虞候子并使排比依軍次行如此發引卒逢冦賊部伍甚易若令重疊散行牽率難就萬一賊至并非所營諸軍馬發引或遇泥濘或阻山河其路有須填補有須開拓左右虞候軍兵先多于諸軍取充虞候子右虞候先將此兵修橋梁泥滓開拓窄路左虞候排窄路捍後收拾闌遺諸軍營將發之時當營挑盪奇兵馬軍去營二三里外當面布列戰鋒隊駐隊各持仗依營四面去擬撒幕處二十步布列隊伍一如臨陣法待營中裝束輜重訖其步兵輜重隊二十步引馬軍去步軍二里外行引諸毎隊給一旗行則引隊駐則立於隊前其大總管及副總管則立十旗以上子總管則立四旗以上行則前引駐則立於帳側綂頭亦别給異色旗凝臨陣之時辨其進退駐隊等旗别様别造軍引輜重各令本軍營隊識認此旗諸軍相去既逺語聲難徹走馬報又勞煩故建旗幟用為節度其方面旗舉當方面兵急須裝束旗向前亞方面兵急須進旗正豎即駐旗卧即迴審細看大將所舉之旗大將方面旗東方碧南方赤西方白北方黒專看方色旗亞處即是旗方賊來便須捍禦攻擊諸兵馬既逼賊庭探候事須明審諸營住及營行前後及左右廂肋上五里著馬兩騎十里更加兩騎十里更加兩騎至三十里一道用人馬十二騎若兵多發引稍長助上即更量加一兩道使令相見其乘馬人毎令遙相見常接髙行各執一方面異旗無賊此旗常卷見賊即須速展軍營見旗展即知賊至須覓穏處既先知賊來得設機伏整齊部伍迎前出戰其最逺及以次逺人須與好馬乘騎不然被賊捉將諸軍馬擬停三五日即須去軍一二百里以來安置爟烽知有動靜舉烽相報其烽并於賊路左側逐要置毎二十里置一烽應接今遣到軍其游奕馬騎晝日游奕候視至暮速作食喫訖即移十里外止宿慮防賊徒暮間見烟火夜深掩襲捉將其賊路左右草中著人止宿以聴賊徒如覺來報烽烟皆舉烽遞報軍司如覺十騎以上五十騎以下即放一炬火前烽應訖即滅火若一百騎以上二百騎以下即放兩炬火准前應滅賊若五百騎以上五千騎同即放三炬火准前應滅前烽應訖即赴軍若慮走不到即且投山谷逐空方可赴軍如以次烽候視不覺其舉火之烽即須差人急走告知賊路既置爟烽軍内即須應接又置一都烽應接四山諸烽其都烽如見烟火急報大總管云某道烟火起大總管當須嚴備收拾畜生遣人逺探毎烽令别奏一人押一道烽令折衝果毅一人都押諸大將置鼓四十面子總管給十面營别給鼓一面行即負隨纛下晝夜及在道有警急擊之𫝊嚮令諸軍嚴警兼用防備賊侵逼如軍行引之時先軍卒逢賊冦先軍即急擊之中腰及後軍聞聲急須向前相救中腰聞賊即須擊鼓前軍聞聲便住後軍聞聲須急向前赴救後頭逢賊即擊鼓前頭中腰聞聲即須住并量抽兵相救如發引稍長鼓聲不徹中腰更須置鼓𫝊響使前後得聞其諸營自須著鼓一面用防夜中有賊犯營即急擊令諸軍有警備諸行軍立營數則多討或途泥濘或阻山河同聴角聲俱共齊發路狹難進喂飼馬驢第一角聲絶右虞候捉馬驢第二角聲絶即被駕右一軍捉馬驢第三角聲絶右虞候即發引右一軍被駕右二軍捉馬驢第四角聲絶右一軍即發引右二軍被駕以後諸軍毎聴角聲裝束被駕准此毎營各出一戰隊令取虞候進止防有賊至便用滕擊前有賊前頭用後有賊迴捍後如其路更細小即須更加角聲乃令虞候及當營官人虞候子排比催督急過不得停擁過訖以後軍准前排比催迫急過止諸軍營將下之時當營跳盪奇兵馬軍并戰鋒隊駐隊各令嚴備持仗待當營卓幕訖方可立隊釋仗於本隊下安置若有警急隨方禦捍馬軍下營訖取總營進止其馬令羣牧放諸兵士毎下營訖先令兩隊共掘一厠諸行軍出師兵士不得浪費衣資廣為喫用又不得近田苗及城中下營須去城十里外要有市買入城營司判官差人押領不許輒入城郭必免酗酒鬭打偷盜奸非亦不損暴田苗也諸馬兵毎下營訖營主即勾當四司官與司兵及佐分頭巡隊問兵士到否如有卒忽未到即差本隊本火主將畜生及水食却迎取如其地走逺差人捕捉諸軍下營訖司騎及佐分頭巡隊檢驗驢馬羣先有脊破即令剪毛洗瘡傅藥療救不許連絆如新打破作瘡腫并有繫絆即將所由人領過營主量事決罰司胄及佐下營訖即巡隊檢校兵甲等色如有破綻損汚須即修葺磨礪如其棄失申上所由便為案記准法科結司倉及佐捉搦兵士糧食封署㸃檢勿令廣費宿諸軍營下定事須防禦於營外去幕二十步列隊仗如臨陣對冦法晝夜嚴警縱逢雨雪列隊并押隊官并不得離隊毎營留五匹馬并鞍轡放飼防有警急即令馳告至夜毎陣前百步外各著聴子二人一更一替以聴不虞仍令探聴子勿令眼睡其晝日諸軍前各亦逐髙要處安置斥候以示動靜諸軍營隊伍毎夜分更令人巡探人不得髙聲唱號行者敲弓一下坐者扣稍三下方擲軍號以相應㑹營界探周而復始擲號錯失便即決罰當軍折衝果毅并押舖宿盡更巡遞相分付虞候及中軍官人通探都巡諸軍營常須慮有卒急要設外舗毎夜軍别量抽三五人於當軍前或於軍側三五里外穏便要害之處安置外舗仍令各將一兩面鼓自隨如夜中有賊犯大營其外舗看賊與大營交戰即從鳴鼓大叫以擊賊後乘得機便必當克捷諸軍營下定毎營夜别置外探毎營折衝果毅相知作次毎夜面别四人各領五騎馬於營四面去營十里外遊奕以備非常警如有警急奔馳報諸軍晝日有賊犯營被犯之營即擊鼓諸營亦擊鼓相應訖無賊之營即止唯所犯之營非賊散鼓聲不得輒止諸軍各著衣甲持仗看大將五方旗所指之方即是賊來之路裝束兵馬出前布陣諸軍嚴警如須兵救一聴大總管進止不得輒動諸夜有賊犯軍營被犯之營擊鼓𫝊警一如晝日非賊去不得輒止仍須盡力禦捍百方防備諸軍繫鼓𫝊警訖鼓音即止各自防備不得輒動被犯之營賊侵逼急即令告中軍大總管自將兵救餘軍各准常法於營前後出隊布陣以聴進止諸狂賊夜來犯被犯之營但擊鼓拒戰不得叫喚諸營擊鼓𫝊警訖鼓音即止當頭著衣甲防備被犯之營既鼓聲不止大總管身將兵救先與諸將平章兵士或隨身將胡桃鈴為標記不然打鼓從内面外以相救助其被犯之營聞鼓鐸之聲即知大總管兵至其兵内節度大總管臨時改變處分每晨朝即共諸軍將論一日事至暮即共論一夜事若先為久長定法則恐有漏洩狂賊萬一得知翻輸機便其胡桃鈴或鐸之類皆不可先定恐賊知誤人也諸營暮作食事須及早天暗以後即須滅火如有夜文牒須讀及抄冩者須先狀上營主附行軍須知曰軍行舍信各以校部前後為次失位及樵蘇取水出表者違律野營日暮差出伏路人馬已出營門其有事囘報即隔門𫝊報先辯軍號及辯語音識認是自家軍人方可向前問得事宜次第報知不可開門伏路人馬在外多恐被賊軍捉了於夜黑監放來詐作有事故報覆寨中及賊施計謀欲陷我軍者須是隔門仔細辯認野營中夜後伏路人去先放其號與之則營中别令放號不得令伏路知之恐被賊捉了偷號亂營營中專令人主管夜號簿籍放號不許重疊恐有交錯其號須是主將臨夜親行發放不得預定野營中遇夜透入奸細在營内但得令士衆不得動身呌喚肅静禁聲諸隊安坐則細作自然不敢興動候天明認識如身動者即賊也野營賊疊相近不鳴更鼓多是暗坐五更若要知更數須是於營裏外周圍數里傳箭為準如令夜初更至曉𫝊得五十轉則每更得十轉以此為約令置簿記定何年月日夜營圍里數看四時晝夜長短臨期增減為約如賊相近故要鳴更號則不然也計在臨期變通安營日久軍士不得眠睡人多困倦精神不爽懈怠無力鋭氣漸衰須令逐隊圍子隔一人坐更一人睡分前後半夜為定庶幾人得眠睡精神不疲黒韃遺事曰其營必擇髙阜主將駐帳必向東南前置邏騎韃語托落赤分番警地惟前面無軍營帳之左右與夫帳後諸部軍馬各歸頭項以序而營營又貴分務令疎曠以便芻秣營留二馬夜不解鞍以防不測營主之名即是夜號一營有警則旁營備馬以待追襲餘營則整整不動也惟哨馬之營則異於是主者中據環兵四表𫝊木刻以代夜邏即漢軍𫝊箭法秣馬營裏使無奔逸未暮而營具火謂之火舗及夜則遷於人所不見之地以防夜刼而火舗則仍在於初營之所達曉不動也霆見其多用徇舗其下營直是日早要審觀左右形勢戰李靖法曰諸軍以二萬人為率用一萬四千人戰計二百八十隊有賊將出戰布陣先從右虞候軍引出即次右軍即次前軍即次中軍即次後軍即次左軍即次左虞候除馬軍八十隊其步軍有二百隊其中軍三十六隊左右虞候兩軍各二十八隊共五十六隊其左右廂四軍各二十七隊共一百隊須造大隊以三隊合為一隊慮防賊徒併兵衝突其隊居當軍中心安置使均其大隊一十五隊中軍三隊餘六軍各二隊通十五大隊合有一百七十隊為戰駐等隊隊别通隊及街間空處據地二十步十隊當二百步以八十五隊為戰隊據地計一千七百步其八十五隊為騎隊塞空處其馬軍當戰隊後駐軍左右下馬立布陣訖鼓發其弩手去賊一百五十步即發箭弓手去賊六十步即發箭若賊至三十步内即射手弩手俱手弓弩令駐隊人收其弓弩手先絡膊將刀棒自隨即與戰鋒隊齊入奮擊其馬軍跳盪奇兵亦不得輒動若步兵被賊蹙迴其跳盪奇兵馬軍即迎前奮擊步兵即須却迴整頓向前若跳盪及奇兵馬軍被賊排退戰鋒等隊須即齊進奮擊其賊却退奇兵及馬軍亦不得逺邇審知賊驚怖散亂然後可乘馬追趂其駐隊不得輒動前却打賊退敗收軍舉槍卷幡一依敎法如營不牢固無險可恃即軍别量抽一兩隊充駐隊使堅營壘如其輜重牢固不要防守駐隊亦須出戰也諸逢賊布陣須有次第先右虞候為首其次右軍其次前軍其次中軍其次後軍其次左軍其次左虞候其諸軍跳盪奇兵馬軍各隨本軍以次行至戰前并於本戰鋒隊駐隊前布列待諸方旗節度如戰鋒等隊打賊不入其跳盪奇兵排後即入毎入山谷林木䝉密之處并渡水狹路及下營戰處百里以來總須搜踏清淨不然兵引過半臨戰下營伏兵起發致損軍旅其收軍還營却抽左虞候先入即左軍後軍中軍前軍右軍右虞候諸軍將戰毎營跳盪隊馬軍隊奇兵隊戰鋒駐隊等分折為五等當軍等别各令一官押領出戰之時先用某等兵戰鬭如更須兵以次更取某等兵用盡當營輜重隊不得輒用亦各一官押領使堅營壘各令知其部伍不使紛雜自餘節度一依横陣諸賊徒恃險因山布陣不得横列兵士分立宜為堅陣其陣法弩手弓手與戰鋒隊相間引前兩駐隊兩邊相翊布列即定諸軍即聴角聲其角聲節度一准前看黄旗向賊亞聞鼓聲發諸軍弩手弓手及戰鋒隊各令人捉馬一時籠槍大叫齊入若弩手弓手戰鋒等隊引退跳盪奇兵隊一時齊入戰鋒等隊排比迴還與奇兵同入如見黄旗却立不亞及聞金鉦聲乃止膊上架槍引還各於舊處准前聴角聲卷幡簇隊一准前如便放散即更聴一㑹角聲依軍次發引諸方陣既成逢賊鬭戰或打頭或打尾頭行不停其陣中間多有斷絶須面别各定總管都押勾當勿令斷絶諸毎隊布立第一立隊頭居前引戰第二立執旗一人以次立左傔旗在左次立右傔旗在右次立奇兵分作五行傔旗後左右均立第一行戰鋒七人次立第二行戰鋒八人次立第三行戰鋒九人次立第四行戰鋒十人次立第五行戰鋒十一人次立并横列鼎足分布為隊隊副一人兵後立執陌刀觀兵士不入者便斬果毅領傔人又居後立督戰觀不入便斬并須先知左肩右膊行立依次諸隊頭共賊相殺左右傔旗急須前進相救若左右傔被賊纏繞以次行人參前急須進救其前行人被賊殺後行不救者仰押官及隊副使便斬但有隊被賊纒繞此隊亦須速救臨陣不救者皆斬凡將須使兵士簡靜處分有序將百萬之衆如領一人毎軍定一官知高聲營别有虞候差主師一人知高聲營四面各差一人知高聲隊别亦定一人知高聲諸見賊聲髙喧問者仰押隊官及隊頭便斬押隊官隊頭不斬即斬押隊官及隊頭諸軍將或在前或在後須𫝊聲喚隊及人者仰押隊官自𫝊兵士不得輒𫝊諸毎隊戰鋒五十人重行在戰隊前布陣立隊訖聞鼓聲發戰鋒隊即入其兩戰隊亦排後即入若戰隊等有人不同入同隊人能斬其首者賞物五十段别隊見不入人能斬其首者准前賞物唯駐隊人不得輒動凡與敵鬭其跳盪奇兵馬軍等隊即須量抽人下馬當之隊别量抽捉馬人先定名字若臨鬭時捉馬人有前却及應捉撩亂失次第致失鞍馬者斬若其賊退步趂不得過三十步亦不得即乘馬起審知賊退撩亂驚怖可騎馬逐北約與諸隊齊進其折衝果毅當鬭之時雖蹔下馬賊徒敗走以後即任騎馬檢校騰逐諸軍弩手隨多少布列五十人為一隊人持弩一具箭五十隻人各絡膊將陌刀棒一具各於本軍戰隊前雁行分立調弩上牙去賊一百五十步内戰齊發弩箭賊若來逼相去二十步即停弩持刀棒從戰鋒等隊過前奮擊違者斬如其共賊相持守捉城邑其弩手等即依弩式看旗發用諸兵馬被賊圍遶抽拔須設方計一時齊拔賊即遂背揮戈因此必敗其兵共賊相持事須抽拔即須隔一隊抽一隊所抽之隊去舊隊百步以下遂便立隊令持戈槍刀棒并弓弩等張施待賊張施了即抽前隊如賊來逼所張弓弩等人便即放箭奮擊如其賊止不來其所抽隊便過向前百步以下遂便准前立隊張施弓弩等待賊既張施訖准前抽前隊隔次立陣即免被賊奔蹙其被抽之隊不得急走須徐緩而行如賊相逼即須迴拒戰其隊頭押官押後副隊頭引前如有走者仰押官隊頭便斬違失節度者斬全隊營制武經軍志曰止則為營行則為陣言營陣同制也法云陣中容陣謂隊伍布列為廣狹之制欲其回轉離合無相奪倫營中有營謂部分次序有密與疎之法欲其左右救援不相奸亂卒有外冦侵軼皆堅整全備莫得而動也茍非規摹素定其孰能與於此乎故司馬宣王觀武侯營壘處所而歎曰天下奇才美其法制精妙也昔衛青出塞以武剛自環蓋今之車營也充國屯田則校聮不絶蓋今之木柵營也其來尚矣櫳槍營凡櫳槍為營者其槍如鴉巢櫳幕外七尺櫳槍之外造土壕一重槍去幕七步衣甲器械毎人一堆如有警急易著衣甲車牛在旁横排立槍營凡軍不久駐可立槍為營槍頭間架令均密擂鼓各著擂槍聲絶槍立訖兵士更不得出白繩便斷烟火營外置約舗其外更著一人伏聴營有警當領不得髙聲敲槍𫝊過四面既知有警預作阻防車營凡車毎五十步乘毎百步取一乘為戰車車中出戰隊其車子營及外營横排牛在當中拒馬槍在外仍車轅為左右廂和門拒馬營毎人配鹿角馬槍兩枝去前槍城三步布置須首尾相繫魚鱗布之則牢固矣柴營凡柴營其柴須密排不通天人過其間釘橛仍著木壓之其車横排須間架均急疾轉車便可為城若久駐營中置望竿掘壕營凡掘壕立槍則白繩取定其壕底闊一丈二尺深一丈口闊一丈五尺工向裏拍作土岸高四尺五寸令實勿至摧塌裏面削成其上通人行立濠門掘徹即權施浮橋急疾拆去當界二十步置一戰樓以門扇及他板木權造壕唇外掘陷馬坑一重闊二十五步毎坑鹿角槍三根尖頭入令堅近壕布棘城一重闊二十五步凡布棘令堅為營其棘須魚鱗布之令棘頭平闊三十尺城營凡築城為營其城身髙五尺闊八尺牆高四尺女牆髙四尺闊二尺毎百步置一戰樓五十步置旋風礮一具毎二尺置連枷棒一具毎舗更板并架城内去重其外掘壕一重闊三步立木柵一重柵外更有棘外陷馬坑一重木柵營凡木柵因敵所逼不及築城壘或因山河險勢多石少土不任板築乃建木為柵方圓高下隨宜深埋木根重復彌縫其闕内重短為閤道外住一重長出四尺為女牆皆泥塗之柵外掘壕一重闊二丈深一丈木柵裏毎百步造戰樓一具中致繩營凡繩營所以援馬若入敵境芻秣不給即須乘擇水草放牧毎人給刀䏍馬索連絆相續馬居營中布宮健更鼓為備内外軍士各守本界不得過從交雜即姦人無便以入凡周營須設界限立藩蔽以扞外冦牌皮幕氊幕布幕命籠茅竹弩營細篾䉡毎三寸插茅竹籖一根長三尺周圍繞營舊法有九種大約軍不久駐則為立槍櫳車營拒馬之類若兵久駐則用柴營掘壕城營木柵之類符彥卿曰在賊境宿用槍營行用方陣下營法不居大山之端防後有人馬沿山而來破我營寨前臨險阻被賊堅守我無出入之路名曰龍首之地是也不居死地謂安營不臨墓塚之地人馬多夜驚久居士卒必為疾病不居地柱謂四下中高其地四面廣平中間有岡如覆釡之形若安營其上八面招風周匝受敵不居地獄謂四髙中下其地廣衍平原中有地形如仰盆之象者若安營其中被賊四面乘髙攻我必敗其中也不居山林草木䝉密之地春夏枝葉茂盛不見人馬恐賊穿生路而來驚我營寨秋冬草木枯敗恐被上風放火因而刼我難以退避應敵不居江河溝澗灣曲之地恐被賊於要害處堅守則我無進退之路外無交接卒難相救不居大江險絶掩抱之中被賊守定隘阨若救軍不至我無進退應敵之路不居江河之岸大山之側三面受敵最惡後無進退之路若中有舟楫船抵傍岸又有通糧之道上流有救應之兵乃可安營若居江河夾岸連水下營須防上流火船及水賊鑿船沈溺之患不居四面長川四達之境四面賊來攻擊外無救援受敵最多通典曰凡軍不欲飲死水不欲居死地死水者不流之水死地者丘墓之間也下營算法方營法置積數為實别置一算為下法從末常超一位定實實上商置第一位得數下法亦置上商名曰方法乃命上商除積至盡而止不盡乃倍方法為廉於上商之次續商第二位得數廉法之次照上商置隅以廉隅二法命上商除積得盡而止不盡乃倍隅法併為廉又於上商置第三位得數廉法之次照上置隅以廉隅二法皆命上商除積至盡而止不盡如法命之若欲為三角營則取方營積數倍之得三角營得積數布算如方營法得三角營一面之數凡三角得方二而一若欲為直營凡直積數如方則從横相當直則從羨而横減其所羨與所減亦相當也既得積數如準從也以為上商而消息其衡之步以為下法如準衡也以為上商而消息其從之數以為下法其布算大略如方營而上下法不齊為異若欲為鋭營則取直營積數倍之如三角營取方營之數也既得積數布算如直營法凡鋭得直二而一若欲為圓營則取方營之積四乘而三歸之得圓營積數布算如方營法得圓營徑三之得其圍凡圓得方四而三六花營如圓營法若欲為偃月營則取圓營積數倍之或取方營積數八乘而三歸之得偃月營積數布算如方營法得偃月弦徑半之得偃月矢徑凡偃月得圓二而一得方八而三凡營因地以立營遂以起數所謂地生量量生數數生稱稱生勝也如軍以萬七千九百五十六人為率毎一人從横占地四步總之七萬一千八百二十四步是為方營之積方徑二百六十八步直營之積如之直廣徑百步則其從七百一十八步有奇其從徑七百一十八步則其廣百步有奇從與廣率相消息也四方積而三之得九萬五千七百六十三步三分步之一是為圓與六花之積其徑三百八十四步餘積十九步七分不盡其圍一千一百四十二步有奇八方積而三之得十九萬一千五百二十六是為偃月之積其弦徑四百二十九步有奇半之得矢借方積得十四萬三千六百四十八是為三角與鋭之積三角徑三百七十九步强鋭徑底百步則鋭長千四百三十六步有奇鋭長千四百三十六步則底百步有奇鋭與底率相消息也方營法其術置積數七萬一千八百二十四步為實别置一竿為下法從末常超一位約實百下約一萬約百實上商置第一位得數二百下法之上亦置上商二百名曰方法乃命上商除實二三而四除實四萬餘三萬一千八百二十四二乘方法得四百步為廉於上商之次續商第二位得數六十共為二百六十廉法之次照上商置隅六十以廉隅二法共四十六命上商除實四六二十四六六三十六除實二萬七千六百餘四千二百二十四二乘隅法併為廉得五百二十又於上啇置第三位得數二百六十之次商置八下法之上亦置八為隅以廉隅二法共五百二十八命上商除實五八四十二八十六八八六十四除實四千二百四十四適盡得方營面數除營布算皆準此而消息則視其積云總要司馬穰苴曰五人為伍十伍為隊一軍凡二百五十隊餘奇為握奇故一軍以三千七百五十人為奇兵隊七十五以為中壘守地六千尺積尺得四里以中壘四面乘之一面得地三百步壘内有地三頃餘百八十步正門為握奇大將軍居之六纛五麾金鼓府藏輜積皆在中壘外餘八千七百五十人隊百七十五分為八陳八陳各有千九十四人八陳各減一人以為一陳之部署舉一軍則千軍可知李靖兵法曰諸大將出征且約授兵二萬人即分為七軍中軍四千人内取戰兵二千八百人計五十六隊戰兵内弩手四百人弓手四百人馬軍千人跳盪五百人步奇兵五百人步左右虞候各一軍毎軍各二千人百人内各取戰兵千九百人戰兵内毎軍弩手三百人弓手三百人馬軍五百人跳盪四百人奇兵四百人左右廂各二軍軍各有二千六百人各取戰兵千八百五十人戰兵内毎軍弩手二百五十人馬軍五百人跳盪四百人奇兵四百人馬步通計總當萬四千共二百八十隊當戰餘六千人守輜重諸圍三徑一尺寸共知復造幕尺丈已定毎十人共一幕且以二萬人為軍四千人為營在中心左右虞候左右廂四軍共六總管各一千人為營兵多外面逐長二十七口幕横列十八口幕六面援中軍六總管下各更有兩營其虞候兩營兵多外面逐長二十七口幕横列十八口幕四總管營外面逐長二十二口幕横列各十八口幕四部下計當千一百三十六步又有十二營街各别闊十五步計當一百八十步通前當千三百十六步以圍三徑一取中心堅徑當四百二十九步以下下營之時先定中心即向南北東西各步二百四十步竝令南北東西及中心標端四面既定即斜角更安四標準南北令端從此以後分擘配營極易計二萬兵除守輜重六千人馬軍四千人步兵令當二百隊别取六步三尺二寸地併衝塞總盡若地土寛廣不在城郭即五步以上下幕准算折若地狹安置不得即須逐角長斜算計尺寸一依下營法武編前集卷二
