扎頭上口作虎聲或犬聲奔入彼陣手執料豆抛之一軍持綑索以進行法人手執青旗旗心一日呪曰唵唵囉囉摩那那三軍齊持大斧砍刀噪入心月狐陣將紙畫一婦人各軍掛在頸項上手執破網長索打入各手執大刀一湧而進口作犬聲不住行法人手執青旗旗四道月呪曰鬱草子羅度路殺殺進進尾火虎陣用金鑼不住或􅀢弓弩紙畫獅子掛頭項上大啄而進抛入陣中先抛猪羊肉剉之各軍手執劍又乘虎馬又或用草扎獅子一個外用皮裹抛入彼陣行法人手執紅旗一面念呪曰圗龍圖龍赤易訶訶箕水豹陣與尾火虎陣破法同斗木獬陣將亂石打入口中作鴉聲不住各軍執長鎗三股叉齊進行法人手執青旗咒曰先羅之之唵咤咤牛金牛陣各軍手執長鞭口作虎聲不住先用鹽塗手足各軍大斧斬刀而進行法人手執白旗咒曰囉命命尼曲曲唵摩摩女土蝠陣令各軍手執扇打入先用油浸燈心抛入彼陣中以制之用手網一層大刀一層殺進行法人手執黄旗一面念咒曰宛亥㚖陀衣子聿殺殺殺訶訶訶虛日鼠陣令軍各包米榖抛入彼陣以制之三軍作猫聲砍刀一湧而上行法人手執五采旗旗心一日咒曰唵唵訶訶摩尼尼蓤呵呵危月燕陣令各軍執火把大闕一柄抛入彼陣中各軍手執長竹打入長鎗後隨行法人手執太隂青旗呪曰巨完阜炎阜炎室火猪陣令軍作虎聲各包糟一團抛入彼陣隨用鎗鈎長劍齊入口叫殺殺行法人手執紅旗揮入念咒曰熒􅀈熒􅀈吒吒尼尼璧水㺄陣令各軍作犬聲手執繒網抛入彼陣大刀齊斫行法人呪曰阿互車陁呪呪奎木狼陣用鑼鼔齊鳴各軍持石子打入陣中行法人手執青旗咒曰唵唵摩尼尼令兵砍刀湧入口中殺殺不絶婁金狗陣令各軍作虎聲手執滚湯先潑入陣後用拄口繩索而進大斧砍刀齊入行法人手執白旗旋遶咒曰神獒神獒吒吒訶訶胃土雉陣令各軍頭挿栁枝手執長繩網羅三股叉大刀弓弩齊進行法人手執黄旗咒曰唵唵中尖囉吪吪殺殺呵麽麽昴日雞陣令各軍作鴉聲先抛米榖以制之後用砍刀殺入行法人手執太陽青旗咒曰太陽太陽烏烏殺殺畢月烏陣令各軍用紙四拽弓搭箭射之出頭上將死雞抛入以制之行法人念呪曰火光火光神鴉鴉吒吒嘴火猴陣令各軍作犬聲先抛鮮棗桃子後用紙畫弓箭抛入彼陣各軍手執繩索一層火把一層大刀長鎗齊進口中大呼火來了行法人念呪曰唵唵山神神摩呵呵參水猿陣破法同前井木犴陣令各軍士手執繒網火把而進大刀長鎗隨後口中大叫魔王魔王行法人手執青旗咒曰天魔魔速殺殺鬼金羊陣令各軍作犬聲虎聲紙畫虎頭狼面扎頭上大石打入彼陣行法人手執白旗呪曰唵宛延豆厲殺殺桞土獐陣令各軍作犬聲紙面弓箭抛入陣中各軍執繩索大刀而進行法人手執黄旗念呪曰原蛤震山訶訶星日馬陣令各軍手撒料豆及繩索抛入陣内手執鞭子大刀大斧殺進行法人手執太陽紅旗旋繞口中念呪宗氣赤晶趕趕趕張月鹿陣令各軍作犬聲以花抛入陣中手執鋼义口中大喊殺而進行法人手執太隂黒旗揮進口念咒曰聿侖允川進進翼火蛇陣令各軍作鴉聲手執蝦蟇抛入陣内大刀殺進行法人手執紅旗揮入口中念呪曰神羅火兵摩摩摩軫水蚓陣令各軍作鴉聲手執鐵鋤抛入陣中長鎗砍刀殺入行法人手執皂旗揮進口中念摩訶訶咤哩哩殺二十八宿藏身破陣之法角木蛟藏身水洗面目手足方出破陣用犁頭鐵抛入陣勝亢金龍藏身用水溼手作雷聲方岀破陣口念唵數聲或犁頭鐵打入陣中氐土貉藏身用竹葉挿頭吉破陣口作犬聲或紙畫雲抛入陣房日藏身用茅草挿頭或紙畫月安頭上破陣口作犬聲或虎聲抛豆制之心月狐藏身三五莖草或木葉手撚石頭出破陣作犬聲紙畫一婦人用破網打入陣勝尾火虎藏身用木葉挿頭上或紙畫佛字戴頭上破陣用鑼或弓箭紙畫獅子大喊入陣抛肉制之箕水豹藏身用蘆花竹葉木葉挿頭破陣與尾火虎同又用肉一塊抛入陣制之斗木獬藏身用水洗手足面目横行而去破陣各人將亂石打去後作鴉聲入陣牛金牛藏身用草挿頭上生頂角而行破陣作虎聲入陣先用鹽塗手足女土蝠藏身手撚瓦行吉破陣用破扇打入先用油浸燈心制之虚日鼠藏身手撚茅草出吉破陣作猫聲而入先抛米榖制之危月燕藏身手撚土一撮出吉破陣用扇一把抛火入陣室火猪藏身用紙冩山字安頭上吉破陣作虎聲先抛糟糠入次用鐐鈎抛入璧水㺄藏身用水洗面目手足挿草頭上吉破陣作犬聲及繒網入奎木狼藏身用木葉挿頭上吉破陣用鑼鼓及打石入陣婁金狗藏身手撚亂茅桿方出破陣作虎聲用湯先潑入陣胃土雉藏身頭挿木葉出破陣作鴉聲用繒網抛入先以米榖制之昴日雞藏身手撚茅草吉破陣作鴉聲先抛米榖制之畢月烏藏身用手撚亂茅草頭挿木葉出吉破陣用紙畫月弓箭射入先抛死雞制之嘴火猴藏身手撚楊枝出破陣作犬聲入或用弓箭先抛果子制之參水猿藏身與前同破陣作鴉聲虎聲或用弓箭鎗果子制之井水犴藏身用紙畫雲字或蘆荻戴頭上破用繒網火把抛入陣中鬼金羊藏身用竹葉挿頭上吉破陣作虎犬之聲入栁土獐藏身頭挿木葉手撚石出破陣作犬聲或弓箭射入星日馬藏身用紙畫鞍戴頭上吉破陣用料豆及鐵索繩抛入張月鹿藏身口銜花木葉吉破陣作犬聲及花抛入或弓弩射入翼火蛇藏身用紙畫龍或土草戴頭上破陣作鴉聲先抛蝦蟇制之軫水蚓藏身手撚土一堆出吉破陣作鴉聲用鍬鋤先抛之金威符此符用白絹長四寸闊三寸庚申日墨書辛酉日佩之能避箭欲試此符取雞十隻籠十步之外一雞佩符九雞不佩令箭手射之九雞皆傷一雞有符者無恙人佩衣領近小襟書符時澄心黙念咒曰金水相生相尅以成隂陽二十八宿太白𤣥光鎮星奎畢以成紀綱三尺布中可以包藏急急如律令書符作用泥丸久息氣如霾泥丸宫百㑹穴也人端坐久閉息聚氣貫頂後呵于筆上鼻引清風口難開鼻肺竅也引西方金氣吹筆上開口息氣電肺猛風吹日月電肺金屬也鼔金氣吹于白絹上閉兩目良久電光飛火透心來火本制金金反與火相合肺部陣雲天地暗肺氣氤氲如隂霾状脾位雷霆兩入懐土相金旺其津直注腎過尾閭霜露斷斷橋山下玉霄臺腎水經尾閭過夾脊直貫泥丸玉京有道終須到精神搬運老松材玉京即重樓絳宫能運動有路可到再鼓舞周身之氣如喬木挺挺也審得倭賊陣法第一真武陣將刀横掠我兵亦要將刀横掠就將刀打斷以破其陣第二傘陣他將傘撐開我兵亦將傘撐開即便打壊他便退陣去了第三扇陣即蝴蝶陣他將扇扇幾扇我兵亦將扇扇幾扇就扯破第四風陣他將布裙一掀我兵亦將布裙一掀解壊第五羊陣他先將羊一隻放將來我就將羊放之第六女陣他就將虜去之婦女放來言稱逃難我這裡即殺之第七亂風陣他將自己頭髮鬆亂我亦將自己頭鬆亂扯一路用手蹉之已上七陣俱效他即破陣等情行持祖氣法行法人先要戒五葷三厭持齋戒酒不近女色終日危坐收心十四日然後行功趺坐子前午後黙朝上帝履踐天光囘風混合出入𤣥牝練得純熟求其效驗兩腎如火黄庭如湯熱先天一㸃真陽生於元海作法之時大喝一聲先天祖炁嘘入符水中所奉神將隨聲聽令方得書符咒水靈異訓練百日方得功靈行法務要如前行持方驗慎之慎之尚有内外天罡相合行持尤妙二十八宿符式後符天罡祖氣加諱字倣此一日干徳二日支徳三日生氣月徳四日奇神五日儀神六天徳七解神一日鬼二辰鬼三月破弔虎破氣纒繞同四孤寡伏連大殺五光怪血支血忌六信殺飛䰟㑹神哭神春辰夏戌秋丑冬未憂神春丑夏子秋戌冬亥地火正月戌逆行四季武編前集卷四
