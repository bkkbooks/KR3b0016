body:
  text: 武編前集卷四明唐順之撰陣積卒陣記積卒之象天之陣也在房度西南共星十二㸃布為内外三重外圍以八八營也内握以四中壘也合内外而為九九軍也各三星品連而相統以為左右前後四獸之陣向於前者前拒之為鳥陣也向於後者後拒之為蛇陣也向於左者左角之為龍陣也向於右者右角之為虎陣也又外體圓天陣布也内體方地陣布也外四隅各一風雲起四維也東西各二天衝居左右也内二縱相對天衡居前後也二横相對地軸貫中央也又外四位之相間各離二星之廣内四星之相去各離一星之廣陣間容陣隊間容隊也前參連後參連左參連右參連以前為後以後為前四面如一觸處為首也合有五營散有八陣數起於五而終于八也以内之四統外之八四竒傳命於八正八正取稟於四竒也其法咸備如此豈非自然之理乎葢民物有治亂夷夏有盛衰帝王有興替盜賊有熾滅冥冥之中天所隂制而黙調者葢用以此其陣至簡而備至約而要至整而固聖人雖智其何能加於此宋史天文志積卒十二星在房西南步天歌屬心五營軍士之象主衛士掃除不祥星小為吉明則有兵一星亾兵少出二星亾兵半出三星亾兵盡出五星守之兵起不測近臣誅彗星守之禁兵大出天子自將風雲犯之青赤為大臣持政欲論兵事黄帝握竒經曰風后所作縱步二天二天次之縱布四地次於天後縱布四風挾天地之左右縱布四雲起天地之四維縱布天衝居其左右縱布天衡居其前後縱布地軸居其中央右古經文凡六十字所以記陣之名數及布列之次序約而極備真聖人之筆也後世握竒經一本有范蠡樂毅韓信等注相雜葢范蠡樂毅乃古人傳注之法約其義為傳以係於經文之注至韓信張良次序兵法又釋范樂之傳猶大傳之少傳也後錯而為一經傳不分辭義不明公孫𢎞徒於難道之處増字發明則雜亂愈甚矣今略辯别而分析之如左云握竒經傳義大傳范蠡樂毅之文傳下小注韓信之文圏外小注即公孫𢎞増字發明之文也縱者直陣龍象也三十二隊陽十六隊天衡八隊天衝八隊風三十二隊隂十二隊地軸十二隊地衝八隊雲天地之前衝為虎翼天地之後衝為飛龍風為蛇蟠上為鳥翔天地以下八重以列或曰握竒望敵即引其後竒兵以掎角重列不動或分而為八或合而為一分合各隨人之多少觸類而長天圓布前為左後為右天地四望是也天衡居兩端其次雲其次風左右相向是也公孫𢎞曰此為動地方布風雲各在前後衝之前其次地居中間兩地為比是也公孫𢎞曰此為靜經曰縱布二天二天次之縱布四地次於天後縱布四風挾天地之左右縱布四雲起天地之四維縱布天衝居其左右縱布天衡居其前後虛實二壘是也天前衝居其左天後衝居其右雲居四端縱布地軸居其中間公孫𢎞曰人多傳韓信釋注天員布以下以此微有差異而范蠡樂毅相雜今亦錯綜於中其步隊或三十或五十變通之理寄之明哲不復備載千古以來其文不滿多憑口訣以相傳授今于難解處増字發明之耳正義俗傳為握機經漢三分天下有諸葛孔明者以區區之蜀爭衡三國之間八陣之法亦嘗考之矣四為正四為竒餘竒為握機或總稱之先出遊兵定兩端天有衡地有軸前後有衝風附於天雲附於地衡重列各四隊前後之衝天衝各四隊風居四維故有圓軸單列各三隊前後之衝地衝各三隊雲居四角故有方天居兩端天衡天衝地居中間地衝地軸總為八陣陣訖遊兵從背躡敵或驚其左或驚其右聽音望麾以出四竒天地之前衝為虎翼風為蛇蟠圍繞之義也虎居中間張翼以進蛇居兩端向敵而蟠以應之天地之後衝為飛龍雲為鳥翔突擊之義也龍居於中張翼以進鳥掖兩端向敵而翔以應之虚實二壘皆逐天文氣候山川向背利害隨時而行以正合以竒勝今魚腹江中平沙上有土石焉其八陣遺蹤尚可想也隅落鈎連曲折相對出入變化莫如其終是殆黄帝太公管仲之遺制與此篇不知誰氏之作葢推演孔明陣法而托名為風后握竒經也風后握竒經此俗傳握竒經也自三十二隊天句起増字發明之耳句止經傳錯雜自角音五句起師并旋句止孔明之法附會其中角音二初警衆末收衆革音五一誓兵二結陣三行四鬭五急鬭金音五一緩二止三退四背五急背麾五一𤣥二黄三白四赤五青旗法八一天𤣥二地黄三風青四雲白五天前衝上𤣥下赤六天後衝上𤣥下白七地前衝上黄下青八地後衝上黄下赤二革二金為天三革三金為地二革三金為風三革二金為雲四革三金為龍三革四金為虎四革五金為鳥五革四金為蛇此八陣各用金鼓之制也其金革之間加一角音者在天為兼風在地為兼雲在龍為兼鳥在虎為兼蛇加二角音者全師進東加三角音者全師進西加四角音者全師進南加五角音者全師進北鞉音不止者師不整金革既息而角音不止者師并旋三十二隊天十六隊天衡八隊天前後衝八隊風三十二隊地十二隊地軸十二隊地前後衝八隊雲以天地前衝為虎翼天地後衝為飛龍風為蛇蟠雲為鳥翔天地以下八重以列或曰握機望敵即引其後遊兵以掎角重列不動或合而為一或離而為八分合各隨人之多少觸類而長天或圓布前為右後為左天地四望之屬是也天居兩端其次風其次雲左右相向是也公孫𢎞曰此為靜地方布風雲各在前後衝之前天居兩端其次地居中間兩地為軸是也公孫𢎞曰此為動縱布二天三天次之縱布四地次於天後縱布四風挾天地之左右天前衝居其右後衝居其左雲居四端虛實二壘則此是也公孫𢎞曰人多傳韓信注釋天或圓布以下於此㣲有差異而范蠡樂毅之説相雜今亦錯綜於中其部隊或三十或五十陣圗如此變通由人一本自五十以下云變通之理寄之明哲不復備載千古以來其文不滿多慿口訣以相傳授于今於難解處増字發明之耳第一章猷按先師論著軒轅握竒陣及孔明八陣者夫天地定位山澤通氣雷風相薄水火不相射伏羲先天之圓圖也黄帝則之是為圓陣故首布乾而坤次布兌而艮次布㢲而震次布離而坎帝出乎震齊乎㢲相見乎離致役于坤説言乎兌戰乎乾勞乎坎成言乎艮文王後天之方圖也諸葛亮則之是為方陣故首布乾坎坤次㢲次艮次震次兌次離次坎黄帝之陣有七以象而取之陣於外為天陣於内為地陣於天地之間變化不測為風雲上下不動為衡兩端不動為軸卯酉相當為衝竒正之法在其中矣諸葛亮之陣其名有八以方位而取之陣於乾為天陣於坤為地陣於巽為風陣於艮為雲陣於震為龍陣於兌為虎陣於離為鳥陣於坎為蛇陣旌旗隊伍之制在其中矣河圖之於數一二三四五為竒六七八九十為正一與六同宗而居乎北二與七同朋而居乎南三與八同道而居乎東四與九為友而居乎西五與十相守而居乎中五竒居内五正居外各一正包一竒焉黄帝之陣天也衝也風也雲也各居外地也衡也軸也各居内亦各以一奇而包於一正洛書之於數二四六八為奇一三五七九為正一居北而六居北之西隅以宗之七居西而二居西之南隅以共之九居南而四居南之東隅以同之三居東而八居東之北隅以友之四隅為正四方為奇各一奇而間一正焉諸葛亮之陣四隅為正四方為奇亦各以一正而間一竒夫聖賢制陣之理與河圖洛書相為表裏與八卦九章相為經緯此其所以妙也第二章猷按先師論著九軍制陣與夫竒正相生之法者夫天有九天星有九野地有九泉數之所自出者如此故洛書之數四隅四正以合中衍而為九河圖之數四虚四實以合中衍亦為九聖人則之制器尚象以九方而作卦位以九類而作洪範以九宫而作厯數以九府而作圜法以九州而作封建以九區而作貢賦以九室而作明堂以九軍而作陣法無非用九一何各得其妙哉九軍八陣之法孔明實得之孫子孫子實得之太公太公實得之黄帝黄帝實得之伏羲㐲羲實得之積卒之宿是與河之圖洛之書同出天地理數之源也是與羲之易禹之範大撓之厯同出聖人心法之推也是與文武吕旦之貨泉封建明堂井田相闗並行而不悖者也夫易止於六爻之位而已極其變也陽徃居隂隂往居陽變動不居周流六虚而神明生焉伏羲之陣内險而外順順所以為正而險所以為竒黄帝之陣内靜而外動靜所以為正而動所以為竒太公之陣五行為正三才為奇周公之陣三軍為正游闕親戎為竒象棋之陣象士卒為正車馬礟為竒韓信之陣右中後為正前左為竒孔明之陣四隅為正四方為竒太白隂經之陣四方為正四隅為竒曹操之陣先出合戰為正後出旁擊為竒李靖之陣車徒居前為正馬軍跳盪居後為竒及乎臨機制敵之變化無常竒亦為正之正正亦為竒之竒竒正之變如循環之無端是與易爻同一屈伸盈虛消長往來之機也所以然者有一定之數斯有一定之理有一定之理斯有一定之勢為勢而不本乎理數之自然則逆而且敗矣聖人豈有意于強合以為竒哉亦豈無意而姑取之以為凖則哉第三章猷按先師論著陣法多本易卦及布師卦為八陣圗者夫兵為隂坤者隂之卦為兵之象文王周公作易而著行兵用衆之占凡十有五繫皆有坤之卦如坎貞坤悔為師也初六曰師出以律否臧凶九二曰在師中吉无咎王三錫命六三曰師或輿尸凶六四曰師左次无咎六五曰田有禽利執言无咎長子帥師弟子輿尸貞凶上六曰大君有命開國承家小人勿用坤貞坎悔為比也六五曰顯比王用三驅失前禽邑人不誡吉艮貞坤悔為謙也六五曰不富以其隣利用侵伐無不利上六曰鳴謙利用行師征邑國坤貞震悔為豫也卦詞利建侯行師震貞坤悔為復也上六曰用行師終有大敗以其國君凶至于十年不克征坤貞離悔為晉也上九曰維用侵伐厲吉无咎坤貞兌悔為萃也象曰君子以除戎器戒不虞純坤為坤也上六曰龍戰于野其血𤣥黄夫聖人遇坤之卦輒著象占以示人用兵之道如此聖人之重兵可知矣坤卦三畫皆隂大衆之象坎卦二隂居上下小衆之象一陽居二隂之間為將握兵之象大衆居外小衆居内大小相容營衛相包大陣之象伏羲故名之曰師陣於後為拒陣於中為中壘後囂則不整中擾則虚初當其後三當其中不宜於動者周公繫辭而其辭皆凶所以欲人敦陳而整旅也中當軍之前為駐隊駐隊以拒禦為主非濱於危不用之四當其位可以動可以無動而其辭不責其左次所以欲人持重而自守也駐隊之前為前陣前陣之前為先鋒二者兵之先陣之首折衝之竒也五當其前六當其先其動宜矣而其辭皆吉所以欲人交發而并至也夫聖人之善兵可知矣夫聖人在位消之於微剪之於著既善於兵而又必鄭重用之故治日多而亂日少也第四章猷按先師論著聖人制陣有竒有正有分有合一本於化造圗書之數者夫天地一動一靜焉山澤一流一峙焉日月一盈一虧焉星辰一經一緯焉動者流者虧者緯者變化之著也靜者峙者盈者經者變化之根也皆動則傾皆靜則墜皆流則䧟皆峙則竭皆虧則幽皆盈則亢皆緯則錯皆經則繫矣聖人制陣一竒一正之相參其正也不動如山其徐如林難知如隂其奇也侵掠如火其疾如風動如雷震豈出於私智彊為哉河圗之數六八七九相連而為外層一三二四相連而為第二層十相連而為第三層五相連而為裏層合而為一者也洛書之數一居北六轉而居西北三居東八轉而居東北七居西二轉而居西南九居南四轉而居東南五居中分而為九矣而伏羲方圗之卦乾坤否泰相對而為外層兌艮咸損相對而為第二層坎離既未濟相對而為第三層㢲震恒益相對而為裏層亦合而為一者也圓圖之卦折自乾以之泰八卦而轉居於午折自否以之坤八卦而轉居於子折自履以之臨八卦而轉居於東北折自遯以之謙八卦而轉居於西北折自同人以之明夷八卦而轉居於卯折自訟以之師八卦而轉居於西折自无妄以之復八卦而轉居於東北折自姤以之升八卦而轉居於西南太極居中亦分而為九矣故聖人制陣一分一合之相仍其合也無不内外四層大小相包如城如郭如衛如營周迴完密深固而不可敗焉其分也無不離為八向握竒居中有首有尾有手有足有翼有身焉豈出於私智彊為哉法曰以正合以奇勝又曰大陣包小陣大營包小營又曰分不分為靡軍聚不聚為孤旅是知當然而已耳知其所以然非聖人吾與誰歸穰苴握奇營辯虎鈐經穰苴握竒營圗一首元許洞之所演也杜佑通典其穰苴法以一萬二千五百人為軍十之三布之中壘十之七布之外營許洞演為營法配孔明八陣之名天地風雲龍虎鳥蛇布為内外二重方如斗底四隅有鋪四方有門守地有步尺之數何辨之葢自古營陣同制大小相包廣狹相容以利固守便救應不可失也黄帝之時遷徙無常處城郭宫室未備每止舍輒以兵師為營衛八衛而包八營八營而包握竒其收如街陌相通此則握竒營之舊制也諸葛孔明以六十四陣四而分之為二百五十六陣布為下營陣法名曰滿天星以八卦而包九宫以八宫而包中黄斯得風后之遺法也許洞以平列布為内外二重失其制矣豈得為穰苴法耶田穰苴司馬法自古無傳通典葢杜佑私意所撰而握竒營又許洞之臆見固無足取惟四時教閱以習坐作進退之節則此圗不能外也古人敎閱平時敎人以金鼓旗幟號令之辨不敢敎人以陣在營教人以正不敢教人以竒故孔明殁而悍將魏延不能竊其風李靖殁畨將薛萬徹等終無能為邊患皆知正而不知竒故也斯圗所以不行於世者以此辯之甚是但平列二字義欠明白不如改平列為單列許洞虎鈐經外壘一軍一萬二千五百人以十人為火一千二百五十火幕數亦如是幕長一丈六尺舍五每一人守地一尺六寸十以三為竒以三千七百五十人為竒數以餘八千七百五十人分為八陣陣有一千九十三人七分五銖守地一千七百五十尺八陣積尺守地一萬四千尺積步二千三百三十三步餘二尺積里六里餘一百七十三步二尺以壘四面乘之得地一里餘二百二十三步壘内得地一十四頃一十七畆餘一百九十步四尺五寸六分以為外壘天陣居乾為天門地陣居坤為地門風陣居㢲為風門雲陣居艮為雲門龍陣居震為飛龍門虎陣居兌為虎翼門鳥陣居離為鳥翔門蛇陣居坎為蛇蟠門天地風雲為四正龍虎鳥蛇為四竒乾坤艮㢲為闔門坎離震兌為開門門有牙旗遊隊左右偏將軍居壘門禁出入外有遊軍定兩端前有衝後有軸四隅有鋪中壘以奇兵三千七百五十人為中壘守地六千尺積得二里餘二百八十步以壘四面乗之一面二百五十步壘内地二頃六十畆餘一百步六纛五麾金鼔府藏在中壘此許洞襲李筌之誤只是營法不可兼陣法營法亦未是無單作兩列之理孫武子八陣辯武經總要孫武子八陣圗八首唐裴緒之所演也以步兵五部十曲為前後左右中騎兵八陣為揚奇備伏揚兵前出竒兵中應備伏後援十干分合逓變為方圓牝牡衝方車輪罘罝鴈行等八形以陣形配五行五音八卦以定尅勝之法何辯之葢制陣之法握竒為本八陣為宗有動有靜體用乃立有體有用奇正乃生正多而無竒則重而無功竒多而無正則輕而不固故氤氲變化者四方交互而出遊廣更迭而至而中軍四隅之陣未嘗敢動也四隅兵動則四方轉而為正四方之陣未嘗敢動也裴緒以十曲變化則舉陣皆動矣變多則煩動多則亂兵之至危莫甚於此至若步騎之用有衆寡分合有逺近行陣有疏密竒正有先後前却遲急則因地形之險易廣狹髙下斜正臨時相敵以為之節觀武侯街亭之戰命馬謖以大兵據城趙雲以歩兵據箕谷李平領兵千餘去大兵之外以為援馬謖不違制則趙雲李平之兵皆有用也此所謂因地制形如此而已裴緒以一地而變一陣一陣有一形一形有一剋制之理此兒童之戲巫覡之妖耳何可從哉其以太公孫呉諸葛而假名者皆誣也辯得最無逃躱處然亦不必辯也孫武子常山蛇陣辯武經總要常山蛇陣圗一首唐裴緒之所演孫子九地篇有云善用兵者譬如率然率然者常山之蛇也擊其首則尾至擊其尾則首至裴緒演而為蛇陣一軍六千人四千為步兵布為左右前後中二千為騎兵布為揚奇備伏形如蛇之蟠曲何辨之葢軍有前後左右自古之制也其法不方則圓中軍居中前後左右環而繞之此奇正之所由出裴緒以前後左右中布為直陣已失其制矣况孫子所謂率然者謂士卒深入死地其情不得不相救在法而不在形其形如蛇一攻可貫欲首尾相救其可得乎魚腹浦中孔明以石縱横布為六十四壘其形正方桓温見而嘆曰此常山蛇勢也葢孔明八陣法以前為後以後為前四頭八尾觸處為首敵衝其中兩頭皆救桓温知孔明之法故云然也孫武之陣名曰乗之八陣出孔明魚腹之八陣是其舊制後世未之考耳武子兵書自古十三篇漢藝文志乃有武子八十二篇陣圖九卷皆春秋戰國之士所増假名孫子者也自吕后之世已失無傳裴緒附會九卷之説妄撰方圓牝牡衝輪罘罝雁行併常山蛇共為九陣以迎合其數則偽而又偽何足以為法也諸葛亮八陣記八陣之陣漢丞相諸葛亮經略中原之所作也壘石為之其迹在夔州魚腹灘自古相傳乗之六十四陣而已易卦為之宗握竒為之原其孰能推之哉孔明乃則河圗之圓而分為四層則洛書之方而分為九軍則井田公私之制而分為中外之營則文王後天卦位而定四竒四正之名西北乾卦也曰天陣西南坤卦也曰地陣東南㢲卦也曰風陣東北艮卦也曰雲陣取艮為霧也東方青龍之獸也曰龍陣西方白虎之獸也曰虎陣南方朱鳥之獸也曰鳥陣北方𤣥武之獸也曰蛇陣中為中軍陣太極之位也中軍四象為正四獸為奇四象四獸各以六陣相從或四象七陣四獸五陣中軍大將所居中中四陣為餘奇大將所握别為游騎二十四陣以繫八陣之後陣有八門開闢出入以為變化南正手北正足中立身前竒首後竒尾左右竒翼遊騎爪牙首尾伸縮以為節也兩翼翕張以為權也爪牙往來以為勢也身體手足鵠立鼇據以為主也氤氲變化為方為圓為曲為直為鋭其變無窮不外八陣分合而已後世有以天地衡軸衝分配者有演為天覆地載風揚雲垂龍飛虎翼鳥翔蛇蟠八形者又為三百六十四變合天度之數者不足信也唐太宗問曰陣數有九中心零者大將握之四面八向皆取凖焉陣間容陣隊間容隊以前為後以後為前進無速奔退無遽走四頭八尾觸處為首敵衝其中兩頭皆救數起於五而終於八何謂也李靖對曰諸葛亮以石縱横布為八行方陣之法即此圗也太乙統宗曰四維為正四方為奇乾之天坤之地㢲之風艮之雲四正陣也震之龍兌之虎離之鳥坎之蛇四奇陣也中間奇零握竒陣也四正四竒所以分布陣之用握竒所以立陣之體也草木子曰八陣圖出于井田公田即中軍也私田八家即八陣也瞿塘魚腹江前六十四魁其體方後遊騎二十四魁形如却月共八十八陣也奇兵分為四衡衡各六陣以配大陣四正四竒中軍之用所謂四頭八尾者是其制也行則騎兵居先止則竒兵居後戰則奇兵變化如牙如爪其用不窮孔明總平列而為兩行寄於六十四魁之後人不測其故以為殿後之兵云風后握竒陣辯武經總要風后握竒陣圖一首宋朝士之所演也宋神宗詔朝士討古陣法有以此圗進者以前為外後而為内衡陣在外圓布以象天軸陣在内方布以象地風陣當衡陣之四面雲陣夾軸陣之兩旁虎蛇向敵於前鳥龍上下於後衡陣十有四軸陣九風雲陣各四龍虎鳥蛇陣各二合陣三十有九而為大陣何辯之葢風后制陣天地居前後天衡居兩端風雲居四隅地軸居中央正兵主守不動為義故名衡軸奇兵主戰變動為義故名風雲衝陣數有九中軍零者大將握之故名握竒此古文握竒經然也後世謂孔明之八陣即風后之握竒遂有天地前後冲變為龍虎鳥蛇之説握奇八陣交相混雜故唐客韜鈐獨孤及目為風后握奇而為之記及去天陣地陣天衝陣三陣之名更於龍虎鳥蛇凑衡軸風雲為八陣不本握竒古文而别為之圖亦相襲混雜之誤也然古人制陣之要所貴有竒正有分合利於相救便於攻守紛紜而不亂如此而已獨孤及記陣名雖不合於經而定位備物致用之者疑兵游兵二廣四竒之稱竒正分合可以意㑹心韜鈐之圖規模形勢曲盡其妙而及之文足以發之也總要所繪圖其陣名布置實按獨孤及之記之文其形勢方不成八圓不成六竒正分合一無可觀何哉葢握竒經文藴奥難曉韜鈐風后握竒八陣又湮沒無考朝之文士姑以獨孤及之記為據妄自揣度而為之耳殊不知陣無多寡不越六十四陣然後七軍九軍之法其焉豈有三十九陣而可以為陣哉徒知握竒之名而失握竒之義於制陣烏乎可獨孤及風后八陣圖記物不終靜必受之以動當純坤用事隂凝於陽則飛龍戰大朴已散聖盜并起故戎馬生乃有力吞八荒爭截九有大者天柱折地維絶小者作慝廬山負阻中冀上帝慿怒下民是恤乃眷武徳黄帝受之始順殺氣以作兵法文昌以命將於是乎征不服討不庭其誰佐命曰元老風后葢旌諸圖側以為三皇之故事六藝之餘伎云師律提綱用陣法邇來諸將皆謂可戰則戰奚以陣為殊不知用陣以束部伍用衆如用一人使其勇者不得獨進怯者不得獨退以求萬全之義也昔諸葛亮推演八陣以巴蜀弱卒數萬屯渭水伐魏司馬懿以十萬之衆不敢與戰馬隆步卒三千按八陣圖破樹機能數萬以復涼州今為將者統兵數萬果可不用陣乎如無陣法則衆為一簇左右不能相應首尾不得相援豈得不敗故廢陣形而用兵者敗將也執陣形而求勝者愚將也其用之法如敵攻吾右以天衡八隊敵之次出天前後衝八隊張兩翼而攻之是為鳥翔陣如勝未决再出西南西北二隅風雲八隊夾擊之是為虎翼陣勝負未决以東南東北二隅風雲八隊邀其後或圍繞之是為蛇蟠陣如兩陣相當而敵未動者或先出西南西北二隅兵往來敵傍撓之伺敵空虛之處而奮衝之是為風揚陣大將列中軍以待敵或伏兵四隅候敵來戰起而聚擊是為雲垂陣又有游兵二十四隊或遮敵援兵或夾擊左右或擊其背或絶敵糧道或邀敵歸路而取勝也故陣有八向舉此一向以例其餘八陣之位初無定位皆臨時制宜隨地而設故地有廣狹尖斜之形陣有方圓曲直之勢錯綜八卦實河圖十五之圖井字開方之義大將居中諸部連繞四頭八尾觸處為首敵衝其中兩頭皆救如兩手之捍頭目也諸葛亮瞿塘方陣辯通鑑夔州瞿塘永安宫南一里魚腹灘中孔明壘石六十四魁各髙五丈布為方陣即其圖也後之演者不同正義俗呼握竒經以前後外十六魁為天衡陣左右外八魁為地衡陣通鑑王氏以前後外八魁為天衡陣左右外十六魁為地衡陣太乙統宗寳鑑以前後外四魁鈎連内二魁為地衡陣左右外八魁為天衡陣天衡地軸各易位而居内風雲十六陣同居四隅其説不一何辯之夫黄帝握竒陣圓也圓者分表裏孔明八陣方也方者定八向圓陣以裏為正表為竒故名内陣曰地曰軸曰衡取靜之義也名外陣曰天曰衝曰風雲取動之義也方陣以四隅為正四方為竒名四正為天地風雲者乾坤㢲艮之位也名四奇為龍虎鳥蛇者震兌離坎之位也是則孔明之天地風雲非軒轅之天地風雲軒轅之衡軸衝非孔明之龍虎鳥蛇亦猶伏羲文王之易先天後天各隨所取爾欲論握竒只求其法於内外勿雜以龍虎鳥蛇之稱欲論八陣只求其法於八向勿混以衡軸衝之號斯兩得之按此三家之説其於制陣内外相包之理竒正分布之要無一知之徒各以己意牽合握奇經又彊比而同其謬甚矣吁孔明八陣之義唐太宗以問于李靖則太宗未之了了可知李靖以旛名隊號為答則李靖之粗略可見况乎方士俗儒而可怪之耶諸葛亮八陣八形辯太白隂經諸葛亮八陣圖八首唐李筌之所演也以六十四陣内外前後左右四隅分柝而為陣天覆地載内外之第一變風揚雲垂前後之第二變龍飛虎翼左右之第三變鳥翔蛇蟠四隅之第四變毎三十二陣為一陣陣各以其名而為形何辯之葢自古先王制陣惟有法度與歩數而已至孫子始以虛實論形以險短論勢二篇之外别無餘法後世權詐之士内循先王之法度外假形勢以變人之耳目雖有鵞陣鸛陣魚麗車箱偃月等陣之名而形勢實在法度之内焉孔明八陣所向八方乾坤㢲艮之位而名為天地風雲子午卯酉之位而名為龍虎鳥蛇四正自四隅而立四竒自四方而出合乎先王制陣之法度也區區形勢肖像之説何與之有李筌之圖求形勢于法度之外其誣武侯多矣宋神宗曰今之論兵者皆以李筌隂經陣圖為法妄相眩惑無一可取如其説須兩敵相遇遣使預約戰日得一寛平之野夷阜塞壑伐草誅茆如射圃教場方可盡其言耳神宗之論兵舉朝之士未有能過者也惜所未聞者先王制節之法也諸葛亮八陣八形新變辯太乙統宗寳鑑孔明八陣新變圖八首張煜之所演也以陣内外前後左右四隅八變而成天覆地載第一變與李筌同其餘六陣形其巧過之何辯之葢李筌好竒造偽宋神宗皇帝斥之其説不行矣世猶存者一則教場操練虛習分合之容無叛軍難制之患二則草莽之中奸妖倡亂用此塗塞耳目自娯其計李靖曰存之所以廢之是也張煜怪誕之士屢變屢下求巧反拙神宗明論漠然而未之聞惑歟誤哉雖然太宗問李靖曰孔明斯八陣何義也靖對曰天地者本乎旗號風雲者本乎旛名龍虎鳥蛇本乎隊伍之别李靖名將尚失其㫖况何議於煜耶夫必知天地風雲衝軸衡之名之義然後可與論風后之握竒必知天地風雲龍虎鳥蛇之名之義然後可與論孔明之八陣不知其義而求其法也難矣諸葛亮六陣辯太乙統宗寳鑑諸葛亮六陣圖一首六變六形陣圖六首皆張煜之所演也六陣圖其隊三十六竒正各三有天地風雲前後衝而無天衡地軸六形陣圖有風揚雲垂龍飛虎翼鳥翔蛇蟠而無天覆地載裁八為六本李靖問答六形襲李筌隂經何辯之葢孔明八陣之制内外四層四陣為握竒十二陣為中軍四十八陣鈎連六隊相從以為四竒四正李以方陣變為六花則握竒中軍不動惟以外營四十八隊鈎連八隊相從為六廂故李靖曰八陣為六武侯之舊法也謂孔明斜谷路狹裁為六陣者妄説也凡布陣狹隘之地及過險出隘自有約隊之法武侯伐魏八陣常用八萬人若裁為六一陣反有一萬三千人矣安謂約隊故不足信李筌八陣之形既誤而張煜蹈襲更為六陣之形則誤而又誤者也不待重為之贅諸葛亮五行陣辯太乙統宗諸葛五行陣圖五首張煜之所演也或云雜兵書有之以天地風雲龍虎鳥蛇各自為一陣更迭變化陣隊多寡不同何辯之葢先王之兵四時有教不過乎列行陣以教聲容與號令而已不教民以分合變化之節也其防㣲杜漸如此李唐之初畨漢雜處塞内李靖兼領其將卒不得不教姑設為詭道以愚其耳目分六花陣為六陣以一為營以五為方圓曲直鋭之形每教閲一陣各五變凡二十五變而止雖知分合變化之節特為花步耳於臨敵無所用之臨敵之時相視地形或丘阜林壑平陸斥澤之用不同或髙下險易廣狹死生支掛之不一而因以制夫步騎多寡疏密輕重分合竒正之所宜而已非真有方圓曲直鋭之地形真有方圓曲直鋭之陣勢也黄帝之陣前後左右中五軍分五方而布之號為五行者乃俗人不知其理而加之名耳黄帝未嘗有形也張煜之為此陣葢本於此其失不待言矣諸葛亮八陣六陣鈎連蟠曲辯太乙統宗寳鑑諸葛亮八陣鈎連蟠曲圖一首六陣鈎連蟠曲圖一首張煜之所演也唐太宗問李靖曰卿六花陣法出何術乎李靖曰臣所本諸葛亮八陣法也大陣包小陣大營包小營隅落鈎連曲直相對古制如此臣為圖因之故外畫之方内環之圓是成六花張煜誤以八陣六陣皆孔明舊法而各編𨽻四竒四正三竒三正之圖矣猶以為未及鈎連蟠曲之勢故復為圖配以成周丘乗之數自云㕘古法而行己意也何辯之葢周制車一乗用卒百人三人為甲士在車上餘分為四隊隊各二十四人分布車下前後左右挾轅以為戰此一乗法也五車為隊二十五乗為偏五偏車一百二十五乗卒一萬二千五百人前後左右中布而為軍此一軍法也大國三軍上軍下軍大夫將之中軍諸侯將之鼎足而立其陣方其勢簡易一鼔一麾而列成再鼓再麾而出戰呼吸之間開闔變化如臂使指若驅車策馬以為蟠曲之勢則不勝其煩且亂矣其畫為鈎連者圖也孔明陣圖八八相乗混然無别觀者以筆鈎而連之以定九軍之所中心四隊相連為握竒十二隊相連為中軍四隅四方各以六隊相連而為竒正八陣故隅落有曲折相對之勢使觀者而知陣隊之别而已臨敵交戰則以神速為貴何取於蟠曲之巧耶李筌張煜漫不知兵徒泥合古文私意杜撰其實難哉諸葛亮十二將兵陣辯太乙統宗寳鑑諸葛亮十二將兵陣圖一首張煜之所演也李靖脱變八陣為七軍名之六花陣再變八陣為十三軍名之十二將兵陣唐司空杜佑推演布列之法初鼓而陣再鼓而布旗三鼓而就列張煜依杜佑布列竒正之法配以周井田丘乗之制以施於孔明之八陣外營八陣陣八隊隊一百二十五人兵一萬二千五百人用車一百二十五乗戰馬三百七十五騎以當甲士三人之數謂孔明之舊法然也何辯之葢李靖十三軍者中軍一陣十六隊外營四十八隊各以四鈎連而為十二陣四為竒八為正竒用騎正用步竒居四隅正居四方四竒者前竒後竒左竒右竒也八正者左角右角左爪右爪左牙右牙先鋒後軍也四竒取稟於大將八正取禀於四竒此李靖法也張煜之圖有十二將之名無四奇之陣失其制矣孔明八陣中軍自在其中張煜凡演八陣之外别有八陣以為中軍此又煩矣古人所謂三軍謂上中下三陣也晉之三軍恒用十餘萬人齊之三軍别有先驅申驅啓胠遊闕等陣之號何嘗拘以井田丘乗之制故凡論節制而以田賦為據者皆惑也風后之握奇孔明之八陣周制之農兵各自為法張煜定以風后天地風雲衡軸之陣名配以萬二千五百之車徒欲強而合之其可得乎諸葛亮當頭陣辯太乙統宗寳鑑當頭陣圖一首張煜之所演也孔明壘石為陣凡三處一在瞿塘魚腹江者至今猶存一在成都府新都縣之彌牟鎮一在漢中府沔縣之定軍山其迹皆已泯滅無傳張煜用其己意以六十四陣兩而倍之為一百二十八陣以步兵三十二小陣分為四坤四㢲八天衝十六天衡于前三十二小陣布為四乾四艮十二地衝十二地軸於後三十二小陣布為握竒於中以騎兵三十二小陣布為四先鋒七斗樞八翼候十二遊兵於前後左右之間謂孔明彌牟鎮當頭陣如此也何辯之葢古人制兵置左右二陣謂之二拒其用如左右手其勢不得不重四竒迭用乍進乍退其勢不得不輕燁以四坤四㢲為二拒而先鋒斗樞翼候反倍之非奇正之制矣至於天衡地軸各以重兵居内將安用之此尤為奇巧煩碎之甚者也不假辯以發之將何以為戡亂之法耶諸葛亮滿天星陣辯太乙統宗寳鑑諸葛亮滿天星陣圖一首張煜之所演也以六十四陣四而倍之而為二百五十六隊以六十四小陣為中軍以七十二小陣包中軍為内營以六十四小陣重包之為外營以十二騎陣䕶四角為拓隊以四大隊重䕶拓隊為鋪為樓謂孔明定軍山滿天星下營法如此也何辯之葢通書所載九宫體用天地盤數九宫居中八卦五星居外力士蠶室奏書博士居四隅張煜好神其法葢布為滿天星陣實凖天地盤數之格也殊不知古人陣營本同一法下營尤以簡便為貴善用兵者陣一止即為營營一分即為陣當就脚下可以立成豈有更分二百五十六陣之理即多分多合愈煩愈亂節制之道决不為如此也諸葛亮八翼陣辯太乙統宗寳鑑八翼陣圖一首張煜之所演也孔明陣無有八翼之名者煜以步卒一十六陣為前後二廂以騎兵三十二陣為左右翼候正兵之後無竒竒兵之後無正何辯之葢孔明六十四陣皆古之車制無非正兵别以二十四陣為游兵則孔明㕘用騎兵之法也瞿塘石陣八八成列騎兵環繞於後非特為殿後耳接戰之時或居先或居左右為翼為候為衝為突為揚為伏無定名也張煜推演陣圖動以六十四陣居外實不知孔明游兵之用也大率制兵當知伍法中軍如身前軍右軍如兩手左軍後軍如兩足皆為正兵四奇迭出於前後左右之間者則如爪如牙如嘴如角如羽如翼無正形無定位以此而識輕重之權以此而求動靜之理然後可以與追議孔明之兵法李靖六花陣記六花之陣唐衛公李靖開國之所作也本孔明八陣圖而變之其中心一二層有十六㸃為中軍此不易者惟以外三四層四十八㸃鈎連而有六陣左右總管各二陣左右虞侯各一陣各皆八㸃以相從所謂八陣為六孔明之舊法即此圖也李靖因之内方環之為圓外直畫之為方疏而開之其形六岀故號為六花中一如花心外六為花瓣去其隊數參用古法步騎與車三者相兼而間立步隊百人為率騎隊二十五人為率車隊七十五人為率車曰駐隊步曰戰鋒隊為正居前騎曰戰隊曰跳盪隊為竒居後中外凡七軍杜佑通典因述為七軍陣正六花之别名也其教閲恒用三萬人分左右六廂一廂為營法五廂為方圓曲直鋭之形安營布陣以六花為正中軍為竒斯陣也以開唐家之運制服夷狄其功偉矣若以為盡孔明之閫奥則猶有間也四門斗底陣記四門斗底之陣唐衛公李靖開國之所作也隋大業中征遼東制每軍一萬二千人百人為隊騎兵四十隊步兵八十隊各分為四團將發步兵第一團出營東門東向陣第二團出營南門南向陣第三團出營西門西向陣第四團出營北門北向陣輜重乃出第一輜重出收東面陣分為兩道夾以行第二團輜重出收南面陣夾以行第三團輜重出收西面陣夾以行第四團輜重岀收北面陣夾以行至營第一團騎兵陣於東第二團騎兵陣於南第三團騎兵陣於西第四團騎兵陣於北合為方陣四面外向䕶以車乗亦如之步兵各以其輜重入于陣内以次安營此葢隋髙祖楊堅之成法也李靖六花七軍之陣消息其法一軍三萬人五十人為隊騎兵八十隊步兵四十隊輜重兵一百二十隊亦各分為四分引行止舍一以為則焉斯陣也取其簡便易成變化不滯而已李靖六花用之善矣茍制陣無奇正分合之勢徒方陣以當敵則騎兵見蹙於前者有妨於退步兵欲救於後者不便於進出入相蹂行列難行雖將如劉錡尚無壘陣之善䇿况其他乎十二將兵陣記十二將兵之陣唐衛公李靖定邊之所作也以乗之陣外兩層四十八陣各四分之為十二小陣四隅四陣為竒四方八陣為正竒兵用騎正兵用步兵一將各一人中騎兵十有六陣為中軍大將主之大將統乎四竒之將四竒統乎八正之員首尾有相因之勢行止有相隨之分竒正有同力之義故名為十二將兵之陣是時突厥寇掠敵騎奔衝復變六花而為此也唐太宗葢用其法太宗為秦王破劉武周軍中作破陣樂武舞前出四表者非象四竒乎後綴八旛者非象八正乎用一百二十八人者以六十四陣為總陣八正之員各領八陣别有六十四小陣以為中軍一人所以象一陣也其原同出於武侯而各隨所變杜佑推演孔明布列之序直以太宗李靖之法以為之法夫豈無所本哉十二辰陣記十二辰之陣亦唐衛公李靖定邊之所作也唐太宗初四夷内附畨漢之兵雜處而并用之畨長于騎漢長於步靖因其勢一變八陣而為六花凡外營六軍各車步當前騎兵當後車步為拒騎兵從背出此一法也再變六花為十二將兵凡騎分為四步分為八騎居四維為竒為首步居四方為正為尾一竒各當二正二正各向一竒一面受敵首尾相應又一法也三變十二將兵為十二辰混步騎而為一凡外營周圍十二陣皆步而騎各包步之中一竒各當一正一正不離一奇一陣受敵各自為戰竒正相混無不是正無不是竒敵意其正則步開騎出而擊之以奇敵意其奇則騎入步合而擊之以正敵不知吾正之所在不測吾竒之所出經所謂奇正之變而循環之無端至此而後見矣是再又一法也夫是時用兵既久畨將薛萬徹阿史那執失思力之徒皆黠桀之資茍騎兵别聚為一陣敎之知奇正之方則誰可得而制者靖以步而參之騎以騎而𨽻之步或分之使居四隅或折之使隨各陣屢變其名換其勢何莫而非顛倒駕馭之微權也哉他日侯君集謂太宗曰陛下使李靖敎臣兵法靖匿其精者是李靖欲反也靖曰得臣之粗者足以服四夷更欲得臣之精是君集欲反也後君集果以逆誅靖之逺慮葢如此李靖六花陣辯太乙統宗寳鑑李靖六花陣圖一首張煜之所演也李靖因八陣為六花者以中軍變方而為圓以外營變直而為方中軍如花心外六陣如花瓣張煜之圖八陣具在但以地軸地衝轉居於外以天衝天衡轉居于内謂之六花何辯之葢兵之有陣猶碁之有畫路也陣之有方圓所以記度量多寡之數定逺近之限制險短之節也方計其步圓計其奇奇者徑一圍三之謂也六花中一廂前二廂後二廂左右一廂每一廂步騎相間而立成相去十步或三十步或五十步前奇後正觀敵何如再鼓之前正後奇其出以五十步為節離而不絶却而不散皆由方圓度量而起數是則外畫之方内環之圓者節制之所在非如裴緒李筌五行生尅之説矣大抵李靖六花之制步兵在前馬軍在諸陣之後得之於左𫝊車戰之法先偏後伍是也其變化出入不與孔明同所謂天地軸風雲龍虎鳥蛇之義不惟無其陣而且異其法張煜拘以地軸天衡内外轉移之末而求六花之理不亦迷且惑哉李靖五花陣變為六花陣辯雜兵書李靖六花陣圖一首作無名氏以前後左右中五陣號為仁義禮智信謂之曰五花以一十七陣交五為六陣謂之曰六花何辯之葢制軍以伍法為要列之五人為伍自一乘言之甲士居中步卒分為四隊居前後左右自一偏言之二十五車也大而列之五偏為一陣也然數起於五而終於八然後竒正備焉李靖六花陣自孔明八陣而變孔明九軍中軍十六陣外營八軍每軍六陣李靖七軍中軍一十六陣外營六軍每軍八陣六陣居外如六出之花故以為名李靖兵書未有五花之陣之説也學兵不讀左傳不攷衛公問答譬如棋無畫路而一步不可行也為此圖者妄指為六花陣葢于左傳及問答平生未嘗觀也行之於世誤殺將不為毒且烈哉平戎萬全陣記平戎萬全之陣宋太宗皇帝備遼之所作也車四千三百二十乘騎三萬六百匹兵士一十四萬九百三十人布為前後左右中五軍之大陣前後左右各以二行相從為表裏中以三陣相從為輔弼故五軍而有七陣也中陣以車一千四百四十乗方布如城郭每乘卒二十二人為戰備陣中置拒馬五千具别用戎行之不修則師律用爽隂謀之不作則凶器何恃故天命聖者以廣戰術俾懸衡於未然察變於倚數握機制勝作為陣圖夫八宫之位正則數不愆神不忒故八其陣所以定其位也衡抗於外軸布于内風雲附其四維所以備物也虎張翼以進蛇向敵而蟠飛龍翔鳥上下其勢而致用也至若疑兵以固其餘地游兵以按其後列門具將發然後合戰弛張則二廣迭舉掎角則四竒皆出必使陷堅陣拔深壘若星馳天旋雷動山破魏之觀列鄭之魚麗成周之熊羆昆陽之虎豹出匪以律我異於是既而圖成俎豆帝用經略北逐獯鬻平蚩尤戡黎于阪泉省方於崆峒底定萬國旁羅七曜鼎成龍至去而上遷於是遺風冥冥時亡而圖存焉於戲聖迹長往神機未昧酌其流者猶足以决勝三軍禦侮萬里故項籍得之以霸西楚黥布得之以奄有九江漢孝武得之攘匈奴服甌越東收濊貊西拓大夏然則聖圖幽贊未始有涯天寳中客為韜鈐者得其遺制於黄帝書之外篇装素而圖之勝敗之朕在我股掌天地之心見于毫末議欲獻諸䇿府廣武事㑹天子以不戰為師無為為寳則是圖也興於多難廢于昇平湮淪不書盛徳其没乃五千人守之四角置望樓八座别用八千人守之凡中三陣計用步兵一十一萬二百八十人也前為正前陣後陣之前行各三千一百騎隊五十人前陣後陣之後行各一千九百騎隊三十人東稍西稍之前行各二千六百五十騎隊五十人東稍西稍之後行各三千七百五十騎隊三十人餘六百五十騎隊三十人分為各隊探報之卒凡前後左右等陣計用騎兵三萬五千人也皆為竒葢雍熈之時契丹内侵太宗制此陣以禦敵騎奔突故曰平戎萬全之陣夫宋不自征伐有天下莫知古人制陣之法務以輕鋭為戒持重為主如此則其勢之弱實由兹而起矣宋神宗皇帝九軍新陣辯武經總要九軍新陣圖七首宋神宗皇帝之所演也宋有契丹西夏之禍太宗製平戎萬全陣真宗製常陣皆不勝元豐五年神宗更大稽古制别為九軍陣用李靖陣為七將用裴緒新令為牝牡衝方罘罝車輪雁行之形牝取其廣牡取其鋭車輪取其圓罘罝取其包絡雁翼取其張舒以形相制治而為法出於神宗之宸㫁者何辯之葢黄帝孔明之陣四竒四正併中軍而為九大將之將得四之一八陣之衆得四之三謂之握奇開闔出入千變萬化其道無窮何形勢之有神宗為九軍似矣惜乎中外無等竒正不分泥于形勢知為九軍而不知所以用之况李靖六花陣軍七故將亦七九軍置四將可知操縱開闔進退出入决善政也積弱累敗至於䘮亡宜哉或曰孰與平戎常陣為優劣耶曰陣起於五而終於八起於五者前後左右中五正也不及四竒終於八者四奇四正也而不及中此萬世不易之法平戎常陣雖知五軍而布其所失過于固守怯於進取均為敗陣惟不泥於形勢庶幾不類于兒戲耳元四陣圖辯虎鈐經陣圖四首元許洞之所演也例十萬卒以七為步為正三為騎為竒曰飛鶚者摶擊勢重霞者氤氲勢長虹者彎抱勢八卦者四應勢逓相變化以為法何辯之葢握竒伍法二者製陣之大要握竒所以立陣之體也體立則四支為之用而守固伍法所以定布置之所也布置有方則進退出入開闔竒立整而不亂寡可以為衆弱可以為彊兹洞四陣皆以一面為勢中校平列一字為中軍是無握竒矣四隅無兵以首項身尾為次序是無伍法矣茍處軍平曠之地敵出以竒驚其左右則中軍自擾前後不相救夾而攻之則㫁而為二為三聚攻其一處其背可透小挫兵遂大亂其患殆非止一端也烏得為節制之理哉雖著論紛然要人必信稍識虛實者皆笑其為謬戾夫厭李筌形勢之偏卒不能自既於形勢之累一弊流源千萬載而不悟至於如此也耶第一分陣隊者衝兵未布於陣中無事於衝突故以竒哨相錯綜而蔽䕶中軍此屯營時也即八陣遊兵置後圖之意第二陣分將校以統之第三發行則以次而不亂結陣即擡營之意行時亦成營陣敵伏兵不得衝之所以衝盡在四面也第四營栅第五初布陣始以衝兵分屬于各隊此則列于陣外矣葢每一隊竒哨該有一隊衝兵竒哨各為方陣而不為前之錯綜者正以利于衝兵之出入也第六斂衝待敵不駐衝于各隊之外者示之弱也而駐衝切近于各隊之内者暗防敵之衝也此所闕不為第十六陣之藏于竒哨隊中也是時尚未定賊之來路也第七嚴陣挑戰葢因示之以弱而敵不至則必出以挑之是時賊在前故於四竒之中各撤一隊以歸之前右哨止留一隊衝兵以防後前右二哨既借四竒而又各駐衝兵一隊于旁以自固者正所謂嚴陣也使賊見二哨兵之多必由挑戰之處而來若賊來又不以衝兵與戰而以前竒與戰衝兵似宜閃開兩邊將以前竒誘之使入則伏兵起而攻其左右前校與所駐中軍衝兵當其前挑戰之兵要其後然前後皆有重兵恐兩旁之一隊衝兵不足以當之故以左右竒聽招將視其勢之彊弱以進止也第八先鋒應敵則全軍皆動獨左後二哨不動前右二哨自固如前然前以衝兵駐于二哨之傍今以之駐于二哨之前者葢以初有三隊衝兵在前挑戰與揚兵今止一隊故也以當先一隊與之戰而以兩隊衝兵藏于傍以為兩翼伏二隊於後葢敵至則如前之夾攻不則亦可以隨衝而出也初以左右竒聽招今即以之備伏故以後竒聽招而向前後竒既向前則疑于後之疎也故以衝兵一隊分駐之于後葢此進兵時也故兩腋亦須防賊之伏兵是以不以兩竒之兵聽招而以之備伏又駐衝兵二隊以為備葢左右有急則應左右前有急則應前此其駐衝兵之妙也第九前哨受敵則右哨之自固如前而前竒駐以衝兵二隊以其近于賊之來處亦當自固也然左奇有三旗兩衝處置與三面不同正以待戰也前竒自固衝在後左哨自固衝在傍在後二哨則衝亦無之皆與左竒制陣不同此待戰與自守之别也然後右亦未嘗不分衝兵以駐之又移中軍以向前哨他陣前奇交戰則有衝兵在前而此無之者以前奇止是五隊前哨是八隊故即以本隊兵與之戰也八隊内原借前竒一隊在内今還之而又借右竒一隊補之葢以右遠而前近也右哨受敵可知矣第十前右二哨俱受敵則前竒左竒右竒俱逼近賊矣故本竒自有五隊而又各駐以衝兵因兩處受敵而衝兵不足故不得已撤中軍左右校以備之中軍左右校既撤仍懼左右腋之勢孤故揚衝兵於外以張其勢前奇駐以衝兵兩隊而左右只是一隊者以前竒夾在二哨中則兩面須備敵而左右奇只是一面也第十一迭右竒者以前竒戰乏故以右竒迭之又以左奇聽招以待右竒之乏然兩腋疑於疎矣故以衝兵一隊待之復移前右二哨之衝兵于兩旁者正以近左右二腋而便于䇿應也第十二迭左竒意亦如前然以右竒整於前而以前竒列於右者以其從後而退便抽換也第十三迭前校意亦如前然不用後竒而用前校者葢以漸次向前便於進也他陣以一隊衝兵助奇兵戰而此以兩隊助之者以各竒有五隊而前校止是四隊也分左竒於兩腋者以當前隊出敵之時則左竒從中分自兩旁而退且欲收前右二奇於中也所以收前右二竒于中者以他陣俱有衝兵在内今衝兵向外故以竒代之又二竒休息已久將可再出衝兵交戰已久將欲收入故列於此待衝入而直出也藏二衝兵于二哨之中者欲示之弱以分其勢使不專于前也第十四三軍大戰以他陣竒校相更而衝兵則未嘗更至此則衝兵亦欲更矣故收衝兵以待逐敵之用既無衝兵於外則不得不合三竒之兵以對敵左右竒既出而兵又乏故暫移左後二哨以為腋以前陣在腋之衝兵補其空第十五戰勝追逐則竒校俱入陣而以輕兵追賊一得以更迭休息一則按其行伍勝而不至于亂第十六收陣整兵故分布衝兵于各隊常以衝兵䕶竒哨此以竒哨䕶衝兵人馬解鞍卸甲俱在營中矣追逐歸後疲倦之餘闕第十七據險阻敵他處皆十二隊衝兵而此獨倍之者葢於險處則設疑兵之似衝兵者以懼敵也第十八迴軍轉戰則敵在我後故衝兵皆駐于後葢衝兵原以隨處禦敵也此陣于受敵處固駐以重兵而子細防之而不受敵處亦未嘗疎則敵之聲東擊西者無患矣四面固有衝兵來往以防守而中軍亦未嘗無衝兵一則以固本根一則以隨時應用屯營則竒哨在外行營則衝兵在外或虛而張其威則衝兵在外或實而示之弱則衝兵居中細觀其作用衝兵最勁竒校兵次之哨兵又次之其陣常定而隨敵可以應之以駐衝兵之得宜也不言三迭陣而迭陣在其中矣合來則十八陣總是一陣分之則變化無窮此其所以為妙也秘戰第七一秘戰者即新名鴛鴦陣之謂也每衝鋒五人為伍用長挨牌一面伍長選身長力大者一名在前執牌面左止許顧左不許顧右後身第二名執狼筅面右以筅出牌右五尺𦂳𦂳靠牌其鎗手在筅之後三步平執鎗伍長執牌徑進餘各𦂳𦂳依法隨行敵决不敢以鎗戳牌如將鎗由牌頂戳來伍長用牌一起即將鎗髙閣急待收鎗我之鎗兵出而戳敵矣如左面戳來必欲中傷執狼筅兵之後脊鎗須由牌兵面前過三尺餘牌兵可以手握其鎗後之鎗手出矣如敵兵將鎗由右來欲傷牌兵之臀筅兵以用筅按其鎗鋒而後行鎗手又出矣如賊用鎗由牌下戳牌兵之足牌兵用牌一坐下壓其鎗而後之鎗手又出矣至于賊之短兵刀鈎等項必不能近惟牌兵專視一面而既䕶筅兵之脊筅兵亦專一面而䕶牌兵之後鎗射銃手俱立牌後六七尺則正面矢石已不能及而復左右皆救矣再如賊衆道平我則通將牌齊列雖有萬賊進不能與我相交刃退後有所逼而不敢心生延望相持稍久而我之竒伏相機遣出又張聲勢兩翼漸逼賊必分兵四禦我則開牌縫而出甲士麾之賊計窮矣夫浙兵之不敢戰謂其以赤身生命抗死冦無自衛之䇿也鴛鴦陣之法最妙者取其敵之鋒刀不能及兵身庶兵之膽可恃以無恐而敢進且退則有蔽於後進則如載堵牆而前百戰不殆此也振勇破堅此也直擣巢險此也再如賊在山上有擂木滚石我欲山下仰攻而上賊將木石下抛則毎牌下止用三人執牌于前而上遇有木石下擲以目看正各兵伏身其下以此牌遮其身上牌下根附山髙土坡牌頭下垂則木石遇之而直行無礙順勢滚下我再舉牌復登破險上山尤要器也但牌身如用銃打透諸計皆㒺矣革銃新牌之功用何如哉天陣或數十人或百人列為前陣衝突官兵營壘地陣或數十人或百人列為後衝專恃隠伏邀擊人陣居中或為應兵或為遊變或為牙爪也天陣先出三人為宗各相依背面外而立或隠伏草莽或出沒空舍崖岸如鷹隼鳶鶻使官兵莫能測五人為伍前二人後三人能使飛刀者直衝官兵之前能使鎗鐮次而進如官軍直衝羣擊而前我當分伏夾道無恙尾令士卒羣聚蹲踞咆哮而前各執短刀分兩翼横跳而進則後陣自潰前中皆奪散矣可收兵歸營不可深追参彼兵臨我我兵執紙葢而直衝其前彼若不解破法我用率然之勢首尾包絡彼兵即敗箕令士卒羣蹲踞滚刀而前角我兵戴一角披髪而突入其陣彼不知破我兵可先斬其馬次及前衝則彼皆自潰矣斗令士卒分五陣四面而進亢彼兵臨我我用兩卒口銜刀手執白紙幡向兩路夾攻陣中彼不曉破我用羣刀手大噪而進彼兵盡為我挫矣并所至處先令人放火使烟焰衝天然後埋伏草野以次而進無不勝者翼彼兵臨我我兵頂一方板手執長蛇以進彼不知解我兵先横跳而進之矣此謂之倒戈陣也奎令士卒伏地而來先截尾陣次及先鋒其勢如山畢彼兵臨我我兵口銜短刀兩手如翼向後後兵呐喊而進彼不知解我得大嬴此陣能潰圍觜先令人登髙樹屋望之次四野伏殺婁令軍二十人手足抵地作犬聲而進星令士卒跑跳哮叫而進一衝前陣其勢如劈竹栁先令士卒手執鋒刀三尖刀一跳十數步横奔而來昴主將即向前令兵兩手如飛鳥相似張翼前進各執大刀呐喊殺來張以頭觸物而進令士卒羣聚殺殺勇不可當虚天陣如飛鷹捉兎乃為天鼠三軍大刀大斧飛奔前進地陣如穿山甲入山掃地而往各持短刀喊叫滚在地上向前名為地鼠攛穴人陣如狼迷人飛槌抛打飛刀飛鎗齊進三陣一時同發名為日鼠飛躍心令三軍喊呼向前各執長鎗三尖利刀牛令士卒各執大刀大斧口作牛聲而進鬼令士卒以頭向敵各執短刀短鎗如風齊進勢不可當室令士卒各執飛刀捲地而入壁令士卒各用三尖大刀月斧而進胃令士卒手執三尖刀三股义齊聲呐喊大叫殺入房令士卒喊呼殺殺手執大斧齊進危令士卒各執雙刀如鳥翅飛開殺聲不住一躍前進氐軫令士卒分兩邊各執短刀一路長鎗一路迅速齊到勢不可止殺人最快交鋒時角木蛟用扇拍拍所領軍五人為伍前二人後三人彼此背後相靠見扇拍時一躍丈餘殺至彼營尚不知也少時中陣尾火虎埋伏在草莽或山岩空谷之中見敵人迎來陡起來殺變為虎陣乃人陣法也專恃隠伏邀擊一變為女土蝠陣乃地陣法也或為天陣遊奕或為人陣牙兵不拘常也或挾飛刀向前鎗在後或飛鎗在前藥箭在後出沒隠伏交鋒迎敵更難測度此乃日日演習照二十八宿交戰法行之此法訓練百日務要熟閑然後用二十八人胷前懐之立制營壘用人操練仍照前法一一施行又練百日俟人成熟慣戰方取用之凡人操練亦用装敵人對壘交鋒如是方得精也演禽戰法凡稱我者倭自謂也稱彼者謂官軍也以此推之章章自明矣此法自晉孫恩海上作亂樓船千艘賊兵萬數然出敵不過數十人屯聚不滿一二百而專恃此法人號長生自誇神筭天厭其亂能破其術者有劉牢之也大戰海洋賊衆覆敗孫恩溺死盧循繼反劉牢之復破而滅之此法傳自榜葛剌彭亨倭奴諸島者至今兩廣猺獞苗寇皆效之也此法不擇日不擇門不避孤虛惟用棗木刻二十八宿真形行則佩之立營隨方供之陣法分天地人陣天陣前衝天陣或數十人或百人列為前陣衝突官兵營壘地陣或數十人或百人為後衝專恃隠伏邀擊人陣居中或為應兵或分游變或為牙爪也天陣先出三人為宗各相背立隠伏出沒如隼如鶻各相依背靣外而立或隠伏草莽或出没空舍崖岸如鷹隼鳶鶻使官兵莫能測也五人為伍前二後三飛刀直前鎗䥥次也前二人後三人能使飛刀者直冲官兵之前能使鎗䥥者次而進先出者潑扇鼔譟一進先出者俯白扇向前對官兵而潑之衆皆鼓譟而進也彼知破法亦潑扇而裂之踏足下令軍士用牯牛釵直衝羣擊而前官兵能知破法亦用白扇破而裂之收踏足下令軍士用紅布纒頭左右各挿竹枝一根手執細梢竹一根向賊陣羣擊之賊人必敗矣蝠夜飛人常以細竹急速揺擊則蝠必自觸于竹而死官兵既用牯牛釵破賊之法賊人受破難敵也我當分伏夾道無恙不然彼有大斧長鎗執彩扇面匈前拍拍而來則我兵大危矣賊被破必分夾道而伏以避之無害矣若官兵再有大斧長鎗執彩扇胷前拍拍而來賊兵大厄矣此第一指法也名女土蝠主將臨陣黙念唵吽吽咍咍咍叱叱叱一變為尾火虎陣令士卒羣聚踞咆哮而前各執短刀主者裂白扇棄地或水中分兩翼横跳而進則後陣自潰前中皆奔散矣可收兵歸營不可深追若彼知破令軍士羣棄草鞋一隻投陣中鑼聲大震而進主將披髪直前衆兵自走矣賊行蝠陣被破賊首念咒作髪必變尾火虎陣賊令卒屯聚咆哮以向官兵各執短刀賊首裂白扇棄地或水中分兩邊横上官兵後陣必自潰前陣中陣皆奔散矣自收兵歸寨不敢深追若官兵知破令軍士脱所穿草鞋一隻投賊陣中令各隊鑼聲不絶大將披髪直突賊陣之前賊兵自然迷惑束手就擒矣譬如虎行杖落必有虎長導引擒虎者必棄所穿草鞋一隻于山麓倀得之必猶豫不進虎即為獵者所獲矣彼兵臨我我兵執紙葢而直衝其前彼若不解破法我用率然之勢首尾句招彼兵即敗使彼用此我能破之人執白棒於前鎗斧居次先斬執葢次斬先鋒令婦裸體用簸箕扇之然後旗指戈向則勢如壓卵矣官兵出陣臨賊賊人執紙傘直突官兵前若官兵不知破法賊人用率然之勢率然者常山之蛇也擊首則尾應擊尾則首應擊中則首尾皆應而官兵必敗矣若官兵用前法臨陣賊令白棒向前鎗斧居次先斬執葢次斬先鋒如不能斬執葢先鋒賊必䧟斬就令婦人祼體用簸箕向官兵扇之而旗指各向之處勢如壓卵矣官兵彼時知破用箒颩溺洒之簸帚即昏賊首可獲也此第二摺法也名參水猿臨陣主將黙念唵咖囉唦九遍用劍横畫地上直躍而前一變為箕水豹陣令士卒羣蹲踞滚刀而前狎者用扇向匈前拍之彼不知解即以扇向前招揺之口念唵吽吽嚙􅀢九遍用劍直指須臾隠隠迷霧衆兵皆為我傷矣彼知破法用叠陣破之槌斧長鎗居前中勁弩在後以次而進主將用扇横分左右扇之收踏脚下雖勇猛亦為所困也賊行猿陣被破賊首念咒作法伏劍横畫地上直躍官兵之前變為箕水豹陣令賊衆蹲踞滚地使刀而前押陣者即用扇向前招揺之口念咒作法用劍直向官兵前指之頃刻迷霧隠隠官兵受傷使官兵知破法用大斧長鎗強弓勁弩挨陣而進大將用扇横分左右扇之抆足下踏之雖有賁育在内亦為所困矣彼兵臨我我兵戴一角披髮而突入其陣彼不知破我兵可先斬其馬次及前衝則彼皆自潰矣使彼用此臨我兵夏月用斬蛇以投陣内冬月用草編為草蛇以待之既斬蛇投陣内然後兵再用笓籬蔽前勁弩後發兵士務去襦袴方勝官兵臨賊陣賊兵戴一牛角披髮纒紅巾直突衝官兵之陣官兵不知破賊人必先斬官兵馬足次及前衝官兵必敗官兵知破夏月斬蛇投賊陣冬月編草蛇以替之既斷蛇投賊陣再用笓籬蔽前笓籬竹挨牌也勁弩隨後而發官兵居前陣者務去𥜗袴則大勝矣葢蛟者乃蜃蛇所化斷蛇則蛟傷真形也此第三摺法也名角木蛟主將臨陣黙念唵吽吽叱叱叱􅀢􅀢􅀢九遍一變為斗木獬令士卒分五陣四面而進主將用扇向前頭上􅀢􅀢之聲如招人狀其兵俱斂手受刃也使知解法用米撒陣内去下袴羣執重器火砲中半邀殺無不勝也賊行蛟陣被破賊首念咒作法變為斗木豸陣令士卒分五陣四面環繞而進賊首用扇向頭頂上口中作㗖㗖聲如招人狀官兵則束手無措官兵知破用白米亂撒賊陣中軍士去下𥜗袴羣執重器火砲或中渡或半道邀擊大取其勝也彼兵臨我我用兩卒口銜刀手執白紙幡而夾攻陣中彼不曉破我用羣刀手大譟而進彼兵盡為我挫矣使彼兵用此法加我得風則燒其幡無風用竹篠令軍士羣擊之幡斷陣破主將可擒官兵臨賊賊人令兩卒口中銜刀手執白帋幡令賊衆兩路夾攻官兵不知破賊人用羣刀手齊鼓噪而進官兵受其挫矣假使官兵知破此法得上風則令軍士燒其幡無風用哨竹羣擊突陣内幡斷陣潰賊首就擒矣此第四摺法也名亢金龍主將臨陣黙念唵嚙嚙嚙嚙囉唦攝九遍用劍指尖直揮而退一變為井木犴此宿入山擒猛虎入海啖龍蛟所至處先令人放火使煙熖衝天然後埋㐲草野以次而進無不勝者如彼知破令軍士各執五指釵而進如無用魚义亦好賊行龍陣被破賊首念咒作法變為井木犴陣遇官兵先令人放火使烟熖漫天然後分投各處三伏草野挨次而進攻無有不勝者官兵知破令軍士執五指釵而進如無魚叉亦可犴獸性猛入山擒虎豹下水啖蛟龍原其真形乃大魚所化五指釵獺之真形也魚叉亦所畏之器也彼兵臨我我兵頂一方板手執長蛇以進彼不知解我兵先横跳而進之矣此謂之倒戈陣也彼使用此加我必先用大礟居前或鼓哨披髪斜行大斧直向先斬先鋒次擒上將也官兵臨賊賊人頂方板一片手執長蛇以次而進攻官兵不能破之賊兵必令前陣横跳而入官兵必輸官兵暁破先用發煩居前衝令頭目數十人鼔哨披髪斜行大斧直前向賊陣先鋒賊首必就擒矣蛇蟄䖝也發煩聲震其物斂藏此第五摺法也名翼火蛇主將臨敵黙念唵􅀢囉哪囉煞用劍虛刺而進一變為奎木狼令士卒伏地而來先截尾陣次及先鋒其勢如山彼知解法惟以槌鞭斧簡羣向前而進攻之然後令士卒務以圓尖二陣行之無不破矣若視以㝷常必受其害賊行蛇陣被破賊首念咒作法用劍望空虛刺而進變為奎木狼陣令卒伏地而犯官兵先截尾陣次及先鋒其勢重如山官兵知破專用大槌大斧鐡鞭長簡羣聚而進攻務擺圓尖二陣賊人必敗矣若視以㝷常玩怠必受大害彼兵臨我我兵口銜短刀兩手如翼向後後兵呐喊而進彼不知解我得大嬴此陣能潰圍如彼用此襲我兵先令執紙葢而直衝之先斬後陣前中自散官兵臨賊賊人令卒口銜短刀兩手如鳥張翼向後後衆賊齊呐喊而進攻官兵不知破法賊人大勝此陣能潰圍官兵知破令一卒執一紙傘而突入賊陣先斬後陣則前陣中陣自然離散官兵大獲全勝也此第六摺法也名畢月烏主將臨陣黙念天轉地轉唦囉􅀢一變為觜火猴先令人登髙樹屋望之次四野伏殺仍執紙葢短幡直衝斬栁枝投陣内大勝彼知破法務以火鎗方勝賊行烏陣被破賊首念咒作法變為觜火猴陣先令人登髙樹或髙屋逺望次伏四野截殺仍執紙傘短幡直衝再斬栁枝投官兵陣内取勝官兵知破務用火龍鎗直倒賊陣賊兵大敗猴性輕佻惟火能制賊見破了觜火猴陣主將用扇拍拍而來前念咒曰吒利利那囉囉一變而為婁金狗令軍二十人手足􅎲地作犬聲而進隨用大斧長鎗殺來我軍被殺不知破法大敗而歸官軍知是狗陣各軍頭扎虎頭形盔㡌作虎聲向前手執肉十數塊抛入彼陣鼓翼而進賊必大敗賊若變為婁金狗我這裏知是狗陣即用肉或牛羊骨頭上抛進以制之葢狗性喜肉彼見之顧食不進入又見虎豹在前畏懼退縮也此第七摺陣法也名婁金狗主將臨陣黙念咒曰變移移星神聽令可劒一指一變為星日馬令士卒跑踘哮叫而進一衝前陣其勢如劈竹彼知破法各以鞭槌叉棍向前料豆亂撒地下賊兵返囘自傷害矣賊見破了狗陣主將念咒作法變為星日馬咆哮冲來若不知破法官軍受傷矣馬性懼縳喜料彼見鞭繩豆榖即退陣矣此第八摺陣法也名栁土獐主將見破遂執黒旗在手左旋不住黙念速速來摩囉摩囉即變為栁土獐陣先令士卒手執鋒刃三尖刀一跳十數步横奔而來彼知破法各軍三股义藥弩箭向前口作大聲方勝獐性跳躍怕大叉若不知破法官軍被其殘害獐見索網大义自退縮矣此第九摺陣法也名昴日雞主將即向前令兵兩手如飛鳥粗似張翼前進各執大刀呐喊殺來官兵不知解法賊人大勝若知破法即用米榖撒去手執竹棒打去飛槌殺入即解主將見解即變為張月鹿陣以頭結物而進作法持咒手執黄旗旋轉黙念黄由由頭角崢嶸速速唵唵令士卒羣聚殺殺勇不可當官軍不知破法被賊沖擊受害奔走若知破法各兵口作犬聲以三股魚叉藥弩網索齊進賊反受害矣主將見破即念咒作法手握皂旗披髮口噴淨水按上中下口念呪云唵嚙呤呤鼠即情一變為虚日鼠陣此陣最惡天陣如飛鷹捉乃為天鼠三軍大刀大斧飛奔前進地陣如川山甲入山掃地而往各持短刀喊叫滚在地上向前名為地鼠攛穴人陣如狼迷人飛槌抛打飛刀飛鎗齊進三陣一時同發名為日鼠飛躍主將先用軫扇拍拍不住諸軍見扇拍拍不住一當百官兵不知破法無一人得存盡被殺死若知破法令三軍手執竹葉長竹口作猫聲以破矢鼠手執團牌短刀齊隔飛槌飛刀飛鎗牌下短刀砍賊脚口亦作猫聲前進以破人地二陣無不勝也主將見破即令三軍喊呼向前各執長鎗三尖利刀作法黙念狐精救我三軍唵吒吒摩哩哩即變為心月狐陣殺入狐性喜變婦女怕網索猫犬官軍口作犬聲頭上畫婦人美色墨包賊陣噠哩哩殺殺即變為牛金牛令士卒各執大刀大斧口作牛聲而進不知破法受其害矣若知破法令三軍各執長鞭口中念啼即拂也大喊齊進賊反受攻主將見破作法黙念魍魎魍魎助我真常吒吒囉囉速速疾即變為鬼金羊令士卒以頭向敵各執短刀短鎗如風齊進勢不可當若知破法令軍頭頂虎頭狼面作虎聲喊大刀尖刀殺入而解賊見法破即行作法黙念呪曰鐡脚田王速速當當飛揚飛揚即變為室火猪令士卒各執飛刀捲地而入若知破法即令三軍抛糟入陣尖刀相迎手執長索鐐鈎齊抵相戰主將見破即行作法黙念大悲龍神救我兵人速疾疾唵吽吽吒吒即變為璧水㺄陣令士卒各用三尖大刀大斧而進若知破法令軍口作犬聲手執三股魚叉迎敵賊見法破即作法念呪云吒吒那那飛飛殺殺即變為胃土雉陣令士卒手執三尖刀三股叉齊聲呐喊大叫殺入官軍以網羅長繩大刀頭上挿茅草栁枝敵住賊見法破即又作法呼曰三陽三陽速來軍旁水䕶水䕶勿悮勿悮即變為房日此陣照耀四方為三軍頭著令士卒呼喊殺殺手執大斧齊進官軍頭帶虎狼巾口作犬聲敵住賊見法破即行作法將皂旗旋轉黙念悉怛怛社公公速至至即變為危月燕陣令士卒各執雙刀如鳥翅飛開殺聲不住一躍前進官兵不知破法被賊跳入殺傷若知破法令各軍手執竹桿望空不住打下長鎗隨後迎敵或黙火把燒去即解賊兵返囘盡被官軍殺害賊見法破又行作法用淨水三口噴去大聲喝云土神水神逺至逺至唵哩唵哩殺殺殺即變為氐土貉軫水蚓二陣令士卒分兩邊各執短刀一路長鎗一路迅速齊到勢不可止殺人最快敵不見軍官兵以鋤頭大刀破入鑼聲不絶口作猫犬聲齊進無不勝矣凡遇作法必主將披髪執旗先念天轉地轉人轉天旋地旋人旋三遍喝聲疾疾此作法也凡遇破陣法必行後處破陣中咒語作法依之行之無不破了敵人陣也凡遇變陣即行後面的藏身法每令各軍依藏身法遮隔前進賊兵飛躍至前官軍亦不見矣知賊變法預為解釋方得解破如草鞋草蛇火把竹葉長竹簸箒米糠笓篱紙畫龍蛇虎豹美人一應破法無不備具方為完足應敵無不取勝凡交戰出征領兵頭目手中花扇白扇紅扇各色扇各備十數把以備號令以破陣法中用以毁壊脚踏作法用之如白紙幡紅布巾細竹竹篠牛角俱預備三股魚叉箝鈎網索紙紋花茅草紅草蘆葉生鐡等件先要備用前此陣法雖列但二十八宿隨時列陣遇春决是蛟龍蛇蚓等得令先行此陣也餘倣此凡二十八宿看何宿直日如角木蛟的日辰即令各軍布角木蛟陣為先後看日辰及來軍之勢利何如耳變化相刑相剋禽陣也二十八宿依此為例又二十八宿主管統帥紫微天皇星貪巨禄文廉武破七星為輔佐天罡為先鋒棗木刻為聖像或寫立牌位照後行禽操練之法二十八宿操練之法角木蛟蛇頭人身着五采袍手持三尖兩刃刀率領蛇廂等兵交鋒一變尾火虎或變室火猪各領部下兵交戰日在於卓上操演行法人口念咒炫烈􅀢熒子宛𤣥燒符三道其法擇六甲日中遇角木蛟直日起手行法先于甲子庚申丙午癸亥四日用棗木九寸長刻二十八宿真形照後搽漆顔色器械衣裝按四方日刻如甲子日屬木刻角木蛟四宿也其三方照此刻太陽太隂八日于朔日刻房日也朢日刻心月狐也裝㸃顔色亦依此行之不可違此恐有疎失不靈凡操練之時先立壇場祭告北斗天皇五星等神寫立牌位排設金水五星亦刻形像祭練之日五星率所屬聽令告畢第二日方行操練先立營星淨室中鋪席在地先是金星在前亢金龍四宿在後木星在前角木蛟四宿在後餘倣此操練三日後五星供養在上止用二十八宿操練先立天陣在前如角木蛟領兵先進一躍即至敵所與敵交鋒先於二日扎草人二三十人俱長七八寸俱用紙衣紙甲顔色籹成竹木雕造刀鎗器械聽用交戰畢俱行燒毁要行再做交鋒時角木蛟用扇拍拍所領軍五人為伍前二人後三人彼此背後相靠見扇拍時一跳丈餘殺至彼營尚不知也少時中陣尾火虎埋伏在草莽或山岩空谷之中見敵人迎來陡起來殺變為虎陣乃人陣法也專恃隠伏邀擊一變為女土蝠陣乃地陣法也或為天陣遊奕或為人陣牙兵不拘常也或伏飛刀向前鎗在後或飛鎗在前藥弩在後出沒隠伏交鋒迎敵更難測度此乃日日演習照二十八宿交戰法行之此法訓練百日務要閑熟然後用二十八人匈前懐之立制營壘用人操練仍照前法一一施行又練百日俟人成熟慣戰方敢用之凡人操練亦用装敵人對壘交鋒如是方得精也此三陣須習操練之法非人勿示慎之慎之所用祭禮鹿脯五盤脯五盤獐肉五塊羊首二枚果品五色麵食五様方酒五盞醴酒五盞明燈五盞設八方位按乾坎艮震㢲離坤兌八卦排土座様式五色彩帛掛五方燒帛五段所設劍鏡牌印金銀紙錠燭炬列五方紙旗令英勇五人執掌行法人被髮黙念請神咒乞降此壇聽令其行法時符咒俱用後面的每次燒符三道除後咒先念炫烈􅀢熒于宛𤣥燒符一道念本宿咒燒符一道又呪云天神天神假汝之靈助我軍行𠞰除惡敵輔翼聖君急急如紫微天皇帝君律令勅燒符一道又云天罡星君貪巨禄文廉武破七位星君助吾行法遣將出軍聽吾法令不得留停吾得成功奏請天庭吾奉太上老君律令勅用令牌急打三下步九尾鳯罡左手持劍右手執水盞天門上噀水一口吸祖炁三口大喝一聲疾如此三次行法不可忽也若天神下降露出真形不可畏懼但言呪曰請神歸位土座受吾供養䙝慢神明聽吾法令輔國安民望神哀憫宥罪安寜不勝欣慶祝畢淨手焚香再告心事祝文唱讀煉飛刀法其法取庚申日煉淨好瓜鐡十二斤三人打渾鋼如斬人刀様者六口先于丙丁日砌罏朝西方打鐡人俱齋戒入淨室中起手打雌雄六把陽日打雄隂日打雌打畢供養在老君之位三七日日祭祀每日持咒牲血洒刀上祭雄刀咒曰莫耶莫耶老君煉成你為天主三陽之精令你斬人不得留停太上老君急急如律令勅祭雌刀咒曰干將干將老君持杖渾鐡打成三隂之象令你殺人如風掃蕩太上老君急急如律令破飛刀法用重喪袋一條一抛而去口噙血水噴去喝一聲落咒曰飛刀飛刀返歸殺毛主人忮你殺主不饒殺殺殺殺錬飛鎗法其法打鎗亦同但放雄留雌放雌留雄取敵人首如探囊取物之易也行法人齋戒謹慎公心正直一有不戒不獨不靈反自傷身不可忽之至囑至囑太陽所管房日虚日鼠昴日雞星日馬太隂所管心月狐危月燕畢月烏張月鹿金星所屬亢金龍牛金牛婁金狗鬼金羊木星所屬角木蛟斗木獬奎木狼井木犴水星所屬箕水豹璧水㺄參水猿軫水蚓火星所屬尾火虎室火猪觜火猴翼火蛇土星所屬氐土貉女土蝠胃土雉栁土獐右凡交戰出軍金星執白旗向前四禽星火後止此五人出去交鋒一人當百人不敢當也其旗隨變色如大紅旗也二十八宿形像角木蛟蛟頭人身長一丈面色赤着紅錦袍緑弔敦嵌金青頭巾繫金帶烏油履跨長劍亢金龍龍頭人身長一丈面色青額上有雙角着青袍烏弔敦繫玉帶手執鐡棒氐土貉貉頭人身長八尺面黄色着蒼色嵌黄戰袍腰跨寳彫弓手執箭一根房日兎兎頭人身長六尺五寸面黄白淨色二目放光金色着大青錦文戰袍黄金比甲烏油金線戰靴手執三股叉心月狐狐頭人身長六尺五寸面粉紅色着花邊紅戰袍嵌金緑頭巾烏油靴跨紫金鞭尾