body:
  text: 武編前集卷六明唐順之撰車王應電車戰通令説曰凡戰卒不如騎畏其凌殘也騎不如車畏其衝突也此皆其勢然也古者百人為卒大車兵車各一乘車十五乘為偏九乘為小偏二十五乘為大偏二偏為卒卒亦曰廣五偏五伍將大車者二十五人炊家子十人樵汲五人固守衣裝五人兵車之上三人中為百夫長詩所謂中軍作好是也左持弓右持兵左傳左射以最周禮凡國之勇力之士能用五兵者屬于司右是也七十五人先後于兵車一為前拒一為右角一為左角戰則卒車相參居則以車為營故詩云君子所依小人所腓二千年未有易者戰騎出自戎狄所謂控弦引弓也管子載騎寇始服專指北狄唐太宗謂蕃兵惟徑馬奔衝則兼西北之勇中國用騎始自燕趙以其邊胡秦漢時乃專用步騎衛青言武剛車李陵言大車皆主自環為營曹操始為戰騎陷騎遊騎操且云車徒常教以正騎隊常教以竒武侯八陳騎在四角戰則居陳旁翼蓋亦教竒之意惟馬隆言地廣則以鹿角車營地狹則施木屋於車且戰且前衛公七軍騎分布各軍戰則居陳後為繼其十二辰陳一法騎居四角一法騎布各軍是後不復用車矣愚以謂後世之兵車步騎三者咸不可缺蓋茍失古人前拒左右角之制去步卒而專用車則馬易傷而車易仆正如烏珠拐子馬為武穆所破此房琯所以用車大敗也無卒而專用騎下馬則不能行此亦戎狄所短故步騎相兼乃中國之長技也無車而專用卒則為戎馬之所馳突此後世所以畏戎狄如虎也奈何車法一廢不復殆有其故蓋小車立乘人所不便一也駕乘勞重不如肩輿馬騎之輕捷二也車制久廢用失其道或以取敗遂為口實三也夫一車駕四馬一馬被傷全車遂頓此所謂用失其道也若如古者一車有前拒左角右角之七十五人為之先後出入以相應援人以車為依車以人為輔又何有車仆馬斃之患唯夫肩輿馬騎用之既久而立乘果非今人所便耳然天下事豈有古能之而今不能者哉世人亦每言之顧言之者不任其事任之者不知其術非有心計雄略之士安能為之無弊用之輒效乎莫要召諸色人巧思者推魏勝如意車之意而為之成造演習務輕捷便利上施利兵火器以長竿在後用人為御專用以馳敵衝陳誠勝敵之一竒止則與大車相參為營行則與大車共載兵甲戰則别為偏伍乘便驟發與步騎相表裏或事急不及成造即民小車上施木板以皮為障亦可備緩急之用庶乎人心有所依不懼敵馬之凌突也師律提綱亦曰車營乃中國之長技古人多以取勝李靖謂車戰一則治力一則前拒一則束部伍此車戰之長今當依放馬燧狻猊車而為之材小輪低比古制差輕止用二人曵行但容人馬行處車亦可行如遇山險溝塹不過四人肩輿而行且不妨戰士止處便可為營雜于槍盾間以弓弩設其神槍大銃賊至百步之外則用槍銃禦之百步以裏則用弓弩禦之皆擊鼓為節鎗銃弓弩一齊舉發當者無不立斃故行則可以為陳止則可以為營居則必不可犯動則敵不可遏此用車之制也北遣車俱是輪轉心不轉考索曰戰國以來乃用騎兵車猶有間見者漢鼂錯以輕車突騎為中國之長技衛青與胸奴戰以武剛車自環為營李陵對單于亦以大車為營此車之用於西都者也後漢光武造戰車可駕數牛上作數櫓置於塞上以拒胸奴靈帝之時楊璇為零陵守制車數十乘以禦賊此車之用于東都者也曹操新書攻車七十五人守車一隊共二十五人田豫與敵戰亦用車而戰晉馬隆征羌八陳圖用扁廂車地廣則鹿角車營路狹則為木屋施于車上此車之用于魏晉者也劉裕伐南燕亦以車四千乘為左右翼朱超石戰河上以車百乘抱河為却月營魏大武北伐蠕蠕用車十五萬兩隋諸將與突厥戰皆戎車步騎相參與鹿角為方陳此車之用於南北朝者也唐李靖與太宗論兵法曰跳蕩騎兵也戰鋒隊步騎相半也駐隊兼車乘而出也臣討突厥越險數千里此制未嘗敢易則唐固嘗用車矣唐裴行儉突厥阿史德溫傳反行儉詐為糧車三百乘伏壯士五輩賊果掠車車中士突出殺獲幾盡初李光弼在太原乃徹民屋為􅪡車二百人挽之矢石所及輒數十人死賊傷十二初馬燧為戰車行則以載止則為陳討田悅燧乃推大車焚悅將陽朝先柵破之宋咸平四年吳淑請復古車戰之法夫胸奴所長者騎兵茍非連車以制之則何以禦其奔突哉故用車戰為便其制取常用車接其衡扼駕以牛車上置槍以為外向列士卒于車外賊至射之賊退乃出竒兵擊之此制敵要術也戰之用車一陳之甲鎧也故可以行止為營陳賊至則斂兵附車以拒之賊退則乘勝出兵以擊之出則藉此為所歸之地入則以此為所居之宅故人心有依不懼敵騎之陵突也至和二年韓琦言郭固造戰車約古制為之臨陳禦敵緩急易集其車前鋭後方上置七槍為前後二拒此馬燧戰車行載兵甲止為營陳也又以民車之箱增為重廂髙四尺四寸革挽之吳起所謂革車掩户挽輪籠轂是也琦以為可用于平川之地臨陳以折奔衝下營以為寨腳令固自齎車式進呈試之以固為衛尉寺丞魏勝嘗自創如意戰車數百兩炮車數十兩車上為獸面木牌大槍數十垂氊幕軟牌每車用二人推轂可蔽五十人行則載輜重器甲止則為營挂搭如城壘人馬不能近遇敵又可以禦箭簇列陳則如意車在外以旗蔽障弓車當陳門其上置牀子弩矢大如鑿一矢能射數十人發三矢可數百步炮車在陳中施火石炮亦二百步兩陳相近則陳間發弩箭炮近陳門則刀斧槍手突出交陳則出竒兵兩嚮掩擊得捕則拔陳追襲少却則入陳間稍憩士卒不疲進退俱利伺便出擊慮有拒遏預為解脫計夜習不使人見以其製上于朝詔諸軍遵其式造焉李綱嘗以謂步不勝騎騎不勝車金人以鐵騎奔衝非車不能制之有張行中者獻戰車制度兩竿雙輪皮籬搭運轉徑捷每車用甲士二十五人執弓弩搶牌之屬以輔翼之結陳以行鐵騎遇之皆退遁造千餘兩日肄習之總制劉天和奏曰一蓋古兵家者流卒不能勝騎騎不能勝車歷考前代名將如漢衛青之破胸奴出塞數千里史稱其值單于急以武剛車自環為營唐李靖之禽突厥自謂越險數千里未嘗敢易車騎相兼之制晉馬隆作扁箱車以三千五百人轉戰千餘里破樹機能數萬之衆卒平涼州其餘以車戰勝敵者不可勝數而漢且置輕車將軍之官况臣今用車非深入廣沙絶漠數千里之地亦惟用之延寧邊花馬池一帶套敵頻年大舉深入要害之地靖蘭等處臨河渡口敵常踏氷入冦之地及他處敵常出沒有險可據之地爾及訪寧夏先年總兵官仇鉞曽用屯田車以解寧化寨之圍近年總兵官王效曽用拽柴空車以遏興武營套敵之入固歷有成效矣然非臣創為也查今各邊亦有國初以來歷年所造戰火兵車其制度多寡不一甘肅見存一千一百五十九輛寧夏見存千輛固原亦有一百二十八輛其餘邊堡亦多收有兵車但皆雙輪大車每輛二十餘人挽之其行甚遲少遇溝澗險阻即不能越以是不適于用惟𢎞治年間前任總制尚書秦紘後次假造隻輪小車嘗以樣車上請孝宗皇帝加奬命紘取名全勝車今幸存破損數輛略備規制臣因再加損益其制輪髙三尺一寸輪轅長四尺七寸二分下施四足前二足釘以圓鐵軸行則懸之左右箱各廣九寸五分於上安熟鐵佛郎機八及流星炮炮或一窩蜂炮一上馬架用安銅鐵神鎗一及近年所造三眼品字鐵銃一飛火搶筒一箱之四角插倒馬長鎗開山巨斧各二斬馬刀鐵鈎各一併火藥鉛子掀钁鹿角等器通不過重一百五十餘斤箱前樹獸面牌繪以狻猊之象及旁各挂虎頭挨牌戰則張之以蔽矢兩車相連可蔽三四十人每車二人推之挽之二人翼之戰則隨地形環布為陳軍馬居中敵遠則施火器稍近則施強弩弓矢逼近則用鎗斧鈎刀短兵出戰敵敗則馬軍出追遇夜則用火箭敵騎圍繞則火器弓弩四面各發勢如火城敵不敢逼進退所向無前敵不敢遮其火器安于車上點放安穩不搖審定其苖頭髙下一以髙五六尺為凖所中非人即馬較之手中點放戰搖百不一中者大不侔矣蓋馬步兼用長技並使戰守皆宜誠可萬全取勝止則環列為營傍施鹿角連以鐵繩臣復制為隨車小帳以免軍士露宿用存恤愛是雖不能追奔逐北星馳霆擊然擺列邊墻以遏敵入據厄險要以邀敵歸占據水頭以拒敵馬誠可化弱為強以寡敵衆修邊耕獲俱可用以防衛而車製輕便前遇險阻陷沙可以扛擡以過久之精熟雖直衝敵陳徑攻敵營較挑壕以樁釘地以繩繫樁自保不暇者誠萬萬不侔矣臣謬謂輕車為中國長技此也且每輛止費銀二兩餘每車千輛僅當馬軍人千名一月之費耳如意車此衝堅陳破硬敵用之一名威敵車用好木作底前後四輪前二輪各製轉軸如轆轤樣後二輪相連如水車樣髙三尺五寸長四尺闊三尺內可容二人上窄如人形後留一門以便出入周圍用生牛皮張裹四面皆留箭眼槍眼以放火藥箭等具中作一轉軸自下至頂上繫絲繩四條繩尾各縣一鐵錘斧頭等具內裏轉動并起人馬觸者必死身神箭神砂三面飛出仍雲霧五色豪光繞其身彼視之如神或三五輛或十數輛夾攻敵中砂箭者十無一生者馬中砂箭者必自跳躍其營必亂欲近不能我大軍乘亂擊之仍令三軍大呼神助我也回則倒轉其輪敵亦不敢追孫子曰兵者詭道也破敵雙輪屏風車髙六尺闕分中有橫梁如瓦形梁上有三道鐵篐一活落好旋風皮輪一徑過五尺車闊二尺長三尺有欄干扶手第二外頭有鈎搭挨牌車廂如匣品字樣上口徑弩下兩口神鎗壯士披掩襟每人鵝眉刀二把此䇿應唀車之兵也水路龜陸路鱉機巧法妙神鬼不測龜不龜鱉伅鱉尺寸方圓腹裏各别進退風雷破敵倒穴神弩暗藏火器不絶八面成風藤軍電掣龜頭進鱉頭退左右面顧能倒對忽然口內火光飛獨腳連珠人膽碎渾身抖搜八門開萬隊貔貅流血淚腹內三關風火藏膜外九宫安藏雜類鱉似鱉頭搖尾動神仙訣裙邊拖地善遮攔四爪風雲如電掣背如弓橫梁直柱妙無窮頭上將牛皮裹渾身毛孔梨花朵住時控穴繞裙邊二尺五深三尺闊底板玲瓏圓又方活輪一尺堅如鐵裙邊遮天八門風釣搭推開朝天闕背上先年左右旋日看夜守何曽歇戰車有許多造法只是造出來要輕便先要遮護的本營人馬不驚動士卒安心向前破敵這等的戰車進退分合左右遮護前後接應或分騎步于兩哨或藏騎步于中軍看賊遠近多寡或賊四散或浪戰驚或隊伍周全或輕騎先來哨探或鼓譟衆賊齊奔或偷營舉火或劫寨奪門或餌兵詭計或隂雨動兵或天昏地黑或霧結雲生所以將者軍之司命未動先定地形平日操練經熟臨敵不必叮嚀此係大將嚴肅各路人馬分明如重而不可輕敵如寡而不可重兵分毫不可差錯賞罰軍律難容臨敵觀其動靜哨探暗合無形輕便戰車皮輪管心旋風護軍車此車破敵安營日夜風雨灰砂矢石發中可行前有引戰唀車擺列認旗後帶四子夾攻輪流火器不斷此火器不用人力其間暗藏古怪大風雷雨隨意攻守各子戰車不同長子神鎗雙翅車二子黑牛金眼銀星百點車三子伏虎連環車四子獅子滾毬車其間戰敵擺列器具逺近各樣旗號不同此名連環車或七或九相連內藏戰士施火器藥弩専禦北敵馬衝如去環則散行可以載資重可以結堅營兩旁堅板厚五寸髙三尺長九尺闊四尺上架木柱可以閉矢石如中加一輪可以行狹路拒獠貓四輪在外一進一出輪大三尺厚二寸管心俱用鐵裹兩頭用鐵篐扣拑定其篐如饅頭樣此車用獨木為之其輪如千斤車輪大一出一進上加直柱橫梁厚板遮上皮笆遮外身長七丈或九丈共十四輪戰士隱皮笆內上下兩層施諸般火器弓弩神鎗車心用檀木為之身方兩頭圓徑二寸用鐵饅頭篐扣扣定活輪可以攻城可以渡河可以跨濠塹可以破陷坑如用破北敵騎陳妙不能述每一乘約價三十兩名曰百足火龍車此車名獨戰千里車用厚板二片為伏柁長一丈二尺髙五尺上架四梁直柱任意加皮牌四靣遮護隱戰士在內施諸般兵器四輪在外二輪在內輪髙二尺厚三寸身闊五尺可以衝陳深入燒營陸破倭奴埋伏鳥嘴銃并備獠貓藥弩又可遏敵騎塞歸路又可載資重使戰士常逸如大將坐此巡營疾如馬可防姦細每輛約價十二兩輪向前二輪在後易于轉動此可當挨牌乃車之最輕捷者此名􅀢字車用厚板作胎鐵裹尖頭上架皮牌或皮傘可避鳥嘴銃并佛郎機輕便可使功勝木城每輛約價三四兩可以遮護十餘人今日南北皆可用混江龍乃大炮中一藥炮名炮內安火藥火藥上安小鐵彈子上安混江龍混江龍上安大鉛子此四物俱在炮筒中炮筒底開二藥孔如銅炮則以熟銅為卷筒如鐵炮則以熟鐵為卷筒裝藥線藥插入炮筒內筒首開橫孔孔中為機關不用則鎖定雨不能濕鑄炮以銅為最生鐵次之銅者可久鐵者不可久其説如此炮筒長六尺厚三寸口闊八寸底狹十分之一若生鐵鑄其筒加厚一寸計厚四寸唐玄宗時哥舒翰節度隴右造戰車蒙以狻猊則唐又嘗用車矣至于房琯之敗遂以為用車不若用人與騎之愈抑不知古者以馬而琯以牛車二千乘馬步夾之非其素習則敗之固宜此非車之不利而用之者非其道也宋至和中韓琦言郭固造戰車約以古制其車前鋭後方上置七鎗以為前後二拒行載兵甲止為營陳春秋如韓原之戰輅秦伯將止之鞍之戰韓厥中御而從齊侯鄢陵之戰郤至遇楚子韓厥從鄭伯邲之戰楚子乘廣以逐趙􅏧用車以戰而使敵人便得與吾元帥相接則是環衛之車設也蓋古者車戰之法前後齊整必有護衛前後行列元帥未易動搖也至春秋中列國用之往往軍伍不整而元帥每以車逐利混然左右率無定法故敵人得及之終春秋之世致毁者未有不由車戰之無法而輕動搖也惟繻葛之戰二拒用事若原繁髙渠彌以中軍奉公未嘗輕動搖深得古法募人入賊開脫被敵先驅及附從商販人民收拾逋盜許互市其車之式用兩木圍九寸長九尺者為轅轅之首斜彎而起中以受軸為獨輪其輪徑二尺有五寸以板為之而不設輻中為死轂又於施輪處前後五六寸許兩轅上各加一橫木前二後三又於後橫木近輪處斫為二孔用二小彎木條置其孔中引而屈之如弓狀繩縛其端於前橫木上有所載則以繩繫于其上又于輪之後兩轅下用木為足與軸等其後橫木上施軟蓐以為坐席席之下兩足間施竹􅀢以盛食器軍中刁斗用畢亦載其中其轅首交合處其髙凖馬胸用人手執之為凖鑄鐵為利器如耕犁樣冒于交轅之首臨戰用以當敵之馬胸去轅首尺許又橫施一鐵條長尺三四寸許上列齒以架刀鎗兩轅之旁其前後各為鐵環四左右各二前繫鐵鎖後繫鐵鉤聨車為營之際前轅相去稍遠則用鎖繫之于環後轅緊相挨傍則以鐵鉤搭其鐶彼此相維以為固又於後鐶之次左右各加以一大鐶駐車時用刀或鎗貫環中而立馬彼兩軍交鋒之際則列於前以拒馬以代鹿角敵來衝突一夫推之而前四卒各執刀鎗以夾持之趨前以當其馬胸又用木或革為摺疊牌立于車上以蔽推車者大抵其車不用雕飾其不可施斧斫處只用麻繩縛扎每車上各具刀斧斫各一及板木繩釘之類以備急用水磨農書曰水磨凡欲置此磨必當選擇用水地所先儘並岸劈水激轉或别引溝渠掘地棧水棧上置磨以軸轉磨中下徹棧底就作卧輪以水激之磨隨輪轉比之陸磨功力數倍此卧輪磨也又有引水置閘甃為峻槽槽上兩旁植木架以承水激輪軸軸要别作豎輪用擊在上卧輪一磨其軸末一輪傍撥周圍木齒一磨既引水注槽激動水輪則上傍二磨隨輪俱轉此水機巧異又勝獨磨此立輪連二磨也復有兩船相傍上立四楹以茅竹為屋各置一磨用繩纜于水急中流船頭仍斜插板木湊水拋以鐵爪使不橫斜水激立輪其輪軸通長旁撥二磨或遇泛漲則遷之近岸可許移借比之他所又為活法磨庶興利者度而用之水轉連磨其制與陸轉連磨不同此磨須用急流大水以湊水輪其輪髙闊輪軸圍至合抱長則隨宜中列三輪各打大磨一槃磨之周匝俱列木齒磨在軸上閣以板木磨傍留一狹空透出輪輻以打上磨木齒此磨既轉其齒復傍打帶齒二磨則三輪之功互撥九磨其軸首一輪既上打磨齒復下打碓軸可兼數碓或遇天旱旋于大輪一周列置水筒晝夜溉田數頃此一水輪可供數事其利甚博嘗至江西等處見此制度俱係茶磨所兼碓具用搗茶葉然後上磨若他處地分間有溪港大水做此輪磨或作碓輾日得穀食可給千家誠濟世之奇術也馬孫臏曰用兵有十利一曰迎敵始至二曰乘敵虛背三曰追散擊亂四曰迎敵擊後使敵奔走五曰遮其糧食絶其軍道六曰散其肆關發其橋梁七曰掩其不備擊其未整八曰攻其懈怠出其不意九曰燒其積聚虛其市里十曰掠其田野係纍其子弟此十者騎戰之利也能聚能離能合能散能集百里為期合之兵也武經曰出戰之時登陟陂坡過渡溝澗所載人馬衣甲器械乾糧食用約重二百餘斤卒遇戰鬭使之馳驟盤回賊兵未退經日不下若不知其飢飽勞逸必取死損但依時餵飼水草飢飽得所不可過度即百病不生又馬亦有大小行步疾遲筋力強弱出戰之時量力施用則人不勞馬不損若使人強馬弱馬弱人強人欲進而馬不前馬欲進而人怯懼如此者雖有百萬人衆如病犬逐兔盲鷹逐雀縱有孫吳韓白之能不得取其勝矣一有善走坡驀澗者名曰跳蕩馬聚為一等可衝突敵陳追逐賊寇探報人馬遊奕捉生用之一有精神惺惺又善馳驟者名曰哨腳馬聚為一等可充奇兵隊陳翼衛主將應急使用一有見羣馬動而不嘶鳴馴良者為一等敵營相近可夜去營寨伏截賊冦偷路亂營用也一有壯健生性遲鈍不能逺步者為一等可作使駐隊遮掩步兵使弓弩相射賊衆一馬軍擇疾速健壯力齊者配成羣隊免有前後不及者其惡類不可制馭者不給戰士乘騎恐致奔越為害則可揀為别羣以備衝突之用諸營各令作異旗放馬每隊作認旗放驢其馬居中央放驢令四面援馬狂賊偷馬例須奔走驢羣在外驅趂稍難以此防間亦甚穩便營别即令别放諸軍不得相交非直發引之時不難忽有不虞追喚亦易諸行軍立營驢馬各于所營地界放牧如營側草惡便擇好處放與虞侯計會不許交雜各執本營認旗如須追喚見旗即知驢馬處所諸軍驢馬牧放不得運繫每軍營令定一官專檢校逐水草合羣放牧仍定一虞侯果毅專巡諸營水草各令方界牧放不許參雜非圍獵不得乘官馬遊獵諸應乘官馬事非警急不得輒奔走致馬汗及打脊破一馬雖平安亦可每日騎習使之慣熟諳會金鼓旗色進止回軍轉陳遇敵之法若遇緩急不誤驅使一將戰預於一月之內不住令人披帶全副衣器械習逐務要演其筋力慣熟馬有斃古法合令窖埋今多開剝筋肉食用如軍中剝割死馬喫用之時毋令生馬見之轉生疾病雖是畜類亦與人性不殊不可不慎昔苻堅兵敗墜澗其馬垂韁跪授堅得免難臨陳出戰馬才出且緩行看敵近遠臨時趨驟不致枉損也馬飽之時如平安行路未可上馬牽行二三里方可騎之如餵飽牽下多時即不拘也常令士卒自行斟酌馬隊行路出戰不拘緊慢前後各離一馬稀稠放令自在見路而行回軍轉陳不致衝撞如險路逢賊亦易為回護馬盛走驟之時欲住者看遠近緩緩收勒不可陡然緊收常自約度免致喘損也黑韃遺事曰其馬野牧無芻粟六月饜青草始肥牡者四齒則扇故闊壯而有力柔順而無性能風寒而久嵗月不扇則反是且易嘶駭不可設伏蹄鍥薄而怯石者葉以鐵或以板謂之腳澀凡馳驟勿飽凡解鞍必索之而仰其首待其氣調息平四蹄冷冰然後從其水草牧者謂之兀剌赤回回居其三漢人居其一也嘗考韃人養馬之法自春初罷兵後凡出戰好馬并恣其水草不令騎動直至西風將生則取而空之縶于帳房左右啖以些少水草經月膘落而實騎之數百里自然無汗故可以耐遠而出戰尋常正行路并不許其喫水草蓋辛苦中喫水草不成膘而生病此養馬之良法南人反是所以馬多病也其牡馬留十分壯好者作移剌馬種外餘者都扇了所以無不強壯也移剌者公馬也不留扇專管騍馬羣不入扇馬隊扇馬騍馬各自為羣隊也凡馬多是四五百匹為羣隊只兩兀剌赤管手執雞心鐵撾以當鞭箠馬望之而畏每遇早晚兀剌赤各領其所管之馬環立于主人帳房前少頃各散去每飲馬時其井窟止可飲四五馬各以資次先後于于自來飲足而去次者復至若有越次者兀剌赤遠揮鐵撾俯首住足無或敢亂最為整齊其騍馬羣每移剌馬一匹管騍五十匹騍馬出羣移剌馬必咬踢之使歸或他羣移剌馬踰越而來此羣移剌馬必咬踢之使去摯而有别尤為可觀冀越集曰余留上都開平路冀州之域馬最蕃育月有騳有􅀈騳則左前足與右後足相應故其後足過于前足所以遲疾􅀈則左前足與右後足同起右前足與右後足相應故彼中以繩繫前後二足教其駒􅀈學􅀈也又嘗至廣西此其地接雲南八畨冬有雪有氊衫有車輛産大馬能上下山谷亦人教之繫馬母山巔繫其駒于山下飢則嘶鳴放之登山又捨其駒于髙峻之所留馬母于其下飢則放駒下山如此一二年則蹄腳牢硬履險如夷其馬性急喜掉尾壞人衣服用針刀斷其尾筋者皆良馬程大昌曰市馬于北蕃古記無載然已有其事鹽鐵論曰齊陶之縑南漢之布中國以一端縵得胸奴纍金之物驢騾駱駝可使銜尾入塞則漢世已嘗出縑帛買馬塞外矣顧其時彼未知中國縑帛真價故得出一縑一布而得纍金之物至唐世則病其酬帛之多矣事林相馬經曰二十二相眼為先次觀頭面要方圓眼似垂鈴紫色鮮滿眶凸出不驚然白縷貫瞳行五百斑如撒豆不同看面顱側擊如鎌背鼻如金盞可藏拳口乂須深牙齒遠舌如重劒色如連口無黑靨須長命唇似垂箱蓋一般食槽寬闊腮無肉咽要平弓筋有攔耳如楊葉刀批竹燕骨髙弓髀不堅入肉八弓彎左右龍會髙弓上古傳項長如鳳須彎曲鬃毛茸細腰如綿鬐長膊闊搶風小臆髙胸闊腳前寬膝要髙弓員似掏骨細筋粗節要攢蹄要圓實須卓立身平充闡要平寬筋骨節彎須緊密排鞍肉厚穩金鞍二峰壓二如藏骨卧如猿落立如山鵝鼻曲直如停穩尾似流星散不連膏筋大小須勻壯下節攢筋緊一錢羊髭有距如雞距能奔急走日行千以前貴相三十二萬中難選一俱全眼如垂鈴腦骨欲員垂睛欲髙耳如削筒頰骨欲員項長彎細鬃欲茸鬐欲髙排鞍欲厚脊梁欲平腰要短促硯骨欲平肋扇骨密後看須蹲狗接脊骨短眼光有肉面如削兔鼻要寬大上唇欲方口文欲深下唇欲損槽欲寬項欲筀鳴腤欲平胸欲闊鎧肉欲厚膝欲員腳欲直蹄欲員脛脡骨細腳大而實掌骨欲髙肚下生逆毛節欲近筋骨欲旋後蹄欲大欲近鹿節欲曲曲池欲深腹平尾欲端汗溝欲深尾骨欲短外腎欲小腿似琵琶尾欲苴細後腳欲細宋熙寧六年初馬軍用大鞍不便野戰至是始用邊樣皮鞔小鞍用木鞍長韁回旋轉射得盡馳驟之技北征録曰馬鞍橋制有數等一曰太師橋二曰錯結裹三曰海湖橋四曰西橋近日三司諸軍皆用太師錯結裹海湖三樣池陽江鄂京南襄陽多用海湖一樣海湖之制前後橋低貼馬肉其摘䈋低壓馬脊師出日久馬膘瘦減受重則鞍頰打破馬脊膿血潰爛不堪乘騎以至死傷前嵗泗上符離唐鄧之役皆坐此患海湖橋病也錯結裹後橋雖髙而前橋亦低故傷馬前脊太師橋前橋雖髙而後橋亦低故傷馬後脊惟西橋一樣前後橋比他橋皆髙數寸搭袋常繫後橋之下雖上載甲軍下稍搭袋鞍頰亦不著肉鞍橋亦不砑脊甚為利便關西人多用故曰西橋然諸軍鞍座盡用粉皮欲使騎坐者不被隱閣不知粉水也遇雨浸內透坐馬者衣袴皆濕大為利害不若用黃油皮鞔之及鞍橋雖用髙空下用連替摘䈋免有轉側緣涼替與鞍相離上馬攀橋則鞍與替不相粘著多致攀轉鞍橋墜下馬腹臨急誤人性命是謂鞍制韃靼其鞍轡輕簡以便馳騁重不盈七八斤鞍之鴈翅前豎而後平故折旋而膊不傷鐙圓故足中立而不偏底闊故靴易入綴鐙之革手揉而不硝灌以羊脂故不受雨而不斷爛闊不踰一寸長不逮四總故立馬轉身甚順北征録曰馬軍騎馬則吊腿欹斜而兩足可憂下馬則筌刺暗投而鞋履可破靴之功大矣然近日馬軍類多脫去馬靴或怠于附帶而棄之郊野或寧使赤露而束之鞍鐙殊不可曉及考其所自蓋今日諸軍之靴皆用牯牛皮製造故皮性太硬未著則不能穿足入腳襪凹太深既著則不能擡足起步牽馬下程則夾破腳砑而久成瘡瘍落馬墜地則柱定膝胯而不能起立不惟肌肉不保且反傷于磨擦其視金人所製之靴萬萬不同今後宜令襪用軟皮而上則繫以皮帶鞋用硬皮而下抹以漆蠟其制與今人軟凹泥靴相類而不用釘距是謂靴制井田之法非獨為均田制祿而已蓋所以隂寓設險守國之意故中原平衍設立許多溝澮許多阡陌使車不得方其軌騎不得騁其足故也豈非寓至險于大順之中者乎觀晉郤克欲使齊人盡東其畝以便戎車吳玠在蜀於天水軍作地網以阻金兵之騎於此可以驗之也北征録曰陷騎之法不止一端大率不過敵騎衆多不容鬭敵伺其所行之道制為陷騎之具勿令賊知然後示之以弱以誘其必來啖之以利以致其必至使其墮我之圈圚而不自知入我之陷穽而不可脫其法有六一曰伏鎗用火煉竹鎗斜埋成列却于鎗頭所到處掘地成窟長一尺五寸闊半之用竹一尺八寸埋在內次以竹圈挽鎗著地覆以草茨不令知見復用挽鎗竹圈從窟內繫提頭索别曵于鎗頭所止處一丈許遇賊馬踢動提頭索拽去挽鎗竹圈則鎗頭向敵起地三尺賊馬無不中傷二曰絆索用麻索各長五丈以下兩頭及中間各長一丈用木樁繫索釘之于地用青竹竿五條撑索腰控低著地扣以機結木鈎如獵具制遇馬足觸動機結則撑索竹去地三尺賊馬無不被絆三曰馬拖謂用竹削成筯大其長數倍于筯其錐甚鋭用以簮地其尾則用熱湯煮過令捶碎和麻各以成索索尾又安扣頭扣轉于竹片之上仍將鎗捍拽索于竹片之首遇馬被套而走則索尾之鎗自卓其腿腹四曰馬筒用掘地成穽深一尺闊三寸內置攢錐遇馬足被陷則攢錐自刺其蹄踵五曰青穽謂于麻麥草芥之地掘而成穽不拘廣狹上以蘆席箬盤竹席之屬覆之而掩以麻麥草芥隨其物之類色使敵馬不覺足陷六曰白穽謂於塵沙土石之地掘而成穽不拘廣狹上以蘆席竹􅀈之屬覆之而掩以塵石沙土隨其地之顏色使敵馬不覺足陷以上六法皆于道路預先修設以待其來然器用之設非瞬息可成制作之艱非頃刻可辦乃若倉卒相逢不期而遇前不得以膺其鋒後不得以避其鋭當是之時不費寸土尺木而賊馬自抵于損傷不勞匹馬隻輪而賊騎自至于顛覆其法亦六一曰刺毬四方有鋒中間有蒂以鐵為之二曰蒺藜礪之以鋒淬之以毒以鐵為之三曰茅針其形如針而稍大以鐵為之四曰鵝項其形兩曲而上下皆鋭以鐵為之五曰菱角以鐵為菱角六曰皂角以鐵為皂角以上六法皆預先打造遇欲用則令筌捶撒擲在地然平原曠野我知而敵不知乃可施巧道狹路隘敵險而我亦險將何以為兩難見巧之策莫若因地設險使敵騎之來可入而不可出吾軍之利可見而不可奪其法有八一曰踢圈以竹為圈插于馬道以索續于竹圈之上用套馬足二曰截徑用竹弩一張竹簷七片菠菱箭一隻以馬尾頭髮之屬曵之馬道馬頭觸之則箭發馬倒三曰伐木馬行于林樾之中令伐木橫道則馬不可過仍止令半折不得伐斷恐為敵人下馬拖拽離路四曰結草謂馬行于草野之中其正路故令斷絶磚石堆塞柴茨却于四圍用草結團其稍令闌絆過路馬急走則被絆衆隊皆倒五曰種冰謂道路險峻或髙坡峻岸或斜城陡岡當令迎風灌水凍結成冰則滑溜不可過六曰裂石謂馬道窄狹兩傍皆土水當令抄掘塞路七曰斷橋謂馬經過橋梁必毁折令不得渡八曰琅琊版謂用版釘琅琊釘于上行則載于糧車之上用則埋于沙礫之地以上八法皆能陷賊騎于道峽險要且扼賊于險此固可用賊知險而不入將安用之在我則有誘騎之術使賊馬見此踴躍而前奔騰而至自抵死亡自投陷穽而不容止遏其法有四一曰芻誘謂敵馬行遠久闕草芻故下置陷穽鎗刺而上覆芻秣使馬見之自投死地二曰餌誘謂賊馬飢餓日久故下置陷穽鎗刺而上覆菽粟豆料使馬見之自投死地三曰獻青謂賊馬入境久不牧放有草茨青蒼之地設陷穽鎗刺使賊馬望見草色而不顧險陷四曰獻白謂賊馬入境不汲飲即于陂池溪澗之地設陷穽錐刺使賊馬望見水色而不顧險陷以上四法皆令賊馬自赴水火前凡二十四法皆陷騎緊要其他如水藥之祕風沙之變雖曰奧妙然微似浮誕姑置勿論牛相牛經曰須頭小腦大頭長身短角方眼圓脊高而臀低僉毛不分立齊足乃可為耕力頭欲瘦小不用多肉面欲得長短則命促經云面髙正長有齒無旋面若兩分益主損身眼欲得大去角要近有白脈貫瞳吉眼赤者觸人眼下有旋毛名淚滴主喪服鼻欲軟而大易牽鼻七毛逆凶經云鼻如鎊鼻難牽無力口欲方大易餵能食齒欲白若齦有緣招官災經曰齒牙雪白多招田宅角短方大紋浪角形如仰弓吉向前吉向後凶兩角間有亂毛起名頭陀妨主經云角圓紋細使即遲滯耳去角要近略可容指方好多長毛不耐耳後有旋毛名刺環招盜賊經云耳角近促不用營祿耳去角遠千里不轉頸骨欲得長大肩膂欲得窊若窊則為雙肩主有力若窊者為單肩少力毛短密硬而黑者奈寒踈長如鼠毛者怕寒毛赤堅自害損主倚毛向前吉向後凶肚下有搒毛使即倒行前腳欲直而闊後腳若曲而開股瘦小則捷快經云前腳如筒後腳如弓蹄欲得大青黑紫為鐵吉經云蹄色黃白行不滿百隂虹屬頸者千里牛也前帶抱喉及臨耳者早死經云前後無帶至老無害後帶半長法主橫傷乳紅多子吉乳踈黑無子生袋深隱乃吉橯出者凶尿射前胯者快直下者鈍屎欲蹲放經云屎如螺旋用力如雷聲身欲得圓齒欲得密脊欲得斂臀欲厚重尸骨粗少毛者有力尾稍長大吉舟吳楚楊越之間俗習水戰故吳人以舟楫為輿馬以江海為平地是其所長春秋時吳以舟師伐楚又越軍吳軍舟戰于江伍子胥對闔閭以船軍之教比陸軍之法大翼者當陸軍之車小翼當輕車突冒者當衝車樓船者當行樓車船者當輕足驃騎大翼以下皆船名公輸般自魯之楚為舟戰之具謂之鈎拒退則鈎之進則拒之漢武伐南越於昆明開池習水戰製樓船上建櫓樓戈矛船下置戈戟以禦蛟鼉水怪之害然櫓船戰艦形制之盛不若輕疾之利故張兵威畜器械以樓船大艦為先趨便利立功效則走舸海鶻為其用或伏襲而入敵境則遊艇蒙衝凡舟皆可用也李龜年楊么本末曰車船者置人于前後踏車進退皆可其船皆兩重載千餘人又設拍扞其制如大桅長十餘丈上置巨石下作轆轤繩貫其顚遇官軍船近即倒拍扞擊碎之其名曰渾江龍者即為龍首每水鬭楊么多自乘此海鰍者鰍頭船也蓋車船如陸載之陳兵海鰍船如陸載之輕兵而官軍船不能近每戰輒敗江東來是月詔鼎澧鎮撫使程昌寓與荆南潛分遣兵討之既而昌奏殺賊至闕亦用畨機如虎尾炮闕水戰之具其船闊狹長短隨用大小勝人多少皆以米為率一人重米二石其楫棹稿櫓帆席絙索沉石調度與常船不殊樓船船上建樓三重列女墻戰格樹幡幟開弩窗矛穴置拋車壘石鐵汁狀如城壘王濬伐吳作大船長二百四十步建飛簷閣道各以奔車馳馬忽遇暴風人力不能制此亦非便于事然為水軍不可不設以張形勢鬭艦船舷上設女牆可蔽身高三尺牆下開掣橶孔舷內五尺又建棚與女牆齊棚上又建女牆重列戰格上無覆背前後左右樹牙旗幡幟金鼓此戰船也海鶻頭低尾高前小後大如鶻之狀舷左右置浮版形如鶻翅冀以助其船雖風濤漲天免有傾側覆背上左右張生牛皮為城牙旗金鼓如常法江海之中戰船也走舸舷上列女牆置橶夫多戰卒少皆選勇力精鋭者往返如飛鷗乘人之不及金鼓旗幟列之于上此戰船也蒙衝以生牛皮覆背兩廂開掣橶孔前後左右有弩窗矛穴敵不能近矢石不能敗此不用大船務于速進速退乘人之不及非戰船也遊艇無女牆舷上置槳牀左右隨艇大小長短四尺一牀計會進止回軍轉陳其疾如風虞侯居之非戰船也金山守禦書曰東南諸海島日本占城琉球為近吕送百花山白葛達阿哇打回等夷遠莫可數其蕃舶出沒皆為海患金山地薄東溟南瀕大洋少西為浙江北為淮揚諸郡負在背膂松江蘇州嘉興尤近心腹蓋浙淮喉襟處也國朝既設衛屯戍尋命淮揚等處備倭總帥復于此駐節據守得地而兵防整嚴屹為東北一雄障矣嵗凡仲春東南風始迅蕃舶至是時皆北行四五月間風尤迅者海人呼為舶卓風凡舶遇此風日行數百里雖猛不為害也沿海六所初奉例設巡哨海船每所一十艘每艘旗軍一百名春夏出哨秋回每軍月支行糧四斗船有虧折有司補造損者軍自修理正統七年盛總督琦奏易以馬立騎卒入操春夏走哨遇有警急往來海上馳報每船一艘以易馬二匹給騎餘丁二人廄牧衛四所八十匹中前中後各四十匹倒死者所均價買補海防水塞之廢自此金山距衛一十八里山多竹蔚成荗林上有平坡可二十人坐北有寒穴泉總督嵗回遣兵巡邏名曰搜山沿海墩臺軍士各擇一人諳熟海洋聲息者充小甲率四人晝夜更畨瞭望見有倭船即舉放一炮一烽船到舉放二炮二烽登岸舉放三炮三烽接遞通報每墩臺豎旗竿一晝以縣旗夜以縣燈架信炮烽把各三銅鑼鐵鈴木柝各一鐵盔腰刀鐵乂雨簑草履各五飯鍋火石火鎌煤各全鳴雞吠犬一俞大猷曰夫倭奴之所以悍而難禦者非真有過人之能也兵法謂深入則專不得已則鬭乃見倭奴之悍而我兵所長足以刺彼者惟樓船高大足以壓之火藥足以焚之然大挫之功尚未能收者何哉蓋我之樓船每港不過數隻通浙直而計之不滿百隻其兵不過數千人而已耳今嵗賊船結連而至者凡幾䑸每䑸凡有一二百隻其黨共五六萬人多寡之勢相縣若是又安望其能收大挫之功乎請于堪兵船地方如江北設樓船三十隻於儀鎮瓜州江南設樓船三十隻於鎮江孟河江北之狼山江南之江隂福山及江中之塘沙馬沙禇家沙共設樓船九十隻南風俱泊於各沙之北北風俱泊于各沙之南又江北之海門通州吕四江家場七星港一帶共用樓船八十隻江南之劉家河吳淞江江之中崇明新舊二縣沙兵用樓船一百五十隻寧波府之定海舟山大嵩爵溪昌國等港共用樓船八十隻台州府之健跳海門淞門等共用樓船五十隻溫州府之黃華盤石端安三揚等港共用樓船六十隻又內江每樓船十隻間以邊江船五隻外江每樓船十隻間以蒼山沙船共五隻寧台溫每樓船十隻間以蒼山八槳船共五隻各為小哨共泊原派港分無事則在港防守有警則合勢攻捕并不許遠離遠巡哨故名曰正兵請於今年十月間照依原估樓船尺數除一號者大而難駕不用外只造二號三號各一半請限年終各到地方以應來年正月之用乃可及事如正二月不到則有噬臍無及之悔矣然船在江海波濤之上數年之間或遇怪風之變不免又費修造之功則當付諸適然之值不可因咽而廢食多設遊兵夫倭賊自彼島入寇遇正東風必由茶山入江以犯直𨽻則江內正兵之船可以禦之遇東北風必由下八山陳前里西倒球干邪清水馬迹蒲渙丁興長塗衢山羊山普陀馬墓等澳經過然後北犯南直𨽻西南犯浙江請於浙直共設二百隻蒼船一百隻分伏于前海澳往來巡探攻捕之曰遊兵為正兵之輔而遠遏之于大洋之外量處漁船夫採漁乃浙江沿海之民所賴以為生禁之誠拂其情縱之不能無弊今欲聽其採捕因而為兵則彼船甚小難以勝賊合無行各府縣之官預先曉諭每漁船大者二十五隻為一䑸責其合造樓船一隻以為兵船小者五十隻為一䑸責其合造樓船一隻以為兵船就將所造樓船丈量明白造册通報照依雇船之例逐月給與稅銀其駕船兵稍則照雇兵之例給與口糧斯大小相資各有實用而浙江沿海漁船數千隻可得樓船一二百隻為援矣田應山曰福船利于迎擊沙船利于應援其八槳快船專用不時飛報餘船如蒼船等不過備數而已鎮江江灘大碇用鎮海船三寶太監下西洋舊物也乙酉日丁酉日燒三家雄毛揚其灰風立至更揚之風止一法五酉皆可巽為風酉巽禽也以類相招若江海之中卒遇惡風燒黑戍皮揚立止此法甚妙豬毛人髮制龍福船最大可容百人上下兩層板平鋪自船底至上層為三層周圍鋪板或列茅竹禦鋭上設木女墻及炮牀前後皆不可入惟兩傍各開一小門以入桅上網繩為斗可容二人此舟最為海賊所畏每遇海賊不用戰鬭但使船騎賊船而沉之蓋以大勝小髙勝卑也每船約價銀五百兩故大船底深而板木堅厚重能上有樓而不覆蒼山船一名鐵船小於福船今寧波蒼山人用之周圍無板福人尚可使蒼山人曠野難使沙船乂小于鐵船亦無周板出蘇常鎮江海沙上即用沙民駕之崇明為最靖江江隂次之鎮江又次之福船利騎船但無風不可動沙船輕捷利鬭須用福船相兼行使又有草撇梭子撮網八槳之類皆輕捷極小船也燕尾筏水戰用以裹敵轉輪拖于船筏中間為槽浪山一帶下通大海最深上連長江又淺純用福船固可制勝但其長舵尖底受水最淺宜于大海而不宜于長江純用沙船固雖平底可行淺水但其卑小難以禦敵大小偏用未得萬全故職斟酌二船之用議造定波船之製底似沙船可以涉淺面似福船可以制敵又賊人深入必搶內地船隻水陸兼進故夫內河水兵戰船又其急務者也內河戰船與海船不同其制有二焉一則三櫓二跳以至於六跳乃是吳中之兵所習駕者行走便疾而無自蔽之具一遇賊人矢石只欲逃走逃不離有棄船下水而已一為鷹船乃福廣蒼山等兵所習駕者此船搖櫓駕槳之兵皆伏藏不露賊人矢石不能傷而我船之銃炮噴筒矢石飛錁之類可以傷敵如六金壩之捷聖噋之阻回來賊皆賴此船成功然三櫓等船取其疾走而不取其鬭戰鷹船取其鬭戰而不取其疾走二者宜相資以為用原鷹船用雙塔船改四櫓八跳船容三十人頭打發熕四櫓六跳亦打熕三櫓五跳三櫓兩跳容八九人三櫓用二槳二櫓二槳容三五人一櫓兩槳一櫓一槳容三四人用偷營上陳衝鋒愈少則愈勇大船使鑽篙人極勇鑽篙掀船止用可容十人之舟倭止能跳岸不能跳小船八卦六花船此船江海之中攻守皆用不懼風濤欲攻則敵不能當欲守則敵不能近故水戰首製此船以保全勝也用厚楠木板作五槽底槽前平頭槽後為尾其製造有八卦六花之義故名焉上有三桅中有八輪後有舵樓順風則用􅏃逆風則轉輪快利如風底中一槽髙七尺闊六尺旁二槽髙六尺闊五尺儘邊二槽髙五尺闊四尺每槽相離置輪一尺五寸共闊三丈六尺兩頭接鋪平中間上作倉長三丈六尺槽前平頭三丈六尺槽亦三丈六尺尾起舵樓底空內定八輪居中作官倉長三丈六尺闊一丈八尺兩舷各闊九尺前後中共三椲篷索用藥水刷過遇雨中不濕重彼若有火來到篷即滅周圍安立挨牌倉上并牌皆用生牛皮包裹以防矢石底下用狼牙釘品字密釘以防姦細水怪此統軍大將取勝也次附以車輪舸鴛鴦槳遊艇走舸鬭艦鈎拒等船倉內載以神槍神炮神箭神火神水等器欲要劫營斬關奪寨暗渡則有浮帶浮毬木罌繩筏蒲筏械筏等具更相參古製無不勝者製篷索藥每白礬十斤皮硝五斤梔子四斤為末入水五斗熬三五沸刷在篷索上以防雨火也鴛鴦槳即鶯船此槳用二舟并合一處形如艦船不用篷椲各長三丈五尺闊九尺倉上用生牛皮張裹掉槳人併槳把俱在倉內槳尾自內入水每一邊八把倉上前後兩旁俱留箭眼鎗眼以便放火藥神器如赴敵則兩邊飛掉與敵相近則放神器分為兩邊夾攻使彼左右難救賊亂既中我藥箭神器等具其人必傷其船必焚此輕舟近敵之法如捕巨魚之法也待彼勢弱敗我則近而擒之矣車輪舸此舸長四丈二尺闊一丈三尺外虛邊匡各一尺空內安四輪輪則入水約一尺許軸在倉內令人轉動其行如風船前平頭長八尺中倉長二丈七尺後尾長七尺為舵樓倉上居中通前徹後用一大梁蓋板自兩邊伏下每一塊長五尺闊二尺下安轉軸如吊窗樣臨敵先從內裏放神砂神箭火等器彼不能見人亦不用篷椲棹櫓賊勢少弱我軍一齊掀開船板立於兩邊即同旁牌牌與倉俱用生牛皮張裹人立於內拋火毬於標槍使鈎拒捍套索等器其船必焚賊必就擒矣破船舸此舸用大木五根各長三丈餘將木居中鑿空仍補平厚以麻粘之前後橫拴串錠一處加筏勢兩邊六輪上作船倉輪軸在內前平頭長一丈倉長一丈五尺尾長七尺安舵樓前平頭上安破舟銃其銃如神鎗樣鎗頭如蕎麥樣用純鋼極快利頭長三寸後桿長四寸如鎗安置銃內凡一舟前用三具約木頭與水頗相平約與船相近倉內點放火線其槍徑打入船內連一二三銃其船必爛而沉矣子母舟此舟長三丈五尺前二丈如艦船樣後一丈五尺只有兩邊板幫腹內空虛上倉前後通連內藏一小舟亦有蓋板掩人兩邊四棹毋船使風逆風掉槳前倉內裝以柴薪皆用油麻縛沃交貫火藥粗線船前兩腋俱錠狼牙釘釘皆用鋼尖快利或迎抵彼船或順風趕上臨棹飛奔彼船尾後倉內發鈎拒捍搭以留索與彼相連一處先往船上將箭砂火等具即發將我舟與彼并焚我軍從子舟而出矣太倉往福建針路太倉港口開船用單乙針一更船平吳淞江用單乙針及乙卯針一更船平寶山到南嘴匯用乙辰針出港口打水六七丈正路沙泥三更見茶山在東北邊用巽已針三更船見大小七山一路打水六七托用坤未針及丁未針三更船取灘山打水七八托用單丁及丁午針三更船藿山用單午針入西後門用巽已針三更取茅山用乙辰針廟州門內﨑山頭取斗口羅嶼用丁未針出雙嶼用丙午針三更船取孝順洋及亂礁洋打水九托十度平九山西邊沉礁打浪出水行船仔細用丙午針二更船壇頭山對開東邊有一半洋紅片礁出水內過船正路前去西邊見大佛山打水八九度用丁未針五更取大陳山及羊嶼西邊真谷山用丁未針五更船取披山及黃裙山用丁未針一更船取東洛山外過用丁未針二更船南麂山外過船西南是金鄉大澚對開有半洋礁出水打浪用坤未針三更船黑麻山船過用坤針四更船芙蓉山及西洋山船北邊過沿坤申使定海千户所山二更平淺取五虎門太武回太倉針路太武山用單艮針七更船平烏丘山內過用艮寅針四更船平牛嶼山用單艮針五更船取龜山用丑艮針七更船平嵛山用丑艮針二更船取東路及黃裙山用丑艮針四更船真谷山及羊崎嶼東邊過用子癸針五更船取東西雞山及壇頭山對開有紅片礁仔細用過用子癸針三更船取九山及亂礁洋孝順洋雙嶼港過崎頭升羅嶼水緊可拋船在廟州門轉過﨑出西後門用壬子針二更平灘山用丑癸針平三姑山用丑艮針三更船平大小七山一路打水六七度船千萬看流水急慢務要見茶山取港口收寶山進入太倉港內拋船為妙日本往太倉針路日本瓜哇港口開洋單艮針二十二更船取南麂山在溫州府瑞安縣南二百里丑艮針二更取東洛及黃裙山丑艮針四更船取披山丑癸針四更船取真谷山及牛崎山東邊過子癸針五更船取東西雞山及壇頭山開有片礁內外過壬子針二更船取九山及孝順洋并亂礁洋壬子針三更船取雙嶼港癸丑針取崎頭過廟州門出西後門單子針四更船取灘山癸丑及丑艮針三更船取大小七山乾亥針四更船取茶山東北來辛亥針取港洪及南湖嘴並寶山收太倉劉家河太倉往日本針路太倉港口開船用單乙針一更船平吳淞江用單乙針及乙卯針一更平寶山到南嘴匯用乙辰針出港口打水六七丈正路沙泥地三更見茶山在東北邊用巽已針三更船見大小七山一路打水六七托用坤未針及丁未針三更船取灘山打水七八托用單丁針及丁午針三更船藿山用單午針入西後門用巽已針三更船取茅山用乙辰針取廟州門內過﨑頭取升羅嶼用丁未針出雙嶼港用丙午針三更船取孝順洋及亂礁洋打水八九托十度到九山在闕國西南海洋二百里大嵩南二百里用單卯針二十七更過洋至日本瓜哇山港打水七八托泥地東北邊有坤申西南邊有低嶼三箇小嶼平平拋船底有三角港中央港是瓜生港口有沙壇線過西入港打水二三度倭船不靠天江賊船亦不靠天言其只多櫓槳不論有無風也冠帶捕盜閻昻具呈今將各年月節候風颶輕重逐一開後今開正月初二三頭颶初七八颶十二三颶十七八燒燈風二十二三風二十七八風無雨風輕立春過後未驚蟄先動雷一月天門不開日夜海上有風浪驚蟄過後雷嚮不妨春雷起風雷春颶雷先行二月初二三風初七八風十二三風十七八風二十二三風二十七八風春有雷電海上有風浪本月初二霧露生日本日若重一年俱重如輕則輕三月初三除颶風清明日主有大風本月二十一日立夏如發北風準有二十日北風如南風天定也四月夏雷壓三風前立春日過後下雪一百二十日雪子風正月初八日下雨風輕晴明風重五月初八日夏至發北風重梅雨本日晴明俱是南風黃魚從南來北風吹散魚頭羊山無魚六月十二彭祖忌有大風前三後四初十起十五止此幾日內發風俱作忌風六月有日七月有半六月十二無風七月十五亦無風七月立秋日起五十二日龍風過後發是秋黃風七日緊七日慢秋雷起壓天定立秋挂鱟三日過有大風七日過有風則輕鱟挂亂雷嚮無風八月起後早西風晚東風天定了本月二十七日蕭山張老相公生日主有大風九月初九日定颶風當日發風準定本日不發不一二日二年不定俱是亂風十二三風十七八風二十二三風二十七八風十月初二三風初七八風十二三風十七八風十月十五有大風十一月初二三風初七八風十二三風十七八風二十二三颶二十七八風十二月初二三初七八風十二三風十七八風二十二三風二十七八風本月發西南風下雪本月二十四日送神風冬怕赤鱟有一箇月風浪羊山以西為裏海馬迹以東為外海外海交春後止有南潮一片只向北流不轉南交秋後又只向南流不轉北雖送風亦行漁船以其潮急也此洋打水有五十托倭船春來遇北海潮水落又帶北風則北寇蘇松無倭船過洋無風闕櫓闕動三日三夜可闕羊山潮四面繞轉柁工隨潮使網分水礁在茶山分水潮日夜只向東北流從分水礁一日一夜才到大小七山落西行送風須遇東南東北順風水風力不能行以闕送潮也分水礁以東才有四面潮闕羊山大七洋小七洋皆闕打魚處上面長潮下面遇水長潮與遇水各四五丈未有風先知浪定有大風水泡墨黑有大風水闕黃白無風山上有蜃闕樓臺必知風山頭白漫有風由舟山至普長塗羊山灘山許山北向北行東風使落潮西風使長潮岑港第一列港第二沈家門三長塗四濱海居人值三秋大汛潮天連雨東北風張甚或山擡海唑海人驗候云山擡風潮來海唑風雨多皆不誣擡謂海中素迷望之山忽皆在目唑讀如鹺萬喙聲也海鷗啾啾鳴或是年後至七日逢壬輒憂海溢朱子築黃巖塘法用鐵為盈丈巨盤置之潮衝潮至盤所輒不復作豈金固止水物邪翠微北征録曰江湖禁涉之法不一而足懼其淺而步騎可涉也吾則曲鐵為鈎曵之以索謂之聚鈎所觸無不死傷直鐵為針透之以木謂之涉針所過無不殘滅編竹為索紐蔑為刺謂之水毛蝟所以錐涉者之肌膚斷木為軸釘鐵為維謂之水蒺䔧所以刺水兵之脛股煉竹為筌代之泥濘謂之踢筌所以毒人之腳面理柘為距置之沙淺謂之雞距所以碎人之腳板凡此六者雖有灘磧賊安能涉我境哉懼其深而舟楫可航也吾則綴鐵鈎於浮筒之上謂之浮鈎遇賊船則底版可沉繫索網於江流之中謂之拒櫓遇賊船則槳棹可得採綿欀採禾􅀈以裹賊船之柏舵而杆櫓難搖割纒蘆割藤蔓以礙賊船之划水而車版難蹈水勢湍急則立刀口木而使賊船之底不鑿自破水勢浩渺則立曲膝錐而使賊船之板不錐自透置挽索於水底使賊船遇之而尺寸不移兵家謂之神繫卓倒纂於水渦使賊船揍之而旋轉十匝兵家謂之鬼鑽凡此十者雖有舟楫賊安能及我岸哉懼賊兵浮罌浮環以襲我之津岸也吾則造木竹造豁木於灘磧而賊不可用懼其駕飛翼搭浮橋以跨我之河道也吾則造火牌造橦筏於急流而賊不可施懼其紐蘆束葦以濟也吾則斷木為查手木穿木為皂角木置之半渡之處而使其物之不可行懼其附纜結桿以濟也吾則橫木為闌河連木為截河置之未渡之時而使其具之不可至懼吾步岸之易登也吾則立伏牛交馬使賊人之船近岸不得以下卸懼吾壕塹之易通也吾則釘暗樁使賊人之船曵席不可以順流懼賊船之乘風而前也吾則有撩風榻水以絶其帆之不可使懼賊船之拽縴而至也吾則有礙竿虛木以阻其縴索之不可通上流高而下流低吾則占其上流立堰板以灌其軍彼勢闊而我勢狹吾則因其勢堆沙囊以沒其卒賊迫岸則立四索畨車以碎其船賊卒上岸則立獨面暗捧以掩其卒此其為利顧不偉歟然勝在於敵人之不及知事敗於吾軍之不能祕事機之無窮一或不密則我之所以制敵者敵反得以制我矣公孫述拒岑彭述為浮橋攢鈎以拒彭之船􅀈其術似矣未幾彭乃預知縱火焚橋鈎而述兵以敗韋昭達征嶺南賊為竹籠盛沙石以拒招達之舟楫其智非不巧也不知招達得以預知使士卒持刀斫籠而賊兵以潰吳人之禦晉可謂得䇿然鐵鎖截船之術一泄而不能免王濬捲大筏火炬之燒杜韜之禦晉師可謂盡善然桔橰打船之具一彰而不能免周訪長岐棖之拒是皆敗於輕泄而貴于善祕旱船過水用布周方各四尺雙層十字縫柱四方每方用豬胞四箇各收口抽嚴放於水上胞布各有製立站過水用皮做裩連襪當中容放食物用搭包一條以布做四小袋乘豬胞四箇繫放腰間過水軍需廣州州學教授林勳獻本政書十三篇大略謂國朝兵農之政大抵因唐末之故今農貧而多失職兵驕而不可用是以飢民竄卒類為盜賊宜倣古井田之制使民一夫占田五十畞其羡田之家毋得市田其無田與遊惰未作者皆使為農以耕田之羡雜紐錢穀以為什之一稅本朝二稅之數視唐增至七倍今本政之制每十六夫為一井提封百里闕千四百井率稅米五萬一千斛錢萬二千緡每井賦二兵一馬率為兵六千八百人馬三千四百匹此方百里之縣所出賦稅之數歲取五之一以為上畨之額以給征役無事則又分為四畨以直官府以給守衛是民凡三十五年而後始一遍也悉上則歲食米萬九千餘斛錢三千六百餘緡無事則減四分之三皆以一同之租稅供之匹夫之貢絹三尺綿一兩百里之縣歲收絹四千餘匹綿二千四百斤非蠶鄉則布六尺麻二兩所收視綿絹倍之行之十年則民之口算官之酒酤與茶鹽香礬之榷皆可弛以豫民其説甚備李筌曰國之所以富強者審權以操柄審數以御人課農者術之事而富在粟謀戰者權之事而強其兵故曰興兵而伐叛則武爵任武爵任則兵強按兵而勸農桑農桑勸則國富國不法地不足以成其強古者聖人法天而皇賢君法地而帝智主法人而伯乘天之時因地之利用人之力乃可富強乘天時者春植穀秋植麥夏長冬成備藏因地之利者國有沃野之饒而人不足於食者器用不備國有山海之利而人不足於財者商旅不備也通四方之珍異以有易無謂之商旅飭力以長地之財用資軍實謂之農夫理絲麻以成衣服謂之女功雲夢之毛羽黔溪之丹沙荆揚之皮革角骨江衡之柟梓會稽之竹箭燕齊之魚鹽旃裘兖豫之漆枲絺苧鄭之刀宋之斤魯之削吳越之劍燕之角荆之簳汾胡之苛吳越之金錫此地之財也燕之涿趙之邯鄲魏之溫軹韓之滎陽齊之臨淄陳之宛丘鄭之陽翟成周之洛川越之具溫楚之雲夢趙之巨鹿宋之孟諸此地之良也若居其地非有災害而貧者非惰則奢世無寄業而獨富者非儉則力同列而相臣妾者貧富使然也同貫而相兼并者強弱使然也同地而或強或弱者理亂使然也茍有道德地足容身事可致也茍有市井交易所通貨財可積也夫有容身之地智者不言弱有市井之利智者不言貧地誠任不患無財人誠用不畏強禦故神農教耕而王天下湯武戰伐而服諸侯用智者可以強於內而富於外用力者可以富於內而強於外是以漢武帝平百粵以為苑囿却羌胡以為苑囿珍怪異物充於後宫騊駼駃騠實於外庭匹庶乘堅良閭閻厭粉黛此謂智強於內而力富於外秦孝公行墾草之令使商不得糶廢逆旅于山澤貴酒肉之價重關市之賦使農逸而商勞行數年而倉廪實人知禮義至於始皇以為之資東向並吞諸矦此謂力富於內而兵強於外也故知伯王之業非智不戰非農不贍過此以往而致富強未之有也北征録曰興屯田以省支費浚水道以便轉輸二者當今之急務也屯田之䇿姑置不論而水運之利蓋有可考者蕭何發敖倉之粟以飽韓信舉秦下趙之師皆得之於河渭之順流諸葛孔明下巴蜀之粟以濟江陵荆州官渡之兵萬山之間跬步十里乃寄漕於木牛流馬而藉其力于嘉陵一江之水隨人開汴水以通淮漕吳大帝置京口閘以通江南之粟是皆鑿山成池掘地通流以濟人力之不及况今日屯兵之地非依淮泗之利則憑江漢之濵非通津於淮東川澤之鄉則接境於巢湖芍陂波濤之險初不勞一毫開墾之力而今之漕臣皆不能講求溝洫討論源流修填起塞修廢起舊以備緩急轉輸之用乃驅塗炭之民肩山阜之粟齎萬死之命赴千里之役中有室家流離之憂外有霜雪暴露之苦進有賊人虜劫之險退有監臨驅迫之誅一戍樵蘇十里魚肉其可不求夫形勢之便川澤之源舟楫之利兩使征夫役吏息肩弛擔惟能葺治水道川陸俱運坦夷則車推轂載馬駝驢負險阻則舟行纜解風送水流不惟可以少紓民力而糧出多道亦可以免斷劫之患凡川源之於州縣皆有高下丈尺平水之法毫末不差此又江湖不傳之妙是謂省運董摶霄曰海寧一境不通舟楫軍糧惟可陸運而凡瀕淮海之地人民屢經盜賊宜加存撫權令軍人搬運其陸運之方每人行十步三十六人可行一里三百六十人可行一十里三千六百人可行一百里每人負米四斗以夾布囊盛之用印封識人不息肩米不著地排列成行日行五百回計路二十八里輕行一十四里重行一十四里日可運米二百石每運給米一升可供給二萬人此百里一日運糧之術也今屯田六十頃四十頃種子五頃大豆種子五頃麥種子五頃麻種子五頃蕎麥種子屯外五十頃萊不入至秋納宴設廚四十頃蔓青種子十頃蘿蔔種子已上種子依鄉原丁種一屯六十丁一丁給米二升一石二斗一月二十六石一年四百三十二石牛一屯六十頭牛日給豆五升十月一日停一日三石一月九十石六月五百四十石一屯丁糧牛料種子菜屯兼束束以三百九十八尺五寸三分三毫繩之四分之一長九十三尺六寸三分四毫四角碟撅繩內有田一畝對屯官分三等內田上中束之以三尺五寸圓圍城束則束數三等可知束頃苗子橫束取三等束對屯田官於下苗子斗外合數為兩絹袋各盛苗子一碗與屯田官者束使對一碗與來使掌者也官對其後恐有耗損者取子一斗平量對屯田宜搗米得數米為率則一屯斛斗可知等級殊等九十石第一等七十石第二等六十石第三等五十石無水旱災蝗滿四千石者屯官有殿一軍一載粟一十二萬八千石六分支米九萬石以殊等屯四十餘萬二千石支一率糧神農書曰雖金城十仞湯池百步𢃄甲十萬而無粟者不能守也故充國伐西戎杜茂守北鄙創置屯田以為耕植者也經曰一軍萬二千五百人人日支米二升一月六斗一年七石二斗一軍日支一百五十石一月七千五百石一年九萬石以六分支米一人支粟三升三合三勺三抄三圭三粒一月一石一年一十二石一軍一年二十萬八千小月支九斗六升六合六勺六抄六圭六粒其大麥八分小麥六分蕎麥四分大豆八分小豆七分碗豆七分麻七分黍七分並依分數折米人鹽人一日支半合一月一升五合一年一斗八升一軍一日六石一月一百八十七石五斗一年二千三百五十石馬料一人一匹一軍二萬五千匹朔方河南一人二匹范陽河東隴右安西北庭則二人三匹平盧劍南嶺南則一人一匹計二萬三千匹馬軍計五百萬五千匹為一隊分為十坊抹馬五十隊十月一日起四月一日停料一馬日給米一升一月三石六個月一十八石一軍馬一日支粟一千二百五十石一月三萬七千三百石六箇月二十二萬五千石馬鹽一馬支鹽三合一月九升六箇月五斗四升一軍馬日支鹽六十七石一月四石九十五石六箇月八千七百五十石茭草一馬一日支茭二圍一月六十圍六箇月三百六十圍一軍六箇月九十萬圍油藥其油藥以藥取逃亡兵士殘糧衣賜獸醫人於馬押官羣頭中差取經曰軍無財士不來軍無賞士不往香餌之下必有懸魚重賞之下必有死夫興師不以財帛何以結其心哉軍士一人一年支領絹布一十二匹絹七萬五千匹布六萬五千匹賞賜鞍馬金銀銜轡二十具錦一百匹緋紫襖子衫具帶魚袋五十副色羅三百匹婦人錦繡夾衣被袍二十副緋紫綾二百匹彩色綾一百匹金銀器二百事銀壼瓶五十事帳設錦褥一十領紫綾褥二十領食簞四十張食器一千事酒樽杓一千付張幕一千條錦帳十所白氊一百事圍二十條鴟袋繡墩一百口經曰雲上為需君子以飲食宴樂用宣主君之惠暢吏士之心方人出必犒以牛酒領賞勞序殽席有差以激厲於衆酒酣按劒起舞胡笳角抵伐鼓呌呼以增其氣絲竹哀怨愴悽征夫感而泣下銼鋭喪氣復安得而用哉酒一人二升二百五十石羊一口分為十二節六百二十五口牛肉代羊肉一人二斤二萬五千斤每一斗麵作二十斤麵一百五十石饅頭一人一枚一萬二千五百枚一斗麵作三十枚糤子一人一枚一萬二千五百枚一斗麵作一百枚用麵四十六石六斗七升蒸餅一人一枚一斗麵作一百枚用二十五石每麵一斗使油八斤油二十五斤餜饠一人一枚一萬二千五百枚一斗麵作八十箇用一十五石六斗二升五合糕􅀈一人三合糯米三十七石五斗菜一人五十兩二千九百五十斤零四兩羊頭蹄六百二十五具充簽醬羊肺六百二十五具並四等充羮鹽三人一合四十一斗六升醬人半合六十二斗五升醋每人一合一十二石五斗椒五人一合二石五斗薑十人一兩七十八斤零一兩蔥三人一兩二百九十六斤零四兩隨筵樂例大鼓杖鼓腰鼓笛板破陳樂舞劍角抵投石枝匱五瘟丹此方自製冬至日修合韓飛霞黃芩乙庚之年為君黃梔子丁壬之年為君黃連戊癸之年為君甘草稍甲巳之年為君黃柏丙辛之年為君此五味各隨運氣為君者多用一倍也餘四味又與香附子紫蘇為臣者減半也右七味皆生用為細末用錦文大黃三倍煎濃湯去渣熬膏和丸如雞子大用硃砂雄黃等分為衣貼金每用一丸取泉水浸七碗可服七人凡天行瘟病去處有力之家合以施給隂德無量邊軍勞苦各邊軍士役戰身荷鎖甲戰裙遮臂等具共重四十五斤鐵盔腦蓋重七斤頓項護心鐵護脅重五斤弓撒箭袋重十斤腰刀三斤半蒺藜骨多重三斤箭筒一斤戰勾連綿皮上下衣服共八斤通計八十八斤半余聞之因偶成一篇用志邊軍勞苦云做軍莫做口外軍身挾戰具八十斤頭盔腦包重得七頓項掩遮以五論惟甲所備四十五腰刀骨多二四均精土精鐵始合度日夜摩挲光勝銀二五弓箭及其服隨身衣裳八乃足仗多身重難負荷還須上馬看輕速銀抹醜袋咽炒麵得飲馬溲喉且沃將軍令嚴隨鼓進誓與敵人爭一鏃此時顧功不顧身刀痕箭瘢無好肉歸來性命萬死餘便使封矦未堪贖江南一體行伍人羡食好衣何苦辛將錢買月事遊蕩有眼不曽經戰塵聽談邊軍却不信亦莫感愧朝廷恩闕闕達子最貧得一肉必炙熟合家大小傳割一臠啖餘之骨仍傳與老者用刀割其壙屑以此為飽至晚却啖酪彈子以羊馬酪晒乾為之味酸俄生液可厭渴亦止飢如此而已其腸細平生無撑腸之飽故易足也達兵之戰惟恃馬上發箭但直扯弓確箭地步方發不肯虛一矢如漢軍開弓兩手垂下扯滿始握起發箭亦能以臂護兩脅其達人使刀止亂斫而已如漢軍一手以刀一手以骨多使動上下相撒有法無空舉者不斬其頭則斫其足箭至又能革落躲閃此皆楊家軍之能事也達兵臨陳利則進不利則退常性也楊家軍一奮其前雖勢促亦不退上古庖犧氏之時刻木為兵神農之時以石為兵尚書弩石中石旋黃帝之時以為兵蚩尤之時爍金為兵割革為甲始制五兵建旗樹幟嚴鼓以佐軍威旗纛六面大將軍中營建出引六軍古者天子六軍諸侯三軍今天子十二衛諸侯六軍故有六纛以主之門旗二面色紅八幅大將軍牙旗之門出引將軍前列門鎗二根以豹尾為刃㯼出居紅旗之後止居前左右建立五方旗五面各具方色大將軍營中建出隨六纛後在營亦於纛後建嚴警鼓一十二面大將軍營中左右列各六面在六纛後角十二枚於鼓左右列六枚以代金認旗二百五十口尚色圖禽獸夲陳同五副認與諸隊不同各自為認識出居隊前恐士卒交雜陳將門旗各認所色不得以紅恐紛亂大闕鼓一百二十五面臨時戰敵所用甲六分七千五百領戰袍四分五千領鎗十分一萬二千五百條恐揚兵縛袋牛皮牌二分二千五百面馬軍以團牌代四分支弩二分弦三副箭一百分弩二千五百張弦七千五百條箭一十二萬五千隻弓十分弦三副箭三十六萬隻弓一萬二千五百張弦三萬七千五百條射甲箭三十七萬五千隻生鋼箭五萬隻長垜箭二萬五千隻弓袋葫盧張弓袋並十分一萬二千五百副佩刀八分一萬口陌刀二分七千五百口棓二分二千五百張馬軍及陌刀並以啄鎚鉞斧代各四分支搭索二分二千五百條馬軍用經曰軍無輜重則舉事皆闕士卒以軍中為家至於錐刀不可有闕驢六分七千五百頭鞍駱自副幕一萬二千五百口竿梁釘橛鎚自副鍋一分一萬二千五百口乾糧十分一人一斗二升一軍一千五百石麥袋十分一萬二千五百石羊皮縫可繞腰受一斗五升馬盂十分一萬二千五百口皆堅木為之或熟鐵為之受三升冬月可以暖食刀子錯子鉗子鑽子藥袋火石鹽袋解結錐礪石各十分一十一萬二千五百事麻鞋三十分三萬七千五百緉攤子􅀈􅀈澀子各十分三萬七千五百事袴帑抹額大帶帽子氊帽子各十分六萬五千五百事氊裘十分二萬二千五百領皮裘皮袴各三分七千五百領或詐為畨兵用柳罐栲􅀈各三分五千口皮囊袋亦得鍬鎚斧鋸鑿各二分一萬二千五百事鎌四分五千張切草刀二分二千五百張行槽一分一千二百五十具大小葫瓢二分二千五百枚馬軍鞍􅀈革帶十三分萬七千五百具人藥一分三賞水解散瘧痢藥金鎗刀箭等藥五十貼披氊被馬氊引馬索各十分一萬二千五百具絆二千分二萬五百條皮毛及連枝中半韋皮條三十分三萬七千五百條備收賊雜用右各隊隊辦公廨軍裝並須賞銀貯備使用勿令臨時有闕皇朝平定江南幅員既廣貢賦益夥於是泉州上海澉浦溫州慶元廣東杭州鄰海諸郡與遠夷蕃國往復互易舶貨因宋制細物十分而取一粗物十五分而取一以市舶官主之其發舶其回帆必著其所至之地驗其所博之物給以公文為之期損中國無用之資易遠方難致之物為説而不思夫國家聲教綏懷無遠不及之效孰謂知所當寶者哉礦擇礦法上等紫色者或黑色者嚼之如蠟其味如蜜每一兩煎得銀五錢者謂之金水平分此為絶好其中或煎銀五錢以上者亦好次一等乃雞糞礦其形如麥芽碎碎塊黑白相兼每一兩煎銀八錢上下者又次一等乃黃沙礦其形黃色碎如米粒每一兩煎得銀六七錢者外有常號每一兩煎得銀二三錢以上四種該用之物不拘數目取來多多益善大約以二十斤為率可多不可少凡取得礦石就用本洞之土本地之水調和拌勻入磁瓶內好生封固毋令泄氣為妙外有真出山一氣鉛取五六十斤每斤內有銀三五錢者取來作用出礦地方杭州府桐廬富陽縣界五寶山每百斤用生鐵五斤煎得銀七八兩銅三十斤三十七年私開兩日紹興府會稽縣銀山壩礦面沙泥每百斤銀二兩五礦未開目今盜泥日可得銀三四百兩進本官開鄉宦不肯寧波府觀海的山每百斤銀七八兩同前項金華府義烏縣八寶山每百斤低的出銀二十兩極好的出銀六七百兩日可出千石江南第二礦也三十八年處礦徒私開五次被義烏兵殺敗衢州府西安縣桐山源鐵煎每百斤銀七八兩至二十兩止日可出銀千餘兩處徒三四千人五年以來日日私開開化縣大尖塢鐵鉛煎每百斤銀三兩至八兩止日可出三百兩十八年王太監開一次三十七年胡軍門委宋照磨陳百戶官開納稅三百兩後李知縣申文禁開江家􅀈每百斤銀三兩鉛四五十斤日可出一二百兩苦竹坑泥礦每百斤出銀一兩日可得銀千兩二處同前嚴州府淳安遂安界椊樹塢每百斤三兩起至二十兩止老山每百斤出銀二兩日可出二百兩私開五六年杭州於潛天目山每百斤銀三兩湖州府孝豐縣每百斤銀三兩至二十兩止三十八年胡軍門開四日地方強不肯與開江西廣信府常山玉山界每百斤出銀三十兩日可得三百石永楊坑礦色如沂州礦而礦味香甜每百斤出銀三十兩至七八百兩止江南第一礦也三十五年私開大獲利因進本求官開今未行池州銅陵縣鐵石坦礦未詳一私開出地方人主意勾處州人出名府縣巡捕官至吏書門皂兵快俱有常例打發上司覺察必是委巡捕領兵快起鄉夫追逐逐者將發而礦徒已去逐者才返而礦徒復來蓋開礦必有爭有爭必聚衆衆聚必資糧食糧食出於地方是私開之弊皆地方豪戶隂主之也一官開原未立法秪應私求上司不自任其事而委之府縣府縣之廉者以啓釁為詞而絶開礦之路其貪者以納賄為計而操開閉之權未開時先索常例若干既開時又索月銀若干礦徒與貪官同利而國課虧矣一開法以地方大戶主收煎以油糧戶主採取假如礦一百斤值銀十兩油糧戶只作五兩賣與大戶使二人均利入已均稅納官官以廉能者董其役監取三日三夜通融計之什分取一取大戶并油糧戶甘結造清册入官數日一納國稅如有利則開者必不自止如無利則開者自息矣藥方金瘡論木乃春之權金乃秋之令春則萬物發生故曰春屬震以為東方甲木之氣秋則萬木凋零故曰秋屬兌以為西方庚金之氣也金瘡乃刀斧劍刃之所傷故名金瘡其色所喜淡紅色者良白而微紅者是也萬不失一所惡者紫紅色百無一生金瘡屬金主與肺患金瘡者則忌咳嗽嘔噦翻胃肺部之症亦宜避風為要則風所屬巽木如風入瘡口肺金反尅而成破傷則至瘡口浮腫􅂒􅂒穢爛故名破傷風變生餘症患甚者多至不救雖有治法宜辨瘡口淺深脈之虛實吉凶見矣所喜者胃氣益旺飲食如常脾胃屬土胃氣旺則元氣壯氣血生金瘡亦宜戒怒遠色怒則瘡口迸裂變生胬肉欲則瘡口腐爛以損新肌凡治金瘡用敷口之藥所主乳沒竭靈蓋蕊石之類自始至終不可不用此藥用之則生肌止痛活血全生可保無虞凡服湯藥必以助胃補血為主以為治金瘡之大意金瘡雖有變易各有治法居於邊隘無日刀箭之所傷非此聖藥安能治之塞垣軍旅之間罹於毒者非此祕方必至危殆者多矣學者宜細觀之可以類推故其治法亦不能詳備也乳香一兩沒藥一兩三錢天靈蓋五錢壓邪不內關血竭一錢黃連末如麵二錢花蕊石二錢淡黑微黃珠末二兩止痛生肌散血治肺家症生金苪五片鎮壓止痛生肌多闕生腐黃丹一錢水飛七次降真香止血解毒一云用冬瓜一云用松枝嚼爛服之并傅瘡口箭藥方尋鮮草烏搗汁用大白盤貯之不拘多少盤數晒之去其清水但留濃汁晒如沙糖樣便可收之倘無日色用火坑加籠粳火烘之晒後量加硝信止血降節散治金瘡磕損血流不止先以井花水一盆用碎白紙浸於水中如見血流則以水紙圍於四畔流則再上待止方可下藥用雞翎上藥封緊避風為要缺文成片焙脆淨未一兩黃連淨未一兩右二味各為細末收貯聽用但封之候一兩日間瘡口腫癲疼痛穢氣乃風入瘡口故發腫即以香油滲潤傷處以手緩緩取開藥紙用川椒滚湯冷溫以白紙蘸湯洗淨又以白紙搓軟放於患處把去腐肉另換去腐生肌散一日二洗藥搽三度不可封扎以泄穢氣腐肉化水此藥祛風去腐止痛謹愼為要去腐散土丹水飛淨一兩微炒天一石一兩火煆通紅取於地上出火毒右各等分為末入磁罐收貯此藥敷上待其腐肉化為黃水去盡但肉肌淡紅色者方換蕊蝎斂口生肌散長肉收口如前搽洗如敷此藥須戒七情愼之蕊蝎斂口生肌散花乳石須真者一兩用乳香沒藥真正者各一兩右將為末以炭火中將前石煆紅以火筯取出於前二味藥末內蘸令煙再煆令蘸以藥末盡為度取出合地上出火毒用如金瘡要此如牛觸馬踢減去不用須看瘡加減如不合者加此斂之硃砂二錢如臥中驚覺倍加二錢蝎不用血蝎二錢如見血結如線加一錢乳香半兩用滴乳沒藥半兩真者土丹水飛紅者二錢微炒天一石一兩煆闕收貯以蠟封口恐泄藥氣天靈蓋以火煆闕白者不用黑者有效乃看氣血者白者衰朽故不用搽法如前右將天靈蓋另乳為細末聽用加減春三月不用萬物發生夏三月每料加五分炎暑恐變易之以助藥力秋三月每料加七分萬物凋殘故加之冬三月每料加一錢冬天道嚴寒故倍加之又方玉真散治刀傷入風􅂒腫疼痛以破傷風治體發寒熱是也南星一兩防風淨末一兩右各等分為末瘡口以此藥敷之又以香油潤之如角弓反張以藥末二錢用老酒入童便少許灌服立效不愈再一服有驗禁聲飲治刀刃致傷疼痛不可忍防風南星湯泡各等分右各為飲片每服五錢水酒各一盞生薑一片煎至八分食遠溫服三服有效花乳石出陜州閿鄉縣體至堅重色如硫黃形塊有極大者合硫黃同煆研末傅金瘡其效如神又人倉卒中金刃不及煆合但刮石上取細末傅之亦效出陜華間於黃石中間有淡白點以此得花之名有一片骨如三指闊此骨是天生天賜蓋押一身之骨未合即未有只有𩕄門取得後用粳灰火罨一夜待腥穢氣出盡用童兒溺於瓷鍋子中煮一伏時滿漉出於屋下掘一坑可深一尺置蓋於中一伏時其藥魂歸神妙陽人使隂隂人使陽七月七日以白雞祭於牡荆樹下畢斷取中間一枝長七寸削取四方一頭尖刻作七契宿祭之樹下盛一皂囊用時於星月下畫地即成江河山林牡荆一曰白荆而赤外密中空人多植為籬垣也七月七日取􅀈蟾一箇安淨瓦器中密封埋池傍三十日出之搗為細末皂囊盛之以三指撮將水中則霧起五月五日取白頸蚯蚓二七枚治雲母石一升內搗漬之遇疾風揚之則雲起如山亦可避匿逃難不可為姦盜法也陂湖溝港人所資而忽竭泉源井池衆所仰而若枯取無去毛麻油煮熟繫於兩石或兩磚之間夾磚石令密投涸之地須臾風雷雨水泛如故泰山華山茯苓千歲樹根底生芝草如蓋曰威喜也五色不定如蟲獸如蘭或類人形或如菌以日中背日採之佩之可以避兵五百里欲試之取十二雞令一雞佩之十步外射之衆雞皆中惟帶威喜者不中為妙驗五月五日七月七日取蜂子如指大細腰而半色者二七枚隂乾百日為末以市死人或陳亡人血丸如小豆大置二七丸於衣領中令有威勇雖敵甚衆終不敢近來可以當五十人若臨官帶之吏畏入軍陳中則敵人盜賊走不敢前缺文玄參青藤桃仁當歸黃柏防風黃連苦參羌活黃茋白芷大黃杏仁黃芩連喬山支荆芥南星獨活薑黃赤芍川山甲金銀花川木别生地各四兩乳香二兩沒藥二兩麝香三錢血竭五錢韶粉麻油成膏鉛一斤炒末汞一兩六錢投入鉛內慢炒聽用何首烏四兩片炭灰一斗熱水淋下五碗煮首烏去查再下大黃一斤乾片當歸一兩片細辛一兩片蘇木二兩俱煎用再用布袋一片裝藥七斗缸水八分熟酒一斤傾入缸內攪勻三次方下小布三大布二再下布再下三斤袋吊空六七斤先打鐵池入灰底以灰鋪一層下鉛半斤煉堅池子進母銀化開待紅光現方可進銖三百八十四銖為一斤每母一斤進銖均停退火閉罏次日又煉凡三五次方可取藥結在母上者為戊土若已土則用瓦盞盛水用鹽泥固濟將銀鑄成餅三箇入水火罐每八兩下安神一兩五錢藥結在母下敲取聽用每藥半斤配好礦半斤作軟匱磁石半斤鵝管二兩共為末用白芨水搽調鐵合蓋上晒乾候用錫五斤石黃半斤火硝二兩硃砂五錢三味為末入錫內加減金砂二兩共入鐵合內鐵線扎定鹽泥固口用底火升打一日取出將蓋上粉霜掃下將母入鉛池煎將前粉霜一錢以黃䗲為丸入火硝少許入母內待他滚沸結成珠一顆取出為細末用黃䗲為丸每丸乾一兩發靛甕青藥都下染方家常用烏頭草烏蒼术班貓芫花甘遂紅豆白芷虻蟲人言苦參三奈砂仁狗脊川烏南星甘草半夏巴豆當歸天麻人參川山甲青娘子紅娘子天仙子附子各等分隨定多少用藥靛自發解救藥毒朝野僉載名醫言虎中藥箭食青泥而解野豬中藥箭豗薺苨而食雉被鷹傷銜地黃葉點之礜石可以害鼠張鷟曾試之鼠中毒如醉亦不識人猶知取泥汁飲之須臾平復鳥獸蟲物知解毒何况人乎許氐方論云凡中一切諸毒從酒得難治言酒性行諸血脈遍身體故難治也因食得者易治言食與藥俱入於胃胃能容毒或逐大便泄出毒氣未流於血脈故易愈也又按林氏禹記云凡諸藥汁解毒者皆不可熱飲能使毒氣愈甚宜冷服之乃效蟹毒濃煎紫蘇飲一兩盞又生藕汁煮乾蒜汁並解解挑生毒凡中挑生毒者脅下忽腫起如生癰癤狀頃刻間大如碗俟更以菉豆嚼試若香甜則是挑生毒也治法搗小升麻為細末取冷熟水調二大盞連服之洞下瀉出生蔥數莖根鬚皆具瘇即消續煎平胃散補日食白粥凡吃魚肉瓜果皆可挑生初中毒覺胸腹稍痛明日漸加攪刺滿十日則物生能動騰上則胸痛沉下則腹痛是也在上鬲取之法用熱茶一甌投膽礬半錢於茶中候礬化盡通口呷服良久即以雞翎探喉中即吐出毒物在下膈瀉之法米飲下鬱金末二錢即瀉下其毒次用人參白术各半兩為末用無灰酒納瓶內慢火熬半日許度酒熟溫溫服之日一盞五日乃止然後飲食如故解中蠱毒造蠱之家用毒有日如正月則用初一日二月二日三月三日四月四日五月五日六月六日七月七日八月八日九月九日十月十日十一月十一日十二月十二日延平有僧惠全刋板以警誤人凡蠱毒有五種皆以馬兜零根三兩㕮咀分三服水煎去滓空腹頓服隨時吐出蠱未吐再服以吐為度又治百蠱不愈者取鵓鴿熱血隨多少服中蠱欲死者生甘草半兩水濃煎頓服吐痰即愈忽中蠱者胡荽根搗汁半盞不計時服其蠱立下和酒服尤妙白雞血亦好中蠱吐血者用小麥麵一合分兩服冷水調下半日當下中蠱下血者蝟皮燒灰細研熟水下二錢又方升麻為末汲溪水調服亦好解砒霜毒鬱金末二錢入蜜少許冷水調服升麻濃煎冷服杏核連仁搗為末以米飲調下白扁豆為末冷水調下飲釅醋可以吐砒毒只不可飲水解砒毒無如醬調水服寒水