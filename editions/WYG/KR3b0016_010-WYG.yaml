body:
  text: 武編後集卷四明唐順之撰佯北戰國秦師伐趙趙奢之子括代廉頗將拒秦於長平秦隂使白起為上將軍趙括出兵攻秦軍秦軍佯敗而走張二竒兵以劫之趙軍逐勝追造秦壁堅不得入而秦竒兵二萬五千人絶趙軍後又一軍五十騎絶趙壁間趙軍分而為二糧道絶而秦出輕兵擊之趙戰不利因築壁堅守以待救秦王聞趙食道絶自之河内發卒遮絶救兵趙卒食絶四十六日隂相殺括與銳卒自摶戰秦軍射殺之趙軍大敗坑卒四十餘萬東魏侯景叛高澄歸梁圍彭城澄遣慕容紹宗討之將戰紹宗以梁人剽悍恐其衆不能支一一引諸將而誑之曰我當佯退誘吾兒使前汝可擊其背申明戒之初景又戒梁人曰逐出不過二里㑹戰紹宗實敗走梁人不用景言乘勝深入魏人以紹宗之言爲信掩擊遂大敗之隋薛世雄爲右翊衛將軍竇建德僣稱長樂王遣世雄率兵三萬討之至河間城南營於七里井建德聞世雄至精兵数千人伏河間南界澤中悉㧞諸城僞遁去入豆子䴚中世雄以爲建德果亡乃不設備建德覘知之自率敢死二千人襲擊世雄㑹雲霧晝晦而兩軍不辨隋軍大潰自相騰藉死者萬餘世雄以数百騎而遁隋末高祖起兵自太原至霍邑隋將宋老生守城太宗以數騎詣其城下舉鞭指麾若將圍城者老生怒開門岀兵高祖因謂隴西公建成曰汝㸔兩陣將交引左軍直趨東門命太宗引右軍直趨南門以㫁其歸路老生之軍背城而列陣高祖以中軍與建成合陣於城東太宗陣於城南老生麾兵疾進先薄高祖而建成墜馬老生乗之中軍與左軍咸却太宗自南原遥見塵起知義師退率二百騎馳下峻坂殺一賊將遂衝㫁其軍岀其陣後表裏齊譟隋師大潰遂擒老生而平霍邑唐姜寳誼武德初爲右武衛將軍時劉武周將黄子英往來雀䑕谷高祖令寳誼擊之子英數以輕兵挑戰寳誼兵纔接子英輕遁如此者再三寳誼悉兵逐之伏兵發軍遂大敗寳誼爲賊所擒郭子儀討安慶緒渡河圍衛州慶緒率衆來援分三軍子儀陣以待之預選善射者三千人伏於壁内誡之曰候吾小却賊必爭進則登城鼓譟弓弩齊發以逼之既戰子儀僞退賊果乘之乃開壘門遂聞鼓譟弓弩齊發矢注如雨賊徒震駭因整衆追之賊衆大敗春秋時齊師伐魯公將戰曹劌請從公與之乘戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰大國難測也懼有伏焉吾視其轍亂其旗靡故逐之闕圍後漢初張歩據齊地漢將耿弇總兵討之歩使其大將費邑軍歴下又分守祝阿鍾城弇先擊祝阿自旦攻城未日中而㧞之故開圍一角令其衆得奔歸鍾城鍾城人聞祝阿已潰大恐懼遂空壁亡去建武中妖賊单臣等相聚入原武劫掠吏民自稱將軍臧宫將數千人圍之賊食多數攻不下士卒死傷帝召公卿諸侯問方畧明帝時爲東海王對曰妖巫相劫勢無乆立其中必有悔欲亡者但外圍急不得岀耳小緩之令得逃亡則一亭長足以擒矣帝然之即勑令撤圍緩守賊衆分散遂拔原武斬单臣等後漢末將軍朱雋與荆州刺史徐璆共討黄巾擊賊帥趙𢎞斬之餘賊韓忠據宛乞降不許司馬張超請聽之雋曰兵有形同而勢異者昔秦項之際人無定主故賞降附以勸來耳今海内一統唯黄巾造冦納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長冦非良計也因急攻之連戰不尅雋登土山視之顧謂張超曰吾知之矣賊今外圍周固内營迫急乞降不受欲岀不得所以死戰也萬人一心猶不可當况十萬乎其害甚矣今不如撤圍并兵入城忠見圍觧勢必自岀岀則意散易破之道也既而觧圍忠果岀戰雋因擊大破之忠等並降韓世忠時勝㨗軍張師正敗宣撫司使李彌大斬之大校李復鼓衆以亂淄青之附者合數萬人山東復擾彌大檄世忠將所部追擊至臨淄河兵不滿千分爲四隊布鐡蒺藜自塞歸路令曰進則勝退則死走者命後隊勦殺於是莫敢返顧皆死戰大破之斬復餘黨奔潰乘勝逐北追至宿遷賊尚萬人方擁子女椎牛縱酒世忠單騎夜造其營呼曰大軍至矣亟束戈卷甲吾能保全汝功名賊駭慄請命因跪進牛酒下馬觧鞍飲啖之盡於是衆悉就降黎明見世忠軍未至始大悔失色曹操克袁譲圍壺關下令曰城㧞皆坑之連月不下曹仁言於操曰圍城必示之以活門所以開其生路也今公告之必死將人自爲守且城固而糧多攻之則士卒傷守之則引日乆今頓兵堅城之下攻必死之虜非良計也太祖從之城遂降後魏末高歡起義兵於河北爾朱兆等諸將同㑹鄴南士馬精强號二十萬圍歡於韓陵山是時歡馬二千歩卒不滿三萬人兆等設圍不合歡爲圓陣連繫牛馬盧自塞之於是將士死戰四面奮擊大破兆等窮冦漢趙充國討先零羗羗乆屯聚觧弛忽覩大軍棄輜重欲渡湟水道阨狹充國徐行驅之或曰逐利行遲充國曰窮冦也不可迫緩之則走不顧急之則還致死諸將皆曰善虜衆果赴水溺死者百數於是大破賊衆後凉吕光遣二子紹纂伐叚業南凉秃髪烏孤遣其將楊軌救業紹以業等軍盛欲從三門關挾山而東纂曰挾山示弱取敗之道不如結陣衝之彼必憚我而不戰也紹乃引軍而南業將擊之其將沮渠蒙遜諌曰楊軌恃虜騎之强有窺伺之心紹纂兵在死地必决戰求生不戰則有太山之安戰則有累卵之危業曰卿言是也乃按甲兵不戰紹亦難之各引兵歸高齊北豫州刺史馬消難請降於周周遣楊忠逹奚武等率騎士五千迎之從間道馳入齊境五百里前後三遣使報消難皆不返去虎牢三十里武疑有變欲還忠曰有進死無退生獨以千騎夜趣城下城四面峭絶但聞擊柝聲武親來麾數百騎西去忠勒餘騎不動侯門開而入馳遣召武齊鎮城將伏敬遠勒甲士三千人據東埤舉烽嚴警武憚之不欲保城乃多取財帛以餌消難及其屬先歸忠以三千騎爲殿到洛陽皆觧鞍而卧齊衆來追至洛北忠謂將士曰但飽食今在死地賊必不敢渡水當吾鋒食畢齊師闕若渡水忠馳騎將擊之齊兵不敢逼遂徐引而還狄青嘗與虜戰大勝追奔數里虜忽壅遏山嵎知其前必遇險士卒皆欲奮戰青遽鳴鉦止之虜得引去驗其處果臨深澗將佐悔不擊青獨曰不然奔命之虜忽止而拒我安知非謀軍已大勝殘冦不足利得之無所加重萬一落其術中存亡不可知寧悔不擊不可悔不止歸師劉項爭天下之際漢王至南鄭諸將及士卒皆歌思東歸韓信說漢王曰項王王諸將之有功者而王獨居南鄭是遷也軍吏士卒皆山東之人也日夜跂而望歸及其鋒而用之可以有大功天下已定民皆自寜不可復用曹操圍張繡於穰劉表遣兵救繡以絶軍後操將引還繡兵來追操軍不得進連營稍前到安衆繡與表兵合守險操軍前後受敵操乃夜鑿險爲地道悉過輜重設竒兵會明賊謂操爲遁也悉軍來追乃縱竒兵歩騎夾攻大破之操謂荀彧曰虜遏吾歸師與吾死地戰是以知勝宋建武初魏圍鍾離張欣泰爲軍主隨崔慧景救援及魏軍退而邵陽洲上餘軍萬人求輸馬五百疋假道慧景欲㫁路攻之欣泰說慧景曰歸師勿遏古人畏之兵在死地不可輕也慧景乃聽之過前秦苻堅征晉至夀春兵敗還長安慕容泓起兵於華澤堅命苻叡討之叡勇果輕敵不恤士衆泓聞其至也懼率衆將奔關東叡驅兵邀之姚萇諌曰鮮卑有思歸之心宜驅令岀關不可遏也叡弗從戰於華澤叡敗績被殺夏赫連勃勃伐秃髪傉檀大敗之驅掠二萬餘口牛馬羊數十萬而還傉檀率衆追之其將焦殷曰勃勃御軍齊肅未可輕也今因抄掠之資率思歸之士人自爲戰難與爭鋒不如從温圍北渡趣萬觧堆阻水結營制其咽喉百戰百勝之術也傉檀不從勃勃聞而大喜乃於陽武下峽鑿陵埋車以塞路勒衆逆擊傉檀大敗之殺傷萬計後凉吕𢎞攻叚業於張掖不勝將東走業議欲追擊之其將沮渠蒙遜諌曰歸師勿遏窮冦勿追此兵家之戒不如縱之以爲後圖業曰一日縱敵悔將無及遂率衆追之爲𢎞所敗截歸後漢凉州賊王國圍陳倉不㧞而去將軍皇甫嵩進兵擊之董卓曰不可兵法窮冦勿遏歸衆勿追今我追國是迫歸衆追窮冦也困獸猶鬭蜂蠆有毒况大衆乎嵩曰不然前吾不擊避其銳也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有鬭志以整擊亂非窮冦也遂獨進擊之使卓爲後拒連戰大破之斬首萬餘級國走而死唐馬燧討田悦軍中乏糧悦深壁不戰燧令諸軍持十日糧進次滏口與悦夾洹水而軍李抱真與李芃問曰糧少而深入何也燧曰糧少利速戰兵法善於致人不致於人今田悦與恒州淄青三鎮爲首尾計欲不戰以老我師若分兵擊其左右悦必救之則我腹背受敵戰必不利故進軍逼悦所謂攻其所必救也彼茍岀戰必爲諸軍破之燧乃造三橋道逾洹水自挑戰悦不敢岀恒州兵以軍少懼爲燧所并乃引軍合於悦悦謂燧明日復挑戰乃伏兵萬人欲邀燧燧乃令諸軍半夜皆食先鷄鳴時擊鼓吹角潛傍洹水徑趨魏州令曰聞賊至則止爲陣又令百騎鳴鼓吹角皆留於後仍抱薪舉火待軍畢發止角匿其旁伺悦畢渡焚其橋軍行十數里悦乃率淄青恒州歩騎四萬人踰橋掩其後乘風縱火鼓譟而退燧乃坐甲令無動命前除草斬荆棘廣百歩以爲陣燧岀陣募勇士得五千餘人分爲前部以俟賊至比悦軍至則火止力少衰乃縱軍擊之悦軍大敗悦走橋橋已焚悦軍亂赴水斬首一萬前漢高帝匈奴圍於平城七日高帝使使間厚遺閼氏乃開圍一角於是高帝令士皆持滿傅矢外嚮從觧角直岀得與大軍合冒頓引兵去後周大將宇文䕶伐齊遣將尉遲迥圍洛陽爲敵所敗周將達奚武與齊王憲於邙山禦之至夜收軍憲欲待明更戰武欲還固爭未决武曰洛陽軍散人情駭動若不因夜速還明日欲歸不得武在軍旅乆矣備見形勢大王年少未經軍事豈可將數營士衆一朝棄之乎憲遂從之全軍而返齊人弗悟而不追若追之必克也宋太宗時契丹與西賊相結窺邊上宻授成算於府州折御卿使爲之備至是敵將韓德威萬餘衆誘黨項勒浪等族自振武入冦御卿大敗之於河义勒浪等族乘敵之亂詐爲府州兵躡其後敵衆死者十六七奏至上召其使問狀因笑謂左右曰北部小醜輕進易退常戒邊將勿與爭鋒待其深入即分竒兵㫁其歸路從而擊之必無遺類果如我言左右呼萬嵗因遣内侍往圖地形觀之其勒浪等族既與敵有隙悉欵塞内附五代黄文靖佐葛從周闕入潞㑹晉軍十餘萬俯外垣砦文靖慮孤軍難守乃與從周啓闉岀師文靖爲殿後命矢刃皆外向持重而還晉人不敢逼魏傅永爲豫州刺史南齊將裴叔業来侵楚王戍永令塡塞外塹夜伏戰士一千人於城外及曉而叔業等至頓於城東列陣將置長圍永所伏兵於道左擊其後軍破之叔業乃令將佐守所列之陣自率精甲數千人救之永上門樓觀叔業南行五六里許便開門奮擊遂摧破之叔業奔走左右欲追永曰弱卒不滿三千彼精甲猶盛非力屈而敗直墮吾計中耳既不測我之虛實足䘮其膽俘此足矣何暇追之疑後漢廉范爲雲中太守㑹匈奴大入塞范自率士卒拒之虜衆盛不敵㑹日暮令士各交縳兩炬三頭然火虜遥見火多謂漢救兵至待朝將退范令軍中蓐食晨往擊之斬首數百級虜自此不敢向雲中陳登守廣陵孫䇿遣軍攻登於康琦城登使人求救於曹公而宻去城十里軍營處所多取柴薪兩束一聚相去十歩縱横成行令俱起火互然其聚城中稱慶若大軍到賊覩光驚潰登勒兵追奔斬首萬級秦苻堅䧟襄陽晉將桓冲攻之堅將慕容垂等率兵歩騎五萬攻襄陽以石越爲前鋒次於沔水垂越夜命三軍人持十炬火繫炬於木枝光照數十里冲懼退還上明宋晉安王子勛舉兵反潯陽遣臨川内史張淹自鄱陽嶠道入三吳明帝命將討之時朝廷器甲悉充南討故軍容寡闕乃編椶皮爲馬具折竹爲寄生夜舉火進軍賊望見恐懼未戰而走後魏雍州刺史蕭寳寅據州反魏大將長孫雉討之軍次𢎞農副將楊偘曰昔魏武與韓遂馬超挾關爲壘勝負之理乆而未决豈才雄相類算略抗衡當以河山險阻難用智力今賊守潼關全據形勢縱曹操復岀亦無所逞竒必須取蒲坂飛棹西岸置兵死地人有鬭心潼關之賊必睹風而散諸處既平長安自克雉曰賊黨薛循義已圍河東薛風賢又保安邑雖有此計猶用爲疑偘曰河東治在蒲坂西𢃄河湄所部之人多在東境循義驅率壯勇西圍郡邑父老妻弱尚保􅃇村若歩卒一臨方寸各亂人人思歸則郡圍自觧不戰而勝昭然在目雉從之令其子彦等領騎與偘於𢎞農北度所統悉是騎士習於野戰未可攻城便據石壁偘乃班告曰今且停軍於此以待歩卒兼觀人情向背然後行若送降名者各自還村候臺軍舉烽火亦應之以明降欵其無應之者即是不降之村理須殄戮賞賚軍士人遂𫝊相輿告報未實降者亦詐舉烽一夕之間火光遍數百里内寳寅將時圍河東不測所以各自散歸長安賊平偘頗有力西魏將宇文測行綏州事每嵗河冰合後突厥即來冦掠先是常先遣居人入城堡以避之測至皆令安堵如􅃇乃於要路數百處多積柴仍遠斥侯伺其動靜是年十二月突厥從連谷入冦去界數十里測命積柴之處一時縱火突厥謂有大軍至懼而遁走自相蹂踐委棄雜畜及輜重不可勝數測徐率所部收之分結百姓自是突厥不敢復至唐永王璘拒命肅宗使中官啖延宗招討之判官李銑闕以廣陵歩卒三千同岀於𤓰歩洲廣張旗幟耀乎江津璘登埤望之竟日始有懼色其夕銑令多燒火人執兩炬以疑之隔江望者兼水中之影一皆爲二璘軍人以火應之璘懼以爲官軍悉濟矣遂以兒女及麾下宵遁春秋時楚子儀之亂析公奔晉晉以爲謀主繞角之役析公曰楚師輕窕易震蕩也若多鼓鈞聲以夜軍之楚師必遁晉人從之楚師宵潰唐王皎爲朔方副總管吐蕃精甲十萬冦臨洮皎率步兵二千卷甲倍程與臨洮軍合皎岀竒兵七百人在蕃後夜襲之去賊五里置鼓角令前者遇賊大呼後者擊鼓賊大懼疑有伏兵自相殺者萬計晉侯伐齊齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之使乘車者左實右僞以斾先輿曵柴而從之齊侯見之畏其衆也乃脫歸曹休與孫權兵戰休敗權追兵㫁夾石諸將不知所岀賈逵曰休敗於外進不能戰退不能還安危之機不及終日賊以軍無後㫁故至此今疾進岀其不意所謂先人以奪其心賊見吾兵必走乃兼道進軍多設旗鼓爲疑兵賊見遂退魏將軍曹爽襲蜀蜀將劉敏王平鎮漢中拒之或謂但可守城不岀拒敵敵必自引退敏以爲男女布野餘糧栖畝若聽之入則大事去矣遂率所領與平據形勢多張旗幟亘百里㑹費褘至軍退東晉末桓𤣥簒晉劉裕起義兵討之𤣥使將桓謙屯覆舟山裕先使羸弱登蔣山多張旗幟以油帔冠諸木杪遍滿山谷𤣥不之測大懼裕乃與劉毅等分數隊進突謙陣皆殊死戰無不以一當百時東北風急毅軍放火煙塵漲天鼓譟之聲震駭京邑謙軍一時奔散後魏幽州刺史孫定兒據州不下衆數萬宇文泰令劉亮襲之定兒以義兵猶逺未爲備亮乃將三十騎先置一纛於近城高嶺即馳入城定兒方高㑹卒見亮至衆皆駭愕亮乃麾兵斬定兒縣首州門號令賊黨仍遥指城外纛命二騎曰岀追大軍賊黨忷懼一時降服隋煬帝爲突厥所圍郡縣皆發兵赴援時唐太宗年未弱冠召募從軍𨽻屯衛將軍雲定興師將發太宗勸之多齎旗鼓設疑兵以威突厥定興不納太宗謂之曰始畢掃其境内敢圍天子本疑國家倉卒無援忽見旗鼓之盛必謂救兵雲集今者進師可前後相次數十里間連亘不絶晝則旛旗夜則金鼓相應以張形勢則必見懼望塵而退此計之上也不然爲彼所輕悉軍來戰公必不能支矣定興從焉將次崞縣突厥候騎馳告始畢曰兵大至矣遂觧圍而退果如所料宋開寳中伐金陵王師自荆渚乘戰艦而下以黄州刺史王明領戰艦爲江路巡檢僞將朱令贇自湖口領兵十五萬連大艦沿流而下將焚采石浮梁直扺金陵爲援明請益舟師以襲令贇上曰非應急之策也令贇朝夕至金陵之圍觧矣乃宻遣人諭明於州浦間多立長木若帆檣之狀令贇望見果疑我師襲其後逗留不進移檄諸軍生擒令贇後魏葛榮舉兵向京師衆號百萬相州刺史李神雋閉門自守爾朱榮率精騎七千人馬皆有副倍道兼行東岀塗口與葛榮遇衆寡非敵葛榮聞之喜乃令其衆辮長繩曰至便縳取之自鄴以北列陣數十里翼張而進榮潛軍山谷爲竒兵分督將以上三人為一處處有數百騎令所在揚塵鼓譟使賊不測多少又以人馬逼戰刀不如棒宻勒軍士馬上各齎棒一枚置於馬側至戰時不聽斬級以棒擊之而已慮廢應援乃分命壯勇所當衝突榮身自䧟陣岀于賊後表裏合擊大破之於陣擒葛榮餘衆悉降隋楊義臣爲朔州總管煬帝即位漢王諒作亂代州總管李景爲漢王將喬鍾葵所圍詔義臣救之義臣自以兵少悉取中軍牛驢得數千頭復令兵數百人人持一鼓潛驅之岀其不意義臣晡後與鍾葵戰兵初合驅牛驢者疾進一時鳴鼓塵埃漲天鍾葵軍不知所爲伏兵發因而大潰縱擊破之後漢虞詡爲武都太守討叛羗羗率衆數千􅃒詡於陳倉崤谷詡停軍不進宣言上書請兵須到乃發羗聞之乃分掠旁縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日增倍之羗不敢逼既到因設伏於淺水掩擊大破之魏文帝至廣陵吴人大駭乃臨江爲疑城自石頭至於江乘架以木幹衣以葦蓆加采石焉一夕而成魏人自江西望甚憚之遂退軍吴孫堅少時與父共載船至錢塘㑹海賊掠取賈人財物方於岸上分之行旅皆住船不敢進堅謂父曰此賊可擊請討之父曰非爾所圖也堅行操刀上岸以手東西指麾若分部人兵以邏􅃒賊狀賊望見以爲官兵捕之即委財物散走堅追斬得一級而還後周齊王憲大舉伐齊憲爲前鋒守雀䑕谷時陳王純屯千里徑宇文椿屯鷄棲原宇文盛守汾水關并受憲節度憲宻謂椿曰兵者詭道汝今爲營不須張幕可伐栢爲庵示有處所令兵去之後賊猶致疑時齊主分軍萬人向千里徑又令其衆岀汾水關自率大兵與椿對宇文盛馳告急憲自救之齊人遽退盛逐之多有斬獲俄而椿告齊衆稍逼憲又救之㑹被勑追還率兵夜返齊人果謂栢庵爲帳幕不疑軍退翌日始悟阿术軍還宋兵邀襄樊間阿术乃自安陽濟江留精騎三千陣牛心嶺復立虚寨設疑兵是夜敵果至斬首萬級戰國魏將田豫率兵追擊鮮卑單將鋭卒深入虜庭胡人衆多鈔軍前後斷絶歸路豫乃進軍去虜衆十餘里結屯營多聚牛馬糞然之從他道引去胡見煙火不絶以爲尚在行數十里乃知之後梁劉鄩圍晉陽將還戒衆曰有病者殺而焚之三軍咸稱不病乃退因選精卒殿後徐而退之至㑹關留數馬及旌旗虛設於高岡之上晉人疑有伏兵遂不敢追時服其謀劉鄩拒晉以晉兵盡在魏州晉陽必虛欲以竒計取之乃潛引兵自黄澤西去晉人怪鄩軍數日不岀寂無聲迹遣騎覘之無斥候者城中亦無煙火但鳥止於壘上時見旗幟循堞往來晉王曰我聞劉鄩用兵一歩百計必詐也更使覘之乃縳旗於芻偶之上使驢負之循堞而行得城中羸老者詰之云軍去已二日矣既而有人自鄴至者言鄩軍已趣黄澤晉王發騎追之時江南東道轉運副使曾昇奏訪聞方臘賊徒雖多全少器械惟以人衆爲技本路所遣官兵各持器械而賊徒獨以數百人前後奮拳輙困官兵童子婦人在前餙以丹黛假爲妖怪以驚我師復在巢穴四面設險隂為䧟穽又爲長人服火衣作關機以動止執矛㦸旗幟飾以丹黛爲鬼神之貌以惑官兵皆不足畏必得􅍄知道路之人詔劄與童貫譚積自此賊情漸虛官兵始知所向以至擒殄開禧用兵諸將皆敗唯畢再遇數有功敵常以水櫃敗我再遇夜縳藁人數十衣以甲胄持旗幟戈矛儼立成行昧爽鳴鼓敵人驚視亟放水櫃旋知其非真也甚沮乃岀師攻之敵大敗又嘗引敵與戰且前且却至於數四視日已晩乃以香料煮黒豆布地上復前搏戰佯爲敗走敵乘勝追逐其馬已饑聞荳香皆就食鞭之不前我師反攻之敵人死者不勝計又嘗與敵對壘度敵兵至者日衆難與爭鋒一夕㧞營去慮來相追乃留旗幟於營并縳生羊置其前二足於鼓上擊鼓有聲敵不覺其爲空營復相持竟日及覺欲追則已遠矣近時流州蠻叛荆湖制司遣兵討之蠻以竹爲箭𫝊以毒藥略着人肉血濡縷無不立死官兵畏之莫敢前乃祖再遇之智裝束藁人羅列焜燿蠻見之以爲官軍萬矢俱發伺其矢盡乃岀兵攻之直𢷬其穴一戰而平後趙將石虎領兵救陳川爲祖逖所敗兵掠豫州留將桃豹守譙城居西臺逖與豹共處一城賊從南門岀入放牧逖軍開東門相守四旬逖以布嚢盛土如米狀使千餘人運上臺又使數人擔米僞爲疲極而息於道賊果逐之皆棄擔而走賊既獲米謂逖衆豐飽而胡戍饑乆益懼無復膽氣宋檀道濟都督征討諸將事與魏軍三十餘戰多㨗軍至歴城以資運竭乃還卒有降魏者具説糧食已罄於是士卒憂懼莫有固志道濟夜唱籌量沙以所餘少米散其上及旦魏軍知資糧有餘故不復追以降者爲妄斬以狥時道濟兵寡弱軍中大懼道濟乃命軍士悉去甲身白服乘輿徐岀外圍魏軍懼有伏不敢逼乃歸道濟雖不尅定河南全軍而返漢景帝時匈奴大入上郡天子使中貴人從李廣勒兵擊匈奴貴人將十騎岀獵見匈奴三人與戰被射傷中貴人走廣廣曰必是匈奴射鵰者也廣乃使百騎往馳三人令其騎張左右翼而廣身射彼三人殺其二人生得一人果射鵰者也遥見匈奴有數千騎見廣以爲誘騎驚上山陣廣所從百騎皆大恐欲馳還走廣曰吾去大軍數十里今若走匈奴追射我立盡若我留匈奴必以爲大軍之誘必不敢擊我廣令諸將曰前未到匈奴陣二里所止皆下馬觧鞍其騎曰虜多且近即有急奈何廣曰彼虜以我爲走今皆觧鞍示不走用堅其意胡騎遂不敢擊有白馬將岀䕶其兵於是廣上馬與十餘騎奔射殺之復還其騎中觧鞍令士皆縱馬卧是時㑹暮胡兵終怪之卒不敢擊向夜半時胡兵以爲漢有伏軍於旁皆引兵去詰朝廣乃歸其大軍曹操軍臨漢中蜀將趙雲將數十騎輕行卒與操大軍遇遂前突其陣且鬭且却操軍追至營雲更大開門偃旗息鼓操軍疑有伏引去蜀諸葛亮屯陽平遣魏延并兵東下亮惟留萬人守城魏將司馬懿率二十萬衆拒亮而與魏延軍相錯徑前六十里傎候白懿說亮城中兵少力弱將士失色亮是時意氣自若勒軍中皆偃旗赴鼓不得岀菴幔開四門掃地却灑懿疑其有伏於是引軍北􅃐山亮謂叅佐曰司馬懿謂吾有疆伏循山走矣候邏還白如亮所言懿後知深以爲恨南齊將馮道根守阜陵理城隍遠斥候有如敵將至者衆頗笑之道根曰怯防勇戰此之謂也理城未畢會魏將率兵二萬奄至城下道根塹壘未固城中衆少衆皆失色道根命開門緩服登城選精鋭二百人岀與魏將戰敗之魏將于謹嘗率輕騎出塞覘候屬鐵勒數千騎奄至謹以衆寡不敵退必不免乃散衆騎使匿從薄間又遣人升山指麾若部分軍衆者鐵勒望見雖疑有伏兵既恃其衆不以為慮乃進軍逼謹謹嘗乘駿馬為紫駒賊先所識乃使二人各乗一馬突陣而出賊以為謹也皆争逐之謹乃率餘軍擊追賊遂奔走因得入塞前凉張重華以謝艾為軍師率騎三萬進軍臨河後趙石季龍將麻秋以三萬衆拒之艾乗軺車冠白幍鳴鼓而行秋望而怒曰艾年少書生冠服如此輕我也命黒矟龍攘三千人馳擊之艾左右大擾或勸艾乗馬艾不從乃下車據胡床指麾䖏分賊以為有伏發也懼不敢進又遣將縁河截其後秋軍乃退艾乗勝奔擊遂大敗之西魏宇文㤗與東魏髙歡戰於印山趙貴為左軍若于惠為右軍歡兵萃左軍趙貴等戰不利㑹日暮歡進兵攻惠惠擊之皆披靡至夜惠引去歡騎復来追之惠徐下馬顧命厨人營食食訖謂左右曰長安死此中死有以異乎乃建旗鳴角收敗軍徐還歡追騎惮惠疑有伏兵不敢逼唐吐蕃䧟𤓰州王君㚟死河西恟懼以張守珪為𤓰州刺史領餘衆方復築州城賊又暴至畧無守禦之具守珪曰彼衆我寡又創痍之後不可以矢石相持須以權道制之乃於城上置酒作樂以㑹將士賊疑城中有備不敢攻城而退守珪總兵擊敗之宋將雷有終討蜀賊李順進至廣安軍軍壘瀕江三面立栅㑹夜隂晦賊衆奄至鼓譟舉火士伍恐懼有終安坐櫛髪氣貌自若賊既合圍有終引竒兵岀其後擊之賊衆驚擾赴水死者無算先聲漢王遣韓信破陳餘後信募致廣武君李左軍師事之韓信曰僕欲北攻燕東伐齊若何而有功對曰今將軍渉西河虜魏王豹一舉而下井陘不旬朝破趙二十萬衆名聞海内威振天下此將軍之所長也然而衆勞卒罷其實難用今將軍欲舉倦弊之兵頓之燕堅城之下欲戰恐乆力不能㧞情見勢屈曠日糧竭而弱燕不服齊必拒境以自彊燕齊相持而不下劉項之權未有所分也若此者將軍之所短也臣聞善用兵者不以短擊長而以長擊短爲將軍計莫如按甲休兵鎮撫其孤百里之内牛酒日至以饗士大夫醳兵北首燕路而後遣辯士奉咫尺之書暴所長於燕燕必不敢不聽從燕已從使者東告齊齊必從風而服雖有智者亦難為齊計矣如是則天下事可圖也兵固有先聲而後實者此之謂也韓信並從之燕齊從風魏鄧艾既平蜀言於司馬昭曰兵有先聲後實者今因平蜀以乘吴吴人震恐席卷之時也然大舉之後將士疲勞不可便用且徐緩之煮鹽興冶爲軍農要用並作舟船然後發使告以利害吴必歸化可不征而定也㑹艾誅不果行聲春秋晉侯伐齊齊侯禦諸平隂塹防門而守之廣里晉將范宣子告齊大夫析文子曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入既許之矣若入君必失國子盍圖之子家以告公公恐晏嬰聞之曰君固無勇而又聞是弗能乆矣齊師夜遁趙石勒荆州監軍郭敬冦晉襄陽勒驛令敬退屯樊城戒之使偃藏旗幟寂若無人彼若使人觀察則告之曰自愛堅守後七八日大軍將至相禁不復得走敬使人浴馬於津周而復始晝夜不絶偵諜還晉南中郎將周撫以爲勒大軍至懼而奔於武昌敬遂入襄陽梁雍州刺史嶽陽王蕭詧雖稱藩於西魏而尚有二心西魏將楊忠自樊城觀兵於漢濱揚旗逓進實騎二千詧登樓覩以爲三萬懼而服焉後唐將李存審初爲都指揮使梁太祖北伐至棗强存審以騎兵三千屯於趙州初梁君聲言五十萬存審以兵少不敵心頗憂之謂禆將趙行實曰但得老賊在東别將西來尚可從容畫䇿不旬日楊師厚攻棗强賀德倫冦蓨縣攻城甚急存審謂趙行實曰吾王方事北面南鄙之事付我等數人今西道無兵蓨縣危急我等坐視其弊何以自安老賊既不下蓨城必西冦深冀不預爲方畧則滋蔓難圖與公等輕騎而行觀其所向乃選精騎八百急􅃐信都扼下博橋道存審令史建塘李嗣肱分兵拒守建塘分麾下五百騎爲五軍一軍至衡水一軍至南宫一軍至信都一軍至阜城自將一軍深入各命俘賊討芻糧者十人而㑹於下博橋期曰諸軍所至遇梁軍之樵芻者數百人皆殺之留數人㫁臂縱去曰爲我語朱公晉王大軍至矣時梁祖引師厚兵就德倫共攻蓨縣始至縣西未及置營嗣肱建塘各領百餘騎爲賊旗幟服色與芻糧者相雜而行至暮及賀德倫營門殺其門者縱火大呼俘斬而旋其芻蕘者㫁臂得歸皆言唐兵大至梁祖大駭遂命夜遁後漢末劉備遣將吴蘭屯下邳曹公遣曹洪征之備遣張飛屯固山欲㫁軍後衆議狐疑洪曰賊實㫁道當伏兵潛行今反張虛聲此其不能也冝及其未集縱擊蘭蘭破則飛必走乃集兵擊蘭大破之飛果走劉裕率兵伐南燕慕容超走廣固且乞師於秦裕築圍守之秦王姚興遣使告裕曰慕容氏相與鄰好又以窮告急今當遣鐡騎十萬徑據洛陽晉軍若不退者便當長驅而進裕乃呼興使者謂曰語汝姚興我滅燕之後息甲三年當平關洛今能自送便可速來劉穆之後聞興使馳入見裕而秦使已去裕以興所送并答語示穆之穆之尤之曰常日事無大小必同與謀此宜善詳云何率爾便答此語未能威敵適重彼怒耳若燕未可㧞興救奄至不審何以待之裕笑曰此是兵機非卿所觧故不語耳夫兵貴神速彼若審能遣救必畏我知寜容先遣信命此是其見我伐燕内已懐懼自彊之辭耳興果不岀師廣固終㧞擒慕容超平齊地宋雍州刺史袁顗舉兵反㳂流入鵲尾與官軍相持既乆軍主張興世越鵲尾上據錢溪顗黨劉胡攻之不下遣人傳唱錢溪已下官軍並懼沈攸之曰不然若錢溪實敗萬人中要應有逃亡得還者必是彼戰失利唱空聲而以惑衆心耳勒軍中不得輙動錢溪㨗報㝷至果大破賊攸之悉以錢溪所送胡軍耳鼻示之顗駭懼急追胡還遂敗之降戰國燕軍大破齊國齊將田單守即墨知士卒可用乃身操板挿與士卒分功妻妾編行伍之間盡散飲食饗士令甲卒皆伏使老弱女子乘城遣約降於燕燕軍皆呼萬嵗田單又收民金得千鎰令即墨富豪遣使遺燕將書曰即墨即降願無掠虜吾族家妻妾令安堵燕將大喜許之燕軍由此益懈田單岀軍擊大敗之項羽圍榮陽漢王請和割滎陽以西者爲漢以東者爲楚亞父勸項王急攻滎陽漢王患之紀信曰事急矣臣請誑楚可以間岀於是陳平夜岀女子東門二千餘人楚因擊之紀信乃乘王車黄屋左纛曰食盡漢王降楚軍皆呼萬嵗之城東觀以故漢王得與數十騎岀西門逃遁曹操入荆州劉琮降得水軍歩兵十萬孫權與操遇於赤壁部將黄蓋曰今冦衆我寡難與持乆觀操方連船艦首尾相接可燒而走也乃先書報欲降曹軍吏士皆引頸相望指言蓋降蓋放諸船同時發火時風猛煙熖漲天人馬燒溺死者甚衆晉將李矩守榮陽城前趙劉聰將劉暢歩騎三萬討矩屯於韓王故壘相去七里遣使招矩時暢卒至矩未暇爲備遣使奉牛酒詐降於暢潛匿精勇見其老弱暢不以爲虞大饗染師人皆醉飽矩謀夜襲之暢僅以身免周魴爲鄱陽太守被命宻求山中􅃇族名帥爲北敵所聞知者令詭挑魏揚州牧曹休魴答恐民帥小醜不足仗任事或漏泄不能致休乞遣親人齎牋七條以誘休且曰今使君若從皖道進住江上魴當從南對羊歴口為應未到江岸可住百里土令此間民知北軍在彼即自善也此間民非苦饑寒而甘兵冦苦於征討樂得北屬但窮困舉事不時見應㝷受其禍耳如使青徐諸軍首尾相銜牽綴彼兵使不得速退者則善之善也魴生於江淮長於時事見其便利百舉百㨗時不再來敢布腹心休果信魴帥歩騎十萬輜重滿道徑來入皖魴亦合衆隨陸遜横截休休幅裂瓦觧所獲萬計魴初建密計時頻有郎奉詔諮問諸事魴乃詣部郡門下因下髪謝故休聞之不復疑慮事㨗振旅帝大㑹諸將歡飲酒酣謂魴曰君下髪載義成孤大事君之功名當書之竹帛加禆將軍賜爵關内侯後魏崔延伯既破秦賊乃與蕭寳寅率衆㑹於安定甲卒十二萬鐡馬八千疋軍威甚盛時万俟醜奴置營涇州西北七里當元城時或輕騎蹔來挑戰大兵未交便爾奔北延伯矜功負勝遂唱議先驅伐木别造大排内爲鎻柱敎習強兵負而趨走號為排城戰士在外輜重居中自涇州緣原北上衆軍將岀未戰之間有賊數百騎詐持文書云是降簿乞且緩師寳寅延伯謂其事實逡巡未鬭俄而宿勒明逹率衆自東北而至乞降之賊從西競下諸軍前後受敵延伯兵力疲怠賊乃乘間得入排城延伯軍大敗西魏宇文泰與東魏高歡戰於卬山泰軍不利禆將于謹率其麾下僞降立於路左歡乘勝逐北不以為虞追騎􅂈盡謹乃自後擊之敵人大駭獨孤信又收集兵士於後突擊歡軍亂以此西魏得全而退唐史思明䧟洛陽賊鋒甚盛副元帥李光弼守河陽謂李抱玉曰將軍能為我守南城二日乎抱玉曰過期若何光弼曰過期而救不至任棄城也賊師周摯先攻南城將䧟之抱玉乃紿之曰吾糧盡明日當降賊衆大喜斂軍以候之抱玉因得繕完設備明日堅壁請戰賊怒欺紿急攻之抱玉岀竒兵表裏夾攻殺傷甚衆摯軍退光弼自將於中潬城摯捨南城攻中潬不勝乃整軍將攻北城光弼以兵岀戰大敗之宋夏州李繼遷遁在斤澤都巡檢曹光實選精騎襲之繼遷僅以身免獲其母妻於是繼遷復結婚於豪酋轉徙伏匿浸以强盛使人紿光實曰我數奔北勢窘不能自存矣公許我降乎因陳舅甥之禮期某日於葭蘆州降光實信之且欲擅其功故不與人謀至期繼遷設伏止領十數人近城迎光實從百騎赴之繼遷前𨗳北行至其地忽舉手揮鞭伏兵盡起光實被害秦末天下兵起沛公西入武關欲以二萬人擊秦嶢關下軍張良曰秦兵尚彊未可輕也臣聞其將屠者子賈豎易動以利願且留壁使人先行為五萬人具食益張旗幟諸山之上為疑兵令酈食其持重寳㗖秦將秦將果欲連和俱西襲咸陽沛公欲聽之良曰此獨其將欲叛士卒恐不從不從必危不如因其懈擊之沛公乃引兵擊之秦軍大敗隋末宇文化及弑煬帝後率兵來攻李密於黎陽密知化及糧且盡偽與和以弊其衆化及弗之悟大喜恣其兵食冀密饋之㑹密下有人獲罪亡投化及具以密情告化及大怒其食又盡乃渡永濟渠與密戰於童山之下自辰逹酉密為流矢所中頓於汲縣化及掠汲郡北趣魏縣其將王智畧等率部衆歸於密者前後相繼唐貞元三年吐蕃結賛入冦為李晟邀擊之又襲破其摧沙堡深恨晟及渾瑊馬燧欲隂計圖之乃卑詞厚禮告馬燧請重立盟誓則蕃軍引去德宗不許燧自入朝言之上令崔翰入蕃報結賛言還我鹽夏二州則同盟結賛曰清水之㑹同盟人少是以和好輕慢不成今蕃相及元帥已下凡二十一人赴盟靈州節度杜希全涇原李觀皆和善守信境外重之此時須令預盟翰約盟於清木結賛曰清水非吾地請盟於原州土棃樹盟畢則歸二州翰歸備奏其事神䇿將馬有麟奏曰土梨樹地多險阻恐蕃有軍隠伏不利不如平凉其地坦平且邇涇州為便帝從之詔報以希全只在靈州李觀又已改官今遣侍中渾瑊充盟㑹使崔漢衡副之鄭叔矩為判官瑊統兵二萬又詔華州節度駱元光以本鎮兵從瑊瑊與結賛初約以兵三千列於壇之東西是時蕃軍精騎數萬列壇西結賛又請瑊以下具衣冠佩劍瑊等入幕次坦無他慮結賛伐鼓三通其衆呼譟而進瑊遽岀自幕後偶得他馬跨而奔馳追騎雲合流矢雨集崔漢衡已下六十餘人皆䧟於賊退漢劉表遣劉備北侵至鄴曹操遣夏侯惇李典拒之一朝備燒屯去惇遣諸軍追擊之典曰賊無故退疑必有伏南道窄狹草木深不可追也不聽惇等果入賊伏裏戰不利典往救備見救至乃退魏太和三年孫權揚聲欲向合肥征東將軍滿寵禦之兖豫諸軍皆集權等退詔罷兵寵以為今賊大舉而還非本意也此必欲偽退以罷吾兵而倒還乘虛掩不備也表不罷兵後十餘日權果再到合肥城下不克而還東晉末妖賊孫恩北岀海鹽時劉裕拒之築城於海鹽賊日來攻城城内兵力甚弱裕深慮之乃一夜偃旗匿衆若已遁者明早開門使羸疾數人登城賊遥問劉裕所在曰夜已走矣賊信之乃率兵衆大入城裕乘其懈怠奮擊大破之後凉吕光遣將吕延伐西秦大破之乞伏乾歸泣歎曰死中求生正在今日乃縱反間稱乾歸東奔成紀吕延信之引師輕進司馬耿稚諌曰乾歸雄勇過人權畧難測破王廣尅楊定皆羸師以誘之雖蕞爾小國不可輕也困獸猶鬭况乾歸乎今宜布陣而前歩騎相接徐候諸軍大集可一舉滅之延不從而戰敗北凉主沮渠䝉遜伐西凉李歆於酒泉先攻浩亹蛇盤於帳前䝉遜笑曰前一為螣蛇今盤在吾帳天意欲吾回師先定酒泉乃燒攻具而還次於川嵒聞歆集兵欲攻張掖䝉遜曰入吾計矣但恐間吾回軍不敢前也兵事尚權乃露布西境稱得浩亹將進軍黄谷歆聞而大恱進入都瀆澗䝉遜潛軍逆之敗歆於懐城遂進尅酒泉後魏將慕容白曜南征宋以酈範為副師以無鹽宋將申纂慿城拒守議者僉以攻具未周不宜便進範曰輕軍遠襲深入敵境無宜淹留以失機候且纂必以我軍來速不在攻守謂方城可慿弱卒可恃令若外潛威形内整戎旅密勵將士岀其不意可以攻而尅之白曜遂潛軍偽退示以不攻纂果不設備於是即夜部分晨便攻城崇朝而克後魏末幽州刺史劉靈助以莊帝被爾朱兆所弑遂舉兵唱義諸州豪右咸相通結靈助進屯於定州之安國魏遣將叱列延慶討之諸將謂延慶曰靈助善卜筮百姓信惑所在響應未易可圖若萬一戰有利鈍則大事去矣未若還師西入據關拒險以待其變延慶曰劉靈助庸人也天道深遠豈其所識大兵一臨且彼皆恃其妖術坐㸔符厭寜肯戮力致死與吾争勝負哉如吾計者正欲岀營城外説言西歸靈助聞之必信而自寛潛軍往襲可一舉而擒乃岀頓城西揚聲將還簡精騎一千夜發詰朝造靈助壘戰於北城遂破擒之西魏末大將軍史寜與突厥木杆可汗同伐吐谷渾遂至樹敦樹敦耶吐谷渾之􅃇都多諸珍藏而其主先已奔賀真誠留其征南王及數千人固守寜進攻之偽退吐谷渾人果開門逐之因迴兵奪門門未及闔寜兵遂得入生擒其征南王俘虜男女財寳盡歸諸突厥西魏宕昌羗獠甘作亂逐其王彌定魏將史寜討破之甘將百騎走投生羗鞏廉王彌定遂得復位寜以未獲獠甘密欲圖之乃揚聲欲還甘聞之復招引叛羗依山起栅欲攻彌定寜謂諸將曰此羗入吾術中當進兵擒之耳遂進獠甘衆至與戰大破之并獲鞏廉王隋雋州烏蠻反遣周法尚討之軍將至賊棄州城走散岀谷間法尚捕不能得於是遣使慰諭假以官號偽班師日行二十里軍在舎潛遣人覘之知其首領盡歸柵聚飲相歡法尚遣歩騎數千人襲擊破之海都犯邊巴延留拒之廷臣有譖巴延乆居北邊與海都通好無尺寸之功者詔以御史大夫伊實特穆爾代之居巴延於大同以俟後命伊實特穆爾未至三驛㑹海都兵復至巴延遣人伊實特穆爾曰公姑止待我翦此冦而來未晩也巴延與海都交兵且戰且却凡七日諸將以為怯憤曰果懼戰何不授軍於大夫巴延曰海都懸軍渉吾地邀之則遁誘其深入一戰可擒也諸將必欲速戰若失海都誰任其咎諸將曰請任之即還軍擊敗之海都果脱去乃召伊實特穆爾至軍授以印而行詭聲春秋時華登帥吴師以敗宋師公欲岀厨人濮曰吾小人可藉死而不能送亡君請待之乃狥曰楊徽者公徒也衆從之公自楊門見之下而巡之曰國亡君死二三子之恥也豈專孤之罪也齊烏枝鳴曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劍從之華氏北復即之厨人濮以裳裹首而荷以走曰得華登矣遂敗華氏於新里隋末楊𤣥感反攻東都刑部尚書衛文升與𤣥感戰兵始㑹𤣥感詐令人大呼曰官軍已得𤣥感矣官軍稍怠𤣥感與數千騎乗之文升於是大敗詭形東漢袁紹將許攸降曹操因説曰袁氏輜重有萬餘騎屯軍無嚴備今以輕兵襲之不虞而至燔其積聚不􅂈三日袁氏自敗矣操大喜選鋭歩騎皆用袁氏旗幟銜枚縳馬日夜從間道出人抱束薪所歴道有問者應曰袁公恐曹操掠鈔後軍還兵以益備聞者信以為然皆自若既至圍屯大放火營中驚亂大破之盡燔其糧糓及寳貨後周宋楊堅輔政周大將尉遲逈在河北拒命河南州縣多從逈堅遣將于仲文討之逈將檀譲屯成武别將高士儒以萬人屯永昌仲文詐移書州縣曰大軍將至可多積粟讓謂仲文未能卒至方槌牛享士仲文知其怠選精騎襲之一日便至遂㧞成武逈將席毗羅衆十萬屯於沛縣將攻徐州其妻子在金鄉仲文遣人詐為毘羅使者謂金鄉城主徐善凈曰檀讓明日午時到金鄉將宣蜀公令即尉遲逈賞賜將士金鄉人謂為信然皆喜仲文簡精兵偽建逈旗幟倍道而進善凈遥見仲文且至以為檀譲乃岀迎謁仲文執之遂取金鄉諸將多勸屠之仲文曰此地是毘羅起兵之所當寛其妻子其兵可自歸如即屠之彼望絶矣衆皆稱善於是毘羅恃衆來薄官軍仲文背城結陣岀軍數里設伏於麻田中兩陣纔合伏兵俱發曵柴鼓譟塵埃漲天毘羅軍大潰仲文乘之賊皆投洙水而死水為之不流獲檀讓檻送京師江南悉平與吕䝉襲南郡恤關羽之衆戚屬同五代梁將戴思逺攻徳勝北城莊宗命李嗣源設伏於戚城令騎軍挑戰梁軍大至莊宗率中軍以禦之時李從珂偽為梁幟奔入梁壘斧其望樓持級而還梁軍愈恐歩騎漸至李嗣源以鐡騎三千乘之梁軍大敗俘斬二萬計梁葛從周圍兖州兖人不岀從周詐揚言并人鄆人來救即引兵趨高吴夜半潛却歸砦朱瑾果岀兵攻外壕我軍士突岀掩殺千餘人生擒都將孫漢筠五代漢除趙暉鳳翔節度屬王景崇叛據岐山不受代朝廷命暉統兵討之時李守正叛於蒲趙思綰據於雍與景崇迭相為援乃引蜀軍岀大散關勢不可遏暉數戰而勝然後塹而圍之暉屢使人挑戰賊終不岀暉乃潛使千餘人於城南一舎之外擐甲執兵偽為蜀兵旗幟循南山而下詐令諸軍聲言川軍至矣景崇令數千人潰圍而岀以為應援暉設伏而待一鼔盡殪之自是景崇膽破無復敢岀明年春擒之宋雍熈初張齊賢知代州敵騎自胡谷入冦薄城下神尉都校馬正以所部列南門外衆寡不敵副都署盧漢斌畏懦保壁自固張齊賢選廂軍三千岀正之右誓衆感慨一以當百敵遂却走循胡盧河南而西先是約都部署潘美以并師來㑹戰無何間使為敵所得齊賢以師期既漏且虞美之衆為敵所乘俄而美有使至云師出并州行四十里至栢井忽得密詔東路王師衂於君子館有詔并之全軍不得岀戰已還州矣于時敵騎塞川齊賢曰敵知美之來未知美之退乃閉其使密室中夜發兵二萬人持一幟負一束芻距州城西南三十里列幟燃芻敵遥見之火光中有旗幟意謂并師至矣駭而北走齊賢先伏歩卒二千於土墱砦掩擊大敗之擒其北大王之子一人帳前舎利一人斬數百級獲馬千餘器甲甚衆賢歸功漢斌㨗奏至太宗嘉之優詔褒美死戰秦末秦軍攻趙兵項羽救之引兵渡河皆沉船破釜甑燒廬舎持三日糧以示必死無一還心於是至則圍秦將王離九戰絶其甬道大破之虜王離當是時楚兵冠諸侯諸侯軍救鉅鹿下者十餘壁皆莫敢縱及楚擊秦諸將皆從壁上觀楚戰士無不一當十楚兵呼聲動天地諸侯軍無不人人惴恐漢韓信擊趙使萬人先行岀背水陣趙軍望見大笑平明信建大將旗鼓鼓行岀井陘口趙開壁擊之良乆信走水上軍皆殊死戰不可敗遂破趙軍擒趙王歇諸將因問信曰兵法右背山陵前左水澤今者將軍令臣等反背水陣此何術也信曰此在兵法顧諸君不察耳兵法不曰䧟之死地而後生置之亡地而後存乎且信非得素拊循士大夫此所謂驅市人而戰也其勢非置死地使人人自為戰即與之生地皆走寜尚得而用之乎諸將皆曰非所及也宋武帝作相舉兵伐後秦姚泓以王鎮惡為前鋒而鎮惡至潼關請率水軍自河入渭直至渭橋鎮惡所乘皆䝉衝小艦行船者悉在艦内泝渭而進艦外不見行船人北土素無舟楫莫不驚以為神鎮惡既至令將士食畢便棄船登岸渭水流急倐忽間諸艦悉逐流去時泓屯軍在長安城猶數萬人鎮惡撫慰士卒曰卿諸人并家在江南此是長安城北門外去家萬里而舫乘衣糧已遂流去豈復有求生之計耶惟宜死戰可立大功不然則無遺類耳乃身先士卒衆亦知無復退路莫不騰勇爭先泓衆一時奔潰即䧟長安城梁將陳慶之守渦陽城與魏將相持自春至冬數百戰師老氣衰魏之援兵復欲築壘於軍後諸將恐腹背受敵議退師慶之曰兵來至此渉歴一歲縻費糧仗其數極多諸軍並無鬭志皆謀退縮豈是欲立功名直聚為鈔暴耳吾聞致兵死地乃可求生須虜圍合然後與戰諸將壯其計從之魏人掎角作十三城慶之銜枚夜出䧟其四壘所餘九城兵甲猶盛乃陳其俘馘鼓譟而攻魏師遂大奔潰斬獲畧盡唐昭宗時幽州劉仁恭率軍士十萬冦魏州屠其郡梁將葛從周自邢臺馳入魏州燕軍突之上水關攻館陶門從周與卒五百騎出戰謂門者曰前有敵不可返顧命闔其門從周極力死戰大敗燕人乘勝晉杜預襲吴樂鄉虜都督孫歡州郡皆望風歸命奉送印綬時衆軍㑹議或曰百年之冦未可盡克今向暑水潦方降疾疫將起冝候來冬更為大舉預曰昔燕樂毅藉濟西一戰以併强齊今王師兵威已振譬如破竹數節之後迎刅而觧也遂指授郡帥直指秣陵所過城邑莫不束手遂平吴先議者慙而謝焉東晉將周訪討賊杜曾曾大潰殺千餘人訪夜追之諸將請待明訪曰曾驍勇能戰向之敗也彼勞我逸是以尅之宜及其衰乘之可滅鼓行而進遂以定漢沔十六國蜀李特攻晉將張徴徴軍潰特議欲釋徵還涪諸將進曰徴軍速戰士卒傷殘智勇俱竭宜因其弊遂擒之若舎而寛之徴養兵收亡餘衆更合圖之未易也特從之復進攻徵潰圍走特遣將水陸追之遂害徴生擒徵子存以徵䘮還之唐武德初劉武周據太原使其將宋金剛屯河東太宗往征金剛遁走太宗追擊大破之乗勝逐北一日一夜行二百里轉戰十合士卒疲弊至高壁嶺總管劉𢎞基執馬諌曰糇糧已竭士卒疲頓願且停營待兵糧咸集而後戰太宗曰功者難成而易敗機者難得而易失金剛走到汾州衆心已沮我及其未定當乘其勢擊之此破竹之勢也如是更遲留賊必生計此失機之道也遂䇿馬去諸軍乃進莫敢以饑乏為辭夜宿於雀䑕谷之兩原太宗不食二日不觧甲三日軍中苦饑此夕惟有一羊太宗撫將士與之同食三軍感恩皆饑而思奮明日趨汾州金剛列陣南北七里以抗官軍太宗遣總管李勣等當其北翟長孫等當其南親御大軍以臨之諸軍戰小却為賊所乘太宗率精騎三千直趨金剛賊衆大潰遂破之太宗破薛仁果將宗羅睺於高摭乗勝率二千餘騎追之竇軌苦諌曰仁果猶據堅城雖破羅睺未可輕進請按兵以俟其變太宗曰慮之乆矣破竹之勢不可失也賊大軍已敗餘衆何足為虞兇魁之計盡於此矣遂率衆而進至夜半軍臨城守埤者皆亂爭自投而下仁果窮蹙開門請降諸將奉賀因問曰始大王野戰破其將其主尚保堅城王無攻具輕騎騰逐不待歩兵徑薄城下咸疑不克而竟下之何也太宗曰此以權道迫之使其計不暇發以故尅也宗羅睺恃往昔之勝兼復養鋭日乆見吾不岀意在相輕今喜吾出悉兵來戰雖擊破之擒殺盖少若不急躍還走投城仁果收而撫之則便未可得矣且其兵衆皆隴西人一敗退不及回顧散歸隴外則折摭自虛我軍隨而迫之所以懼而降也此可謂成算諸君蓋不見耶諸將曰此非凡人所能及也郭子儀擊賊將李歸仁大破之日暮僕固懐恩謂子儀曰賊必棄城走請以二百騎追之縛取李歸仁安守忠子儀曰將軍戰亦疲矣且休迨明而圖之懐恩曰歸仁守忠天下驍賊也驟勝而敗此天與我也奈何縱之不取若始得衆復為我患雖悔無及夫戰尚速何明日為子儀固止之令還營懐恩固請往而復返一夕而四五起遲明諜至守忠等果遁朱泚之亂賊驍將張庭芝逼栅求戰李晟謂諸將曰吾恐賊不出今冐死而來天贊我也勒諸將縱兵擊之時駱元光領華州兵營在北兵少賊併力攻之晟遣李演孟華以精卒救之中軍鼔譟演力戰大破之殭屍滿地翌日將復出師諸將請待西軍至則左右夾攻晟曰賊既傷敗須乗勝撲滅若俟其有備豈王師之利哉晟乃號令誓師畢陣於光泰門外使王佖李演率騎軍史萬頃領歩卒直扺苑牆先是夜使人開苑牆二百餘歩至是賊已立木柵賊倚柵拒戰晟叱軍士曰安得縱賊如此當先斬公等萬頃懼先登㧞柵而入王佖騎軍繼進賊奔潰大軍分道並入驅蹙至於白華忽有賊騎千餘出於官軍之背晟以麾下百餘騎馳入左右呼曰相公來賊聞之驚潰官軍追斬不可勝計朱泚姚令言遁走其餘兇黨相率來降魏諸葛誕據夀春反魏將王基討之司馬昭欲遣諸將輕兵深入招遞吳將唐闕子弟因舋有蕩覆吳之勢基諌曰昔吳將諸葛恪乗東闕之勝竭江表兵以圍新城城既不㧞而衆死者大半蜀將姜維因洮上之利輕軍深入糧餉不繼軍覆上邽夫既勝之後必輕敵則慮難不深今賊新敗於外又内患未弭是其修政設慮之時也且兵出踰年人有歸心今俘馘十萬罪人斯得自歴代征討未有全兵獨克如今之盛者也昔武皇帝破袁紹於官渡自以所獲已多不復追奔懼挫威也從之後周武帝伐齊軍次并州齊將安德王延宗擁兵四萬出城拒帝帝率諸軍合戰齊人退帝乘勝逐北率千餘騎入城東門令諸軍繞城置陣至夜延宗率其衆排車而前城中軍却人相蹂踐大為延宗所敗死傷略盡齊人欲閉門以門下積屍扉不得闔帝從數騎﨑嶇危嶮僅乃得出至明率諸軍更戰大破之擒延宗并州平周武窮兵幾於不濟狄青破儂智高智高兵敗奔邕州其下皆欲窮其窟穴青亦不從以謂趨利乘勢入不測之城非大將事智高因而獲免天下皆罪青不入邕州脱智高於垂死然青之用兵主勝而已不求竒功故未常大敗計功最多卒為名將譬如奕棋已勝敵可止矣然猶攻擊不已往往大敗此青之所戒也臨利而能戒乃青之過人處兩敵梁司州刺史桞仲禮留其長史馬岫守安陸自率歩騎一萬冦西魏襄陽西魏將楊忠率衆南伐攻梁隨郡克之進圍安陸仲禮聞隨郡䧟恐安陸不守遂馳歸赴援諸將恐仲禮至則安陸難下請急攻之忠曰攻守殊勢未可卒㧞若引日勞師表裏受敵非計也南人多習水軍不閑野戰仲禮迴師已在近路吾出其不意以竒兵襲之彼怠我奮一舉必克則安陸不攻自㧞諸城可傳檄而定也於是選騎二千銜枚夜進遇仲禮於漴忠親自䧟陣擒仲禮悉俘其衆安陸及竟陵郡皆降如忠所䇿唐武德中太宗圍王世充於東都世充勢窮竇建德自河北來救諸將及蕭瑀等咸請且退師避之太宗不許曰世充糧盡内外離心我當不勞攻擊坐收其弊耳建德新破孟海公將驕卒惰今我據武牢扼其襟要若賊恃勝冐險爭鋒吾當破之必矣賊若不戰旬日之間世充自潰彼敗我振兵足以臨之矣一行兩定在於斯舉若不速進賊入武牢諸城新附必不能守二賊并力將若之何秦府記室薛收進曰王充據東都府庫填積所患者在於乏食是以為我所持建德總十萬餘衆來拒王師亦當盡彼驍雄期於速戰若聽縱其至此兩冦相連轉河北之積以相資給則伊洛間戰鬪不已大王今欲親率猛鋭先據成臯之險訓兵坐甲當彼疲弊之衆一戰必尅建德破則世充自下不過數旬二國之君可面縳麾下蕭瑀等奈何遂請退兵太宗曰善而從之留齊王元吉圍王世充親率三千五百人趨武牢守之不與戰相持二十餘日建德謀伺官軍芻盡牧馬於河北將襲武牢太宗聞之遂牧馬千餘匹於河渚間以誘之詰朝建德果悉衆而至陣於泥水東太宗候其陣乆卒饑令宇文士及率騎經賊陣之西馳而南上賊陣動因而諸軍奮擊之大潰竟如太宗本䇿退據隋末唐高祖義師發太原次靈石縣賈胡堡隋將宋老生率精兵二萬屯霍邑以拒之㑹乆雨糧盡與長史裴寂及諸將議曰宋老生頓霍邑屈突通鎮河東二人同心非造次可進欲且還太原以圖後舉太宗曰本興大義以救蒼生當須先入咸陽號令天下今遇小敵便即班師將恐義徒一朝觧體還守太原一城之地此為賊爾何以自全高祖乃止太宗引師赴霍邑遂平老生武后初徐敬業舉兵於江都稱匡復皇家以􅉦厔尉魏思温為謀主問計於思温對曰明公既以太后幽執少主志在匡復兵貴神速但宜早度淮北親率大衆直入東都山東將士知公有勤王之舉必以死從此則指日刻期天下必定敬業將從其䇿薛璋又説曰金陵之地王氣已見宜早應之兼有大江設險足可以自固請且攻取常潤等州以爲王霸之業然後率兵北上鼓行而前此則退有所歸進無不利實為良算也敬業以為然乃自率兵四千人南度以擊潤州思温密謂杜求仁曰兵勢宜合不可分今敬業不知并力度淮率山東之衆以取洛陽是必無能成事已可知敬業㝷已悔之所以遂敗苦戰春秋時晉師伐齊陣於鞌晉觧張御郤克鄭丘緩為右及戰郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之緩曰自始合茍有險余必下推車子豈識之然子病矣張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事若之何其以病敗君之大事也擐甲執兵固即死也病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之齊師敗績逐之三周華不注晉劉裕率兵伐後秦姚泓後魏遣將鵞青等歩騎十萬屯河北常有數千騎緣河隨晉軍進止時晉軍人緣河南岸牽百丈河流迅急有漂度北岸者輙為魏人所殺掠遣軍纔過岸即退軍還復來裕乃遣白直隊主丁旿率七百人車七百乘於河北岸上去水百餘歩為却月陣两頭抱河車置弓弩畢使立一白眊魏人初不觧其意并未動裕先命將朱超石戒嚴二千人白眊既舉超石馳往赴齎大弩百張一車益二十人設柵排於轅魏人見營陣乃進圍營超石先以軟弓小箭射之魏軍四面俱走攻營於是百弩俱發又遣善射者叢射之魏衆既多弩不能制超石初行别齎大鎚并千餘張矟乃斷矟長三四尺以鎚鎚之一矟輙洞貫三四人魏衆不能當遂奔潰梁武帝遣曹仲宗等攻魏渦陽又以韋放為明威將軍總兵㑹之魏大將費穆帥衆掩至放軍營未立麾下止有二百餘人放從弟洵驍果有勇力單騎擊刺屢折魏軍洵馬亦被傷不能進放胄又貫三矢衆失色請放突去放厲聲叱之曰今日惟有死耳乃免胄下馬據胡牀處分士卒皆殊死戰莫不一當百逐北大破之諸營壘一時奔潰敗晉末河間王顒在關中遣將張方討長沙王乂方率衆屯河南乂遣左將軍皇甫商拒之而敗張方率兵入洛陽乂奉惠帝討方於城内方軍遥見乘輿於是引退止之不得衆遂大敗方退壁於十二里橋人情挫䘐無復固志或勸方夜遁方曰兵之利鈍無常貴因敗以為成功耳我更前作壘出其不意此用兵之竒也乃夜潛進逼洛陽城七里乂又新㨗不以為意忽聞方壘成乂師乃出戰遂大敗東晉將周訪討江沔間賊杜曾訪有衆八千進至沌陽曾鋭氣甚盛訪曰先人有奪人之心善謀也使將軍李恒督左甄許朝督右甄訪自領中軍髙張旗幟曾果先攻左右甄曾勇冠三軍訪甚惡之自於陣後射雉以安衆心令小將趙𦙍領其父餘兵屬左甄力戰敗而復合𦙍馳馬告急訪怒叱令更進𦙍號哭還戰自辰至申两甄皆敗訪選精鋭八百人自行酒飲之勅不得輕動聞鼓音乃進賊未至三十歩訪親鳴鼓將士皆騰躍奔走曽遂大潰殺千餘人遂定漢沔隋末高祖起兵自太原至霍邑隋將宋老生守城太宗以數騎詣其城下舉鞭指揮若將圍城之狀且詬之老生怒引兵三萬自東門南門分道而出髙祖謂建成曰汝㸔兩陣將交引左軍直趨東門命太宗引右軍直趨南門以㫁其歸路老生之軍背城而列陣高祖以中軍與建成合陣城東太宗陣於城南老生麾兵疾進先薄高祖而建成墜馬老生乘之中軍與左軍咸却太宗自南原遥見塵起知義師退率二百騎馳下峻坂殺一賊將遂衝㫁其軍出其陣後表裏齊譟隋師大潰遂擒老生而平霍邑隋末稽胡五萬餘人掠宜春竇軌討之與賊相遇賊乘高縱火王師稍却軌斬其部將二十四人㧞隊中小帥以代之勒兵復戰􅁤自率百騎殿於軍後令之曰聞鼓聲不進者自後斬之既而鼓之士卒爭赴敵賊射之不能止因大破之隋突厥沙鉢略可汗冦掠而南詔以逹奚長儒為行軍總管擊之遇於周槃衆寡不敵軍中大懼長儒慷慨神色愈烈為虜所衝突散而復聚四面抗拒轉鬭三日晝夜凡十四戰五兵咸盡士卒以拳毆之手皆見骨殺傷萬計虜氣稍奪於是觧去突厥夲欲大掠秦隴既逢長儒共皆力戰虜意大沮明日於戰處焚屍慟哭而去後晉開運中契丹擁衆南向約八萬餘騎晉將杜重威懼退保州契丹踵之晉軍至陽城契丹大至晉軍與戰逐北十餘里契丹踰白溝而去晉軍結陣而南胡騎四合如山諸軍力戰拒之是日纔行十餘里人馬饑乏晉軍至白圍衛村埋鹿角為行寨契丹圍之數重竒兵出寨後㫁糧道是夕東北風大起破屋折樹營中掘井方尺水輙崩士卒取其泥帛絞而飲之人馬俱渴至曙風尤甚時晉師居下風將陣弓弩無所施符彦卿曰與其束手就擒曷若以身狥國乃與張彦澤等引精騎出西門擊之諸將繼至契丹却數百歩彦卿等擁萬餘騎横擊契丹呼聲動天地契丹大敗而走勢如崩山李守真亦令歩兵盡㧞鹿角出鬭歩騎俱進逐北二十餘里鐡鷂既下馬蒼皇不能復上皆委棄馬及鎧仗蔽地杜威曰賊已破膽不宜更令成列遣精騎擊之皆沒水去耿全斌從征太原還遇虜於滿隂追擊至徐河因據水口要害遷補騎副兵馬使又改雲騎軍使屯瀛州與虜戰所乘馬两中流矢死凡三易乘戰不却賊為引去宋吳玠守秦隴金烏珠會諸道兵十餘萬造浮梁跨渭自寳鷄結連珠營壘石為城夾澗與官軍相拒攻和尚原玠命諸將選勁弓强弩分畨迭射號駐隊矢連發不絶繁如雨注敵稍却則以竒兵旁擊絶其糧道度其困且走設伏於神岔以待金兵至伏發衆大亂縱兵夜擊大敗之烏珠中流矢僅以身免亟剃其鬚髯而遁胡世將問玠所以制勝者於玠弟璘璘曰璘先從兄有事西夏每戰不過一進却之頃勝負輙分至金人則更進迭退忍耐堅乆令酷而下必死每戰非累日不决勝不遽追敗不至亂蓋自昔用兵所未嘗見與之角逐滋乆乃得其情盖金人弓矢不若中國之勁利中國士卒不及金人之堅耐吾常以長技洞重甲於數百歩外則其衝突固不能相及於是選據形便出鋭卒更迭撓之與之為無窮使不得休暇以沮其堅忍之勢至决機於兩陣之間則璘有不能言者方富平之敗秦鳳皆䧟金人一意睨蜀東南之勢亦急微玠身當其衝無蜀乆矣故西人至今思之攻必救春秋時楚子及諸侯圍宋宋公孫固如晉告急先軫曰報施救患取威定覇於是乎在矣狐偃曰楚始得曹而新婚於衛若伐曹衛楚必救之則齊宋免矣宋人使門尹般如晉師告急公曰宋人告急舎之則絶告楚不許我欲戰矣秦齊未可若之何先軫曰使宋舎我而賂齊秦藉之告楚我執曹君而分曹衛之田以賜宋人楚愛曹衛必不許也喜賂怒頑能無戰乎公説執曹伯而分曹衛之田以畀宋人遂與楚人戰大敗之掩巢魏伐趙趙請救於齊田忌引兵救趙孫臏曰夫觧雜亂紛紏者不控捲救鬭者不摶撠批亢𢷬虛形格勢禁則自為觧耳今魏趙相攻輕兵鋭卒必竭於外老弱罷於内君不若引兵疾走大梁據其街路衝其方虛彼必釋趙而自救是我一舉觧趙之圍而收弊於魏也田忌從之直走大梁魏師遂退魏武征河北師次頓丘黒山賊于毒等攻東武陽魏武引兵入西山攻毒等夲屯毒聞之棄東陽還魏武要邀於内黄大破之司馬懿征公孫淵淵遣歩騎數萬阻遼隧拒懿懿盛兵南出賊盡赴之乃泛舟潛濟以出其北傍水作長圍忽棄賊而向襄平諸將言不攻賊而作圍非所以示衆也懿曰賊堅營髙壘欲以老吾兵也攻之正入其計此王邑所以恥過昆陽也古人言敵雖高壘不得不與我戰者攻其所必救也賊大衆在此巢窟虛矣我直指襄平必人懐内懼懼而求戰破之必矣遂整陣而過賊見兵出其後果邀之懿因謂諸將曰所以不攻其營正欲致此不可失也乃縱兵逆擊大破之三戰皆㨗王莾末光武起兵據昆陽城時唯有八九千人莾遣將王邑嚴尤討之軍到城下者且十萬光武留王鳳等守城與李軼等十餘騎夜岀既至郾定陵悉發諸營兵嚴尤説王邑曰昆陽城小而堅今假號者在宛亟進大兵彼必奔走則昆陽自服邑曰吾昔以虎牙將軍圍翟義坐不生得以見責今將百萬之衆遇城而不能下何謂耶遂圍之數十里列營百所雲車十餘瞰臨城中旗幟蔽野埃塵連天鉦鼓之聲聞數十里或為地道或衝輣撞城積弩亂發矢下如雨城中負楯而汲王鳳等乞降不許光武遂與諸營部俱進自將歩騎千餘前去大軍四五里而陣㝷邑亦遣兵數千合戰光武奔之斬首數十級諸部喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也且復居前請助將軍光武復進㝷邑兵却諸部兵乘之斬首數百千級連勝遂前因大敗之王邑違尤攻宛所以敗也東晉將蘇峻反攻克石頭城據之晉將陶侃温嶠率兵討之諸將請於查浦築壘監軍鄧岳曰查浦地下又在水南唯白石峻極險固可容數千人賊來攻不便戮賊之術也侃從之夜立壘訖賊見壘大驚賊攻大葉侃將救之長史殷羡曰若大葉歩戰不如峻則大事去矣但當急攻石頭峻必救之而大葉自觧侃又從羡言峻果棄大葉而救石頭諸軍與峻戰東陵侃督部將斬峻於陣賊衆遂潰王世充與李密相持於東都世充夜渡陣於洛水之北其時密已渡洛水陳兵與世充相對東接月城西至石窟密多騎兵長槍宜平寛放縱世充多歩兵戈矛􅀈䂎宜隘險然南逼洛水北阻太山地形􅄶促騎不成列世充縱􅀈䂎蹙之密軍失利密與數子登船南濟自餘兵馬皆東走月城世充乘勝長驅直至月城下密既渡南岸即䇿馬西上直向世充本營左右麾旗相繼而至世充營内見密兵來逼急連舉六烽世充乃捨月城之圍收兵西退自洛北逹於黒石中間四十餘里奔赴顛狽大䘮師徒密之行也東北之圍不救而自觧西南之冦不戰而成功世充伏其權竒不復輕出太宗討竇建德入武牢進三其營多所傷殺凌敬進説曰宜悉兵濟河攻破懐州河陽使重將居守更率衆鳴鼓建旗踰太行入上黨先聲後實傳檄而定折趣壺口稍駭蒲津收河東之地此䇿之上也行必有三利一則入無人之境師有萬全二則拓土得兵三則鄭圍自觧建德將從之而世充之使長孫安世隂齎金玉㗖其諸將以亂其謀衆咸進諌曰凌敬書生耳豈可與言戰乎建德從之退而謝敬曰今衆心甚鋭此天贊我耳因此决戰必將大㨗已依衆議不得從公言也敬固爭建德怒扶出於是悉衆進逼武牢官軍按甲挫其鋭建德中槍竄於牛渚口唐軍生獲之光武東圍鉅鹿王郎守將王饒堅守月餘不下連攻不克耿純曰乆守鉅鹿士卒疲敝不如及大兵精鋭進攻邯郸若王郎已誅鉅鹿不戰自服矣從之乃留軍守鉅鹿進軍邯鄲連戰破之郎少傅李立開門納漢兵遂㧞邯鄲後漢將軍耿秉與竇固合兵一萬四千騎擊車師有後王前王前王即後王之子其庭相去五百餘里秉議先赴後王以為併力取根本則前王自服固計未决秉奮身上馬衆軍不得已遂進并縱兵抄掠斬首數千級牛馬羊十餘萬頭後王安得震怖將數百騎岀迎秉降袁紹曹操相持於官渡沮授説紹遣騎將别為支軍於外以絶曹操之援紹不從許攸進曰曹操兵少而悉師拒我許下餘守勢必空弱若分遣輕軍星夜襲許操為我擒如其未潰可令首尾奔命破之必也紹又不用竟為曹操所敗魏文帝問司馬懿曰吳蜀宜討何者為先對曰吳以中國不習水戰故散居東關且攻敵扼其喉摏其心夏口東關賊之心喉若為陸軍以向皖城引權軍東下為水軍向夏口乘其虛而擊之此神兵從天而下破之必矣東魏大將高歡率兵伐西魏濟河集諸將議進趣之計斛律羗舉曰宇文黒獺雖聚㓙黨彊弱可知今固守無糧援可恃有同困獸若不與其戰而徑趣長安長安空虚可不戰而尅㧞其根本彼無所歸則黒獺之首懸於軍門矣諸將議有異同遂戰於渭曲大敗而歸隋趙煚於江南岸置安蜀城以禦陳屬霖雨數旬城頽者百餘歩蠻酋鄭南鄉叛引陳將吳明徹欲掩安蜀議者皆勸煚益修守禦煚不從乃遣使説誘江外生蠻向武陽令乘虛掩襲南鄉所居獲其父母妻子南鄉聞之其黨各散陳兵亦遁秦末沛公略南陽郡守宋齮走俱城守宛沛公引兵過而西張良諌曰沛公雖欲急入關秦兵尚衆拒險今不下宛宛從後擊强秦在前此危道也於是沛公乃夜引軍從他道還更旗幟黎明圍宛城三匝南陽守欲自剄其舎人陳恢曰死未晚也乃踰城見沛公曰臣聞足下約先入咸陽者王之今足下留守宛宛大都也連城數十人民衆積蓄多吏人自以為降必死故皆堅守乘城今足下盡日止攻士死傷者必多引兵去宛必隨足下後足下前則失咸陽之約後又有强宛之患為足下計莫若約降封其守因使止守引其甲卒與之西諸城未下者聞聲爭開門而待足下矣沛公曰善乃以宛守為殷侯封陳恢千户引兵而西無不下者蕭齊末梁武帝自襄陽率兵東下至郢州攻未㧞蕭頴胄在江陵遣衛尉席闡文勞軍因謂梁武曰今頓兵兩岸不併軍圍郢定西陽武昌取江州此機已失莫若請救於魏與北連和猶為上䇿梁武謂闡文曰漢口路通荆雍控引秦梁糧道資儲聽此氣息兵若前進魯山必阻沔路所謂扼喉若糧儲不通自然離散何謂持乆鄧元起近欲以三千兵往定潯陽彼若懽然悟機一酈生亦足脱拒我師固非三千能下西陽武昌取便得耳得便應鎮守守兩城不减萬人糧儲稱是卒無所出東君有上者萬人攻一城兩城勢不能相救若我分軍應援則首尾俱弱如其不遣孤城必䧟一城既没諸城相次土崩天下大事於是去矣若郢州既㧞席卷㳂流西陽武昌自然風靡何遽分兵散衆自貽其憂且丈夫舉動欲清天歩况擁七州之兵以誅羣豎懸河注火奚有不滅豈有北面請救以自示弱彼未必能信徒貽我醜聲此之下計何謂上䇿及㧞郢域向下城戍無不風靡遂尅建業武德中李靖隨河間王孝㳟討輔公祏公祏遣將馮惠亮率舟師三萬屯當塗陳正通領歩騎二萬屯青林山仍於梁山連鐡鏁以斷江路築却月城延袤十餘里與惠亮為犄角之勢孝恭集諸將議皆云惠亮正通并握强兵不戰之計城柵既固卒不可攻請直指丹陽掩其巢穴丹陽既破惠亮自降孝恭欲從其議靖曰公祏精鋭既在水陸二軍然其自統之兵亦皆勁勇惠亮等城柵尚不可攻公祏既保石頭豈應易㧞若我師至丹陽留停旬月進則公祏未平退則惠亮為患此便腹背受敵恐非萬全之計惠亮正通皆是百戰餘賊必不憚於野戰止為公祏立計令其持重但欲不戰以老我師今若攻其城柵乃是出其不意滅賊之機惟在此舉孝恭然之靖乃先擊惠亮苦戰破之殺傷及溺死者萬餘人惠亮奔走靖率輕騎先至丹陽公祏大懼先遣偽將左遊仙領兵守㑹稽以為聲援公祏擁兵東走以趨遊仙至吳郡與惠亮正通并相次擒獲江南悉平後周時詔發關中兵以韋孝寛為元帥東討尉遲逈軍次河陽逈所置儀同薛公禮等圍偪懐州遣兵擊破之進次懐縣永橋城之東南其城既在要衝雉堞牢固逈已遣兵據之諸將士以此城當路請先攻取孝寛曰城小而固若攻而不㧞損我兵威今破其大軍此亦何能為也於是引軍次於武陟因大破逈子惇惇輕騎走鄴逈自出戰又破之逈窮迫自殺唐武德初宇文化及據聊城淮安王神通進兵躡之秘書丞魏徵謂神通曰化及據聊城莘人為其固守若至莘即宜攻取但㧞莘縣聊城益懼因而逼之易同俯拾須以攻具自隨一足威敵二不乏用不然兵至莘城見無攻具不下如不能尅莘而逺追化及恐亦無功則化及非旬月可獲莘人阻我糧運化及為之外援恐非計之善者神通不從軍次莘果不下而退散堅壁春秋時秦為令狐之役故秦伯伐晉晉趙盾禦之以從秦師於河曲叟駢曰秦不能乆請深壘固軍以待之從之秦人欲戰秦伯謂士㑹曰若何而戰對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也趙有側室曰穿晉君之壻也有寵而弱不在軍事好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可乃皆出戰交綏而退蜀大將諸葛亮悉大衆十萬由斜谷出始平據武功五丈原魏將司馬懿帥師拒之與亮對於渭南懿固壘不戰亮分兵屯田為乆駐之基屢使交書及致巾幗以怒懿懿亦屢表請戰魏使衛尉辛毗杖節制之諸將皆曰賊不復出矣亮曰彼本無戰心所以固請者示武於衆耳將在軍君命有所不受茍能制吾豈千里請戰耶懿使二千餘人就營東南角大聲稱萬歲亮使問之答曰吳朝有使至請降亮謂曰計吳朝必無降法卿是六十老翁何煩詭誑如此懿與亮相持百餘日亮卒於軍中及軍退懿乃行營壘曰天下竒才也摧標秦姚萇與苻登相持未觧登將魏揭飛率氐胡數萬人攻杏城雷惡地應之攻李潤萇議將討之羣臣咸曰陛下不憂六十里苻登乃憂六百里揭飛萇曰登非可卒殄吾城亦非登所能卒圖惡地多智非常人也南引揭飛東結董成甘言美説以成姦謀若得杏城李潤惡地據之控制遠近相為羽翼長安東北非復吾有於是潛軍赴之萇時衆不滿二千揭飛惡地衆至數萬氐胡赴之首尾不絕萇每一見軍至輙有喜色羣下怪而問之曰今同惡相濟皆來㑹集吾得乘勢席卷一舉而覆其巢穴東北無復餘也揭飛等以萇兵少盡衆來攻萇固壘不戰示之以弱潛遣子崇率騎數百出其不意以乘其後揭飛兵􅅰亂萇遣歩騎擊之揭飛衆大潰斬揭飛惡地請降東魏丞相高歡自將率兵伐西魏屯軍蒲坂造三道浮橋渡河又遣其將竇泰趨潼關高敖曹圍洛州西魏將宇文泰出軍廣陽召諸將謂曰賊今圍吾三面又造橋於河示欲必渡欲綴吾軍使竇泰得西入耳乆與相持其計得行非良策也且高歡用兵常以泰為先驅其下多鋭卒屢勝而驕今出不意襲之必克克泰則歡不戰而自走矣諸將咸曰賊今再近捨而遠襲事若差跌悔將何及也泰曰歡前在襲潼關吾軍不過覇上今者大來兵未出郊賊顧謂吾但自守耳無遠鬭意又忸於得志有輕我心乘此擊之何往不尅賊雖造橋未能徑至此五日中吾取竇泰必矣幸公等勿疑泰遂率騎六千還長安聲言欲往隴右既而潛軍東出晨興至小關竇泰卒聞軍至惶懼依山為陣未及成列泰乃縱兵擊破之斬泰傳首長安高敖曹適䧟洛州聞泰死焚輜重棄城走歡亦撤橋而退宇文泰初與諸將謀咸難之泰乃隠其事佯若未有謀者而獨問䇿於尚書直事郎中宇文深對曰竇泰歡之驍將也亟勝而輕敵今者大軍若就蒲坂則高歡拒守竇泰援之内外受敵取敗之道也不如選輕鋭之卒潛出小關泰性躁急必來决戰高歡持重未即救之則竇泰可擒也既擒竇泰歡勢自沮迴軍禦之可以制勝泰喜曰是吾心也君即吾之陳平也武編後集卷四
