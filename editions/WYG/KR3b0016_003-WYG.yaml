body:
  text: 武編前集卷三明唐順之撰陣武經曰昔稱善師者不陣善陣者不戰此言發謀制變先聲後實軍志素定奪敵人之心不待旗壘之相摩兵矢之相接而勝負之勢决於前矣其次則立部曲度權謀先偏後伍彌縫其闕用以乗機而佐勝由中古以來未之或改大要在士卒訓練兵械堅良號令以申之賞罰以督之因山川形勢之宜講步騎離合之要不囂不隘按陣而居常以我逸待彼勞常以我治待彼亂常以我近待彼逺常以我飽待彼饑故其疾如風其徐如林不動如山難知如隂震動如雷侵掠如火此制勝之道也法曰以正合以竒勝然則正者行陣也竒者無方以用變也竒不得正雖鋭而無恃正不得竒雖整而無功故必交相用而後能百戰百勝矣故曰治衆如治寡非分數不能鬭衆非刑名不輯三軍之衆可使受敵而無敗非竒正不成故有天陣地陣人陣以象三才鋭陣直陣曲陣方陣圓陣以法五行其體易明其習易成從昔之成法當今之可用且古者以言不相聞故為金鼔視不相見故為旌旗金鼔旌旗所以一人之耳目耳目既一則勇者不得獨進怯者不得獨退勇怯并用出生入死誰與我敵哉若夫鳴一鼔舉黒旗則為曲陣鳴二鼔舉赤旗則為鋭陣鳴三鼔舉青旗則為直陣鳴四鼔舉白旗則為方陣鳴五鼔舉黄旗則為圓陣此應敵之略也凡卒一人居地廣縱各二步十人為列十列為隊則廣縱各二十步陣間容陣隊間容隊曲間容曲此行列之法也前禦其前後禦其後左防其左右防其右行必魚貫立必鴈行長以參短短以參長回軍轉陣以後為前以前為後進無速奔退無遽走四頭八尾觸處為首敵衝其中兩頭俱救此教習之詳也然則陳兵誓衆者胡可忽而不務邪議者或曰武夫介士出於閭井非有明逹之姿强敏之性而令心存進退耳聴金鼔手知擊刺足趨坐作隨旗變陣猋馳電發俄頃之際事目繁多則心迷意倦勞而無暇安能乗便奮鋭躐敵争勝哉若但使聞鼔知進聞金知退辯旌旗之指麾習器械之便利粗明三四不必遍知亦足勒兵示法殺敵致果兹誠一端之論不為無㫖然時施於㤀戰之久市人之合或庶幾焉若乃提卒十萬深入賊境大將在前堅城未下欲戰則勝負未决欲攻則利害難知自非整飭車徒部分營壘或先據地之要害或先扼敵之襟喉蛇蟠月偃中權後勁疇能收萬全之勝哉祇如平原大野深林險道前丘後澤乘高趨下頓兵擁衆呼吸竢命若不素練施設敢問何以處之然後知議者之言粗而不精也或曰唐人李筌號能言兵者其説曰兵猶水也水因地以制形兵因敵以制勝能與敵變化而取勝者謂之神則戰陣無圖明矣而庸將自以教習之法為戰敵之陣不亦謬乎是大不然筌之八合八離則雜而無章四竒四正則定而不變自膠其柱而謂瑟無五音其愚而妄决矣昔諸葛亮推術八陣得其新意以巴蜀弱卒數萬東屯渭水天下震動司馬宣王以十萬之衆抗之堅壁不敢出㑹亮死僅能取勝馬隆以步卒三千案八陣圖轉戰千里破樹機能數萬騎之衆以復涼州今謂二人為庸將可乎謂不為戰敵之陣可乎此筌之不足為凖也今取古今陣法繪出其圖以存梗概俾將帥度宜而行之若能沿古以便今聞一而悟十觸類以長此又寄之明哲要之與孫吳暗合為極致耳王應電纂握竒經曰天地風雲龍虎鳥蛇四為正四為竒餘竒為握竒或總稱之先出游軍定兩端天有衡地有軸前後有衝風附於天雲附於地天衡重列各四隊前後之衝各四隊風居四維故以圓地軸單列共三隊前後之衝各三隊雲居四角故以方天居兩端地居中間總為八陣陣訖遊軍從後躡敵或驚其左或驚其右聴音望麾以出四竒天地之前衝為虎翼風為蛇蟠圍繞之義也虎居於中張翼以進蛇居兩傍向敵而蟠以應之天地之後衝為龍飛雲為鳥翔突擊之義也龍居於中張翼以進鳥翼兩傍向敵而翔以應之虚實二壘皆逐天文氣候山川向背利害隨時而行以正合以竒勝天地以下八重以列或曰握機望敵即因其後以掎角前列不動或合而為一因離而為八各隨師之多寡觸類而長天或圓而不動前為右後為左天地四望之屬天居兩端其次風其次雲左右相向是也地方布風雲各在前後衝之前天居兩端其次地居中間兩地為比是也從布天一天二次之從布地四次於天衡復從布四風挾天地之左右天地前衝居其右後衝居其左雲居兩端虚實二壘則此是也四正四竒其餘竒零之兵大將居中所握猶弩之有機故曰握機八陣總以天地風雲四者天地取其動静開闔風雲取其徃來屈伸衡者車駕馬以行天衡十六陣包陣外猶天之運乎外故曰天衡軸者車持輪不動而輪之運由之地軸十二陣主陣内猶地之静而化生萬物故曰地軸䡴者陷敵决戰之義天地各有前後䡴者隂陽各以剛决威武為用也風者摧撓剝落之義行乎天下故附天雲者晦冥變化之義出乎地中故附地游軍乃陣後二十四陣餘軍也未知敵之虚實故先遣游軍驚動以窺之按游軍乃兵家至要安營則為兵候為應援為游騎以備非常軍行則為探馬探旗而在陣前為奪險為遊騎以當險阨戰則為探敵為陷陣為間道别支之軍皆蹻㨗不羈之士其所立皆非常之功御之亦宜以非常之思不可不知也天衡地軸天地前後䡴總名天地四角總名風雲四為體出戰合前右總名為虎合後左總名為龍而四風稱為蛇四雲稱為鳥四為用體用皆合八陣而為四陣兼體用而言亦為八陣也天前䡴居右乃正虎地前䡴居前而總謂之虎兵家先隂故以前軍與右軍同用也天後䡴居左乃正龍地後䡴居後而總謂之龍兵家後陽故以後軍與左軍同用也四面兵不逐方并出而與兩面同出欲更休無空缺也風從虎故虎進則蛇應變風言蛇者虎蛇皆隂類也雲從龍故龍進則鳥應變雲言鳥者龍鳥皆陽類也四角風雲各自為更休而不逐隅并出者亦使無空缺也虚寔二壘此有二義調出者為虚居守者為實陣有定名為寔壘無定名為虛竒正者居中當敵者為正兩旁夾擊者為竒也天或圓而不動以下言布陣之法有三一陣以天衝分居四方而在外天前䡴居右天後䡴居左地前䡴居前地後䡴居後此據天衡在外包運而為陣也二陣以天衡重列居兩端天地前䡴并居前天地後䡴并居後此據天地前後䡴而為陣也二陣之法體數不殊而在布列稍異者葢平原曠野四面受敵如是為營則宜天衡在外四面不動而中四䡴更迭出兵此條首四句則明此陣天或圓而不動言天衡在外為營不動也前為右後為左者天前䡴居陣右天後䡴居陣左其出軍則天地前䡴總為右虎天地後䡴總為左龍也天地四望之屬者天前䡴為虎天後䡴為龍地前䡴為鳥地後䡴為蛇以天地之䡴分屬於四方也若有險可據則以天衡對敵併兵防守不動而以前後䡴從險處出兵此條自天居兩端至兩地為比俱明此陣葢險在左右則天衡重列居前後兩端以對敵故曰天居兩端天衡在中而風雲在傍故曰其次風其次雲左右相向前後䡴在左右而風雲亦在傍故曰風雲各在前後䡴之前地軸居中而與地䡴相比故曰兩地為比然此乃布陣之例若險在前後則當據其前後而天衡居左右以對敵險在一隅則當據一隅而天衡總補其缺布陣者所當知也又一陣乃五行陣法也從布天一天二次之者以天衡重列居左右當青龍白虎之位也從布地四次於天衡後者即地軸居中也從布四風挾天地之左右者在青龍白虎之外而為輔也天衡地軸四風南北而列故曰從天地之前䡴居其前後䡴居其後者當朱雀𤣥武之位也雲居兩端在朱雀𤣥武之外而為輔也其法馬軍皆在四正方而四角空處則以游軍補之必如此立陣者葢或敵衆圍我之軍吾欲潰圍而出勢須四方八面皆用精騎或敵來挑戰吾不得利不欲與戰其勢不復用遊軍必合而為一不使斷絶或軍行之時敵人來乘我軍吾倉卒不暇結營故亦以馬軍勍卒在外以當其䡴三者皆用此然亦不過變通陣法使敵不能窺耳陣有定法壘為虚位所布之陣為實不布者為虚故曰實虛二壘也八陣圖說八陣之制始於風后壘於武侯今所傳握機文魚腹石磧是也其法以八為數八八六十四陣為正軍三八二十四陣為遊軍天地風雲四正也龍虎鳥蛇四竒也十六陣為天衡衡重列居兩端左右為挾各二隊十二陣為地軸軸單列居中間上下為比各三隊八陣為天衝四陣在衡之左為天前衝四陣在衡之右者為天後衝各二隊十二陣為地衝六陣前軸之前為地前衝六陣後軸之後為地後衝各三隊天衝四面地衝六者衡有餘而軸未足也八陣為風風居四維維各一隊八陣為雲雲居四角角各一隊六十四陣為三十二隊者兩陣為一隊也二十四隊為遊軍居八陣之後凡十二隊正軍方列象隂静也遊軍圓後象陽動也静者所以為動動者所以為静也飛龍翔鳥者陽體而隂用也虎翼蛇蟠者隂體而陽用也分合之機隂陽之節剛柔之宜非智者莫能窺凡兵之要欲簡不欲繁欲易不欲難六十四陣其為隊則三十二也三十二隊其二隂陽則十有六也故八陣之妙在乎四竒四竒之法在乎二變二變者一之用也凡兵之要不虚内以役外不重末以輕本六十四陣虚寔二壘而居者半也衡軸中居四竒發而居者又半也龍飛虎翼迭致其用而居者又半也故曰先為不可勝以待敵之勝者此也夫兵之法在於審虚實達竒正虚則乗之實則避之出其不意攻其無備欲索其情要在形人形人之極至不可測批亢𢷬虚如卵投石審而用之萬不失一不有乎正何有乎竒正以稱之竒以勝之竒發若機正静若山竒正相生如環無端或正或竒或竒或正頃刻萬變難與豫合勝而無名要在致人虎伏蛇伸蛇遶虎嗔龍為之變用無定形慎詳其意動與敵乘勢險節短如雷如霆何堅不摧何難不平譬之率然靡喻其神順天之道應地之形勿蕩勿拘乃可議兵今之言八陣者異於是昔風后因井田之法以立兵制開方九九而主將所居一寄於八八六十四也今為陣者每陣特制中軍列為九陣九九八十一矣天地風雲龍虎鳥蛇八陣之目也今為陣者以天地魚麗金木水火土合為八陣夫天地五行固非例矣魚麗之陣又可參乎天地風雲龍虎鳥蛇雖曰八而用實四今之言兵者以天地風雲龍虎鳥蛇各有竒正列為八圖豈不大謬歟握機陣數自有明法多寡之分機要所繫今之言兵者陣法皆九無復等殺固已謬矣五人為伍古制然也作字之義亦本於此今言八陣者必曰八人豈不為大謬歟嗟夫八陣之制妙矣神矣不可復加矣後之敗者不知乎是法者也後之勝者暗合乎一二者也武侯逺矣太宗之問李靖之對若深於是圖者詳而考之粗而形名猶或未盡况於幾微之妙神而不可測者乎且夫後世九陣之失皆起於空中大將居之之語靖號知兵猶且如是於他何議哉若夫先君子之所論者此不復著也兵以正合以竒勝若粤古風后八陣曰天地風雲曰龍虎鳥蛇有竒有正惟變是適其動如神故先為不可勝以待敵之可勝至蜀諸葛武侯式是古訓布之魚腹壘石八行行間相去二丈八人成行為陣六十四其形正方如棋盤六十四陣後有二十四陣分為兩行謂之遊軍其形曲如偃月屹然峙乎大江平沙之上巨流弗轉迄今猶存天其用以遺後人雖然斯法久廢至今千有餘年觀其圖者漫然莫辨孰為天地風雲孰為龍虎鳥蛇又安能推其意而行之乎晉桓温逺武侯僅百餘年人已莫能識獨桓温知其勢常山之蛇首尾掎角是以相應而猶未盡通竒正攻敵之妙唐獨孤及雖用韜鈐之客記其遺制而猶未盡明其義李筌太白隂經繪為九圖其名雖同而陣形則異與武侯之圖益舛暨本朝諸儒類皆紙上語又攀諸家陣法以附益之益駁而難同惟唐太宗李衛公以為形如井字開方九焉大將居中諸部連繞四頭八尾觸處為首此數語最為切當可以為開方之用矣嘗觀握機經馬隆贊即魚腹圖八陣八畫隊陣地軸十二居中天衡八隊居前又八隊居後天前衝四隊居右地前衝六隊次之天後衝四隊居左地後衝六隊次之風八隊居四維雲八隊居四角此天地風雲四陣為四正也天地前衝為虎翼居右天地後衝為飛龍居左又風變為蛇蟠雲變為鳥翔此龍虎鳥蛇四陣為竒也然八陣中有握竒之數寓於地軸共為九陣即九夫為井之制也八陣外有遊軍或驚其左或驚其右或分為疑兵或設為伏兵或絶敵糧道或邀遮敵人或夜擊敵營或尾擊敵後或軍行未止營舍未定行列未立必先廵警八面斷敵來道以防卒然之衝突皆臨時别變錯綜八陣而用之即井四有溝洫為之經緯者也此法古人所未言用之教陣訓兵則其文炳矣然其教皆起於參天兩地兩地之數衍而為四為八參天之數衍而為六為十二合之為六十四總之八十八其部隊則有戰前隊迎敵有正隊更化有竒隊若非竒隊則正隊不能以更化又有駐隊自固有輔隊為駐隊之衛有殿隊為駐隊之後拒若非殿隊輔隊則駐隊不能自固要皆隊間容隊陣間容陣隅落勾連曲部相對四面八向隨感而應常以逸而致勞以實而擊虚其法可謂密矣或曰按六十四陣壘石為營曲抱其前中開一門是特營壘之法非可用之戰鬭也於戯殆亦未深攷之矣且營壘戰鬭其治則同其用則異部伍隊陣隅落勾連則因地與敵而制形立名則異庸可泥乎當用諸家之説觸類而推之合九陣而言則天包地外風附天而雲附地折九陣而言則一隂一陽兩兩相從似分而實合以方位而言則四陣為正四陣為竒以遊軍對八陣而言則八陣為正遊軍為竒以戰而言則正或變為竒竒或變為正接戰者正也以隊法從旁擊者竒也却而致敵者竒也左右夾擊者正也以隊法而言則因其名而别雖百萬之衆各有分數而不亂如李衛公謂天地風雲本乎旗旛龍虎鳥蛇本乎隊伍是也以置陣而言則隨地而布雖有鳥蛇廣狹之不同而皆協於義如馬隆所為合而為一平原如城離而為八隨地之形是也以其命意而言則天地取乎動静開闔用以衝敵風蛇取乎徃來屈伸用以繞敵圍敵鳥雲取乎翺翔用以突擊而握機經所載蛇蟠為圍繞鳥翔為突擊之類是也以其取象而言之則圓者為天方者為地放而衝撓者為風散而復聚者為雲屈而圍繞者為蛇蟠張翼而突進者為鳥翔四翼一首者為虎翼六翼一首者為飛龍而李靖方陣之法即地陣之類也李廣張左右翼為圓陣外嚮者即天陣之類也金數十萬騎出入守邊者即風陣之類也李廣張左右翼以擊匈奴衛青將左右翼以繞單于清溝之戰安守忠以驍騎九千為長蛇陣官軍擊之前尾為兩翼夾擊官軍大敗即蛇陣之類也宗城之戰王重𦙍請杜重威分鋭士擊安重榮左右翼自率兵以衝其中軍重榮少却官軍乘之重榮大敗即鳥翔陣之類是也項羽垓下之戰韓信將兵當之孔將軍居左費將軍居右皇帝居後絳侯柴將軍又在皇帝後即虎翼陣之類是也金人之拐子馬先以精兵從中衝我軍如我軍陣動則擁大衆張兩翼以邀我後此亦虎陣之類是也崔乾祐潼關之戰十十五五散而列星或疎或密或前或却嚴精兵陳於其後及兵既合偃旗如欲遁以誘其進乃發伏兵而乘之即雲陣之類也韓世忠大儀之戰先勒五陣設伏二十餘所約聞鼔即起擊金人不知擁鐵騎過五陣東世忠傳小麾鳴鼔伏兵四起金軍擾亂宋師迭進世忠麾勁騎四面蹂躪人馬俱斃即龍陣之類也雖李廣衛青崔乾祐王重𦙍韓世忠之徒未能知此八陣之法而暗與古法合亦足以制勝矣今思古陣而制教法一陣自具八體八體各具八變皆因地勢而分列因敵勢而變化静則有定體動則有定用觸之則為首援之則為尾一陣遇敵諸陣相援首動尾應竒正迭出變化無方是之為八陣活法儻拘文泥圖以求古法而不知變化神妙之用或繁碎而重疊無以應卒而適宜是謂八陣無法何以制勝乎夫知陣法而不知變化者固不足與語用兵之事也近年諸將併與陣法失之乃謂今與古異戰則戰耳奚以陣法為曷不思陣法果何從而起乎衆則易亂亂則易潰於是隊伍之法生焉地有巖阻原谷形有髙下小大曲直因地形而列隊伍於是行陣之法生焉茍謂陣法無所用之則三軍之衆若何而布列是以士卒自占其地而布列無法也使士卒自占其地則隊伍必然紛亂而不整布列無法則勢如風痺左右不能相顧首尾不能相應安能竒正生生之妙行陣無竒正隊伍不整治皆敗之道也項羽止有二十八騎猶有陣法分為四隊四面馳下期山東為一處而况兵以十萬計豈可無陣法自黄帝迄於本朝皆用陣法豈今一旦獨不可用乎不知自悟不能用陣法而謂陣法不可用且昧金人拐子馬類風后之虎翼陣而謂金無陣法其曾不知兵亦甚矣考數百年之兵戰用陣法而勝者多不用陣法而勝者少凡不用陣法而勝者皆出於彼此浪戰均無法制其間有以勇而遇弱以衆而遇寡以治而遇亂以和睦而遇怨離耳烏可執一而廢百指其幸者以為常哉由兵事者盍深思之四正方四衝四䡴凡八將四隅方四風四雲凡八將此十六隊將各主其本隊之事者也四正每正各總其衝䡴凡四將四隅每隅各總其風雲凡四將合十六而為八此八陣將各主其方面之事者也地軸將總地軸地䡴八雲之兵為三十二隂天衡將總天衡天䡴八風之兵為三十二陽此合八而為二捉零執簡以為提挈弛張也地軸將又總八陣兵合二為一此大將之事也天衡將與地軸相表裏此副將之事也天地之前䡴為虎翼而風應之天地之後䡴為飛龍而雲應之合前于右合後于左八陣以四為用四陣以兩而化此三將之事也風將總其四風雲将總其四雲應於四正此驃騎將之事也遊軍二十四陣與大軍為援此遊擊將之事也武經總要曰古今臨戎對敵每作四面陣周圍受敵以為必固儻選鋒而擊之其陣必破此非天殃將之罪也亦或作長陣或作蛇陣皆以隊伍步騎相接被衝破一處即敗亾不全大將避潰師之罪移過於下遂使驍勇小将無罪受誅今則合立陣勢各分部曲各明竒正若失一陣則斬一將形勢既就諸陣相救手臂相應止即為營動即為陣逢賊告急鼔聲一發陣即立成更不在勞煩指布如南面鼓動八百人一時向南轉戰東西北俱同只須轉步騎兵不移每陣相去廣狹一百步狀如街陌設詐挑戰引之令人即皆結陣突出弓弩騎射長鎗左右夾擊前抄其胷後掩其尾此則應變之法出入如神攻取皆勝所向無敵也握機出軍法軍在營以為守出營以為戰茍出軍無法盡營之方面以行使營中空缺胡以守乎唯出之有次第故居者行者勞佚相均以戰以守並行不悖也經曰天地之前䡴為虎翼風為蛇蟠虎張翼以進蛇居兩旁向敵而蟠以應之天地之後䡴為飛龍雲為鳥翔龍張翼以進鳥翼兩旁向敵而翔以應之葢每遇敵其為天衡在外之陣則右兵與前兵先徃而四風應之左兵與後兵繼徃而四雲應之其為天衡居兩端之陣則前陣之兵先徃而四風應之後陣之兵繼徃而四雲應之此八陣兩番更休之法其當方面兵各自為更休大約一隊有兩隊首次天地之前䡴内每二百人以百人為駐隊其應調百人内七十五人出戰為畨法二十五人將大車不動二次天地之後䡴徃亦然三次前䡴之駐隊徃四次後䡴之駐隊徃如是而一軍之兵調無不遍力無不休當營并無缺對敵常不窮也風有左右雲有前後凡天前䡴發則四風之右應地前䡴發則四風之左應天後䡴發則四風之前應地後䡴發則四雲之後應其陣内亦自為更休與四正同天衡乃副將所轄定為家計死守不移不可敗在我之道一軍以之為歸地軸乃大將所握囊槖輻輳經畫䇿應猶人之心腹萬衆恃以無恐或前後䡴輪輟力殫衡軸畜力思奮即調之出戰或欲布大陣即衡軸之兵齊出或有危急則全軍皆死戰葢不得已而後用之常戰不過前後䡴風雲無得輒有動揺也兵不貴多但以不教民戰是謂棄之須十分教閲無不一當百乃可衡在外軸在中俱不動所用者前後䡴風雲而已然前䡴後䡴更出迭入動者半而静者半也不盡營以行虚實二壘一戰一守用者半而休者半也不空方而戰故八陣之兵所用者無幾大約以十之一萬取千千取百惟以其犯之不可入當之無不斃與敵人曠日持久可擇利以圖全勝所以為善陣開四門常戰則前後䡴更出迭入敵兵小用衆少則偏將領一面之兵出戰開門放出出絶閉之餘面不動所謂離而為八也敵兵大用衆多或欲取大㨗即四門之兵齊出前當其䡴左當其左右當其右中軍與後軍在其後風雲兩旁其留駐隊以為守輜重隊以守大車皆如前法所謂合而為一也别有八門法唯大將審用之握機戰法人之力一鼔而作再鼔而勝三鼔而竭使三軍齊奮而至於竭胡以相繼且夫援桴鼔之勇怯并奏再鼔而怯者不得獨後終而怯者罷矣勇者不能立故有大敗之師也三定戰法隨機用之凡戰以正兵當之以風雲在旁繞之突之翼之代之以遊軍在外警之疑之援之救之凡戰有戰鋒隊鼓音發弩手去賊百五十步發箭弓手去賊六十步發箭賊至二十步射手舍弓弩後隊人收之射手絡膊將刀捧與戰隊齊入奮擊有左戰隊右戰隊戰鋒隊出則為鋭陣狀如鼎足左右戰隊分為兩行如雁行翼之宋制三等兵或為五等大約一接戰奮擊一整頓俟戰一少憩息陣後更戰更息環相為用不竭其力此即牧誓不愆于五步六步七步乃止齊焉不愆於五伐六伐七伐乃止齊焉是也止齊者即欲便休之意而與敵交兵無止息之時所謂陣行無疏戰唯密也有馬隊進止與步軍同步兵戰酣即迎敵走擊宋制為跳盪馬隊竒兵馬隊經所謂虎張翼以進蛇居兩旁向敵而蟠以應之龍張翼以進鳥翼兩旁向敵而翔以應之是也宋制以竒兵馬隊跳盪馬隊分布在各步軍後俟步軍戰酣然後馬隊出戰此花法也握機則在陣旁陣法雖異戰道則同凡戰隊頭引前次立執旗左右有傔旗副隊頭立隊後觀不陣者隊頭戰傔旗救隊内人戰同隊救一隊戰鄰隊救應救不救斬及失旌旗節鉞全隊斬凡失一人則一伍誅失一吏則一隊誅立功減罪語云一人捨命萬人莫敵以一伍一隊之人致死欲立功夫誰與敵哉此所謂堂堂之陣正正之旗也設有勍敵乘我軍未成列而來突我師亦有敵衆我寡吾欲乘其未列而徃擊之此則非遊軍無以致勝故虎蛇龍鳥之兵接戰大將别遣驍将統游軍或耀兵而示之使之驚疑或潛師而行之出其不意或未知敵之虚實如經所云從後躡敵或驚其左或驚其右或居陣外援我之師乘敵之敝或繞出敵後與我軍夾攻之或設伏于敵之前令我軍佯北過而邀之或别遣于間道𢷬其巢穴絶其應援燒其芻糧奪其要害皆大將臨時擇利遊軍應機為之又出正陣之外或用或不用大約十取其二三亦更迭遣之也武經總要曰凡布大陣常以十分之三為竒伏設有萬人則一千五百人為兩竒一千五百人為兩伏正陣如身竒兵伏兵如足三者合為一體迭相救援戰則互為進退循環無已凡戰須更畨一戰一食一憩按此特簡略用兵法耳八陣則風雲在陣旁即兩竒遊軍在陣後即兩伏也裴子野法有揚竒備伏四軍皆騎兵而分為八逐便而居大約揚以設疑竒以續戰備以補缺伏以設覆然亦不出於竒伏二軍也以大軍對游軍言大軍為正游軍為竒以正陣言外八陣為正中握機為竒以外八陣言衡䡴為正風雲為竒以中握機言十二地軸為正四角無地分馬為竒以敵攻言當頭受敵者為正二尾旁援者為竒以更休言就列為正駐隊為竒以戰言正兵接戰者為正兩旁風雲翼擊者為竒正兵中戰鋒隊出為鋭陣者為正左右戰隊分為兩列如鼎足俟戰者為竒凡設伏其休交代後左右夾擊者為正却而致敵者為竒葢正或變為竒竒或變為正故曰正竒無窮如環無端也五陣之名曰水木火金土五陣之形曰方圓曲直鋭西方主金殺氣也其形方其色白故陣法皆起於方方陣者即八陣總圖是也可用以守圓陣者以方陣規而圓之八面皆對敵圓融而無空缺者也被圍用之曲陣者右軍在前軍前之右左軍在前軍前之左前張兩翼以進也掩敵用之直陣者前軍居中右軍居右左軍居左并列而戰也凡對敵皆用之鋭陣者右軍在前軍後之右左軍在前軍後之左如鳥喙矢鏃之進也䡴敵用之此三者軍皆在陣後為主後軍又在中軍後以為拒風雲皆在四隅為竒兵也雖曰前軍在前然逐方面皆可為前軍凡陣皆指離陣出戰所為在營則轉功也易範經緯曰五行之初生水而木木而火火而金金而土故西方之金為方陣而方變為圓中央之土為圓陣而圓變為曲北方之水為曲陣而曲變為直東南方之木為直陣而直變為鋭南方之火為鋭陣而鋭又變為方五行之相尅火尅金金尅木木尅土土尅水水尅火火之尅金也故鋭陣可以破方陣金之尅木也故方陣可以破直陣木之尅土也故直陣可以破圓陣土之尅水也故圓陣可以破曲陣水之尅火也故曲陣可以破鋭陣五陣之變必始于方卷而藏之則為方陣圓陣而握機之數在軍中舒而張之則為曲陣直鋭陣而握機之數在陣後方者所以弛張也高平利方方利變四方高利圓圓利守左右高利牝牝利吞後高前下利牡牡利潰前高後下利衝方衝方利争險平易利車輪車輪利進斥澤利罘罳罘罳利救城丘利雁行雁行利繞洞當陣方布之以其行伍洞徹而相當也故云平原廣野彼寡我衆則利為洞當洞當利變可以變前為後變後為前變左為右變右為左其形正而厚可以勝中黄法曰方陣正而厚圓陣隨而取正厚者力併故洞當勝中黄猶厚勝薄也中黄陣圓布之以其居中位者土也故云四面俱高中央處下彼衆我寡則利為中黄中黄無角宜于堅守可以馳龍騰龍騰張其兩翼若掩取之以牝吞圓勢可敗也法曰翼而張者角必薄偏攻其角牝可敗也故中黄勝龍騰猶聚勝散也龍騰陣偃月布之前翼而後方龍之躍足在前此陣兩翼屈曲如龍騰也故名左右俱髙行軍谿谷則利為龍騰其形前張兩翼便于吞掩使彼奔䡴三面受敵足以勝鳥翔鳥翔前鋭後重象劍之鋒龍騰以兩翼夾攻其鋒法曰鋭而重者夾擊之故龍騰勝鳥翔猶複勝單也鳥翔陣尖布之前鋭而後衆鳥之飛首在前此陣前鋭如鳥飛翔故名前下後高乗虚冒亂因其地勢則利為鳥翔鳥翔可以勝折䡴折䡴前衆後疎戰者相促居者有餘鳥翔背高向下因其勢以潰其虚可以敗敵法曰得地助者昌失地助者亾故鳥翔勝折䡴折䡴陣前廣後狹布之前衆而後疎以其直前折䡴于敵故名前高後下左右或險則利為折䡴折䡴可以勝握機握機兵得成行善冒亂敵而畏險阻折䡴勢仰高守險以疲握機故折䡴可以勝握機握機陣龜文布之中齊而旁鋭以其進止機巧得名平原廣野且行且戰則利為握機握機利進可以勝虎翼虎翼備其首尾虚在兩旁其勢不堅握機四備强弩善䡴亂敵法曰以守待攻者强以動待敵者亾故握機勝虎翼虎翼陣直方布之首尾薄張兩翼以其遊騎兩旁而舒翼故名一名魚麗左傳曰原繁高渠彌以中軍奉鄭公為魚麗即此川澤漫衍草樹扶疎則利為虎翼虎翼前後横中央縱張其四翼備其首尾且戰且息利于相救雁行延斜而行惡其斷絶故虎翼可以勝雁行雁行一名衡陣延斜布之前鋭而後張以其連接如秤衡也故名背城向敵易斷繞人則利為衡陣衡陣前鋭後張延斜而行便于左右利于周旋可以勝洞當洞當形重而後佚居者衆用力者寡法曰厚而正者堅當選勇力脇其兩旁故衡陣勝洞當蔡氏曰八陣皆生于方圓方者坤也圓者乾也䡴方罘罳牝陣皆方之變即巽離兑也牡陣車輪雁行皆圓之變即震坎艮也其相為勝負者向背虚實之機也此公孫𢎞所謂世有八卦陣法亦可參用者此也王氏按此八陣皆古有是名一逐地形因敵勢而設然不出於五陣而已蓋洞當者陣之祖用以為八陣五陣之方陣是也中黄者被圍而設五陣之圓陣是也䡴方者對敵布陣五陣之直陣也龍騰者掩敵之陣五陣之曲陣是也鳥翔者䡴敵之陣五陣之鋭陣是也握機者裁而為六葢即六花陣圓之變也罘罳者張其四翼方之變也鴈行者延袤兩行用之以行直之變也因敵變化皆可以致勝今其法曰方勝圓牝勝牡豈圓不足以勝方牡不足以勝牝也雖有此理拘則不通學者知而勿泥可也洞當即孫子之方陣吳子之車箱陣舉白旗鳴一鼔則為之中黄即孫子之圓陣吳子之車杠陣舉黄旗鳴二鼔則為之龍騰即孫子之牝陣吳子之曲陣劉格之却月陣舉黒旗鳴三鼔則為之鳥翔即孫子之牡陣吳子之鋭陣舉朱旗鳴四鼔則為之折䡴即孫子之䡴方吳子之直陣舉青旗鳴五鼔則為之握機即孫子之車輪吳子之衡陣舉熊旗鳴六鼔則為之虎翼即孫子之罘罳吳子之掛陣舉虎旗鳴七鼔則為之衡陣即孫子之雁行吳子之鵝鸛舉鵰旗鳴八鼔則為之在廣漢者即下彌牟圖隆土為魁基以江右四門二首六十四卦塊八八成行兩陣俱立周圍四百七十二步其魁百有二十八在魚腹者因江為勢積石憑流前蔽壁門後依却月可以識縱横皆八魁間二丈偃月内面九六鱗差七八以為經八陣兵為八列中道則七正陣故曰經九六以為緯遊軍九列復加六隊竒兵故曰緯觀物張行成曰僕假守廣漢道過彌牟迓兵適至令人各執旗立于壘上三畨數之皆如此數近時士夫記彌牟八陣皆云土壘六十四者妄也當頭陣法者立隊之初也一百二十八陣分作兩邊每行多少不等疑若其不整麾而鼔之各認五色旗八陣分作兩邊乃安布治兵者有數法葢平時如此按閲使人習熟一旦當敵雖萬變雜揉亦不離散故曰紛紛紜紜鬭亂而不可亂混混沌沌形圓而不可敗也行之多寡雖不等皆本於易數左邊六十右邊六十八者上經三十卦下經三十四之理是知雜卦比卦序卦雖卦次雜亂至於上統三十下統三十四其數則不變也左右皆七行者先天卦各八卦為本七卦為用故八陣中間出入之道各有七焉兩旁兩行一行七數者揲蓍一揲之竒不五則九均之各得七數之理也餘兩旁各六行總十二行或十一對八或十對九均之每兩行共得十九者蓍得六揲之總三十八均之每爻三揲則十九之理也總一卦六爻則一百一十四矣三揲之蓍者八卦之所自出也八卦者正數八卦用七故七分為正兵也五揲者竒數每三揲故三分為竒兵也天三之竒七與十九變于上然後地八之正六十四成於下是故孔明先以竒數列隊而後以正數立陣也竒以變正正復用竒是故臨敵制變則正無非竒竒無非正竒正相生循環無端也一百二十八者六十為天之用六十八為地之體天地未合之初未見于用也為六十四則天地合為一體竒正通為一用體亦為用用亦為體變化為無窮矣是故伏羲之易為先天而用一百二十八文王之易為後天而用六十四也囂囂子書此編得之紹興李莊簡公家今逸其姓名愚按編中言二敵不足滅此必宋南渡前時人所作至正丁酉七月二十三日廬陵劉汝成錄武侯八陣舊圖天陣一地陣一魚麗陣一金木水火土五行之陣五凡此八陣包括山川險易形勢其布皆起方隊本體其法存於分數而其用則在握機知此二者觸類而長變化無窮矣方陣本體者八變自此出也凡軍行止布宿亦如之止而為營則電擊四隊居四脇其法用三十五隊以四為電擊十五為戰隊三為中軍合作六隊作六華陣或用九隊隨地制宜十為駐隊又三為殿後及左右踵凡三十有五隊合為一陣竒留中軍電擊居前戰隊次之中軍居中駐隊次之殿後及左右踵又次之其為形勢如人有臂腹足又互相羽翼故能相救應而無孤守之患也八陣之用變動無常而皆以此為體故設之為本體也凡戰兩軍相迎在百步外則電擊先出乗敵未定攻弱𢷬虚利則大軍繼進不利則退居四脇或擊其左或擊其右倐徃忽來迅速如電不可制也故名電擊兩軍既交戰隊整肅逺則施射近則用兵進不過三十六步外退不得越行次惟敵敗北而聞擂鼔聲則各散為鳥雲以追逐之復如前敵非佯北而旌旗麾亂行列無次則中軍鳴鼔戰隊皆散為鳥雲以追逐之鳥雲或三或五無定如鳥雲聚散也駐隊者取駐代之義也凡戰前軍合則駐隊秣馬蓐食整兵而待聴中軍號令即出而代戰換戰隊以與敵戰鬭故名為駐隊駐隊之法中先出竒兵居兩脇以為掎角嗚金四聲前軍却退兵來過則駐隊接戰竒兵掎角從兩脇出夾擊之電擊如選鋒是也有電擊以破敵有戰隊以應敵而又有駐隊代換故我軍常佚而彼軍常勞我士常飽而彼士常饑我氣常壯而彼氣常乏如此無窮敵雖常衆蔑不敗矣此既足破敵則又置殿後與左右踵何也葢妨敵人分兵自後躡我也若敵二而已一則敵必分其兵來襲戰故備之後軍若敵分兵當前而來則以戰隊為正兵電擊為竒兵敵若分兵自後而來則駐隊為正兵殿後與左右踵迭為竒兵敵若分兵自左脇而來則戰隊左脇引而向上駐隊右臂引而向下合以圍之中軍三隊便為正兵從中出竒以破之敵若分兵自右脇而來其戰如前法是為四頭八尾觸處為首也故桓温過蜀見壘石而識之曰常山蛇勢也八陣戰鬭皆以此法每一陣中各有竒正竒正之外又有餘竒餘竒兵或用為伏或用為襲或用為耀或用為疑或用補闕敗皆非正隊數俱藏於中軍大將觀敵變動臨時分遣其法葢存於分數此乃武侯秘而不傳者黄帝所謂餘竒為握竒是也經曰横以前為第一行縱以左為第一行第一角聲動前行向左後行向右中行向前兩端四亞其形像華葢虞鼔動肅儀仗第二角聲動前行向左後行向右前端俱起相背而立其形像偃月虞鼔動肅儀仗天陣者據髙原平坦之地也前有漫坡下視敵人其勢順利便於馳擊則布之前象華葢後象偃月者法天星斗之文也太公曰日月斗柄一左一右一向一背此之為天陣故武王取義也經曰第一角聲動左行向左右行向右三行分居前列其下虞鼓動肅儀仗第二角聲動前行向左後行向右兩端俱起為戰人綴其形如偃月虞鼔動肅儀仗地陣者居平原曠野通道大衢左右無丘林墳墓以為蔽翼則布之此四面受敵之陣其形前方後圓以法地天泰之象環開五門并駕武衛强弩以防奔突主將居中用雲梯飛樓觀敵變動臨時出竒兵制勝其戰如天陣之法若敵為衝陣當面來其衆倍我則變為金陣以破之金陣法見後經曰第一角聲動左行引而向左右行引而向右中行曲而向前其形如龍蛇横縱勢虞鼔動肅儀仗第二角聲動前行向左後行向右兩端曲而向下其形如覆月虞鼔動肅儀仗魚麗陣者左據水右依林木後背山嶺髙岡則布之或與敵人分沮澤之地後有髙岑隱阪可據亦布之此一面受敵之陣也凡精甲利器悉居前列中軍居駐隊之中凭髙觀望視敵虚實從中出竒兵制勝其取名魚麗者以其在大澤中如魚首之相比也若引兵深入猝遇拒敵彼衆我寡士無鬭志而後有溪澗深木者亦布之分吾殿後與左右踵兵悉居前與戰隊併力疾鬭此以危决勝之陣也故經云龍蛇縱横勢龍蛇皆矯首而蟠尾伸縮進退無有常形要知左右相應不相離也經曰第一角聲動前行向左出後行右出中行曲而相接也兩端俱起其形象偃月虞鼔動肅儀仗第二角聲動前行向左後行向右兩端相麗其形如偃月虞鼓動肅儀仗水陣者自上伐下之勢也凡入敵國遥見其兵前有戰地坦平而狹後有髙山大阜利下馳擊則布之或危要衝斷敵道遇彼衆我寡度其必來亦據之其布戰法居山之陽則備其隂據山之左則備其右敵兵來至先後竒正偃旗卧鼔示之以利毋張皇聲勢敵若分兵當前而來則兩端俱起循山而下合以圍之駐隊從進其勢如建瓴故經云前象偃月之形若敵知我情分兵半至則駐隊與中軍無出前軍追逐經曰第一角聲動前行向左後行向右中行向前分為三隊其形如鏵鍬虞鼔動肅儀仗其二角聲動前行向左後行向右分為二隊其形如鏵鍬虞鼔動肅儀仗火陣者自下攻上之勢也敵得地利先據髙山大陵陣而待我吾衆彼寡我欲攻之則為大陣分吾軍為五戰隊居前平道伐木而又操行馬雜戈以進驟徃驟止示之以利無與争道以避其鋒令我駐隊盡持强弩去敵五里依山而伏以為兩翼令我中軍與左右踵去十里以為表裏而急出飛聚材士盡居前隊輕甲遽徃以致敵敵若逐我則引而走與後軍合兩翼旁出夾擊之使餘竒之兵間道潛徃㧞其營壘其衆必破此所謂利而迂之以致其害也經曰第一角聲動左行向左右行向右三行而居前分為五隊其形如木有攴榦虞鼔動肅儀仗第二角聲動前行向左後行向右分為二隊其象如箕踞虞鼔動肅儀仗木陣者孤兵深入猝遇敵來衆其勢不敵前後左右無險阻可依而獨有大林則據之其布陣法分吾前軍列為五隊斬木開路以通中軍便利人馬弓矢居前矛盾居後林間木踈之處多用蒺藜行馬以塞中道見便則出戰不便則止若敵兵十倍於我斷我糧道絶我歸路吾援不至則據林謹守以薪炬係木之末多布火鼔為夜戰法以擊破之可以潰圍而去此必固之兵制勝之陣也經曰第一角聲動前行向左後行向右中行曲而向前其形如鏵鍬虞鼓動肅儀仗第二角聲動前行向左出後行向右出兩端相向其形如偃月虞鼔動肅儀仗金陣者破方圓之勢凡敵先據地布行陣待我其軍衆倍或分為三或列為五翼我左右越我前後則吾為金陣以應之凡布金陣前鋭以利突擊兩端如鴈翅以備兩翼中軍用天梯飛樓視敵虚實臨時出竒制勝其戰如天陣法八陣皆因地勢以制勝其利惟金陣無施不宜葢方圓曲直俱可破也經曰第一角聲動前行向左出曲而向右後行右出曲而向左中行兩端屈而相接其形如彈丸虞鼓動肅儀仗第二角聲動前行向左後行向右兩端各曲而相附其形如彈丸虞鼔動肅儀仗土陣者八面受敵之兵也凡遇敵師敗北我兵追逐深入其地猝逢敵衆翼我前後斷我歸路吾援不至而前無山阜後無丘陵左右又無水澤林木可為依倚者布土陣土性圓其前後皆如彈丸主將居戰隊之中號令戒嚴進退齊一前行弓弩矛盾相翼武衛神獸衛其左右閉我四門用竒取勝焚其輜重示以必死若敵堅陣而守我布為夜陣多為火鼔潰圍而出此天下之危兵也八陣辨正營陣之法起自風后初作天地風雲龍虎鳥蛇八者形勢以破蚩尤其法用二為正二為應四為竒而餘竒為握竒故謂之握機經風后握機經以天地為正陣風雲為正陣龍虎鳥蛇為竒陣此外皆為餘竒餘竒之兵藏於中軍而法存於分數故云至孔明相蜀亦作天地魚麗金木水火土八者形勢以伐魏吳其法以戰隊為正則電擊為竒駐隊為應則殿後及左右踵為竒而亦有餘竒藏於中軍故謂之八陣圖風后制三軍用步輔車為正兵以騎從中出而旁擊敵為竒兵後世廢車而用二軍故武侯於戰隊駐隊皆用步兵為正兵電擊中軍及左右踵皆用竒兵此外亦有餘竒藏於中軍然武侯八陣與風后名同而實異後世得其書不究其制度得其圖不知其變用之法是以二子之術雖傳於世俱隐而不明甚矣李靖之好妄也唐太宗問曰天地風雲龍虎鳥蛇此八者何義而靖對云古人秘藏以法其實一陣詭設八名且若天地風雲者本乎旗號旛名龍虎鳥蛇者本乎隊伍之别又曰黄帝始制丘井八家之法起於此也太宗復問卿所作六花何術也靖本諸葛亮圖外畫之方内環之圓是成六花俗所稀有且握機言陣勢有八天地風雲龍虎鳥蛇而經曰風闕天雲闕龍居其中張臂以進鳥居於外翔擊以應之其法實然固非難考而謂為旗號何哉武侯行師合三十五隊為一陣有電擊有戰隊有中軍有駐隊有殿後并左右踵分布衆寡各適地利之宜如人有首臂腹足皆以相捍翼而謂之外方内圓而為六花何哉夫聖賢立法垂世固有待於明哲之士若智不足以究其精微缺焉可也而靖於二子之術無所窺見獨騁一時雄辯欺其君以惑後人使後人用兵不知營陣每遇征討不大勝則必大敗者靖之過也臣嘗讀衛公問觀靖竒正一本孫武而不知孫武所謂况知二子耶葢孫武之言曰凡兵以正合以竒勝知之者出竒無窮此言正布陣之法也竒亦為正正亦為竒此指言分合之法也布陣之法於一陣之中各有正有竒而於竒正亦各有隊伍之别故曹公云已二敵一則三為正三為竒此明竒正闕鳥雲亦曰竒正既設是也今靖之言曰臣但教諸將以正為竒以竒為正而虚實自知審如是乃孫武所謂分合法耳非陣法也又武侯言有制之兵無能之將不可敗也無制之兵有能之將不可守也而靖對太宗謂其言非極致然武侯用此常以寡當衆未聞以敗衂街亭之役馬謖違之而輙喪師此其效顯然烏得謂非極致乎凡靖所論者皆詭譎變詐之術雖在兵家不可無要知非王師征討之法如以建成墜馬少却為竒是其僥倖使後世師此得無疑耶雖然靖遭風雲之㑹以果敢成功後世智識無以過靖而不辨其真偽遂尊其説而以其書列於七經悲夫王師無術久矣今遇聖治當明征伐以為萬世法故臣作八陣辨正辨四竒四正天地風雲龍虎鳥蛇附握竒文曰四為竒四為正餘竒為握竒曰天地風雲龍虎鳥蛇此十九字者黄帝握竒經三百六十字之文也後世誦握機之文推而廣之曰陳者數也中必零者大將握之四面八向皆取其凖焉四頭八尾觸處為首敵衝其中兩頭皆救數起於五而終於八兵家者流雖縱横辨論所可知者握機大意而已然四竒四正龍虎鳥蛇之義意亦不明莫識其要有以天地風雲為四正龍虎鳥蛇為四竒者有以金鼔之數一二三四更相迭用為龍虎鳥蛇隊之别者有以四正四竒起乎八卦而天地風雲龍虎鳥蛇為定陣執而不變者雖用兵如李靖猶且不能明説則無恠乎八陣之不傳於天下也嘗詳考竒正之文參於鳥蛇之説窮其淵源而渉其波流探其指歸而識其極致四竒四正龍虎鳥蛇其指甚明其法不逺但後世不能推㝷其義亦學古兵法者求之太過耳夫天地風雲龍虎鳥蛇者八陣之名耳猶一二三四至於八也四為正四為竒者天地風雲龍虎鳥蛇迭為四竒之説也猶以竒為正以正為竒也故以天地風雲為四正則龍虎鳥蛇為竒矣正者受敵者也竒者旁擊者也又曰先出合戰為竒一陣之間凡所受敵者皆正也所以救之者皆竒也故天地風雲四陣交敵則龍虎鳥蛇四陣為竒而應之矣龍虎鳥蛇四陣受敵則天地風雲四陣為竒而救之矣然豈特八陣有龍虎鳥蛇竒正之説小而一伍一隊大而一部一陣皆是也項羽二十八騎耳猶分竒正以破漢軍則知一隊一伍之間皆竒正矣今有二人鬭者一人從旁擊而救之其鬭者正也其擊者竒也故以八人為伍者天地風雲龍虎鳥蛇各居一人焉以八伍為一隊者天地風雲龍虎鳥蛇各居一伍焉以八隊為一小陣以八小陣為一大陣天地風雲龍虎鳥蛇各居一隊一陣迭為竒正莫不皆然也此四竒四正龍虎鳥蛇交相為用以竒為正以正為竒竒正相生如循環之無窮後世惑於異端紛紜之論巧文穿鑿遂失其真至於龍虎鳥蛇為四獸之陣以商金羽水徵火角木白虎青龍𤣥武勾陳等紀而象之此又求之過也辨八陣伍法八陣所以不明於後世者何所傳者握機大意而已所不傳者伍法而已夫有伍法然後有隊法有隊法然後有陣法故伍法不明則隊法不立隊法不立則陣法失傳矣然握竒之伍法具在非不傳也學者明於四頭八尾觸處為首數起於五而終於八之説以為陣法如此而不知陣法乃隊法隊法乃伍法也四頭八尾起於一伍八人之數積而至於八八六十四為一隊積隊而為陣積小陣而為大陣無非觸處為首故曰數起於五而終於八伍者伍法之謂也以五人為伍近古司馬之法也以八人為伍者上古黄帝之法也葢以竒數起是五之而二十五五等為一伍而已司馬取其法而加之故十人為五也太宗問李靖曰數起於五而終於八何也靖曰古者井田之法形如井字開方九焉五為伍法四為閑地此數起於五而終之於八也此李靖不明乎五之義而闕説以欺太宗耳夫井田九位以為陣法猶云可也而四為閑地此義何也如此則終於八者何據而言乎八陣之法若曰數起於伍法而終於八陣之謂也則知八陣伍法亦明矣或曰古者兵法皆以五人為一伍而八陣亦曰數起於五豈八陣之法亦以五人為伍乎曰不然太宗曰伍法有數家孰者為要則知伍法不止五人為伍也李靖亦曰漢制有尺籍伍符後世轉籍以紙為之於是失其制矣由是言之則黄帝八伍之法不存所存者司馬五伍之法而已嘗觀武侯布石為陣縱横八行八八六十四然後知八陣之法以八人為伍以六十四人為隊而握機之數不與焉自伍法而生隊法自隊法而生陣法自小陣而大陣皆以八為數也故一伍之中者有伍必有長一隊之中有長必有副以竒數足之兵七十五人為一大隊三代以來教車戰者取一隊七十五人之數分而三之取一伍十人之數分而兩之以五人為伍十五人為一卒三卒之數步卒七十二人甲士三人共七十五人為一車之隊其穰苴又以五人為伍十伍為隊至今用之則古八陣隊伍之法遂廢而不講矣此古今伍法之變也八八六十四者正陣之數也三八二十四者握機之數也正陣之數其勢方握竒之數其勢圓方圓者陣之法也正陣之變必始於方圓方猶圓也圓猶方也故自方而變圓自圓而變曲自曲而變直自直而變鋭此五陣之變初終之勢也或曰武侯八陣止有六十四其二十四者後人增之也杜牧之言夔州前武侯以石縱横八行布為方陣則知八陣止有六十四非也三八二十四者握竒之大數亦武侯之遺意杜牧之舉八八之數者握機之數有所未明故略而言之耳或曰六十四者正也二十四者竒也又曰疑軍以固有餘地遊軍以接其後列夫疑軍遊軍皆竒兵也八陣文曰四為正四為竒豈八陣之外後别有竒兵耶未之有也或曰握竒之兵既無定數而武侯必以三八二十四為數何也曰此一陣之大約也凡一陣之中握竒之數多寡與大陣相稱如金鼔旗角刀手鋭士吏傔子將之屬主將親握之者必八分之一輜重炊子斥堠鋒子工匠伎巧所以協從大陣者必八分之一此三八二十四者之大數也然後世學者不敢指二十四為握竒者以為握竒之數皆在陣中迷於中心零者大將握之之説故也八陣之體卷而藏之則為方陣圓陣而握機之數在陣中矣舒而張之則為曲陣直陣鋭陣而握竒之數在陣後矣又何疑焉故三八二十四者存之可也廢之可也存之則使後世知有握竒之數而求乎八八數之妙也廢之者使後世因乎八八之數而推㝷握竒之用也然八陣之體定於握竒若取而廢之則握竒之義隠奥難見學者述之則并與八陣而失之矣此武侯所以存而不廢也八陣之辨其説如此八陣圖序八陣之法不傳於天下久矣所傳者握竒大數而已至於四竒四正天地風雲龍虎鳥蛇之説紛紜於天下莫能得其樞要使確乎其不可破也自風后佐黄帝破蚩尤歴千餘載至武王伐商太公始增損握竒之法以四萬五千人破紂七十餘萬而增損之文亦久失其傳矣戰國譎詐如秦韓游談如蘇張用兵如孫吳皆不聞有推明八陣之論雖漢武帝使公孫𢎞敷演其意而霍光習之於長樂館大扺名有而實亡矣不然衛霍名將何無一言以及八陣乎漢末羣雄角逐三國爭衡雌雄之勢未有所分諸葛孔明以八陣之法佐先主於﨑嶇羈旅之中竟成鼎足三分之勢南方之戰七擒孟獲祁山之戰聲振華戎司馬懿見其營壘以為天下竒才此武侯深得八陣之妙而祖乎黄帝之遺法也雖其書不存所可見者夔州石陣而已自太公至三國千有餘載八陣之法亾而復存幽而復明自武侯至今又千餘載矣未有能發明其義者也去古既逺異端如林李靖執四竒四正龍虎鳥蛇之文馳騁私意巧詞鑿説率皆逞其妄喪其真八陣之意愈亂而不可攷唐人李筌談兵著書尤為異説注隂陽術數之學以八卦起成八陣雖為八義以為天圓地方風鋭雲垂龍飛虎踞蛇蟠鳥翔取物成象附會其説肆為竒怪近乎不經裴緒論兵雖稍近理然亦以八陣各别為陣又加以一而九謂九陣之法其部隊管曲分合形勢與八陣之法背馳尤甚其書又載孔明八陣之名以乾為連衡坎為龍騰艮為中黄震為折衝㢲為虎翼離為鳥飛坤為握竒兊為洞當雖必有依據然特謬傳必非孔明真法裴緒掇取其説以為九陣之證焉耳葢嘗學八陣以筌為法象之論出於臆説非八陣本意取四竒四正之文反覆研究然後見天地風雲龍虎鳥蛇之義昭然甚明無他險怪竒異者然而所疑者八陣之法不傳猶未敢信其説其後過永安見武侯布石為陣縱横八行於是得其八陣立法者為甚詳焉葢黄帝八陣之法以八人為伍八八六十四人為隊積而廣之至八八六十四陣皆是法也然武侯八八之數不知自得之歟抑亦有所宗承而為之歟固不可得而知也然後四竒四正龍虎鳥蛇之義與夫四頭八尾觸處為首數起於五而終於八其義皆八八之義冥符暗合然後知武侯以五八本法也自伍法而求隊法自隊法而求陣法而握竒之文昭然可得之矣葢八陣之法虚中之法也自伍而至陣法皆虚其中焉當於是虛中之法而足握竒之數故八人為伍置伍長一人八伍為隊置長副三人以八隊為一大陣三隊之數均置子將吏傔金鼔旗角刀手鋭士之屬八分之一大將握之居其中以制八陣焉八陣之數其四方三千有竒計小陣六十四而為大陣者一而已矣四竒四正龍虎鳥蛇各角配偶迭為竒正卷而藏之則為方陣為圓陣舒而展之則為曲陣為直陣為鋭陣八陣之體陣間容陣隊間容隊以前為後以後為前進無奔衡退無速步敵衝兩頭首尾相應敵冲其中兩頭皆救數起於五而終於八方陣者變陣之始終也故自方而變圓自圓而變曲自曲變直自直變鋭鋭而復直直而復曲曲而復圓圓而復方以竒為正以正為竒竒正相生如循環之無窮矣或曰物之不齊物之情也兵有衆寡必然之勢也武侯布陣止以八八六十四者果能盡合衆寡之用乎曰八八六十四者八八生六十四不可改也故八人為一伍八伍為一隊八隊為一部此八八六十四伍為一小陣也八隊為一部八部為一將此八八六十四隊為一陣也八部為一將八將為一軍此八八六十四部為大陣也自小至大從微至著積而廣之無非八八之數者故武侯以石為陣合乎易數通乎鬼神此江流所以不能轉也又曰八八之數則誠不可易矣握竒之數存乎人無定數也以正兵之數如此而握竒之數當用如此如身使臂臂之使指雖多無嫌雖少無害也故一伍之間伍長足以制之矣一隊之間隊長足以命之矣以至一部一將而一陣自小陣中陣而大陣金鼔旗角吏傔之數與夫大將總管子將之屬各有率統足以指揮號令鈐制四面八向而無失乎節此握竒之大要也故嘗推演其數握竒悉繪為圖專見其法庶幾繼千古湮没之學明黄帝不傳之書八陣幽微如指諸掌矣李靖杜佑損益古制共成十二將兵作為陣法自一至九變入無窮十二將兵目曰四竒曰八正以步人為正馬軍為竒四竒一曰前竒二曰右竒三曰左竒四曰後竒八正一曰先鋒二曰左角三曰右角四曰右爪五曰左爪六曰左牙七曰右牙八曰後軍常以一竒當二正前竒當先鋒左角右竒當右角右爪左竒當左爪左牙後竒當右牙後軍四竒取稟於大將八正取稟於四竒故正常以竒為首所謂以寡制衆者此也居則各視其竒之所止出則各視其竒之所行則竒常居前卒然遇敵則觸處為首騐於亮之八陣靖之六花其法不相逺矣以下制為陣法凡八變因敵變化循環無窮焉第一大將軍營陣利布竒正列營則開四門前門在先鋒左角之間左門在左爪左牙之間右門在右角右爪之間後門在右牙後軍之間大將軍營陣亦曰四門陣又曰方陣象金其陣利守初先鋒左角馬隊更畨而出五畨而遍次前竒出於陣前更畨出擊八畨而止返入本處而右竒出次左竒出次後竒出周而復始見利則左竒後竒自兩門而出必勝則四竒由四門俱出兵觸前則前竒應觸左則左竒應觸右則右竒應觸後則後竒應行則前竒居前次先鋒次左角次右竒次右角次右爪次左竒次左爪次左牙次後竒次右牙次後軍止則四頭八尾遇敵觸處為首應敵則擊尾而首至第二變鴈行陣利以衆敵寡及利圍先正陣馬更畨而出五畨而遍次出竒隊馬更迭為竒正八畨而遍如見利則兩竒俱出必勝則四竒俱出第三變七門陣平川廣野以衆敵寡及利用正兵第四變雙門陣先左爪右牙正隊馬更畨而進次左角右爪如之次出前竒右竒兩將故擊左則前竒應擊右則右竒應見利左竒後竒俱出其陣利前狹後廣及利奔衝分合制敵亦曰鋭陣象火第五變八門陣更畨四面八門而出以應敵見利則左牙後竒引四正為左右翼以勝之其陣利以寡制衆及利自固亦曰圓陣象土第六變四天陣利於阻中卒然遇敵分其兵以據阻第七變張翼陣利吞敵亦曰曲陣象水凡曲陣應鋭陣方陣應直陣第八蛇行陣利用竒亦曰直陣象木先左角先鋒馬更畨出遍次前竒全將從左出戰右竒自右進補前竒左竒自左出補右竒後竒自右出補左竒前竒還却自左入補後竒如此周而復始見利左竒引二正為左翼後竒引二正為右翼以擊之右因敵變化與地形之宜終而復始以取無窮焉歸屯即攅屯經摺撒單行手接手成營撒陣即下營抽替撒雙行縱五歩横二十五步積實占地一百二十五步為歸屯開才四面各二十五積虛若干為撒陣中營正居十三步中陣從中應外抽戰隊從中起最中則最先在外也倭兵用鎗亦是前一層支住第二層三層從前層人腋下鑽出向前戳人五十八倭兵止二十四人在千軍圍中每四人背對背左右前後各當一面用鎗殺出傷軍五六十人右萬全陣法凡七圍共成一陣内三為方陣一為前鋒一為後殿一為左翼一為右翼凡中心連排方陣三每陣各大將一人主之其陣各方五里人相去一里東西占十七里每陣周迴二十里計七千二百步每五步為一地分每一地分用戰車一乘兵二十二人三人在車上四人掌拒馬四小牌四槍四劒四六人掌床子弩二四人掌掉刀二小牌二三人掌圓牌三一陣計千四百四十地分戰車千四百四十乘地分兵為三萬一千六百八十人若無地分兵士五千人以三十人為一隊計百六十六隊餘二十人其兵士隊於陣内列行拒馬小槍劔步弩人各一具床子弩棹刀半之小牌八千六百四十步刀團牌各四千三百二十步望樓八座每座望子十人計八十人凡陣中貯糗糧軍中所用之物又每牌面開一門為臨時啟閉之節東西稍陣各用騎兵萬人解鐙分為兩行前行配五十騎為一隊計二百十五隊共六千二百五十人後行配三十騎一隊計百二十五隊共三千七百五十人路探馬計三十隊每路各浮圖子排列計百六十五騎輕騎七千五百人槍牌人各一副劒與骨朶半之前後陣各用騎兵五千解鐙分為兩行前行配五十騎為一隊計六十二隊三千一百人後行配三十騎為一隊計六十三隊一千八百九十人餘十人五路探馬計五十隊後陣減兩路牌每路各浮圖子排計二百七十五騎輕騎三千八百人槍團牌人各一副劒骨朶各半之三陣圖凡用兵士十四萬九百三十人十一萬二百八十人步内二百四十人充望子三萬六百五十人騎内六百五十人充探馬數内騎軍及無地分兵士共四萬五千六百五十人三萬六百五十人騎一萬五千人步也伏詳此制特以河朔之壤逺近如砥敵人恃馬常為奔衝故因洞當餘法增廣其制所以挫馳突之鋭明堅重之威也大陣即中軍陣也布陣之法大約指畫分明進退有節審地勢設陣形或排長陣常山蛇陣也或排方陣今號四門斗底陣以軍步槍刀手在前為方陣即四面排布凡一指揮五百人則六十人鎗手四十人刀手雜以旁牌標槍令廣右步軍悉教鎗牌當陣面聯布木拒馬或間以大車為之陣脚兵按陣書舉鹿角設戎車為方陣步騎相參大抵皆古法也良弓勁弩居其後以雙弓床子弩參之行伍厚薄出於臨時務於專整戎馬無以馳突一陣開四門騎兵居其中候出戰即開門放戰隊出出絶閉之有駐隊有戰隊環相為用不竭人馬之力也若馬軍在前先出戰即候戰久抽歸步軍陣後若排方陣即抽歸陣中押大陣古之中軍也觀大將軍鼓旗所在應敵用兵俱稟成筭有先鋒陣䇿先鋒隊拐子陣前陣拒後陣皆受節制凡一將佐一部隊一營壘大小相轄上下相維元帥統之故居則營壘辦行則陣隊成此其大較也如偏師出征或行隘狹之地則隨形布陣不可限以常法東西拐子馬陣為大陣之左右翼也宋北面行營拐子陣并精選精騎夷狄用兵每弓騎暴集偏攻大陣一面捍禦不及則有突奔之患因置拐子陣以為救援其兵量大陣之數臨時抽揀先鋒陣春秋傳出曰治兵入曰振旅所以辨等列順少長也説者云出則以少者在前先勇力也還則在後明尊卑也是知出師之時以少壯勇健之士在前則先鋒之義也入則少壯勇健者在後則後殿之義也當是列國諸侯戰陣軍旅已用此法楚人軍行右轅左追蓐前茅慮無中權後勁謂前建茅旌以虞敵之有無又使權謀者居中勁悍者在後也詩曰伯也執殳為王前驅軍鋒之冠乃前代才力之選漢有樊酈滕灌先登陷陣光武以馮異馬武為衆軍前鋒曹魏以于禁張遼樂進徐晃迭為軍鋒晉謝𤣥鎮廣陵領應募驍鋭為前鋒後唐置踏白横衝二軍自古先鋒之選所以禦奔衝陷堅陣擊鋭師盡須勇力也宋朝行營常選精兵置先鋒陣將領三員或二員押之慮捍禦不及患在奔衝又置䇿先鋒陣咸平中真宗觀陣圖因曰北戎冦邊常遺精悍為前鋒若捍禦不及即有侵軼之患今盛選鋭兵驍將統領别為一隊遏其奔衝彼既挫鋭而退餘則望風不敢進矣䇿先鋒陣置陣在先鋒陣後驍將一員統之先鋒抗敵或兵勢不支則䇿先鋒陣為應援禦其奔突前陣宋用兵排陣之法中軍大陣之前别擇鋭士為竒兵謂之前陣按風后握竒圖曰凡兵萬二千五百人為軍有中壘有外壘有陣兵有竒兵陣兵九千人竒兵三千孫武曰三軍之衆可使受敵而無敗者竒正是也謂當敵以正陣决勝以竒兵前後左右相應則常勝而無敗凡戰以正合以竒勝當敵為正外擊為竒則用竒之䇿揣摩敵形指向分衆兵非貴多也乘機取勝而已咸平景徳歲契丹南牧三路重兵㑹合中軍陣步騎常滿十萬人前陣騎士滿三萬人約握竒圖竒兵之數無地分馬軍輕鋭之兵也凡一指揮各成戰隊處大將營陣左右前後備緩急驅使其戰隊多以臨時分置無定數拒後陣殿後兵也凡出征伐并為拒後軍陣之置糧道居後若彊冦對壘欲圖竒變引重兵踊戰潛選精鋭由間道掩襲我委積輜重則須殿一捍之宋咸平中上出北面地圖曰北敵好遣精兵出大陣後斷我糧道因别選良將領二萬人兵殿其後倚之捍冦緩急用防腹背受敵之患宋神宗嘗謂今之邊臣無知竒正之體者况竒正之變乎且天地五行之數不過五五陣之變出於自然非强為之嘗曰李靖結三人為隊必有意星書羽林皆以三人為隊靖深曉此非無據也趙竒奏曰置陣之法以結隊為先李靖以五十人為一隊每三人自相得者結為一小隊合三小隊為一中隊合五中隊為一大隊餘押官隊副隊頭左右傔旗五人即充五十並相依附聖制每一大隊合五中隊五十人為之中隊合三小隊九人為之小隊合三人為之亦擇心意相得者又選善槍壯勇者一人為旗頭令自擇如己藝心相得者二人為左右傔自選勇悍者一人為引戰又選軍校一人執刀在後為擁隊凡隊内一人用命二人應援小隊用命中隊應援中隊用命大隊應援大隊用命小隊應援如逗撓觀望不即赴救致有陷失者本隊委擁軍校次隊委本轄隊將審觀不救所由斬之其有不可救或赴救不及或身自受敵體被重創但非可救者皆不坐其説雖與古同而用法尤為精密此葢陛下天錫勇智不學而能也然議者謂四十五人而一長不若五人而一長之宻且以五人而一長即五十人而十長也推之於百千萬則為長者多而統制不一也至如周制五人為伍屬之比長五伍為兩屬之閭胥四兩為卒屬之族師五卒為旅屬之黨正五旅為師屬之州長五師為軍屬之命卿此猶今之軍制百人為都五都為營五營為軍十軍為廂自廂都指揮使而下各有節級有員品亦昔之比長閭胥族師黨正之任也議者謂十伍之制於都法為便然都法恐非臨陣對敵决勝之術也况八陣之法久失其傳聖制一新稽之前聞若合符節夫法一定易以致人敵好擊虚吾以虚形之敵好背實吾以實形之然而所擊者非其虚所背者非其實故逸能勞之飽能饑之此所謂致人而不致於人也誠一等初用李靖六花陣法約受兵二萬人為率為七軍兩虞候軍各二千八百人取戰兵千九百人為七十六隊戰兵内每軍弩手三百弓手三百馬軍五百跳盪四百竒兵四百輜重每軍九百是為二千八百人帝諭近臣曰黄帝始置八陣法敗蚩尤於涿鹿諸葛亮造八陣圖於魚腹平沙之上壘石為八行晉桓温見之曰常山蛇勢此即九軍陣法也至隋韓擒虎深明其法以授其甥李靖靖以時遇久亂將臣通曉者頗多故造六花陣以變九軍之法使世人不能曉之大抵八陣即九軍九軍者方陣也六花陣即七軍七軍者圓陣也葢陣以圓為體方陣者内圓而外方圓陣即内外俱圓矣故以方圓物騐之則方以八包一圓以六包一此九軍六花陣之大體也六軍者左右虞候軍各一為二屬虞候軍左右廂各二為四廂軍與中軍共為七軍八陣者加前後二軍共為九軍開國以來置殿前馬步軍三帥即中軍前後軍帥之别名而馬步軍都虞候是為二虞候軍天武捧日龍神衛四廂軍也中軍帥總制九軍即殿前都虞侯專總中軍一軍之事務是名實與古九軍及六花陣相符而不少差也今論兵者俱以唐李筌太白隂經中陣圖為法失之逺矣朕嘗覽近日臣僚所獻陣圖皆妄相眩惑無一可取果如其説則兩敵相遇必須遣使預約戰日擇寛平之地夷阜塞壑誅草伐木如射圃教塲方可盡其法爾以理推之其不可用决矣今可約李靖法為九軍營陣之制然李筌圖乃營法非陣法也朕采古之法酌今之宜曰營曰陣本出于一法特止曰營行曰陣在竒正言之則營為正陣為竒也為將者少知將兵之理且八軍六軍皆大將居中大將譬則心也諸軍體也運其心智以身使臂以臂使指攻左則右救攻右則左救前後亦然則軍何由敗也熙寧七年詔已降五陣法軍諸將教習其舊教陣法并罷葢九軍營陣為方圓曲直鋭凡五變是為五陣國朝兵部尚書靖逺伯王驥嘗督師征麓外克之還守南京沈静有大畧嘗閲師覆舟山北問將校曰部伍行列若何曰隊各五十人始為一字列聞鼔聲則變而為方圓斜直之勢今日所校練是也驥笑曰此何以約束兵五人為伍必一人居中執旗而四人者立四面此四人者皆聴止一人所使人皆堅立不動赴敵則五人必居中一人使四人者相顧應四人死中一人不得獨生由五人至二十五人為一隊最中一人執旗稍大以令其四面如前五人之法又倍而成五則為一百二十五人其再倍則為二百五十人為一營左右前後相應而聴于中以一百二十五人分寄四隅與中為遊擊出竒而正兵一百二十五人堅駐不動互相倚賴而功可成矣又以五營如前法分布之則正兵一千二百五十人更以一千二百五十人如前法為竒兵遊擊則縂二千五百人為一師相機調遣聴于中軍主將一人之令其下由伍而隊而營各有一人為中中一人者以將之令令其餘人如是豈有紀律不嚴約束不齊而功不成哉當時將校莫不信服驥嘗誨人曰士大夫不可無憂國之心不可有憂國之言提綱曰邇來諸將皆謂可戰則戰奚以陣為殊不知用陣以束部伍用衆如用一使其勇者不得獨進怯者不得獨退以求萬全之義也昔諸葛亮推衍八陣以巴蜀弱卒數萬屯渭水伐魏司馬宣王以十萬之衆不敢與戰馬隆率步卒三千按八陣圖破樹機能數萬騎以復源州今為將者統兵數萬果可不用陣乎如無陣法則衆為一簇左右不能相應首尾不得相援豈得不敗故廢陣形而用兵者敗将也執陣形而求勝者愚將也其用陣之法始敵攻吾右以天衡八隊敵之次出天前後衝八隊張兩翼而攻之是為鳥翔陣如勝未决再出西南西北二隅風雲八隊夾擊之是為虎翼陣勝又未决以東南東北二隅風雲八隊邀其後或圍繞之是為蛇蟠陣如兩陣相當而敵未動者我先出西南西北二隅兵徃來敵傍撓之伺敵空虚之處而奮衝之是為風揚陣大將列中軍以待敵或伏兵四隅候敵來戰起而聚擊是為雲垂陣又有遊兵二十四隊或遮敵援兵或夾擊左右或擊其背或絶敵糧道或邀敵歸路而取勝也故陣有八面舉此一面以例其餘八陣之制初無定位皆臨時制宜隨地而設故地有廣狹尖斜之形陣有方圓曲直之勢錯綜八卦實河圖縱横十五之圖井字開方之義大將居中諸部連繞四頭八尾觸處為首敵衝其中兩頭皆救如兩手之捍頭目許洞曰結陣之術不可踈踈則難應不可宻宻則難用首欲㨗翼欲輕腹欲實尾欲正㨗者不可使過輕者不可使凌實者不可使不應機正者不可使不知變每步兵一人占地兩步騎兵一人占地四步取其出入轉動之便也每一陣分五校四陣皆有五校五校各立將軍校尉以准於古毎校亦各有陣數其分布部伍皆准圖之狀逐部兵器率以鎗㦸戈鋋居首隊而包於弓弩焉左校以青龍旗表之右校以白虎旗表之前校以朱雀旗表之後校以𤣥武旗表之中校軒轅大將所處左鼔右旗四陣並同謂之一隊者二十五人一部者二十隊也每一校不常其部各列陣數應敵之勢貴戰鬭之際前後不相交亂也飛鶚陣前校出首騎者所以為衝也前出一部為嘴次四部為目餘五部包之於首數焉左右校出爪騎者内以副身外以副項及首也夫鶚以搏擊為俊故陣欲取嘴爪之利焉重霞陣衝騎茍衝敵陣不動即分兩穗退於左右校之前即麾前校騎兵兩穗進擊步士即不可輕進但在於本處受敵若前衝騎退前校騎兵進前校騎兵退即衝騎進夫雲霞以開闔進退不常其狀故前校騎兵徃來氛氲以象之也長虹陣及八卦陣皆有衝騎者外以掩敵之不備内以衛大陣也夫長虹以為名之者取陣形後曲前彎有抱鼔之勢八卦以名之者取八面受敵之義也凡四陣逐部結陣之法横七陣為首横七隊為身横六隊為尾受戰之將大陣不可輙動敵衆來薄則大陣各受敵夫四陣所用之法若敵為彎陣我以飛鶚陣當之敵為直陣我以重霞陣當之敵為突陣我以長虹陣當之敵引四面圍城我以八卦陣當之此所謂應敵者也其逐校所動各因敵之去就焉飛鶚前校首騎三陣一十部第一陣一部第二陣四部第三陣五部前校項兵三陣步兵二十七部三陣各九部第二陣并第三陣亦如之中校五陣步兵九十二部四陣各二十一部第五陣八部尾兵一直陣步兵二十一部左校爪騎二陣五部第一陣三部第二陣二部右校爪騎亦如之左校翼騎四陣二十部四陣各五部右校翼騎亦如之長虹前校三陣步兵二十七部合三陣各九部中校五陣步兵九十二部第一陣一十九部第二陣三陣四陣二十一部第五陣一十部後校一陣步兵二十一部左校衝騎二陣八部右校衝騎亦如之左校騎兵四陣二十二部第一陣二陣各五部三陣四陣各六部右校四陣與左校四陣同法重霞前校衝騎二陣一十二部二陣各六部前校四陣步兵三十五部騎兵八部共四十三部第一陣步兵九部騎兵左右各二部第二陣步兵九部第三陣與第一陣同法第四陣步兵八部中校四陣步兵八十四部四陣各二十一部後校一陣步兵二十一部八卦衝騎四陣各五部每陣一部居中四部側居於左右前後四處前校四陣步兵二十八部騎兵六部第一陣步兵七部騎兵左右各二部第二陣步兵七部第三陣步兵七部騎兵左右各一部第四陣與第二陣同法左右後校並同第一立營總圖凡兵馬演習營陣初分五股而行第一層選鋒竒兵五隊第二層選鋒竒兵三隊兩旁各夾霹靂戰車一隊第三層霹靂駐車八隊居中與左右二路駐車俱兩隊合為一隊内二路各一隊通融為五路駐車之内以糧車四面環列羅為子圍子圍之中則中軍旗鼓也左右糧車之外各列霹靂駐車八隊仍各間以霹靂戰車二隊子圍之後霹靂戰車駐車與殿後竒兵又設三層亦分為五路如哨法而營圖備矣霹靂車毎一輛上載霹靂砲十八桿火箭二百枝每隊管隊官一員執旗軍吏一名霹靂車五輛弓箭手五名大連珠手五名二連珠手五名手銃手十名盞口將軍四位該砲手八名旁牌五面該牌手十名捉馬軍人七名霹靂駐車一百六十輛守車官兵三十二隊一千六百六十四員名霹靂戰車四十輛守車官軍八隊四百一十六員名選鋒竒兵一十六隊官軍八百三十二員名夜不收并吹鼔手共一百名内中軍官一員千總官二員把總官一十二員合營共車二百輛官軍三千二十七員名此一營之總㑹以後因地制形開闔進止隨敵變化皆自此營出去第二遇敵駐戰圖凡兵馬遇警下營則選鋒并殿後各竒兵四面成列迎敵䕶衛即將各霹靂車照依行伍内外環列結為兩重隨車軍士俱各下馬馬歸營内士出營前牌手執牌立於前鋒車空毎空各四面其大小連珠手把盞口將軍等火器弓箭相兼裝整列置三班立於戰車後駐車前營下既定選鋒馬軍各驟隊營之四角三隊攅整相掎又於營之四門每門一隊分為兩隊列於門之左右虜來衝突則頭火器出於前鋒車前鋒迎機㸃放二班火器出至戰所頭班方回三班火器出至戰所二班方回更畨迭出循環不窮如敵勢不退或大衆四集則將箭鋒戰車上霹靂火砲箭一擁齊發而四角選鋒竒兵弓箭手魚貫繼之虜衆可摧陷矣凡下營時擺營以鐡索鈎連防其衝突軍人捉馬盡斂入車營内輜重器具俱在中軍子圍此方營也因地制形或圓或直或尖或曲行營對敵悉依此法云第三前鋒車戰圖復套之兵有車戰有騎戰有步戰隨宜應敵如行營報到賊勢重大川湧雲集而來則當用車戰中軍舉號將前後霹靂戰車盡數掣出連營結隊布為方陣選鋒竒兵伏列戰車後老營前而老營又綴於後以為聲援俟賊之來挨牌火器畨休叠發如前攻打遇賊氣少衰則營中竒兵奮勇突出就陣擒斬是以火器攻其堅以精銳擊其惰勞逸主客之勢在我而賊疲於奔命矣第四騎兵逐戰圖車戰足以自衛而不足於追逐如遇賊兵衝戰氣衰力疲勢將欲遁或哨得遊騎散失亂而不整或襲搗巢穴驚其内顧其勢必用騎戰選鋒軍士内弓箭刀棍火器之類各就所長責差騎將統領隨宜擒斬勢必有功第五步兵摶戰圖火器足以威逺而不宜於近騎兵利於平易而不便於險如隂雨晦暗或谿谷陡隘賊勢奮迅飄忽至營前勢必當用步戰即出前鋒竒兵馬留營内步出相接弓矢徃來什伍俱前如此奮擊撲斫賊必辟易而險阻之地我軍亦有備矣第四第五陣總是馬前車後俱用選鋒當敵但有上馬下馬之别耳第六行營進攻圖今日進兵主於驅敵出套不專浪戰我兵既入重地盤據之敵必來迎戰戰數失利自然潰遁遁則當行營以進逼之是故霹靂火車與馬步官軍整㮶嚴肅以防敵之蹂躡前後戰車俱分營之兩旁勢如堵墻以備夾攻四面竒兵一直前一殿後以制衝突此戰中寓守使敵難撼也鎗砲手似是步兵第七變長驅圖地形有險易戰勢有開合如遇套中山溪險阻道路迴合運掉車馬不無煩難今因地制形如兩旁險隘而前後平坦即以兩廂戰車分為前後首尾而行却將前後馬步官軍分為左右兩翼遇敵之來且戰且行此亦安静持重之道第八獲功收兵圖出師千里戰非一合倘遇有功便當斂戢不宜玩黷我兵乗勝追斬敵如糾衆來援中軍鳴金舉號速將戰士斂入車營敵衆雖至無能為也遇夜則馬軍戰車合歸大營照舊分布仍撥竒兵二三百名毎五十名聨為什伍分投哨探於大營之外仍坐更傳籌以嚴警報陣圗總說一敵兵據套日乆為患日深恢復之議自來每難之殊不知彼既得我地利孳牧轉盛氣勢日强門庭之㓂不思剪除是長其不逞之謀而養其無厭之亂也是故河套乃必争之地兵出故有名也夫兵出有名事可成矣茍坐作進退士卒有所未精開闔變化營陣有所未熟攻取擊刺器械有所未利山川險易形勢有所未諳是故有名無實又非兵家之所宜今將行師機宜列為八圖因次其說夫凡事必有綱維而後綜理運用有其地故先之以立營總圖聚兵應敵則必有戰故次之以駐戰駐戰者兼車騎步而用之也戰無常勢體無定用如平原曠野賊勢重大則當先用火器戰車以摧其堅火器者中國之長技所以褫敵魄而奪其氣者也故次之以選鋒車戰車戰者持重之計至於先登陷陣追奔逐北取勝於數十里之外者非騎兵不可故次之以騎戰險道傾側猝與敵遇車騎所不及施奮臂鏖戰而賊不敢近者步兵之良也故次之以步戰敵之長技不過弓矢徤馬彼來挑戰我以神機火砲制之必挫衂而遁遁則乗勝以逐之故次之以行營行營之際開闔竒正變動不拘使敵不可測故次之以變營以上戰陣之律皆先為不可勝以待敵之可勝固不患於無功也每遇陣斬獲有功期於萬全故以獲功收兵終焉然營變有八其實一營之所為也昔趙充國為將行則為營陣止則堅壁壘謹烽堠逺間諜故所向克㨗其謀蓋不出此議者謂套地山溪險阻車戰恐非所宜本部嘗據降卒及内地諜者布哷齊托托歡等俱報稱套中地形多平野沙漠而山林險阻十無二三今車騎步兵表裏兼用未見其不可也昔衛青擊匈奴出塞千餘里以武剛車自環為營可為明驗然今之營陣又不獨自環而已有體有用有動有静有竒有正如隂陽之相生也如雷霆之交作也如山川之流峙也止則不可撼也行則不可禦也我軍有所恃而不恐束部伍也敵軍有所憚而不攻制衝突也故曰先為不可勝以待賊之可勝制人而不制於人也至於臨敵相機隨宜變化或設伏以掩其不意或乗虚以覆其巢穴或縱反間以疑其黨或募死士以夜斫其營或先聲以寒其心或掎角以分其勢或布威信以開其降或申曉諭以縱其歸緩急進止務在隨時難以遙度盡言也謹將陣圖大畧總說於此而隨圗備細節目則各列於其下方云一營霹靂駐車并霹靂戰車共四十隊每隊車五輛共二百輛每車一輛上載霹靂砲一十八杆二百輛共砲三千六百杆每杆每出藥八錢五十出共藥二斤半一十八杆該藥四十五斤每營共該藥九千斤每杆每出鉛子五個每個重八錢五十出該鉛子二百五十個重一十二斤半每營共該鉛子九十萬個共重四萬五千斤火線每杆五十條共一十八萬條火箭每輛二百枝共四萬枝每車大連珠砲一杆二百輛共二百杆每杆每出藥一兩八錢三十出共藥三斤六兩每營共藥六百七十五斤一兩八錢每杆每出鉛子十個每個重一兩八錢二十出共鉛子二百個共重二十二斤半每營共該鉛子四萬個共重四千五百斤每杆火線十條共火線二千條每車二連珠一杆二百輛共二百杆每杆每出藥一兩八錢三十出共藥三斤六兩每營共藥六百七十五斤一兩八錢每杆每出鉛子五個每個重一兩八錢三十出共鉛子一百五十個共重一十六斤一十四兩每營共該鉛子三萬個共重三千三百七十五斤每杆火線十條共火線二千條每車手把銃二杆二百輛共銃四百杆每杆每出藥八錢五十出共藥二斤半每營該藥一千斤一兩每杆每出鉛子二個每個重一兩五十出共鉛子一百個共重六斤四兩每營共鉛子四萬個共重二千五百斤每杆火線二十條共火線八千條每隊盞口將軍四位四十隊共一百六十位每位每出火藥八兩二十出藥十斤四位該藥四十斤每營共該藥一千六百斤每位裝就小砲二十個四位該八十個每營共該三千二百個木馬子亦該三千二百個火線三千二百條選鋒竒兵一十六隊每隊手把銃一十四杆共二百二十四杆每杆每出藥八錢五十出共藥二斤半十六隊共藥五百六十斤每杆每出鉛子二個每個重一兩五十出該鉛子一百個重六斤四兩十六隊共鉛子二萬二千四百個共重一千三百四十五斤每隊二連珠八杆一十六隊共一百二十八杆每杆每出藥一兩八錢三十出共藥三斤六兩十六隊共藥四百三十斤二兩每出鉛子五個每個重一兩八錢三十出共鉛子一百五十個重一十六斤十四両十六隊共鉛子一萬九千二百個共重二十一百六十斤每杆火線十條共該火線一千二百八十條各項通共藥一萬三千九百四十斤三兩霹靂砲共三千六百杆大連珠共二百杆二連珠共三百二十八杆手把銃共六百二十四杆盞口將軍共一百六十位小飛砲共三千二百箇各鉛子不等通共一百五萬一千六百個共重五萬八千八百七十二斤武編前集卷三
