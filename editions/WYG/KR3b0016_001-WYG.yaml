body:
  text: 武編前集卷一明唐順之撰將許洞曰國家行師授生殺之柄大將所主將者國之腹心三軍之司命也可不愼於選乎茍欲命將豫以精誠辨其可否者有四一曰貎二曰言語三曰舉動四曰行事其一曰貌凡睂上雙骨横起而隆巘者語言而不相合者目如鷹仰視者方坐内多虚驚者行而瞠乎必照後者目睛白多而有赤熖瞻視不端者此六者人有其一斯人常藴不臣之心不可使之也豐下鋭上神氣安詳者重德而善安衆人也目黑多白少㸃睛深而神氣與形相副者機度沉厚不可以詐動人也圓睛瑩朗五嶽相照者燕頷虎頭者心機疾速勇而有斷人也龜背虎臆㸃睛深而朗徹瞻視詳諦而神骨聳峭者雄壯有慮人也是五者人有其一可使之也至若神氣重濁骨相不正頭薄面淺頸大腹細目睛昏瞢㸃睛近上視顧不正此皆志氣淺劣智識庸鄙人也其二曰言語人有言肆而目駭視者心懐異圖也言枝蔓而不徑者心有隱也矜大人善惟恐不至者黨人也言錯綜而無所歸者心躁競也方言而他視者心不誠也言平而色下者心有所屈也方言頻四顧者其辭妄也言人之短而視不定者誣搆人也言多以私事為憂者顧妻子之人也言大而理不精者其學虚也色悦而徐徐順人意者佞媚人也矜已善而訐人不善者崛强人也言欲發而却縮者含蓄人也言無公利必及利者貪人也色卑而言多求者志下劣人也事曲而言直氣悖而言順色鄙而言大事不詳而强能理矯而强正此皆姦詐人也是十有六者人有其一不可使也言大而意精至者有識度人也言希而出必中者志節人也言動而必及國家者忠孝人也言奮而不迂者壯直人也辭寡而意懇者至公人也言多及軍吏之私者善拊恤人也言及陣敵喜動於色者好勇人也言及細㣲而能剖析是非者有智人也言迂濶而卒近于理者識深見逺人也言少而事詳者大度人也語氣和而神氣相稱者善納衆人也言徐徐而事備者性緩而有德人也言速而事當性急而不暴有識人也是十三者人有其一皆可使之也其三曰舉動行有狼顧者行與坐忽如驚恐者非時言語而手足紛挐者方食而不覺棄匕筯者方坐而首偏口目輙斜動者行而惟恐有人逐者欲坐而頻四顧如有所駭者方行而勃氣上騰神色自得者待下多卑恭而不實者觀事覺已如不知而目他視者十者人有其一此皆心不誠實多蓄異圖人也不可使之也行欲如大輅足動而身不揺也坐欲如山嶽形神俱定也卧欲如覆舟神氣安詳也此皆志度深沉大節崇德人也是三者人有其一可使之也其四曰行事有先己後人者好私人也事繁多而用不當者無智人也作事不急於用者無益人也作事有首無尾者偽人也先急而後慢者卒暴人也事不求詳而輙為者粗疎人也巧玅而無禆急用者浮艷人也舉措魯鈍而不適用者愚人也利害章章而不能折之者無識人也臨事而懼者懦弱人也進退不决者無斷人也記一而忘二者神昧人也事虚而搆架廣文以善為惡以惡為善者姦人也善伺人之顔色隨所欲而言者佞人也是十四者人有其一不可使之也有事簡而用當者有喜怒之事不露於色者臨大事而神氣自若者此謂神有餘人也有㣲而不棄大而不煩者㓙事不懼美事不喜者事有衆惑而獨斷之者事有衆危而獨安之者事有難動而動者事有難安而能安者此謂志有餘人也是十者人有其一皆可使之也是以知貌也者神之聚也言語也者神之照也舉動也者神之用也行事也者神之本也察其神明盡其為人之道矣况國之命將可不審於此乎帥有十過勇而輕死可暴貪而好利可遣仁而不忍可勞知而心怯可窘信而喜信人可誑亷潔而愛人可侮慢而心緩可襲剛愎自用可誘懦志多疑可惑急而心速可久孫子註曰必死可殺勇而無謀期必於死鬬者則可以設竒伏誘而殺之如梁成輕進為劉牢之所殺是也必生可虜臨陣畏怯期必於生全者則可以襲而虜之如晉與楚戰趙嬰齊具舟於河欲敗而先濟此等豈不可襲而虜之乎忿速可侮性之剛忿急速者則可以陵侮而致之來以敗之如楚將子玉剛忿晉人執其使者以怒之子玉果從晉師遂為所敗是也亷潔可辱性之亷潔者可設計詬辱之辱之必致其怒而輕出則當因而撃之若呉起節亷而中公叔仲之計是也愛民可煩性之仁慈愛人者惟恐殺傷士衆可出竒煩而擾之也若蜀先主戀民而幾為曹操追及是也李筌曰夫人柔順安恕失於决斷可與循節難與權宜强悍强猛失於猜忌可與涉難難與持盈眞良畏愼失於狐疑可與樂成難與始謀清介亷潔失於局執可與立節難與通變韜晦沉靜失於遲廻可與深慮難與應㨗夫聰明秀出謂之英膽氣過人謂之雄英者智也雄者力也英不能果敢雄不能智謀故英得雄而行雄得英而成北征録曰人之身所以能自立於天地之間者忠與義而已殺身成仁君子不恤首陽汨羅之士皆以一死見稱於千萬世之下至於忠臣義士每以所欠一死為恨是知見危致命乃古人耿耿之節而全身遠害誠趨利避害者之為耳茍無媿於忠義則死奚足靳也至於將帥則不然操兩國之死生司三軍之性命吾之安危係社禝之存亡吾之憂樂係生靈之休戚别將遠征恐敗於無援漢武所以戒李廣孤軍深入慮有圍困後世所以議鄧艾至於國之根本竟成一俘者皆基於龎涓之一死趙括不恤乃躬直出摶戰巳日上黨虎牢太原諸郡皆為秦土徒成武安之名者由其不能自保厥生遂致身隕國辱為萬世笑今之為將帥者每有委命不曰死節則曰死敵不曰願効一死報答國家則曰願以一死上報君父吁有死之榮無生之辱兵家固有貴死賤生之説矣然言士卒而不言將帥也奮死則生倖生則死兵家固有好死惡生之説矣然論士卒而不論將帥也嘗聞士卒用命矣未聞將帥用命也嘗聞士卒不愛死矣未聞將帥之不愛死也以是觀之忘命輕死者士卒之事也重命恤死者將帥之事也自今宜令戒飭將帥無輕生而深入無易敵而挑戰以沉厚不撓為法以玩忽輕舉為戒庶使將帥士卒之事不至倒用雖然死一也有愛者焉有畏者焉願與將軍决死戰此愛死也冦將率其衆來降此畏死也愛死者足以死人畏死者足以死身兵勢不敵墮於重圍廟算莫施䧟於重地當是之時將束手以就擒耶將忘命以死戰耶吁郭倬不死於苻離而死於市朝之戮皇甫斌不死於下蔡而死於南郡之囹圄是皆不死其所當死終或死其所不當死抑又可為將帥倖生者之戒兵家之法戰則敗不戰則勝兵家之秘有戰則有敗不戰則無敗兵非果不事夫戰也戰則勝負勢均矣兵危事也戰死道也勝負可聽於自然耶夫鬭勝負於死生之場者謂之戰知其必勝而後戰者謂之謀伐謀者孫子謂之上兵而攻城伐兵之䇿皆為次下故齊人之得舒不曰戰而曰取魯人之於蔡不曰戰而曰入齊人之於紀不曰戰而曰如韓信之於安邑不曰戰而曰襲曹公之於江陵不曰戰而曰下皆不戰也夫邀整整之旗擊堂堂之陣者戰也士卒之事也立於不敗之地而不失敵之敗者不戰也將帥之事也以將帥之事而責士卒固不可况以士卒之事而責將帥哉今之將帥所以動輒敗衂者皆專學戰而未得夫不戰之玅也學戰易學不戰難司馬法論國雖大好戰必亡孫子以不戰而屈人之兵為善之善舍是之外雖百戰百勝亦所不取不得已則鬭未有得已而鬬者也欲望嚴飭諸軍將帥招致謀夫䇿士講求不戰之一法若夫鬬智角力於勝負未分之地臣所不取李綱曰古之受命為將者付任未專威信未著則必有所假借以立威然後士卒可用而功名可成至於付任己專威信已著則不必如此故齊景公欲用田穰苴為將以捍燕晉之師穰苴曰臣素卑賤君擢之閭伍之中加之大夫之上士卒未附百姓不信人㣲權輕願得君之寵臣國之所尊以監軍乃可於是景公使莊賈往而穰苴因其後期不至而斬之又戮使者之僕車之左駙馬之左驂以狥而三軍之士皆振慄燕晉之師聞之解去追擊之盡取所亡之地振旅以歸此付任未專威信未著而有所假借以立威者也衛青將六將軍兵出定襄以撃匈奴左將軍蘇建盡亡其軍獨以身自歸青問其罪議郎周霸曰自大將軍出未嘗斬禆將今建棄軍可斬以明將軍之威青曰青幸得肺腑待罪行間不患無威而霸説我以明威甚失臣意以臣之尊寵而不敢自擅專誅於境外其歸天子自裁之於以風為人臣不敢專權不亦可乎軍吏皆曰善此付任己專威信已著而不必如此者也後之為將者起冗散而威令未行當以穰苴為法藉貴寵而威令已行當以衞青為法夫豈不同惟度其時勢使各有所當則善矣士李筌曰勇怯者性强弱者地秦人勁晉人剛呉人怯蜀人懦楚人輕齊人詐越人澆薄海岱之人壯崆峒之人武燕趙之人鋭凉隴之人厚地氣所生人氣所受勇怯然也且勇怯在謀强弱在勢謀能勢成則怯者勇謀奪勢失則勇者怯既言秦人勁申屠之子在於嶢關杜洪之將在於􅀈水則秦人何得而稱勁呉人怯呉王夫差兵無敵於天下敗齊於長勺陵晉於黄池則呉人何得而稱怯蜀人懦諸葛孔明撮巴蜀之衆窺兵中原身為偃屍而威加魏將則蜀人何得而稱懦楚人輕項羽破强秦虜王離殺趙角威加四海諸侯俯伏莫敢仰視則楚人何得而稱輕齊人詐田横五百死士東奔海島聞横死同日伏劒則齊人何得而稱詐越人澆薄越王勾踐以殘亡之國恤孤寡之衆九年滅呉以弱攻强以小取大則越人何得而稱澆薄燕趙之人鋭蚩尤敗於涿鹿燕丹死於易水王浚縳於薊門公孫戮於上谷則燕趙之人何得而稱鋭凉隴之人勇所為勇怯在乎法成敗在乎智怯人使之以刑則死勇人使之以賞則死能移人之怯變人之心者在刑賞之門勇之與怯於人何有哉北征録曰聚天下之材者在乎財散天下之財者在乎材相為盛衰而不容兩立也夫子論何以聚人曰財志食貨者亦以財為役天下之具古人間人之君臣報人之仇怨未嘗不以此為首謀至於受千金之恩而甘心於圖窮之誅者將不止於荆軻一人而已也何者壯士之顔色不在乎血氣之剛衰而在乎牀頭之有無通神明役鬼神亦係於所積之多寡故古人一則曰輕利好施二則曰盡將家資散施鄉里朋舊三則曰不事家人生産作業是皆輕天下之財重天下之材而英雄豪傑之士感其解衣推食之恩蒙其得利則均之惠他日可卜其不我鄙而樂為之用雖赴湯蹈火不恤也故壯勇之士則曰募以財而募之也巖穴之士則曰聘以財而聘之也三軍之衆十萬之師棄性命如草芥赴鋒鏑如袵席買間諜以破其腹心之謀求鄉導以乘其藩墻之隙非有賞賚以維其心非有金帛以壯其氣彼安能樂為我用哉是謂之財材相用北征録曰孫子論間之一篇有曰殷之興也伊摰在夏周之興也吕牙在殷夫殷周之王固天命之所攸屬何伊摰吕牙之能為興亡也哉葢天命之去畱係豪傑之去就羅其英雄則敵國自下秦實無人始為可圖季梁猶在則腹心之憂未去故用間之法不以人材之未附為國家之急而以人材之外附為國家之大患五就湯五就桀者所以為造邦之臣去虞而虞亡之秦而秦伯者所以為伯者之臣韓信不用於楚而用於漢此髙祖之所以得天下樊若水不官於南唐而官扵宋此藝祖之所以得江南葢豪傑之士致之於朝廷用之於幕府則可以為忠臣為義士遺之於郊野棄之於山林則可以為亂臣為賊子得之於我則可以成帝王之功棄之於敵則適以資姦宄之䇿古之聖賢務攬英雄之心如黄石之著三略延攬英雄如鄧禹之告光武解衣推食以固其樂為我用之心吐哺握髪以啓其無鄙我之意斯為善耳不然則楊朱之岐多於南北孟軻之水决於東西天之所以資我者將轉而為資彼之具矣夏雖未亡而摰去則亡周雖未興而望至則興豈不畏哉豈不畏哉自今宜廣行招致幕府將帥精加延攬使無遺於草萊使無逸於郊野取之不拘於勢分用之不嫌於細㣲將見襄淮之翹楚江湖之豪放荆楚劒客煙波釣徒風聞霧集臂奮鬛鼓求備吾之採擇矣是謂豪傑為間人事軍律曰軍中才藝片善莫遺臨事有闕如何卒救或施小計以獲大功設一計而獲萬全或致死擒生或知情識變若多藝而無行則擇藝而棄行能謀而怯鬬則捨怯而用謀各有所長難為求備亦有雞鳴狗盗孟嘗得以脱身夷門屠夫信陵納之全國選士之時宜多採究北征錄曰髙祖以販繒屠狗之徒而得天下田文以雞鳴狗盗之徒而保其軀韓信驅市人而破趙王霸募市中人而敗王郎是皆招軍取士不拘於一門兼收並蓄不狥於一節故隨所寓以用人隨所用以成事使在彼無棄材在我無遺用也近年以來國家招軍立為定法及等仗者方為招収而身材矮短所欠毫末則雖勇如關張亦所不招無殘疾者方為刺補而指斷目眇略有小疵則雖智如良平亦所不刺自侍衛三司至江上諸軍例皆扼以等仗扼以年齒更扼以犯徒刺環而未嘗破格收刺一人豈知及等仗者未必皆可用之士有殘疾者未必皆可棄之材雖年未十六年逾六十而武藝過人雖脊嘗犯徒項嘗刺環而材武無敵豈可拘於定制竝行棄逐使居山林伺生他變是必廣行招致隨材任用故自正兵之外復收諸色材技分為二十八將各置隊伍教以本色材技兼習武藝戰鬭則普天之下無非可招之軍四海之内無非可用之卒三司五駐與夫沿邊諸屯戍自無兵少之慮矣是謂廣士李綱曰世之危亂民之失業與夫兵之潰散者多聚而為盗賊誅之則不可勝誅而力有所不給惟因而招納之以為我用其利有五以弭内患一也以禦外敵二也善良脅從者可散而歸田畝三也强猾勇敢者可藉以備行陣四也以盗賊攻冦讐勝則享其功敗則不足惜五也昔者光武用綠林下江銅馬諸軍而致中興曹操用黄巾而破紹術太宗起於晉陽取關中以定海内亦多招徠羣盗而用之然自非推赤心以置其腹中恩足以結其心威足以讋其氣使遵我之紀律而聽我之驅䇿則用賊盗有五難已嘗放肆而欲收其憤戾之心一難也已嘗虜掠而欲窒其貪婪之志二難也易置將帥則懐疑三難也畀之部曲則易叛四難也恩過則驕威勝則怨而反以為患五難也惟善駕馭者恩威得所寛猛得中内得其心外得其力使之視殺敵如仇人取敵資如虜掠雖易將帥而不疑雖畀部曲而不叛與正軍相為表裏而無驕怨之患則其難也將轉而為易昔者光武太宗曹操嘗從事於斯術矣李筌曰有深沉謀慮出人意表者名曰智囊之士有辭縱理横飛箱捭闔能移人之性奪人之心者名曰辯説之士有得敵國君臣門閭請謁之術者名曰間諜之士有知山泉水井次舍道路迂直者名曰鄉導之士有制造五兵攻守利器竒變譎詭者名曰伎巧之士有引五石之弓矢貫重鎧戈矛劒鉞便於利用陸摶犀兕水攫黿鼉挑身捕虜搴旗摭鼓者名曰猛毅之士有立乘奔馬左右超忽踰越城堡出入廬舍而無形迹者名曰趫㨗之士有往返三百里不及夕者名曰疾足之士有力負三百六十斤行五十步者名曰巨力之士有步五行運三式多言天道譎説隂陽者名曰伎術之士謀士辯士壯士死士諳知山川道路之人久從軍老將能水姦人能盗能作鳥獸聲者死囚賊軍讐人賊軍主權者親戚獸醫獵戸善算善書寫畫工雕刻匠人木匠鐵匠一辭説將招善游談辯説者充一間諜將招善聽探事務者充一鄉導將招曾歴内外道路者充一伏兵將招善搜伏隠路者充一營寨將招善辨形驗勢者充一聽望將招耳聾目瞽者充一偷劫將招善攻營襲寨者充一潛身將招善無火夜行者充一輕㨗將招善上竿立索者充一樓閣將招善緣墻上壁者充一窟穴將招善穿窟穴者充一煙火將招善飛煙走炮者充一毒藥將招善修合藥餌者充一醫人將招善醫人者充一醫馬將招善醫馬病者充一波濤將招善弄潮泛水者充一洋海將招識海道者充一風雲將招善辨風驗雲者充一孤虗將招善灼龜揲易六壬太乙者充一游獵將招善羅弋禽獸籠檻教使者充一鋒刃將招善鍊鋼團鐵者充一筋角將招善製弓弩者充一皮革將招善熏皮雙線者充一樓櫓將招善斤斧繩墨者充一油漆將招善煎油髹漆者充一機杼將招善機織錦羅者充一丹青將招善揮染繪畵者充一機巧將招雕鐫裝塑者充北征録曰今日招軍之資用有三曰鬻爵曰獻粟曰度牒皆所以調招軍之費也然鬻爵之文布滿墻壁而爵未盡鬻獻粟之諭徧下州縣而粟未聞有多獻者葢買官獻粟素係襍流人皆知其不能遠到雖優之以免詮比之以奏薦而民間終不願售者以紹興之間皆以此誘天下至承平則又以流外官待之矣此所以終不見信於天下也魏公張浚嘗得此濟時之䇿曉諭民間招軍一百人與補下班祗應招軍二百人與補進武校尉招軍三百人與補承信郎已上各有差等令不兩月軍致數萬此其為效速若影響其招軍之家自備錢糧部轄起發至樞密院及兩宣司者比類與補文資竝依軍功轉行立為定制畫一加詳昭告天下至於度牒則招軍五十人與剃一僧招軍一百人與剃兩僧如此則招軍之費不繁而招軍之門自廣是謂勸募蘇氏曰夫惟義可以怒士士以義怒可以百戰凡戰之道未戰養其財將戰養其力既戰養其氣既勝養其心謹烽燧嚴斥堠使耕者無所顧忌所以養其財豐犒而優游之所以養其力小勝益急小挫益厲所以養其氣用人不盡其所欲為所以養其心故士常蓄其怒懷其欲而不盡怒不盡則有餘勇欲不盡則有餘貪故雖并天下而士不厭兵此黄帝之所以七十戰而兵不殆也不養其心一戰而勝不可用也矣凡將欲智而嚴凡士欲愚智則不可測嚴則不可犯故士皆委己而聽命夫安得不愚夫惟士愚而後可與之皆死古之善軍者以刑使人以賞使人以怒使人而其中必有以義附者焉不以戰不以掠而以備急難故越有君子六千人韓之戰秦之鬬士倍於晉而出穆公於淖者赦食馬者也制班固曰春秋之後滅弱吞小竝為戰國稍增講武之禮以為戲樂用相夸視而秦更名角抵先王之禮没於淫樂中矣椎桀之士因勢輔時作為權詐以相傾覆呉有孫武齊有孫臏魏有呉起秦有商鞅皆禽敵立勝垂著篇籍當此之時合從連衡轉相攻伐代為雌雄齊愍以技撃强魏惠以武卒奮秦昭以鋭士勝世方爭於功利而馳説者以孫呉為宗時惟荀卿明於王道而非之曰彼孫呉者上勢利而貴變詐施於暴亂昏嫚之國君臣有間上下離心政謀不良故可變而詐也夫仁人在上為下所仰猶子弟之衛父兄若手足之扞頭目何可當也鄰國望我歡若親戚芬若椒蘭顧視其上猶焚灼仇讐人情豈肯為其所惡而攻其所好哉故以桀攻桀猶有巧拙以桀詐堯若卵投石夫何幸之有詩曰武王載斾有䖍秉鉞如火烈烈則莫我敢遏言以仁義綏民者無敵於天下也若齊之技擊得一首則受賜金事小敵脆則偷可用也事鉅敵堅則涣然離矣是亡國之兵也魏士武卒衣三屬之甲操十二石之弩負矢五十箇置戈其上冠胄帶劒贏三日之糧日中而趨百里中試則復其戸利其田宅如此則其地雖廣其税必寡其氣力數年而衰是危國之兵也秦人其生民也陿阸其使民也酷烈刼之以勢隱之以阸狃之以賞慶導之以刑罰使民所以要利於上者非戰無由也巧賞相長五甲首而𨽻五家是㝡為有數故能四世有勝於天下然皆干賞蹈利之兵庸能鬻賣之道耳未有安制矜節之理也故雖地廣兵强鰓鰓常恐天下之一合而共軋已也至於齊桓晉文之兵可謂入其域而有節制矣然猶未本仁義之統也故齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義故曰善師者不陳善陳者不戰善戰者不敗善敗者不亡若夫舜修百僚咎繇作士命以蠻夷猾夏冦賊姦宄而刑無所用所謂善師不陳者也湯武征伐陳師誓衆而放禽桀紂所謂善陳不戰者也齊桓南服強楚使貢周室北伐山戎為燕開路存亡繼絶功為伯首所謂善戰不敗者也楚昭王遭闔廬之禍國絶出亡父老送之王曰父老返矣何患無君父老曰有君如是其賢也相與從之或奔走赴秦號哭請救秦人為之岀兵二國并力遂走呉師昭王返國所謂善敗不亡者也若秦因四世之勝據山河之阻任用白起王翦豺狼之徒奮其爪牙禽獵六國以并天下窮武極詐士民不附卒隷之徒還為敵讐猋起雲合果共軋之斯為下矣凡兵所以存亡繼絶救亂除害也故伊吕之將子孫有國與商周竝至於末世茍任詐力以快貪殘爭城殺人盈城爭地殺人滿野孫呉商白之徒皆身誅戮於前而國滅亡於後報應之勢各以類至其道然矣周制萬二千五百人為軍將皆命卿二千五百人為師師帥皆衆大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長齊管子言於齊桓公曰欲正卒伍修甲兵則大國亦將為之君有征戰之事則小國有守圉之備矣公欲速得意於天下諸侯則事有所隱而政有所寓乃作内政而寓軍令焉三分齊國為髙子之里為國子之里為公之里以為三軍擇其賢人使為里君鄉有行伍卒長則有制令且以田獵因以賞罰百姓通於軍事矣於是乃制五家以為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人以為軍令是故五家為軌故五人為伍軌長率之十軌為里故五十人為小戎里有司率之四里為連故二百人為卒連長率之十連為鄉故二千人為旅鄉良人率之五鄉一帥故萬人為一軍五鄉之帥率之三軍故有中軍之鼓有高子之鼓有國子之鼔春以田曰蒐振旅秋以田曰獮治兵是故卒伍定於里軍政定於郊内教既成令不得遷徙故伍之人人與人相保家與家相愛少同居長同游祭祀同福死䘮相恤禍患同憂居處同樂行作同和哭泣同哀是故夜戰其聲相聞足以無亂晝戰其目相見足以相識歡欣足以相死是故以守則固以戰則勝君一有此教士三萬人可横行於天下凡以五十人為隊其隊内兵士須結其心每三人自相得意者結為一小隊又合三小隊得意者結為一中隊又合五中隊為一隊餘次五人押官一人隊頭一人執旗副隊頭一人左右傔旗二人即克五十至於行立前却當隊竝須自相依附如三人隊失一人者九人隊失小隊二人者臨陣日仰押官隊頭便斬不救人陣散計會隊内少者勘不救所由斬唐制每軍六分支甲四分弓箭四分矛㦸二分盾一分支戈三分支旗排八分佩刀每隊驢六頭幕五口每火鍋一口乾糧麵袋以皮為之馬盂刀子錯子鉗子鑽子藥袋火石袋鹽袋用夾帛解結錐挎奴抹額大帶帽子氊冒子攤子􅀈􅀈鋸鑿各分䥥四分切草刀二分行布槽一分大小瓢二分馬軍鞍轡革帶披氊披馬氊皆二絆揷揵每馬一疋韋布條各皆三絆北直隷長箭手眞保達兵山西白棒手河南嵩山礦徒毛葫蘆兵少林僧兵徐邳鹽徒青州長鎗手沂州沙家兵竿子手廣東籐甲軍處州坑兵漳州海倉兵上杭頼家兵廣西狼兵湖廣土兵練李靖兵法曰諸軍將伍旗各准方色赤南方火白西方金皁北方水碧東方木黄中央土土既不動用為四旗之主而大將行動持此黄旗於前立如東西南北有賊各隨方色舉旗當方靣兵急須裝束旗向前亞方靣兵急須進旗正䜿即往卧即廻審細看大將軍所舉之旗須依節度使諸每隊給一旗行則引隊住則立於隊前其大總管及副總管則立十旗以上子總管則立四旗以上行則在前住則立於帳側統頭亦别給異色旗擬臨陳之時則辨其進退駐隊等旗别様别造令引輕重各令本軍營隊識認其旗如兵數較多軍營復衆若以異色認旗遠看難辨即每營各别畵禽獸自為標記亦得不然旗身旗腳但取五方色廻互為之則更易辨惟須營營自别務使指麾分明諸敎戰陳每五十人為隊從營纒槍幡至教場左右廂各依隊次解幡立隊隊别相去各十步其隊方十步分布使均其駐隊塞空去前隊二十步列布訖諸營十將一時即向大將處受處分每隔一隊伍一戰隊即出向前各進五十步聽角聲第一聲絶諸隊即一時散立第二聲絶諸隊一時捺槍卷幡張弓抜刀第三聲絶諸隊一時舉槍第四聲絶諸隊一時籠槍跪膝坐目看大總管處大黄旗耳聽鼓聲黄旗向前亞鼓聲唱嗚呼嗚呼齊向前至中界一時齊鬭唱殺齊入敵退敗訖可趂行三十步審知賊徒喪敗馬軍從背逐北聞金鉦動即須息呌却行膞上架槍側行廻身向本處散立第一聲絶一時簇隊一看大總管處兩旗交即五隊合一隊即是二百五十人為一隊其隊法及卷幡舉槍簇隊鬬戰一依前法一看大總管處五旗交即十隊合為一隊即是五百人為一隊法及卷幡舉槍簇隊鬬戰法竝依前聽第一聲角絶即散二百五十人為一隊第二聲角絶即散五十人為一隊如此凡三度即敎畢諸十將一時取大軍賞罰進止第三聲角絶即從頭卷引還軍又云敎戰練兵中間隊須加減審看大總管處白碧兩旗交跳盪隊戰鋒隊駐隊每色三隊合為一隊添入中隊計會使稀稠均即是一百五十人為隊如不須更合隊便即交戰一准前捺槍解幡如須加兵合隊即看大總管處赤皁兩旗交諸隊各依本色又三隊合為一隊准前添入中隊使稀稠均即是四百五十人為一隊如須交戰卷幡舉槍簇隊竝依前教戰了欲散還營看大總管處兩旗卧即分散却為一百五十人隊各依舊立又兩旗卧即散五十人為一隊還依舊初立聽角聲第一聲絶一時捺槍便解幡第二聲絶一時舉槍第三聲絶一時簇隊聽還營進止如放散更聽一會角聲即依軍伍次發引還營其應前進而不進應卻退而不退應坐而不坐應起而不起應簇而不簇應散而不散應捺而不捺應卷而不卷應合隊而不合應擘而錯擘入他隊言語讙譁不聞鼓聲旌旗分擾疎密失所竝節級科罰其敎法各令子總管以下録一本敎依兵士敎旗法一云凡教旗於平原曠野登高遠視處大將居其上南向左右各置鼓十二面角十二具左右各對五色旗六纛居前列旗次之左右牙官駐隊如偃月形為後騎下臨平野使士卒目見旌旗耳聞鼓角心存號令乃命諸將分為左右皆要兵刃精新甲胄幡幟分為左右廂各以兵馬使長班布其次陳間容陳隊間容隊曲間容曲以長參短以短參長囘軍轉陳以後為前以前為後進無奔迸退無趨走以正合以竒勝聽音覩麾乍合乍離於是三令五申白旗㸃鼓音動則左右廂齊合朱旗㸃角聲動則左右廂齊離合之與離皆不離中央之地左廂陽向而旋右右廂隂向而旋左左右各復本初白旗掉鼓音動左右各雲蒸鳥散彌川絡野然而不失部隊之疎密朱旗掉角音動左右各復本初前後左右無差尺寸散則法天聚則法地如此則三合而三離三聚而三散不如法者吏士罪之務從軍令於是大將出五綵旗十二口各樹於左右廂陳前每旗命壯勇士五十人奪旗左廂奪右廂右廂奪左廂鼓音動而奪角音動而止得旗者勝失旗者負勝賞而負罰離合之勢聚散之形勝負之理賞罰之信因是而殺之總要曰仲冬之月前期十有一日所司請講武遂申命將帥選閲軍士所司先於都門外芟萊險地為場方一千二百步四出為和門於其中墠地為步騎六軍營坪之處左右廂合為三軍上軍在北中軍次之下軍在南東西相合中間相去容三百步五十步立表一行凡立五行表間前後各容五十步為三軍進止之節前一日將帥及士卒集於墠地所禁喧譁依色建旗為和門於都墠之中四角皆建五采牙旗金鼓甲仗威儀習備大將以下各有統率如常武步軍大將被甲胄乘馬敎習士衆為戰陣法是日未明十刻士衆嚴備五刻士皆擐甲各為直陣以候將軍儀帳備物大將各處於中立於旗鼓之下立定吹大角三通中軍大將各以鞞合鼓二軍俱擊三鼓有司偃旗步士皆跪二軍諸帥果毅已上各疾趨集於中軍旗鼓之下左廂中軍大將立於旗鼓之東西靣諸軍大將立於旗鼓之南北靣西上以聽誓大將軍曰今講武以敎人戰進退左右一如軍法用命有常賞不用命有常刑可不勉之誓訖左右三軍别長史二人振鐸分循以警衆果毅各以告其所部遂擊鼓有司舉旗士衆皆起騎徒皆行及表撃鉦騎徒乃止又三鼓有司偃旗士衆皆跪又擊鼓有司舉旗士衆皆起騎驟徒趨及表乃止整列位定東軍一鼓而舉青旗為直陣西軍一鼓而舉白旗為方陣以應之次西軍一鼓而舉赤旗為鋭陣次東軍一鼓而舉黑旗為曲陣以應之次東軍鼓而舉黄旗為圓陣西軍亦鼓而舉青旗為直陣以應之次西軍鼓而舉白旗為方陣東軍亦鼓而舉赤旗為銳陣以應之次東軍鼓而舉黒旗為曲陣西軍亦鼓而舉黄旗為圓陣以應之凡陣逓為客主先舉者為主以五行相勝之法為陣以應之每變陣二軍各選刀楯五十挑戰於大軍之前第一第二挑戰迭為勇怯之狀第三為敵軍之勢第四第五為勝敗之形每將變陣先鼓而為直陣然後變為餘陣之法五陣畢兩軍集俱為直陣又擊三鼓有司偃旗士衆皆跪又擊鼓舉旗士衆皆起騎馳徒走左右軍俱至中表相擬擊而還每退行止一表跪起如前遂復本列仍講其軍二軍吹角擊鼓士衆俱進及表乃止皆如步軍闕無跪起騎軍東西迭為賓主為五變之陣皆如步法每陣八騎挑戰於兩陣之間五陣畢俱待擊而前盤馬相擬而罷遂振旅徒還校獵一人守圍地三尺量人多少以左右兩將為交頭其次左右將各主士伍為行列皆以金鼓旗為節制其初起圍張翼隨山林地勢無遠近部分其合圍地虞候先擇定訖以善弧矢者為圍中騎其步卒槍幡守圍有漏獸坐守圍吏大獸公之小獸私之以觀進止斯亦敎戰一端也令李筌曰夫國有亂軍者士卒怯弱器械朽鈍政令不一賞罰不明不預焉所謂亂軍者豪家權臣閽寺嬖妃為之軍吏權軍之勢擅將之威公政私門公謁上廢謀下阻議上令不申下令不行猛如虎狠如狼貪如羊不可制也是為亂軍皆可誅也孔子誅少正卯於兩觀而魯國清田穰苴斬莊賈於表下而軍容肅魏絳戮揚干而諸侯服項籍斬宋義而天下怖夫誅豪者益其威戮强者增其權在於豪强之身而不在於士卒之庸豪强有材者駕而馭之教而導之如畜鷙鳥如養猛虎必節其饑渴剪其爪牙絆其足禦其舌呼之則隨嗾之則走牢籠其心使馴吾之左右豪强無材則長其惡積其㓙從其心横其志使禍盈於三軍怨結於萬人然後誅之以壯吾氣故曰不善人者善人之資為將帥為國不誅豪强何以成軍之威也許洞曰大將既授命總專征之柄犒師于野畢而下令焉夫聞鼓不進聞金不止旗舉不起旗低不伏此謂悖軍如是者斬之呼名不應㸃之不到往復愆期動違師律此謂慢軍如是者斬之多出怒言怨其不賞主將所用屈强難治此謂横軍如是者斬之揚聲歎語若無其上禁約不止此謂輕軍如是者斬之所學器械弓弩絶弦箭無羽鏃劒㦸澁鏽旗纛凋敝此謂欺軍如是者斬之妖言詭辭撰造鬼神詭憑夢寐以流邪説恐惑吏士此謂妖軍如是者斬之奸舌利嘴鬬是攅非搆怨吏士令其不悦此謂謗軍如是者斬之所到之地凌侮其民逼其婦女此謂姦軍如是者斬之竊人財貨以為己利奪人首級以為己功此謂盗軍如是者斬之將軍聚謀逼帳矚垣竊聽其事此謂探軍如是者斬之或聞所謀及軍中號令揚聲於外使敵聞知此謂背軍如是者斬之使用之時結舌不應低眉俯首而有難色此謂狠軍如是者斬之出越行伍爭前亂後行列喧譁不馴號令此謂亂軍如是者斬之託傷詭病以避艱難甚或佯死因而遯避是謂詐軍如是者斬之主掌財帛給賞之際阿私所親使吏士結怨此謂黨軍如是者斬之觀冦不審探冦不詳到而言不到不到而言到多而言少少而言多此謂誤軍如是者斬之營壁之間既非犒勞無故飲酒此謂狂軍如是者斬之此令既立吏士有犯之者當斬斷之者大將以問諸將曰罪當斬遂令吏士挾於外斬之斬斷之後使傳令告諸吏士曰某人犯某罪與諸將議當斬已處斷訖公等宜觀此以自戒是大將以禮行罰使卒無寃死衆有畏心矣故軍者將之大柄也可不重乎是以吕䝉涕泣而斬鄉人穰苴立表而誅莊賈此皆先尊法令後收功名者也李靖曰古之善為將者必能十卒而殺其三次者十殺其一三者威振於敵國一者令行於三軍是知畏我者不畏敵畏敵者不畏我如曰盡忠益時輕利重節者雖讐必賞犯法怠惰敗事貪財者雖親必罰服罪輸情質直敦素者雖重必捨游辭巧説飾偽狡詐者雖輕必戮善無微而不贊惡無纖而不貶斯乃勵衆勸功之要術昔馬謖軍敗諸葛亮對泣而行誅鄉人盗笠吕䝉先涕而後斬馬逸犯麥曹公割髪而自刑兩掾辭屈黄葢詰問而俱戮故知威克其愛雖小必濟愛勝其威雖多必散葢賞罰不在重在必行不在數在必當故尉繚子曰呉起與秦人戰戰而未合有一夫不勝其勇乃怒而前獲首而返呉起斬之吏曰此壯士也不可斬呉子曰雖壯士然不從令者必斬之故須勸之以重賞威之以嚴刑隨時而與之移因機而與之施可謂不濫矣凡人耳目不可以視千里之外因人耳目而視聽之既無善不聞無惡不見故目貴明耳貴聰心貴知三者竝進則明不可蔽如能賞罰不欺明於察聽則千里之外隱微之事莫不隂變而為忠信若賞罰在於耳目之前而不聞見者誰肯用命哉故上無疑令則下不二聽動無疑事則衆不二志由是言之則將軍之急務莫大於賞罰矣諸有功合賞不得踰時有罪合罰限三日内遇非時賜賞及諸受獲隨時支散不得過時及減落不如元數改换色額散而不均必有怨生兵書曰賞不踰時是也士卒有罪犯情理别無切害或誤犯者捨之情理重即時處分若移時恐有變大㨗不賞大敗不誅一軍俱同偏黨生怨飲酒不可飲醉醉後不可行刑慮有所失行軍在外未經戰陣吏卒有過輕則捨之重則囚禁送於别司處分未可刑責抑且行軍不利又恐軍心不樂矣主將常自和顔悦色謙恭而下士士卒有病將必親行撫問醫藥則士卒盡死力戰古人云含蓼問疾越王霸於諸侯兵將纔聚人馬未相諳識不可興師攻討謂將不識兵兵不識將將雖法令嚴明人心未相依附主將須親行詢問材伎勇怯强弱髙下選揀堪可作何任使曉諭賞罰立定信義犒勞激勵使士卒知將之智勇將知士卒之熟練然後料敵興師戰無不㨗發號施令預先决定不可臨時反覆進退不定使三軍惑亂進戰無功採訪到事聞善不喜聞惡不怒在其再三斟酌可也三略曰仁賢之智聖明之慮負薪之言廟廊之謀興衰之事將所宜問不可不詳軍中士卒多惑妄言軍馬事端故人心惑旌旗折帳幄動六畜為怪一切不常異事主將再三詳察慮於未萌則大禍不生矣遇天子有制詔或興三軍時下不便於事者不得漏泄於外即時囘奏謂大戰勝負未知賞罰未定闕遏軍興或彼軍未退欲擬抽軍狐疑士衆或改差將吏人情未便之類兵法曰君命有所不受謂不便於事是也主將在内統兵偏禆領兵出戰在外凡軍前有所缺用及賊兵事宜變動若用公文往來告報被奸人於路接之或賊軍捉去即漏泄事機反遭其害合將遞書題内於月日下書號即知所言事宜若被搜捉了無知號故置簿兩相符合配字定號主帥統將各收一本隨身如字號用古詩或千字文假令配定天字號弓箭地字號添步兵如統將軍前要弓箭即書天字號軍前動靜可知應報若神庶免漏泄軍機反遭所害違主將一時之令者斬吏士承受到軍令合行曉諭衆人知者不得妄有增減言語或動揺衆情别生利害承受到應係所屬官司告報文字合行告報曉諭衆人知之即不移時須當分明一名名盡知不得轉託他人附語告報事不審實致有錯誤設或文字合有關報申舉不得時刻遲滯如係常程文字别有疎虞則罪有所歸如誤軍期急速文字者斬賊壘相近事有招呼不許高聲呌喚恐賊聞知凡主將有令指揮事理須是令惺惺人當靣一隊一隊告報押隊人員須逐名曉諭令兵士會得事意或勾動押隊人員主將當靣指揮如兩軍對壘即不得勾動押隊人員須是使偏將親行告諭各各會意則臨事不誤也漏洩軍事斬承受到軍期宻號令及關報賊情聲息事宜文字只令長吏自知常作隄備不許漏泄令衆知之如漏泄致賊變生者斬之士衆有聞自家軍中變動或聞賊軍消息來報主吏不拘晝夜即時引報主將不得時刻遲滯報而不實者罪之凡有見竒異禽獸蟲蛇雜類詭怪之狀或近軍伍或入營壘當時報本將領見總帥輙有傳説者違律吏士在行營切防為人䧟誘如有親故贈遺書信使人往來即領見本將詰辨眞偽或射擲遺書獲者不得輙開宻封送總帥違者違律與敵私交通斬之言語書疏竝同有吉得與敵通情者其妻妾僕馬資産悉以賞之擒獲敵人或有來降者直命見總帥不得訪問敵中事若違因而漏泄者斬之或説道釋祈禱鬼神隂陽卜筮災祥訛言以動衆心與其人往還言議斬之無故驚軍呌呼奔走謬言烟塵斬之凡言覘候或更相推託謬説事宜兼復漏洩者斬之軍中不許採撰風言及飛章論人是非恐有賊謀枉害良善也亦防用間之義軍中不許妖言歌謡恐有惑衆犯者同軍法軍中不得吟諷古詩動輙懈怠軍士怠軍者罪同軍法凡有私仇須先言狀令其避仇若不言因戰陳報復者斬之姦人妻女及將婦女入營斬之攻城邑收得婦女三日外不許安置營中有傷鋭氣軍陣古法有女子之忌律諸應請甲葉數行數於甲襟上抄記其袍秤知斤兩於袍背上具注斤兩並槍量長短尺丈軍司竝立為文案如事了却納取案勘數長短斤兩同即納如有欠少隨即科决徵備其軍器常湏磨礪修補亦不得毁棄諸兵士隨軍皮袋上具注衣服物數并衣資弓箭鞍轡器仗並令具題本軍營州縣府備及己姓名仍令營官視撿押署營司抄取一本立為文案如有破用隊頭火長須知用處即抄為文記五日一申報營司如其勘撿衣資與簿不同物有勝數即是偷來並仰當火隊見有他物即須看當狀送營司其衣資不上文厯縱使遺失官不為理亦不得遽相寄附即是盗未受寄物人並釋罪諸拾得闌遺物當日送納虞候者五分賞一如緣軍須者不在外賞之限三日内不送納官者後殿見而不收者收而不申軍司者並重罪三日外者斬諸有人拾得闌物隠不送虞候旁人能糺告者賞物二十叚知而不糺告者杖六十其隱物人斬李諸軍内行偽無首從同罪買財没官害典取兵士十錢以上絹一尺以上重罪盗軍資雜物并被賊偷賂一錢以上無首從同罪如貨易官物計滿一疋無首從同罪應減截兵馬糧料一升以上無首從同罪棄擲軍糧二升以上無首從行盗一疋以上無首從並同罪諸軍中有樗蒲博戲賭一錢以上同坐所賭之物没官李有告主者欺隱應所給比常倍賞之諸軍馬聚會其數既衆應行六畜並仰明為軍印仍須别為營印防閑走失擬憑理認李諸營兵發以後拾得闌遺畜生亦有兵士失却驢馬衣服䭾運不能勝舉并仰於捍後虞候處取闌遺畜生䭾至前營不經虞候擅取者及借不送還并翦破印及毛尾者斬諸六畜隨軍如有死者須諸所部官陳牒檢驗是當營六畜驗印記同然後許令剝皮如印不是本營印即是盗人六畜殺李借貸賖買貨物依市交還錢物不許遠約常備隨身器械整齊合用相須之物不可缺一若有弓弩無弦箭無羽鏃或有而不牢及有弩牙器械不利施放不行主將必用心㸃檢備敵之用經隨身衣甲器械不得容私脱換如有損折或不便使用者即别請給如善弓弩鎗刀之類者從士卒之便經諸隊設旗不許與主將旗號相犯諸將三日一廵本部吏士營幕閲其食飲之麤精均勞逸卹疾苦視醫藥有死即上陳以禮祭葬優給家室有死于行陣同火收其屍及因敵傷致斃並本將校具陳其狀亦以禮祭葬弔贈如但為敵所損即隨輕重優賞諸每營病兒各定一官人令檢校煑􅅅粥食飼及領將行其初得病及病損人每朝通狀報總管令醫人廵營將藥救療如法仰營主共檢校病兒官量病兒氣力能行者給傔一人如重不能行者加給驢一頭如不能乘騎畜生通前給驢二頭傔二人縳轝將行如棄擲病兒不収拾者不養飼者檢校病兒官及病兒傔人各杖一百未死而埋者斬諸兵士死亡祭埋之禮雖不必備以棺槨務令權宜輕重折𠂻如賊境死者單酌祭酹墓深四尺主將使人臨穴内地非賊庭死者准前祭哭遞送本貫背軍逃走斬之後期斬之有故不坐行列不齊旌旗不正金革不明斬之配定隊伍次第而行雖遇急速路逢險阻後隊不得攙過前隊先鋒遊奕捉生入他境不得先放烟火恐驚自家人馬及賊見預備配定諸隊旗號不得雜亂若過換交加如有不便即上請軍發欲有征伐但令收拾行裝不可令知往何處恐有姦人探候致賊先設備來邀截我軍我可愼防之軍發欲往東南襲敵佯言西北使敵人不具備攻其不意入他境不得令入賊界取河井水飲之恐放毒藥在内行軍遇水并汲水喫飲可先令死罪人或孶畜試嘗其水恐有人施毒在内人馬飲之枉遭其害渡水亦然渡泥途先令人探過恐安放簽刺於泥中及作䧟坑或上流壅决之類昔蠻儂智高安刺泥中韓信决壅流而斬龍且入他境不許欺凌婦女殺害老小毁拆墳墓燒燬民屋倉庫砍伐林木入他境不奉令不得擅掘水塘放火延燒積聚軍中病人被傷損稍重並須移歸近便州縣將養以防急病遺棄被賊收擒説其事機漏泄軍務山中狐兔野獸奔走出林及衆禽飛鳴喧噪必有賊兵衆來也宜備禦之賊人下營日久非時廣設烟火妄生機變者此必棄虜營而欲往别處攻擊故特示虚詐行此事意欲退軍恐我追逐故特示虚張詐意此可急使鋭兵伏於要路邀擊之賊若以寡兵而廣列營壘虚張軍勢誘我人馬詐來相拒彼必别分人馬於他路攻我不意之處昔西戎犯境列虚營於鄜延欲以大衆至涇原大破我師若大衆卒至而我兵寡少難為應敵不可當頭迎遏衆寡不敵可於要害待其半濟大兵已行邀其中道或截粮草賊欲合圍我兵速退占高順勢往來擊之可勝賊若廣張旗幟於高山大隴揚兵而行者必别有精騎伏於間道潜進攻我營寨於不意之處我亦當髙置望樓探望或有塵飛鳥翔之處選精兵迅騎先往探取果有賊兵分軍於要害處邀之賊有晝伏夜行者必有謀也謹備之賊入我境廣張人馬虜掠驅駕車乘搬載積聚擁生口欲歸者不可使人馬當路衝撃彼衆我寡難以應敵但發人馬别路數道料賊囘程於要害之處多設竒伏分兵左右即以鋭騎一進一退一出一入使賊欲進不得欲往不安或攻其首或撃其尾或邀其中又使勇壯之士專逐其主將無令刼掠而歸彼既主管不定必棄其輜重遁去一夜聞賊營馬嘶必有偏師攻刼宜在審候急備之也一不戰而降敵没其家布陣旗亂吏士驚惶罪在旗頭斬之搴旗斬將䧟陣摧鋒上賞陣定或輙進退或輙先取敵致亂行者前後左右所干之行斬之或有弓弩已注矢而廻顧者或干行失位後行斬前行不動行干失之行守圍不固一火及主吏並斬之遇敵攻圍危急若前後左右部隊不救致䧟者全部隊皆斬之設竒伏掩襲務應機速㨗前將先合後將即副進退應接乖者並斬之為敵所乘失旗鼓節鉞者全隊斬之與敵鬭旗頭被傷救得者重賞戰敵旗頭被敵殺爭得屍首者免坐不得者一旗皆斬之凡戰敵失主將隨從皆斬之失旌旗節鉞者全隊斬之戰鬭失關河險隘之處者斬之將禦敵裨將以下不等差往率不齊力同戰更相救助者伏法斬之不許文儒雅吏傍陣恐忽爾驚亂誤軍合戰時不許收賊器械恐軍號潛亂合戰不許脱剝衣等自致損傷吏士雖破敵濫行殺戮發塜墓焚廬室踐稼穡伐樹木者皆斬之破敵先虜掠者斬之入敵境同破敵所得資物僕馬等竝給戰士每收陣之後禆將虞候收斂對總帥均分凡隱欺破虜所收獲及吏士身死有隱欺其資物兼違令不收卹者斬之永樂十二年令凡交鋒之際突入賊陣透出其背殺敗賊衆者勇敢入陣斬將搴旗者本隊已敗賊衆别隊勝負未决而能救援克敵者受命能任其事出竒破賊成功者皆為竒功齊力進前者首先敗賊者前隊交鋒未决後隊向前殺敗賊衆者皆為頭功凡建立竒功頭功者其親管頭目即為報知妄報者治以重罪行營及下營之時擒獲奸細者陞賞准頭功哨馬生擒虜賊一人賞銀三十兩斬首一級者二十兩凡行營之時遇有鞍馬衣服器械不同者衣甲器械相同而喝問答號不同者皆即擒之來降虜賊所携人口財畜分毫不許侵犯即時來報凡與賊對陣須齊力殺賊不許聚為一處制拽空缺如力不能支不能决勝無勇無謀及不盡力殺賊者全伍皆斬凡隊伍已定不許馬軍入步隊步軍入馬隊違者重罪如臨陣混戰失其本隊揷入别隊者不拘凡殺敗虜須盡力進勦不許搶掠人畜財物違者重罪如所乘馬困乏許以所擒賊馬換乘凡對敵之際一隊遞看一隊有不齊力前進者戰勝之後許連隊之人首告治以重罪容情不首者罪同凡管軍頭目須恤愛軍士軍士聽令不許怠慢如伍中有一人不在小旗報總旗總旗報百戸以次報至總兵官總兵官奏知從征官軍有在逃者斬該管頭目不報者重罪凡軍士須人馬相應不許以軟弱不堪者揷入隊伍如人壯馬弱或馬壯人弱者許弱者以馬易與壮者若自己有馬臨陣之際能借與驍勇者殺賊有功許借馬人分賞不願分者聽其戰馬臨敵許騎無事騎者治罪各營馬驢須愛惜䭾載該管官時常㸃閲有違及將軍器抛失或盗賣者俱重罪凡軍士行糧該管旗時行㸃閲有過用及遺棄者并該管頭目皆斬凡軍行及下營之時須各認隊伍不許擅離及襍入别營違者并該管頭目俱重罪凡夜行相遇即喝問有答號不得者擒送辨驗果是奸細照例陞賞故不答號及見而不擒者事覺俱治以重罪凡軍中遇夜以各様大小銅角笛聲為號不許聲音相同各聽號聲識認隊伍不許呌營違者論罪但夜間有諠譁者即問所起之處及左右應聲之人與該管頭目皆治以重罪凡行營須待大營旗纛起行或聽駕前銅角聲各營方許起行每日下營量撥步軍或五隊十隊馬軍五隊或三四隊步軍披甲馬軍不摘鞍伺候長圍及架砲者布列已定方許入營休息有盗人衣糧諸物及盗驢馬宰殺并撿括隱藏人遺失物者俱斬知情首實者給賞知而不首者同罪若收得馬驢騾垜者即送該軍轉送大營召人識認如有遺失被後哨官軍收獲者收後官治以重罪凡各營有失火者即是與賊遞送消息并該營頭目俱重罪其每日行營不許在途炊飯違者并本營頭目皆斬下營掘井必令人堅守不許作踐及占藏自用凡軍中有病者管隊官旗即令醫療掌藥料官及醫士常加廵視不許勒取財物違者重罪凡長圍及坐冷者須晝夜關防各營架砲者務依方瞭望有灰塵揚起人馬往來若聞哨馬營及四靣砲響即時傳報其管事官遇有事隨即飛報不許頃刻遲慢凡掠陣官臨敵時視有畏避退後者即斬之紀功過官遇有功者即紀之有過者即録之以憑賞罰凡臨陣令内官持象牙牌視有勇敢當先殺賊能立竒功頭功者即與牙牌收執徑赴大營給與勘合以憑陞賞凡軍中有妄談災異及妖言或漏泄軍機者皆斬知情不首者罪同首實者重賞凡見鹿及野馬黄羊諸物驚走突入營伍及望見塵起或旋風揚沙野獸騰踏及見死馬牛羊與牛羊䭾馬遺穢踪跡或拾得一應物件若男女衣服首飾并文字等項不論久近隨即報知凡軍行在道不許圍獵或遠望似馬非馬似鹿非鹿似人非人白日見烟入夜見火不論是非即報凡功次務須實報有虚誑者重罪所報實者給與勘合無勘合者不准陞賞凡號令總兵官告都指揮都指揮告指揮指揮告千戸千戸告百户百户告總旗總旗告小旗小旗告軍士務令遵守十四年令每隊中立公正掌令官二人務令頭目軍士死生相顧臨陣有進無退若頭目軍士先自退怯者掌令官即斬其首别選頭目代之若軍士不顧頭目先自退怯者許後隊斬前隊准常功陞賞軍士不勇不進致頭目失䧟者斬其前隊頭目不勇不進致軍士失䧟十人者斬首至二十人者斬首不與承襲至三十人及全隊者斬首籍没其家凡軍士頭目應斬而有竒功量與贖免其總兵官申令不明不嚴致十隊退怯者罰俸一年至三十隊者降一級至五十隊以上者罷職全軍退怯者斬但降敵者全家斬首籍没財産行軍之際有敢搶擄民財至十貫以上者斬首示衆頭目縱容軍士搶掠至十人者罷職充軍二十人以上至全隊者梟首營門軍士竝皆處死軍中及召募新來之人不知軍法敢有造言惑亂人心沮撓號令致壞事機者凌遲處死籍没其家臨陣在逃及不聽總兵號令者斬成化元年令總兵官出師臨敵軍中有違犯號令者聽以軍法從事尋常出哨等項不計料管子曰天時地利其數多少其要必出於計數故凡攻伐之為道也計必定於内然後兵出乎境計未定而出兵是則戰之自毁也故不明敵人之攻不能加也未可加兵不明敵人之積不能約也未可約誓不明敵人之將不先軍不明敵人之士不先陣是故以衆擊寡以治擊亂以富擊貧以能擊不能以敎卒練士擊毆衆白徒故百戰百勝也又曰善攻者料衆以攻衆量吾衆寡彼衆寡然後攻餘倣此料食以攻食料備以攻備以衆攻衆衆存不攻彼衆存則我不能亡之也故不攻以食攻食食存不攻以備攻備備存不攻釋實而攻虚知其實宜避之釋堅而攻毳釋難而攻易夫國摶不在敦古在於合今時宜摶聚也治世不在善政在於權宜霸王不在曲成在於全大體李靖曰凡與敵相逢持軍相守欲知彼算將揣其謀則如之何對曰士馬驍雄示我以羸弱陣伍齊肅示我以不戰見小利佯為不敢爭伏竒兵故誘以奔北内實嚴警外為弛慢恣行間諜託以忠告或執使以相忿或厚賂以相悦移師則減竈合營則偃旗智足以及謀勇足以及怒非得地而不舍非全事而不侵以多擊少必取於晨朝以寡撃衆必候於日暮如此則兵多詭伏將有深謀理須曲為防愼不可入其規畫故傳曰見可而進知難而退軍之善政也但敵故固無小蜂蠆有毒且鳥窮則喙獸窮猶觸者皆自衛生命而求免於禍難也若困而不鬭乃智不逮鳥獸其能將乎必須料敵制勝誡於小利然後可立大功矣所謂料敵者料其彼我之形定乎得失之計始可出兵而决於勝負矣當料彼將吏孰與己和主客孰與己逸排甲孰與己堅器械孰與己利敎練孰與己明地勢孰與己險城池孰與己固騎畜孰與己多糧儲孰與己廣工巧孰與己能秣飼孰與己豐資貨孰與己富以此揣而料之焉有不保其勝哉夫軍無小聽聽必審也戰無小利利必大也審聽之道詐亦受之實亦受之巧亦受之拙亦受之其詐而似實亦受之其實而似詐亦受之但當明聽其實叅會衆情徐思其驗鍜鍊而用不得逆詐自用挫折愚人之詞又不得聽庸人之説稱敵寡弱輕侮衆心而不料其實又不得受敵人以小利餌我勇士輙掠財畜獲其首級將闇不斷而重賞之忽敵無備必為所敗揣敵之術亦易知矣若辭怒而不戰者待其援也杖而立汲而先飲者倍程廹速渴之兼也夫欲行無窮之勢圖不測之利其事繁多略陳梗槩而已若遇小冦而有不可擊者為其將智而謀深士勇而軍整鋒甲堅鋭而地險騎畜肥逸而令行如此則士畜必死之心將懷擒敵之計此當固而待之未得輕而犯也如逢大敵而必闕多而衆心闕糧運不繼幸無闕取之抑又聞之統戎闕縱兵夫為將能識此之機變知彼之物情亦何慮功不建鬬不勝哉李綱曰善用兵以料敵為巧非謂料其强弱虚實而已能料敵之情而勢必至於此之為巧也孫臏為齊救趙而引兵以趨大梁知魏之數輕齊也故減竈以誘之魏將龎涓果棄其大軍與輕鋭併倍日并行以逐臏此未為巧而能度其行暮當至馬陵伏萬弩夾道期見火舉俱發而破魏軍遂殺龎涓此為至巧韓信擊趙引兵東下井陘知趙軍未見大將旗鼓未肯戰也故使萬人先行背水陣而棄旗鼓趨水上軍以誘之趙軍果爭漢旗鼓而逐信此未為巧而能度其空壁逐利先出竒兵二千騎狙伺馳入趙壁拔趙旗幟立漢赤幟而破趙軍遂斬成安君汦水上此為至巧冦恂之降高峻遣軍師皇甫文出謁辭禮不屈恂怒將誅文諸將諫以為不可恂不聽遂斬之而遣其副歸報曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降若恂者其料敵可謂巧矣李光弼之降高暉李日越也逐史思明壁野水度至夕還師留牙將雍希顥守曰賊將髙暉李日越萬人敵也賊必使刼我爾留此賊至勿與戰若降與偕來左右竊怪語無倫是日思明果召日越使以鐵騎刼取光弼不然無歸日越至光弼已去遂請降希顥與俱至厚待之高暉聞亦降或問公降二將何易也光弼曰思明再敗聞我野次命將來襲必許之以死希顥無名不足以為功日越懼死不降何待降者見遇貳者得不思奮乎若光弼者其料敵可謂巧矣惟其料敵之巧如此故足以立竒功兩軍相持不能料其强弱虚實者未有能制勝者也戰功曰多以多算勝而少算不勝然則不計强弱虚實而浪戰者欲無敗難矣况能立竒功哉覘北征録曰臣聞兵家論正正之旗則曰無邀堂堂之陣則曰勿擊何畏寧爾也葢善用兵者惟因其釁而已釁之未至雖卧薪嘗膽十有八年不以為緩釁之既至雖一日一夜去閼與九十里不以為速夫釁應於我者謂之機見於彼者謂之隙决在我之機投在彼之隙敵誠智者將敗亡之不繼矣然釁之在人其别有二有天釁有人釁故釁出於天良將乘之惟恐其失敵也釁出於人良將審之唯恐其詐我也所謂天釁者一曰淫雨謂隂雨連作營壘卑濕人馬泥濘筋角解脱二曰久雪謂積雪尋丈草木氷結居乏樵㸑行迷道路三曰暴風謂旌旗卷折廬舍摧倒塵埃四興行陣不分四曰大雹謂霰雹亂擲人馬驚擊帷幕破傷坑塹塡没五曰星變謂天狗日飛天鼓夜擊星流彗掃墜泊其營六曰妖祥謂鼎釡自鳴戈甲自動瓦缶有聲屋舍搖撼七曰暴水謂江漲河决潮作泉湧漂蕩寨伍淹没人馬八曰火災謂延燒城邑自燔積聚或火晝發而行陣驚亂或火夜焚而披帶不及九曰雷擊謂烈風雷電震擊營壁燎灼林木霹靂泉石十曰旱魃謂天時亢旱赤地千里河枯井竭人馬煩渴十一曰人疫謂久負苦役士多病患次舍卑濕士多疾疫逓相傳染不容醫療十二曰馬瘟謂風土不伏水草不甘蒭杸不時勞佚不節一馬受病百槽傳毒是謂天釁凡兩軍相持釁見於我急宜厭避釁見於敵急宜乘擊所謂人釁者一曰移營謂舊營未徹新營未安空便未知行陣未定二曰涉水謂道遇溪澗急涉未得城有壕塹急攻不利士卒泥濘人馬勞瘏三曰分兵謂將佐或去或留士卒或行或止未安厥居未及所至四曰易將謂君臣疑貳而廢置不平長貳離間而去守不一士卒不服號令未孚五曰絶糧謂糧食不通三軍外掠漕運不繼將士饑餒六曰未合扺暮入營行陣未設逹旦出隊擺布未定七曰陣亂鼓不知進金不知止旗不隨將卒不隨隊八曰兵疲涉險千里士不去甲勞師數月馬不解鞍九曰令雜將帥離心而士卒無所適從朝夕異令而緩急無所聽信十曰主疑謂將帥有功而忌疾易生屯戍無功而間諜易入十一曰驚畏謂士不諳戰鬬而遇敵驚惶將不經行陣而陳師怯懦行伍夜呼而將不能禁行陣相結而令不肯前十二曰將驕謂恃勝而將佐驕矜屢捷而師徒無備十三曰得間謂間諜得實而營壘可破十四曰下離謂士卒離心而號令不行十五曰内變謂國家多難災變屢興十六曰失險謂賊方恃山為固而忽移營於四逹之衢拒水自安而忽移屯於圯䧟之地是謂人釁凡兩陣相持釁生於我則急便秘避釁生於敵則急令訪察古人之用兵所以為是進退攻守之計者一任乎釁而已故勝兵先勝而後戰不於己戰之後而始求其所謂勝合於利而動不於己動之後而始求其所謂利觀釁之法深溝高壘觀釁而後動鋭兵利器待釁而後發多設間諜厚賂採探有釁可攻則戰如風發攻如河决無釁可乘則外閉其營内休其士庶無輕舉妄動之失是謂觀釁兵法又當視敵鼓角人馬隊伍諠靜以避之凡金鐸之聲下以濁鼓鼙之音濕如沐旗幟皆重而自垂曵如霑霧此衰敗之兆也戎馬驚奔士卒恐懼妖言相惑或以耳屬此潰散之象也隊伍擾亂行陣不定或坐或起言語諠譟此軍亂之象也皆可乘而掩取也雖然見敵之意可擊如此又當反慮敵人矯計誘我所謂兵怒而相迎持久而不合又不相去半進半退之類宜宻察之此必有竒伏之變雖云鳥起者下有伏兵其或大兵之上譎為棲鳥安立不動或來人立於草木之中時執彈以袪飛鳥令人疑之之類則察者又須以他事叅之間李筌曰古者鄰國烽烟相望雞犬相聞而足跡不接諸侯之境車軌不結于千里之外以道存生以德安形人樂其居後世澆風起而淳朴散權智用而謀詐生鄰國往來用間謀縱横之事用隱括之人矣徐守仁義社稷丘墟魯道儒墨宗廟泯滅非逹與智惠不能禦侵伐不勞心苦志不能原事不悉情偽不能成名材智不明不能用兵不忠實不能知人是以鬼谷先生述捭闔揣摩飛箝抵巇之篇以敎蘇秦張儀遊説諸侯之國而探諸侯之心於是術行焉夫用探心之數者先以道德仁義禮樂忠信詩書經傳子史計謀成敗渾而雜説包而羅之澄其心净其志伺人之心情有所愛惡去就欲從而攻之隂慮而陽發必虚往而實來此虚言而往彼實心而來卜其心察其容聽其聲考其辭言不合者反而求之其應必出既得其心反射其意符應不失契合無二膠而漆之無使反覆如養由之操弓逄䝉之挾矢百發無不中者設罝罦以羅魚兔張其㑹截其腰脇其虚必衝􅃠其掛目亦奚有孑遺夫探仁人之心必以信勿以財探勇士之心必以義勿以懼探智士之心必以忠勿以欺探愚人之心必以蔽勿以明探不肖之心必以懼勿以常探好財之心必以財勿以亷夫與智者言依于博博無窮而智有涯則智不可以測博與博者言依于辯博師古而辯應今則博不可以應今與貴者言與富者言依于位富積財而位可寶則財不足以易寳與貧者言依於利貧匱乏而利豐贍則乏不可以賙豐與賤者言依於謙賤人微而謙降下則賤不可以敵謙與勇者言依於敢勇不懼而敢剛毅則勇不敢以懾剛與愚者言依於鋭愚質朴而鋭聰明則朴不可以察聰此八言者皆本同其道而末異其表同其道人所欲聽而異其表人所不曉如此則不測淺深吾得出無間而無朕獨往而獨來或縱而横如偃枯草使東而東使西而西如引渟水决之則流壅之則止謀何患乎不從哉夫道貴制人不貴制於人制人者握權也制於人者尊命也制人之術避人之長攻人之短見己之所長蔽己之所短故獸之動必先爪牙禽之動必先嘴脰螫蟲之動必以毒介蟲之動必以甲夫禽獸蟲豸尚用所長以制物况其大者乎夫好言道德者必以仁義折之好言儒墨者必以縱横禦之好談法律者必以權術挫之必乖其始合其終摧其牙落其角無使出吾之右徐以慶弔言之憂喜其心使其神不得為心之主長生安樂富貴尊榮聲色喜悦慶言也死亡憂患貧賤苦辱刑戮誅罰弔言也與貴者言談弔則悲與賤者言談慶則悦將其心迎其意或慶或弔以惑其志情變於内形變於外常以所見而觀其所隱所謂測隱探心之數也雖有先王之道聖智之術而無此心不足以成霸王之業也李靖兵法曰大戰之取勝此豈求之於天地在乎因人以成之歴觀古人之用間其妙非一即有間其君者有間其親者有間其賢者有間其能者有間其助者有間其鄰好者有間其左右者有間其縱横者故子貢史廖陳軫蘇秦張儀范睢等皆憑此術而成功也且間之道其有五焉有因其邑人使潛伺察而致詞焉有因其仕子故洩虚假令告示焉有因敵之使矯其事而返之焉有審擇賢能使覘彼向背虚實而歸説之焉有佯緩罪戾漏我偽情浮計使亡報之焉凡在五間皆須隱秘重之以賞宻之又宻始可行焉若敵有寵嬖任以腹心者我當使間遺其珍玩恣其所欲順而傍誘之敵有重臣失勢不滿其志者我則㗖以厚利詭相親附採其情實而致之敵有親貴左右多詞夸誕好論利害者我則使間欲曲情尊奉厚遺珍寶揣其所間而反間之敵若使聘於我我則稽留其使令人與之共處矯致殷勤偽相親暱朝夕慰諭倍供珍味觀其辭色而察之仍朝暮令使獨與己伴居我遣聰明者潛於複壁中聽其所言使既遲違恐彼責怪必是竊論心事我知計遣而用之且夫用間以間人人亦用間以間己彼以宻來理須獨察於心叅會於事則不失矣若敵使人來欲候我虚實察我動靜覘知事計而行其間者我當佯為不覺舍其厚利而善㗖之㣲以我偽言誑事示以前却期會即我之所須為彼之所失者因其有間而反間之彼若將我虚而以為實我即乘其敝而得其志矣夫水所以能濟舟亦有因水而覆沒者間所以能成功亦有憑間而傾敗者若束髪事主當朝正色忠以盡節信以竭誠不詭伏以自容不權宜以為利雖有善間其可用乎武經曰因間者因敵鄉國之人而厚撫之使為間也内間者敵之官人有賢而失職者有無過而被刑者有寵嬖而貪財者有屈在下位而不得任使者有欲求展己之才能者有翻覆變詐常持兩端之心者如此之官皆可以潛通問遺厚貺金帛而結之因求其國中之情察其謀我之事復間其君臣使不和同也反間者敵有間來窺我我必先知之或以厚貺誘之反為我用之或佯為不覺示其偽情而縱之則敵人之間反為我用死間者外詐立事跡令吾間憑其詐跡以輸誠於敵而得敵信若我進取與詐跡不同間者不能脫則為敵所殺生間者取内明外愚形劣心壯嫻於鄙事能忍饑寒詬恥者往來通報也此五者皆當謹察其人而任之否則不能成務而自屠其身漏吾軍事也故曰三軍之士莫親於間賞莫厚於間事莫宻於間謂先量間者之性誠實多智乃可用之然則間亦有利於財貨不得敵之情實但將虚詞以赴我約此非用心㣲妙不能酌其情偽李筌曰古之善用兵者必重天下之權而研諸侯之慮權衡不審不知輕重强弱之髙下揣情不審不知隱匿變化之動靜量莫難於周知揣莫難於悉舉事莫難於必成此三者聖人任之故兵有百戰百勝之術非善之善者也不如不戰而屈人之兵善之善者也夫太上用計謀其次用人事其下用戰伐用計謀者熒惑敵國之主隂移謟臣以事佐之惑以巫覡使其尊鬼事神重其彩色文繡使賤其菽粟令空其倉廪遺之美好使熒其志道以巧匠使起宫室髙臺以竭其財役其力易其性使化為淫俗奢暴驕恣賢人結舌莫肯匡助濫賞淫刑任其喜怒政令不行信卜祠鬼逆忠進謟請謁公行而無聖人之政愛而與官無功而爵未勞而賞喜則赦怒則殺法屈而自順令出而不行信蓍龜卜筮鬼神禱祠讒謟諛佞竒技貨財行於門户其所謂是者皆非離君臣之際塞忠讜之路然後淫之以色攻之以利娯之以樂養之以味以信為欺以欺為信以忠為叛以叛為忠忠諫者死謟諛者賞君子在野小人在位急令暴刑民不堪命所謂未戰以隂謀傾之其國素已破矣以兵從事其君可虜其城可抜其衆可潰故湯用此法而夏桀放周用此法而殷紂殺越用此而呉國墟楚用此而陳蔡舉三家用此而魯滅韓魏用此而東周分儒生之言兵强大者勝小弱者必亡是則小國之君無霸王之業萬乘之主無破亡之兆昔夏廣而商狹殷大而周小越弱而呉强所謂不戰而勝者隂傾之術夜行之道文武之數聖人超然獨見欣然獨樂其在兹乎許洞曰周禮廵國諜謂反間也用間之道聖人以來尚之矣夫用兵决勝不可不用間用間决中不可不宻茍非大智孰能臻於是乎故間之行也觀事而舉其術有八焉其一曰兩國相拒兵抗其境詐為疲困畏懼潛漏其言厚貨㗖敵所愛倖因以所求中之次使使者致玉帛子女輿馬之飾以求和解覺其驕慢隂選精兵分道星夜兼進以乘不備此以使者為間者也其二曰獲敵生口以所謀漏洩俾得聞焉謀皆虛也隂緩使遁去令敵得所謀而信之我行則不然也此以敵人為間者也其三曰敵來間我詐為不知也反事示之敵得偽事我則出不意而擊之此反以來言為間者也其四曰敵以間來厚賂之令反其言以間敵此反以來人為間者也其五曰與敵人戰佯為小敗亟引兵深避以示懼色乃選調言語鄙鈍無智慮者使於敵令其張皇我師之强盛俾敵之為其間者必以我為懼以强詞來間也既行即舉竒兵隨而襲擊之此以明間而為間者也其六曰敵有内寵令心腹者以金寶饋其家使潛購敵情此以内嬖為間者也其七曰敵有謀臣則潛行金貨賂敵親信搆讒於内外以事應讒者言使君臣相疑自相殘害此反以讒人為間也其八曰求敵所委信者副其所欲隂求其動靜言語此以鄉人為間者也是以知間者兵家之要妙也茍非智賢莫能用之故用間之道在乎㣲宻潛成此良將之所注意也兵者詭道也卷舒萬變雖天地鬼神不可使測之是故詭敵之道其幽深有二敵使到以權臣私之豐寶貨露誠欵偽結使者反亦隂期到則益於前所以憤一作急惑之復以國家事泄之皆以國家虚實似是而非者既宻與反搆敵意料不以我為疑即以通情於敵君示舉兵期與地以内應之得期則以精兵出不意擣其虚我外通之其術一也内應號皆虚號也示為我兵之害募勇敢者以為待一旦佯怒笞之見血即潛使竄敵復囚其妻子俾知之而偽怨我以宻事告或以某時當加兵於某處我潛應其言及期果與言合乃隂出鋭兵攻其不意其術二也此皆以竒為勝者兵之要道不可不詳於此也敵使來目數動色數異言肆者刺客也敵未困而請和者謀也敵卑辭厚幣者驕我也使雖頻來為冦不止侮我也厚貨㗖我左右欲搆我宻謀也使來言語辨利欲兩國休解者將掩我不備也使言屈强者欺我也敵使有此七者宜細詳之將為刺客者挾之謂謁見之時以操刃者挾輔而見謀者反其謀謂詐許之却掩其不備也驕者反其驕倨其詞薄其幣使敵人信我為驕也侮者凌之舉兵責其無禮搆者示之佯不知而反之以虚事也將掩其不備者復之佯聽其説反掩其不備也欺者誅之誅無禮以威敵留使者不可久久則知我㣲不如殺之是以知奸之道兵之本也不可不審李靖兵法曰凡是賊徒好相掩襲須擇勇敢之夫選明察之士兼使鄉導潛歴山原宻其聲晦其迹或刻為獸足而印履於中途或上冠微禽而幽伏於叢薄然後傾耳以遥聽竦目而深視專智以度事機注心而候氣色見水㾗則可以測敵濟之早晚觀樹動則可以辨來冦之驅馳也故烟火莫若謹而審旌旗莫若齊而一爵賞必重而不欺刑戮必嚴而不捨敵之動靜而我必有其備彼之去就而我豈不得保其全哉必須先覘敵國道路遠近山川谿谷險阨城邑大小溝渠淺深畜積多少兵革利鈍豪傑姓名審而知之用兵之要也蘇氏曰孫武子既言五間則又曰商之興也伊摰在夏周之興也吕牙在商故明君賢將能以上智為間者必成大功此兵之要三軍所恃而動也按書伊尹適夏醜夏歸亳史太公常事紂去之歸周所謂在夏在商誠矣然以為間何也湯文王固使人間夏商而伊吕固與人為間耶桀紂固待間而後可伐耶是雖甚庸亦知不然矣然則吾以天下存亡寄於一人伊尹之在夏也湯必曰桀雖暴一旦用伊尹則民心復安吾何病焉及其歸亳也湯必曰桀得伊尹不能用必亡矣吾不可以安視民病遂與天下共亡之吕牙之在商也文王必曰紂雖虐一旦用吕牙則天祿必復吾何憂焉及其歸周也文王必曰紂得吕牙不能用必亡矣吾不可以久遏天命遂命武王與天下共亡之然則夏商之存亡待伊吕用否而决今夫問將賢者必曰能逆知敵國之勝敗問其所以知之之道必曰不愛千金故能使人為之出萬死以間敵國或曰能因敵國之使而探其隂計嗚呼其亦勞矣伊吕一歸而夏商之國為决亡使湯武無用間之名與用間之勞而得用間之實此非上智其誰能之夫兵雖詭道而本於正者終亦必勝今五間之用其歸於詐成則為利敗則為禍且與人為詐人亦將為詐我故能以間勝者亦或以間敗吾間不忠反為敵用一敗也不得敵之實而得敵之所偽示者以為信二敗也受吾財而不能得敵之隂計懼而以偽告我三敗也夫用心於正一舉而羣網舉用心於詐百補而千穴敗智於此不足恃也故五間者非明君賢將之所上明君賢將之所上者上智之間也是以淮隂曲逆義不事楚而高帝擒籍之計定左車周叔不用於趙魏而淮隂進兵之謀决嗚呼是亦間也幣重而言甘誘我也使者目動而言肆懼我也明蜀諸葛亮兵要云軍已近敵羅落常平明以先發絶軍前十里内各按左右下道亦十里之内數里之外五人為部人持一白幡登髙外向明看隱蔽之處軍至轉尋髙而前第一見賊轉語後第二第二詣主者白之凡候見賊百人以下但舉幡指百人以上便舉幡大呼主者遣疾馬往視察之北征録曰兵家之有採探猶人身之有耳目也耳目不具則為廢人採探不設則為廢軍故古人以峰山卓望為軍目以游騎採探為軍耳一身之聾瞽徒能廢吾之四體而三軍聾瞽則其所廢者可勝計哉故候吏不嚴君子以為無耳目之軍杜預設絳白之旗而見敵有辨馬成設烟火之燧而事皆預知趙充國之破先零得高山逺望之便吕䝉之襲關羽必先縛其屯候使不聞知而降其二將渾瑊之討義武知其邊備不設故能深入城境而大敗其師李愬之入蔡州乘其候吏不知故能直入賊營而生擒元濟兵家惟其先人故能有奪人之心關中之王在於先入北山之勝在於先據彼有賊至帳中軍吏未覺至城内簫鼓未絶皆由其無採探也國家承平以來廟堂惡聞邊備將帥不買間諜無事而修邊防則謂之引惹邊事有事而論形勢則謂之泄漏兵機所謂夾山之張合肥之魏磨盤之王正陽之邊塗山之石花靨之解安豐之倪小王衝之張蘆塘之朱桐木之周九里關之胡石門之王桐栢之呉界山之江故家遺俗世相傳襲其所謂子弟非過淮盗馬則越漢運鹽其所謂牙爪非私販銅錢則私通𣙜貨河洛之地如其室家商虢之間即其堂閫紹興年間如張劉諸臣皆廣行招致以備緩急近年以來諸將例皆庸駑不材之士上自宣招三司帥臣下而江上諸軍將帥未聞有一人能搜訪間諜收拾遺逸以資聽聞者所謂採探之法視為何物甚至邊候不嚴邊鋪不設無賞賚以維人心無金帛以壯士氣得事者無功誤事者無罪故士不出境探不入賊盱眙山陽之於漣海安豐花靨之於壽春桐柏唐城之於褒信招信濠梁之於汴泗相隔一水相望一舍烟火之氣騰空相接而莫知屯兵之多寡鷄犬之聲朝昏相聞而不知敵國之虚實所謂賊將之姓名賊技之能否賊勢之進退賊情之勇怯葢殆若異世之事耳敢望得其萬一哉此無怪其䘮敗也惟能依此置鋪召募間諜明逺斥堠則屯邊無事得以休息有事不知窘束是謂採探兵法視不相見故為之旌旗聽不相聞故為之金鼓所以傳遞相報瞬息百里而非人力所能及也然舊法日用烽烟謂如燒一烟則賊不至燒二烟則賊塵起燒三烟則賊步至之類是也然其患有四一則烟霧罩占二則暴風吹鼓三則雪雨昏暗四則塵埃遮蔽此烽烟之不足恃也舊法夜用烽火謂如舉一火則賊不至舉二火則賊騎至舉三火則賊步至之類是也然其患有三一則烽火以雙隻而見賊之遠近隂雨晦㝠則雙隻不分二則烽火以縱横而見賊之東西遇烟霧則縱横不辨三則烽火以巨細而見賊之多寡遇塵埃則巨細不測此烽火之不足恃也新法日用旗號謂舉青旗則賊不至舉白旗則賊塵起舉黄旗則賊騎至赤旗賊步至之類是也然其患亦有三一則隂雨而不辨其高低二則烟霧而不辨其青黄三則塵埃而不辨其遠近此旗號之不足恃也新法夜用金鼔謂如一金一鼓則四顧平安二金二鼓則兵發動有金無鼔則賊步起有鼓無金則賊騎至之類是也然其患亦有五一則相去太遠聲音不聞二則風勢不順聲音不接三則暴雨擊剝聲音不辨四則賊振金鼓聲音混亂五則溪澗湍急聲音交雜此金鼓之不足恃也四者之法良所以濟四者之不及也然此四法行軍用師不可時刻廢廢則為人掩襲是謂候望獨力所勝不如兼力之輕假目於人不如親見之為審事之出於獨力之所成就者有不若兼聽集視之為易得其眞至於事不切於其身利害不係於其心者往往失於不知緩急之變採探之法尤患於此况夫採探之遲速係乎三軍之勞逸採探之得失係乎三軍之勝負採探之吏乃萬人之司命一將之權輿也故古人於先鋒立將白旗立隊劄探立鋪皆所以重採探專候望也然舊法惟令安豐有警則特令安豐之兵傳報花靨霍兵等處盱眙有警則特令盱眙之兵傳報招信淮隂等處不知安豐之人視霍兵花靨外戍為不足恤兼安豐受敵方自顧不及奚暇恤其所謂花靨霍兵之事盱眙之人視招信淮隂别軍為不切之務兼盱眙受敵方自顧不暇奚問其所謂招信淮隂之事此斷遞之患每見於邊鋪死鋪之患每聞於邊探也况入探不遠方見塵埃賊已臨境急報本戍已為稽緩復何責其能報他所之營壁是皆立治不良為謀不審臨敵之際多至誤事今日聚探盡革前弊謂如沿邊十五鋪每鋪三十人每屯各三人或遇有故則甲探報甲乙探報乙彼此互見而不至於隔越遠近交通而不至於斷絶是謂聚探立法之不詳故臨事而多闕人力之所不及事皆可以言天而兵家獨不敢以言天故烽候之相遠利害不得而周知採訪之不宻動靜不容於偏覺而後有硬探遊奕小探之制皆所以濟數者之不及也硬探謂遴募膽勇材士遠出賊境必要探知賊之虚實謂如安豐硬探直至龍灣潁口等處盱􅇇硬探直至臨壁青陽等處遊奕小探謂揀募輕㨗驍勇馬軍往來於邊鋪空闕去處必要探知賊人消息謂如安豐遊奕小探常出没於花靨渒河夾淮等處盱眙遊奕小探常往來於龜山柵口夾淮等處硬探則差出之日重借資賞日幇五劵合干頭目人又加倍支候其探伺得實即令正補仍令添支錢銀買覔間諜招募姦細其有賊將至而不知姓名賊軍至而不知多寡並依軍令遊奕小探則差出之日亦借資賞日幇三劵頭目合干人又加倍支候其採探得實即令正補亦令添支錢銀以助其用其有誤事並依軍令如此召土豪則有其資買間諜則有其具被邀刼則可以贖軀遇關河則可以逃命是謂關遞有間可乘不可謂良謀有弊可指不可謂良法候望之法固足以測敵人之遠近而其弊患所在世將皆未之曉也故候望之弊有二其一曰掠候謂烟火則蹂踐而不令燃炙烽火則漂洒而不令㸃舉旗號則抜去而不令展布金鼓則掠去而不令鳴擊此掠候也吾則有聚探關遞之法二曰誤候謂烟燧則易一烟為二烟三烟而使吾軍之不知其情易一火為二火三火而使吾軍之不諭其事旗號則易青為白而使吾軍之不辨其色金鼓則易金為鼓而使吾軍之不得其實此誤候也吾則有暗辨之法烟火則三隱三見三聚三散敵不知其數目旗號則三高三低三展三卷敵不知其節奏金鼔則三擊三止三急三緩敵不得以例學是謂宻辨天下之事耳之所聞目之所見者皆可以預備耳目之所不聞見則預備之術何自而施聲音不相接顔色不相覩雖欲巧而致之詎可得耶兵家攻其所不戒者皆伏兵説也孫呉之書韓曹之術皆有出竒設伏之名而不及九伏十一伏之法雖遺逸之士言其大槩而得其傳者類皆粗略故其所傳惟九伏而已一曰山伏謂山巖﨑曲關隘險阻二曰土伏枯壕堤㟁古城舊壘三曰草伏草蒿蓊欝茅葦掩映四曰林伏蒹葭荆棘茂林修竹五曰夜伏天色昏暗夜氣晦㝠六曰烟伏山嵐氣霧罩占郊野七曰水伏束葦流身覆荷葢靣八曰津伏橋梁枯涸屋舍幽暗九曰偽伏我欲設伏而窘於無兵欲不設伏而恐其襲我故就險阻之處偽為塵埃旗幟如設伏之狀使賊疑而遁以是九者出軍之日先選機巧合千人名為伏兵將應行軍下營專一揀擇形勢多設竒伏以備盗刼故伏兵之闕一人不知萬人不期一夫不睹萬騎失措至於曵柴揚塵而中有突騎斷木成菴而後有伏弩皆所謂流伏是也善伏兵者藏於九地之下善發伏者動於九天之上鬼神有所不能測雷電有所不能及微乎微乎至於無聲神乎神乎至於無形伏而至此詎容以言盡耶葢伏生於竒竒生於機機生於正竒正發於無窮之源非神機之君子安能與於此哉然善於設伏而不善於搜伏恐我之伏以䧟彼者將轉而為䧟我之具矣故搜伏之法遠入敵地營壘生疎道路險隘恐其設伏尤當先發發伏兵將縱横搜索斯無踈失故草中走獸突出則伏必在草林中飛鳥鳴噪則伏必在林無風而竹葦自動則伏必在山無雨而灘磧自濕則伏必在水溪澗渾濁則伏必流凹塢昏暗則伏必僻野無起塵則伏必未定未曉鷄鳴則伏必夜動故善搜伏者必依四搜之法炬木絙竹擊石連弩搜生而縱死搜向而縱背縱火於東而靜搜於西發弩於左而靜搜其右是謂搜伏涉水為兵家之至險半渡可撃見於書半濟而擊詳於法故分兵而涉則過路多而敵無禦我之謀合兵而渡則過路少而我無絶敵之䇿此分渡之法不可不講也然其妙有二兵多地廣分一為十使對敵一軍先至水次而不得渡敵軍必相持於水岸而不容吾軍急涉即佯與交鋒於水之兩傍使其餘去敵差遠九軍即涉彼岸直衝敵軍之後與敵邀戰待其反顧而拒我九軍則吾對敵之軍可不戰而自涉矣兵少地狹分一為五使對敵一軍先逼水岸而不得渡敵軍必相持於水岸而不容吾軍急涉即佯與交鋒於水之兩傍使其餘去敵差遠四軍急涉彼岸直衝敵軍之後與敵邀戰其顧而扼我四軍則吾對敵之軍可不勝而自涉矣故分渡之妙後涉之兵先發先涉之兵後發彼誠能拒我之二三則我之已涉者葢已八九彼誠能拒我之一二則吾之已涉者葢已三四是謂分渡隂陵之失項羽之勇無所逃霸陵之失李廣之智不能免吾騎遠出吾軍遠探或雪迷路逕而士卒易忘或烟暗山川而士卒莫辨或塵埃草莽而難認形勢或風雨晦㝠而不見山坂或星昏月黑而夜入他道或人疑馬惑而誤行别徑是謂軍迷最為惡證在我有自認之法一則採探馬軍及吾軍將士常帶五色花紙錢替代數畨及造小布袋一枚内貯石灰令滿安在搭袋之内遇白晝兼程星夜潛發路無辨認野無踪跡雪則用五色花紙錢替代之屬繫掛於茅葦草木之上仍以數之多寡而辨其遠近次序則積雪之中不致迷道雨則用石灰布袋之屬印灰㸃於地靣之上仍以㸃之多寡而寓其遠近先後之别前隊先囘則添紙錢增灰㸃而使後隊之不相失後隊先回則又減紙錢亂灰㸃而使前隊之不相誤紙錢則青黄赤白黑五色以表遠近灰㸃則以一二三四五數目以表往來紙錢則收以便袋腰複而以備緩急灰㸃則曵以鞭弰而用以印㸃賊人見之將謂村民祈福之具獵人捕獸之跡而不知吾軍用為鄉導後軍欲尋前軍則望此趨向前軍欲追後軍則得此認記是謂自認黑韃遺事曰盲骨在契丹時謂之朦骨國其人長八尺捕生麋鹿食之其目能視數十里秋毫皆見葢不食烟火故眼明與金隔一江嘗渡江之南為冦禦之則返無如之何其行軍常恐衡伏雖偏師亦必先發精騎四散而出登髙眺遠深哨一二百里間掩捕居者行者以審左右前後之虚實如某道可進某城可攻某地可戰某處可營某方有敵兵某所有粮草皆責辨於哨馬回報如大勢軍馬併力蝟集則力燒琵琶决擇一人以統諸部霆見韃人未嘗屯重兵於城内所過河南北郡縣城内並無一兵只城外村落有哨馬星擺棊布忽遇風塵之警哨馬響應四向探刺如得其實急報頭目及大勢人馬也烟尋泉入山遠道及砂磧之處乏水者掘一穴容一二石許用濕蓬艾滿中燒之火猛而閉留一小穴相通四望之但見烟出之處不論遠近掘之得泉肺也妙哉石山中即近石掘之如土山即草木掘之砂磧擇髙處掘之此能救急但煙出多水惟深更妙亦但尋烟出處皆有水一食頃烟未出者再開一穴求之無不得泉肺也角烟怖虎凡人入山持牛羊等角於上風燒之則虎山精迅速避不敢見形蛇虺絶跡井泉陂塘内多生蟲蛙為害投馬骨於中則絶跡總要曰趨而爭利者不可舉軍皆進又不可棄軍實而往故曰舉軍而爭利則不及委軍而爭利則輜重捐其法若在百里之外則千人中擇百人最勇者先往次勇者數百人繼往罷軟者後往令相續而至也故曰卷甲而趨日夜不處倍道兼行百里而爭利擒三軍將勁者先罷者後其法什一而至是也在五十里外千人中擇勇者五百人先往罷者繼往故曰五十里而爭利者其法半至是也若三十里外爭利者則十人中擇七人先往以其道近人所易至故可去者多亦少敗亡故曰三十里而爭利三分之二至是也所以常不失也疑北征録曰反泄我秘敵泄則勝常在敵敵秘我泄則勝常在我近日邊政正墮乎此故自由俊邁擒而敵人出我潁河安豐之兵盡用吾軍之旗幟而吾軍每敗於辨認不真自呉曦叛而敵人入我安復荆襄之兵盡識吾軍之隊伍而吾軍每泄於機械之不宻此兵家反泄之法葢不可不講也然反泄之法有四一曰號召謂昔以青旗而招將佐今以青旗而招士卒昔以白旗而招統制官今以白旗而招隊部將二曰旗幟謂昔以青為左白為右今則以青為白使敵人不得以知吾左右之名昔以青為直黑為曲今則以黑為青使敵人不得以知吾曲直之勢三曰金鼓謂昔聞鼓而進今則聞鼔而反止昔聞金而止今則聞金而反進四曰烽燧謂昔以一燧為遇冦二燧而索救今則反以一燧而為索救之號無烟為無事有烟為有警今則反以有烟而為無事之驗是謂反泄暗認晋師偽斾曵柴而司馬得脱升卿易衣入質而戎虜果信曹公偽為袁氏之旗而焚袁氏之輜重于仲文偽建尉遲之幟而襲尉遲之守將皆吾軍詐以誘敵而致其師也况使敵人詐以致我哉此暗認之法不可不講也一曰旗號謂恐敵軍詐為吾軍合於相遇之際先將逐旗幟三伏三起盡行捲軸復將旗桿三伏三起盡行舒展若彼軍起伏皆如我法然後合陣否則畨軍即時掩殺二曰金鼓謂恐賊軍詐吾號令即令諸軍於相見之際一鼓一金次二鼓二金次三鼓三金彼既同此相見應即是吾軍然後合陣否則畨軍即時掩殺三曰陣法謂恐賊軍詐吾軍陣令諸軍於相遇之際各以人馬多寡分為兩隊左隊左旋右隊右旋至一周遭而止彼既同此相應乃令諸軍急合而為一陣雙日左旋隻日右旋至一周遭而止彼又同此相應即是吾軍然後合陣否則畨軍即時掩殺是謂暗認潜易以將聞於天下者易將不易兵以兵聞於天下者易兵不易將吾之能將素為三軍倚重一旦他出别營則賊軍必見吾間吾之精兵素為敵國震服一旦改發他道則賊軍必伺吾隙故兵家之秘易將則兵不隨行所以使兩軍之皆重易兵則將不同往所以使彼此之兼全兵發之日去藉徹㸑而宿無蹤曉出夜行而塵不起將發之日不徹儀仗以愚敵軍不落號帶以安我士故易將而兵無失將之憂易兵而將無失兵之慮是謂潛易詭凡戰軍三千一字排開紅戰服如不勝旗揺陣亂又排開乃黄戰服若不勝又排開乃青戰服元數三千乃變九千陣中倒變服戰中顯軍象上紅以紙為之中黄以衣為之下青以衷為之己勝變服廣兵多以敗乃變徹兵之勝不能救要詳察凡戰將交兵以顯青旗若敗被追却顯白旗乃觀生兵使彼兵懼不敢追假令陣戰顯紅旗五十靣旗揺不見紅旗却見皂旗五十靣元旗數旌竿五十靣却顯一百五十靣乃是變法一靣紅旗以紙為之後一靣皂旗以絹為之中靣黄旗竿去乃紅紙旗原開却是皂旗捲皂旗却是黄旗正數五十靣變一百五十靣從將使令何可不詳察假令排軍布陣陣定而後出戰交兵時殺人眼紅不認人使精兵能戰用靣鬼子猙獰之相帶於靣上又䕶了顔使彼兵懼怕未交兵時各藏不要顯出將臨陣帶之威風人懼但見陣以眞先顯是誰後乃用靣鬼子殺兵如變神像宋狄青亦然假令排兵交戰時鼓響已若敗棄大鼓數十靣若彼不將去小可若將去到營城之間夜間呼號鑼鼔乃變人也投燒糧草後間營城裏合外應鼓腔四尺二寸闊五尺五寸乃是挑鼓以腔中使人潛于中以板攀閣充饑藥三丸留出氣眼不可不詳察假令攻城日久不破裏無糧草外無兵上司賞攻城兵數百之羊日西之間自亂自殺數十里棄羊而走去城中人開門趕入城隨入城之間乃變人也已兵䕶圍攻城裏應外合乃用兵手足並行熟古言匍匐是也假令己用糧車於彼兵邊過若彼兵接糧草拖車人棄車而走彼兵若將趕車至營城以信砲為號車乃變軍裏應外合用夾箱車每一車軍三五名絆馬索法凡彼兵營兩邊如相䕶遮於營邊安索於此伏兵埋藏然後刼那一營此營若救先動必中此索之計伏兵兩勒習射乃是法奪馬損軍安索要詳細假令安下索用樁不可夜響恐驚營裏樁數十條離地四尺五寸可安五七道如彼兵到索邊埋伏後追殺驚走刼營法假令刼營西靣入去先使兵東靣大號鼔響彼聚兵衆准防東靣之兵不防西靣猛入殺戰彼後不能防名曰眼前之驚腦後之患此是先詐而後鬼通取詳哉似王陵驚楚假令黄昏間去彼兵營約二里之地燈籠一盞寫牌一靣名曰衆軍將至半夜於此處刼營不到者决斬彼見明必遣使覷知此牌之意彼必此准備此以一盞燈使彼兵一夜不寧息至天明交戰使不得而食至於晩彼兵營數十里埋柱架五七條釣羊前足以後於鼓上名曰懸羊擂鼓至天明交戰至晩精兵刼寨至三更之後信雷忽發悶耳不及先以燈刼營後以鼓閙寨三以兵入乃是先詐後鬼而變眞成假令知彼寨用卒數十箇每一卒牽馬數十匹上䭾草人卒掛鐵甲於營邊相遶彼兵必射行三五遭箭滿可歸又可再刼營彼出若放火燒草人馬見火必走又驚營慌惚不可不詳武編前集卷一
