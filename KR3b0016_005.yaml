body:
  text: 武編前集卷五明唐順之撰牌羅拱辰牌論曰若敵在百步之外我兵必先用弓弩及邊銃以制其鋒及至來近短兵相接尚在三十步內外必須用鏢鎗以飛擊之敵人見鏢必避之中鏢者必倒我兵必乘其勢各持便器而入各兵衝進又必列牌於隊前以蔽矢石而牌乃陳中第一器所不可少者陸戰之法大率以十人為一隊每隊以一人為隊長就將原熟竿子鎗上縛一號旗以便擺陳用內牌手三人執牌在前謹蔽敵鋒用手牌者執鏢一二枝以備飛擊鏢既發矣而隨用腰刀其用挨牌者手持長鎗一以護衆一以旋刺而腰刀又隨身可用則用也次鎗手四人傍牌而行避身牌後亦各兼帶鏢鎗一枝次又或弓或弩或銃者共三人又藏身於鎗手之後居中立者其面向前左右立者以背相向臨敵則先發弓弩銃賊近則牌手竿子手所執飛鏢齊發鏢發則牌手與弓弩銃等兵乘勢并進長短相間彼此相護斯能取勝手牌亦名燕尾牌宜用白楊木或輕松木為之取其輕而堅也每面約長五尺七寸闊一尺上下兩頭比中間闊三四分俱小尺用手牌便於用刀先以鏢鎗飛擊先挫賊鋒然後用刀則前後左右隔賊技器施我刀法此手牌之利也左手執牌大指橫挽刀一把裏又帶鏢一枝右手擎鏢一枝與賊相近三十步內外先用右手鏢飛擊次取牌裏鏢又飛擊然後用刀瞷賊或鎗或刀如後二式應之手牌隔鎗左手執牌右手執刀與賊相近時見賊用則將牌下手節閃於身前露身對賊賊鎗必對身戳來以牌向後一拍我刀順牌角而下則賊鎗被牌拍去而我刀傷賊矣又一法將牌緊閉身俟賊鎗對戳來略將牌前面向後一扭其鎗自虛落於我後我刀隨即砍去手牌隔刀與賊相近以左手執牌將牌略閃身後露身前半俟賊刀砍下以牌從前執起迎隔賊刀右手用刀攔腰砍下賊刀被我牌隔去而我刀傷賊身矣挨牌亦用白楊木為之每面約長五尺闊一尺五寸下頭比上略小四五分俱小尺挨牌用繩索用木橄欖者用挨牌則以牌上長繩上木橄欖扣入繩回中掛於項上以左手中指縫中夾牌下短繩上木橄欖仍以五指挽鎗前半節右手執鎗後半節或伸或縮或長或短或左或右旋刺非惟護自身且護從牌之兵手牌止用得鏢與刀一手持牌也挨牌可以用鎗手兩手俱不持牌也此用挨牌式以左手中指縫中緊夾下面短索上木橄欖照前牌下式以頸項掛牌上繩照前牌上式仍以左手五指挽鎗前半節右手執鎗後半節或伸或縮或出長出短或左或右旋刺非惟護自身且護從牌之兵兹者乞製無敵神牌二十八面其牌可以衝鋒乞取䂝罐五萬斤其物可以足餉揀選精兵日逐訓練使知攻殺擊刺之方出竒埋伏之妙任倭千萬無能相拒仰惟試用生民萬幸儒生今承考試理合繪圖具呈須至呈者計開無敵神牌式此是軍中一技名曰無敵神牌一人可以敵百十卒能敵千人無拘山戰水戰可用攻營守營能鎖我兵之不退能拒敵兵之前進提綱曰團牌者櫓盾之屬用以遮蔽矢石也若雜於五兵互相捍衛可以拒勍敵可以遏奔冲若獨用可以護身殺敵可以擺路塞門遇溪河可以浮人渡水執斯器者須㑹大七星閃馬牌等法習熟為能凡操牌俱攢一處二十五人一行令通曉跳牌官旗教演聽鑼聲為節制鑼嚮一聲習牌一路如有進退合度覱牌如壁閃牌如電起伏得宜翻身不露身滚牌不露足張牌能殺其敵斂牌能蔽其身是謂能矣用之以拒勍敵以衛短兵大七星歌曰牌嚮覱牌扻刀上步再牌嚮扻刀背擎刀紋絲步回撒花蓋頂收了出牌見力翻身上小跳翻身下出牌韯刀上小跳翻身下閃馬牌歌曰韯牌再韯牌坎一刀復一刀再坎一刀再復一刀翻身上小跳翻身下又坎一刀又復一刀又坎一刀又復一刀翻身上小跳翻身下鐵澤潞出鐵上等鐵絲鐵如黃豆大長丈餘用工最多次等鐵條鐵中鑿三眼三等手指鐵鑿五條紋下等塊子鐵出鐵之處條鐵止用兩箇錢一斤而已薊州好兵器用桅孤鐵達子鍊鐵用馬糞火鐵有生鐵有熟鐵鋼有生鋼有熟鋼生鐵出廣東福建火鎔則化如金銀銅錫之流走今人鼓鑄以為鍋鼎之類是也出自廣者精出自福者粗故售廣鐵則加價福鐵則減價熟鐡出福建溫州等處至雲南山西四川亦皆有之聞出山西及四川瀘州者甚精然南人實罕用之不能知其悉熟鐵多瀵滓入火則化如豆查不流走冶工以竹夾夾出以木捶捶使成塊或以竹刀就罏中畫而開之今人用以造刀銃器皿之類是也其名有三一方鐵二把鐵三條鐵用有精粗原出一種鐵工作用以泥漿淬之入火極熟糞出即以鐵捶捶之則渣滓㵼而淨鐵合初煉色白而聲濁久煉則色青而聲清然二地之鐵百煉百拆雖千斤亦不能存分兩也生鋼出處州其性脆拙工鍊之為難蓋其出爐冶者多雜糞炭灰土且其塊粗大惟巧工能看火候不疾不徐捶擊中節若火候過則與糞滓俱流火候少則本體未鎔而不相合此鋼出自處惟浙東用之若其他遠土則皆貨熟鋼也熟鋼無出處以生鐵合熟鐵煉成或以熟鐵片夾廣鐵鍋塗泥入火而團之或以生鐵與熟鐵并鑄待其極熟生鐵欲流則以生鐵於熟鐵上擦而入之此鋼合二鐵兩經鑄鍊之手復合為一少沙土糞滓故凡工鍊之為易也人謂久鍊則生鐵去而熟鐵存其性柔頗似不然蓋生鐵雖百鑄所拆甚少熟鐵每一鑄所拆甚多其去其存不知其孰多而孰少也人有謂團鋼久鋼則脆與性柔之說相反此二鋼久鍊之其形質細膩其聲清甚若鐵之久鍊者聲雖清然不及鋼也一先將毛鐵逐塊下爐入火候微紅時鉗出用稻草灰拌鐵身却入爐大火扇透紅發值時鐵花飛冒之際鉗出鎚成板子就以鋼鏨鑿縱橫深紋於其上其紋路俱隔分數如此三遍初次一煉一二次二合一三次四合一其蘸灰鑿紋總同前法但盡此法製其色白聖如銀其聲清而有韻此其證驗計用福建方毛鐵對客買每百斤算買腳并搬運腳價共用銀九錢福建條鐵今人用造釘裝家火造大器械不用廣東條鐵今人用抽鐵絲造大器不用一鍊鐵每十斤權鍊作三斤計用匠五工工食二錢五分約用炭價銀一錢六分通算鍊就鐵計用銀一錢六分六釐六毫得鐵一斤此鍛鍊之大數至於成造刀銃工又益加鐵又益拆此須逐樣監試一件才能定價一鍊鋼每斤計銀二錢可作甲葉計銀三兩可作好刀一弊端估造器械官價率有餘然內而監造人員與掌局工作以漸侵尅是以髙價而得低物也鐵與鋼錬之已精未精非若金銀可以成色辨計往昔只照常制造尚自弊多至於鍊鐵則弊益易著手盜炭指粗鐵以為精鐵以粗鐵而易精鐵將無所不至矣一鍊鐵之工須得素用堪用之人方彼此相解若造鳥銃須得慣造得法之人為之指撥刀花羊角煅灰粉心水提過酸酸草燒灰硝醬刀方羊角鐵石􅔈沙火器一保生牌上列鉛子小銃一十五箇一人左手執牌右手執刀內運某機則銃齊發發無不中較之鳥銃嘴只傷一人者有間矣此為衝鋒第一神器也一百步火龍內藏神器二十四件諸般毒藥飛沙發泄而凝聚不散入目則目盲入㗋則㗋啞劫營破寨勢若燎毛陸戰水攻截殺用之無不取勝此為破敵第一神器也一千子銃即大將軍也以毒藥法制生鐵千斤藏於銃內銃發則片如雨雖萬衆莫能當也一中其賊頃失其命而不自知其終矣宿火用鐵片炭基一水底雷以大將軍為之埋伏於各港口遇賊船相近則動其機銃發於水底使賊莫測舟楫破而賊無所逃矣用大木作箱油灰粘縫內宿火上用繩絆下用三鐵猫墜之一法制火毬以諸般毒藥和火器為之毬碎而火不息火散而煙不滅此宜於水攻破敵而燒舟楫者也一子母舟母用二小船為之遇賊船密以繩連環其柁柁不應則船不可使然後以戰艘臨之無不破敵一飛懸神銃固守城池者也埋伏於城下每離十箇垜口只用一人守之遇賊攻城上動其機則銃發於城下此為形而示之以無形伏而疑之以無伏兵不勞而城可守者也一迷眼火沙以諸般毒藥為之置於長鎗之首占其上風賊中火器氣則目即盲一火車取勝或以牛馬載之縱之使入賊營陳則火舉而賊衆奔潰觸處皆傷手足無措聞其煙氣者命絶而不知所終矣鳥銃匠頭義士馬十四呈每銃一桿用福鐵二十斤價銀二錢炭一百七十斤該價銀五錢一分煉坯打板六工該工食銀一錢八分煮筒六工共該工食銀一錢九分內加鉗手銀一分鑽銃心每桿七工該工食銀二錢一分銼磨四工該工食銀一錢二分打照星火門促仗頭并銼完共二工該工食銀六分鑲照星火門事件該工食銀八分銼銃磨鏨幫鑲一工該工食銀三分鑽火門事件細眼一工該工食銀三分發銼匠一工該工食銀三分打鑽修接通條二工該工食銀六分木托工料銀九分銅打鉸鍊工食銀一錢二分促杖竹桿該工料銀一分油硝醬竹甲鐵線共銀二分鋼鐵一斤銀四分通條爐楞鑽鐵二斤銀二分外照依畨式活底螺螄篆工料銀三分以上每銃一桿用工料價銀二兩三錢一分今開王直估定過每鳥銃一桿該用工料價銀三兩八錢三分每銃一桿用鐵四十斤該銀三錢六分炭五百斤該銀八錢五分煉鐵爐每爐六人煉該四日共二十四工內鉗手每工四分散匠三分算該銀七錢六分并鐵一爐六人用一日內鉗手四分散匠三分算該銀一錢九分煮筒一爐六人用一日內鉗手四分散匠三分算該銀一錢九分鑽鐓十工該銀三錢銼磨五工該銀一錢五分螺螄篆該銀三錢打銼火門照星一工銀三分鑲篏火門照星銀八分銼銃鑽細眼一工銀三分通條雜用鐵銀三分修通條鑽頭一工銀三分作銼一工銀三分鋼鐵該銀二分􅀢杖木托柸價銀六分木匠二工銀六分銅撥鬼活釘一副重六兩連炭該銀六分銅匠二工銀六分稻草該銀三分硝醬竹甲鐵線該銀二分射吳越春秋論射曰其道甚微而易其意甚幽而深道有門戶亦有隂陽開門閉戶隂衰陽興凡手戰之道內實精神外示安儀見之似好婦奪之似懼虎布形候氣與神俱往杳之若日偏如追形逐影光若佛倣呼吸往來不及法禁縱橫逆順直復不聞斯道者一人當百百人當萬正射之道道衆而微古之聖人射弩未發而前名其所中臣未能如古之聖人請悉其要夫射之道身若戴板頭若戴激卯左蹉右手若足橫左手若附枝右手若抱兒舉弩敵翕心咽煙與氣俱發得其和平神定思去去止分離右手發機左手不知一身異教豈况雄雌此正射持弩之道也願聞望敵儀表投分飛矢之道音曰夫射之道從分望敵合以參連弩有斗石矢有輕重石取一兩其數乃平遠近高下求之銖分道要在斯無有遺言弓王琚教射經曰凡射必中席而坐一膝正當垜一膝橫順席執弓必中在把之中且欲當其弦心也以弓當左膝前豎按席稍吐下弰向前微令上傾向右然後取箭覆其手微拳令指第三節齊平以三指捻箭三分之一加於弓亦三分之一以左手頭指授之則轉弓令弦稍離身就箭即以右手尋箭羽下至闊以指頭第二指節當闊約弦徐徐送之令衆指差池如鳳翮使當於心又令當闊羽向上弓弦既離身即易見箭之高下取其中平直然後擡弓離席目睨其的按手頥下引之令滿其持弓手與控指及左膊肘平如水准令其肘可措杯水故曰端身如幹直臂如枝直臂者非初直也架弦畢便引之此及滿使臂直是也引弓不得急急則失威儀而不主皮不得緩緩則力難為而箭去遲唯善者能之箭與弓靶齊為滿半靶之中為貫盈信美而及者難要令大指知鏃至然後發箭故曰鏃不上指必無中矢指不知鏃同於無目試之至也或以目視簇馬上與暗中則乖此為無術矣故矢在弓右視在左箭發則靡其弰厭其肘仰其腕目以涇之手以駐之心以趣之其不中何為也又曰矢量其弓弓量其力無動容無作色和其支體調其氣息一其心志謂之楷式如此五者為上德故曰莫患弓軟服當自遠若患力羸恆當引之但力勝其弓則容貌和發無不中故始學者先學持滿須能制其弓定其體後乃射之然其的必始於一丈百發百中寸以加之漸至於百步亦百發百中乃為術之成或升其的於高山或致其的於深谷或曳之或擲之使其的縱橫前却所以射禽獸與敵也凡弓惡右傾箭惡直懦頥惡傍引頸惡却垂胸惡前亞背惡後偃皆射之骨髓疾也故身前疏為猛方騰額前臨為封兕欲鬭出弓弰為懷中吐月平箭闊為弦上縣衡此皆有威儀之稱也又曰凡控弦有二法無名指中指壓大指頭指當弦直豎中國法也屈大指以頭指壓勾之此羌法也此外皆不入術羌法力少利馬上漢法力多利步用然其持妙在頭指間世人皆以其指末齪弦則致箭曲又傷羽但令指面隨弦直豎即脫而易中其致逺乃過常數十步古人以為神而祕之羌法不使大指過頭指亦為妙耳其執弓欲使把前入扼把後當四指本節平其大指承鏃却其頭指使不礙井儀開弓形所謂懷中吐月也襄尺襄平也尺曲尺也平其肘所謂肘上可置杯水也白矢矢白鏃至指也所謂彀率也剡注注指也以弓弰直指於前以送矢俗所謂絶力控也剡鋭也弓弰也靡其弰參連矢行急疾而連參也俞大猷曰烈女𫝊曰怒氣開弓息氣放箭蓋怒氣開弓則力雄而引滿息氣放箭則心閒而慮周凡打袖皆因把持不固凡矢搖而弱皆因鏃不上指也法曰指不知鏃同於無目此指字乃是左手中指末知鏃者指末自知鏃到不假於目也必指末知鏃然後為滿必箭箭皆知鏃方可言射妙審者審於弓滿弓發之際今人多於大半矢之時審之亦何益乎審者今人皆以為審的而已殊不知審的第審中之一事耳蓋弓滿之際精神已竭手足已虛若率然而發則矢直不直中不中皆非由我心使之也必加審之使精神和易手足安固然後發矢其不直不中為何大指壓中指把弓此至妙之古法也凡箭去寧髙而過的慎勿低而不及也習挽進力古法曰莫患弓軟服當自逺蓋習射之始必須積挽其法以木弓三四斗挽少至多不可驟越積至弓服然後加以斗力推而上之至一石止蓋石力人皆有之可勉而及挽力既進則架箭以試其滿弓欲弱箭欲長弓弱則易至滿箭長則引滿有餘他日射之可無殘箭之患古事林廣記曰執弓取箭古法曰逺之能近之功蓋挽力既進然後習以左手連雙箭夾弓而執箭筈齊上弰上三指實下二指虛其箭自偃以右手下三指仰抹取偃箭至箭之半即以小指勾定推近鏃分寸之間次以食指勾其上箭控筈上弦不可以目視取筈凡取箭之體須側右手於右則不撞弝不視取筈則恐不真不真則不能及强揣模久之則又非式亦恐有落架脫弦之病必控筈之際以食指包簳其筈縱未遽入弦可以一移而無脫落先習於十步之內百發百中然後增五步推而上之至百步止此古善射者之法牽放體勢古法曰前手如托太山後手如抱嬰兒前足如踏雞子後足如踏蝎蝮丁字不成八字不正謂手欲前直而後圓足欲前虛而後實前足尖對的後足橫則有力也左膊惡髙右肘惡下頸惡傍引頭惡却垂胸惡前仰背惡後偃肚惡凸臀惡髙力勝弓則容貌間和弓勝力則體動神疲蓋射以和容為上主皮次之其或撮口挽弓嗔目牽箭斜視其的架挽失容一身態度尚不自持又安能求中遣放求親古法曰射不入鐡不如不發射不入石徒勞爾力又曰有力不親不能害人親而無力不能入物又曰疾而箭狂反被敵傷親而箭遲敵可閃移三者射之要也蓋射始於舉筸終於遣箭筈髙則下插而箭斜筈低則上插而箭徐弓急則失威儀而難中弓緩則力弱而去遲昔由基百步穿楊鐏甲七札精通於神唯在遣放遣放之法須人力勝弓操審在我偃其左手仰其右腕箭發則靡其前弰前弰畫地後稍附右膊後手不得戀前手不得連身不得動文牽而武放然後發無不疾疾無不毒毒無不親治心調攝古法曰得之於心應之於手蓋心一不治則射無中理凡射有十不可他想不可他憂不可奔走而至不可醉不可饑不可飽不可怒不可不欲射不可射多而好不止不可爭奮不可戒此十者則不徒射矣射中勿喜喜則心易而反跌射不中勿憂憂則心惑而無主手執其弓弦安其箭目注其的心實運之平居暇日更當調其氣息節其飲食避其寒暑持其喜怒誡其嗜欲此射之至要步射總法左肩與胯對朵之中兩腳先取四方立後次轉左腳大指垜中心此為丁字不成八字不就左手開虎口微鬆下二指轉弝側臥則上弰可隨矢直指的下弰可低脾骨下此為靡其弰右手摘弦盡勢翻手向後要肩背與腕一般平直仰掌現掌紋指不得開露此為壓肘仰腕持弓審固左手垂下微曲大指羈弝第二第三指著力把弓箭餘指斜籠下弰指左腳面曲右手當心右臂貼肋以大指第二第三指於節上四指絃畟促弰箭筈與手齊訣持弓審固事須垜在南時面向西右手捉弓左當弝仍令箭筈兩相齊舉弝摟弦欽身微曲注目視的左手輪指坐腕弝弓箭如懷中吐月之勢續以左手第二指與第三指靠心斜入撥弦令弓上傳著右肩然後舉左腳三移其步以箭訣曰舉弝撥弦橫從腳輪指坐腕手微欽上弰斜傅右肩膊左手持弝橫對心抹羽取箭以左手三指丞下緊抵前四指五指鈎落上箭先舉右腳隨步合右手指弰低弝以二指按箭三指斜劈箭四指五指向裏斜鈎左手二指三指羈簳掣箭至鏃訣曰前當弓弝一般齊三實兩虛勢漸離小指取箭緊羈鏃抹羽入弦無暫遲當心入筈右手第二指緊控箭筈大指捻筈當心前手就後手拶簳入筈左腳尖指垜腳跟微出右腳橫直鞋􅙳對垜淺坐箭筈左手第二第三指坐腕羈前雙眼斜覻的訣曰右手二指抱箭筈兩手相迎穩入弦捻筈當心斜覻貼緊膨兩膝直如衡鋪膊牽弦輪指把弝推出前手微合上弰兩臂弰曲不可展盡左手輪指空第二指過弓弝節上大指面緊著弓弝屈起指節餘指實屈鋪下前膊左右膝著力同入筈法訣曰前腳推下若推山右手彎弓緊冠弦兩臂稍曲不展盡文牽須用緩投肩斂身開弓以左手第二指知箭弝外覻帖側手引箭至鏃大指靠定血盆骨為進凡鏃與弝齊為滿半弝之間為貫盈貫盈信美難有及者大抵脅肋腳膝著力亦同入筈法訣曰開弓發矢要斂身弝外分明認帖真前筈肘上翻雙膊脅肋腳膝力須勻極力遣箭竦腰出弰上弰畫地下弰傅右膊後手仰腕極力􅂒後肘過肋倚後手向後前手猛分虎口著力向下急捺轉腕以第四第五指緊鈎弓弝兩肩凸出則箭力倍徑訣曰弰去猶如搦斷弝箭發應同撚折弦前弰畫鞋後靠脊極力遣出猶自然捲弦入弰後箭前兩手相迎直右手過胸曲左手捲弦以左手第二指取箭前腳跟聳身稍斂雙眼覻帖曲右手帖肘以左手第二第三指側手羈簳直右手上臂仰腕過胸取箭訣曰右指羈箭當胸出左手捲弦弰靠肩箭已中時無動手抹羽入筈法如前修後手法宋盧宗邁大尉釋摋蘇割切說文云側手擊物曰摋謂當後手如擊物之狀令臂與肩一般平直是也捩音列說文云捩拗也謂以前手推弝後手控弦如用力拗捩之狀㔢租說切說文云㔢斷也謂當以後手摘弦如㔢斷之狀翻手向後仰掌向上令見掌文是也控丁結切俗作擷說文云控擲也謂當以前手㸃弰如擲物之狀令上弦指的下弰抵脾骨下也步射病色開弓勘手謂前手太髙後手低不平開弓提手謂前手太低後手髙開弓偃弰謂身直頭偃前手腕仰兩摘謂不發用力及前後分解不齊斫弦謂遣箭分弓實握不轉腕微鬆手轉弝肥弝謂手太鬆倒提手弝㔇弰弰子大二件謂下弰傳二胛後手約謂手側不仰腕後手小謂斂定手不放平後手偃後手捲二件謂遣箭不直硬或剪弦列手射馬總法勢如追風目如流電滿開弓硬放箭目無瞬視身勿倨坐不失其馳舍矢如破射疏及逺中微制大必資於弓矢今弓手止射長箭而不知射邊箭弩手亦不知用弩之法况各止用竿子雖可取勝殊非長技為照長箭去遲而敵人易見故彼得以閃避且得拾取復射其利在彼邊箭去疾而敵人難窺非惟彼不能回箭况邊箭所到倍長箭百步有餘其利在我長邊二箭務令弓手兼習若賊尚逺緩則射邊箭如來近迫則射長箭各從其便鈞石之石五權之名石重百二十斤後以一一斛為一石自漢已如此飲酒一石不亂是也挽蹶弓弩古人以鈞石率之今人乃以粳米一斛之重為一石凡石者以九十二斤半為法乃漢稱三百四十一斤也今之武卒蹶弩有及九石者計其力乃古之二十五石比魏之武卒人當二人有餘弓有挽三石者乃古之三十四鈞比顔髙之弓人當五人有餘此皆近嵗教養所成以至擊刺馳射皆盡夷夏之術器仗鎧胄極今古之工巧武備之盛前世未有其比黑韃遺事曰其騎射則孩時繩束以板絡之馬上隨母出入三嵗以索維之鞍俾手有所執從重馳騁四五嵗挾小弓短矢及其四時業田獵凡其奔驟也跂立而不坐故力在跗者八九而在髀者一二疾如飆至徑如山壓左施右折如飛翼故能左顧而射右不特抹鞦而已弓有六善一者往體少而徑二者太和而有力三者久射力不屈四者寒暑力一五者弦聲清實六者一張便正凡弓往體少則易張而壽但患其不徑欲其徑者妙在治筋凡筋生長一尺乾則減半以膝湯濡而極之復長一尺然後用則筋力已盡無復伸㢮又揉其材令仰然後傅角與筋此兩法所以為筋也凡弓節短則和而虛虛謂挽過吻則無力節長則健而柱柱謂挽過咳則木强而不來節調把捎椑木長則柱短則虛節得中則和而有力仍弦聲清實凡弓初射與天寒則徑强而難挽射久天暑則弱而不勝矢則膠之為病也凡膠欲薄而筋力盡强弱任筋而不任膠此所以射久力不屈寒暑力一也弓所以為正者材也相材之法視其理其理不因矯揉而直中繩則張而不跛此弓人之所當知也弓制一馬蝗面弓謂用大牛角解截成面而闊遇拽滿則曲如扇圈受力均勻不嚼不走不閃不肭一泥鰍面弓謂用小牛角解截成面而狹遇拽滿則曲如折竹受力不勻易嚼易走易閃易肭一披背筋法披筋一版晴暄合待半月隂雨合待一月方令再上或連披數版則內濕外乾射不旬月解脫可待一膝弓背面法用漆一重晴暄合待十日隂雨合待二十餘日方再漆不可日添數重則內濕外乾射不季月斷脆可待一裹弓之法或用黃樺或用桃皮或用朱紅皆不若黑生漆免被水透一弰弓之法或用白角或用魚枕或用繪畫或用紅緑花彩皆不若用黑生漆免費工績臣嘗聞軍器三十有六而弓為稱首武藝一十有八而弓為第一其緊切尚矣今之制者何蔑裂之甚邪蓋筋角不能自相固結故假之以膠漆膠漆不能自相堅實故壯之以筋角然二物相資必隔旬日候其自乾然後再用是謂年弓月箭否則弓雖易成膠亦易脫馬蝗面闊而受力均勻受弦端正故發矢可期於破甲泥鰍面狹而弓愛走反面愛斷嚼故臨用多至於誤人皆由擇角之初大角價高小角價低有司喜賤而惡貴故凡所在買到軍須小角常多而大角常少有司非喜用小角而惡用大角也大角之價常倍於小角小角之價常半於大角此固價之不相若矣况角之大者至為艱得若全用大角則作匠所選愈難而倉卒亦無收買去處戎監只得兼用夫小角界成狹面面闊則力硬故令面薄遂成馬蝗之狀泥鰍乃員滑之水族馬蝗乃闊匾之介蟲此取喻耳至若用黃樺桃皮以裹弓面牛角魚枕以裹弓弰徒為觀美不若用出山生漆刷髹兩重則雨不能濕水不能透亦必弓力軟弱饑疲之卒方能牽挽滿箭不能則拽不過面箭去無力是謂弓制矢不破堅與無矢同矢不破甲反資敵用造矢不可無法尚矣近日所製箭鏃太重箭簳太粗膠易解散翎易脫落其故何耶蓋古人之制箭欲其去之徑直也故翎之以羽曰鵝曰鸛曰鴻曰鵠所用不拘於一名欲其去之鋒利也故鏃之以金石石蓮曰鑿子曰喬麥稜曰破甲錐所制不拘於一樣簳有腦節巴翎腰瞷之辨筈有山繭采色桐油柿漆之别然考其已驗之迹翎則鵰鷴野雉為最捷鏃則寸金鑿破甲錐為最鋭簳則通簳去直而易中筈則黑漆易成而省費餘皆徒事觀美不堪實用敵中軍器上皆有原監造官姓名年月遇有損壞有誤使用即將元監造官依法施行斷不輕恕所以敵人器具一一如法而吾軍製作之司一切不問只欲速成可以逃責備數足矣此所以類皆茍簡蔑裂而不中用也况鏃重則弓軟而去地逺箭重則弓硬而中甲不入舊法箭頭重過三錢則箭去不過百步箭身重過十錢則弓力當用一碩是謂弓箭制古事林廣記曰古法曰弓不等箭與短兵同箭不等弓與無鏃同謂箭重則緩輕則揚也蓋弓有强弱矢有銖兩弓不合度矢不端直雖䝉羿不能必中古者弓矢之制弓八斗以弦重三錢半箭重八錢為凖學成或致的於深谷或升於高山或曳或擲使其的縱橫前却施之於敵發無不中焙冝火候江南之地多卑濕弓矢四時必火焙適宜然後筋角膠漆和暢而不解使弓斗力常存矢翎羽常附凡造焙之制髙不過五尺橫稱弓身而有餘隨弓之多寡而廣狹之弓之去火四尺之上下火近太迫則燥火去弓太逺則火氣不及務適宜耳弓面上向焙其背不焙其面凡火四時有寬猛增減不欲太猛亦不欲太寬蓋太猛則有弓枯之患太寬則火氣易息與無火同火在爐春夏秋冬上常覆三分灰於梅蒸則宜上覆二分之灰春夏隂潤亦如之常使微露見火朝以繼暮夜以繼日四時值天氣明爽時取弓出而列於架使筋角之活也良久復藏於焙江南射者易傷其弓往往恃秋冬不潤或置之風殊不知一日失焙弓未遽解積日則解矣凡自焙內取弓出射必候頓晷令弓絶無火氣方可安弦庶幾無傷折之患箭亦不可不焙不焙則翎羽不附焙箭之法要在以直安箭箭橫安則易曲也弦之新者必潤安之於焙以去其潤然後結而上弓庶不差於長短大抵射以弓矢為本凡當謹護其逐月用火分數詳列於左正月二月用火五分三月四月用火六分五月梅蒸用火十分六七月用火七八分十一月十二月用火五分八九十月用火六七分矢長八寸為鞭箭四寸為白蛇吐信皆用溜子發之鞭箭先搭箭後搭溜子白蛇先搭溜子後搭箭弩程太昌曰書云若虞機張往省括于度則釋機者弩牙也牙之所以遏弦也括者矢之尾末岐而為二可以御弦也度者立為分寸使可以凖望以求正鵠之所在故必待其尺寸之實故力始可發也虞者度也入聲往者矢尚在弦未離弓臂之上也為其目力已注乎機即為往也欽厥止者弩人虞度機牙之時也所止已定則率祖而行以釋矢於弦者也釋者發機激之時也揚子曰奠而後發發必中矣後漢愍王寵善弩射十發十中中皆同處李賢注曰寵射祕法曰三微為經三小為緯經緯相將萬勝之方然要在機牙案此即三微三小者其措矢之分寸也目之所注分寸可凖則矢之所發必無毫厘或差弓弩蓋一律也夫惟有分寸可凖則虞度所施正在擬發之間矣三微三小分寸在弦而十發十中往必中鵠以機牙之分寸必與正鵠之分寸相對也目注乎此而擬度及彼是為往省也列子仲尼篇言射者能令後鏃中前括發相及矢矢相屬前矢造凖而無絶落後矢之括猶銜弦視之若一焉唐六典庫武令注箭曰其本曰鏑其旁曰羽其矢末曰括括旁曰疑書所謂往省括于度則釋者矢之末分岐而銜弦者是括也劉天和曰前代名將如漢耿恭虞詡唐李靖郭子儀宋劉錡吳璘宗澤輩用彊弩以破羌冦者不可勝數而漢且置彊弩將軍之官宋始有神臂弓之制其實弩耳臣亦未敢遽是也近於陜西省城見有城樓舊題神臂弩數百張相傳者百餘年矣乃知先朝亦嘗制此雖皆損壞而制度猶存但箭則無矣臣謹從宜遵倣造成其制以闊厚堅徑大弓其力一百五十斤上下及一百二十斤上下及九十斤上下為三等慮人力有强弱也其長均四尺五寸矢取其利最逺而端可及三百步內外者為式其長均七寸五分其重則六錢上下亦三等俾與弩稱復倣漢耿恭之法箭鏃開四尖又𫝊以河南嵩縣等處射虎箭藥俾人馬中之無不立斃尤敵所畏其箭鏃後小鐵管心僅長分許入箭簳處內用漆膠外用竹絲以夾縛之俾敵不能取以返射蓋敵之射藝極精矢無虛發惟此足以勝之臣謬謂彊弩為中國長技之一者此也提綱曰最為利器射堅及逺爭險守隘遏衡制突非弩不克或者謂用弩不便於戰然非弩不便於戰乃為將者不善於弩也善用弩者列為五層每層或三或五攢箭注射射訖掣回而張張訖挨次而射遞相輪翻繼而不絶尤宜處髙臨下仍令弩手各帶腰刀一把賊若近前則跨弩而用刀如此則長短得以相濟一教弩法曰張弩丁字立當弩八字立髙揎手届衫襟左手承撞右手迎上當心著張張有闊狹左䏶右膊還復當心安箭高舉手敵逺則擡頭放箭敵近則􅊭身敵右則右回身敵左則左回身敵在髙髙擎手敵在下低伏手發訖唱殺殺然後掣北征録一蹺蹬弩牙裡一尺八寸五分葫蘆頭四寸木檐長五尺八寸一名馬蝗一名克敵一名一滴油張憲伏之於中林而捉真珠郎時俊用之於射狄關而敗四太子一神臂弩樁牙裏一尺八寸葫蘆頭四寸鐙二寸樁長二尺三寸角檐長四尺五寸一鍬頭如樁二尺葫蘆頭五寸鐙五寸三口五寸鍬頭五寸樁凡長四尺木檐長七尺春夏雨水蒸濕宜用角弩畨長於馬漢長於弩制騎一弩此舊說也然近日諸軍弩手皆缺指版人身通以五尺為率上頂至項一尺則下止四尺泥濘五寸則上止有三尺四五寸弩手進則踏弩以射退則病弩以歸檐長若過六尺樁長若過三尺肩弩則檐梢柱地而下有綰絆之憂踏弩則樁頭柱胸而上無牽挽之力草萊藤蔓之地懼其牽綰必棄弩而空走塗潦泥塹之地被其踢絆必為弩而喪軀今欲使弩㪷力自二碩至三碩不許太硬令久疲之兵易於蹉踏使弩檐自五尺至六尺不許太長令矮短之兵易於肩射夏暑之月梅雨蒸潤筋角易脫則用木弩秋冬之月風色嚴冷木索重滯則用角弩其鍬頭等樁檐太長者悉令諸軍減令短捷則庶無廢器是謂弩制臣聞弩箭之制與弓箭不同弓箭瞰弦而安筈頗難弩箭平頭而安筈甚易弓箭太長而擇簳甚費弩箭太短而擇簳甚省比者帥臣造華車弩而箭用索翎故失於太鈍而不能取親均於無用要之鏃用石蓮頭喬麥稜則光滑而不能入甲不若用破甲錐寸金鑿子則鑿上有鋒而易入竅隙翎用禽羽則得箭者尚堪再射不若用竹片裁製則翎口如刀而易穿肌肉是謂弩箭制弩有踏張者梢小則有跳蹬弩木弩跳蹬弩亦曰小黃其用尤利木弩雖可施不能久邊兵不甚用其力之强弱皆以石斗為等箭有㸃鋼木羽風羽木撲頭三停木羽者以木為簳羽咸平初軍校石歸宋上之箭中人雖簳去鏃留牢不可拔戎人最畏之風羽者謂當安羽處剔空兩邊以容風氣則射時不捍此不常用備翎羽之乏耳三停者箭形至短羽簳鏃三停故云三停箭中物不能出以短故也雙弓牀弩前後各施一弓以繩軸絞張之下施牀承弩其名有小大合蟬有射手合蟬者謂如兩蟬之狀大者張時用十許人次者五七人一工凖所射高下一人以捶發其牙箭用大小鑿頭箭惟手射斗子弩最小數人就牀張訖一人手發之射并及一百二十大步三弓休弩前二弓後一弓世亦名八牛弩張時凡百計人法皆如雙弓弩箭用木簳鐵羽世謂之一鎗三劒箭其次者用五七十人闕則或鐵或翎為羽次三弓并利攻城故人謂其箭為踏撅箭者以其射著城上人可踏而登之也又有繫鐵㪷於弦上㪷中著當箭數十隻凡十發可中數十人世謂之㪷子箭亦云寒鴉箭言矢之紛散如鴉飛也三弩并射及二百大步其箭皆可施火藥用之輕重以弩力為凖三弓弩用皮弦一條甚寬宛轉貫三弓之間或用兩小鐵圈在弓稍甲程大昌曰三代秦漢以前軍旅多用皮甲其曰犀兕者是也然史傳所載已有鍛金為甲者矣顧其用者尚少耳管子曰葛盧之山發而出黃金蚩尤受之以為劍鎧鎧即甲也然則前乎三代已有金甲矣若其軍旅之所通用不勝其多則直鍛皮為之耳許氏說文鎧甲也釬臂鎧也錏煆頭鎧也三者字皆從金則可知其必以金鑄矣周禮函人所典犀甲兕甲合甲凡三甲也此三甲者率皆以皮為扎扎成堅之以火故函人曰凡煆不摯則不堅已敝則撓是也三者惟牛可畜則可隨須隨有矣若犀與兕皆非可畜之獸其皮亦不可常得也勾踐又有水牛之甲即以水牛皮為之矣荀子曰楚人鮫革犀兕以為甲堅如金石鮫魚者皮上傳砂其鋩可錯可以為甲亦與犀兕同堅於是遂名水犀者即是本鮫魚之為水産而取之以名也晉書載馬隆之討凉州也夾道纍磁石賊首負鐵鎧行不得前隆卒即被犀甲無所留礙賊以為神則是隆軍有鐵甲可擐而不得擐也王隱晉書亦載其事乃曰隆兵悉著牛皮鎧得過則是實用牛皮為之而名以為犀焉耳仲長統昌言曰古者以兵車戰而甲無鐵札之制今試以革甲當强弩亦必喪師亡國則甲用鐵札西都已然不待漢末也慶厯元年太常丞田况言今賊甲皆冷砧而成堅滑光瑩非徑弩可入自京齎去衣甲皆軟不足當矢石以朝廷之事力國之役巧乃不如一小羌乎由彼專而精我漫而略故也今請下逐處悉令土匹冷磚打造純鋼甲旋發赴緣邉先用八九斗力弓試射以觀透箭深淺而賞罰之聞太祖朝舊用絶為精好但嵗久斷綻乞且穿貫三五萬聨均給四路亦足以禦敵也北征録周禮有函人之職司馬法有甲士之制鼂錯以五同論兵甲弩矢馬燧以短長三制造鎧衣士皆所以避鋒鏑全肢體稱大小便進趨也然造甲之法步軍欲其長馬軍則欲其短弩手欲其寬鎗手則欲其窄其用不同其制亦異否則拘於定式昧於從變肥者束身太緊甲身則可周後背而前胸不交甲裙則可閉後膺而前胯不掩瘦者掛體太寬挽弓發箭則甲不貼體而胸臆絣撲有繼弦脫筈之憂揮劍刺鎗則甲不付身而腰背鬆虛有抵手礙足之患長者不過膝腕而矢石可及短者垂及腳面而泥濘不前小有不便則拆去甲葉而遺棄不收大有所妨則割去全段而拋擲不顧製作之難費耗之廣不幾於徒費乎故君子謹其微於制作之初士有肥瘠甲身不可無廣狹材有高下甲裙不可無長短故第一等甲所以給肥胖之士也肥胖之士亦有長短故甲裙又分為三制使肥而長肥而短者皆可披帶第三等甲所以給中常之士也二者亦有長短故甲裙又為三制使長者短者皆可披帶每遇給散則隨其肥瘠長短而選給之則肥瘠長短無一不稱其用人瘦甲寬則都管皮柱定不可行坐甲小人大則包掩不及罔避金矢皆成棄物是謂人甲制馬軍與步人之甲有四不同步人則直身起立馬軍則蹲坐抵控馬軍腰圈若依人步皆用五吊則上柱兩腋而不容低昂下擦雙胯而不堪轉動所以獨用四吊步人則兩足循行左掩則背安結項有穿扣不順馬軍則緩急上馬右掩則搐定左足而跨鐙不及馬軍甲身所以獨用左掩步人則直身行立短則露足馬軍則曲膝蹲坐長則綰絆馬軍甲裙所以獨用過膝三寸步人則甲身腰圈吊腿連成一片名曰全裝而易為披帶馬軍則吊腿拖泥遴作二段名曰摘吊而便於去取故截為兩段上安結項四枚遇敵則掛上吊腿而用避矢石退師則解入搭袋而免被牽制馬軍吊腿所以獨用摘吊是謂馬軍甲制弩手與鎗牌弓箭劍斧手馬軍之甲有三不同蓋馬軍鎗牌等手例欲身材長大獨弩手不嫌矮短故軍中類選不及等仗者為之比馬軍鎗牌弓箭等手已為最短况舉足入蹬而易被兜絆曲膝靠樁而易為走衮此弩手裙所以獨用短捷其他甲裙後交前倥則恐被矢石弩手甲裙前交後倥則有礙樁鐙蓋故法陳前有車車後伏弩今制陳前有牌弩隨牌後弩手之甲雖不庇兩足而車髙一丈二尺牌髙六尺五寸全身亦可庇護此弩手甲裙所以獨用向後它甲惟欲緊束則挽弓刺鎗無所牽制弩手惟欲鬆寬則踏蹬衮樁無所靠倚此弩手甲身所以獨用寬綽是謂弩手甲制周馬之身最為利害惟頭面胸臆馬面子舊制雖巧近日符離陳蔡之役馬多被傷中壽星腦額而死臣今制為貼額用綿布衲作一片貼在馬面子內額腦之間脫遇矢石可透鐵面尚有鐵額可隔此馬面所以合用貼額大全裝雞項大而秋錢小或暑月悶熱雪雨氷結徹去秋錢尚有雞項可蔽肥肉此馬甲所以合用小全裝我軍馬甲甲身例是垂下過䪌一尺許所以披帶重滯馳驅綰絆賊軍馬甲甲身只是平腹下用虎斑布裙遇箭皆被矯揉所以披帶輕捷馳驟俏俊此馬甲身所以合用平䪌雞項重則頭低項曲而馬被控抑雞項輕則頭髙項直而馬臆鬆寬此雞項所以合用綿布甲衲赤身帶甲則擦損肌肉而久成臭爛襯以藉褥則護惜皮毛而不致破傷此馬甲所以未帶甲先用馳滑辣甲圈兩件是謂馬甲制廣西造皮甲法生牛皮裁成甲片用刀刮毛以破碗舂碎篩取米大屑調生漆傅上油浸透則利刃不能入拳拳有勢者所以為變化也橫邪側面起立走伏皆有牆户可以守可以攻故謂之勢拳有定勢而用時則無定勢然當其用也變無定勢而實不失勢故謂之把勢作勢之時有虛有實所謂驚法者虛所謂取法者實也似驚而實取似取而實驚虛實之用妙存乎人故拳家不可執泥裏外圈長短打之說要須完備透曉乃為作手技欲精欲多用欲熟欲騪欲狼兩精則多者勝兩多則熟者勝兩熟則騪與狼者勝數者備矣乃可較敵一家數溫家長打七十二行著二十四尋腿三十六合鎖趙太祖長拳多用腿山西劉短打用頭肘六套長短打六套用手用低腿吕短打六套趙太祖長拳山東専習江南亦多習之三家短打鉞亦頗能溫家拳則鉞所専習家有譜今不能盡述也略具數節于後一勢四平勢井闌四平勢髙探馬勢指襠勢一條鞭勢七星勢騎虎勢地龍勢一撒步勢拗步勢長拳變勢短打不變勢逼近用短打若逺開則用長拳行著既曉短打復㑹行著短不及長矣一手有上中下切斫鈎扳攙金手髙立挌揚逼攻抖盤旋左右腳來蹖調出五橫三推肘你行當面我行傍你行傍來我直走倘君惡狠奔當胸風雷絞炮劈掛手騰捶手雙打雙砍雙過肘左右走手怕邊拳調出飛虹忽捉手喝聲打上下頭虛顧下還須上捉手只些真訣是原𫝊還有通仙六隻手旗鼓拳閃橫拗步腳上前髙怕黃鶯雙拍手低怕撩隂跨襠拳挨靠緊追休脫手會使斜橫搶半邊長拳行著凡打法行著多從探馬起直行虎打法三著打左右七星拗步高探馬驚法右腿蹴驚右手斬手左手飛拳上臉連右手拳一齊再發搭腳進步高探馬左拳哄臉右腿低彈左腿右拳飛拳上臉倒身一蹖倒插幡髙探馬専打髙探馬右腿驚左腿左腿上蹖玉女穿針高探馬變一條鞭右拳驚右腿隨拳窩裏暗出倒馬鎈四平變身法回身勒馬聽風諸勢俱打一腿六腿左右通用本家俱有短腿可破又有還腿可用一鑽左上右鑽右上左鑽一蹖左顛右蹖右顛左蹖左偷右蹖右偷左蹖一鎈一蹴一掛一跟一低彈演法凡學腿先虛學踢開腿後依法演習鑽腿虛學蹖腿懸米袋或蒲團學鎈腿虛學或用柱掛蹴腿虛學或用掛柱腿用柱學跟蹆虛踢後用柱式彈腿用三尺長凳竪立或用石礅在平地上學圓光手四平手腮肩手高搭手沉墜手釣腳行著短打長拳卧魚腳跽一腳鬼撮腳伸一腳俱右俱用鐵門拴即搶壁卧畨身雙腳打重不倒身站法腳尖正背人腿起如馬踢為樁腿平踢為彈腿習彈腿便捷用凳以腳凳竪地上彈腿踢去取平行不倒為度習彈腿力用磉石以踢逺磉石為度習蹖腿虛腿用糠懸梁上蹖腿髙踢去復還俱以腰力為主度習蹖腿實腿用柱以蹖腿踢柱上儘力為度鈎腿指拳腿灣向裏習樁腿則有力綿張拳護胸脅腰溫拳護頭面頸腳要打髙手亦取髙專用腳以手輔之手不能當腳腳起半邊虛說不著溫家高腳拄下用腳接低腳踢上用腳斷長拳張拳設套待彼入套本家設套待改調處疾遲癡死四勝左手如鑽錢右手如弄琴前腿如山後腿如撑前手如龍變化後手如虎靠山左右不離前後方鈎入眼不睫見鎗速進鈎連密莫犯莫敵㸃用單手送如㸃水蜻蜓有活動之意扎用雙手老實送一扎用稍一棍用根根稍互用步步進前如隂手棍隂手蓋陽手挈此是少林士真妙訣扒止左右打上揭不宜向下磕恐扒頭重難起也盤腿裏盤外盤腿鎗頭一合鎗先用圈鎗為母後用封閉捉拿救護閃賺是花鎗名色呌做梨花擺頭第二合先有纒鎗後有攔鎗黃龍戰扞黑龍入洞拿鎗救護閃賺是花鎗名色呌做鐵子掃第三合鎗先有穿指鎗後有穿袖鎗鷂子拿鵪鶉救護閃賺是花鎗名色呌做鳳㸃頭第四合鎗先有白拿鎗後有進步鎗如猫捉鼠加朋退救護閃賺是花鎗呌做白蛇弄風第五合鎗先有迎風鎗後有截進鎗四封四閉死中返活無中生有四面使鎗第六合一截二進三拿四纒五攔六徹共加六路花鎗上有場秦王摩旗下有場撥草尋蛇中調四路閃賺梨花擺頭鐵掃子鳳㸃頭白蛇㺯風爾鎗動我鎗拿爾鎗不動我鎗發中間一㸃難招架指人頭取人面髙低逺近通要見鎗勢浮腰索先取手後取腳取了腳與手閉住五路通傷口鎗有三件大病那三件大