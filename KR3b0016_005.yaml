裂裳衣且藥不精專雖多亦少藥能精製以少為多過與不及兮失其調劑用之適中兮燮理平和灰硝少文雖速而發火不猛硝黃缺武縱燃而力慢奈何棄武用文勢既偏而力弱堪成白火之用棄文用武事雖濟而力窮乃在噴火之科臣懦君强不堪布政惟宜直前宣吐臣勇君明有似煥汗忽爾中含激烈賢哲明此兩端昏愚豈諳優劣文一武十是謂先驅渾圓則流轉不窮而四圍跳躍直遂則中通一線而百步爭途縱一兩之藥行三百步有竒恐千里之馬終有一蹶不虞難于百發百中大抵藥力多少之論耳若夫方以類聚材在兼收滴醋以酸折助順火酒以燥性相投木折皮或微潮而噀逺班猫以酷烈而取遒至如獨蒜氣亦相求論其製法須諳利弊硫黃粗兮灰易細文武乖暌硝研細而黃灰粗煎熬失味合藥不厭精碾藥不厭細錘打不嫌多築虛最所忌若夫土囊所以壓炮蓋為金土相生沸湯用以和藥是則水火既濟聊且撮其大都指破迷途之士解云謂硝産不是道地硝性微軟故曰不明因硝不道地加上黃灰恐致暴裂故曰虐硝六分之一爆伏用之黃居硝三十分之一灰居硝五分之一為下料為行火藥火箭流星地老鼠及藥線用之一云有硝無黃為藥線黃多則能發火杉灰為緊藥輕煤為慢藥栁枝灰茄楷灰最輕而易引火瓢灰蜂窠灰則又輕矣硫黃本是火之精焰硝一見便興兵硝為君而硫作臣炭灰佐使最通靈硝力豎而硫性橫炭灰在內助力真三家本是各類産㑹合君臣萬古雄黃居硝三分之一或四分之一灰居硝四分之一為上料凡紙筒紙毬梨花竹筒瓦罐敝口之物火箭頭上及鐵炮欲炸者用之黃居硝二分之一古火毬煙毬用之黃居硝十分之一為中料灰同為中料凡銃炮及鳥銃用之黃與灰各居口敞則火散而力緩口撮則火拘而力急如人開口舒氣則無力撮口出氣則有力藥箭出管難則行逺出管易則行近如射箭後手放箭扣緊則有力扣鬆則無力炮聲細則響而震耳聲宏則散而不震耳如樂聲管聲入耳深鼓聲入耳淺藴青此二物和勻半斤黃蠟四兩香油入水不息紙在中間布夾在外三分布一分紙撚紙撚以蠟油裹浸各藥稱足分兩先碾硫黃如麵細次下硝碾將灰稱足投入熟水投入硝黃內碾為片塊晒乾復碾極細愈細愈佳此即良法火兵以驍騎夜銜枚縛馬口人負束薪束藴懷火直抵敵營一時舉火營中驚亂急而乘之靜而不亂捨而勿攻火攻皆因天時燥旱營舍茅竹積芻穗糧軍營于桔草宿莽之中因風而焚之火獸以艾煴火置瓢中瓢開四孔繫瓢于野猪麞鹿項上針其尾端向敵營而縱之奔走入草瓢敗火發火次遣人音服與敵同者夜竊號逐便懷火偷入敵營焚其積聚火發乘亂而出火弩以擘張弩射及三百步者以瓢盛火冠矢端以數百張中夜齊射敵營中芻草積聚火禽以胡桃剖分空中實艾火開兩孔復合繫野雞項下針其尾而縱之奔入草器敗火發火箭以小瓢盛油冠矢端射城樓櫓板木上瓢敗油散因燒矢鏃內簳中射油散處火立然復以瓢續之則樓櫓盡焚猛火油以熟銅為匱下施四足上列四卷筒卷筒上橫施一巨筒皆與匱中相通橫筒首大尾細尾開小竅大如黍粒首為圓口徑寸半匱傍開一竅卷筒為口口有蓋為炷油處橫筒內有拶絲杖杖首纏散麻厚寸半前後貫二銅束約定尾有橫拐拐前貫圓掩入則用閉筒口放時以杓自沙羅中挹油注匱竅中及三斤許筒首施火樓注火藥于中使然發火用烙錐入拶絲杖放于橫管令人自後抽杖以力蹙之油自火樓中出皆成烈熖其挹注有碗有杓貯油有沙羅發火有罐貯火有罐有鈎錐通錐以開筒之壅塞有鈴以夾火有烙鐵以補漏通匱有罅漏以蠟油清補之凡十二物除錐鈴烙鐵外悉以銅為之一法為大一卷筒中央貫銅胡盧下施雙足內有小筒相通亦皆以銅為之亦施拶絲杖其放法凖上凡敵來攻城在大壕內及傅城上頗衆勢不能過則先用藁韎為火牛縋城下於踏空版內放猛火油中人皆糜爛水不能滅若水戰則可燒浮橋戰艦於上流放之先于上流簸糠粃熟草以引其火火箭頭白火六兩四錢六錢四分樟腦八錢淨江龍慢藥六兩二錢輕煤四兩八錢砂四兩雄四錢八分􅔈八錢鉛制汞四兩緊藥四兩八錢杉灰四兩一兩六錢雄􅔈砂汞同上噴鎗五兩四兩八錢一兩六錢雄二兩四錢砂三兩二錢汞三兩二錢鐵沙半斤子劣火藥四兩四兩一云八錢一兩六錢一云硝一斤黃五兩灰同上噴筒四兩八錢四兩八錢八錢一云枀皮久烟一窩蜂四兩四兩八錢火彈五分石子三分砂一兩六錢鐵菱一錢鐵子一錢汞四兩火毬四兩三錢荔枝炮四兩杉灰四兩火龍口四兩栁灰四兩四兩八錢紙炮急藥三兩二錢四兩機銃一兩六錢二兩四錢四兩銃母藥一兩一錢二分四兩炮仗一兩二錢八分二兩四錢流星藥線四兩八錢火龍暴驚風猪四錢八分四兩八錢八錢火箭硝一斤黃四錢八分灰四兩八錢離筒四指半稱勻不勻後用鎖墜子廣東梨花方硝一斤黃六兩砂六兩八錢輕煤六錢二兩四錢炮長藥二兩八錢炮長藥方硝一斤二兩三錢灰二兩三錢不灰木五斤用五倍子代之黑棗三斤煤炭五斤鐵皮四兩八錢黃三兩七兩團七日又南棗栗炭木等分糯米粥丸七兩團五日子炮用火燒紅投入醋內三次其鐵脆而易於炸碎貯火用鐵罐火藥用木器破綿紙碎五錢舊青布碎五錢用此二物微有烟又用作紙撚用舊綿花絮浸隂溝內取乾入罐內燒存性馬勃不灰木出上黨今澤潞山中皆有之蓋石類也其色青白如爛木燒之不然以此得名或云滑石之根也出滑石處皆有今處州山中出一種松石如松幹而實石也或云松久化為石人家多取以飾山亭及琢為枕雖不入藥然與不灰木相類故附之陳藏器要燒成灰即斫破以牛乳煮了便燒黃牛糞燒之成灰榆麵不灰木炭屑棗肉