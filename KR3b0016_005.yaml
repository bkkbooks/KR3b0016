哵哵嚮單擺開鑼響㸃火摔鈸嚮收隊火器手合用藥匙汪碗藥簡透針鋼鎚木馬子裂鑽至子斧子北九件快藥不用凡地中有寶及藏物伏尸之類可用神燭照之法常以十二月猪脂和曾青碌硝二兩石膏硫黃一兩末不用水搜于合子內七月七日收麻花中或花暈中照之星明地下者有伏藏金錢也色赤光四散者近不過五尺下有金也聲鳴或暗或明不散者兵器錢物也光搖色明者銀也色赤明聲烘烘者寶玉也青焰光而有聲者赤寶玉也黃淡或明或暗者古銅兵器也光聲垂地或光微垂地火照處小者鐘鼎器也光如龍蛇照赤明動而焰直上烟如虹者寶劍圭璧符璽也暗黑影大如沉者伏尸也忽然明咤黑光下垂者人墓也內有寶物金玉不明咤下垂者不動者婦人也動者丈夫也聲如雷鳴紅光震動者下有神龍也不可動之光有青圓乍欽者錢也色青黑况而影動搖或下垂者乃鉛汞之物色白不明或聚不散不得照之有怪物及寃家死之鬼也仔細察之無不驗矣光焰亭不動高明輝耀異常者下有神丹不死之藥或神書異物舍利等及古人所藏寶器異常之物又法於丹砂中取出水銀方家謂之靈液與牛羊豕三脂同杵萬下山中有金寶處以通草為炷照色赤眀而下垂者有金白者銀黑者鐡黃者銅青者鉛眀而嚮者至寶也不眀者砂礦相雜也赤眀垂散者井砂也青見亭亭周上赤暈者玉也四散黑光暗而明者以異常妖怪或隱伏龍蛇不可發也五色如虹上下者丹藥異寶也鮎魚無鱗寒而有毒勿多食赤目赤鬚者並殺人也豚魚一名鰗鮧蠼螋能溺人影令發瘡如熱沸而大繞腰匝不可療蟲如小蜈蚣色青黑長足山蠼螋溺毒更猛諸方中大有主法其蟲無能惟扁豆葉傅即瘥豫脂有毒折傷肉損瘀血以脂塗上炙手及熱摩之即透生嶺南蛇頭鱉身亦水宿亦樹栖取其膏以銅及瓦器盛之浸出唯雞卵盛之不漏摩理毒腫大驗透物甚於醍醐也砂挼子有毒殺飛禽走獸合射罔用之人亦生取罡碗令夫妻相好生砂石中作旋孔有蟲子如大豆背有刺能倒行一名倒行狗子性好睡亦呼為睡蟲是處有之蝮蛇俗名土虺膽味苦微有毒主􅀢瘡肉釀作酒療癩疾蝮蛇形短鼻反錦文著足斷足著手斷手不爾合身糜潰其蝮蛇七八月毒盛時嚙樹以泄其氣樹便死又吐口中涎沫于草木上著人身腫成瘡卒難療名曰蛇漠瘡衆蛇之中此獨胎生蠱蟲陶云服敗鼓皮即喚蠱主姓名按古人愚質造蠱圖富皆取百蟲甕中盛經年開之必有一蠱盡食諸蟲即此名為蠱能隱形似鬼神與人作禍然終是蟲鬼咬人至死者或從人諸竅中出候取之燎乾有患蠱人燒為黑灰服少許立愈亦是其類自相伏耳新注云凡蠱蟲燎蠱是知蠱名即可治之如蛇蠱用蜈蚣蠱蟲蜈蚣蠱用蝦蟇蠱蟲病蟆蠱蟲用蛇蠱蟲是互相能伏者可取治之五灰桃栁桑灰蕎麥灰好陳石灰和水煉熟每斗水加信四兩六兩蟾酥一兩五毒膏川烏主草烏主南星半夏狼毒加入神水內煉成膏若作神砂用五灰水煉成五毒膏加庸巴豆末和砂焙乾麻桑柴灰五斗苦蕎麥灰十斗豆楷灰三斗五升茄楷灰三斗五燈頭灰五斗巴豆灰一斗五升藜蘆灰一斗川草烏灰二斗地星草汁三斗共淋水三石煎至八斗後入地星草汁微熬再入硇五兩砒三兩膽礬五兩皂末二兩銅青三兩再微熬藥澪為度以竹筒出之又水出鹽處久積鹽水鹽膽水三斤茍印油二斤古冢中水五斤藍蛇頭七個春夏水毒蛇水五斗隂泉水背隂泉水三升銅汗三升熱湯遏銅器汗共微熬用之人食立死糞炮罐法先以人清磚內成揀擇淨㬗乾打碎用篩羅細盛在甕內每人清十六斤用狼毒半斤草烏頭半斤巴豆半斤皂角半斤砒霜半斤砒黃半斤班猫四兩石灰一斤荏油半斤入鑊內煎沸入薄罐容一斤半者以草塞口入炮內放以擊攻城人可以透鐵甲中則成瘡潰爛放毒者仍以烏梅甘草置口中以辟其毒金火罐法其制圍九寸高四寸形圓口徑八分先用麻皮泥漿次使麥麵泥次又口用猪濕氊裹入炮放其盛器則有生鐵節用鑄成者以盛金汁仍有兩耳手把挹注則有生鐵杓熟鐵杓並挹注金汁若敵來攻城有團隊者以金炮打之人馬中則解散放宜急勿使凝結鐵汁入信錫每斤入錫四兩則常融而不凝人糞不落地鍊霜白馬汁三四月間採草烏頭子一百斤去皮葉止用肉摏碎酒窄部窄水約三十斤將竹篾做簍高四尺回一丈下留一門燒火紙糊將薄板三四塊作一層架楞上半中間將大碗盛藥水用紙蓋碗口放在板上下用木窩樹柴有量星在上出在杭州細明火如篾纜㰯火燒四日四夜時時要將藥水并在大家火盛一處去碗底渾腳將布拭淨又將碗盛熏一日如此要并十次夜并換去腳十次後用細柴煨烟熏三日三夜仍前并換去腳不可絶火薰至成藥二斤將雞試不效再薰試好收入磁器收貯吊在烟火頭上不可冷處又忌松烟一入藥性則解又忌煤烟并出腳丢在河內猪􅀈食死八月採烏啄搗笮取汁日晒為射罔以傅箭射走獸十步倒地中人則死速宜解之製弩箭藥法合弩箭藥大金藤飛蠱藤地鞠地油麻吕公縧樟木悶多羅根百蛇藤單摩根半天藤烏龍藤爛藥少許木通右各等分為粗末用淨瓦碗一箇地上撅一孔放碗在孔內用薄竹笆蓋在碗口上用生茅草三葉十字放在竹笆上後放藥末在竹笆上用大樹葉或諸般樹葉蓋在藥上留頂上孔却用溫灰團團煨住頂孔上放炭火燒徐盡火量時抽出茅草看黃色為度取出竹笆用碗內藥汁調擴藥母乳鉢內研爛不稀不稠就擦上箭頭上晒乾後用粟壳草燒烟熏箭頭此箭見血便死每一錢擴藥母須搽七根箭頭為效此箭用箭筒裝不要走了氣掛在燒火有烟處搽藥時箭頭上用綿子些少纏住箭頭上後然後搽藥上始不落了藥烏頭味辛甘溫大熱有大毒其汁煎之名射罔殺禽獸射罔味苦有大毒按中蠱通用藥云射罔溫大毒云土附子味㢛辛熱有毒生去皮搗濾汁澄清旋添晒乾取膏名為陶獵人將作毒箭使用或中者以甘草藍青小豆葉浮萍冷水苨薺皆可禦也射罔毒藍汁大小豆汁竹􅅹大麻子汁六畜血貝齒屑葍根屑蚯蚓屎藕芰汁草烏藥傅矢臨用浸以姜汁以火薰以助藥力炒冬杞包則火藥盡壞故以此解桂海志云蠻人以毒藥濡箭鋒中者立死藥以蛇毒草為之好毒箭藥出那地州諸蠻亦不能多得桂海虞衡志云都管草一莖六葉辟蜈蚣蛇圖經云都管草生施州及宜州田野味辛辣性寒主風癰腫毒赤疣以醋磨其根塗之亦治咽喉腫痛切片含之立愈其根似羌活頭嵗長一節髙二尺許葉似土當歸有重臺生二月八月採根隂乾施州生者作蔓又名香毬蔓長丈餘赤色秋結紅實四時皆有採其根枝煎湯淋洗去風毒瘡腫解箭頭藥名大昴頭解牙齒緊又能治塗罨腫痛喉內疼痛大統管解擴治􅀈痛小昴頭解散治骨脉疼痛毒瘡檑爛酒調山桂皮治大畜散山八角解壯血存生氣治利九將官解身骨疼痛木都管解擴藥治百木死氣飄風浪解水面生氣山明靈解飛蛇木明靈解水髙龍魚鱉飄風散解散心氣血脹解土藤解吐青龍藤解百蛇噴心白龍藤解百蛇南蛇藤解百蛇氣猛蛇藤烏龍藤解擴藥子大烏蛇藤解蛇霜凉藤解喉渴蝴蝶藤解迷悶困睡大蚶藤解牙緊半天藤煮水洗刀傷小烏蛇藤解蛇大金藤解身骨病痛溫斗藤解血氣白蛇藤解蛇引領藤䛿論衆生氣即天冬木通藤解手腳軟弱車帶藤洗刀傷蜈蚣藤治蜈蚣洗腫毒川石藤治攀斤發照頂木煮洗腫爛破石攀根解蛤睡即胡系姜七鬭根洗刀傷骨節通引藤引出生氣百萬解解衆生氣即金則根銀弟解擴縛脛香藤解衆生氣不冷藥發用水浸闕細如筯縛􅀈上藥箭不功喉金弟解擴項引藤解牙緊山獸藤解山上鳥猿如法此藤煎酒喫洗小丁茹藤解洗箭口身硬藥煮水洗身髙樓望月根龍飛禽山都管解擴藥右為末引子用五倍子為末用鹽等分焰硝等分烏梅肉多用水煎爛同煉蜜搜為膏磁罐收之不許乾了如不酸倍加五倍子烏梅肉此係酸藥各每服一錢重噙化下日進三服治被藥箭傷通即先服此藥疏醒後却服定心丸定心丸母丁香減半木香鳥朋沙焰硝甘草沉香雄黃辰砂各等分右將前五十味藥同八味煉為膏密用罐盛之每服一錢噙化日三服為丸如米粥解擴藥箭服酸藥墊後服此大昴頭九將官大統官木都管山都管金弟銀弟地菊山苦練金藤紗藤山八角右件為末合成用酒煎滚放家鹽摻溫服不犯鐵器用銅銚煎更將原燒藥竹笆燒作灰碾爛酒調服金解了藥煎過藥合就得每服一餅細嚼姜湯送下如利不止凉水補之更用凉水洗手然後喫粥大㦸五兩地油麻一兩土當歸一兩右為末稠米糊為餅子即過藥千里漿一名水葫蘆木瓜紫蘇葉桂各半兩烏梅肉赤茯苓各一兩右為細末煉蜜為丸如彈子大噙化一丸咽津又方百藥煎烏梅肉紫蘇葉人參甘草麥門冬右各等分為細末煉蜜為丸噙化甘草三兩為末甘葛二兩為末緑豆粉一兩五錢蒲黃五錢為末烏梅肉二兩厚朴二兩紫合花草二兩將蜜水與烏梅肉為丸如圓眼核大噙化走血藥似解毒桂心乾蝎烏樟根突厥白虻蟲水蛭蜣蜋土狗子不灰木朝桂鼠渾鹽葉黎母子鹽麩子獨顆栗子大糞火鐵精末夷中國戎夷五方之民俗皆有性不可推移剛柔遲速異齊器械異制衣服異宜故朔陲積隂之野食肉飲酪其人密理故耐寒百粵多陽之地其人疏理故耐暑是其天性然也古之名將受命伐國必度其俗之强弱能之長短常以我之長擊彼之短料其所好而誘之因其所惡而攻之大抵北方之狄與西方之戎其性相類士力能彎弓盡為甲騎寬則隨畜田獵禽獸為生急則習戰攻以侵伐為事其長兵則弓矢短兵則刀鋋利則進不利則退不羞遁走茍利所在其擊之法利為伏兵相其險阻隱匿之地或叢林薈翳之處擇精兵利器千人為在各伏其要以猛而不堅者從其弱卒佯為不利以數百千人委之必貪其獲俟其競進發伏以擊之必克若與之􅊭原廣野度長潔大爭一切之利則非我所長又彼之能在弓矢我當以强弩邀之故春秋時戰法曰使勇而無剛者嘗冦而速去之為三覆以待之戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣此已試之效也其俗亦好為誘兵羸師以致敵宜謹視之故漢髙帝擊冒頓冒頓匿其精兵見其羸弱漢悉兵北逐之髙帝先至平城步兵未盡到冒頓縱精兵三十萬圍之白登七日此已然之驗也近世戎狄竒䇿亦不過是此名將之所察而愚將之所陷也然其技藝與中國異胸奴之長技三中國之長技五前使稱狄兵五而當漢兵一今雖頗得漢巧猶三而當一是中國之利器居多且其人善騎而不善步中國步兵有强弩利刃之銃足以抗之然中國之不敵人者人性習安不若其耐勞苦於霜雪沙磧不毛之地又其性不善攻攻不久為利衝擊故前世名將必以竒制之而不與爭馳騎逐也南之夷蠻其性剽悍狠怒樂為盜賊而勢不能堅惟用標槍旁牌飛刀環刀木弩以為兵器善為藥箭中者大呌信宿輒死依山阻水怙恃其險急則竄伏緩則抄掠泛船則水道多絶陸行則險阻不進非中國之所能擊此之法利於平地以竒略誘其人隱伏精兵竊發而禽之誘之術多縱反間出甘言重幣招致使來則入吾計中大凡中國之民屋宿火食衣被繒纊北方殺氣早降手足皸瘃不能渡漠南方暑濕溪谷毒厲不能踰嶺以中國之人戍守則十不當一故古者以蠻夷攻蠻夷則强弱相當是以濵家之民召募為用闢曠土以食之厚賞格以激之馳射格鬭是其素所畜積省縣官之費減轉餉之勞多縱間諜以重賂誘其酋豪大姓使之攻擊比用華人其利十倍制北狄者先制其馬制東夷者先制其船制南蠻者先制其鏢牌遼記曰每契丹南侵其衆不啻十萬國主入界之時步騎車帳不從阡陌東西一槩而行大帳前及東西面差大首領三人各散萬騎支散遊奕百十里外交相覘邏謂之欄子馬戎主吹角為號衆即頓舍環繞穹廬以近及遠折木稍屈之為弓子鋪不設槍營塹栅之備每軍行聽鼓三伐不問昏晝一布便行未逢大敵不乘戰馬俟近敵師即競乘之所以新羈戰馬蹄有餘力其用軍之術成列而不戰俟退而乘之所多伏兵斷糧道冒夜舉火上風曵柴饋餉自齎退敗無恥散而復聚寒而益堅此其所長也金記云其用兵則戈為前行號曰硬軍人馬皆全甲刀自副弓矢在後設而不發非五十步不射弓力不過七斗箭鏃至六七寸形如鑿入輒不可出人攜不滿百隊伍之法十五百皆有長五長擊柝十長執旗伯長挾鼓千長則旗幟金鼓悉備五長戰死四人皆斬十長戰死五長皆斬百長戰死十長皆斬負鬭戰之師以歸者則得其家資之半凡為將人自執旗人視其所向而趨自主帥至步卒皆自馭無從者國有大事適野環坐畫灰而議自卑者始議畢即漫滅之人不聞聲其密如此將行軍大㑹而飲使人人獻策主帥聽而擇焉其合者即為將任其事師還又大㑹聞有功髙下賞之以金若干舉以示衆或以為薄復增之初叛之時率皆騎兵旗幟之外各有字記小大牌子繫馬上為號每五十人分為一隊前二十人全裝重甲持棍槍後三十人輕甲操戈每遇敵必有一二人躍馬而出先覘陳之虛實或向其左右前後結隊而馳擊之百步之內弓矢齊發中者常多勝則整隊而緩追敗則復聚而不散其分合出入應變若神人自為戰則勝方大戰時烏珠被白袍乘甲馬以牙兵三千督戰兵皆重鎧甲號鐵浮圖戴鐵兜牟周匝綴長簷三人為伍貫以五貫索每進一步即用拒馬擁之人進一步拒馬亦進退不可却敵又以鐵騎分左右翼號拐子馬皆女真為之號長勝軍專以攻堅戰酣然後用之自用兵以來所向無前尼雅滿二太子優劣雖殊皆善將兵皆紀律嚴密鼓下皆用命頃在殿前見御寶批降到金人三生陳同命隊法令姚友仲已下各陳所見以聞凡敵人遇我師必布圓圍陳當鋒次張兩陳左右夾攻故謂之三生陳每隊一十五人一人為旗頭二人為角三人為從四人為副五人為繳旗頭死從不得生還還者并斬得勝受賞亦然故謂之同命隊諸將亦皆畫陳圖詣殿前帥司獻欲以方陳迎敵次兩陳夾攻其左右敵兵厚重復用兩直陳掩其旁此五行陳法也或欲分為八陳擊首則尾應擊左則右應擊中則首尾皆應此八陳法也僕笑而進曰自古陳必相其地之利便敵人之多寡或披山或背水或設伏料敵應變在臨時豈可預為之若使敵人知我之情别布他陳將何以禦姚友仲以為然復問同命隊法奈何僕曰國家係伍連法行之舊矣且如五人為伍積五十人為隊押隊引于前擁隊驅于後全伍勝擁押隊有賞全伍負有誅如此則自然用命夷狄之法不足遵也姚公友仲深以為然黑韃其陳利野戰不見利不進動靜之間知敵强弱百騎環繞可裹萬衆千騎分張可盈百里摧堅陷陳全藉前鋒袵革當先例十之三凡遇敵陳則三三五五四五斷不簇聚為敵所包大率步宜整而騎宜分敵分亦分敵合亦合故其騎突也或逺或近或多或少或聚或散或出或沒來如天墜去如電逝謂之鴉兵撒星其合而分視馬箠之所向其分而合聽姑詭之聲以自為號自邇而逺俄頃千里其夜則望燎煙而知其所戰其極寒無雪則磨石而禱天其破敵則登髙眺逺先相地勢察敵情僞専務乘亂故交鋒之始每以騎隊徑突敵陳一衝才動則不論衆寡長驅直入敵雖十萬亦不能支不動則前隊橫過次隊再撞再不能入則後隊如之方其衝敵之時乃遷延時刻為布兵左右與後之計兵既四合則最後生者一聲姑詭四方八面嚮應齊力一時俱撞此計之外或臂圓牌下馬步射一部中謫則兩旁俱潰潰則必亂從亂疾入敵或見便以騎蹙步則步後駐隊馳敵迎擊敵或堅壁百計不中則必驅牛畜或鞭生馬以攪敵陳未有不敗敵或森㦸外列拒馬絶其奔突則環騎疏哨時發一矢使敵勞動相持稍久敵必絶食或乏薪水不容不動則進兵相逼或敵陳已動故不遽擊待其疲困然後衝入或其兵寡則先以土撒後以木拖使塵衝天敵疑兵衆每每自潰不潰則衝其破可必或驅降俘聽其戰敗乘敵力竭擊以精鋭或才交仞佯北而走詭棄輜重故擲黃白敵或謂是誠敗逐北不止衝其伏騎往往全沒或因真敗而巧計取勝只在乎彼縱此橫之間有古法之所未言者其勝則尾敵襲殺不容逋逸其敗則散迸走追之不及一倭賊本無長技但聞官兵進剿輒將賊黨或十名或四五十名預于土堆溝旁叢林茂草人家僧寺等處凡可隱形藏身者各先行潜躲謂之伏兵一遇官兵則伏兵四起或自後邊圍繞以致官兵眩惑紛錯務遣嚮馬導并精鋭馬兵四望爪探搜捕行陳對敵嚴謹防備毋墮計中一倭賊臨陳先以數十人前來衝突官兵進𠞰仍佯敗即回使我兵輕視逺追入其套中賊復擁衆來攻謂之誘兵宜相度地勢審察機宜可追則追可止則止毋得輕率致有違失一倭賊防我官兵進𠞰先將錫塊傾為銀錠及將粗惡衣服雜于蒿草裹為大包遇兵戰賊勢不支之時即將錫錠衣包拋擲在地使兵不察其僞羣去搶奪賊將乘兵淆雜肆其凶殘謂之餌兵如遇賊拋棄物件在地不許爭取敢有違者統兵官即于陳前將本犯斬首若獲功取勝之後所遺財物監督官查給軍士並不入官一倭賊黠詐多端每遣奸細探知我兵號色衣裝輒照號衣色樣臨陳混入及至陳中方去僞衣露出本色衣號謂之詭兵凡我發去號衣俱臨進兵之期方行縫綴自相認識不得先期呈露為賊規探以售其奸永順保靖二司凡一鄉出一無賴之徒能殺人放火者則極意撫養以為殺手財貨美妻恣其所欲一鄉盡役屬之以是能强其兵武編前集卷五
