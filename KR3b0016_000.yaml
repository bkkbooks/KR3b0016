body:
  text: 武編前集兵家類提要臣等謹案武編十卷明唐順之編順之有右編已著録是書皆論用兵指要分前後二集前集六卷自將士行陳至器用火藥軍需雜術凡五十四門後集徴述古事自料敵撫士至堅壁摧標凡九十七門體例略如武經總要所録前人舊説自孫吳穰苴李筌許洞諸兵家言及唐宋以來名臣奏議無不托集史稱順之於學無所不窺凡兵法弧矢壬竒禽乙皆能究極原委故言之具有本末其應詔起為淮揚巡撫剿倭也負其宿望虛憍恃氣一戰而幾為寇困賴胡宗憲料其必敗伏兵豫救得免殆為宗憲玩諸股掌之上然其後部署既定亦頗能轉戰蹙賊捍禦得宜著有成效究非房琯劉秩迂繆僨轅者可比是編雖紙上之談亦多由閲歷而得固未可槩以書生之見目之矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:404cb11d5d4fdde6b861c76971265c4f745941f1a1998d336ca68340a86f4df2
